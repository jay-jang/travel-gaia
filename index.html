dth=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cellipse cx=\"24\" cy=\"12\" rx=\"13\" ry=\"5\"/>\u003cpath d=\"M11 12v10c0 2.8 5.8 5 13 5s13-2.2 13-5V12\"/>\u003cpath d=\"M11 22v10c0 2.8 5.8 5 13 5s13-2.2 13-5V22\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"availability","term":"Availability","term_ko":"좌석 가용성","abbreviation":"","aliases":["Seat Availability","Air Availability","AVS"],"category":"air-shop","conceptType":"business-term","status":"active","definition":"Availability is the count of bookable seats an airline is willing to sell on a given flight, displayed per booking class (RBD) for a specific date and origin-destination. It tells a seller how many seats can be sold in each class at the moment of the query, rather than the physical capacity of the aircraft.","definition_ko":"Availability(좌석 가용성)는 항공사가 특정 항공편에서 판매하고자 하는 예약 가능 좌석 수로, 특정 날짜와 출발-도착지에 대해 예약 등급(RBD)별로 표시된다. 이는 항공기의 물리적 좌석 수가 아니라, 조회 시점에 각 등급에서 판매 가능한 좌석 수를 판매자에게 알려준다.","longDef":"Availability is returned in response to an availability request and is expressed as a numeric value per RBD (for example F4 J9 Y9 B7), where the number indicates how many seats may still be sold in that class. Carriers may return availability from a static cache (AVS-based), from a real-time link to the inventory system, or via dynamic/seamless availability methods that may also account for married-segment logic. Availability differs from inventory and from the schedule: the schedule defines that a flight operates, while availability defines whether and how many seats can currently be sold per class.","longDef_ko":"Availability는 가용성 요청에 대한 응답으로 반환되며, RBD별 숫자 값(예: F4 J9 Y9 B7)으로 표현된다. 여기서 숫자는 해당 등급에서 추가로 판매 가능한 좌석 수를 나타낸다. 항공사는 정적 캐시(AVS 기반), 재고 시스템과의 실시간 연동, 또는 결합 구간(married-segment) 로직을 함께 반영하는 동적/심리스(seamless) 가용성 방식을 통해 가용성을 반환할 수 있다. Availability는 재고(inventory) 및 스케줄과 구별된다. 스케줄이 항공편의 운항 여부를 정의하는 반면, 가용성은 현재 등급별로 좌석을 판매할 수 있는지 그리고 몇 석을 판매할 수 있는지를 정의한다.","standardBody":"IATA","providerTerms":[{"provider":"Amadeus","term":"Air Availability / Schedule and Availability","context":"Amadeus distinguishes neutral, schedule, and seamless (carrier-linked) availability displays.","context_ko":"Amadeus는 중립(neutral), 스케줄, 심리스(항공사 연동) 가용성 조회를 구분한다.","relationship":"same"},{"provider":"Sabre","term":"Air Availability / Bargain Finder Max","context":"Sabre returns class-by-class seat availability in availability and shopping responses.","context_ko":"Sabre는 가용성 및 쇼핑 응답에서 등급별 좌석 가용성을 반환한다.","relationship":"same"}],"relationships":[{"type":"related","targetTerm":"RBD","targetId":"rbd"},{"type":"related","targetTerm":"Origin & Destination","targetId":"origin-destination"},{"type":"related","targetTerm":"Married Segment","targetId":"married-segment"},{"type":"related","targetTerm":"Overbooking","targetId":"overbooking"},{"type":"related","targetTerm":"Schedule Change","targetId":"schedule-change"}],"distinctions":[{"targetTerm":"RBD","explanation":"RBD is the class code; availability is the number of seats sellable in that RBD.","explanation_ko":"RBD는 등급 코드이고, 가용성은 해당 RBD에서 판매 가능한 좌석 수이다.","targetId":"rbd"},{"targetTerm":"Overbooking","explanation":"Overbooking can make availability exceed physical capacity by selling above the seat count.","explanation_ko":"Overbooking은 실제 좌석 수를 초과해 판매함으로써 가용성이 물리적 좌석 수를 넘어서게 만들 수 있다.","targetId":"overbooking"}],"sources":[{"name":"AIRIMP (ATA/IATA Reservations Interline Message Procedures)","org":"IATA","version":"","section":"","url":""},{"name":"Amadeus Air documentation — Availability","org":"Amadeus","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"7\" y=\"9\" width=\"34\" height=\"30\" rx=\"3\"/>\u003cline x1=\"7\" y1=\"17\" x2=\"41\" y2=\"17\"/>\u003cline x1=\"15\" y1=\"6\" x2=\"15\" y2=\"12\"/>\u003cline x1=\"33\" y1=\"6\" x2=\"33\" y2=\"12\"/>\u003cpath d=\"M16 28l5 5 11-11\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"award-redemption","term":"Award Redemption","abbreviation":"","aliases":["Redemption","Award Booking","Reward Redemption","Mileage Redemption"],"category":"customer","conceptType":"process","status":"active","definition":"Award redemption is the process by which a loyalty program member exchanges accrued miles or points for a reward, most commonly an award flight or cabin upgrade, but also hotel nights, car rentals, or merchandise. The miles required may be set by a fixed award chart keyed to route and cabin, or by dynamic pricing that varies with demand.","longDef":"When a member redeems for air travel, the program debits the required miles from the account, allocates the seat from a controlled award inventory, and issues a ticket (often with taxes, fees, and carrier-imposed surcharges payable separately). Award inventory is managed through the carrier's revenue management system and may be released into specific award booking classes. Redemptions can also be made on partner airlines within an alliance or bilateral agreement. Award redemption is the spending counterpart to mileage accrual: it draws down the redeemable balance built up through earning.","standardBody":"","term_ko":"보상 사용/award redemption(마일 사용)","definition_ko":"Award redemption은 로열티 프로그램 회원이 적립한 마일 또는 포인트를 보상으로 교환하는 과정으로, 가장 흔히 보너스 항공권이나 좌석 업그레이드가 있으며 호텔 숙박, 렌터카, 상품으로도 교환할 수 있다. 필요한 마일은 노선·좌석 등급별 고정 보상 차트로 정해지거나 수요에 따라 변동하는 동적 가격으로 정해진다.","longDef_ko":"회원이 항공 여행으로 사용하면 프로그램은 계정에서 필요한 마일을 차감하고 통제된 보상 좌석 재고에서 좌석을 배정한 뒤 항공권을 발권한다(세금·수수료·유류할증료 등은 별도 결제하는 경우가 많다). 보상 좌석 재고는 항공사 수익관리 시스템으로 관리되며 특정 보상 예약 클래스로 풀릴 수 있다. 동맹체나 양자 협정 내 제휴 항공사에서도 사용할 수 있다. Award redemption은 mileage accrual의 사용 측면으로, 적립으로 쌓인 사용 가능 잔액을 차감한다.","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Frequent Flyer Program","targetId":"frequent-flyer-program"},{"type":"related","targetTerm":"Frequent Flyer Number","targetId":"frequent-flyer-number"},{"type":"related","targetTerm":"Availability","targetId":"availability"},{"type":"related","targetTerm":"RBD","targetId":"rbd"},{"type":"contrasts","targetTerm":"Mileage Accrual","targetId":"mileage-accrual"}],"distinctions":[{"targetTerm":"Mileage Accrual","explanation":"Award redemption spends the loyalty balance to obtain a reward, whereas mileage accrual earns and adds to that balance; the two are opposite flows in the same account.","explanation_ko":"Award redemption은 보상을 얻기 위해 로열티 잔액을 사용하는 것이고, mileage accrual은 그 잔액을 적립·증가시키는 것이다. 둘은 같은 계정에서 반대 방향의 흐름이다.","targetId":"mileage-accrual"},{"targetTerm":"Companion","explanation":"An award redemption is paid for entirely with miles/points, whereas a companion benefit (e.g., a companion fare) typically discounts or waives the fare for a second paying-style ticket and is not itself a miles redemption.","explanation_ko":"Award redemption은 전적으로 마일/포인트로 결제하는 반면, companion 혜택(예: companion fare)은 보통 두 번째 동반자 항공권의 운임을 할인·면제하는 것으로 그 자체가 마일 사용은 아니다.","targetId":"companion"}],"sources":[{"org":"Navan","name":"What are Frequent Flyer Miles? How They Work","version":"","section":"","url":"https://navan.com/resources/glossary/what-is-frequent-flyer-miles"}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003ccircle cx=\"16\" cy=\"16\" r=\"9\"/>\u003cpath d=\"M16 11l1.6 3.3 3.6.5-2.6 2.5.6 3.6-3.2-1.7-3.2 1.7.6-3.6-2.6-2.5 3.6-.5z\"/>\u003cpath d=\"M26 26l12 12\"/>\u003cpath d=\"M38 31v7h-7\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"bar","term":"BAR","term_ko":"최우량 가용 요금(BAR, Best Available Rate)","abbreviation":"BAR","aliases":["Best Available Rate","Best Available Retail Rate","Best Unrestricted Rate"],"category":"hotel-rate","conceptType":"business-term","status":"active","definition":"Best Available Rate is the lowest publicly available, unrestricted retail rate a hotel offers for a given room type and date to the general public, with no advance-purchase or non-refundable restrictions. It is the benchmark or 'rack-replacement' rate that revenue management adjusts dynamically by date.","definition_ko":"BAR(Best Available Rate)은 호텔이 특정 객실 유형과 날짜에 대해 일반 대중에게 제공하는, 사전 구매나 환불 불가 제약이 없는 공개된 최저 무제약 소매 요금이다. 수익 관리 부서가 날짜별로 동적으로 조정하는 기준 요금, 즉 정찰가(rack rate)를 대체하는 요금이다.","longDef":"BAR is the reference public rate against which other rate plans (advance purchase, packages, corporate, member rates) are positioned, and it is often the rate to which rate parity commitments apply across distribution channels. BAR is typically dynamic, changing day-to-day with demand, and may be tiered (e.g. BAR1, BAR2) or layered with length-of-stay variants. It is a type of rate plan, not a performance average.","longDef_ko":"BAR은 다른 요금제(사전 구매, 패키지, 기업, 회원 요금)가 그에 맞춰 포지셔닝되는 기준 공개 요금이며, 유통 채널 전반에 걸친 rate parity 약정이 적용되는 요금인 경우가 많다. BAR은 보통 수요에 따라 매일 변하는 동적 요금이며, 등급화되거나(예: BAR1, BAR2) 숙박일수 변형과 함께 계층화될 수 있다. 이는 성과 평균이 아니라 요금제의 한 유형이다.","standardBody":"","providerTerms":[],"relationships":[{"type":"broader","targetTerm":"Rate Plan","targetId":"rate-plan"},{"type":"related","targetTerm":"Rate Parity","targetId":"rate-parity"},{"type":"related","targetTerm":"ADR","targetId":"adr"}],"distinctions":[{"targetTerm":"Rate Plan","explanation":"BAR is one specific kind of rate plan (the best unrestricted public one); Rate Plan is the general category covering all offers.","explanation_ko":"BAR은 요금제의 한 특정 유형(제약 없는 최저 공개 요금)이고, 요금제는 모든 상품을 아우르는 일반 범주이다.","targetId":"rate-plan"},{"targetTerm":"Rate Parity","explanation":"BAR is the rate itself; rate parity is the policy that this rate be consistent across channels.","explanation_ko":"BAR은 요금 그 자체이고, rate parity는 이 요금이 채널 전반에서 일관되게 유지되도록 하는 정책이다.","targetId":"rate-parity"},{"targetTerm":"ADR","explanation":"BAR is a published forward selling price; ADR is a realized average of prices actually achieved.","explanation_ko":"BAR은 게시된 미래 판매 가격이고, ADR은 실제로 달성된 가격의 실현 평균이다.","targetId":"adr"}],"sources":[{"name":"Industry revenue management and hotel distribution commentary on Best Available Rate","org":"","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M22 8l-13 13a3 3 0 0 0 0 4l14 14a3 3 0 0 0 4 0l13-13V12a4 4 0 0 0-4-4z\"/>\u003ccircle cx=\"32\" cy=\"16\" r=\"2.5\"/>\u003cpath d=\"M20 22l4 1 1 4 4-7z\" fill=\"currentColor\" stroke=\"none\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"bedbank","term":"Bedbank","term_ko":"베드뱅크(객실 도매업체)","abbreviation":"","aliases":["Bed Bank","Bedbanks","Wholesaler (hotel)","Hotel Wholesaler"],"category":"hotel-dist","conceptType":"business-term","status":"active","definition":"A bedbank is a B2B hotel wholesaler/aggregator that contracts room inventory from hotels (usually at net, non-commissionable rates) and resells it to travel sellers such as OTAs, tour operators, and travel agencies, typically via API. Bedbanks act as intermediaries between hotel supply and downstream distributors rather than selling directly to the public.","definition_ko":"베드뱅크는 호텔로부터 객실 인벤토리를 (대개 순(net) 요금, 즉 비커미션 요금으로) 계약해 OTA, 투어 오퍼레이터, 여행사 같은 여행 판매자에게 주로 API를 통해 재판매하는 B2B 호텔 도매업체/애그리게이터다. 베드뱅크는 일반 대중에게 직접 판매하기보다 호텔 공급과 하류 분배자 사이의 중개자 역할을 한다.","longDef":"Bedbanks aggregate inventory and net rates from many hotels and offer them to B2B buyers, who add their own markup before selling to travelers. Because they generally deal in Net Rates, the buyer's margin comes from marking up rather than receiving a commission. Bedbanks are a major source of opaque/packaged hotel supply and a common cause of rate parity disputes when net rates leak into public channels. Examples in the industry include Hotelbeds and similar wholesalers.","longDef_ko":"베드뱅크는 여러 호텔로부터 인벤토리와 순(net) 요금을 집약해 B2B 구매자에게 제공하며, 구매자는 여행자에게 판매하기 전 자체 마진을 붙인다. 일반적으로 순 요금(Net Rate)을 다루기 때문에 구매자의 마진은 커미션이 아니라 마크업에서 발생한다. 베드뱅크는 불투명/패키지 호텔 공급의 주요 원천이며, 순 요금이 공개 채널로 유출될 때 요금 패리티 분쟁의 흔한 원인이 된다. 업계의 예로는 Hotelbeds와 유사한 도매업체들이 있다.","standardBody":"","providerTerms":[{"provider":"Hotelbeds","term":"Bedbank","context":"Hotelbeds is a global B2B hotel bedbank/wholesaler distributing net inventory to travel sellers via API, a representative example of the bedbank model.","context_ko":"Hotelbeds는 순(net) 인벤토리를 API를 통해 여행 판매자에게 분배하는 글로벌 B2B 호텔 베드뱅크/도매업체로, 베드뱅크 모델의 대표적인 예다.","relationship":"example"}],"relationships":[{"type":"related","targetTerm":"Net Rate","targetId":"net-rate"},{"type":"related","targetTerm":"Commissionable Rate","targetId":"commissionable-rate"},{"type":"related","targetTerm":"Allotment","targetId":"allotment"},{"type":"related","targetTerm":"Rate Parity","targetId":"rate-parity"},{"type":"related","targetTerm":"OTA (Online Travel Agency)","targetId":"ota-online-travel-agency"},{"type":"related","targetTerm":"Aggregator","targetId":"aggregator"}],"distinctions":[{"targetTerm":"OTA (Online Travel Agency)","explanation":"A bedbank is a B2B wholesaler selling to other travel sellers; an OTA sells hotel rooms directly to the traveling public.","explanation_ko":"베드뱅크는 다른 여행 판매자에게 판매하는 B2B 도매업체이고, OTA는 여행하는 일반 대중에게 직접 객실을 판매한다.","targetId":"ota-online-travel-agency"},{"targetTerm":"Net Rate","explanation":"A bedbank is the business intermediary; the Net Rate is the wholesale price model bedbanks typically contract and resell on.","explanation_ko":"베드뱅크는 사업적 중개자이고, 순 요금(Net Rate)은 베드뱅크가 일반적으로 계약하고 재판매하는 기반이 되는 도매 가격 모델이다.","targetId":"net-rate"}],"sources":[{"name":"Hotel distribution and wholesaler industry references","org":"","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M5 14l19-7 19 7\"/>\u003cpath d=\"M7 14v14M41 14v14M16 16v12M24 16v12M32 16v12\"/>\u003cpath d=\"M5 32h38v6H5z\"/>\u003cpath d=\"M5 38l-1 4h40l-1-4\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"block-space-agreement","term":"Block Space Agreement","term_ko":"블록 스페이스 협정(좌석 블록 매입 협정)","abbreviation":"BSA","aliases":["Block Space","Block-Space Codeshare","BSA","Blocked Space Agreement"],"category":"air-partner","conceptType":"business-term","status":"active","definition":"A codeshare arrangement in which a marketing carrier purchases a fixed block of seats on an operating carrier's flight to resell under its own code and flight number. The marketing carrier controls and bears commercial risk for that block, in contrast to free-flow/free-sale codeshares that sell from the operating carrier's live inventory.","definition_ko":"판매 항공사가 운항 항공사의 항공편에서 고정된 좌석 블록을 매입하여 자사의 코드와 편명으로 재판매하는 공동운항 형태. 운항 항공사의 실시간 재고에서 판매하는 free-flow/free-sale 공동운항과 달리, 판매 항공사가 해당 블록을 통제하고 그에 대한 상업적 위험을 부담한다.","longDef":"Under a block space agreement the operating carrier sets aside an agreed number of seats which are removed from its own inventory and managed by the marketing carrier until any unsold seats are returned. Common variants are the \"hard block,\" where the marketing carrier commits to and pays for the seats whether or not they sell (highest risk, best pricing), and the \"soft block,\" where unsold seats can be released back to the operating carrier before a deadline. Block space is often used to access markets between carriers that are not in the same alliance, and contrasts with free-sale codeshare where no fixed seat commitment exists.","longDef_ko":"블록 스페이스 협정에서 운항 항공사는 합의된 수의 좌석을 떼어내며, 이 좌석은 자사 재고에서 제외되어 미판매분이 반환될 때까지 판매 항공사가 관리한다. 대표적인 변형으로는 좌석의 판매 여부와 관계없이 판매 항공사가 매입을 약정하고 대금을 지급하는 \"hard block\"(위험이 가장 크지만 가격 조건이 가장 좋음)과, 마감 시한 전에 미판매 좌석을 운항 항공사로 반환할 수 있는 \"soft block\"이 있다. 블록 스페이스는 같은 동맹에 속하지 않은 항공사 간 시장 접근에 자주 사용되며, 고정 좌석 약정이 없는 free-sale 공동운항과 대비된다.","standardBody":"","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Codeshare","targetId":"codeshare"},{"type":"related","targetTerm":"Marketing Carrier","targetId":"marketing-carrier"},{"type":"related","targetTerm":"Operating Carrier","targetId":"operating-carrier"},{"type":"related","targetTerm":"Availability","targetId":"availability"},{"type":"related","targetTerm":"Allotment","targetId":"allotment"}],"distinctions":[{"targetTerm":"Codeshare","explanation":"Block space is one model of codeshare in which seats are pre-purchased as a fixed block; the broader codeshare concept also includes free-flow/free-sale selling from the operating carrier's live inventory.","explanation_ko":"블록 스페이스는 좌석을 고정 블록으로 사전 매입하는 공동운항의 한 모델이며, 더 넓은 공동운항 개념에는 운항 항공사의 실시간 재고에서 판매하는 free-flow/free-sale 방식도 포함된다.","targetId":"codeshare"},{"targetTerm":"Allotment","explanation":"An allotment is a contracted inventory block (common in hotels and tour operators); a block space agreement is the airline analogue for seats on a partner's flight under a codeshare.","explanation_ko":"Allotment는 (호텔·여행사에서 흔한) 계약된 재고 블록이고, 블록 스페이스 협정은 공동운항 하에서 파트너 항공편의 좌석에 대한 항공사판 유사 개념이다.","targetId":"allotment"}],"sources":[{"name":"Airline Codeshares: An Insider's Guide","org":"OAG","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"8\" y=\"10\" width=\"32\" height=\"28\" rx=\"2\"/>\u003cline x1=\"8\" y1=\"24\" x2=\"40\" y2=\"24\"/>\u003cline x1=\"24\" y1=\"10\" x2=\"24\" y2=\"38\"/>\u003crect x=\"10\" y=\"12\" width=\"12\" height=\"10\" fill=\"currentColor\" stroke=\"none\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"board-basis","term":"Board Basis","term_ko":"식사 조건(Board Basis)","abbreviation":"","aliases":["Meal Plan","Board Type","Board"],"category":"hotel-rate","conceptType":"business-term","status":"active","definition":"The meals included in a hotel rate, expressed as a standardized code such as Room Only (RO), Bed & Breakfast (BB), Half Board (HB), Full Board (FB), or All-Inclusive (AI). It is a key inclusion attribute of a rate plan that affects price and guest expectations.","definition_ko":"호텔 요금에 포함되는 식사로, Room Only(RO), Bed & Breakfast(BB), Half Board(HB), Full Board(FB), All-Inclusive(AI) 등 표준화된 코드로 표현된다. 가격과 투숙객의 기대에 영향을 미치는 요금제의 핵심 포함 속성이다.","longDef":"Board basis communicates which meals are part of the rate: RO/EP (Room Only / European Plan) means no meals; BB/CP (Bed & Breakfast / Continental Plan) includes breakfast; HB/MAP (Half Board / Modified American Plan) typically includes breakfast and dinner; FB/AP (Full Board / American Plan) includes three meals; AI (All-Inclusive) adds meals, snacks and usually drinks. Codes and exact inclusions vary by hotel, chain, and distribution channel, so board basis is normally carried as a coded attribute on the rate plan in CRS/GDS and OpenTravel messages.","longDef_ko":"식사 조건은 어떤 식사가 요금에 포함되는지를 전달한다. RO/EP(Room Only / European Plan)는 식사 미포함, BB/CP(Bed & Breakfast / Continental Plan)는 조식 포함, HB/MAP(Half Board / Modified American Plan)는 일반적으로 조식과 석식 포함, FB/AP(Full Board / American Plan)는 세 끼 포함, AI(All-Inclusive)는 식사·간식과 보통 음료까지 추가된다. 코드와 정확한 포함 내역은 호텔, 체인, 유통 채널에 따라 다르므로, 식사 조건은 보통 CRS/GDS 및 OpenTravel 메시지에서 요금제의 코드화된 속성으로 전달된다.","standardBody":"OpenTravel Alliance","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Rate Plan","targetId":"rate-plan"},{"type":"related","targetTerm":"Room Type","targetId":"room-type"}],"distinctions":[{"targetTerm":"Rate Plan","explanation":"Board basis is one inclusion attribute carried within a rate plan; a rate plan also defines price, cancellation, and other conditions beyond meals.","explanation_ko":"식사 조건은 요금제에 포함된 하나의 포함 속성이다. 요금제는 식사 외에도 가격, 취소 규정 등 여러 조건을 함께 정의한다.","targetId":"rate-plan"}],"sources":[{"name":"OpenTravel Specification (Hotel meal plan / meal codes)","org":"OpenTravel Alliance","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003ccircle cx=\"24\" cy=\"26\" r=\"13\"/>\u003ccircle cx=\"24\" cy=\"26\" r=\"6\"/>\u003cline x1=\"9\" y1=\"10\" x2=\"9\" y2=\"20\"/>\u003cline x1=\"6\" y1=\"10\" x2=\"6\" y2=\"15\"/>\u003cline x1=\"12\" y1=\"10\" x2=\"12\" y2=\"15\"/>\u003cpath d=\"M9 15v-5\"/>\u003cpath d=\"M40 10c-2 0-3 3-3 6s1 4 3 4v10\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"booking-engine","term":"Booking Engine","abbreviation":"IBE","aliases":["Internet Booking Engine","Online Booking Engine","OBE","Hotel Booking Engine"],"category":"hotel-dist","conceptType":"business-term","status":"active","definition":"A booking engine (internet booking engine, IBE) is the software on a hotel's website or app that lets a guest check real-time availability, select a room type and rate, and complete a reservation with payment without leaving the hotel's own channel. It is the transaction processor of the direct channel, drawing live availability and rates from the CRS or PMS.","longDef":"The booking engine sits between the guest-facing interface and back-end inventory. A search (dates, occupancy, room type) is sent to the engine, which requests real-time availability and pricing from the CRS/PMS, presents bookable room types and rate plans, and on confirmation writes the reservation back and captures payment (often via an integrated payment gateway and guarantee handling). It is the primary tool for driving direct bookings and reducing dependence on high-commission OTAs, and it typically integrates with the channel manager, payment processing, and loyalty/CRM systems. While 'IBE' is used broadly across travel (flights, packages), in the hotel context it denotes the property's or chain's own direct-sale engine.","standardBody":"","term_ko":"부킹 엔진 (Booking Engine / IBE)","definition_ko":"부킹 엔진(internet booking engine, IBE)은 호텔 웹사이트나 앱에 탑재되어 투숙객이 호텔 자체 채널을 떠나지 않고 실시간 가용성을 확인하고 객실 유형·요금을 선택해 결제까지 완료할 수 있게 하는 소프트웨어다. 직접 채널의 거래 처리기 역할을 하며, CRS 또는 PMS에서 실시간 가용성·요금을 가져온다.","longDef_ko":"부킹 엔진은 고객 대면 인터페이스와 백엔드 재고 사이에 위치한다. 검색(날짜, 인원, 객실 유형)이 엔진으로 전달되면 엔진은 CRS/PMS에서 실시간 가용성·가격을 요청하고, 예약 가능한 객실 유형·요금 플랜을 보여주며, 확정 시 예약을 다시 기록하고 결제를 처리한다(흔히 통합 결제 게이트웨이와 guarantee 처리 경유). 직접 예약을 늘리고 고수수료 OTA 의존을 줄이는 핵심 도구이며, 일반적으로 채널 매니저, 결제 처리, 로열티/CRM 시스템과 연동된다. 'IBE'는 여행 전반(항공, 패키지)에서 폭넓게 쓰이지만, 호텔 맥락에서는 해당 호텔이나 체인의 직접 판매 엔진을 가리킨다.","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Direct Booking","targetId":"direct-booking"},{"type":"related","targetTerm":"CRS","targetId":"crs"},{"type":"related","targetTerm":"PMS","targetId":"pms"},{"type":"related","targetTerm":"Channel Manager","targetId":"channel-manager"},{"type":"related","targetTerm":"Distribution Cost","targetId":"distribution-cost"},{"type":"related","targetTerm":"Merchant of Record","targetId":"merchant-of-record"}],"distinctions":[{"targetTerm":"CRS","explanation":"The CRS is the central system that holds and distributes a hotel's inventory and rates across all channels; the booking engine is the guest-facing front end of the direct channel that queries the CRS and creates direct reservations.","explanation_ko":"CRS는 호텔의 재고·요금을 보유하고 전 채널에 유통하는 중앙 시스템이고, 부킹 엔진은 CRS를 조회하여 직접 예약을 생성하는 직접 채널의 고객 대면 프런트엔드다.","targetId":"crs"},{"targetTerm":"Channel Manager","explanation":"A channel manager distributes ARI outbound to many third-party channels; the booking engine sells inbound on the hotel's own direct channel. They are complementary, not the same.","explanation_ko":"채널 매니저는 ARI를 다수의 제3자 채널로 외부 유통하고, 부킹 엔진은 호텔 자체 직접 채널에서 판매를 받아들인다. 둘은 상호 보완적이며 동일하지 않다.","targetId":"channel-manager"}],"sources":[{"org":"AltexSoft","name":"Booking engine — Glossary","version":"","section":"","url":"https://www.altexsoft.com/glossary/booking-engine/"},{"org":"RateGain","name":"Internet Booking Engine for Hotels: A Direct Booking Guide","version":"","section":"","url":"https://rategain.com/blog/internet-booking-engines-for-hotels/"}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"7\" y=\"9\" width=\"34\" height=\"26\" rx=\"2\"/>\u003cline x1=\"7\" y1=\"16\" x2=\"41\" y2=\"16\"/>\u003cline x1=\"18\" y1=\"39\" x2=\"30\" y2=\"39\"/>\u003cline x1=\"24\" y1=\"35\" x2=\"24\" y2=\"39\"/>\u003crect x=\"13\" y=\"21\" width=\"9\" height=\"8\" rx=\"1\"/>\u003cpath d=\"M27 23h8M27 27h6\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"booking-status-code","term":"Booking Status Code","abbreviation":"","aliases":["Segment Status Code","Status Code","Action Code","Advice Code"],"category":"air-ops","conceptType":"code","status":"active","definition":"A Booking Status Code is a standardized two-letter code attached to a PNR air segment that indicates the segment's reservation state or the action/advice exchanged between systems — for example HK (holds confirmed), HL (waitlisted), or UN (unable, flight not operating). The codes drive how segments are sold, confirmed, changed, and cancelled across GDS and airline hosts.","longDef":"Status codes split into action/request codes used when selling or messaging (e.g., NN need, SS sold, HN have requested) and advice/reply or holding codes returned or held in the PNR (e.g., HK confirmed, HL waitlisted, KK confirming, UC unable, UN flight not operating, HX cancelled by carrier, TK/TL schedule-change advices). Inactive codes such as UN, UC, HX and NO are moved to PNR history. The codes are an interline teletype/EDIFACT convention so that any carrier or GDS interprets a segment's state identically; agents must action certain codes (e.g., respond to schedule-change codes) before ticketing.","standardBody":"","term_ko":"Booking Status Code (예약 status 코드 / segment status 코드)","definition_ko":"Booking Status Code는 PNR 항공 segment에 붙는 표준 2자리 코드로, 해당 segment의 예약 상태 또는 시스템 간 교환되는 action/advice를 나타낸다. 예: HK(확약 보유), HL(waitlist), UN(불가, 미운항). 이 코드들은 GDS와 항공사 호스트 전반에서 segment의 판매·확약·변경·취소 방식을 좌우한다.","longDef_ko":"status 코드는 판매·메시징 시 쓰는 action/request 코드(예: NN need, SS sold, HN have requested)와 PNR에 반환·보유되는 advice/reply 또는 holding 코드(예: HK 확약, HL waitlist, KK confirming, UC 불가, UN 미운항, HX 항공사 취소, TK/TL 스케줄 변경 advice)로 나뉜다. UN, UC, HX, NO 같은 비활성 코드는 PNR history로 이동한다. 이 코드는 interline teletype/EDIFACT 관례로, 어떤 항공사·GDS든 segment 상태를 동일하게 해석하게 한다. 발권 전 특정 코드(예: 스케줄 변경 코드)에는 agent가 반드시 조치해야 한다.","providerTerms":[{"provider":"GDS (industry)","term":"HK / HL / SS / UC / UN / HX / KK","context":"Common segment status codes: confirmed, waitlisted, sold, unable, not operating, carrier-cancelled, confirming.","context_ko":"일반 segment status 코드: 확약, waitlist, 판매됨, 불가, 미운항, 항공사 취소, confirming.","relationship":"same"},{"provider":"Travelport","term":"PNR Status Codes","context":"Universal API documented air status/advice codes for segment state.","context_ko":"segment 상태를 나타내는 Universal API의 항공 status/advice 코드.","relationship":"same"}],"relationships":[{"type":"related","targetTerm":"Segment","targetId":"segment"},{"type":"related","targetTerm":"PNR","targetId":"pnr"},{"type":"related","targetTerm":"Waitlist","targetId":"waitlist"},{"type":"related","targetTerm":"Schedule Change","targetId":"schedule-change"},{"type":"related","targetTerm":"Availability","targetId":"availability"}],"distinctions":[{"targetTerm":"RBD","explanation":"An RBD (booking/class code) is a single-letter inventory class that prices and allocates the fare; a Booking Status Code is a two-letter code describing the reservation state of a segment regardless of which RBD it is booked in.","explanation_ko":"RBD(예약 클래스 코드)는 운임을 매기고 배정하는 1자리 inventory 클래스이고, Booking Status Code는 어떤 RBD로 예약됐든 segment의 예약 상태를 나타내는 2자리 코드다.","targetId":"rbd"}],"sources":[{"org":"IATA","name":"Passenger Services Conference Resolutions Manual (PSCRM) / AIRIMP","version":"","section":"","url":""},{"org":"Travelport","name":"Universal API — Air Status Codes","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"7\" y=\"13\" width=\"34\" height=\"22\" rx=\"3\"/>\u003cpath d=\"M13 24h5l3 5 4-10 3 5h7\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"bsp","term":"BSP","abbreviation":"BSP","aliases":["Billing and Settlement Plan","Bank Settlement Plan"],"category":"pay","conceptType":"standard-term","status":"active","definition":"The Billing and Settlement Plan is an IATA-administered system that simplifies selling, reporting, and remittance between IATA-accredited travel agents and participating airlines in a given market. It consolidates each agent's sales into a single periodic statement and nets the funds owed to airlines through a central settlement process.","term_ko":"정산결제제도(BSP)","definition_ko":"BSP(Billing and Settlement Plan)는 특정 시장에서 IATA 인증 여행사와 참여 항공사 간의 판매, 보고, 송금 업무를 간소화하는 IATA 운영 시스템이다. 각 여행사의 판매 내역을 하나의 정기 명세서로 통합하고, 중앙 정산 절차를 통해 항공사에 지급할 금액을 차감 정산한다.","longDef":"Operated under IATA's Passenger Agency Programme (NewGen ISS), the BSP replaces individual agent-airline billing with a neutral clearing mechanism. Agents report ticket and EMD sales (cash, card, IATA EasyPay) and IATA bills, collects, and remits the net amount to each validating carrier on the established remittance/settlement calendar. BSP operates in most countries; the United States is served by ARC instead.","longDef_ko":"IATA의 여객 대리점 프로그램(NewGen ISS) 하에서 운영되는 BSP는 개별 여행사-항공사 간 청구를 중립적 청산 메커니즘으로 대체한다. 여행사는 항공권 및 EMD 판매(현금, 카드, IATA EasyPay)를 보고하고, IATA는 정해진 송금/정산 일정에 따라 각 발권 항공사(validating carrier)에 대해 청구, 수금, 차감 정산 금액 송금을 수행한다. BSP는 대부분의 국가에서 운영되며, 미국은 대신 ARC가 담당한다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"contrasts","targetTerm":"ARC","targetId":"arc"},{"type":"related","targetTerm":"IATA EasyPay","targetId":"iata-easypay"},{"type":"related","targetTerm":"Validating Carrier","targetId":"validating-carrier"},{"type":"related","targetTerm":"E-ticket","targetId":"e-ticket"},{"type":"related","targetTerm":"EMD","targetId":"emd"}],"distinctions":[{"targetTerm":"ARC","explanation":"ARC is the equivalent agent-airline settlement system for the United States, while BSP covers most other markets worldwide.","explanation_ko":"ARC는 미국용 여행사-항공사 정산 시스템에 해당하며, BSP는 그 외 전 세계 대부분의 시장을 담당한다.","targetId":"arc"},{"targetTerm":"IATA Clearing House","explanation":"BSP settles agent-to-airline sales; the IATA Clearing House settles airline-to-airline (interline) accounts.","explanation_ko":"BSP는 여행사-항공사 간 판매를 정산하고, IATA Clearing House는 항공사 간(인터라인) 계정을 정산한다.","targetId":"iata-clearing-house"}],"sources":[{"name":"Billing and Settlement Plan (BSP)","org":"IATA","version":"","section":"","url":"https://www.iata.org/en/services/finance/bsp/"},{"name":"BSP Manual for Agents (NewGen ISS Edition)","org":"IATA","version":"","section":"","url":"https://www.iata.org/contentassets/bfacf03f8e914960898e262df2777352/bsp-manual-for-agents.pdf"}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003ccircle cx=\"24\" cy=\"24\" r=\"6\"/>\u003ccircle cx=\"9\" cy=\"10\" r=\"3\"/>\u003ccircle cx=\"39\" cy=\"10\" r=\"3\"/>\u003ccircle cx=\"9\" cy=\"38\" r=\"3\"/>\u003ccircle cx=\"39\" cy=\"38\" r=\"3\"/>\u003cline x1=\"11\" y1=\"12\" x2=\"19\" y2=\"20\"/>\u003cline x1=\"37\" y1=\"12\" x2=\"29\" y2=\"20\"/>\u003cline x1=\"11\" y1=\"36\" x2=\"19\" y2=\"28\"/>\u003cline x1=\"37\" y1=\"36\" x2=\"29\" y2=\"28\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"cancellation-policy","term":"Cancellation Policy","term_ko":"취소 정책","abbreviation":"","aliases":["Cancel Policy","Cancellation Terms","Cancellation Penalty Policy"],"category":"hotel-dist","conceptType":"business-term","status":"active","definition":"A cancellation policy defines the conditions, deadlines, and penalties that apply when a guest cancels or modifies a hotel reservation, such as a free-cancellation cutoff time/date and the fee (for example, the first night or the full stay) charged for a late or no-show cancellation. It is attached to a rate plan and disclosed at booking.","definition_ko":"취소 정책은 고객이 호텔 예약을 취소하거나 변경할 때 적용되는 조건, 기한, 위약금을 정의한다. 예를 들어 무료 취소 마감 시각/날짜와, 지연 취소나 노쇼(no-show) 시 부과되는 요금(예: 첫날 숙박료 또는 전체 숙박료) 등이 이에 해당한다. 취소 정책은 요금제에 연결되며 예약 시 고지된다.","longDef":"Cancellation policies are typically expressed as a deadline relative to arrival (e.g., free until 24/48/72 hours before check-in) plus a penalty amount or formula if cancelled after the deadline or in non-refundable rates. In distribution standards they are carried as structured policy/penalty elements alongside the rate so channels can display and enforce them. A cancellation policy governs what happens when a booking is cancelled, which is distinct from a guarantee policy that governs how the booking is secured/held.","longDef_ko":"취소 정책은 일반적으로 도착 기준 상대적 기한(예: 체크인 24/48/72시간 전까지 무료)과, 기한 이후 취소하거나 환불 불가 요금일 경우의 위약금 금액 또는 산정식으로 표현된다. 분배 표준에서는 채널이 이를 표시하고 시행할 수 있도록 요금과 함께 구조화된 정책/위약금 요소로 전달된다. 취소 정책은 예약이 취소될 때 어떻게 되는지를 규율하며, 이는 예약을 어떻게 확보·보장하는지를 규율하는 개런티 정책(guarantee policy)과 구별된다.","standardBody":"OpenTravel","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Guarantee Policy","targetId":"guarantee-policy"},{"type":"related","targetTerm":"Rate Plan","targetId":"rate-plan"},{"type":"related","targetTerm":"VCC","targetId":"vcc"},{"type":"related","targetTerm":"Chargeback","targetId":"chargeback"}],"distinctions":[{"targetTerm":"Guarantee Policy","explanation":"A cancellation policy sets the penalties/deadlines for cancelling; a guarantee policy sets how the reservation is secured and held (e.g., credit card or deposit).","explanation_ko":"취소 정책은 취소에 대한 위약금/기한을 정하고, 개런티 정책은 예약을 어떻게 확보하고 보장하는지를(예: 신용카드 또는 보증금) 정한다.","targetId":"guarantee-policy"}],"sources":[{"name":"OpenTravel Specification","org":"OpenTravel Alliance","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M12 4h16l8 8v14\"/>\u003cpath d=\"M12 4a2 2 0 00-2 2v36a2 2 0 002 2h12\"/>\u003cpath d=\"M28 4v8h8\"/>\u003cpath d=\"M16 18h12M16 24h8\"/>\u003ccircle cx=\"34\" cy=\"35\" r=\"8\"/>\u003cpath d=\"M31 32l6 6M37 32l-6 6\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"chain-code","term":"Chain Code","term_ko":"체인 코드","abbreviation":"","aliases":["Hotel Chain Code","GDS Chain Code","Two-Letter Chain Code"],"category":"codes","conceptType":"code","status":"active","definition":"A two-letter code used in GDSs and hotel distribution to identify the hotel chain, brand, or representation/distribution company to which a property belongs (e.g., MC for Marriott Hotels, HI for Hilton). A property is identified by its chain code plus a property/hotel ID, and the exact codes can vary by GDS.","definition_ko":"GDS 및 호텔 유통에서 해당 숙소가 속한 호텔 체인, 브랜드, 또는 대리/유통 회사를 식별하는 데 사용되는 2자리 코드(예: 메리어트 호텔은 MC, 힐튼은 HI). 숙소는 체인 코드와 숙소/호텔 ID의 조합으로 식별되며, 정확한 코드는 GDS마다 다를 수 있다.","longDef":"Chain codes group hotels under a common brand, parent company, or third-party representation/distribution provider (such as a bedbank or rep firm), and they drive how rates and inventory are loaded and surfaced in the GDS. Independent hotels are often distributed under the chain code of a representation company rather than a true brand. The chain code combined with the GDS property code uniquely addresses a hotel for shopping and booking. Specific two-letter codes are not globally standardized and may differ between GDSs.","longDef_ko":"체인 코드는 공통 브랜드, 모기업, 또는 제3자 대리/유통 사업자(베드뱅크나 대리 회사 등) 아래로 호텔을 묶으며, 이를 통해 요금과 재고가 GDS에 등록되고 노출되는 방식이 결정된다. 독립 호텔은 실제 브랜드가 아니라 대리 회사의 체인 코드로 유통되는 경우가 많다. 체인 코드와 GDS 숙소 코드를 결합하면 조회 및 예약을 위해 호텔을 고유하게 지정할 수 있다. 구체적인 2자리 코드는 전 세계적으로 표준화되어 있지 않으며 GDS마다 다를 수 있다.","standardBody":"","providerTerms":[],"relationships":[{"type":"related","targetTerm":"GDS","targetId":"gds"},{"type":"related","targetTerm":"CRS","targetId":"crs"},{"type":"related","targetTerm":"Room Type","targetId":"room-type"},{"type":"related","targetTerm":"Rate Plan","targetId":"rate-plan"}],"distinctions":[{"targetTerm":"Airline Designator","explanation":"A chain code (2 letters) identifies a hotel chain/brand in distribution; an airline designator (2 characters) identifies an air carrier — different domains despite both being short codes.","explanation_ko":"체인 코드(2자리)는 유통에서 호텔 체인/브랜드를 식별하고, 항공사 지정 코드(2자리)는 항공 운송 사업자를 식별한다. 둘 다 짧은 코드이지만 서로 다른 영역에 속한다.","targetId":"airline-designator"}],"sources":[{"name":"20 GDS Words and Meanings","org":"OpenHotel","version":"","section":"","url":"https://openhotel.com/blog/news-and-articles-for-hotels/post.cfm/post/6034/20-gds-words-and-meanings"},{"name":"GDS Chain Codes","org":"Marriott","version":"","section":"","url":"https://www.travelagents.marriott.com/travelagents/GDSResInfo.mi"}],"lastReviewed":"2026-06-15","icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"6\" y=\"18\" width=\"16\" height=\"12\" rx=\"6\"/>\u003crect x=\"26\" y=\"18\" width=\"16\" height=\"12\" rx=\"6\"/>\u003cpath d=\"M18 24h12\"/>\u003c/svg>"},{"id":"channel-manager","term":"Channel Manager","term_ko":"채널 매니저","abbreviation":"","aliases":["Channel Management System","Channel Management Software"],"category":"hotel-dist","conceptType":"provider-term","status":"active","definition":"A Channel Manager is a software service that synchronizes a hotel's availability, rates, and inventory (ARI) across multiple online distribution channels from a single point, and collects reservations back from those channels. Its core purpose is to keep inventory consistent and reduce overbooking and rate disparity across OTAs, the brand site, GDS, and metasearch.","definition_ko":"채널 매니저는 호텔의 가용성, 요금, 인벤토리(ARI)를 단일 지점에서 여러 온라인 분배 채널에 걸쳐 동기화하고 해당 채널로부터 예약을 다시 수집하는 소프트웨어 서비스다. 핵심 목적은 인벤토리를 일관되게 유지하고 OTA, 브랜드 사이트, GDS, 메타서치 전반의 오버부킹과 요금 불일치(rate disparity)를 줄이는 것이다.","longDef":"The Channel Manager is the connectivity/middleware layer between a hotel's inventory source (PMS or CRS) and many demand channels. It pushes ARI updates outward and pulls bookings inward, typically using two-way (pooled) inventory so a sale on one channel decrements availability everywhere. It is closely associated with maintaining Rate Parity and is sometimes bundled inside a CRS rather than sold standalone.","longDef_ko":"채널 매니저는 호텔의 인벤토리 소스(PMS 또는 CRS)와 다수의 수요 채널 사이를 잇는 연결/미들웨어 계층이다. ARI 업데이트를 외부로 푸시하고 예약을 내부로 끌어오며, 일반적으로 양방향(풀링) 인벤토리를 사용하여 한 채널에서의 판매가 모든 곳의 가용성을 차감하도록 한다. 요금 패리티(Rate Parity) 유지와 밀접하게 연관되며, 독립 제품으로 판매되기보다 CRS 내부에 번들로 포함되는 경우도 있다.","standardBody":"","providerTerms":[],"relationships":[{"type":"related","targetTerm":"GDS","targetId":"gds"},{"type":"related","targetTerm":"CRS","targetId":"crs"},{"type":"related","targetTerm":"PMS","targetId":"pms"},{"type":"related","targetTerm":"ARI","targetId":"ari"},{"type":"related","targetTerm":"Rate Parity","targetId":"rate-parity"},{"type":"related","targetTerm":"OTA (Online Travel Agency)","targetId":"ota-online-travel-agency"},{"type":"related","targetTerm":"Allotment","targetId":"allotment"}],"distinctions":[{"targetTerm":"CRS","explanation":"A Channel Manager is the distribution/connectivity layer that syncs ARI to channels; a CRS is the central inventory and reservation repository (which may include channel management).","explanation_ko":"채널 매니저는 ARI를 채널로 동기화하는 분배/연결 계층이고, CRS는 중앙 인벤토리 및 예약 저장소다(채널 관리 기능을 포함할 수도 있다).","targetId":"crs"},{"targetTerm":"ARI","explanation":"ARI is the data (availability, rates, inventory) being synchronized; the Channel Manager is the tool that synchronizes it.","explanation_ko":"ARI는 동기화되는 데이터(가용성, 요금, 인벤토리)이고, 채널 매니저는 그것을 동기화하는 도구다.","targetId":"ari"}],"sources":[{"name":"OpenTravel Specification","org":"OpenTravel Alliance","version":"","section":"","url":""},{"name":"HTNG interface specifications","org":"HTNG","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"18\" y=\"18\" width=\"12\" height=\"12\" rx=\"2\"/>\u003crect x=\"4\" y=\"6\" width=\"10\" height=\"7\" rx=\"1.5\"/>\u003crect x=\"34\" y=\"6\" width=\"10\" height=\"7\" rx=\"1.5\"/>\u003crect x=\"4\" y=\"35\" width=\"10\" height=\"7\" rx=\"1.5\"/>\u003crect x=\"34\" y=\"35\" width=\"10\" height=\"7\" rx=\"1.5\"/>\u003cpath d=\"M18 21l-7-5M30 21l7-5M18 27l-7 5M30 27l7 5\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"chargeback","term":"Chargeback","abbreviation":"","aliases":["Payment Dispute","Card Dispute"],"category":"pay","conceptType":"process","status":"active","definition":"A chargeback is a card-network-mandated reversal of a card transaction, initiated when a cardholder disputes a charge with their issuing bank (for reasons such as fraud, non-delivery, or service not as described). The disputed funds are debited from the merchant (Merchant of Record), which can contest the dispute through representment.","term_ko":"차지백(Chargeback)","definition_ko":"차지백(chargeback)은 카드 소지자가 발급 은행에 청구 건을 이의 제기할 때(사기, 미인도, 서비스가 설명과 다름 등의 사유) 개시되는, 카드망이 의무화한 카드 거래 취소다. 이의 제기된 자금은 가맹점(Merchant of Record)에서 차감되며, 가맹점은 재청구(representment)를 통해 이의를 다툴 수 있다.","longDef":"Chargebacks follow card scheme rules (e.g. Visa, Mastercard) with defined reason codes, time limits, and dispute stages. The Merchant of Record bears the financial exposure, so the distribution model determines who absorbs chargeback risk: the supplier in the agency model, the intermediary in the merchant model. Cardholder authentication via 3-D Secure can shift fraud-related liability away from the merchant. IATA EasyPay is promoted partly because it carries no chargeback risk for airlines.","longDef_ko":"차지백은 정해진 사유 코드, 기한, 분쟁 단계를 갖춘 카드 스킴 규칙(예: Visa, Mastercard)을 따른다. Merchant of Record가 재무적 노출을 부담하므로, 누가 차지백 위험을 떠안는지는 유통 모델이 결정한다. 에이전시 모델에서는 공급업체가, 머천트 모델에서는 중개업체가 부담한다. 3-D Secure를 통한 카드 소지자 인증은 사기 관련 책임을 가맹점에서 이전시킬 수 있다. IATA EasyPay가 일부 권장되는 이유 중 하나는 항공사에 차지백 위험이 없기 때문이다.","standardBody":"","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Merchant of Record","targetId":"merchant-of-record"},{"type":"related","targetTerm":"3-D Secure","targetId":"3-d-secure"},{"type":"related","targetTerm":"Refund","targetId":"refund"},{"type":"related","targetTerm":"VCC","targetId":"vcc"}],"distinctions":[{"targetTerm":"Refund","explanation":"A refund is voluntarily issued by the merchant, whereas a chargeback is a forced reversal initiated by the cardholder's issuer through the card network.","explanation_ko":"환불은 가맹점이 자발적으로 처리하는 반면, 차지백은 카드 소지자의 발급사가 카드망을 통해 개시하는 강제적 거래 취소다.","targetId":"refund"},{"targetTerm":"3-D Secure","explanation":"A chargeback is a post-transaction dispute; 3-D Secure is pre-transaction authentication that can reduce fraud chargeback liability.","explanation_ko":"차지백은 거래 후 분쟁이고, 3-D Secure는 사기성 차지백 책임을 줄일 수 있는 거래 전 인증이다.","targetId":"3-d-secure"}],"sources":[{"name":"EMV 3-D Secure","org":"EMVCo","version":"","section":"","url":"https://www.emvco.com/emv-technologies/3-d-secure/"},{"name":"Merchant of Record in Travel: OTA's Guide to Owning the Payment Flow","org":"AltexSoft","version":"","section":"","url":"https://www.altexsoft.com/blog/merchant-of-record-in-travel/"}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"6\" y=\"14\" width=\"36\" height=\"24\" rx=\"3\"/>\u003cline x1=\"6\" y1=\"21\" x2=\"42\" y2=\"21\"/>\u003cpath d=\"M30 31a6 6 0 1 0-2-5\"/>\u003cpath d=\"M26 24l2 3 3-2\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"city-code","term":"City Code","term_ko":"도시 코드","abbreviation":"","aliases":["IATA City Code","Metropolitan Area Code","Multi-Airport City Code"],"category":"codes","conceptType":"code","status":"active","definition":"A 3-letter IATA code identifying a city or metropolitan area served by air transport (e.g., NYC, LON, TYO). When a city has multiple airports, the city code aggregates them so a search on the city code returns options across all served airports.","definition_ko":"항공 운송이 이루어지는 도시 또는 대도시권을 식별하는 3자리 IATA 코드(예: NYC, LON, TYO). 한 도시에 여러 공항이 있는 경우 도시 코드가 이를 통합하므로, 도시 코드로 검색하면 운항하는 모든 공항의 옵션이 함께 조회된다.","longDef":"City codes are part of the IATA location coding system and are sometimes identical to the airport code when a city has a single primary airport (e.g., a code can serve as both city and airport identifier). For multi-airport cities the city code is distinct (e.g., LON for London covers LHR, LGW, STN, LCY, LTN, SEN). In schedule and shopping systems, an origin/destination expressed as a city code expands to all underlying airports.","longDef_ko":"도시 코드는 IATA 위치 코드 체계의 일부이며, 도시에 주요 공항이 하나뿐인 경우 공항 코드와 동일할 수 있다(즉, 하나의 코드가 도시 식별자와 공항 식별자 역할을 동시에 할 수 있다). 다공항 도시의 경우 도시 코드는 별개로 존재한다(예: 런던의 LON은 LHR, LGW, STN, LCY, LTN, SEN을 포괄한다). 스케줄 및 조회(shopping) 시스템에서 도시 코드로 표현된 출발지/도착지는 그에 속한 모든 공항으로 확장된다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"narrower","targetTerm":"IATA Code","targetId":"iata-code"},{"type":"related","targetTerm":"Airport Code","targetId":"airport-code"},{"type":"related","targetTerm":"Origin & Destination","targetId":"origin-destination"}],"distinctions":[{"targetTerm":"Airport Code","explanation":"A city code denotes a metropolitan area (possibly several airports); an airport code denotes one specific airport.","explanation_ko":"도시 코드는 (여러 공항을 포함할 수 있는) 대도시권을 나타내고, 공항 코드는 하나의 특정 공항을 나타낸다.","targetId":"airport-code"}],"sources":[{"name":"IATA Airline and Airport Code Search","org":"IATA","version":"","section":"","url":"https://www.iata.org/en/publications/directories/code-search/"}],"lastReviewed":"2026-06-15","icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M6 30h8V14l5-4 5 4v16\"/>\u003cpath d=\"M24 30V20h12v10\"/>\u003cpath d=\"M9 22h2M18 18h2M30 24h2\"/>\u003crect x=\"6\" y=\"34\" width=\"36\" height=\"8\" rx=\"2\"/>\u003cpath d=\"M11 38h2M16 38h2M21 38h2\"/>\u003c/svg>"},{"id":"class-code","term":"Class Code","term_ko":"클래스 코드(예약 클래스 코드)","abbreviation":"","aliases":["Booking Class","Booking Class Code","Class of Service","Class of Booking"],"category":"codes","conceptType":"code","status":"active","definition":"The single alphabetic character that identifies the booking class (fare bucket) in which a flight is sold and held, e.g., F, J, Y, B, M, Q. It is the code recorded on the segment, ticket, and boarding pass and is the operational/display form of the reservation booking designator (RBD).","definition_ko":"항공편이 판매·예약되는 예약 클래스(운임 버킷)를 식별하는 단일 알파벳 문자(예: F, J, Y, B, M, Q). 세그먼트·항공권·탑승권에 기록되는 코드이며, 예약 부킹 지정자(RBD)의 운영·표시 형태이다.","longDef":"Class codes are not standardized across carriers: the same letter can mean different cabins or fare levels at different airlines, and each airline maps its class codes to a cabin (First/Business/Premium Economy/Economy) and to fare basis codes. Y, J/C, and F are common conventions for full-fare economy, business, and first respectively. In availability and pricing the class code is the bucket the airline opens or closes by demand; the value booked normally matches the leading letter of the fare basis code. It is the same concept as the RBD, viewed from the booked/ticketed document.","longDef_ko":"클래스 코드는 항공사 간에 표준화되어 있지 않다. 같은 문자가 항공사마다 다른 객실이나 운임 수준을 의미할 수 있으며, 각 항공사는 자사의 클래스 코드를 객실(First/Business/Premium Economy/Economy)과 운임 기준 코드(fare basis code)에 매핑한다. Y, J/C, F는 각각 정규 운임 이코노미·비즈니스·퍼스트의 흔한 관례이다. 좌석 가용성(availability)과 가격 산정에서 클래스 코드는 항공사가 수요에 따라 열고 닫는 버킷이며, 예약된 값은 보통 운임 기준 코드의 첫 글자와 일치한다. 예약·발권된 서류 관점에서 본 RBD와 동일한 개념이다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"sameAs","targetTerm":"RBD","targetId":"rbd"},{"type":"related","targetTerm":"Fare Basis Code","targetId":"fare-basis-code"},{"type":"related","targetTerm":"Availability","targetId":"availability"},{"type":"related","targetTerm":"Fare Family","targetId":"fare-family"},{"type":"related","targetTerm":"Segment","targetId":"segment"}],"distinctions":[{"targetTerm":"RBD","explanation":"The class code is the same single-letter value as the RBD; 'RBD' (reservation booking designator) is the formal/system term, while 'class code' or 'booking class' is the everyday term seen on segments, tickets, and displays.","explanation_ko":"클래스 코드는 RBD와 동일한 단일 문자 값이다. 'RBD'(reservation booking designator)는 공식·시스템 용어이고, '클래스 코드' 또는 '부킹 클래스'는 세그먼트·항공권·표시 화면에서 보이는 일상 용어이다.","targetId":"rbd"},{"targetTerm":"Fare Basis Code","explanation":"The class code is one letter (the booking bucket); a fare basis code is a longer alphanumeric string whose first character is usually the class code and which encodes the full fare and its conditions.","explanation_ko":"클래스 코드는 한 글자(예약 버킷)이고, 운임 기준 코드는 첫 글자가 보통 클래스 코드이며 전체 운임과 그 조건을 인코딩한 더 긴 영숫자 문자열이다.","targetId":"fare-basis-code"}],"sources":[{"org":"IATA","name":"Reservations Booking Designators (RBD) standard","version":"","section":"","url":""},{"org":"Travelport","name":"Booking Class & Cabin (RBD)","version":"","section":"","url":"https://support.travelport.com/webhelp/faresandpricingagencyhelp/Content/Booking%20Class%20RBD%20(Record%206).htm"}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"8\" y=\"10\" width=\"32\" height=\"28\" rx=\"3\"/>\u003cpath d=\"M18 30l4-12 4 12M19.3 26h5.4\"/>\u003cpath d=\"M30 18h3a3 3 0 010 6h-3v6\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"class-of-service","term":"Class of Service","abbreviation":"CoS","aliases":["Service Class","Booking Class","Class of Travel"],"category":"air-shop","conceptType":"standard-term","status":"active","definition":"Class of Service is the single-letter code identifying the booking inventory class (Reservation Booking Designator) into which a seat is sold, indicating the fare/inventory bucket within a cabin rather than the physical cabin itself. It determines fare eligibility, mileage earning, upgrade, and change/refund conditions associated with the booking.","longDef":"In airline distribution the term Class of Service is commonly used interchangeably with booking class or RBD: each cabin (Economy, Premium Economy, Business, First) contains multiple lettered classes (e.g., Y, B, M, Q in Economy) that share the same physical seat but carry different fares and conditions. The class of service booked is recorded at the segment level of a PNR and drives downstream pricing, ticketing, and revenue accounting. Usage is overloaded in the industry: some contexts use Class of Service to mean the marketing cabin (Economy vs. Business), so the term is best disambiguated as cabin (physical product) versus booking class/RBD (inventory bucket).","standardBody":"IATA","term_ko":"서비스 등급 (Class of Service)","definition_ko":"Class of Service는 좌석이 판매되는 예약 인벤토리 클래스(RBD, 예약 부킹 지정자)를 식별하는 한 글자 코드로, 물리적 객실 자체가 아니라 객실 내의 운임/인벤토리 버킷을 나타낸다. 운임 적용 가능 여부, 마일리지 적립, 업그레이드, 변경/환불 조건을 결정한다.","longDef_ko":"항공 유통에서 Class of Service는 흔히 booking class 또는 RBD와 혼용된다. 각 객실(Economy, Premium Economy, Business, First)에는 동일한 물리적 좌석을 공유하지만 운임과 조건이 다른 여러 문자 클래스(예: Economy의 Y, B, M, Q)가 존재한다. 예약된 class of service는 PNR의 segment 단위에 기록되며 이후의 pricing, 발권, 수입 정산을 좌우한다. 업계에서 의미가 중첩되어 사용되는데, 일부 맥락에서는 Class of Service를 마케팅 객실(Economy 대 Business)을 뜻하는 데 쓰므로, 객실(물리적 상품) 대 booking class/RBD(인벤토리 버킷)로 구분하는 것이 명확하다.","providerTerms":[{"provider":"Travelport","term":"Booking Class / RBD (Record 6)","context":"GDS maps each fare to one or more booking-class letters via Record 6 RBD data.","context_ko":"GDS는 Record 6 RBD 데이터를 통해 각 운임을 하나 이상의 booking class 문자에 매핑한다.","relationship":"same"}],"relationships":[{"type":"related","targetTerm":"RBD","targetId":"rbd"},{"type":"related","targetTerm":"Availability","targetId":"availability"},{"type":"related","targetTerm":"Fare Basis Code","targetId":"fare-basis-code"},{"type":"related","targetTerm":"Segment","targetId":"segment"}],"distinctions":[{"targetTerm":"RBD","explanation":"RBD (Reservation Booking Designator) is the formal name for the inventory class code; Class of Service is the more colloquial term for the same concept, though it is sometimes loosely used to mean the marketing cabin.","explanation_ko":"RBD(Reservation Booking Designator)는 인벤토리 클래스 코드의 공식 명칭이며, Class of Service는 동일 개념을 가리키는 더 구어적 표현이다. 다만 때때로 마케팅 객실을 뜻하는 의미로 느슨하게 쓰이기도 한다.","targetId":"rbd"}],"sources":[{"org":"Travelport","name":"Booking Class & Cabin (RBD) - Record 6","version":"","section":"RBD / Booking Class","url":""},{"org":"IATA","name":"Passenger Fares and Ticketing","version":"","section":"Booking class / class of service","url":"https://www.iata.org/en/training/subject-areas/fares-ticketing-courses/"}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"8\" y=\"14\" width=\"32\" height=\"20\" rx=\"4\"/>\u003cline x1=\"8\" y1=\"24\" x2=\"40\" y2=\"24\"/>\u003cline x1=\"20\" y1=\"14\" x2=\"20\" y2=\"34\"/>\u003cline x1=\"30\" y1=\"14\" x2=\"30\" y2=\"34\"/>\u003ccircle cx=\"14\" cy=\"19\" r=\"1.2\" fill=\"currentColor\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"codeshare","term":"Codeshare","term_ko":"공동운항","abbreviation":"","aliases":["Code Share","Code-share Agreement","Codeshare Flight"],"category":"air-partner","conceptType":"business-term","status":"active","definition":"A commercial arrangement in which an airline (the marketing carrier) sells seats under its own airline designator and flight number on a flight that is physically operated by a different airline (the operating carrier). A single physical flight can therefore be sold under multiple flight numbers belonging to different carriers.","definition_ko":"한 항공사(판매 항공사)가 실제로는 다른 항공사(운항 항공사)가 운항하는 항공편에 대해 자사의 항공사 지정자 코드와 편명으로 좌석을 판매하는 상업적 협정. 따라서 하나의 실제 항공편이 서로 다른 항공사에 속한 여러 편명으로 판매될 수 있다.","longDef":"Codeshare agreements let an airline extend its network and offer connectivity beyond the routes it operates itself, while presenting a seamless single-carrier appearance to the customer. Common models include free-flow/free-sale (the marketing carrier sells from the operating carrier's inventory in real time), block-space (the marketing carrier purchases a fixed block of seats), and capacity-purchase arrangements. Regulators commonly require disclosure to the passenger of the actual operating carrier at the time of sale.","longDef_ko":"공동운항 협정을 통해 항공사는 자사가 직접 운항하지 않는 노선까지 네트워크를 확장하고 연결편을 제공하면서도, 고객에게는 단일 항공사를 이용하는 듯한 매끄러운 경험을 제공할 수 있다. 대표적인 형태로는 free-flow/free-sale(판매 항공사가 운항 항공사의 좌석 재고에서 실시간으로 판매), block-space(판매 항공사가 고정된 좌석 블록을 매입), capacity-purchase 협정 등이 있다. 규제 당국은 일반적으로 판매 시점에 실제 운항 항공사를 승객에게 고지하도록 요구한다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Marketing Carrier","targetId":"marketing-carrier"},{"type":"related","targetTerm":"Operating Carrier","targetId":"operating-carrier"},{"type":"related","targetTerm":"Interline","targetId":"interline"},{"type":"related","targetTerm":"Airline Designator","targetId":"airline-designator"},{"type":"related","targetTerm":"Validating Carrier","targetId":"validating-carrier"}],"distinctions":[{"targetTerm":"Interline","explanation":"Codeshare puts the marketing carrier's own code on another carrier's flight; interline is acceptance of another carrier's ticket without the marketing carrier's code on the flight.","explanation_ko":"공동운항은 판매 항공사의 코드를 다른 항공사의 항공편에 부여하는 것이고, 인터라인은 해당 항공편에 판매 항공사의 코드를 붙이지 않은 채 다른 항공사의 항공권을 인수하는 것이다.","targetId":"interline"},{"targetTerm":"Operating Carrier","explanation":"Codeshare is the agreement/arrangement, while the operating carrier is the airline actually flying the aircraft.","explanation_ko":"공동운항은 협정 또는 협약을 가리키는 반면, 운항 항공사는 실제로 항공기를 운항하는 항공사를 가리킨다.","targetId":"operating-carrier"}],"sources":[{"name":"Standard Schedules Information Manual (SSIM)","org":"IATA","version":"","section":"","url":""},{"name":"DOT rules on disclosure of code-share arrangements","org":"U.S. Department of Transportation","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M6 18l8-2 4-6 3 1-2 7 7-1 3-3 2 1-1 5\"/>\u003cpath d=\"M42 30l-8 2-4 6-3-1 2-7-7 1-3 3-2-1 1-5\"/>\u003cline x1=\"24\" y1=\"22\" x2=\"24\" y2=\"26\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"commissionable-rate","term":"Commissionable Rate","term_ko":"커미션 요금(commissionable rate)","abbreviation":"","aliases":["Retail Rate (commissionable)","Gross Rate"],"category":"hotel-dist","conceptType":"business-term","status":"active","definition":"A commissionable rate is a published room rate on which the hotel pays the booking travel agent or distributor a commission (a percentage of the room revenue) for the sale. The guest is typically charged the hotel's rate and the agent is paid commission afterward, characteristic of the agency distribution model.","definition_ko":"커미션 요금은 호텔이 판매에 대해 예약을 발생시킨 여행사나 분배자에게 커미션(객실 매출의 일정 비율)을 지급하는 공시 객실 요금이다. 일반적으로 고객은 호텔 요금을 청구받고 대리점은 이후에 커미션을 지급받으며, 이는 에이전시 분배 모델의 특징이다.","longDef":"Under the commissionable/agency model, the traveler pays the hotel (often at check-out) and the agent earns a contracted commission (a percentage of room revenue, which varies by agreement). This contrasts with the merchant/net-rate model where the intermediary marks up a net rate and there is no separate commission. GDS bookings are a classic channel for commissionable rates.","longDef_ko":"커미션/에이전시 모델에서는 여행자가 (흔히 체크아웃 시) 호텔에 지불하고, 대리점은 계약된 커미션(객실 매출의 일정 비율로, 계약에 따라 다름)을 받는다. 이는 중개자가 순 요금에 마크업을 붙이고 별도의 커미션이 없는 머천트/순 요금 모델과 대비된다. GDS 예약은 커미션 요금의 대표적인 채널이다.","standardBody":"","providerTerms":[],"relationships":[{"type":"contrasts","targetTerm":"Net Rate","targetId":"net-rate"},{"type":"related","targetTerm":"Agency Model","targetId":"agency-model"},{"type":"related","targetTerm":"GDS","targetId":"gds"},{"type":"related","targetTerm":"Rate Plan","targetId":"rate-plan"},{"type":"related","targetTerm":"BAR","targetId":"bar"}],"distinctions":[{"targetTerm":"Net Rate","explanation":"A commissionable rate pays the seller a commission on the published price; a net rate is wholesale and non-commissionable with margin from markup.","explanation_ko":"커미션 요금은 판매자에게 공시 가격에 대한 커미션을 지급하고, 순 요금은 도매·비커미션 요금으로 마진이 마크업에서 발생한다.","targetId":"net-rate"},{"targetTerm":"Agency Model","explanation":"Commissionable rate is the priced product; the agency model is the broader settlement model in which the hotel collects from the guest and pays commission.","explanation_ko":"커미션 요금은 가격이 책정된 상품이고, 에이전시 모델은 호텔이 고객으로부터 대금을 수취하고 커미션을 지급하는 더 넓은 정산 모델이다.","targetId":"agency-model"}],"sources":[{"name":"Hotel distribution rate model industry references","org":"","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M25 5H11a2 2 0 00-2 2v14l18 18a2 2 0 002.8 0l11.4-11.4a2 2 0 000-2.8L25 5z\"/>\u003ccircle cx=\"16\" cy=\"12\" r=\"2\" fill=\"currentColor\" stroke=\"none\"/>\u003ccircle cx=\"19\" cy=\"24\" r=\"2.5\"/>\u003ccircle cx=\"30\" cy=\"35\" r=\"2.5\"/>\u003cpath d=\"M31 22L18 37\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"companion","term":"Companion","abbreviation":"","aliases":["Companion Fare","Companion Pass","Companion Ticket","Companion Certificate"],"category":"customer","conceptType":"business-term","status":"active","definition":"In loyalty and customer terms, a companion is a second guest who travels together with a member on the same itinerary, often under a companion benefit such as a companion fare, companion pass, or companion certificate that lets the guest fly free or at a steep discount (typically paying only applicable taxes, fees, and surcharges). Such benefits are offered as loyalty perks or co-branded credit card rewards.","longDef":"Companion benefits take several forms: a companion fare or certificate offering a deeply discounted or near-free second ticket, usually once per eligibility period; a companion pass allowing a designated companion to be added repeatedly over a period. The companion generally must be booked on the same flights as the primary member, and the benefit is conditioned on the member purchasing or holding a qualifying revenue ticket. Brand names vary by carrier (for example, the British Airways 'Travel Together Ticket'). The companion is recorded in the same booking and may be linked to the primary traveler in their customer/loyalty profile.","standardBody":"","term_ko":"동반자(Companion / Companion Fare)","definition_ko":"로열티·고객 관점에서 companion은 회원과 같은 일정으로 함께 여행하는 두 번째 동반 게스트로, 흔히 companion fare(동반자 운임), companion pass, companion certificate 같은 동반자 혜택을 통해 게스트가 무료 또는 큰 할인(대개 세금·수수료·할증료만 부담)으로 탑승한다. 이러한 혜택은 로열티 특전이나 제휴 신용카드 보상으로 제공된다.","longDef_ko":"동반자 혜택은 여러 형태가 있다. 보통 자격 기간당 1회, 큰 할인 또는 거의 무료인 두 번째 항공권을 주는 companion fare/certificate가 있고, 일정 기간 동안 지정 동반자를 반복해서 추가할 수 있는 companion pass가 있다. 동반자는 일반적으로 주 회원과 같은 항공편으로 예약되어야 하며, 혜택은 회원이 적격 유상 항공권을 구매·보유하는 것을 조건으로 한다. 명칭은 항공사마다 다르다(예: British Airways의 'Travel Together Ticket'). 동반자는 같은 예약에 기록되며 고객/로열티 프로필에서 주 여행자와 연결될 수 있다.","providerTerms":[{"provider":"British Airways","term":"Travel Together Ticket","context":"British Airways' branded companion benefit that provides a second seat of equal value for taxes, fees, and carrier charges only.","context_ko":"동일 가치의 두 번째 좌석을 세금·수수료·항공사 부과금만으로 제공하는 British Airways의 동반자 혜택 브랜드.","relationship":"narrower"},{"provider":"Southwest Airlines","term":"Companion Pass","context":"Southwest Rapid Rewards benefit letting a designated companion fly with the member for taxes and fees on paid and award travel during the qualifying period.","context_ko":"자격 기간 동안 지정 동반자가 유상·보상 여행 모두에서 세금·수수료만으로 함께 탑승하게 해주는 Southwest Rapid Rewards 혜택.","relationship":"narrower"}],"relationships":[{"type":"related","targetTerm":"Frequent Flyer Program","targetId":"frequent-flyer-program"},{"type":"related","targetTerm":"Loyalty Tier Status","targetId":"loyalty-tier-status"},{"type":"related","targetTerm":"Customer Profile","targetId":"customer-profile"},{"type":"related","targetTerm":"Passenger Type Code","targetId":"passenger-type-code"}],"distinctions":[{"targetTerm":"Award Redemption","explanation":"A companion benefit discounts or waives the fare of a second ticket tied to a member's paid travel, while award redemption pays for a reward entirely with accrued miles or points; the two are distinct mechanisms though both are loyalty perks.","explanation_ko":"Companion 혜택은 회원의 유상 여행에 연결된 두 번째 항공권의 운임을 할인·면제하는 것이고, award redemption은 적립한 마일·포인트만으로 보상 비용을 전액 결제하는 것이다. 둘 다 로열티 특전이지만 작동 방식이 다르다.","targetId":"award-redemption"}],"sources":[{"org":"American Express","name":"Your Guide to Airline Companion Tickets","version":"","section":"","url":"https://www.americanexpress.com/en-us/credit-cards/credit-intel/free-companion-ticket/"},{"org":"Southwest Airlines","name":"Companion Pass - Rapid Rewards","version":"","section":"","url":"https://www.southwest.com/rapid-rewards/tiers/companion-pass/"}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003ccircle cx=\"17\" cy=\"15\" r=\"5\"/>\u003ccircle cx=\"32\" cy=\"17\" r=\"4\"/>\u003cpath d=\"M8 38c0-6 4-10 9-10s9 4 9 10\"/>\u003cpath d=\"M28 38c0-5 3-8 7-8 3 0 5 2 6 5\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"conjunction-ticket","term":"Conjunction Ticket","abbreviation":"","aliases":["Conjunction Tickets","Conjunctive Ticket"],"category":"air-ticket","conceptType":"document","status":"active","definition":"A conjunction ticket is a set of two or more tickets issued together and cross-referenced to a passenger, which together constitute a single contract of carriage. They are used when an itinerary requires more flight coupons than a single ticket can hold (traditionally a maximum of four coupons per ticket).","longDef":"Because a single airline ticket can carry only a limited number of flight coupons (historically four), an itinerary with more segments is documented across multiple tickets issued in conjunction with one another. These tickets are numbered consecutively and cross-referenced (each shows the others' numbers) so that, although physically separate documents, they are treated as one ticket and one contract of carriage for fare, validity, and rule purposes. In e-ticketing the conjunction relationship is recorded in the ticket data so the linked coupons are processed, exchanged, and refunded together.","standardBody":"IATA","term_ko":"Conjunction Ticket (연결 항공권)","definition_ko":"Conjunction Ticket(연결 항공권)은 한 승객에게 함께 발행되어 상호 참조되는 둘 이상의 항공권 묶음으로, 이들이 합쳐져 하나의 운송 계약을 구성한다. 단일 항공권이 담을 수 있는 항공편 쿠폰 수(전통적으로 항공권당 최대 4매)를 초과하는 여정일 때 사용된다.","longDef_ko":"단일 항공권은 제한된 수의 항공편 쿠폰(과거 기준 4매)만 담을 수 있으므로, 그보다 많은 구간을 가진 여정은 서로 연결(in conjunction)되어 발행된 여러 항공권에 걸쳐 기록된다. 이 항공권들은 연속 번호가 매겨지고 상호 참조(각 항공권에 다른 항공권의 번호가 표시)되어, 물리적으로는 별개 서류이지만 운임·유효기간·규정 목적상 하나의 항공권이자 하나의 운송 계약으로 취급된다. 전자 발권에서는 연결 관계가 항공권 데이터에 기록되어 연결된 쿠폰들이 함께 처리·교환·환불된다.","providerTerms":[],"relationships":[{"type":"related","targetTerm":"E-ticket","targetId":"e-ticket"},{"type":"related","targetTerm":"Flight Coupon","targetId":"flight-coupon"},{"type":"related","targetTerm":"Reissue","targetId":"reissue"},{"type":"related","targetTerm":"Journey","targetId":"journey"},{"type":"related","targetTerm":"Fare Component","targetId":"fare-component"}],"distinctions":[{"targetTerm":"Flight Coupon","explanation":"A flight coupon is one segment-level portion of a single ticket; a conjunction ticket is a grouping of multiple whole tickets, used when an itinerary needs more coupons than one ticket can hold.","explanation_ko":"Flight Coupon은 단일 항공권 내의 구간 단위 부분이고, conjunction ticket은 여러 항공권 전체를 묶은 것으로, 여정이 한 항공권에 담을 수 있는 쿠폰 수를 초과할 때 사용된다.","targetId":"flight-coupon"}],"sources":[{"org":"IATA","name":"Ticketing Handbook","version":"","section":"","url":"https://www.iata.org/en/publications/manuals/ticketing-handbook/"},{"org":"IATA","name":"Conditions of Contract and Other Important Notices","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"7\" y=\"13\" width=\"22\" height=\"15\" rx=\"2\"/>\u003crect x=\"19\" y=\"20\" width=\"22\" height=\"15\" rx=\"2\"/>\u003cpath d=\"M24 20v8\"/>\u003cpath d=\"M13 20h5\"/>\u003cpath d=\"M30 27h5\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"connection","term":"Connection","term_ko":"연결편(커넥션)","abbreviation":"","aliases":["Connecting Flight","Connecting Itinerary","Online Connection","Interline Connection"],"category":"air-partner","conceptType":"business-term","status":"active","definition":"A point in an itinerary where a passenger changes from one flight to another to continue toward the final destination, as opposed to a nonstop or direct journey. A valid connection requires at least the minimum connecting time (MCT) at the connecting airport between the arriving and departing flights.","definition_ko":"직항(nonstop)이나 직행(direct) 여정과 달리, 승객이 최종 목적지로 계속 가기 위해 한 항공편에서 다른 항공편으로 갈아타는 여정상의 지점. 유효한 연결은 도착 항공편과 출발 항공편 사이에 연결 공항에서 최소한 최소 연결 시간(MCT) 이상을 필요로 한다.","longDef":"Connections may be \"online\" (both flights on the same carrier) or \"interline\"/\"codeshare\" (different carriers), the latter relying on interline or codeshare agreements for through-ticketing and baggage handling. Connection points are reflected in the itinerary as separate segments rather than a stopover when the change is treated as transit; whether two segments are a connection or a stopover depends on the time and fare rules. The MCT defines the shortest legal gap, and connecting traffic is what hub-and-spoke networks are built to generate. A through fare typically prices the connecting journey as one product.","longDef_ko":"연결은 \"online\"(두 항공편이 같은 항공사)일 수도, \"interline\"/\"codeshare\"(서로 다른 항공사)일 수도 있으며, 후자는 일관 발권과 수하물 처리를 위해 인터라인 또는 공동운항 협정에 의존한다. 갈아타기가 통과(transit)로 취급되면 연결 지점은 스톱오버(stopover)가 아니라 별개의 세그먼트(segment)로 여정에 반영되며, 두 세그먼트가 연결인지 스톱오버인지는 시간과 운임 규정에 따라 달라진다. MCT는 법적으로 허용되는 최소 간격을 정의하고, 연결 운송은 허브 앤 스포크 네트워크가 만들어내도록 설계된 대상이다. 일관 운임은 일반적으로 연결 여정을 하나의 상품으로 책정한다.","standardBody":"","providerTerms":[],"relationships":[{"type":"related","targetTerm":"MCT","targetId":"mct"},{"type":"related","targetTerm":"Segment","targetId":"segment"},{"type":"related","targetTerm":"Married Segment","targetId":"married-segment"},{"type":"related","targetTerm":"Hub-and-Spoke","targetId":"hub-and-spoke"},{"type":"related","targetTerm":"Through Fare","targetId":"through-fare"},{"type":"related","targetTerm":"Interline","targetId":"interline"}],"distinctions":[{"targetTerm":"MCT","explanation":"A connection is the act of changing flights toward a destination; MCT is the minimum time that must elapse at the connecting airport for that connection to be considered valid.","explanation_ko":"connection은 목적지를 향해 항공편을 갈아타는 행위이고, MCT는 그 연결이 유효하다고 인정되기 위해 연결 공항에서 경과해야 하는 최소 시간이다.","targetId":"mct"},{"targetTerm":"Segment","explanation":"A segment is a single marketed flight portion of an itinerary; a connection is the relationship between two consecutive segments where the passenger transfers between flights.","explanation_ko":"세그먼트는 여정에서 판매되는 단일 항공편 부분이고, connection은 승객이 두 항공편 사이를 환승하는, 연속된 두 세그먼트 간의 관계다.","targetId":"segment"}],"sources":[{"name":"Standard Schedules Information Manual (SSIM)","org":"IATA","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003ccircle cx=\"8\" cy=\"12\" r=\"3\"/>\u003ccircle cx=\"24\" cy=\"24\" r=\"4\"/>\u003ccircle cx=\"40\" cy=\"36\" r=\"3\"/>\u003cline x1=\"10.5\" y1=\"13.8\" x2=\"21\" y2=\"21.5\"/>\u003cline x1=\"27\" y1=\"26.5\" x2=\"37.5\" y2=\"34.2\"/>\u003cpath d=\"M24 20 a4 4 0 0 1 0 8\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"continuous-pricing","term":"Continuous Pricing","abbreviation":"","aliases":["Total Dynamic Pricing","Continuous Fares"],"category":"air-shop","conceptType":"process","status":"active","definition":"Continuous Pricing is a revenue-management and pricing technique in which an airline generates fares in real time across a continuous price range, rather than being limited to a fixed set of pre-filed fare buckets (booking classes). It lets carriers offer any price within defined minimum and maximum bounds based on demand, willingness to pay, and context.","longDef":"Traditional airline pricing pre-distributes a discrete set of fares mapped to a limited number of booking classes (commonly described as around 26 class buckets) per flight, each with filed rules. Continuous Pricing removes the constraint that an offered price must equal one of those pre-filed points: the revenue-management system computes prices anywhere along a continuous interval, allowing finer matching of price to demand and reducing the 'gaps' between adjacent fare buckets. ATPCO and carriers position continuous pricing as a step within dynamic offer creation and modern airline retailing, often delivered through richer optimization in the RM/offer engine and increasingly via NDC where the airline returns calculated prices rather than only catalog fares. It is closely related to, but narrower than, dynamic pricing, which can also vary bundles and ancillaries, not just the base fare.","standardBody":"","term_ko":"연속 가격 책정 (Continuous Pricing)","definition_ko":"Continuous Pricing은 항공사가 사전 파일링된 고정된 운임 버킷(booking class) 집합에 국한되지 않고, 연속적인 가격 범위 안에서 실시간으로 운임을 생성하는 revenue management 및 pricing 기법이다. 정해진 최소·최대 한도 내에서 수요, 지불 의향, 맥락에 따라 어떤 가격이든 제시할 수 있게 한다.","longDef_ko":"전통적 항공 가격 책정은 항공편마다 제한된 수의 booking class(흔히 약 26개 클래스 버킷으로 설명됨)에 매핑된 이산적 운임 집합을 사전 배포하며, 각각에 규정이 파일링되어 있다. Continuous Pricing은 제시 가격이 사전 파일링된 가격 지점 중 하나여야 한다는 제약을 제거한다. revenue management 시스템이 연속 구간상의 어떤 가격이든 산출하여 가격을 수요에 더 정밀하게 맞추고 인접 운임 버킷 사이의 '간격'을 줄인다. ATPCO와 항공사들은 continuous pricing을 dynamic offer 생성과 현대 항공 리테일링의 한 단계로 위치시키며, 주로 RM/offer 엔진의 고도화된 최적화로 구현되고, 항공사가 카탈로그 운임만이 아니라 산출된 가격을 반환하는 NDC를 통해 점점 더 제공된다. base fare뿐 아니라 번들과 부가서비스까지 변동시킬 수 있는 dynamic pricing과 밀접하지만 그보다 좁은 개념이다.","providerTerms":[{"provider":"ATPCO","term":"Dynamic Offers / Continuous Pricing","context":"ATPCO frames continuous pricing as part of its dynamic offer creation capabilities for airline retailing.","context_ko":"ATPCO는 continuous pricing을 항공 리테일링을 위한 dynamic offer 생성 역량의 일부로 위치시킨다.","relationship":"related"}],"relationships":[{"type":"related","targetTerm":"Revenue Management","targetId":"revenue-management"},{"type":"related","targetTerm":"RBD","targetId":"rbd"},{"type":"related","targetTerm":"NDC","targetId":"ndc"},{"type":"related","targetTerm":"Offer","targetId":"offer"},{"type":"contrasts","targetTerm":"Fare Basis Code","targetId":"fare-basis-code"}],"distinctions":[{"targetTerm":"RBD","explanation":"RBDs are the fixed booking-class buckets that traditional pricing maps fares to; Continuous Pricing is designed to break free of that finite bucket structure by pricing along a continuous range.","explanation_ko":"RBD는 전통적 가격 책정이 운임을 매핑하는 고정된 booking class 버킷이고, Continuous Pricing은 연속적 범위로 가격을 책정함으로써 그 유한한 버킷 구조에서 벗어나도록 설계되었다.","targetId":"rbd"}],"sources":[{"org":"ATPCO","name":"What are dynamic offers?","version":"","section":"Continuous / dynamic pricing","url":"https://atpco.net/single-blog/what-are-dynamic-offers/"},{"org":"Business Travel News","name":"Airline Continuous Pricing, Explained","version":"","section":"Continuous pricing","url":"https://www.businesstravelnews.com/Procurement/Airline-Continuous-Pricing-Explained"}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M6 34c5 0 6-18 11-18s6 12 11 12 6-16 11-16\"/>\u003cline x1=\"6\" y1=\"40\" x2=\"42\" y2=\"40\"/>\u003ccircle cx=\"17\" cy=\"16\" r=\"1.5\" fill=\"currentColor\"/>\u003ccircle cx=\"28\" cy=\"28\" r=\"1.5\" fill=\"currentColor\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"corporate-profile","term":"Corporate Profile","abbreviation":"","aliases":["Company Profile","Account Profile","Corporate Account Profile"],"category":"customer","conceptType":"business-term","status":"active","definition":"A corporate profile is a stored record in a GDS, agency mid-office, or travel management system that holds an organization's travel data, including negotiated/contracted fares and rates, travel policy rules, billing and cost-center information, and default booking parameters. It governs how bookings for that company's travelers are priced and processed, and is typically linked to individual traveler profiles within the account.","longDef":"In GDS systems (e.g., Amadeus, Sabre, Travelport), profiles are commonly organized hierarchically, with a company/corporate profile holding account-level data such as negotiated airline and hotel rates, form-of-payment and billing instructions, approval and policy rules, and reporting attributes, and individual traveler profiles inheriting from it. The corporate profile is the mechanism by which contracted corporate fares and preferred-supplier programs are automatically applied during shopping and booking. It supports managed travel by enforcing policy and capturing data for duty-of-care and expense reporting. It is distinct from an individual Customer Profile, which holds personal traveler data and preferences.","standardBody":"","term_ko":"기업 프로필(Corporate Profile)","definition_ko":"Corporate Profile(기업 프로필)은 GDS, 여행사 미드오피스, 또는 출장관리 시스템에 저장된 기업의 여행 데이터 기록으로, 협상(계약) 운임·요율, 출장 정책 규칙, 청구·코스트센터 정보, 기본 예약 파라미터 등을 담는다. 해당 기업 여행자의 예약이 어떻게 가격 책정·처리되는지를 규율하며, 보통 그 계정 내 개별 여행자 프로필과 연결된다.","longDef_ko":"GDS(예: Amadeus, Sabre, Travelport)에서 프로필은 흔히 계층 구조로 구성되며, 회사/기업 프로필이 협상된 항공·호텔 요율, 결제수단·청구 지시, 승인·정책 규칙, 리포팅 속성 같은 계정 단위 데이터를 보유하고 개별 여행자 프로필이 이를 상속한다. 기업 프로필은 계약된 기업 운임과 우선 공급사 프로그램이 조회·예약 과정에서 자동 적용되게 하는 수단이다. 정책을 강제하고 의무관리(duty of care)·경비 보고용 데이터를 수집하여 관리형 출장(managed travel)을 지원한다. 개인 여행자 데이터와 선호를 담는 개별 Customer Profile과는 구별된다.","providerTerms":[{"provider":"Amadeus","term":"Amadeus Customer Profiles (company / traveller profiles)","context":"Hierarchical profile structure in which a company profile holds account-level data and traveller profiles inherit from it.","context_ko":"회사 프로필이 계정 단위 데이터를 보유하고 여행자 프로필이 이를 상속하는 계층형 프로필 구조.","relationship":"related"},{"provider":"Sabre","term":"Sabre Profiles (Travel Journey Record / agency profiles)","context":"Stores corporate account and traveler data including negotiated rates and policy used during booking.","context_ko":"협상 요율과 정책 등 기업 계정·여행자 데이터를 저장해 예약 시 사용.","relationship":"related"}],"relationships":[{"type":"related","targetTerm":"Customer Profile","targetId":"customer-profile"},{"type":"related","targetTerm":"GDS","targetId":"gds"},{"type":"related","targetTerm":"Traveler Preference","targetId":"traveler-preference"},{"type":"related","targetTerm":"Fare Basis Code","targetId":"fare-basis-code"}],"distinctions":[{"targetTerm":"Customer Profile","explanation":"A Customer Profile holds an individual traveler's personal data, identifiers, and preferences, whereas a Corporate Profile holds organization-level data such as negotiated fares, billing, and policy; in managed travel a traveler profile is typically nested under and inherits from the corporate profile.","explanation_ko":"Customer Profile은 개별 여행자의 개인 데이터·식별자·선호를 담고, Corporate Profile은 협상 운임·청구·정책 같은 조직 단위 데이터를 담는다. 관리형 출장에서는 여행자 프로필이 보통 기업 프로필 하위에 속해 이를 상속한다.","targetId":"customer-profile"}],"sources":[{"org":"Navan","name":"What Is GDS (Global Distribution System)? Guide","version":"","section":"","url":"https://navan.com/resources/glossary/gds-global-distribution-system"}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"8\" y=\"10\" width=\"20\" height=\"30\" rx=\"2\"/>\u003cpath d=\"M28 18h12v22H28\"/>\u003cpath d=\"M13 16h4\"/>\u003cpath d=\"M13 22h4\"/>\u003cpath d=\"M13 28h4\"/>\u003cpath d=\"M33 24h3\"/>\u003cpath d=\"M33 30h3\"/>\u003cpath d=\"M8 40h36\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"corporate-rate","term":"Corporate Rate","abbreviation":"","aliases":["Negotiated Rate","Corporate Negotiated Rate","Company Rate"],"category":"hotel-rate","conceptType":"business-term","status":"active","definition":"A corporate rate is a discounted, negotiated room rate agreed between a hotel (or chain) and a company or travel management company for business travel. Access is usually restricted to authorised bookers via a negotiated rate access code, and the contract often specifies whether the rate carries Last Room Availability (LRA).","longDef":"Corporate rates are normally set during an annual RFP cycle and loaded as confidential, channel-restricted rates that only the contracted company's agencies and travellers can view and book. In GDS distribution they are protected by a rate access code (typically a 3-character identifier) that controls which agencies may retrieve the secured rate, distinct from public rates such as BAR or government rates. A key contractual variable is LRA: with an LRA corporate rate the negotiated price must be honoured as long as any room remains for sale, whereas a non-LRA rate can be closed once the hotel reaches a yield thresh
