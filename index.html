tId":"segment"}],"sources":[{"name":"Standard Schedules Information Manual (SSIM)","org":"IATA","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cline x1=\"6\" y1=\"40\" x2=\"42\" y2=\"40\"/>\u003cpath d=\"M9 36 C16 16 32 16 39 24\"/>\u003cpath d=\"M33 12 L41 20 L32 24\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"length-of-stay","term":"Length of Stay","term_ko":"숙박일수(LOS, Length of Stay)","abbreviation":"LOS","aliases":["LOS","Stay Length","Minimum Length of Stay","Maximum Length of Stay"],"category":"hotel-rate","conceptType":"business-term","status":"active","definition":"Length of Stay is the number of nights of a hotel booking, and as a rate control it refers to restrictions tied to that duration — most commonly Minimum Length of Stay (MinLOS) and Maximum Length of Stay (MaxLOS) — used to qualify or block availability for a rate plan on specific dates. Related controls include length-of-stay-based pricing and arrival-day restrictions.","definition_ko":"LOS(Length of Stay)는 호텔 예약의 숙박 일수를 의미하며, 요금 통제 수단으로서는 그 기간에 연동된 제약(가장 흔히 최소 숙박일수(MinLOS)와 최대 숙박일수(MaxLOS))을 가리킨다. 이는 특정 날짜에 요금제의 가용 여부를 한정하거나 차단하는 데 사용된다. 관련 통제로는 숙박일수 기반 가격 산정과 도착일 제약이 있다.","longDef":"Revenue managers use LOS restrictions to shape demand: a MinLOS requires guests to book at least N nights to be eligible (or to receive a rate) on a given arrival date, while MaxLOS caps the bookable duration. Variants include MinLOS Through and Closed to Arrival (CTA) / Closed to Departure (CTD), which interact with stay-through logic. LOS controls are distributed as restriction attributes alongside rates and availability in CRS, channel managers, and ARI/OpenTravel messages.","longDef_ko":"수익 관리자는 수요를 조정하기 위해 LOS 제약을 사용한다. MinLOS는 특정 도착일에 자격을 얻거나(또는 해당 요금을 받기) 위해 투숙객이 최소 N박을 예약하도록 요구하고, MaxLOS는 예약 가능한 기간에 상한을 둔다. 변형으로는 stay-through 로직과 상호작용하는 MinLOS Through, Closed to Arrival(CTA) / Closed to Departure(CTD)가 있다. LOS 통제는 CRS, 채널 매니저, ARI/OpenTravel 메시지에서 요금 및 가용 정보와 함께 제약 속성으로 유통된다.","standardBody":"OpenTravel Alliance","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Rate Plan","targetId":"rate-plan"},{"type":"related","targetTerm":"ARI","targetId":"ari"},{"type":"related","targetTerm":"BAR","targetId":"bar"}],"distinctions":[{"targetTerm":"Rate Plan","explanation":"Length of Stay is a restriction/control that can gate a rate plan; the rate plan is the broader offer that the LOS rule conditions.","explanation_ko":"숙박일수는 요금제를 제한할 수 있는 제약/통제이고, 요금제는 LOS 규칙이 조건을 거는 더 넓은 범위의 상품이다.","targetId":"rate-plan"}],"sources":[{"name":"OpenTravel Specification (Hotel availability and restriction messages, length of stay)","org":"OpenTravel Alliance","version":"","section":"","url":""},{"name":"HTNG ARI messaging specifications","org":"HTNG","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"7\" y=\"10\" width=\"34\" height=\"30\" rx=\"3\"/>\u003cline x1=\"7\" y1=\"18\" x2=\"41\" y2=\"18\"/>\u003cline x1=\"15\" y1=\"7\" x2=\"15\" y2=\"13\"/>\u003cline x1=\"33\" y1=\"7\" x2=\"33\" y2=\"13\"/>\u003cpath d=\"M15 25h2v9\"/>\u003cpath d=\"M33 29a4.5 4.5 0 1 1-5-5 5.5 5.5 0 0 0 5 5z\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"loyalty-tier-status","term":"Loyalty Tier Status","term_ko":"로열티 등급 상태 (우수 등급)","abbreviation":"","aliases":["Elite Status","Tier Status","Membership Tier","Frequent Flyer Tier"],"category":"customer","conceptType":"business-term","status":"active","definition":"The graded level a member holds within a Frequent Flyer Program (e.g. Silver, Gold, Platinum), earned through qualifying activity and conferring escalating benefits such as priority services, lounge access, extra baggage and upgrade eligibility. Status is typically tied to the member's Frequent Flyer Number and recalculated each qualification period.","definition_ko":"회원이 FFP 내에서 보유하는 등급화된 수준(예: 실버, 골드, 플래티넘)으로, 자격 산정 활동을 통해 획득하며 우선 서비스, 라운지 이용, 추가 수하물, 업그레이드 자격 등 단계적으로 상향되는 혜택을 부여한다. 등급 상태는 통상 회원의 Frequent Flyer Number에 연동되며 자격 산정 기간마다 재산정된다.","longDef":"Tiers are usually achieved by accumulating tier/status points, qualifying miles, or qualifying segments within a defined window, and they map to alliance-wide recognition levels (for example Star Alliance Silver/Gold or oneworld Ruby/Sapphire/Emerald) so benefits travel across partner carriers. A member's tier influences service handling encoded in a reservation and drives differentiated offers. Tier status is a property of an individual member, not of the program as a whole.","longDef_ko":"등급은 일반적으로 정해진 기간 내에 등급/상태 포인트, 자격 마일리지 또는 자격 구간을 누적하여 달성하며, 동맹 전반의 인정 등급(예: Star Alliance의 Silver/Gold 또는 oneworld의 Ruby/Sapphire/Emerald)에 매핑되어 혜택이 제휴 항공사 간에 이어진다. 회원의 등급은 예약에 기록되는 서비스 처리에 영향을 주고 차별화된 제안을 이끈다. 등급 상태는 프로그램 전체가 아니라 개별 회원의 속성이다.","standardBody":"","providerTerms":[],"relationships":[{"type":"child","targetTerm":"Frequent Flyer Program","targetId":"frequent-flyer-program"},{"type":"related","targetTerm":"Frequent Flyer Number","targetId":"frequent-flyer-number"},{"type":"related","targetTerm":"Customer Profile","targetId":"customer-profile"}],"distinctions":[{"targetTerm":"Frequent Flyer Program","explanation":"Tier status is one member's earned standing; the program is the overall scheme that defines the tiers.","explanation_ko":"등급 상태는 한 회원이 획득한 위상이고, 프로그램은 그 등급들을 정의하는 전체 제도이다.","targetId":"frequent-flyer-program"},{"targetTerm":"Frequent Flyer Number","explanation":"The number identifies the account; the tier status is the benefit level attached to that account.","explanation_ko":"번호는 계정을 식별하고, 등급 상태는 그 계정에 부여된 혜택 수준이다.","targetId":"frequent-flyer-number"}],"sources":[{"name":"Star Alliance tier recognition (program documentation)","org":"Star Alliance","version":"","section":"","url":""},{"name":"oneworld tier recognition (program documentation)","org":"oneworld","version":"","section":"","url":""}],"lastReviewed":"2026-06-15","icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M24 6l3 6 6 1-4.5 4.5L29.5 24 24 21l-5.5 3 1-6.5L15 13l6-1z\"/>\u003crect x=\"18\" y=\"28\" width=\"12\" height=\"14\"/>\u003crect x=\"6\" y=\"33\" width=\"12\" height=\"9\"/>\u003crect x=\"30\" y=\"33\" width=\"12\" height=\"9\"/>\u003c/svg>"},{"id":"marketing-carrier","term":"Marketing Carrier","term_ko":"판매 항공사(마케팅 캐리어)","abbreviation":"","aliases":["Marketing Airline","Selling Carrier"],"category":"air-partner","conceptType":"role","status":"active","definition":"The airline whose designator code and flight number appear on a ticket or in a reservation for a given flight, and which markets and sells that flight to the customer. On a codeshare flight the marketing carrier may differ from the airline that physically operates the flight.","definition_ko":"특정 항공편에 대해 항공권이나 예약에 자사의 지정자 코드와 편명이 표시되며, 해당 항공편을 고객에게 마케팅하고 판매하는 항공사. 공동운항편에서는 판매 항공사가 실제로 항공편을 운항하는 항공사와 다를 수 있다.","longDef":"In a codeshare relationship the marketing carrier is the airline placing its code on the flight, regardless of who operates the aircraft. The marketing carrier's flight number is what the passenger sees at booking, and disclosure rules require informing the passenger of the underlying operating carrier. The marketing carrier is distinct from the validating carrier, which is the carrier whose stock and accounting are used to issue the ticket.","longDef_ko":"공동운항 관계에서 판매 항공사는 누가 항공기를 운항하는지와 무관하게 자사의 코드를 항공편에 부여하는 항공사다. 승객이 예약 시 보게 되는 것은 판매 항공사의 편명이며, 고지 규정에 따라 그 기반이 되는 운항 항공사를 승객에게 알려야 한다. 판매 항공사는 발권 항공사(validating carrier), 즉 항공권 발권에 그 항공권 양식과 회계가 사용되는 항공사와는 구별된다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Operating Carrier","targetId":"operating-carrier"},{"type":"related","targetTerm":"Codeshare","targetId":"codeshare"},{"type":"related","targetTerm":"Airline Designator","targetId":"airline-designator"},{"type":"related","targetTerm":"Validating Carrier","targetId":"validating-carrier"}],"distinctions":[{"targetTerm":"Operating Carrier","explanation":"The marketing carrier sells the flight under its code; the operating carrier physically flies the aircraft.","explanation_ko":"판매 항공사는 자사의 코드로 항공편을 판매하고, 운항 항공사는 실제로 항공기를 운항한다.","targetId":"operating-carrier"},{"targetTerm":"Validating Carrier","explanation":"The marketing carrier owns the flight code shown to the passenger; the validating carrier is the airline on whose document/stock the ticket is issued and settled.","explanation_ko":"판매 항공사는 승객에게 표시되는 편명 코드를 보유하고, 발권 항공사는 그 항공권 서류/양식을 사용해 항공권이 발권되고 정산되는 항공사다.","targetId":"validating-carrier"}],"sources":[{"name":"Standard Schedules Information Manual (SSIM)","org":"IATA","version":"","section":"","url":""},{"name":"DOT rules on disclosure of code-share arrangements","org":"U.S. Department of Transportation","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M10 14h22l8 8-8 8H10z\"/>\u003cpath d=\"M16 22h12\"/>\u003cpath d=\"M16 26h8\"/>\u003cpath d=\"M40 30l4 3-4 3v-2h-3v-2h3z\" fill=\"currentColor\" stroke=\"none\"/>\u003cpath d=\"M37 34c4 4 9 4 9 4\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"married-segment","term":"Married Segment","abbreviation":"","aliases":["Married Segments","Married Segment Logic","Segment Marriage"],"category":"air-ops","conceptType":"business-term","status":"active","definition":"Married segments are two or more connecting segments that an airline links together in availability and inventory control so they must be sold, modified, and cancelled as a single inseparable unit. The logic prevents agents from breaking the connection to access more favorable class availability that the airline would not offer for the individual local segment.","definition_ko":"married segment(결합 구간)는 항공사가 좌석 가용성 및 재고 통제에서 함께 연결하여, 분리할 수 없는 하나의 단위로 판매·변경·취소해야 하는 둘 이상의 연결 segment를 말한다. 이 로직은 항공사가 개별 로컬 segment에 대해서는 제공하지 않을 더 유리한 등급 가용성에 접근하기 위해 에이전트가 연결을 임의로 분리하는 것을 방지한다.","term_ko":"결합 구간(Married Segment)","longDef":"Carriers use married-segment logic so that availability returned for a connection (origin-to-destination) reflects the airline's O&D revenue-management decision rather than the standalone availability of each point-to-point leg. Attempting to cancel or split one married segment, or to book it separately at a class only offered for the through journey, is rejected by the host inventory system. This is a key mechanism enforcing O&D control and limiting 'cross-class' or married-segment abuse.","longDef_ko":"항공사는 연결편(출발지에서 도착지)에 반환되는 가용성이 각 지점 간 leg의 독립적인 가용성이 아니라 항공사의 O&D 수익 관리(revenue management) 결정을 반영하도록 married-segment 로직을 사용한다. 하나의 married segment를 취소하거나 분리하려는 시도, 또는 통과 여정(through journey)에 대해서만 제공되는 등급으로 별도 예약하려는 시도는 호스트 재고 시스템에 의해 거부된다. 이는 O&D 통제를 강제하고 'cross-class' 또는 married-segment 남용을 제한하는 핵심 메커니즘이다.","standardBody":"","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Segment","targetId":"segment"},{"type":"related","targetTerm":"Availability","targetId":"availability"},{"type":"related","targetTerm":"Origin & Destination","targetId":"origin-destination"},{"type":"related","targetTerm":"RBD","targetId":"rbd"}],"distinctions":[{"targetTerm":"Passive Segment","explanation":"A married segment is a live, inventory-controlled connection sold as a unit, whereas a passive segment is an informational segment that does not draw on the operating carrier's inventory.","explanation_ko":"married segment는 하나의 단위로 판매되는, 재고 통제를 받는 실시간 연결편인 반면, passive segment는 운항 항공사의 재고를 차감하지 않는 정보성 segment다.","targetId":"passive-segment"}],"sources":[{"name":"Passenger Services Conference Resolutions Manual (PSCRM)","org":"IATA","version":"","section":"","url":""},{"name":"Amadeus Functional Documentation — Availability and Married Segment Logic","org":"Amadeus","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003ccircle cx=\"18\" cy=\"24\" r=\"9\"/>\u003ccircle cx=\"30\" cy=\"24\" r=\"9\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"mco-miscellaneous-charges-order","term":"MCO (Miscellaneous Charges Order)","abbreviation":"MCO","aliases":["Miscellaneous Charges Order","Miscellaneous Charge Order","MPD (Multi-Purpose Document)"],"category":"air-ticket","conceptType":"document","status":"deprecated","definition":"A Miscellaneous Charges Order (MCO) is an accountable traffic document used to record the prepayment or collection of charges that are not for the carriage of a passenger on a specific flight coupon, such as residual value from an exchange, deposits, additional collections, or non-flight services. Historically issued on paper, the MCO has been largely superseded by the Electronic Miscellaneous Document (EMD), which performs the same functions electronically.","longDef":"The MCO (and the related Multi-Purpose Document, MPD) was a standard accountable document in the BSP/ARC settlement environment used to collect value not tied to a specific flight coupon: residual amounts left over when a non-refundable ticket of higher value was exchanged for a lower-value ticket, additional fare collections, deposits, taxes, fees, excess baggage, and similar miscellaneous services. With the industry mandate to move to electronic documents, the MCO and MPD were replaced by the Electronic Miscellaneous Document (EMD), which exists in two forms (EMD-S standalone and EMD-A associated to a flight coupon). The term MCO still appears in legacy documentation, residual-value workflows, and some carrier policies as a synonym for the standalone EMD function.","standardBody":"IATA","term_ko":"MCO (Miscellaneous Charges Order, 기타 비용 청구서)","definition_ko":"MCO(Miscellaneous Charges Order)는 특정 항공편 쿠폰의 운송이 아닌 비용(교환 시 발생한 잔여 가치, 보증금, 추가 징수액, 비항공 서비스 등)을 선결제하거나 징수하기 위해 발행하는 정산 가능 여행 서류이다. 과거에는 종이로 발행되었으나, 동일한 기능을 전자적으로 수행하는 EMD(Electronic Miscellaneous Document)로 대부분 대체되었다.","longDef_ko":"MCO(및 관련 문서인 MPD, Multi-Purpose Document)는 BSP/ARC 정산 환경에서 특정 항공편 쿠폰과 연결되지 않은 가치를 징수하는 데 사용된 표준 정산 가능 서류였다. 고액의 비환불 항공권을 더 낮은 가치의 항공권으로 교환할 때 남는 잔여 금액(residual value), 추가 운임 징수, 보증금, 세금·요금, 초과 수하물, 기타 부대 서비스 등을 담았다. 전자 서류 전환 의무화에 따라 MCO와 MPD는 EMD로 대체되었으며, EMD는 EMD-S(독립형)와 EMD-A(항공권 쿠폰 연결형) 두 가지 형태로 존재한다. 'MCO'라는 용어는 여전히 레거시 문서, 잔여 가치 처리 흐름, 일부 항공사 정책에서 독립형 EMD 기능을 가리키는 동의어로 남아 있다.","providerTerms":[{"provider":"Travelport","term":"EMD","context":"Travelport documents EMDs as the electronic replacement for MCO, MPD, and other miscellaneous paper documents.","context_ko":"Travelport는 EMD를 MCO, MPD 및 기타 종이 기타 서류를 대체하는 전자 문서로 설명한다.","relationship":"broader"}],"relationships":[{"type":"replaces","targetTerm":"EMD","targetId":"emd"},{"type":"related","targetTerm":"Residual Value","targetId":"residual-value"},{"type":"related","targetTerm":"Reissue","targetId":"reissue"},{"type":"related","targetTerm":"BSP","targetId":"bsp"},{"type":"related","targetTerm":"ARC","targetId":"arc"}],"distinctions":[{"targetTerm":"EMD","explanation":"The EMD is the electronic successor to the MCO; the MCO was the paper document, while the EMD is the IATA-standard electronic equivalent (EMD-S / EMD-A) that has largely replaced it.","explanation_ko":"EMD는 MCO의 전자식 후속 문서이다. MCO는 종이 서류였고, EMD는 이를 대부분 대체한 IATA 표준 전자 문서(EMD-S / EMD-A)이다.","targetId":"emd"},{"targetTerm":"E-ticket","explanation":"An e-ticket records the carriage of a passenger on flight coupons; an MCO/EMD records non-flight value such as fees, deposits, or residual amounts.","explanation_ko":"E-ticket은 항공편 쿠폰상의 여객 운송을 기록하지만, MCO/EMD는 수수료, 보증금, 잔여 금액 등 비항공 가치를 기록한다.","targetId":"e-ticket"}],"sources":[{"org":"IATA","name":"Ticketing Handbook","version":"","section":"","url":""},{"org":"Travelport","name":"EMDs (Electronic Miscellaneous Documents) Support","version":"","section":"","url":"https://support.travelport.com/webhelp/Smartpoint1G1V/Content/Air/EMD/EMD.htm"},{"org":"ARC","name":"Electronic Miscellaneous Document (EMD)","version":"","section":"","url":"https://www2.arccorp.com/support-training/electronic-miscellaneous-document/"}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"9\" y=\"7\" width=\"30\" height=\"34\" rx=\"3\"/>\u003cline x1=\"15\" y1=\"15\" x2=\"33\" y2=\"15\"/>\u003cline x1=\"15\" y1=\"21\" x2=\"33\" y2=\"21\"/>\u003cline x1=\"15\" y1=\"27\" x2=\"26\" y2=\"27\"/>\u003cpath d=\"M22 33h12\"/>\u003cpath d=\"M29 30l3 3-3 3\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"mct","term":"MCT","abbreviation":"MCT","aliases":["Minimum Connecting Time","Minimum Connect Time"],"category":"air-ops","conceptType":"standard-term","status":"active","definition":"Minimum Connecting Time (MCT) is the shortest published time interval required for a passenger and their baggage to transfer between two flights at a given airport for the connection to be considered legal and bookable. It varies by airport, terminal, domestic/international status, and carrier combination.","definition_ko":"MCT(Minimum Connecting Time, 최소 연결 시간)는 특정 공항에서 두 항공편 간 승객과 수하물이 환승하는 데 필요한, 해당 연결이 정상적이고 예약 가능한 것으로 간주되기 위한 최소 공시 시간 간격이다. 공항, 터미널, 국내/국제 여부, 항공사 조합에 따라 달라진다.","term_ko":"최소 연결 시간(MCT)","longDef":"MCT values are published by airports and carriers and aggregated by IATA in standard reference data, and reservation/availability systems use them to validate whether a connection is legal before offering it. Distinct MCTs apply to combinations such as domestic-to-domestic, domestic-to-international, international-to-international, and online versus interline connections. A connection shorter than the applicable MCT is normally rejected by booking systems as an illegal connection.","longDef_ko":"MCT 값은 공항과 항공사가 공시하고 IATA가 표준 참조 데이터로 집계하며, 예약/가용성 시스템은 연결편을 제공하기 전에 해당 연결이 정상적인지 검증하는 데 이를 사용한다. 국내-국내, 국내-국제, 국제-국제, 그리고 online(자사) 연결과 interline 연결과 같은 조합에 각각 다른 MCT가 적용된다. 적용 MCT보다 짧은 연결은 일반적으로 예약 시스템에 의해 비정상 연결(illegal connection)로 거부된다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Segment","targetId":"segment"},{"type":"related","targetTerm":"Journey","targetId":"journey"},{"type":"related","targetTerm":"Interline","targetId":"interline"},{"type":"related","targetTerm":"Availability","targetId":"availability"}],"distinctions":[{"targetTerm":"Slot","explanation":"MCT is the minimum passenger/baggage transfer time governing connection legality, whereas a slot is an allocated airport authorization to use runway/terminal capacity at a specific time.","explanation_ko":"MCT는 연결 적법성을 좌우하는 승객/수하물의 최소 환승 시간인 반면, slot은 특정 시각에 활주로/터미널 용량을 사용하도록 배정된 공항 허가다.","targetId":"slot"}],"sources":[{"name":"Standard Schedules Information Manual (SSIM)","org":"IATA","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003ccircle cx=\"24\" cy=\"27\" r=\"13\"/>\u003cpolyline points=\"24,20 24,27 29,30\"/>\u003cpath d=\"M9 9 H17 M17 9 L14 6 M17 9 L14 12\"/>\u003cpath d=\"M39 14 H31 M31 14 L34 11 M31 14 L34 17\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"meal-code","term":"Meal Code","term_ko":"기내식 코드(특별 기내식 코드)","abbreviation":"","aliases":["Special Meal Code","IATA Meal Code","Special Meal Request Code"],"category":"codes","conceptType":"code","status":"active","definition":"A standardized four-letter IATA code identifying a special or dietary in-flight meal, such as VGML (vegetarian), KSML (kosher), MOML (Muslim), DBML (diabetic), or CHML (child). It is added to a PNR as a Special Service Request (SSR) so the airline can cater the requested meal.","definition_ko":"특별식 또는 식이 기내식을 식별하는 표준화된 4자리 IATA 코드. 예로 VGML(채식), KSML(코셔), MOML(무슬림), DBML(당뇨식), CHML(유아·아동식) 등이 있다. PNR에 특별 서비스 요청(SSR)으로 추가되어 항공사가 요청된 식사를 준비한다.","longDef":"IATA maintains standardized special meal codes so that requests pass consistently between airlines, GDSs, and caterers regardless of language. Each code is communicated as an SSR (e.g., SSR VGML) in the passenger record and may require confirmation by the operating carrier; some codes also need advance notice deadlines. Meal codes are distinct from the meal-service indicator in schedules (whether a flight serves food at all), addressing instead the specific dietary/religious/medical meal a named passenger should receive.","longDef_ko":"IATA는 항공사·GDS·케이터링 업체 간에 언어와 무관하게 요청이 일관되게 전달되도록 표준화된 특별식 코드를 관리한다. 각 코드는 승객 기록에 SSR(예: SSR VGML)로 전달되며 운항 항공사의 확인이 필요할 수 있고, 일부 코드는 사전 통보 마감 시한을 요구한다. 기내식 코드는 스케줄상의 기내식 제공 여부 표시자(해당 편이 식사를 제공하는지 자체)와는 구별되며, 특정 승객이 받아야 할 식이·종교·의료상의 구체적 식사를 지정한다.","standardBody":"IATA","providerTerms":[{"provider":"Amadeus","term":"SSR special meal","context":"Special meals are requested in Amadeus by adding the IATA meal code as an SSR to the PNR","context_ko":"Amadeus에서는 IATA 기내식 코드를 SSR로 PNR에 추가하여 특별식을 요청한다","relationship":"related"},{"provider":"Travelport","term":"SSR meal codes","context":"Travelport documents IATA meal codes among its SSR codes for meals and special services","context_ko":"Travelport는 식사·특별 서비스용 SSR 코드에 IATA 기내식 코드를 포함하여 문서화한다","relationship":"related"}],"relationships":[{"type":"related","targetTerm":"SSR","targetId":"ssr"},{"type":"related","targetTerm":"PNR","targetId":"pnr"},{"type":"related","targetTerm":"Ancillary Service","targetId":"ancillary-service"},{"type":"related","targetTerm":"PRM","targetId":"prm"}],"distinctions":[{"targetTerm":"SSR","explanation":"SSR is the general mechanism for special service requests in a PNR; a meal code is a specific 4-letter value (e.g., VGML) carried within a meal SSR.","explanation_ko":"SSR은 PNR 내 특별 서비스 요청을 위한 일반적 수단이고, 기내식 코드는 식사 SSR에 담기는 구체적 4자리 값(예: VGML)이다.","targetId":"ssr"}],"sources":[{"org":"IATA","name":"Passenger Services Conference Resolutions Manual (PSCRM) — special meal codes","version":"","section":"","url":""},{"org":"Travelport","name":"SSR Codes for Meals and Special Services","version":"","section":"","url":"https://support.travelport.com/webhelp/GWS/Content/XML_Select_Web_Service/Codes/ssr_codes.htm"}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M14 6v14a3 3 0 006 0V6M17 6v34\"/>\u003cpath d=\"M32 6c-3 0-5 4-5 10s2 8 5 8v16\"/>\u003ccircle cx=\"24\" cy=\"24\" r=\"21\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"merchant-model","term":"Merchant Model","abbreviation":"","aliases":["Merchant of Record Model","Net Rate Model"],"category":"pay","conceptType":"business-term","status":"active","definition":"The merchant model is a travel distribution arrangement in which the intermediary (e.g. an OTA) buys inventory from suppliers at net rates, sets the retail price including markup, collects payment from the traveler, and acts as the Merchant of Record. The intermediary's name appears on the customer's card statement and it remits the supplier its share.","term_ko":"머천트 모델","definition_ko":"머천트 모델은 중개업체(예: OTA)가 공급업체로부터 재고를 넷 요금(net rate)으로 매입하여 마크업을 포함한 소매가를 책정하고, 여행객으로부터 결제를 수납하며, Merchant of Record 역할을 하는 여행 유통 방식이다. 고객의 카드 명세서에는 중개업체의 명의가 표시되며, 중개업체는 공급업체에 해당 몫을 송금한다.","longDef":"The merchant model, used widely by OTAs for hotel inventory, gives the intermediary control over pricing and margin and ownership of the payment relationship, along with the associated payment liability, refunds, and chargeback risk. It contrasts with the agency model, where the supplier sets the price and is the Merchant of Record.","longDef_ko":"OTA가 호텔 재고에 널리 사용하는 머천트 모델은 중개업체에 가격과 마진에 대한 통제권 및 결제 관계의 소유권을 부여하며, 이에 따른 결제 책임, 환불, 차지백 위험도 함께 부담하게 한다. 이는 공급업체가 가격을 책정하고 Merchant of Record가 되는 에이전시 모델과 대비된다.","standardBody":"","providerTerms":[],"relationships":[{"type":"contrasts","targetTerm":"Agency Model","targetId":"agency-model"},{"type":"related","targetTerm":"Merchant of Record","targetId":"merchant-of-record"},{"type":"related","targetTerm":"Net Rate","targetId":"net-rate"},{"type":"related","targetTerm":"VCC","targetId":"vcc"},{"type":"related","targetTerm":"OTA (Online Travel Agency)","targetId":"ota-online-travel-agency"}],"distinctions":[{"targetTerm":"Agency Model","explanation":"Under the merchant model the intermediary sets the price and is Merchant of Record; under the agency model the supplier does.","explanation_ko":"머천트 모델에서는 중개업체가 가격을 책정하고 Merchant of Record가 되며, 에이전시 모델에서는 공급업체가 그 역할을 한다.","targetId":"agency-model"},{"targetTerm":"Net Rate","explanation":"Net rates are the wholesale buying price the intermediary marks up under the merchant model.","explanation_ko":"넷 요금(net rate)은 머천트 모델에서 중개업체가 마크업을 적용하는 도매 매입가다.","targetId":"net-rate"}],"sources":[{"name":"Merchant model vs. agency model: A guide for business success","org":"WEX Inc.","version":"","section":"","url":"https://www.wexinc.com/resources/blog/merchant-vs-agency-model-travel-payments/"},{"name":"Merchant of Record in Travel: OTA's Guide to Owning the Payment Flow","org":"AltexSoft","version":"","section":"","url":"https://www.altexsoft.com/blog/merchant-of-record-in-travel/"}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M8 18 11 9h26l3 9\"/>\u003cpath d=\"M8 18a4 4 0 0 0 8 0 4 4 0 0 0 8 0 4 4 0 0 0 8 0 4 4 0 0 0 8 0\"/>\u003cpath d=\"M11 21v18h26V21\"/>\u003cpath d=\"M21 39v-9h6v9\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"merchant-of-record","term":"Merchant of Record","abbreviation":"MoR","aliases":["MoR","Merchant on Record"],"category":"pay","conceptType":"role","status":"active","definition":"The Merchant of Record is the legal entity that accepts the customer's payment and is responsible for processing the card transaction, including tax handling, refunds, and chargeback liability. In travel, the MoR is the name that appears on the customer's card statement for a booking.","term_ko":"기록상 가맹점(Merchant of Record, MoR)","definition_ko":"기록상 가맹점(Merchant of Record, MoR)은 고객의 결제를 수납하고 세금 처리, 환불, 차지백 책임을 포함한 카드 거래 처리를 담당하는 법적 주체다. 여행 업계에서 MoR은 예약 건에 대해 고객의 카드 명세서에 표시되는 명의다.","longDef":"Whether the supplier or the intermediary is the MoR depends on the distribution model. Under the agency model the supplier is the MoR; under the merchant model the OTA or agency is the MoR, collecting payment from the traveler and remitting suppliers their share. Being the MoR carries compliance obligations (PCI DSS, SCA/3-D Secure where applicable) and the financial liability for disputes and chargebacks.","longDef_ko":"공급업체와 중개업체 중 누가 MoR이 되는지는 유통 모델에 따라 달라진다. 에이전시 모델에서는 공급업체가 MoR이고, 머천트 모델에서는 OTA 또는 여행사가 MoR이 되어 여행객으로부터 결제를 수납하고 공급업체에 해당 몫을 송금한다. MoR이 된다는 것은 규정 준수 의무(PCI DSS, 해당되는 경우 SCA/3-D Secure)와 분쟁 및 차지백에 대한 재무적 책임을 수반한다.","standardBody":"","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Agency Model","targetId":"agency-model"},{"type":"related","targetTerm":"Merchant Model","targetId":"merchant-model"},{"type":"related","targetTerm":"Chargeback","targetId":"chargeback"},{"type":"related","targetTerm":"OTA (Online Travel Agency)","targetId":"ota-online-travel-agency"}],"distinctions":[{"targetTerm":"Agency Model","explanation":"In the agency model the supplier is the Merchant of Record; the role describes who bears payment responsibility, not the commercial model itself.","explanation_ko":"에이전시 모델에서는 공급업체가 Merchant of Record이다. 이 역할은 상업적 모델 자체가 아니라 결제 책임을 누가 지는지를 나타낸다.","targetId":"agency-model"},{"targetTerm":"Merchant Model","explanation":"In the merchant model the intermediary becomes the Merchant of Record and shows on the cardholder's statement.","explanation_ko":"머천트 모델에서는 중개업체가 Merchant of Record가 되어 카드 소지자의 명세서에 표시된다.","targetId":"merchant-model"}],"sources":[{"name":"Merchant of Record in Travel: OTA's Guide to Owning the Payment Flow","org":"AltexSoft","version":"","section":"","url":"https://www.altexsoft.com/blog/merchant-of-record-in-travel/"},{"name":"Merchant model vs. agency model: A guide for business success","org":"WEX Inc.","version":"","section":"","url":"https://www.wexinc.com/resources/blog/merchant-vs-agency-model-travel-payments/"}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M8 18 11 9h26l3 9\"/>\u003cpath d=\"M8 18a4 4 0 0 0 8 0 4 4 0 0 0 8 0 4 4 0 0 0 8 0 4 4 0 0 0 8 0\"/>\u003cpath d=\"M11 21v18h26V21\"/>\u003cpath d=\"M19 30l3 3 6-6\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"metasearch","term":"Metasearch","term_ko":"메타서치(가격 비교 검색)","abbreviation":"","aliases":["Metasearch Engine","Travel Metasearch","Price Comparison Engine"],"category":"standards","conceptType":"business-term","status":"active","definition":"A travel metasearch engine aggregates and compares prices and availability for flights, hotels, or other travel products across many OTAs and suppliers, then refers the user to the chosen site to complete the booking. Examples include Kayak, Skyscanner, Google Flights, and Trivago.","definition_ko":"여행 메타서치 엔진은 여러 OTA와 공급사에 걸쳐 항공편, 호텔 등 여행 상품의 가격과 가용성을 통합하여 비교한 뒤, 사용자가 선택한 사이트로 연결해 예약을 완료하도록 한다. Kayak, Skyscanner, Google Flights, Trivago 등이 그 예이다.","longDef":"Metasearch typically monetizes via referral fees, cost-per-click, or commission rather than processing the transaction itself, though some operate 'book-on-metasearch' facilitated bookings. It is distinct from an OTA, which completes and owns the customer transaction.","longDef_ko":"메타서치는 일반적으로 거래를 직접 처리하기보다 추천 수수료, 클릭당 비용(CPC), 커미션을 통해 수익을 올리지만, 일부는 '북 온 메타서치(book-on-metasearch)' 방식의 중개 예약을 운영하기도 한다. 고객 거래를 완료하고 소유하는 OTA와는 구별된다.","standardBody":"","providerTerms":[],"relationships":[{"type":"related","targetTerm":"OTA (Online Travel Agency)","targetId":"ota-online-travel-agency"},{"type":"related","targetTerm":"Aggregator","targetId":"aggregator"},{"type":"related","targetTerm":"GDS","targetId":"gds"}],"distinctions":[{"targetTerm":"OTA (Online Travel Agency)","explanation":"Metasearch compares prices and refers out; an OTA actually sells and processes the booking.","explanation_ko":"메타서치는 가격을 비교하고 외부로 연결하며, OTA는 실제로 예약을 판매하고 처리한다.","targetId":"ota-online-travel-agency"},{"targetTerm":"Aggregator","explanation":"Metasearch is a consumer-facing comparison/referral product; an aggregator is a back-end content consolidator that pools supplier inventory for resellers.","explanation_ko":"메타서치는 소비자 대상 비교/연결 서비스이고, 애그리게이터는 재판매자를 위해 공급사 재고를 모으는 백엔드 콘텐츠 통합자이다.","targetId":"aggregator"}],"sources":[{"name":"Travel Metasearch (industry definition)","org":"Phocuswright / industry usage","version":"","section":"","url":""}],"lastReviewed":"2026-06-15","icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003ccircle cx=\"21\" cy=\"21\" r=\"12\"/>\u003cpath d=\"M30 30l8 8\"/>\u003cpath d=\"M14 18h14M14 24h10\"/>\u003cpath d=\"M27 27l3 3 3-3\" transform=\"translate(-3 -9)\"/>\u003cpath d=\"M22 14l3 3 3-3\"/>\u003c/svg>"},{"id":"mileage-accrual","term":"Mileage Accrual","abbreviation":"","aliases":["Mileage Earning","Miles Accrual","Points Accrual","Earning"],"category":"customer","conceptType":"process","status":"active","definition":"Mileage accrual is the process by which a frequent flyer program member earns and accumulates miles or points into their loyalty account. Miles are typically credited for flown segments (calculated by distance flown or by fare paid), and through partner activity such as co-branded credit card spend, hotel stays, car rentals, and retail partners.","longDef":"Accrual rules determine the earning basis: distance-based programs credit miles per mile flown adjusted by a fare-class multiplier, while revenue-based programs credit points as a multiple of the eligible fare paid, often tied to the passenger's loyalty tier. Accrual is recorded against the member's Frequent Flyer Number and may post immediately or after the flight is flown. Accrued balances are the asset that members later draw down through award redemption. Some programs distinguish redeemable miles (spent on awards) from qualifying/status miles (used to attain or retain tier status), so a given activity may accrue one, the other, or both.","standardBody":"","term_ko":"마일리지 적립(Mileage Accrual)","definition_ko":"마일리지 적립(Mileage Accrual)은 상용고객우대(FFP) 회원이 자신의 로열티 계정에 마일 또는 포인트를 적립·누적하는 과정이다. 일반적으로 탑승한 구간(비행 거리 또는 지불 운임 기준 산정)에 대해 마일이 적립되며, 제휴 신용카드 사용, 호텔 숙박, 렌터카, 제휴 가맹점 같은 파트너 활동을 통해서도 적립된다.","longDef_ko":"적립 규칙이 적립 기준을 정한다. 거리 기반 프로그램은 운임 등급 배수를 반영해 비행 거리당 마일을 적립하고, 매출 기반 프로그램은 회원 등급과 연동해 적격 운임의 일정 배수로 포인트를 적립한다. 적립은 회원의 Frequent Flyer Number에 기록되며 즉시 또는 탑승 후에 반영될 수 있다. 적립된 잔액은 회원이 이후 award redemption(보상 사용)을 통해 사용하는 자산이다. 일부 프로그램은 보상에 쓰는 적립 마일과 등급 달성·유지에 쓰는 자격(등급) 마일을 구분하므로, 하나의 활동이 둘 중 하나만 또는 둘 다 적립할 수 있다.","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Frequent Flyer Program","targetId":"frequent-flyer-program"},{"type":"related","targetTerm":"Frequent Flyer Number","targetId":"frequent-flyer-number"},{"type":"related","targetTerm":"Loyalty Tier Status","targetId":"loyalty-tier-status"},{"type":"contrasts","targetTerm":"Award Redemption","targetId":"award-redemption"}],"distinctions":[{"targetTerm":"Award Redemption","explanation":"Mileage accrual is the earning side of a loyalty account (miles flowing in), whereas award redemption is the spending side (miles flowing out for flights, upgrades, or other rewards).","explanation_ko":"Mileage accrual은 로열티 계정의 적립(마일이 들어오는) 측면이고, award redemption은 마일을 항공권·업그레이드 등 보상에 쓰는(마일이 빠져나가는) 측면이다.","targetId":"award-redemption"},{"targetTerm":"Loyalty Tier Status","explanation":"Redeemable miles accrue as spendable currency, while tier/qualifying miles accrue toward earning or retaining status; both can be earned simultaneously but serve different purposes.","explanation_ko":"적립(사용 가능) 마일은 사용 가능한 통화로 쌓이고, 등급(자격) 마일은 등급 달성·유지를 위해 쌓인다. 둘은 동시에 적립될 수 있지만 목적이 다르다.","targetId":"loyalty-tier-status"}],"sources":[{"org":"Navan","name":"What are Frequent Flyer Miles? How They Work","version":"","section":"","url":"https://navan.com/resources/glossary/what-is-frequent-flyer-miles"}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M6 38h36\"/>\u003crect x=\"9\" y=\"28\" width=\"6\" height=\"10\"/>\u003crect x=\"21\" y=\"20\" width=\"6\" height=\"18\"/>\u003crect x=\"33\" y=\"12\" width=\"6\" height=\"26\"/>\u003cpath d=\"M8 22l10-8 8 4 12-12\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"minimum-length-of-stay-mlos","term":"Minimum Length of Stay (MLOS)","abbreviation":"MLOS","aliases":["Minimum Stay","Min LOS","MinLOS","Minimum Night Stay"],"category":"hotel-rate","conceptType":"standard-term","status":"active","definition":"Minimum Length of Stay (MLOS) is a stay restriction that requires a reservation to cover at least a defined number of nights before it can be booked for the affected dates and products. It is used to protect high-demand dates by discouraging short bookings that would block more valuable longer stays.","longDef":"MLOS is one of the standard length-of-stay restrictions distributed via OpenTravel ARI messages. In OTA_HotelAvailNotifRQ it is expressed using a LengthsOfStay/LengthOfStay element with MinMaxMessageType set to \"SetMinLOS\" and a Time attribute giving the minimum number of nights. The restriction can be applied as MLOS arrival-based (the minimum applies to stays arriving on the date) or through-based (applied to any stay spanning the date), and it operates independently of stop sell and arrival/departure restrictions. MLOS is the lower-bound counterpart to a maximum length of stay (MaxLOS) and is a specific, machine-enforced application of the broader Length of Stay concept.","standardBody":"OpenTravel Alliance","term_ko":"Minimum Length of Stay (MLOS, 최소 투숙일)","definition_ko":"Minimum Length of Stay(MLOS, 최소 투숙일)는 해당 날짜·상품에 대해 예약이 최소 정해진 박수 이상을 포함해야만 예약될 수 있게 하는 투숙 제약이다. 더 가치 있는 장기 투숙을 막아버리는 단기 예약을 억제하여 고수요 날짜를 보호하는 데 사용된다.","longDef_ko":"MLOS는 OpenTravel ARI 메시지로 유통되는 표준 length-of-stay 제약 중 하나다. OTA_HotelAvailNotifRQ에서는 MinMaxMessageType을 \"SetMinLOS\"로 설정한 LengthsOfStay/LengthOfStay 요소와 최소 박수를 나타내는 Time 속성으로 표현된다. 해당 날짜에 도착하는 투숙에 적용하는 arrival-based MLOS, 또는 그 날짜를 포함하는 모든 투숙에 적용하는 through-based 방식으로 설정할 수 있으며, stop sell·도착/출발 제약과 독립적으로 작동한다. MLOS는 최대 투숙일(MaxLOS)의 하한 짝이며, 더 넓은 Length of Stay 개념을 기계적으로 강제하는 구체적 적용이다.","providerTerms":[{"provider":"OpenTravel Alliance","term":"LengthOfStay MinMaxMessageType=\"SetMinLOS\"","context":"In OTA_HotelAvailNotifRQ, MLOS is set via a LengthOfStay element with MinMaxMessageType=\"SetMinLOS\" and a Time attribute for the minimum nights.","context_ko":"OTA_HotelAvailNotifRQ에서 MLOS는 MinMaxMessageType=\"SetMinLOS\"와 최소 박수 Time 속성을 가진 LengthOfStay 요소로 설정된다.","relationship":"same"}],"relationships":[{"type":"child","targetTerm":"Length of Stay","targetId":"length-of-stay"},{"type":"related","targetTerm":"ARI","targetId":"ari"},{"type":"related","targetTerm":"Channel Manager","targetId":"channel-manager"},{"type":"related","targetTerm":"Stop Sell","targetId":"stop-sell"},{"type":"related","targetTerm":"Availability","targetId":"availability"}],"distinctions":[{"targetTerm":"Length of Stay","explanation":"Length of Stay is the general concept of how many nights a stay spans; MLOS is a specific restriction that enforces a minimum number of those nights as a booking condition for given dates.","explanation_ko":"Length of Stay는 투숙이 몇 박인지를 가리키는 일반 개념이고, MLOS는 특정 날짜의 예약 조건으로 그 박수의 최소값을 강제하는 구체적 제약이다.","targetId":"length-of-stay"},{"targetTerm":"Stop Sell","explanation":"Stop Sell blocks all bookings for the dates; MLOS still allows bookings but only when they meet or exceed the minimum-nights threshold.","explanation_ko":"Stop Sell은 해당 날짜의 모든 예약을 차단하지만, MLOS는 최소 박수 기준을 충족하는 예약만 허용한다.","targetId":"stop-sell"}],"sources":[{"org":"OpenTravel Alliance","name":"OTA_HotelAvailNotifRQ (LengthOfStay / SetMinLOS)","version":"","section":"","url":""},{"org":"SiteMinder","name":"pmsXchange — Availability and Restrictions","version":"","section":"","url":"https://developer.siteminder.com/siteminder-apis/pms-rms/introduction/pmsxchange/api-reference/availability-and-restrictions"}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M8 14h32M8 24h32M8 34h32\"/>\u003ccircle cx=\"14\" cy=\"14\" r=\"2.5\" fill=\"currentColor\"/>\u003ccircle cx=\"22\" cy=\"24\" r=\"2.5\" fill=\"currentColor\"/>\u003cpath d=\"M30 30l4 4 6-8\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"mita","term":"MITA","term_ko":"MITA(다자간 인터라인 운송 협정)","abbreviation":"MITA","aliases":["Multilateral Interline Traffic Agreement","Multilateral Interline Traffic Agreements","IATA MITA"],"category":"air-partner","conceptType":"document","status":"active","definition":"The IATA Multilateral Interline Traffic Agreements, a standardized framework that lets participating airlines (and accredited agents) accept each other's traffic documents and through-check passengers and baggage under common terms. Joining MITA establishes default interline relationships with other signatories rather than requiring individual bilateral agreements.","definition_ko":"IATA의 다자간 인터라인 운송 협정으로, 참여 항공사(및 인가 대리점)가 공통 조건 하에 서로의 운송 서류를 인수하고 승객과 수하물을 일관 위탁할 수 있도록 하는 표준화된 체계다. MITA에 가입하면 개별 양자 협정을 맺을 필요 없이 다른 서명 당사자들과 기본 인터라인 관계가 성립된다.","longDef":"MITA covers passenger and/or cargo interlining and defines the standard conditions under which carriers honor one another's tickets and handle baggage and settlement. Participation is recorded so trading partners know who interlines with whom; carriers can be MITA participants for passenger, cargo, or both. MITA provides the baseline relationship over which carriers may layer bilateral Special Prorate Agreements and codeshare deals.","longDef_ko":"MITA는 여객 및/또는 화물 인터라인을 포괄하며, 항공사가 서로의 항공권을 인정하고 수하물과 정산을 처리하는 표준 조건을 정의한다. 어느 항공사가 누구와 인터라인하는지 거래 파트너가 알 수 있도록 참여 여부가 기록되며, 항공사는 여객, 화물 또는 둘 다에 대해 MITA 참여자가 될 수 있다. MITA는 항공사가 그 위에 양자 간 SPA와 공동운항 거래를 추가로 얹을 수 있는 기준 관계를 제공한다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Interline","targetId":"interline"},{"type":"related","targetTerm":"SPA (Special Prorate Agreement)","targetId":"spa-special-prorate-agreement"},{"type":"related","targetTerm":"Proration","targetId":"proration"},{"type":"related","targetTerm":"IATA Clearing House","targetId":"iata-clearing-house"}],"distinctions":[{"targetTerm":"Interline","explanation":"Interline is the general practice of cross-carrier ticket/baggage acceptance; MITA is the specific IATA multilateral agreement that standardizes it among signatories.","explanation_ko":"인터라인은 항공사 간 항공권/수하물 인수의 일반적인 관행이고, MITA는 서명 당사자들 사이에서 이를 표준화하는 구체적인 IATA 다자간 협정이다.","targetId":"interline"},{"targetTerm":"SPA (Special Prorate Agreement)","explanation":"MITA is multilateral and sets the standard relationship; an SPA is bilateral and sets negotiated special prorate values between two carriers.","explanation_ko":"MITA는 다자간 협정으로 표준 관계를 설정하고, SPA는 양자 간 협정으로 두 항공사 사이의 협상된 특별 프로레이트 값을 설정한다.","targetId":"spa-special-prorate-agreement"}],"sources":[{"name":"Multilateral Interline Traffic Agreements (MITA)","org":"IATA","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003ccircle cx=\"24\" cy=\"24\" r=\"16\"/>\u003cpath d=\"M16 24a8 16 0 0 1 16 0\"/>\u003cpath d=\"M16 24a8 16 0 0 0 16 0\"/>\u003cline x1=\"24\" y1=\"8\" x2=\"24\" y2=\"40\"/>\u003cpath d=\"M9 19h30M9 29h30\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"name-change","term":"Name Change","term_ko":"이름 변경","abbreviation":"","aliases":["Name Correction","Passenger Name Change","Name Adjustment"],"category":"customer","conceptType":"process","status":"active","definition":"Altering the passenger name on a booking or ticket, ranging from a minor spelling correction to substituting a different traveler. Because most published airline fares and e-tickets are non-transferable, true name changes are generally prohibited while limited name corrections may be permitted under fare rules.","definition_ko":"예약이나 항공권상의 승객 이름을 변경하는 것으로, 사소한 철자 정정부터 다른 여행자로의 교체까지 포함한다. 대부분의 공시 항공 운임과 전자 항공권은 양도가 불가하므로, 진정한 의미의 이름 변경은 일반적으로 금지되며 제한적인 이름 정정만이 운임 규정에 따라 허용될 수 있다.","longDef":"Carriers distinguish between a name correction (fixing typos, transposed letters, or adding a middle name to match a government ID, especially for Secure Flight compliance) and a name change/transfer (replacing one passenger with another), which is usually not allowed on scheduled fares and would require cancellation and rebooking. Allowed corrections may trigger a reissue and fees, and must keep the name consistent with the traveler's identity document. Name handling interacts with SSR data such as DOCS/Secure Flight elements and with ticket validity.","longDef_ko":"항공사는 이름 정정(특히 Secure Flight 준수를 위해 오타·자리바뀐 철자 수정이나 정부 발급 신분증과 일치시키기 위한 중간 이름 추가)과 이름 변경/양도(한 승객을 다른 승객으로 교체)를 구분하며, 후자는 정기편 운임에서는 통상 허용되지 않고 취소 및 재예약이 필요하다. 허용된 정정은 재발행과 수수료를 유발할 수 있으며, 이름은 여행자의 신분 증명서와 일치하게 유지되어야 한다. 이름 처리는 DOCS/Secure Flight 요소 같은 SSR 데이터 및 항공권 유효성과 연계된다.","standardBody":"","providerTerms":[],"relationships":[{"type":"related","targetTerm":"PNR","targetId":"pnr"},{"type":"related","targetTerm":"Reissue","targetId":"reissue"},{"type":"related","targetTerm":"E-ticket","targetId":"e-ticket"},{"type":"related","targetTerm":"Secure Flight","targetId":"secure-flight"}],"distinctions":[{"targetTerm":"Reissue","explanation":"A name change is a data correction that may require ticket action; a reissue is the broader ticketing transaction (often triggered by such changes) that produces a new e-ticket.","explanation_ko":"이름 변경은 항공권 조치가 필요할 수 있는 데이터 정정이고, 재발행(Reissue)은 이러한 변경으로 흔히 유발되어 새 전자 항공권을 생성하는 보다 포괄적인 발권 거래이다.","targetId":"reissue"}],"sources":[{"name":"ATPCO Automated Rules (fare rule conditions)","org":"ATPCO","version":"","section":"","url":""}],"lastReviewed":"2026-06-15","icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003ccircle cx=\"15\" cy=\"16\" r=\"6\"/>\u003cpath d=\"M5 38c0-6 4-10 10-10 2 0 4 .5 5.5 1.5\"/>\u003cpath d=\"M39 26l4 4-11 11-5 1 1-5z\"/>\u003c/svg>"},{"id":"ndc","term":"NDC","term_ko":"신유통역량(NDC)","abbreviation":"NDC","aliases":["New Distribution Capability"],"category":"standards","conceptType":"standard","status":"active","definition":"New Distribution Capability is an IATA-led, XML-based data transmission standard that enables airlines to distribute rich, personalized content (including ancillaries, branded fares, and dynamic offers) directly to travel sellers, independent of traditional GDS/EDIFACT messaging. It uses an Offer/Order data model.","definition_ko":"NDC는 IATA가 주도하는 XML 기반 데이터 전송 표준으로, 항공사가 부가 서비스, 브랜디드 운임, 동적 오퍼(Offer)를 포함한 풍부하고 개인화된 콘텐츠를 기존 GDS/EDIFACT 메시징과 무관하게 여행 판매자에게 직접 유통할 수 있게 한다. Offer/Order 데이터 모델을 사용한다.","longDef":"NDC defines a suite of XML schemas (e.g., AirShopping, OfferPrice, OrderCreate, OrderRetrieve) under IATA's Passenger Standards Conference. It supports product differentiation and dynamic pricing that legacy ATPCO filed-fare/availability messaging cannot fully express, and is a foundational standard alongside ONE Order in IATA's move toward an Offer-and-Order retailing model.","longDef_ko":"NDC는 IATA 여객표준회의(Passenger Standards Conference) 산하에서 일련의 XML 스키마(예: AirShopping, OfferPrice, OrderCreate, OrderRetrieve)를 정의한다. 기존 ATPCO 등록 운임/가용성 메시징으로는 충분히 표현할 수 없는 상품 차별화와 동적 가격 책정을 지원하며, IATA가 추진하는 Offer-and-Order 리테일링 모델에서 ONE Order와 함께 핵심 기반 표준이다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"GDS Bypass","targetId":"gds-bypass"},{"type":"related","targetTerm":"GDS","targetId":"gds"},{"type":"related","targetTerm":"Offer","targetId":"offer"},{"type":"related","targetTerm":"Order","targetId":"order"},{"type":"related","targetTerm":"ONE Order","targetId":"one-order"},{"type":"related","targetTerm":"Aggregator","targetId":"aggregator"},{"type":"related","targetTerm":"Ancillary Service","targetId":"ancillary-service"},{"type":"related","targetTerm":"Fare Family","targetId":"fare-family"},{"type":"contrasts","targetTerm":"OpenTravel Alliance","targetId":"opentravel-alliance"}],"distinctions":[{"targetTerm":"GDS Bypass","explanation":"NDC is the XML-based data transmission standard; GDS Bypass is a strategic routing decision that often uses NDC.","explanation_ko":"NDC는 XML 기반 데이터 전송 표준이고, GDS 우회는 흔히 NDC를 활용하여 GDS 채널을 우회하는 비즈니스 전략적 결정이다.","targetId":"gds-bypass"},{"targetTerm":"GDS","explanation":"NDC is a messaging standard for distributing content; a GDS is a distribution platform that may carry NDC or legacy content.","explanation_ko":"NDC는 콘텐츠를 유통하기 위한 메시징 표준이고, GDS는 NDC 콘텐츠나 레거시 콘텐츠를 실어 나를 수 있는 유통 플랫폼이다.","targetId":"gds"},{"targetTerm":"OpenTravel Alliance","explanation":"NDC is IATA's air-distribution XML standard; OpenTravel is a separate, broader cross-sector travel XML schema body.","explanation_ko":"NDC는 IATA의 항공 유통 XML 표준이고, OpenTravel은 이와 별개로 여러 산업 분야를 아우르는 더 광범위한 여행 XML 스키마 단체이다.","targetId":"opentravel-alliance"},{"targetTerm":"ONE Order","explanation":"NDC standardizes shopping/booking offers and orders; ONE Order standardizes the single customer order record that replaces PNR/e-ticket/EMD.","explanation_ko":"NDC는 조회/예약 단계의 오퍼와 주문을 표준화하고, ONE Order는 PNR/e-ticket/EMD를 대체하는 단일 고객 주문 기록을 표준화한다.","targetId":"one-order"}],"sources":[{"name":"New Distribution Capability (NDC)","org":"IATA","version":"","section":"","url":""},{"name":"NDC Standards / Passenger Standards Conference","org":"IATA","version":"","section":"","url":""}],"lastReviewed":"2026-06-15","icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"8\" y=\"10\" width=\"32\" height=\"24\" rx=\"3\"/>\u003cpath d=\"M8 18h32\"/>\u003ccircle cx=\"12\" cy=\"14\" r=\"0.5\" fill=\"currentColor\"/>\u003cpath d=\"M14 26h8M14 30h12\"/>\u003cpath d=\"M30 24l5 4-5 4\"/>\u003cpath d=\"M18 38h12M24 34v4\"/>\u003c/svg>"},{"id":"net-rate","term":"Net Rate","term_ko":"순 요금(Net Rate, 도매 요금)","abbreviation":"","aliases":["Wholesale Rate","Nett Rate","Net Price"],"category":"hotel-dist","conceptType":"business-term","status":"active","definition":"A net rate is a wholesale, non-commissionable room rate that a hotel contracts to a reseller (such as a bedbank, tour operator, or OTA under the merchant model). The reseller adds its own markup to reach the price shown to the traveler, so its margin is the difference between the selling price and the net rate rather than a commission.","definition_ko":"순 요금(Net Rate)은 호텔이 재판매업체(베드뱅크, 투어 오퍼레이터, 또는 머천트 모델 하의 OTA 등)에 계약하는 도매·비커미션 객실 요금이다. 재판매업체는 자체 마크업을 붙여 여행자에게 보이는 가격을 산정하므로, 그 마진은 커미션이 아니라 판매 가격과 순 요금의 차액이다.","longDef":"Net rates are the basis of the merchant/wholesale distribution model: the hotel receives the agreed net amount and the intermediary keeps any markup. This contrasts with the agency/commissionable model, where the guest pays the hotel's published rate and the agent earns a percentage commission. Net rates are central to bedbanks and packaged/opaque inventory, and their leakage into public channels is a frequent rate parity concern.","longDef_ko":"순 요금은 머천트/도매 분배 모델의 기반이다. 호텔은 합의된 순 금액을 받고 중개자는 마크업을 모두 가져간다. 이는 고객이 호텔의 공시 요금을 지불하고 대리점이 일정 비율의 커미션을 받는 에이전시/커미션 모델과 대비된다. 순 요금은 베드뱅크와 패키지/불투명 인벤토리의 핵심이며, 그것이 공개 채널로 유출되는 것은 빈번한 요금 패리티 우려 사항이다.","standardBody":"","providerTerms":[],"relationships":[{"type":"contrasts","targetTerm":"Commissionable Rate","targetId":"commissionable-rate"},{"type":"related","targetTerm":"Bedbank","targetId":"bedbank"},{"type":"related","targetTerm":"Merchant Model","targetId":"merchant-model"},{"type":"related","targetTerm":"Rate Plan","targetId":"rate-plan"},{"type":"related","targetTerm":"Rate Parity","targetId":"rate-parity"},{"type":"related","targetTerm":"BAR","targetId":"bar"}],"distinctions":[{"targetTerm":"Commissionable Rate","explanation":"A net rate is non-commissionable (margin via markup); a commissionable rate pays the seller a percentage commission on the published price.","explanation_ko":"순 요금은 비커미션 요금이며(마진은 마크업으로 발생), 커미션 요금은 판매자에게 공시 가격에 대한 일정 비율의 커미션을 지급한다.","targetId":"commissionable-rate"},{"targetTerm":"Merchant Model","explanation":"Net rate is the contracted wholesale price; the merchant model is the broader payment/distribution arrangement in which net rates are typically used.","explanation_ko":"순 요금은 계약된 도매 가격이고, 머천트 모델은 순 요금이 일반적으로 사용되는 더 넓은 결제/분배 체계다.","targetId":"merchant-model"}],"sources":[{"name":"Hotel distribution rate model industry references","org":"","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M25 5H11a2 2 0 00-2 2v14l18 18a2 2 0 002.8 0l11.4-11.4a2 2 0 000-2.8L25 5z\"/>\u003ccircle cx=\"16\" cy=\"12\" r=\"2\" fill=\"currentColor\" stroke=\"none\"/>\u003cpath d=\"M19 27l10 10M29 27L19 37\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"no-show","term":"No-Show","abbreviation":"","aliases":["No Show","NoShow"],"category":"hotel-dist","conceptType":"business-term","status":"active","definition":"A no-show is a confirmed reservation where the guest neither arrives nor cancels by the hotel's check-in/cancellation deadline. For a guaranteed reservation the hotel typically charges the guarantee (commonly the first night or the full stay) per its guarantee and cancellation policy.","longDef":"No-show is a core revenue-management and reservations concept. When a guest fails to arrive and has not cancelled within the allowed window, the room has usually been held — turning away other demand — so the hotel applies its guarantee policy: a credit-card-guaranteed or prepaid booking is charged the agreed no-show penalty, while a non-guaranteed booking is simply released. Measured no-show rates (often around 1–5%) feed overbooking models, which deliberately oversell to compensate for expected no-shows and cancellations. In distribution, the no-show charge and its handling depend on the booking's guarantee terms and on which party (hotel, OTA, bedbank) is merchant of record for the payment.","standardBody":"","term_ko":"노쇼 (No-Show)","definition_ko":"노쇼는 투숙객이 호텔의 체크인/취소 마감 시한까지 도착하지도 취소하지도 않은 확정 예약을 말한다. 보증(guaranteed) 예약의 경우 호텔은 guarantee 및 cancellation policy에 따라 보통 첫날 숙박 요금 또는 전체 숙박 요금을 청구한다.","longDef_ko":"노쇼는 수익 관리와 예약의 핵심 개념이다. 투숙객이 허용 기간 내에 취소하지 않고 도착하지 않으면 객실은 보통 다른 수요를 거절하면서까지 잡혀 있었으므로, 호텔은 guarantee policy를 적용한다. 신용카드 보증 또는 선결제 예약은 약정된 노쇼 위약금이 청구되고, 비보증(non-guaranteed) 예약은 그대로 해제된다. 측정된 노쇼율(흔히 약 1~5%)은 예상 노쇼·취소를 보완하기 위해 의도적으로 초과 판매하는 overbooking 모델에 입력된다. 유통 측면에서 노쇼 청구와 그 처리는 예약의 보증 조건, 그리고 결제의 merchant of record가 누구(호텔, OTA, Bedbank)인지에 따라 달라진다.","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Guarantee Policy","targetId":"guarantee-policy"},{"type":"related","targetTerm":"Cancellation Policy","targetId":"cancellation-policy"},{"type":"related","targetTerm":"Overbooking","targetId":"overbooking"},{"type":"related","targetTerm":"Merchant of Record","targetId":"merchant-of-record"},{"type":"related","targetTerm":"ADR","targetId":"adr"}],"distinctions":[{"targetTerm":"Cancellation Policy","explanation":"A cancellation is an active notice from the guest before the deadline (often penalty-free); a no-show is the absence of both arrival and cancellation, which normally incurs the full guarantee charge.","explanation_ko":"취소는 마감 전 투숙객의 능동적 통지(흔히 위약금 없음)이고, 노쇼는 도착과 취소가 모두 없는 상태로 보통 전액 보증 요금이 청구된다.","targetId":"cancellation-policy"},{"targetTerm":"Overbooking","explanation":"Overbooking is the deliberate practice of selling more rooms than available to offset expected no-shows and cancellations; no-show is one of the underlying events that overbooking is calibrated against.","explanation_ko":"Overbooking은 예상 노쇼·취소를 상쇄하기 위해 가용 객실보다 많이 판매하는 의도적 관행이고, 노쇼는 overbooking이 보정 기준으로 삼는 기저 사건 중 하나다.","targetId":"overbooking"}],"sources":[{"org":"Xotels","name":"No Show — Hotel Glossary","version":"","section":"","url":"https://www.xotels.com/en/glossary/no-show"},{"org":"Lighthouse","name":"Hotel Revenue Management Glossary","version":"","section":"No-Show","url":"https://www.mylighthouse.com/resources/blog/hotel-revenue-management-glossary"}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003ccircle cx=\"19\" cy=\"15\" r=\"5\"/>\u003cpath d=\"M10 34c0-6 4-10 9-10 2 0 4 .6 5.5 1.6\"/>\u003ccircle cx=\"34\" cy=\"32\" r=\"9\"/>\u003cline x1=\"28\" y1=\"26\" x2=\"40\" y2=\"38\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"non-refundable-rate","term":"Non-Refundable Rate","abbreviation":"","aliases":["Advance Purchase Rate","Prepaid Rate","Non-Refundable Booking"],"category":"hotel-rate","conceptType":"business-term","status":"active","definition":"A non-refundable rate is a room rate sold at a discount in exchange for full prepayment and no right to a refund if the guest cancels, amends or fails to arrive. The commercial risk shifts to the guest, and the hotel secures committed revenue earlier than with a flexible rate.","longDef":"Non-refundable rates are frequently distributed as advance-purchase products: the guest pays in full at the time of booking and changes or cancellations are not permitted, or are permitted only with forfeiture of the prepaid amount. They sit at the opposite end of the flexibility spectrum from flexible/cancellable rates, which typically allow free cancellation up to roughly 24-48 hours before arrival. The terms are governed by the rate plan's Cancellation Policy and prepayment rules, and the discount reflects the guest accepting that risk. Non-refundable is a rate attribute that can be attached to many products (BAR, package, corporate), and it must be presented consistently with rate-parity commitments across channels.","standardBody":"","term_ko":"Non-Refundable Rate (환불 불가 요금)","definition_ko":"Non-Refundable Rate(환불 불가 요금)는 전액 선결제와 취소·변경·노쇼 시 환불 권리 포기를 조건으로 할인 판매되는 객실 요금이다. 상업적 위험이 고객에게 이전되며, 호텔은 유연 요금보다 일찍 확정 매출을 확보한다.","longDef_ko":"환불 불가 요금은 흔히 사전구매(advance purchase) 상품으로 유통된다. 고객은 예약 시점에 전액을 결제하고 변경·취소가 허용되지 않거나 선결제 금액을 포기해야만 가능하다. 이는 통상 도착 약 24~48시간 전까지 무료 취소를 허용하는 유연·취소가능 요금과 유연성 스펙트럼의 정반대에 위치한다. 조건은 요금제의 Cancellation Policy 및 선결제 규칙에 의해 규율되며, 할인은 고객이 그 위험을 감수하는 데 대한 대가다. 환불 불가는 여러 상품(BAR, 패키지, corporate)에 부착될 수 있는 요금 속성이며, 채널 간 rate-parity 약정과 일관되게 제시되어야 한다.","providerTerms":[],"relationships":[{"type":"child","targetTerm":"Rate Plan","targetId":"rate-plan"},{"type":"related","targetTerm":"Cancellation Policy","targetId":"cancellation-policy"},{"type":"related","targetTerm":"Guarantee Policy","targetId":"guarantee-policy"},{"type":"related","targetTerm":"BAR","targetId":"bar"},{"type":"related","targetTerm":"Rate Parity","targetId":"rate-parity"}],"distinctions":[{"targetTerm":"Cancellation Policy","explanation":"A Cancellation Policy is the set of rules defining if and when a booking can be cancelled and any penalty; a Non-Refundable Rate is a product whose cancellation policy is the strictest case - no cancellation or refund permitted at all.","explanation_ko":"Cancellation Policy는 예약을 언제 취소할 수 있고 위약금이 어떻게 되는지를 정하는 규칙 집합이고, Non-Refundable Rate는 그 취소 정책이 가장 엄격한 경우(취소·환불 전면 불가)인 상품이다.","targetId":"cancellation-policy"}],"sources":[{"org":"Little Hotelier","name":"Hotel Cancellation Policy: Complete Guide","version":"","section":"","url":"https://www.littlehotelier.com/blog/running-your-property/hotel-cancellation-policy/"},{"org":"Prostay","name":"Hotel Guide to Non-Refundable Rates","version":"","section":"","url":"https://www.prostay.com/blog/2025-hotel-guide-non-refundable-rates/"}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003ccircle cx=\"24\" cy=\"24\" r=\"15\"/>\u003cpath d=\"M24 15v10l5 3\"/>\u003cpath d=\"M14 14l20 20\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"nuc","term":"NUC","term_ko":"중립 산정 단위 (NUC)","abbreviation":"NUC","aliases":["Neutral Unit of Construction"],"category":"air-shop","conceptType":"standard-term","status":"active","definition":"NUC (Neutral Unit of Construction) is a common, currency-neutral unit used in international fare construction to add and compare fare components filed in different currencies. Fare-component amounts are converted to NUCs, summed, then converted to the currency of the country of commencement using IATA Rates of Exchange (ROE).","definition_ko":"NUC(Neutral Unit of Construction, 중립 산정 단위)는 서로 다른 통화로 신고된 운임 컴포넌트를 합산하고 비교하기 위해 국제선 운임 산정에 사용되는 공통의 통화 중립 단위이다. 운임 컴포넌트 금액은 NUC로 환산되어 합산된 뒤, IATA 환산율(ROE)을 사용해 여행 개시국의 통화로 환산된다.","longDef":"Because an international journey can traverse fares published in multiple local currencies, the NUC provides a single accumulation unit so that fare components can be combined and checked against fare ladders. Each currency has an IATA-published Rate of Exchange (ROE) used to convert local currency to and from NUCs; NUC totals are converted back to the selling/local currency at the end of construction. NUCs are central to IATA's mileage- and route-based international fare construction and appear on the linear fare calculation of tickets.","longDef_ko":"국제선 여정은 여러 현지 통화로 공시된 운임을 거칠 수 있으므로, NUC는 운임 컴포넌트를 결합하고 운임 단계(fare ladder)와 대조할 수 있도록 단일 누적 단위를 제공한다. 각 통화에는 현지 통화를 NUC로 환산하거나 그 반대로 환산하는 데 사용되는 IATA 공시 환산율(ROE)이 있으며, NUC 합계는 산정 종료 시점에 다시 판매/현지 통화로 환산된다. NUC는 마일리지 및 노선 기반의 IATA 국제선 운임 산정의 핵심이며, 항공권의 선형 운임 계산(linear fare calculation)에 표시된다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Fare Component","targetId":"fare-component"},{"type":"related","targetTerm":"ISO 4217 Currency Code","targetId":"iso-4217-currency-code"},{"type":"related","targetTerm":"Proration","targetId":"proration"},{"type":"related","targetTerm":"E-ticket","targetId":"e-ticket"}],"distinctions":[{"targetTerm":"ISO 4217 Currency Code","explanation":"ISO 4217 codes name real local currencies; the NUC is a neutral construction unit, not a tradeable currency.","explanation_ko":"ISO 4217 코드는 실제 현지 통화를 지칭하고, NUC는 거래 가능한 통화가 아니라 중립적인 산정 단위이다.","targetId":"iso-4217-currency-code"},{"targetTerm":"Proration","explanation":"NUC is the unit for building a fare; proration uses fare values to split revenue among carriers on a ticket.","explanation_ko":"NUC는 운임을 구성하기 위한 단위이고, 정산 배분(proration)은 운임 가치를 사용해 한 항공권의 수익을 항공사 간에 분배한다.","targetId":"proration"}],"sources":[{"name":"IATA fare construction / Ticketing Handbook (NUC and ROE)","org":"IATA","version":"","section":"","url":""},{"name":"IATA Passenger Tariff / fare construction rules","org":"IATA","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003ccircle cx=\"24\" cy=\"24\" r=\"15\"/>\u003cpath d=\"M24 14v20\"/>\u003cpath d=\"M19 19h7a3 3 0 010 6h-7\"/>\u003cpath d=\"M30 28l-6-6\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"occupancy","term":"Occupancy","term_ko":"투숙(Occupancy) / 객실 점유","abbreviation":"","aliases":["Occupancy Rate","Number of Guests","Pax Occupancy"],"category":"hotel-rate","conceptType":"business-term","status":"ambiguous","definition":"In hotel inventory and rates, occupancy has two common meanings: (1) the number and composition of guests assigned to a room (e.g. single, double, or 2 adults + 1 child), which can drive occupancy-based pricing; and (2) occupancy rate, the operational metric of rooms sold divided by rooms available over a period.","definition_ko":"호텔 재고 및 요금에서 occupancy는 두 가지 일반적인 의미를 가진다. (1) 객실에 배정된 투숙객의 수와 구성(예: 싱글, 더블, 또는 성인 2명 + 아동 1명)으로, occupancy 기반 가격 산정에 영향을 줄 수 있다. (2) 객실 점유율(occupancy rate)로, 일정 기간 동안 판매된 객실 수를 가용 객실 수로 나눈 운영 지표이다.","longDef":"As a pricing/inventory attribute, occupancy specifies how many adults and children occupy a room and is used to apply per-person or occupancy-based rates and to validate that a booking fits a room type's maximum occupancy. As a performance metric, Occupancy Rate = Rooms Sold / Rooms Available, expressed as a percentage, and combines with ADR to derive RevPAR (RevPAR = ADR x Occupancy Rate). The intended sense is usually clear from context, but the term is genuinely overloaded.","longDef_ko":"가격/재고 속성으로서 occupancy는 객실에 성인과 아동이 각각 몇 명 투숙하는지를 명시하며, 1인당 요금이나 occupancy 기반 요금을 적용하고 예약이 객실 유형의 최대 수용 인원에 맞는지 검증하는 데 사용된다. 성과 지표로서 객실 점유율은 판매 객실 수 / 가용 객실 수이며 백분율로 표현되고, ADR과 결합해 RevPAR을 산출한다(RevPAR = ADR x 객실 점유율). 의도된 의미는 보통 맥락에서 명확하지만, 이 용어는 실제로 여러 의미가 중첩되어 있다.","standardBody":"","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Room Type","targetId":"room-type"},{"type":"related","targetTerm":"ADR","targetId":"adr"},{"type":"related","targetTerm":"RevPAR","targetId":"revpar"}],"distinctions":[{"targetTerm":"RevPAR","explanation":"Occupancy rate is one factor (rooms sold vs available); RevPAR is revenue per available room and equals ADR multiplied by occupancy rate.","explanation_ko":"객실 점유율은 하나의 요소(판매 객실 대 가용 객실)이며, RevPAR은 가용 객실당 매출로 ADR에 객실 점유율을 곱한 값과 같다.","targetId":"revpar"},{"targetTerm":"ADR","explanation":"ADR measures average price per occupied room; occupancy rate measures how full the hotel is — the two are independent inputs to RevPAR.","explanation_ko":"ADR은 판매된 객실당 평균 가격을 측정하고, 객실 점유율은 호텔이 얼마나 찼는지를 측정한다. 둘은 RevPAR에 독립적으로 입력되는 요소이다.","targetId":"adr"}],"sources":[{"name":"Uniform System of Accounts for the Lodging Industry (USALI)","org":"AHLA / HFTP","version":"","section":"","url":""},{"name":"STR lodging performance metric definitions","org":"STR (CoStar)","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003ccircle cx=\"17\" cy=\"16\" r=\"5\"/>\u003cpath d=\"M8 36v-2a9 9 0 0 1 18 0v2\"/>\u003ccircle cx=\"33\" cy=\"18\" r=\"4\"/>\u003cpath d=\"M28 36v-2a7 7 0 0 1 13-3\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"offer","term":"Offer","term_ko":"오퍼(Offer)","abbreviation":"","aliases":["Air Offer","NDC Offer"],"category":"standards","conceptType":"standard-term","status":"active","definition":"In IATA's Offer and Order retailing model, an Offer is a seller-controlled, time-bound proposal presented to a customer that bundles one or more products (flights, ancillaries, services) with a price and conditions. The customer selects an Offer (or OfferItems) to create an Order.","definition_ko":"IATA의 Offer and Order 리테일링 모델에서 오퍼(Offer)는 판매자가 통제하는 유효기간이 정해진 제안으로, 하나 이상의 상품(항공편, 부가 서비스, 서비스)을 가격 및 조건과 함께 묶어 고객에게 제시한다. 고객이 오퍼(또는 OfferItem)를 선택하면 주문(Order)이 생성된다.","longDef":"Offers are central to NDC, where the airline constructs and prices Offers in response to shopping requests, enabling dynamic and personalized pricing; in interline scenarios IATA terms the airline that owns and is accountable for an Offer the Offer Responsible Airline (ORA). An Offer is composed of OfferItems and is distinct from the resulting Order, which represents the committed sale.","longDef_ko":"오퍼는 NDC의 핵심으로, 항공사는 조회 요청에 대응하여 오퍼를 구성하고 가격을 책정함으로써 동적이고 개인화된 가격 책정을 가능하게 한다. 인터라인(interline) 상황에서 IATA는 오퍼를 소유하고 책임지는 항공사를 Offer Responsible Airline(ORA)이라 부른다. 오퍼는 OfferItem으로 구성되며, 확정된 판매를 나타내는 결과물인 주문(Order)과는 구별된다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Order","targetId":"order"},{"type":"related","targetTerm":"NDC","targetId":"ndc"},{"type":"related","targetTerm":"ONE Order","targetId":"one-order"},{"type":"related","targetTerm":"Availability","targetId":"availability"},{"type":"related","targetTerm":"Ancillary Service","targetId":"ancillary-service"}],"distinctions":[{"targetTerm":"Order","explanation":"An Offer is a non-binding priced proposal before purchase; an Order is the committed record created when the customer accepts an Offer.","explanation_ko":"오퍼는 구매 이전의 구속력 없는 가격 제안이고, 주문은 고객이 오퍼를 수락할 때 생성되는 확정 기록이다.","targetId":"order"},{"targetTerm":"Availability","explanation":"Availability indicates whether seats/classes are sellable; an Offer is a constructed, priced bundle proposal built on top of availability.","explanation_ko":"가용성(Availability)은 좌석/등급의 판매 가능 여부를 나타내고, 오퍼는 그 가용성을 토대로 구성하여 가격을 책정한 묶음 제안이다.","targetId":"availability"}],"sources":[{"name":"Offer and Order (Airline Retailing)","org":"IATA","version":"","section":"","url":""},{"name":"NDC Standards","org":"IATA","version":"","section":"","url":""}],"lastReviewed":"2026-06-15","icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M24 8l9 5v10c0 7-5 12-9 13-4-1-9-6-9-13V13z\"/>\u003cpath d=\"M20 23l3 3 6-7\"/>\u003ccircle cx=\"36\" cy=\"36\" r=\"7\"/>\u003cpath d=\"M33 36l2 2 4-4\"/>\u003c/svg>"},{"id":"offer-management-system","term":"Offer Management System","term_ko":"오퍼 관리 시스템(Offer Management System)","abbreviation":"OMS","aliases":["Offer Management System (OMS)","OfMS","Offer Engine"],"category":"standards","conceptType":"system","status":"active","definition":"An Offer Management System is the airline-retailing platform that constructs, prices, and manages Offers in response to shopping requests, dynamically bundling flights, ancillaries, and third-party products with conditions and validity. It is the 'shop' side counterpart to the Order Management System in IATA's Offer and Order model.","definition_ko":"오퍼 관리 시스템(Offer Management System)은 조회 요청에 대응하여 오퍼(Offer)를 구성·가격책정·관리하는 항공 리테일링 플랫폼으로, 항공편·부가 서비스·제3자 상품을 조건과 유효기간과 함께 동적으로 묶는다. IATA의 Offer and Order 모델에서 주문 관리 시스템(Order Management System)에 대응하는 '조회(shop)' 측 시스템이다.","longDef":"Often abbreviated OMS (or labelled the 'Offer' half of a combined Offer & Order Management System), it owns offer creation, dynamic pricing/dynamic offers, eligibility, personalization, and merchandising logic, typically feeding NDC AirShopping/OfferPrice responses. When a customer accepts an Offer, control passes to the Order Management System, which creates and services the resulting Order. The two together replace fragmented legacy pricing, availability, and PNR/ticketing functions in modern airline retailing.","longDef_ko":"흔히 OMS로 약칭되거나 통합 Offer & Order Management System의 'Offer' 절반으로 불리며, 오퍼 생성, 동적 가격/동적 오퍼, 자격 판단, 개인화, 머천다이징 로직을 담당하고 보통 NDC AirShopping/OfferPrice 응답을 만들어 낸다. 고객이 오퍼를 수락하면 제어권이 주문 관리 시스템으로 넘어가 결과 주문(Order)을 생성·서비스한다. 두 시스템이 함께 현대 항공 리테일링에서 분산된 레거시 가격·가용성·PNR/발권 기능을 대체한다.","standardBody":"","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Offer","targetId":"offer"},{"type":"related","targetTerm":"Order Management System (OMS)","targetId":"order-management-system-oms"},{"type":"related","targetTerm":"NDC","targetId":"ndc"},{"type":"related","targetTerm":"Shopping API","targetId":"shopping-api"},{"type":"related","targetTerm":"Ancillary Service","targetId":"ancillary-service"}],"distinctions":[{"targetTerm":"Order Management System (OMS)","explanation":"An Offer Management System builds and prices Offers in the shopping phase; an Order Management System creates, holds, and services the Order after the customer buys. The 'OMS' abbreviation is shared and often refers to a combined Offer & Order platform.","explanation_ko":"오퍼 관리 시스템은 조회 단계에서 오퍼를 구성·가격책정하고, 주문 관리 시스템은 고객 구매 이후 주문을 생성·보관·서비스한다. 'OMS' 약어는 둘이 공유하며 흔히 통합 Offer & Order 플랫폼을 가리킨다.","targetId":"order-management-system-oms"},{"targetTerm":"Offer","explanation":"The Offer is the data object (the priced proposal); the Offer Management System is the platform that produces and governs Offers.","explanation_ko":"Offer는 데이터 객체(가격이 매겨진 제안)이고, 오퍼 관리 시스템은 그 오퍼를 만들어 내고 관리하는 플랫폼이다.","targetId":"offer"}],"sources":[{"org":"IATA","name":"Airline Retailing - Order and Offer Management","version":"","section":"","url":""},{"org":"IATA","name":"Distribution with Offers and Orders (NDC)","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"8\" y=\"8\" width=\"32\" height=\"32\" rx=\"3\"/>\u003cpath d=\"M14 18h12\"/>\u003cpath d=\"M14 24h20\"/>\u003cpath d=\"M14 30h16\"/>\u003cpath d=\"M30 14l4 4 6-7\" stroke-width=\"2.5\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"one-order","term":"ONE Order","term_ko":"ONE Order(원 오더)","abbreviation":"","aliases":["ONE Order","IATA ONE Order"],"category":"standards","conceptType":"standard","status":"active","definition":"ONE Order is an IATA standard and industry initiative that establishes a single, consolidated customer Order record to replace the separate legacy constructs of PNR, e-ticket, and EMD. It streamlines order management, delivery, and accounting across the order lifecycle.","definition_ko":"ONE Order는 PNR, e-ticket, EMD로 분리된 레거시 구조를 대체하기 위해 단일 통합 고객 주문(Order) 기록을 확립하는 IATA 표준이자 산업 이니셔티브이다. 주문 전체 주기에 걸쳐 주문 관리, 이행, 회계를 간소화한다.","longDef":"Complementing NDC (which standardizes Offer creation and shopping/booking), ONE Order defines the Order Management messages and data model so that all products and services purchased are tracked in one record with order-level accounting, removing reliance on coupon-based ticket/EMD documents and BSP/ARC document-based settlement over time.","longDef_ko":"오퍼 생성과 조회/예약을 표준화하는 NDC를 보완하여, ONE Order는 Order Management 메시지와 데이터 모델을 정의함으로써 구매한 모든 상품과 서비스가 주문 단위 회계와 함께 하나의 기록에서 추적되도록 한다. 이로써 시간이 지나면서 쿠폰 기반 항공권/EMD 문서와 BSP/ARC의 문서 기반 정산에 대한 의존을 없앤다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"NDC","targetId":"ndc"},{"type":"related","targetTerm":"Order","targetId":"order"},{"type":"related","targetTerm":"Offer","targetId":"offer"},{"type":"related","targetTerm":"BSP","targetId":"bsp"},{"type":"related","targetTerm":"ARC","targetId":"arc"},{"type":"replaces","targetTerm":"PNR","targetId":"pnr"},{"type":"replaces","targetTerm":"E-ticket","targetId":"e-ticket"},{"type":"replaces","targetTerm":"EMD","targetId":"emd"}],"distinctions":[{"targetTerm":"NDC","explanation":"ONE Order standardizes the single post-sale Order record and its management; NDC standardizes the shopping/offer and booking messaging that creates it.","explanation_ko":"ONE Order는 판매 이후의 단일 주문 기록과 그 관리를 표준화하고, NDC는 그것을 생성하는 조회/오퍼 및 예약 메시징을 표준화한다.","targetId":"ndc"},{"targetTerm":"Order","explanation":"ONE Order is the IATA standard/initiative; Order is the underlying single-record data object it defines and promotes.","explanation_ko":"ONE Order는 IATA 표준이자 이니셔티브이고, Order는 그것이 정의하고 확산시키는 기반 단일 기록 데이터 객체이다.","targetId":"order"},{"targetTerm":"E-ticket","explanation":"ONE Order's single Order record is designed to replace document-based e-tickets (and EMDs) with order-level accounting and fulfillment.","explanation_ko":"ONE Order의 단일 주문 기록은 주문 단위의 회계와 이행을 통해 문서 기반 e-ticket(및 EMD)을 대체하도록 설계되었다.","targetId":"e-ticket"}],"sources":[{"name":"ONE Order","org":"IATA","version":"","section":"","url":""},{"name":"ONE Order Standards","org":"IATA","version":"","section":"","url":""}],"lastReviewed":"2026-06-15","icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003ccircle cx=\"24\" cy=\"24\" r=\"15\"/>\u003cpath d=\"M20 16h6a4 4 0 0 1 0 8h-6zM20 16v16M20 24h3l4 8\"/>\u003cpath d=\"M14 13l3-3 3 3\"/>\u003c/svg>"},{"id":"open-segment","term":"Open Segment","abbreviation":"","aliases":["Open-dated Segment","Open Date Segment","Open Air Segment"],"category":"air-ops","conceptType":"standard-term","status":"active","definition":"An Open Segment is an air segment entered in a PNR with a routing and carrier but no fixed flight number or date (an 'open' booking), used when a passenger holds the right to travel a sector without a committed date. It carries no confirmed reservation status and must later be date-stamped and confirmed before the passenger can fly.","longDef":"Open segments preserve itinerary continuity and ticket coupon sequence when a future sector's date is undecided, and historically supported open-dated tickets. They are not actively held seats and many carriers restrict or refuse them (some treat open-dated GDS bookings as a violation subject to fees); fare rules govern whether a coupon may be issued open and how it is later confirmed. They differ from an ARNK, which marks a deliberate surface gap rather than an unscheduled air sector still to be flown on the validating itinerary.","standardBody":"","term_ko":"Open Segment (오픈 구간 / open-dated segment)","definition_ko":"Open Segment는 PNR에 routing과 항공사는 있으나 확정된 편명·날짜가 없는('open') 항공 segment로, 승객이 날짜를 확정하지 않은 채 특정 구간을 이용할 권리를 보유할 때 쓰인다. 확약 예약 status가 없으며, 탑승 전에 날짜를 지정하고 확약해야 한다.","longDef_ko":"Open segment는 미래 구간의 날짜가 미정일 때 여정 연속성과 항공권 coupon 순서를 유지하며, 과거 open-dated ticket을 뒷받침했다. 실제로 좌석을 보유하는 것이 아니어서 많은 항공사가 이를 제한·거부한다(일부는 open-dated GDS 예약을 위반으로 보고 수수료를 부과). coupon을 open으로 발권할 수 있는지와 이후 확약 방법은 운임 규정이 정한다. ARNK가 검증 여정상 surface 구간을 의도적으로 표시하는 것인 반면, open segment는 아직 일정이 정해지지 않았으나 향후 비행할 항공 구간이라는 점에서 다르다.","providerTerms":[{"provider":"GDS (industry)","term":"Open segment","context":"Air segment booked with carrier and routing but no flight/date; typically requires at least one confirmed segment in the PNR.","context_ko":"항공사와 routing만 있고 편명/날짜가 없는 항공 segment로, 보통 PNR에 확약 segment가 최소 1개 필요.","relationship":"same"}],"relationships":[{"type":"related","targetTerm":"Segment","targetId":"segment"},{"type":"related","targetTerm":"ARNK","targetId":"arnk"},{"type":"related","targetTerm":"Flight Coupon","targetId":"flight-coupon"},{"type":"related","targetTerm":"Booking Status Code","targetId":"booking-status-code"}],"distinctions":[{"targetTerm":"ARNK","explanation":"ARNK marks a non-air ('arrival unknown') surface gap so the itinerary's continuity is acknowledged; an Open Segment is an actual air sector the passenger intends to fly but without a fixed date/flight yet. ARNK is never flown; an open segment is meant to be confirmed and flown.","explanation_ko":"ARNK는 비항공('arrival unknown') surface 구간을 표시해 여정 연속성을 인정하는 것이고, Open Segment는 승객이 실제로 비행할 의도가 있으나 아직 날짜/편명이 없는 항공 구간이다. ARNK는 결코 비행하지 않지만 open segment는 확약 후 비행하기로 한 구간이다.","targetId":"arnk"},{"targetTerm":"Passive Segment","explanation":"A Passive Segment is a non-active segment created to mirror a booking confirmed elsewhere (e.g., for ticketing), holding no live inventory; an Open Segment is undated and unconfirmed by design rather than a copy of an external confirmation.","explanation_ko":"Passive Segment는 다른 곳에서 확약된 예약을 (예: 발권 목적으로) 반영하려 만든 비활성 segment로 실제 inventory를 보유하지 않는다. Open Segment는 외부 확약의 사본이 아니라 본래 날짜 없이 미확약 상태로 설계된 구간이다.","targetId":"passive-segment"}],"sources":[{"org":"IATA","name":"Passenger Services Conference Resolutions Manual (PSCRM)","version":"","section":"","url":""},{"org":"Travelport","name":"Travelport+ (Galileo) Format Guide","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003ccircle cx=\"11\" cy=\"24\" r=\"3\"/>\u003ccircle cx=\"37\" cy=\"24\" r=\"3\"/>\u003cpath d=\"M15 24h4M22 24h4M29 24h4\"/>\u003cpath d=\"M37 14v-3M37 37v-3\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"open-ticket","term":"Open Ticket","abbreviation":"","aliases":["Open-Dated Ticket","Open Date Ticket"],"category":"air-ticket","conceptType":"document","status":"active","definition":"An open ticket is a ticket on which one or more flight coupons have no fixed flight, date, or time — the coupon is issued with an OPEN status and the travel date is confirmed later, within the ticket's validity period and subject to fare rules and availability. It is most often used for the return portion of a journey.","longDef":"On an open ticket, the open coupon carries no specific flight number or date (status OPEN), and the passenger fixes the date later by making a reservation, after which the coupon is revalidated or reissued to the confirmed flight. The ticket remains usable within its validity period (commonly up to one year from issue or first travel), and changes may incur fare differences, penalties, or seasonal/RBD adjustments per the fare rules. Open tickets are far less common in modern revenue ticketing — many carriers now use date-changeable flexible fares instead — but the open coupon concept persists for certain fare types, interline situations, and disruption handling.","standardBody":"IATA","term_ko":"Open Ticket (오픈 티켓 / 미확정 항공권)","definition_ko":"Open Ticket(오픈 티켓)은 하나 이상의 항공편 쿠폰에 확정된 항공편·날짜·시간이 없는 항공권으로, 해당 쿠폰은 OPEN 상태로 발행되며 여행 날짜는 항공권 유효기간 내에서 운임 규정과 좌석 가용성에 따라 추후 확정된다. 주로 여정의 귀국 구간에 사용된다.","longDef_ko":"Open Ticket에서 오픈 쿠폰은 특정 항공편 번호나 날짜를 담지 않으며(상태 OPEN), 승객은 추후 예약을 통해 날짜를 확정하고, 이후 해당 쿠폰은 확정된 항공편에 맞춰 revalidation 또는 reissue된다. 항공권은 유효기간(보통 발행일 또는 최초 여행일로부터 1년 이내) 내에서 사용 가능하며, 변경 시 운임 차액, 위약금, 또는 운임 규정에 따른 시즌/RB
