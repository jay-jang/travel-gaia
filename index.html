    function draw(){
      ctx.clearRect(0, 0, W, H);
      const dark = document.documentElement.dataset.theme === 'dark';
      const cls = CLASSES.find(c => c.id === classroomClassId);
      if(!cls) return;

      const step = cls.steps[classroomStep];
      if(!step) return;

      // Active vs Inactive state
      const activeNodes = classroomFinished ? cls.nodes.map(n => n.id) : step.activeNodes;
      const activeConns = classroomFinished ? [] : (step.activeConnections || []);

      const nodes = cls.nodes.map(n => {
        return {
          ...n,
          px: n.x * W,
          py: n.y * H,
          isActive: activeNodes.includes(n.id)
        };
      });
      const nodeMap = new Map(nodes.map(n => [n.id, n]));

      // 1. Draw connections
      cls.connections.forEach(conn => {
        const n1 = nodeMap.get(conn.from);
        const n2 = nodeMap.get(conn.to);
        if(!n1 || !n2) return;

        const isActiveConn = activeConns.some(ac => 
          (ac.from === conn.from && ac.to === conn.to) || (ac.from === conn.to && ac.to === conn.from)
        );

        ctx.beginPath();
        ctx.moveTo(n1.px, n1.py);
        ctx.lineTo(n2.px, n2.py);

        ctx.save();
        if(isActiveConn){
          ctx.strokeStyle = catColor(n1.cat);
          ctx.lineWidth = 3;
          ctx.globalAlpha = 1.0;
          ctx.shadowBlur = 8;
          ctx.shadowColor = catColor(n1.cat);
        } else {
          ctx.strokeStyle = dark ? '#262d47' : '#e3e6f0';
          ctx.lineWidth = 1.5;
          ctx.globalAlpha = 0.2;
          ctx.shadowBlur = 0;
        }
        ctx.stroke();
        ctx.restore();
      });

      // 2. Draw active connections particles
      if(activeConns.length > 0){
        activeConns.forEach(ac => {
          const n1 = nodeMap.get(ac.from);
          const n2 = nodeMap.get(ac.to);
          if(!n1 || !n2) return;

          const color = catColor(n1.cat);
          const numParticles = 3;
          for(let i=0; i<numParticles; i++){
            const tVal = (particleT + i / numParticles) % 1.0;
            const px = n1.px * (1 - tVal) + n2.px * tVal;
            const py = n1.py * (1 - tVal) + n2.py * tVal;

            ctx.save();
            ctx.beginPath();
            ctx.arc(px, py, 4.5, 0, 2*Math.PI);
            ctx.fillStyle = '#ffffff';
            ctx.shadowBlur = 8;
            ctx.shadowColor = color;
            ctx.fill();
            ctx.restore();
          }
        });
      }

      // 3. Draw nodes
      nodes.forEach(n => {
        const color = catColor(n.cat);
        const radius = n.isActive ? 22 : 16;

        ctx.save();
        if(n.isActive){
          ctx.globalAlpha = 1.0;
          ctx.shadowBlur = 12;
          ctx.shadowColor = color;
        } else {
          ctx.globalAlpha = 0.2;
          ctx.shadowBlur = 0;
        }

        ctx.beginPath();
        ctx.arc(n.px, n.py, radius, 0, 2*Math.PI);
        ctx.fillStyle = color;
        ctx.fill();

        if(n.isActive){
          ctx.strokeStyle = dark ? '#ffffff' : '#0b1020';
          ctx.lineWidth = 2.5;
          ctx.stroke();
        }
        ctx.restore();

        // Label below
        ctx.save();
        if(n.isActive){
          ctx.globalAlpha = 1.0;
          ctx.fillStyle = dark ? '#f3f5ff' : '#0b1020';
          ctx.font = '700 13px ' + getComputedStyle(document.body).fontFamily;
        } else {
          ctx.globalAlpha = 0.3;
          ctx.fillStyle = dark ? '#a3acca' : '#535d77';
          ctx.font = '500 12px ' + getComputedStyle(document.body).fontFamily;
        }
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        const labelText = typeof n.label === 'object' ? (LANG === 'ko' ? n.label.ko : n.label.en) : n.label;
        ctx.fillText(labelText, n.px, n.py + radius + 16);
        ctx.restore();
      });
    }

    function loop(){
      particleT = (particleT + 0.006) % 1.0;
      draw();
      classroomRAF = requestAnimationFrame(loop);
    }

    updateClassroomStep();
    loop();
  }

  let kgRAF=null; function stopGraph(){ if(kgRAF){ cancelAnimationFrame(kgRAF); kgRAF=null; } }
  function renderGraph(){
    const catColor=id=>(catById.get(id)||{}).color||'#888';
    const nodes=ENTRIES.map(e=>({id:e.id,e,cat:e.category,x:0,y:0,vx:0,vy:0,deg:0}));
    const nById=new Map(nodes.map(n=>[n.id,n])); const seen=new Set(), edges=[];
    const addE=(a,b,kind)=>{ if(!a||!b||a===b) return; const k=[a,b].sort().join('|'); if(seen.has(k)) return; seen.add(k); edges.push({a,b,kind}); };
    ENTRIES.forEach(e=>{ (e.relationships||[]).forEach(r=>{ if(r.targetId&&nById.has(r.targetId)) addE(e.id,r.targetId,'rel'); });
      (e.distinctions||[]).forEach(d=>{ if(d.targetId&&nById.has(d.targetId)) addE(e.id,d.targetId,'dist'); }); });
    edges.forEach(ed=>{ nById.get(ed.a).deg++; nById.get(ed.b).deg++; });
    const ci=new Map(CATS.map((c,i)=>[c.id,i]));
    nodes.forEach((n,i)=>{ const ang=(ci.get(n.cat)||0)/CATS.length*2*Math.PI; n.x=Math.cos(ang)*220+((i*53)%90-45); n.y=Math.sin(ang)*220+((i*31)%90-45); });

    // Determine starting root node
    const hash = location.hash || '#/';
    let rootId = null;
    const qIdx = hash.indexOf('?');
    if (qIdx !== -1) {
      const qStr = hash.slice(qIdx + 1);
      const pairs = qStr.split('&');
      pairs.forEach(p => {
        const parts = p.split('=');
        if (parts.length === 2) {
          const key = decodeURIComponent(parts[0]);
          const val = decodeURIComponent(parts[1]);
          if (key === 'focus' || key === 'root') {
            rootId = val.trim().toLowerCase();
          }
        }
      });
    }

    let rootNode = null;
    if (rootId) {
      rootNode = nById.get(rootId);
    }
    if (!rootNode) {
      let maxDeg = -1;
      nodes.forEach(n => {
        if (n.deg > maxDeg) {
          maxDeg = n.deg;
          rootNode = n;
        }
      });
    }

    const visibleNodeIds = new Set();
    const expandedNodeIds = new Set();
    if (rootNode) {
      rootNode.x = 0;
      rootNode.y = 0;
      rootNode.vx = 0;
      rootNode.vy = 0;
      visibleNodeIds.add(rootNode.id);
    }
    window.kgVisibleNodeIds = visibleNodeIds;

    const legend=CATS.map(c=>`<span class="legend-item" data-cat="${c.id}"><span class="ld" style="background:${c.color}"></span>${esc(catName(c))}</span>`).join('');
    main.innerHTML=`<div class="crumbs"><a href="#/">${esc(t('home2'))}</a> › ${esc(t('gTitle'))}</div>
      <div class="graph-head"><div class="sec-title" style="margin:0">🕸 ${esc(t('gTitle'))}</div><div style="color:var(--faint);font-size:.82rem">${nodes.length} ${esc(t('gNodes'))} · ${edges.length} ${esc(t('gEdges'))}</div></div>
      <p style="color:var(--muted);font-size:.86rem;margin:0 0 6px">${t('gHint')}</p><div class="kg-legend" id="kgLegend">${legend}</div>
      <div class="graph-wrap"><canvas id="kg"></canvas><div class="kg-tip" id="kgTip"></div></div>`;
    renderSidebar(null);
    const wrap=$('.graph-wrap'), canvas=$('#kg'), ctx=canvas.getContext('2d'), tip=$('#kgTip');
    const active=new Set(CATS.map(c=>c.id)); let W=0,H=0,dpr=Math.min(window.devicePixelRatio||1,2);
    function resize(){ W=wrap.clientWidth; H=Math.max(440,Math.min(720,Math.round(window.innerHeight*0.7))); canvas.style.height=H+'px'; canvas.width=W*dpr; canvas.height=H*dpr; ctx.setTransform(dpr,0,0,dpr,0,0); }
    resize(); const cx=()=>W/2, cy=()=>H/2; let hover=null, drag=null, dragMoved=false;
    const isActive=n=>visibleNodeIds.has(n.id) && active.has(n.cat); const nodeR=n=>4+Math.sqrt(n.deg)*1.7;
    function step(){ const A=nodes.filter(isActive);
      for(let i=0;i<A.length;i++){ const a=A[i]; for(let j=i+1;j<A.length;j++){ const b=A[j];
        let dx=a.x-b.x,dy=a.y-b.y,d2=dx*dx+dy*dy+0.01; const f=1500/d2; const d=Math.sqrt(d2); dx/=d; dy/=d; a.vx+=dx*f; a.vy+=dy*f; b.vx-=dx*f; b.vy-=dy*f; } }
      edges.forEach(ed=>{ const a=nById.get(ed.a),b=nById.get(ed.b); if(!isActive(a)||!isActive(b)) return;
        let dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy)+0.01; const f=(d-82)*0.012; dx/=d; dy/=d; a.vx+=dx*f; a.vy+=dy*f; b.vx-=dx*f; b.vy-=dy*f; });
      A.forEach(n=>{ n.vx+=-n.x*0.0026; n.vy+=-n.y*0.0026; if(n===drag) return; n.vx*=0.86; n.vy*=0.86; n.x+=n.vx; n.y+=n.vy;
        const m=24,rx=W/2-m,ry=H/2-m; if(n.x<-rx){n.x=-rx;n.vx*=-.4} if(n.x>rx){n.x=rx;n.vx*=-.4} if(n.y<-ry){n.y=-ry;n.vy*=-.4} if(n.y>ry){n.y=ry;n.vy*=-.4} }); }
    const nbr=new Map(); edges.forEach(ed=>{ (nbr.get(ed.a)||nbr.set(ed.a,new Set()).get(ed.a)).add(ed.b); (nbr.get(ed.b)||nbr.set(ed.b,new Set()).get(ed.b)).add(ed.a); });

    const hasHiddenNeighbors = (nodeId) => {
      const neighbors = nbr.get(nodeId);
      if (!neighbors) return false;
      for (const neighborId of neighbors) {
        if (!visibleNodeIds.has(neighborId)) return true;
      }
      return false;
    };

    function getNeighbors1and2(nodeId) {
      const neighbors = new Set();
      const d1 = nbr.get(nodeId);
      if (d1) {
        d1.forEach(id1 => {
          neighbors.add(id1);
          const d2 = nbr.get(id1);
          if (d2) {
            d2.forEach(id2 => {
              neighbors.add(id2);
            });
          }
        });
      }
      return neighbors;
    }

    function draw(){ ctx.clearRect(0,0,W,H); const ox=cx(),oy=cy(); const dark=document.documentElement.dataset.theme==='dark';
      edges.forEach(ed=>{ const a=nById.get(ed.a),b=nById.get(ed.b); if(!isActive(a)||!isActive(b)) return; const hot=hover&&(ed.a===hover.id||ed.b===hover.id);
        ctx.beginPath(); ctx.moveTo(a.x+ox,a.y+oy); ctx.lineTo(b.x+ox,b.y+oy);
        if(ed.kind==='dist'){ ctx.setLineDash([4,4]); ctx.strokeStyle=hot?'#ff2d8e':(dark?'rgba(255,95,166,.5)':'rgba(217,115,13,.4)'); } else { ctx.setLineDash([]); ctx.strokeStyle=hot?(dark?'rgba(139,107,255,.9)':'rgba(79,43,255,.7)'):(dark?'rgba(120,140,180,.16)':'rgba(80,60,140,.14)'); }
        ctx.lineWidth=hot?1.8:1; ctx.stroke(); }); ctx.setLineDash([]);
      nodes.forEach(n=>{ if(!isActive(n)) return; const dim=hover&&n!==hover&&!(nbr.get(hover.id)&&nbr.get(hover.id).has(n.id));
        ctx.globalAlpha=dim?0.2:1;
        if(hasHiddenNeighbors(n.id)){
          ctx.beginPath(); ctx.arc(n.x+ox,n.y+oy,nodeR(n)+4,0,2*Math.PI);
          ctx.strokeStyle=catColor(n.cat); ctx.lineWidth=1.5; ctx.setLineDash([3,3]); ctx.stroke(); ctx.setLineDash([]);
        }
        ctx.beginPath(); ctx.arc(n.x+ox,n.y+oy,nodeR(n),0,7); ctx.fillStyle=catColor(n.cat); ctx.fill();
        if(n===hover){ ctx.lineWidth=2.5; ctx.strokeStyle=dark?'#fff':'#0b1020'; ctx.stroke(); } ctx.globalAlpha=1; });
      ctx.font='600 11px '+getComputedStyle(document.body).fontFamily; ctx.textAlign='center';
      const showLabel=n=> (hover&&(n===hover||(nbr.get(hover.id)&&nbr.get(hover.id).has(n.id)))) || (!hover&&n.deg>=5);
      nodes.forEach(n=>{ if(!isActive(n)||!showLabel(n)) return; const x=n.x+ox,y=n.y+oy-nodeR(n)-5; const lab=n.e.term;
        ctx.fillStyle=dark?'rgba(15,19,34,.9)':'rgba(255,255,255,.9)'; const w=ctx.measureText(lab).width+8; ctx.fillRect(x-w/2,y-12,w,15);
        ctx.fillStyle=dark?'#f3f5ff':'#0b1020'; ctx.fillText(lab,x,y); }); }
    function loop(){ step(); draw(); kgRAF=requestAnimationFrame(loop); } loop();
    function pick(mx,my){ const ox=cx(),oy=cy(); let best=null,bd=1e9; nodes.forEach(n=>{ if(!isActive(n)) return; const dx=mx-(n.x+ox),dy=my-(n.y+oy),d=dx*dx+dy*dy; const r=nodeR(n)+6; if(d<r*r&&d<bd){bd=d;best=n;} }); return best; }
    function rel(ev){ const r=canvas.getBoundingClientRect(); const cl=ev.touches?ev.touches[0]:ev; return {x:cl.clientX-r.left,y:cl.clientY-r.top}; }
    function onMove(ev){ const p=rel(ev); if(drag){ drag.x=p.x-cx(); drag.y=p.y-cy(); drag.vx=drag.vy=0; dragMoved=true; ev.preventDefault&&ev.preventDefault(); return; }
      const n=pick(p.x,p.y); hover=n; if(n){ const nm=LANG==='ko'&&n.e.term_ko&&n.e.term_ko!==n.e.term?`${n.e.term} · ${n.e.term_ko}`:n.e.term;
        tip.innerHTML=`${esc(nm)} <span style="opacity:.7">— ${esc(catName(catById.get(n.cat)||{}))}</span>`; tip.style.left=(n.x+cx())+'px'; tip.style.top=(n.y+cy())+'px'; tip.style.opacity=1; canvas.style.cursor='pointer'; }
      else { tip.style.opacity=0; canvas.style.cursor='grab'; } }
    function onDown(ev){ const p=rel(ev); drag=pick(p.x,p.y); dragMoved=false; }
    function onUp(){
      if(drag&&!dragMoved){
        const clickedNodeId=drag.id;
        if(hasHiddenNeighbors(clickedNodeId)){
          const neighbors=getNeighbors1and2(clickedNodeId);
          neighbors.forEach(id=>{
            if(!visibleNodeIds.has(id)){
              const n=nById.get(id);
              if(n){
                const dx=(Math.random()-0.5)*10;
                const dy=(Math.random()-0.5)*10;
                n.x=drag.x+dx; n.y=drag.y+dy;
                n.vx=(Math.random()-0.5)*2; n.vy=(Math.random()-0.5)*2;
              }
              visibleNodeIds.add(id);
            }
          });
          expandedNodeIds.add(clickedNodeId);
        } else {
          location.hash='#/term/'+clickedNodeId;
        }
      }
      drag=null;
    }
    canvas.addEventListener('mousemove',onMove); canvas.addEventListener('mousedown',onDown); window.addEventListener('mouseup',onUp);
    canvas.addEventListener('touchstart',onDown,{passive:true}); canvas.addEventListener('touchmove',onMove,{passive:false}); canvas.addEventListener('touchend',onUp);
    $('#kgLegend').addEventListener('click',e=>{ const el=e.target.closest('.legend-item'); if(!el) return; const id=el.dataset.cat; if(active.has(id)){active.delete(id);el.classList.add('off');} else {active.add(id);el.classList.remove('off');} });
    window.addEventListener('resize',resize);
  }

  /* router */
  function dispatch(){ const hash=location.hash||'#/';
    if(hash==='#/index'||hash.startsWith('#/index')){ document.title='Index — Travel Gaia'; if($('#q'))$('#q').value=''; return renderIndex(); }
    if(hash==='#/graph'||hash.startsWith('#/graph?')){ document.title='Knowledge Graph — Travel Gaia'; if($('#q'))$('#q').value=''; return renderGraph(); }
    if(hash==='#/classroom'||hash.startsWith('#/classroom')){ document.title='Classroom — Travel Gaia'; if($('#q'))$('#q').value=''; return renderClassroom(); }
    const m=hash.match(/^#\/(term|category|q)\/(.+)$/);
    if(!m||hash==='#/'){ document.title='Travel Gaia — 여행 산업 용어 백과사전'; if($('#q'))$('#q').value=''; return renderHome(); }
    const kind=m[1], dec=decodeURIComponent(m[2]);
    if(kind==='term') return renderTerm(dec); if(kind==='category') return renderCategory(dec);
    if(kind==='q'){ if($('#q'))$('#q').value=dec; return renderSearch(dec); } renderHome(); }
  function route(){ stopGraph(); stopClassroom(); closeNav(); const go=()=>dispatch();
    if(document.startViewTransition && !location.hash.startsWith('#/graph') && !location.hash.startsWith('#/classroom')){ document.startViewTransition(go); } else go(); }
  window.addEventListener('hashchange',route);

  /* search box */
  let tmr=null;
  $('#q').addEventListener('input',e=>{ clearTimeout(tmr); const v=e.target.value;
    tmr=setTimeout(()=>{ if(v.trim()) location.hash='#/q/'+encodeURIComponent(v.trim()); else if(location.hash.startsWith('#/q/')) location.hash='#/'; },180); });
  document.addEventListener('keydown',e=>{ if(e.key==='/'&&document.activeElement!==$('#q')){ e.preventDefault(); $('#q').focus(); } if(e.key==='Escape'&&document.activeElement===$('#q')){ $('#q').blur(); } });

  /* language */
  function applyStaticI18n(){ document.documentElement.lang=LANG; $('#brandSub').textContent=t('sub'); $('#q').placeholder=t('searchPh'); $('#langBtn').textContent=LANG==='ko'?'EN':'KO'; }
  $('#langBtn').addEventListener('click',()=>{ LANG=LANG==='ko'?'en':'ko'; try{localStorage.setItem('tg-lang',LANG);}catch(_){} applyStaticI18n(); route(); });

  /* theme & nav */
  function applyTheme(th){ document.documentElement.dataset.theme=th; try{localStorage.setItem('tg-theme',th);}catch(_){} }
  $('#themeBtn').addEventListener('click',()=>applyTheme(document.documentElement.dataset.theme==='dark'?'light':'dark'));
  try{ const saved=localStorage.getItem('tg-theme'); applyTheme(saved||(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light')); }catch(_){ applyTheme('light'); }
  function openNav(){ document.body.classList.add('nav-open'); } function closeNav(){ document.body.classList.remove('nav-open'); }
  $('#menuBtn').addEventListener('click',openNav); $('#scrim').addEventListener('click',closeNav);

  applyStaticI18n(); route();
})();
</script>
