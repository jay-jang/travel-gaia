bbreviation":"","aliases":["Data Protection Consent","Privacy Consent","GDPR Data Consent"],"category":"customer","conceptType":"business-term","status":"active","definition":"Under the EU General Data Protection Regulation (GDPR), the freely given, specific, informed and unambiguous indication by which a data subject agrees to the processing of their personal data. Consent is one of several lawful bases for processing and must be as easy to withdraw as to give.","definition_ko":"EU 일반 개인정보보호법(GDPR)에 따라, 정보 주체가 자신의 개인정보 처리에 동의함을 나타내는 자유롭게 제공되고, 구체적이며, 정보에 입각하고, 명확한 의사 표시이다. 동의는 여러 적법한 처리 근거 중 하나이며, 부여하는 것만큼 철회하기도 쉬워야 한다.","longDef":"In travel, GDPR Consent commonly applies to marketing communications, profiling, sharing of traveler data with partners, and certain uses of biometric/special-category data (e.g. in digital identity programs). Many operational processing activities (ticketing, security prescreening such as Secure Flight, contract performance) rely on other lawful bases rather than consent. Consent must be granular, recorded/auditable, and revocable, and it interacts with stored traveler data in a Customer Profile and with verified-identity frameworks like IATA One ID.","longDef_ko":"여행 분야에서 GDPR 동의는 일반적으로 마케팅 커뮤니케이션, 프로파일링, 제휴사와의 여행자 데이터 공유, 그리고 (디지털 신원 프로그램 등에서의) 생체/특수 범주 데이터의 특정 사용에 적용된다. 발권, Secure Flight 같은 보안 사전 심사, 계약 이행 등 많은 운영상의 처리 활동은 동의가 아닌 다른 적법한 근거에 의존한다. 동의는 세분화되고, 기록·감사 가능하며, 철회 가능해야 하고, Customer Profile에 저장된 여행자 데이터 및 IATA One ID 같은 검증된 신원 프레임워크와 연계된다.","standardBody":"","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Customer Profile","targetId":"customer-profile"},{"type":"related","targetTerm":"IATA One ID","targetId":"iata-one-id"},{"type":"related","targetTerm":"Frequent Flyer Program","targetId":"frequent-flyer-program"}],"distinctions":[{"targetTerm":"Secure Flight","explanation":"GDPR Consent is an EU privacy lawful basis for processing personal data; Secure Flight is a US security program that processes data under legal obligation, not consent.","explanation_ko":"GDPR 동의는 개인정보 처리를 위한 EU 프라이버시상의 적법 근거이고, Secure Flight는 동의가 아닌 법적 의무에 따라 데이터를 처리하는 미국의 보안 프로그램이다.","targetId":"secure-flight"}],"sources":[{"name":"General Data Protection Regulation (EU) 2016/679","org":"EU","version":"","section":"Art. 4(11), Art. 6, Art. 7","url":"https://eur-lex.europa.eu/eli/reg/2016/679/oj"}],"lastReviewed":"2026-06-15","icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M24 5l15 5v11c0 11-7 17-15 22-8-5-15-11-15-22V10z\"/>\u003crect x=\"18\" y=\"21\" width=\"12\" height=\"9\" rx=\"1.5\"/>\u003cpath d=\"M21 21v-3a3 3 0 0 1 6 0v3\"/>\u003c/svg>"},{"id":"gds","term":"GDS","term_ko":"글로벌 유통 시스템(GDS)","abbreviation":"GDS","aliases":["Global Distribution System","Computer Reservation System (legacy)"],"category":"standards","conceptType":"provider-term","status":"active","definition":"A Global Distribution System is a centralized intermediary platform that aggregates inventory, fares, and availability from airlines, hotels, car rental, and other suppliers and distributes it to travel agencies for shopping, booking, and ticketing. Major GDSs include Amadeus, Sabre, and Travelport (Galileo/Apollo/Worldspan).","definition_ko":"GDS는 항공사, 호텔, 렌터카 등 여러 공급사의 재고, 운임, 좌석 가용성을 통합하여 여행사가 조회, 예약, 발권할 수 있도록 유통하는 중앙집중식 중개 플랫폼이다. 주요 GDS로는 Amadeus, Sabre, Travelport(Galileo/Apollo/Worldspan)가 있다.","longDef":"GDSs evolved from airline-owned Computer Reservation Systems (CRS) in the 1960s-70s. They traditionally rely on EDIFACT and proprietary messaging and ATPCO-filed fares, holding bookings in a PNR and issuing tickets through BSP/ARC. NDC and direct connect APIs increasingly supplement or bypass classic GDS distribution.","longDef_ko":"GDS는 1960~70년대 항공사 소유의 예약 시스템(CRS)에서 발전했다. 전통적으로 EDIFACT와 자체 메시징, ATPCO에 등록된 운임에 의존하며, 예약을 PNR에 보관하고 BSP/ARC를 통해 발권한다. NDC와 직접 연결(direct connect) API가 점차 기존 GDS 유통을 보완하거나 우회하고 있다.","standardBody":"","providerTerms":[{"provider":"Amadeus","term":"Amadeus GDS","context":"One of the three major global GDS platforms","context_ko":"3대 글로벌 GDS 플랫폼 중 하나","relationship":"narrower"},{"provider":"Sabre","term":"Sabre GDS","context":"Major global GDS platform","context_ko":"주요 글로벌 GDS 플랫폼","relationship":"narrower"},{"provider":"Travelport","term":"Galileo / Apollo / Worldspan","context":"Travelport's GDS platforms","context_ko":"Travelport의 GDS 플랫폼","relationship":"narrower"}],"relationships":[{"type":"related","targetTerm":"GDS Bypass","targetId":"gds-bypass"},{"type":"related","targetTerm":"NDC","targetId":"ndc"},{"type":"related","targetTerm":"OTA (Online Travel Agency)","targetId":"ota-online-travel-agency"},{"type":"related","targetTerm":"PNR","targetId":"pnr"},{"type":"related","targetTerm":"ATPCO","targetId":"atpco"},{"type":"related","targetTerm":"Pseudo City Code","targetId":"pseudo-city-code"},{"type":"related","targetTerm":"BSP","targetId":"bsp"}],"distinctions":[{"targetTerm":"GDS Bypass","explanation":"GDS is the intermediary being bypassed; GDS Bypass is the strategy of routing around it.","explanation_ko":"GDS는 우회 대상이 되는 중개 플랫폼이며, GDS 우회는 해당 플랫폼을 거치지 않는 유통 전략이다.","targetId":"gds-bypass"},{"targetTerm":"NDC","explanation":"GDS is the distribution platform/intermediary; NDC is an XML messaging standard that changes how content (including via GDS) is shopped and sold.","explanation_ko":"GDS는 유통 플랫폼이자 중개자이고, NDC는 콘텐츠를 조회하고 판매하는 방식을 바꾸는 XML 메시징 표준이다(GDS를 통한 콘텐츠도 포함).","targetId":"ndc"},{"targetTerm":"OTA (Online Travel Agency)","explanation":"A GDS distributes supplier content to sellers; an OTA is a seller that consumes GDS (or direct) content to sell to consumers.","explanation_ko":"GDS는 공급사 콘텐츠를 판매자에게 유통하고, OTA는 GDS(또는 직접 연결) 콘텐츠를 받아 소비자에게 판매하는 판매자이다.","targetId":"ota-online-travel-agency"},{"targetTerm":"CRS","explanation":"GDS aggregates multiple suppliers across the industry; a CRS is a single carrier's or hotel's own reservation system.","explanation_ko":"GDS는 업계 전반의 여러 공급사를 통합하고, CRS는 개별 항공사 또는 호텔 자체의 예약 시스템이다.","targetId":"crs"}],"sources":[{"name":"Airline Distribution overview","org":"IATA","version":"","section":"","url":""},{"name":"Global Distribution System","org":"Amadeus / Sabre / Travelport documentation","version":"","section":"","url":""}],"lastReviewed":"2026-06-15","icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003ccircle cx=\"24\" cy=\"24\" r=\"10\"/>\u003cpath d=\"M14 24h20M24 14v20\"/>\u003cpath d=\"M18 17a14 14 0 0 0 0 14M30 17a14 14 0 0 1 0 14\"/>\u003cpath d=\"M24 24L10 38M24 24l14-14M24 24L10 10M24 24l14 14\"/>\u003ccircle cx=\"10\" cy=\"10\" r=\"2\"/>\u003ccircle cx=\"38\" cy=\"10\" r=\"2\"/>\u003ccircle cx=\"10\" cy=\"38\" r=\"2\"/>\u003ccircle cx=\"38\" cy=\"38\" r=\"2\"/>\u003c/svg>"},{"id":"gds-bypass","term":"GDS Bypass","term_ko":"GDS 우회","abbreviation":"","aliases":["GDS Bypassing","Direct Distribution","Direct Connect Distribution"],"category":"standards","conceptType":"business-term","status":"active","definition":"A distribution strategy where travel suppliers (principally airlines and hotels) bypass traditional Global Distribution Systems (GDS) by connecting directly to distributors (OTAs, TMCs, corporate tools) via APIs (like NDC or custom XML/JSON APIs). This reduces distribution costs (GDS segment fees) and allows suppliers to control offers and rich content.","definition_ko":"여행 공급업체(주로 항공사 및 호텔)가 API(NDC 또는 맞춤형 XML/JSON API 등)를 통해 판매 채널(OTA, TMC, 기업 예약 도구 등)에 직접 연결하여 기존 GDS(글로벌 유통 시스템)를 우회하는 유통 전략이다. 이는 GDS 세그먼트 수수료 등의 유통 비용을 줄이고, 공급업체가 직접 오퍼와 다양한 콘텐츠를 통제할 수 있게 한다.","longDef":"GDS Bypass has grown rapidly with the rise of IATA's NDC standard and low-cost carrier (LCC) models, which avoid GDS fees entirely. Airlines incentivize GDS Bypass by applying surcharges to GDS bookings or removing cheaper inventory from GDS channels. In the hotel sector, GDS bypass occurs through direct API connections to bedbanks or OTAs, avoiding traditional hotel GDS fees.","longDef_ko":"GDS 우회는 GDS 수수료를 완전히 회피하는 저비용항공사(LCC) 모델 및 IATA의 NDC 표준 등장과 함께 빠르게 성장했다. 항공사들은 GDS 예약에 할증료(surcharge)를 부과하거나 GDS 채널에서 저렴한 인벤토리를 제거함으로써 GDS 우회를 유도한다. 호텔 부문에서는 베드뱅크나 OTA로의 직접 API 연결을 통해 전통적인 호텔 GDS 수수료를 회피하며 GDS 우회가 일어난다.","standardBody":"","providerTerms":[{"provider":"Lufthansa Group","term":"Direct Connect","context":"Lufthansa's GDS bypass channels with special fare access and no GDS fee.","context_ko":"Lufthansa의 GDS 우회 채널로, 특별 운임 조회 가능 및 GDS 수수료 면제.","relationship":"sameAs"},{"provider":"American Airlines","term":"AA Direct Connect","context":"Direct API connection that bypasses GDS channels.","context_ko":"GDS 채널을 우회하는 직접 API 연결.","relationship":"sameAs"}],"relationships":[{"type":"related","targetTerm":"GDS","targetId":"gds"},{"type":"related","targetTerm":"NDC","targetId":"ndc"},{"type":"related","targetTerm":"Direct Connect","targetId":"direct-connect"},{"type":"related","targetTerm":"Aggregator","targetId":"aggregator"}],"distinctions":[{"targetTerm":"GDS","explanation":"GDS is the intermediary being bypassed; GDS Bypass is the strategy of routing around it.","explanation_ko":"GDS는 우회 대상이 되는 중개 플랫폼이며, GDS 우회는 해당 플랫폼을 거치지 않는 유통 전략이다.","targetId":"gds"},{"targetTerm":"Direct Connect","explanation":"Direct Connect is the technical API link; GDS Bypass is the business strategy that utilizes it.","explanation_ko":"Direct Connect는 기술적인 API 연결 방식이고, GDS 우회는 이를 활용한 비즈니스 전략이다.","targetId":"direct-connect"}],"sources":[{"name":"IATA New Distribution Capability (NDC) Implementation Guide","org":"IATA","version":"","section":"","url":""}],"lastReviewed":"2026-06-15","icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M8 12h32M8 24h12m16 0h4M8 36h32\"/>\u003cpath d=\"M28 20l4 4-4 4\"/>\u003ccircle cx=\"24\" cy=\"24\" r=\"2\"/>\u003c/svg>"},{"id":"group-pnr","term":"Group PNR","abbreviation":"","aliases":["Group Booking","Group Reservation","Group Block"],"category":"air-ops","conceptType":"document","status":"active","definition":"A Group PNR is a single Passenger Name Record created to hold a block of seats for a group of passengers (typically a defined minimum, such as 10 or more) travelling together on the same itinerary, often before all individual names are known. Names are added against the held seats over time, and unassigned places are tracked until name-in or cancellation.","longDef":"Group bookings are governed by negotiated group fares and carrier group policies, with deadlines (name list submission, deposit, final payment/ticketing) that differ from individual fares. The Group PNR shows the booked group size versus the number of names entered (unassigned count), and may be split into individual PNRs for ticketing or when members deviate. Carriers control group inventory separately from regular Availability, and over-blocking or late name-in can trigger fees, penalties, or seat reduction.","standardBody":"","term_ko":"Group PNR (단체 PNR / 단체 예약)","definition_ko":"Group PNR은 같은 여정을 함께 이용하는 단체 승객(보통 10명 이상 등 정해진 최소 인원)을 위해 좌석 block을 잡아두는 하나의 PNR(Passenger Name Record)이며, 종종 개별 이름이 모두 확정되기 전에 생성된다. 확보한 좌석에 시간이 지나며 이름을 추가하고, 미배정 좌석은 name-in 또는 취소 시점까지 관리된다.","longDef_ko":"단체 예약은 협상된 group fare와 항공사 단체 규정의 적용을 받으며, 명단 제출·예치금·최종 결제/발권 마감 등 개인 운임과 다른 기한이 존재한다. Group PNR에는 예약된 단체 규모와 입력된 이름 수(미배정 인원)가 함께 표시되고, 발권을 위해 또는 일부 인원의 여정 변경 시 개별 PNR로 split될 수 있다. 항공사는 단체 inventory를 일반 Availability와 별도로 관리하며, 과다 block이나 늦은 name-in은 수수료·페널티·좌석 감축을 유발할 수 있다.","providerTerms":[{"provider":"Amadeus","term":"Group PNR","context":"PNR holding a number of seats with unassigned names tracked by element 0 and NM count.","context_ko":"좌석 수를 보유하며 element 0과 NM 수로 미배정 이름을 관리하는 PNR.","relationship":"same"}],"relationships":[{"type":"related","targetTerm":"PNR","targetId":"pnr"},{"type":"related","targetTerm":"Split PNR","targetId":"split-pnr"},{"type":"related","targetTerm":"Availability","targetId":"availability"},{"type":"related","targetTerm":"Allotment","targetId":"allotment"}],"distinctions":[{"targetTerm":"Allotment","explanation":"An Allotment is a pre-negotiated block of inventory a carrier or supplier grants a distributor to sell; a Group PNR is a specific reservation record holding seats for one identified travelling group. A group booking may draw on an allotment but is not the same as the allotment agreement.","explanation_ko":"Allotment는 항공사·공급자가 판매자에게 사전 협상으로 부여한 inventory block이고, Group PNR은 식별된 한 단체를 위해 좌석을 보유한 구체적 예약 레코드다. 단체 예약이 allotment를 사용할 수 있지만 allotment 계약 자체와는 다르다.","targetId":"allotment"}],"sources":[{"org":"Amadeus","name":"Amadeus Groups User Guide","version":"","section":"","url":""},{"org":"IATA","name":"Passenger Services Conference Resolutions Manual (PSCRM)","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003ccircle cx=\"17\" cy=\"16\" r=\"5\"/>\u003ccircle cx=\"31\" cy=\"16\" r=\"5\"/>\u003cpath d=\"M9 34c0-5 3.5-8 8-8s8 3 8 8\"/>\u003cpath d=\"M23 34c0-5 3.5-8 8-8s8 3 8 8\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"guarantee-policy","term":"Guarantee Policy","term_ko":"개런티 정책(예약 보장 정책)","abbreviation":"","aliases":["Reservation Guarantee","Booking Guarantee","Deposit/Guarantee Policy"],"category":"hotel-dist","conceptType":"business-term","status":"active","definition":"A guarantee policy defines how a hotel reservation must be secured so the room is held for the guest, for example by credit card guarantee, advance deposit, prepayment, or company/travel-agent guarantee. It determines what is required at booking and the hotel's recourse (such as charging a no-show fee) if the guest does not arrive.","definition_ko":"개런티 정책은 객실이 고객을 위해 유지되도록 호텔 예약을 어떻게 확보해야 하는지를 정의한다. 예를 들어 신용카드 보증, 사전 보증금, 선결제, 또는 회사/여행사 보증 등이 있다. 예약 시 무엇이 요구되는지, 그리고 고객이 도착하지 않을 경우 호텔의 구제 수단(예: 노쇼 요금 청구)을 결정한다.","longDef":"Guarantee types commonly include credit-card guarantee (room held all night, no-show charge applies), deposit/prepayment guarantee, and 'hold until' (e.g., 6 PM) arrangements where an unguaranteed room may be released. In distribution standards the guarantee requirement is carried as a structured element of the rate/reservation. The guarantee policy governs securing and holding the booking, which is distinct from the cancellation policy that governs penalties when the booking is cancelled.","longDef_ko":"개런티 유형에는 일반적으로 신용카드 보증(객실을 밤새 유지하며 노쇼 요금 부과), 보증금/선결제 보증, 그리고 보장되지 않은 객실이 해제될 수 있는 '특정 시각까지 보류'(예: 오후 6시) 방식이 포함된다. 분배 표준에서는 개런티 요구사항이 요금/예약의 구조화된 요소로 전달된다. 개런티 정책은 예약의 확보와 보장을 규율하며, 이는 예약 취소 시의 위약금을 규율하는 취소 정책과 구별된다.","standardBody":"OpenTravel","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Cancellation Policy","targetId":"cancellation-policy"},{"type":"related","targetTerm":"Rate Plan","targetId":"rate-plan"},{"type":"related","targetTerm":"VCC","targetId":"vcc"},{"type":"related","targetTerm":"3-D Secure","targetId":"3-d-secure"},{"type":"related","targetTerm":"Overbooking","targetId":"overbooking"}],"distinctions":[{"targetTerm":"Cancellation Policy","explanation":"A guarantee policy defines how a booking is secured/held and no-show recourse; a cancellation policy defines deadlines and penalties for cancelling.","explanation_ko":"개런티 정책은 예약을 어떻게 확보·보장하는지와 노쇼 구제 수단을 정의하고, 취소 정책은 취소에 대한 기한과 위약금을 정의한다.","targetId":"cancellation-policy"}],"sources":[{"name":"OpenTravel Specification","org":"OpenTravel Alliance","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M24 4l16 6v10c0 11-7 18-16 22-9-4-16-11-16-22V10l16-6z\"/>\u003cpath d=\"M17 23l5 5 9-10\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"hotel-switch","term":"Hotel Switch","abbreviation":"","aliases":["Switch","Distribution Switch","Connectivity Hub","Hub"],"category":"hotel-dist","conceptType":"business-term","status":"active","definition":"A hotel switch is a technical pass-through intermediary that connects a hotel's CRS or PMS to many distribution channels (GDSs, OTAs, wholesalers, metasearch) through a single integration, translating and routing availability, rate, and inventory (ARI) messages and reservation traffic between the two sides. The switch is purely technical: it routes data without owning inventory, setting rates, or applying its own business rules.","longDef":"A switch (also called a hub or connectivity provider) solves the many-to-many integration problem in hotel distribution. Instead of each hotel CRS building and maintaining a bespoke interface to every demand channel, both sides connect once to the switch, which normalizes message formats and protocols between them. Switches typically operate in a real-time pull or two-way push model: ARI updates flow outbound to channels and booking/modification/cancellation messages flow back to the CRS/PMS. They generally do not cache or own inventory, do not contract rates, and add no commercial markup, which distinguishes them from bedbanks and OTAs. Historic and current providers include DHISCO (the former Pegasus/WizCom switch, acquired by RateGain) and DerbySoft. Switches commonly implement OpenTravel and HTNG XML messaging on the demand side.","standardBody":"","term_ko":"호텔 스위치 (Hotel Switch)","definition_ko":"호텔 스위치는 호텔의 CRS 또는 PMS를 단일 연동으로 다수의 유통 채널(GDS, OTA, 도매업체, 메타서치)에 연결하는 기술적 중계(pass-through) 매개체로, 양측 사이에서 ARI(가용성·요금·재고) 메시지와 예약 트래픽을 변환·라우팅한다. 스위치는 순수하게 기술적 역할만 수행하며, 재고를 보유하거나 요금을 설정하거나 자체 비즈니스 규칙을 적용하지 않는다.","longDef_ko":"스위치(허브 또는 connectivity provider라고도 함)는 호텔 유통의 다대다(many-to-many) 연동 문제를 해결한다. 각 호텔 CRS가 모든 수요 채널마다 개별 인터페이스를 구축·유지하는 대신, 양측이 스위치에 한 번만 연결하면 스위치가 메시지 포맷과 프로토콜을 표준화한다. 스위치는 보통 실시간 pull 또는 양방향(push) 모델로 동작하여, ARI 업데이트는 채널로 나가고 예약·변경·취소 메시지는 CRS/PMS로 돌아온다. 일반적으로 재고를 캐싱하거나 보유하지 않고, 요금을 계약하지 않으며, 자체 마진을 붙이지 않는다는 점에서 Bedbank나 OTA와 구별된다. 대표 사업자로는 DHISCO(구 Pegasus/WizCom 스위치, RateGain 인수)와 DerbySoft가 있다. 스위치는 수요 측에서 OpenTravel 및 HTNG XML 메시징을 구현하는 경우가 많다.","providerTerms":[{"provider":"RateGain (DHISCO)","term":"DHISCO Switch","context":"Legacy Pegasus/WizCom distribution switch connecting hotel CRSs to GDS and OTA demand channels.","context_ko":"호텔 CRS를 GDS 및 OTA 수요 채널에 연결하는 레거시 Pegasus/WizCom 유통 스위치.","relationship":"same"},{"provider":"DerbySoft","term":"Connectivity Services / Property Connector","context":"Connectivity platform routing real-time ARI and reservations between hotel CRS/PMS and distributors.","context_ko":"호텔 CRS/PMS와 유통업체 사이에서 실시간 ARI 및 예약을 라우팅하는 커넥티비티 플랫폼.","relationship":"same"}],"relationships":[{"type":"related","targetTerm":"Channel Manager","targetId":"channel-manager"},{"type":"related","targetTerm":"CRS","targetId":"crs"},{"type":"related","targetTerm":"ARI","targetId":"ari"},{"type":"related","targetTerm":"Two-Way XML","targetId":"two-way-xml"},{"type":"related","targetTerm":"GDS","targetId":"gds"},{"type":"contrasts","targetTerm":"Bedbank","targetId":"bedbank"}],"distinctions":[{"targetTerm":"Channel Manager","explanation":"A channel manager is the hotel-side tool a single property uses to manage its rates and inventory across channels; a switch is the neutral many-to-many routing layer that connects CRS/PMS systems to large distribution networks. Channel managers often connect to channels via switches.","explanation_ko":"채널 매니저는 개별 호텔이 채널 전반에 걸쳐 요금·재고를 관리하는 호텔 측 도구이고, 스위치는 CRS/PMS를 대규모 유통망에 연결하는 중립적 다대다 라우팅 계층이다. 채널 매니저는 종종 스위치를 통해 채널에 연결된다.","targetId":"channel-manager"},{"targetTerm":"Bedbank","explanation":"A bedbank buys and resells hotel inventory at net rates, taking a commercial position; a switch never owns inventory or sets prices and only transports messages.","explanation_ko":"Bedbank은 net rate로 호텔 재고를 사들여 재판매하며 상업적 포지션을 취하지만, 스위치는 재고를 보유하거나 가격을 설정하지 않고 메시지만 전달한다.","targetId":"bedbank"}],"sources":[{"org":"AltexSoft","name":"Switch (travel technology) — Glossary","version":"","section":"","url":"https://www.altexsoft.com/glossary/switch-travel-technology/"},{"org":"DerbySoft","name":"Connectivity Services / Property Connector","version":"","section":"","url":"https://www.derbysoft.com/property-connector/"}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"18\" y=\"19\" width=\"12\" height=\"10\" rx=\"2\"/>\u003cline x1=\"6\" y1=\"12\" x2=\"18\" y2=\"21\"/>\u003cline x1=\"6\" y1=\"24\" x2=\"18\" y2=\"24\"/>\u003cline x1=\"6\" y1=\"36\" x2=\"18\" y2=\"27\"/>\u003cline x1=\"42\" y1=\"12\" x2=\"30\" y2=\"21\"/>\u003cline x1=\"42\" y1=\"24\" x2=\"30\" y2=\"24\"/>\u003cline x1=\"42\" y1=\"36\" x2=\"30\" y2=\"27\"/>\u003ccircle cx=\"6\" cy=\"12\" r=\"2\"/>\u003ccircle cx=\"6\" cy=\"24\" r=\"2\"/>\u003ccircle cx=\"6\" cy=\"36\" r=\"2\"/>\u003ccircle cx=\"42\" cy=\"12\" r=\"2\"/>\u003ccircle cx=\"42\" cy=\"24\" r=\"2\"/>\u003ccircle cx=\"42\" cy=\"36\" r=\"2\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"htng","term":"HTNG","term_ko":"호스피탈리티 기술 차세대 협회(HTNG)","abbreviation":"HTNG","aliases":["Hospitality Technology Next Generation","HTNG (now part of AHLA)"],"category":"standards","conceptType":"standard","status":"active","definition":"Hospitality Technology Next Generation (HTNG) is a non-profit trade association that develops interoperability standards and specifications for hospitality technology systems, such as messaging frameworks for property management, reservations, and connected guest-room systems. It is now part of the American Hotel & Lodging Association (AHLA).","definition_ko":"Hospitality Technology Next Generation(HTNG)은 자산 관리, 예약, 연결된 객실 시스템을 위한 메시징 프레임워크 등 호스피탈리티 기술 시스템의 상호운용성 표준과 명세를 개발하는 비영리 무역 협회이다. 현재는 미국호텔숙박업협회(AHLA)의 일부이다.","longDef":"HTNG produces technical workgroup specifications and web-service message standards used among hotel systems (e.g., PMS, CRS, channel managers, in-room technology). It has collaborated with the OpenTravel Alliance, with OpenTravel often providing the underlying XML schema vocabulary that HTNG frameworks reference.","longDef_ko":"HTNG은 호텔 시스템(예: PMS, CRS, 채널 매니저, 객실 내 기술) 간에 사용되는 기술 작업그룹 명세와 웹 서비스 메시지 표준을 만든다. OpenTravel Alliance와 협력해 왔으며, OpenTravel은 HTNG 프레임워크가 참조하는 기반 XML 스키마 어휘를 제공하는 경우가 많다.","standardBody":"HTNG","providerTerms":[],"relationships":[{"type":"related","targetTerm":"OpenTravel Alliance","targetId":"opentravel-alliance"},{"type":"related","targetTerm":"PMS","targetId":"pms"},{"type":"related","targetTerm":"CRS","targetId":"crs"},{"type":"related","targetTerm":"Channel Manager","targetId":"channel-manager"}],"distinctions":[{"targetTerm":"OpenTravel Alliance","explanation":"HTNG focuses on hospitality-system interoperability standards/frameworks; OpenTravel maintains the broader cross-sector travel XML message vocabulary HTNG often builds upon.","explanation_ko":"HTNG은 호스피탈리티 시스템 상호운용성 표준과 프레임워크에 집중하고, OpenTravel은 HTNG이 흔히 기반으로 삼는 더 광범위한 범산업 여행 XML 메시지 어휘를 유지한다.","targetId":"opentravel-alliance"}],"sources":[{"name":"HTNG Standards and Specifications","org":"HTNG (AHLA)","version":"","section":"","url":""}],"lastReviewed":"2026-06-15","icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M8 40V14l16-6 16 6v26\"/>\u003cpath d=\"M4 40h40\"/>\u003cpath d=\"M14 40v-8h6v8M28 40v-8h6v8\"/>\u003cpath d=\"M16 20h2M22 20h2M28 20h2M16 25h2M22 25h2M28 25h2\"/>\u003c/svg>"},{"id":"hub-and-spoke","term":"Hub-and-Spoke","term_ko":"허브 앤 스포크(중심-방사형 노선망)","abbreviation":"","aliases":["Hub and Spoke","Hub-and-Spoke Network","Hub-and-Spoke Model"],"category":"air-partner","conceptType":"business-term","status":"active","definition":"A network design in which an airline routes most traffic through one or more central hub airports, where passengers from many origin (spoke) cities connect onward to many destination (spoke) cities. Concentrating connections at hubs lets a carrier serve many origin-destination markets with fewer flights than nonstop point-to-point service.","definition_ko":"항공사가 대부분의 운송을 하나 이상의 중심 허브 공항을 경유하도록 구성하여, 여러 출발지(스포크) 도시에서 온 승객이 그곳에서 여러 목적지(스포크) 도시로 연결되도록 하는 네트워크 설계. 허브에 연결을 집중시키면 직항(point-to-point) 운항보다 적은 항공편으로 많은 출발지-목적지 시장을 운송할 수 있다.","longDef":"In a hub-and-spoke network, flights are timed into connecting \"banks\" or \"waves\" so that inbound spoke flights feed a coordinated set of outbound flights, maximizing the number of viable connections within the minimum connecting time (MCT). The model improves load factors and market reach but concentrates risk and complexity at the hub, where delays can cascade and missed connections trigger reaccommodation. It contrasts with point-to-point networks favored by many low-cost carriers, which fly origins directly to destinations without designed connecting banks.","longDef_ko":"허브 앤 스포크 네트워크에서는 도착하는 스포크 항공편이 조율된 출발 항공편 묶음에 연결되도록 항공편 시각을 \"뱅크(bank)\" 또는 \"웨이브(wave)\"로 맞추어, 최소 연결 시간(MCT) 이내에 성립 가능한 연결 수를 극대화한다. 이 모델은 탑승률과 시장 도달 범위를 높이지만, 지연이 연쇄적으로 확산되고 연결편 놓침이 재수용을 유발할 수 있는 허브에 위험과 복잡성을 집중시킨다. 이는 많은 저비용 항공사가 선호하는, 연결 뱅크를 설계하지 않고 출발지에서 목적지로 직접 운항하는 point-to-point 네트워크와 대비된다.","standardBody":"","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Connection","targetId":"connection"},{"type":"related","targetTerm":"MCT","targetId":"mct"},{"type":"related","targetTerm":"Origin & Destination","targetId":"origin-destination"},{"type":"related","targetTerm":"Slot","targetId":"slot"},{"type":"related","targetTerm":"Through Fare","targetId":"through-fare"}],"distinctions":[{"targetTerm":"Connection","explanation":"Hub-and-spoke is the overall network strategy of funneling traffic through hubs; a connection is the individual passenger event of changing flights, which the hub model is designed to generate efficiently.","explanation_ko":"허브 앤 스포크는 운송을 허브로 모으는 전체 네트워크 전략이고, connection은 항공편을 갈아타는 개별 승객 단위의 사건으로, 허브 모델은 이를 효율적으로 만들어내도록 설계된다.","targetId":"connection"}],"sources":[{"name":"Worldwide Airport Slot Guidelines (WASG)","org":"IATA / ACI / WWACG","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003ccircle cx=\"24\" cy=\"24\" r=\"4\" fill=\"currentColor\" stroke=\"none\"/>\u003cline x1=\"24\" y1=\"24\" x2=\"24\" y2=\"7\"/>\u003cline x1=\"24\" y1=\"24\" x2=\"40\" y2=\"15\"/>\u003cline x1=\"24\" y1=\"24\" x2=\"41\" y2=\"31\"/>\u003cline x1=\"24\" y1=\"24\" x2=\"31\" y2=\"40\"/>\u003cline x1=\"24\" y1=\"24\" x2=\"14\" y2=\"39\"/>\u003cline x1=\"24\" y1=\"24\" x2=\"7\" y2=\"30\"/>\u003cline x1=\"24\" y1=\"24\" x2=\"8\" y2=\"15\"/>\u003ccircle cx=\"24\" cy=\"7\" r=\"2\"/>\u003ccircle cx=\"40\" cy=\"15\" r=\"2\"/>\u003ccircle cx=\"41\" cy=\"31\" r=\"2\"/>\u003ccircle cx=\"31\" cy=\"40\" r=\"2\"/>\u003ccircle cx=\"14\" cy=\"39\" r=\"2\"/>\u003ccircle cx=\"7\" cy=\"30\" r=\"2\"/>\u003ccircle cx=\"8\" cy=\"15\" r=\"2\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"iata-clearing-house","term":"IATA Clearing House","abbreviation":"ICH","aliases":["ICH","IATA Clearing House (ICH)"],"category":"pay","conceptType":"provider-term","status":"active","definition":"The IATA Clearing House (ICH) is IATA's central facility for the multilateral netting and settlement of accounts between airlines, airline-associated companies, and travel partners, principally covering interline billings. It nets amounts members owe each other and settles the resulting balances, processing tens of billions of US dollars in annual billings.","term_ko":"IATA 정산소(ICH)","definition_ko":"IATA Clearing House(ICH)는 항공사, 항공사 관련 기업, 여행 파트너 간 계정의 다자간 차감 정산과 결제를 위한 IATA의 중앙 기구로, 주로 인터라인 청구를 담당한다. 회원사가 상호 지급할 금액을 차감하여 그 잔액을 정산하며, 연간 수백억 달러 규모의 청구를 처리한다.","longDef":"ICH allows participants to settle many bilateral interline obligations through a single net position rather than paying each counterparty individually, reducing currency exposure and credit risk. Invoices are submitted via IATA's SIS (Simplified Invoicing and Settlement) platform. ICH interoperates with the separate Airlines Clearing House (ACH); settlements between an ICH participant and an ACH participant are conducted in USD.","longDef_ko":"ICH를 통해 참여사는 다수의 양자 간 인터라인 채무를 각 거래 상대방에게 개별 지급하는 대신 단일 순포지션으로 정산할 수 있어 환 노출과 신용 위험을 줄인다. 인보이스는 IATA의 SIS(Simplified Invoicing and Settlement) 플랫폼을 통해 제출된다. ICH는 별도의 Airlines Clearing House(ACH)와 상호 운용되며, ICH 참여사와 ACH 참여사 간 정산은 미국 달러(USD)로 이루어진다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Interline","targetId":"interline"},{"type":"related","targetTerm":"Proration","targetId":"proration"},{"type":"related","targetTerm":"SPA (Special Prorate Agreement)","targetId":"spa-special-prorate-agreement"},{"type":"related","targetTerm":"MITA","targetId":"mita"},{"type":"contrasts","targetTerm":"BSP","targetId":"bsp"}],"distinctions":[{"targetTerm":"BSP","explanation":"ICH settles airline-to-airline (interline) accounts; BSP settles agent-to-airline sales.","explanation_ko":"ICH는 항공사 간(인터라인) 계정을 정산하고, BSP는 여행사-항공사 간 판매를 정산한다.","targetId":"bsp"},{"targetTerm":"ARC","explanation":"ICH handles interline settlement globally; ARC handles US agent-to-airline settlement.","explanation_ko":"ICH는 전 세계 인터라인 정산을 처리하고, ARC는 미국의 여행사-항공사 정산을 처리한다.","targetId":"arc"}],"sources":[{"name":"IATA Clearing House (ICH)","org":"IATA","version":"","section":"","url":"https://www.iata.org/en/services/finance/clearinghouse/"},{"name":"IATA Clearing House (ICH) FAQs","org":"IATA","version":"","section":"","url":"https://www.iata.org/en/services/finance/clearinghouse/faqs/"}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M6 20 24 8l18 12\"/>\u003cline x1=\"9\" y1=\"20\" x2=\"9\" y2=\"38\"/>\u003cline x1=\"39\" y1=\"20\" x2=\"39\" y2=\"38\"/>\u003cline x1=\"17\" y1=\"22\" x2=\"17\" y2=\"36\"/>\u003cline x1=\"31\" y1=\"22\" x2=\"31\" y2=\"36\"/>\u003cline x1=\"5\" y1=\"42\" x2=\"43\" y2=\"42\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"iata-code","term":"IATA Code","term_ko":"IATA 코드","abbreviation":"IATA","aliases":["IATA Two-Letter Code","IATA Designator","IATA Location Identifier"],"category":"codes","conceptType":"code","status":"ambiguous","definition":"An umbrella term for the various short codes assigned and administered by the International Air Transport Association (IATA), most commonly the 3-letter airport/city location code and the 2-character airline designator. The exact meaning depends on context (airport, airline, or other IATA-managed code).","definition_ko":"국제항공운송협회(IATA)가 부여하고 관리하는 다양한 단축 코드를 포괄적으로 일컫는 용어로, 가장 흔하게는 3자리 공항/도시 위치 코드와 2자리 항공사 지정 코드를 가리킨다. 정확한 의미는 문맥(공항, 항공사, 또는 IATA가 관리하는 기타 코드)에 따라 달라진다.","longDef":"Because IATA maintains several distinct coding schemes, 'IATA Code' is context-dependent: a 3-letter IATA location code identifies an airport or city served by air transport, while a 2-character IATA airline designator identifies an air carrier. IATA codes are optimized for commercial and consumer-facing use (tickets, schedules, displays) and are not globally unique in the way ICAO codes are. The term is widely used loosely, so precise documentation should specify which IATA code is meant.","longDef_ko":"IATA는 여러 개의 별개 코드 체계를 운영하기 때문에 'IATA 코드'라는 표현은 문맥에 따라 달라진다. 3자리 IATA 위치 코드는 항공 운송이 이루어지는 공항이나 도시를 식별하고, 2자리 IATA 항공사 지정 코드는 항공 운송 사업자를 식별한다. IATA 코드는 상업 및 소비자 대상 용도(항공권, 스케줄, 표시 화면)에 최적화되어 있으며, ICAO 코드처럼 전 세계적으로 고유하지는 않다. 이 용어는 폭넓고 느슨하게 사용되므로, 정확성을 요하는 문서에서는 어떤 IATA 코드를 의미하는지 명시해야 한다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"ICAO Code","targetId":"icao-code"},{"type":"broader","targetTerm":"Airport Code","targetId":"airport-code"},{"type":"broader","targetTerm":"Airline Designator","targetId":"airline-designator"},{"type":"broader","targetTerm":"City Code","targetId":"city-code"}],"distinctions":[{"targetTerm":"ICAO Code","explanation":"IATA codes are short commercial codes (3-letter airport, 2-char airline); ICAO codes are longer (4-letter airport, 3-letter airline) and globally unique for operational/ATC use.","explanation_ko":"IATA 코드는 짧은 상업용 코드(3자리 공항, 2자리 항공사)인 반면, ICAO 코드는 더 길고(4자리 공항, 3자리 항공사) 운항/항공교통관제(ATC) 용도로 전 세계적으로 고유하다.","targetId":"icao-code"}],"sources":[{"name":"IATA Airline and Airport Code Search","org":"IATA","version":"","section":"","url":"https://www.iata.org/en/publications/directories/code-search/"}],"lastReviewed":"2026-06-15","icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M6 22l36-12-4 14-6 12-5-10z\"/>\u003cpath d=\"M21 36l4-4\"/>\u003crect x=\"6\" y=\"32\" width=\"20\" height=\"10\" rx=\"2\"/>\u003cpath d=\"M11 37h2M16 37h2M21 37h2\"/>\u003c/svg>"},{"id":"iata-easypay","term":"IATA EasyPay","abbreviation":"","aliases":["IATA EasyPay","IEP","IATA Easy Pay"],"category":"pay","conceptType":"provider-term","status":"active","definition":"IATA EasyPay is an IATA e-wallet (pay-as-you-go) payment method used by IATA-accredited agents to issue tickets and EMDs through the BSP. Agents pre-fund a dedicated account and, at issuance, enter an EasyPay number in the GDS that triggers a real-time authorization blocking the funds, after which IATA settles the amount to the airline via standard BSP processes.","term_ko":"IATA EasyPay","definition_ko":"IATA EasyPay는 IATA 인증 여행사가 BSP를 통해 항공권과 EMD를 발권하는 데 사용하는 IATA 전자지갑(선불 충전식, pay-as-you-go) 결제 수단이다. 여행사는 전용 계정에 미리 자금을 충전하고 발권 시 GDS에 EasyPay 번호를 입력하면 실시간 승인이 발생해 해당 자금이 보류되며, 이후 IATA가 표준 BSP 절차를 통해 항공사에 금액을 정산한다.","longDef":"Introduced under NewGen ISS, IATA EasyPay offers a secure alternative to BSP Cash and BSP Card. Because funds are verified and blocked at the moment of issuance and settled to airlines through the BSP within roughly 48-96 hours of issuance, it eliminates chargeback risk for airlines and reduces the financial security agents must post to IATA. It is optional and does not replace existing BSP payment methods.","longDef_ko":"NewGen ISS 하에서 도입된 IATA EasyPay는 BSP Cash 및 BSP Card에 대한 안전한 대안을 제공한다. 자금이 발권 시점에 검증되고 보류되며 발권 후 약 48~96시간 이내에 BSP를 통해 항공사에 정산되므로, 항공사의 차지백 위험을 제거하고 여행사가 IATA에 예치해야 하는 재무 보증금을 줄인다. 이는 선택 사항이며 기존 BSP 결제 수단을 대체하지 않는다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"parent","targetTerm":"BSP","targetId":"bsp"},{"type":"related","targetTerm":"E-ticket","targetId":"e-ticket"},{"type":"related","targetTerm":"EMD","targetId":"emd"},{"type":"related","targetTerm":"GDS","targetId":"gds"}],"distinctions":[{"targetTerm":"VCC","explanation":"IATA EasyPay is an IATA-operated e-wallet limited to BSP ticket issuance, while a VCC is a general card-rail instrument usable for many supplier payments.","explanation_ko":"IATA EasyPay는 BSP 항공권 발권에 한정된 IATA 운영 전자지갑인 반면, VCC는 다양한 공급업체 결제에 사용할 수 있는 범용 카드 결제망 수단이다.","targetId":"vcc"},{"targetTerm":"Chargeback","explanation":"IATA EasyPay carries no chargeback risk for airlines because funds are pre-funded and blocked at issuance, unlike card payments.","explanation_ko":"IATA EasyPay는 카드 결제와 달리 자금이 사전 충전되고 발권 시 보류되므로 항공사에 차지백 위험이 없다.","targetId":"chargeback"}],"sources":[{"name":"IATA EASY PAY","org":"IATA","version":"","section":"","url":"https://www.iata.org/en/services/finance/iata-easy-pay/"},{"name":"IATA EasyPay | NewGen ISS","org":"IATA","version":"","section":"","url":"https://newgeniss.iata.org/airlines/iata-easy-pay/"}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M8 14h30a4 4 0 0 1 4 4v18a4 4 0 0 1-4 4H10a4 4 0 0 1-4-4V14a3 3 0 0 1 3-3h25\"/>\u003cpath d=\"M34 24h8v8h-8a4 4 0 0 1 0-8z\"/>\u003cpath d=\"M18 23l-4 6h6l-4 6\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"iata-number","term":"IATA Number","term_ko":"IATA 번호(여행사 인가 번호)","abbreviation":"","aliases":["IATA Numeric Code","Agency IATA Number","IATA Accreditation Number","IATAN Number"],"category":"codes","conceptType":"code","status":"active","definition":"A unique numeric code (typically 7 or 8 digits for passenger agencies) assigned by IATA to identify an accredited travel agency or location. It accredits the agency to issue airline tickets and settle through the BSP, and is recognized by airlines and other suppliers.","definition_ko":"IATA가 인가받은 여행사 또는 지점을 식별하기 위해 부여하는 고유 숫자 코드(여객 여행사는 일반적으로 7~8자리). 해당 여행사가 항공권을 발권하고 BSP를 통해 정산할 수 있도록 인가하며, 항공사 및 기타 공급사가 인정한다.","longDef":"The IATA Number (IATA Numeric Code) identifies the accredited agency entity/location used for reporting, commission tracking, and BSP settlement; leading digits encode the location so different branches of one agency are distinguishable. It is distinct from the U.S. ARC number (Airline Reporting Corporation), though IATAN and ARC share the same location numbering so a dually appointed agency carries one number. Separate cargo agency numbers exist with different lengths. The IATA Number identifies the accredited business, whereas a GDS Pseudo City Code / Office ID identifies the agency's working profile inside a specific GDS.","longDef_ko":"IATA 번호(IATA Numeric Code)는 보고, 수수료 추적, BSP 정산에 사용되는 인가 여행사 주체/지점을 식별한다. 앞자리에 위치 정보가 인코딩되어 동일 여행사의 여러 지점을 구분할 수 있다. 미국의 ARC 번호(Airline Reporting Corporation)와는 구별되지만, IATAN과 ARC는 동일한 위치 번호 체계를 공유하므로 양쪽에 모두 지정된 여행사는 하나의 번호를 갖는다. 화물 여행사 번호는 별도로 존재하며 자릿수가 다르다. IATA 번호는 인가된 사업 주체를 식별하는 반면, GDS의 Pseudo City Code / Office ID는 특정 GDS 내부에서의 여행사 작업 프로파일을 식별한다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"BSP","targetId":"bsp"},{"type":"related","targetTerm":"ARC","targetId":"arc"},{"type":"related","targetTerm":"Pseudo City Code","targetId":"pseudo-city-code"},{"type":"related","targetTerm":"OTA (Online Travel Agency)","targetId":"ota-online-travel-agency"}],"distinctions":[{"targetTerm":"Pseudo City Code","explanation":"An IATA Number is the agency's industry accreditation/settlement identifier (7-8 digits); a Pseudo City Code / Office ID is a GDS-internal subscriber identifier scoping bookings, fares, and privileges within one GDS.","explanation_ko":"IATA 번호는 여행사의 업계 인가·정산 식별자(7~8자리)이고, Pseudo City Code / Office ID는 하나의 GDS 내부에서 예약·운임·권한 범위를 한정하는 GDS 가입자 식별자이다.","targetId":"pseudo-city-code"},{"targetTerm":"ARC","explanation":"ARC is the U.S. settlement/accreditation body; the IATA Number is the IATA-assigned accreditation code used for BSP markets, though IATAN and ARC share location numbering.","explanation_ko":"ARC는 미국의 정산·인가 기관이고, IATA 번호는 BSP 시장에서 사용되는 IATA 부여 인가 코드이다. 다만 IATAN과 ARC는 위치 번호 체계를 공유한다.","targetId":"arc"}],"sources":[{"org":"IATA","name":"Travel Agent Accreditation","version":"","section":"","url":"https://www.iata.org/en/services/travel-agency-program/accreditation-travel/"},{"org":"AltexSoft","name":"IATA number (glossary)","version":"","section":"","url":"https://www.altexsoft.com/glossary/iata-number/"}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"9\" y=\"8\" width=\"30\" height=\"32\" rx=\"3\"/>\u003ccircle cx=\"24\" cy=\"19\" r=\"4\"/>\u003cpath d=\"M17 32c0-4 3.5-6 7-6s7 2 7 6\"/>\u003cpath d=\"M14 12h4M30 12h4\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"iata-one-id","term":"IATA One ID","term_ko":"IATA One ID (디지털 신원)","abbreviation":"","aliases":["One ID","IATA Digital Identity (One ID)"],"category":"customer","conceptType":"standard-term","status":"active","definition":"An IATA initiative and standards framework enabling a contactless, document-free passenger journey based on a single, reusable digital identity and biometric recognition. Travelers verify their identity once and are then authenticated at touchpoints such as check-in, bag drop, security and boarding.","definition_ko":"단일하고 재사용 가능한 디지털 신원과 생체 인식을 기반으로 비접촉, 서류 없는 여객 여정을 가능하게 하는 IATA의 이니셔티브이자 표준 프레임워크이다. 여행자는 신원을 한 번 검증하면 이후 체크인, 수하물 위탁, 보안검색, 탑승 등의 접점에서 인증된다.","longDef":"One ID rests on two pillars: Admissibility (obtaining and verifying entry/immigration permits digitally before travel) and Contactless Travel (using biometric tokens to pass checkpoints without repeatedly presenting physical documents). The framework emphasizes passenger control and informed consent over the sharing of identity credentials, increasingly leveraging verifiable credentials and decentralized identity concepts. It is an identity and process standard, distinct from loyalty identifiers like the Frequent Flyer Number, though a digital identity can be linked to a Customer Profile.","longDef_ko":"One ID는 두 축에 기반한다. 입국 허가(Admissibility, 여행 전 입국/출입국 허가를 디지털로 취득·검증)와 비접촉 여행(Contactless Travel, 생체 인식 토큰을 이용해 실물 서류를 반복적으로 제시하지 않고 검문 지점을 통과)이다. 이 프레임워크는 신원 자격 증명 공유에 대한 승객의 통제권과 정보에 입각한 동의를 강조하며, 점차 검증 가능한 자격 증명과 분산 신원 개념을 활용하고 있다. 디지털 신원은 Customer Profile에 연결될 수 있지만, One ID는 Frequent Flyer Number 같은 로열티 식별자와는 구별되는 신원 및 프로세스 표준이다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Customer Profile","targetId":"customer-profile"},{"type":"related","targetTerm":"GDPR Consent","targetId":"gdpr-consent"},{"type":"related","targetTerm":"Secure Flight","targetId":"secure-flight"}],"distinctions":[{"targetTerm":"Secure Flight","explanation":"One ID is an industry digital-identity and biometric framework for seamless travel; Secure Flight is a US TSA watch-list prescreening program with mandated data fields.","explanation_ko":"One ID는 매끄러운 여행을 위한 업계의 디지털 신원·생체 인식 프레임워크이고, Secure Flight는 데이터 필드가 의무화된 미국 TSA의 감시 명단 사전 심사 프로그램이다.","targetId":"secure-flight"},{"targetTerm":"Customer Profile","explanation":"One ID is a verified, biometric digital identity used at airport touchpoints; a Customer Profile is a stored set of traveler data and preferences in a CRS/booking system.","explanation_ko":"One ID는 공항 접점에서 사용되는 검증된 생체 디지털 신원이고, Customer Profile은 CRS/예약 시스템에 저장된 여행자 데이터와 선호도의 집합이다.","targetId":"customer-profile"}],"sources":[{"name":"One ID program page","org":"IATA","version":"","section":"","url":"https://www.iata.org/en/programs/passenger/one-id/"},{"name":"Fact Sheet — One ID","org":"IATA","version":"","section":"","url":"https://www.iata.org/en/iata-repository/pressroom/fact-sheets/fact-sheet-one-id/"}],"lastReviewed":"2026-06-15","icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"8\" y=\"10\" width=\"32\" height=\"28\" rx=\"3\"/>\u003ccircle cx=\"19\" cy=\"21\" r=\"4\"/>\u003cpath d=\"M13 32c0-4 3-6 6-6s6 2 6 6\"/>\u003cpath d=\"M30 19h6M30 24h6M30 29h4\"/>\u003c/svg>"},{"id":"icao-code","term":"ICAO Code","term_ko":"ICAO 코드","abbreviation":"ICAO","aliases":["ICAO Location Indicator","ICAO Designator","ICAO Airport Code","ICAO Airline Designator"],"category":"codes","conceptType":"code","status":"ambiguous","definition":"An umbrella term for codes assigned by the International Civil Aviation Organization (ICAO), principally the 4-letter location indicator for airports/aerodromes and the 3-letter airline designator. ICAO codes are used primarily for air traffic control, flight planning, and operational communications.","definition_ko":"국제민간항공기구(ICAO)가 부여하는 코드를 포괄적으로 일컫는 용어로, 주로 공항/비행장을 위한 4자리 위치 지시자와 3자리 항공사 지정 코드를 가리킨다. ICAO 코드는 주로 항공교통관제, 비행 계획, 운항 통신에 사용된다.","longDef":"ICAO 4-letter location indicators are structured regionally: the first one or two letters denote a region and country (e.g., 'K' for the contiguous USA, 'EG' for the UK), making them globally unique. ICAO 3-letter airline designators are paired with a telephony/call sign for radio communication. Unlike IATA codes, ICAO codes cover aerodromes that have no commercial air service and are oriented toward operations rather than ticketing or consumer display.","longDef_ko":"ICAO의 4자리 위치 지시자는 지역별로 구조화되어 있다. 첫 한두 글자가 지역과 국가를 나타내며(예: 미국 본토는 'K', 영국은 'EG'), 이로써 전 세계적으로 고유성을 갖는다. ICAO의 3자리 항공사 지정 코드는 무선 통신을 위한 전화 호출 부호(콜사인)와 짝을 이룬다. IATA 코드와 달리 ICAO 코드는 상업 항공 서비스가 없는 비행장까지 포괄하며, 발권이나 소비자 대상 표시보다 운항에 초점이 맞춰져 있다.","standardBody":"ICAO","providerTerms":[],"relationships":[{"type":"related","targetTerm":"IATA Code","targetId":"iata-code"},{"type":"related","targetTerm":"Airport Code","targetId":"airport-code"},{"type":"related","targetTerm":"Airline Designator","targetId":"airline-designator"}],"distinctions":[{"targetTerm":"IATA Code","explanation":"ICAO codes are 4-letter (airport) / 3-letter (airline), globally unique and operations-focused; IATA codes are shorter and used for commercial booking and display.","explanation_ko":"ICAO 코드는 4자리(공항)/3자리(항공사)로 전 세계적으로 고유하며 운항 중심인 반면, IATA 코드는 더 짧고 상업적 예약 및 표시에 사용된다.","targetId":"iata-code"}],"sources":[{"name":"Doc 7910 — Location Indicators","org":"ICAO","version":"","section":"","url":"https://store.icao.int/en/location-indicators-doc-7910"},{"name":"Doc 8585 — Designators for Aircraft Operating Agencies, Aeronautical Authorities and Services","org":"ICAO","version":"","section":"","url":"https://www.icao.int/operational-safety/Designators-and-indicators"}],"lastReviewed":"2026-06-15","icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003ccircle cx=\"24\" cy=\"20\" r=\"13\"/>\u003cpath d=\"M11 20h26M24 7c5 4 5 22 0 26M24 7c-5 4-5 22 0 26\"/>\u003crect x=\"8\" y=\"36\" width=\"32\" height=\"8\" rx=\"2\"/>\u003cpath d=\"M13 40h2M18 40h2M23 40h2M28 40h2\"/>\u003c/svg>"},{"id":"interchange-fee","term":"Interchange Fee","abbreviation":"","aliases":["interchange","interchange rate"],"category":"pay","conceptType":"business-term","status":"active","definition":"An interchange fee is a fee paid by the merchant's acquirer to the cardholder's issuing bank on each card transaction, set by the card networks and not directly negotiable by merchants. It is the largest component of the cost of accepting card payments and is typically a percentage of the transaction plus a fixed amount.","longDef":"Interchange fees are established by the card networks (Visa, Mastercard, and others) and flow from the acquirer to the issuer to compensate the issuer for funding, fraud, and operational costs. Although the merchant does not pay interchange directly, it is passed through within the merchant discount rate the acquirer charges, alongside network assessments and acquirer markup. Interchange rates vary by card type (consumer vs. commercial, debit vs. credit, rewards), channel (card-present vs. card-not-present), merchant category, and region; many jurisdictions, including the EU under the Interchange Fee Regulation, cap consumer card interchange. For travel merchants, card-not-present and cross-border bookings often attract higher interchange, and the use of virtual cards (VCC) for supplier settlement has its own interchange economics that influence acceptance.","standardBody":"","term_ko":"인터체인지 수수료 (Interchange Fee)","definition_ko":"Interchange Fee(인터체인지 수수료)는 카드 거래마다 가맹점의 매입사(Acquirer)가 카드 소지자의 발급은행에 지급하는 수수료로, 카드 네트워크가 정하며 가맹점이 직접 협상할 수 없다. 카드 수납 비용의 가장 큰 구성 요소이며, 보통 거래액의 일정 비율에 고정 금액을 더한 형태다.","longDef_ko":"인터체인지 수수료는 카드 네트워크(Visa, Mastercard 등)가 정하며, 매입사에서 발급사로 흘러 발급사의 자금조달·사기·운영 비용을 보전한다. 가맹점이 인터체인지를 직접 내지는 않지만, 매입사가 부과하는 가맹점 할인율(merchant discount rate) 안에 네트워크 분담금과 매입사 마진과 함께 전가된다. 인터체인지 요율은 카드 유형(소비자/법인, 직불/신용, 리워드), 채널(대면/비대면), 가맹점 업종, 지역에 따라 다르며, EU의 Interchange Fee Regulation 등 많은 지역이 소비자 카드 인터체인지에 상한을 둔다. 여행 가맹점의 경우 비대면(CNP) 및 국경 간 예약은 흔히 높은 인터체인지가 적용되고, 공급사 정산용 가상카드(VCC) 사용은 수납에 영향을 주는 별도의 인터체인지 경제구조를 가진다.","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Acquirer","targetId":"acquirer"},{"type":"related","targetTerm":"VCC","targetId":"vcc"},{"type":"related","targetTerm":"Chargeback","targetId":"chargeback"}],"distinctions":[{"targetTerm":"Chargeback","explanation":"Interchange is a per-transaction cost paid to the issuer for processing a card payment, whereas a chargeback is a reversal of a transaction initiated by the cardholder or issuer; they are unrelated mechanisms though both flow through the acquirer.","explanation_ko":"인터체인지는 카드 결제 처리 대가로 발급사에 지급하는 거래당 비용인 반면, Chargeback은 카드 소지자나 발급사가 개시하는 거래 취소(반환)다. 둘 다 매입사를 거치지만 서로 다른 별개의 메커니즘이다.","targetId":"chargeback"}],"sources":[{"org":"Mastercard","name":"Merchant Interchange Rates","version":"","section":"","url":"https://www.mastercard.com/us/en/business/support/merchant-interchange-rates.html"}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"7\" y=\"14\" width=\"24\" height=\"15\" rx=\"2\"/>\u003cline x1=\"7\" y1=\"19\" x2=\"31\" y2=\"19\"/>\u003ccircle cx=\"36\" cy=\"32\" r=\"7\"/>\u003cpath d=\"M36 29v3l2 1.5\"/>\u003cpath d=\"M33.5 30.5v-2h2\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"interline","term":"Interline","term_ko":"인터라인(연계 운송)","abbreviation":"","aliases":["Interline Agreement","Interlining","Interline Traffic Agreement"],"category":"air-partner","conceptType":"business-term","status":"active","definition":"A commercial agreement between two or more airlines to handle passengers, baggage, and tickets traveling on itineraries that involve more than one carrier, allowing one airline to issue a ticket and have it accepted for travel on another. Unlike codeshare, each flight is sold and flown under the operating carrier's own designator.","definition_ko":"둘 이상의 항공사가 한 개 이상의 항공사가 관여하는 여정에서 승객, 수하물, 항공권을 처리하기 위해 맺는 상업적 협정으로, 한 항공사가 발권한 항공권을 다른 항공사가 운송에 인수할 수 있도록 한다. 공동운항과 달리 각 항공편은 운항 항공사 자체의 지정자 코드로 판매되고 운항된다.","longDef":"Interline agreements enable through-ticketing, mutual ticket acceptance, baggage through-checking, and revenue settlement between carriers without any sharing of flight codes. They underpin multi-carrier journeys and are typically settled financially through the IATA Clearing House and via proration based on the Multilateral Interline Traffic Agreements (MITA) or bilateral Special Prorate Agreements (SPA).","longDef_ko":"인터라인 협정은 편명 공유 없이도 항공사 간 일관 발권(through-ticketing), 상호 항공권 인수, 수하물 일관 위탁(through-checking), 수익 정산을 가능하게 한다. 이는 여러 항공사가 관여하는 여정의 기반이 되며, 일반적으로 IATA Clearing House를 통해, 그리고 MITA(Multilateral Interline Traffic Agreements)나 양자 간 SPA(Special Prorate Agreement)에 기반한 프로레이션을 통해 재무적으로 정산된다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Codeshare","targetId":"codeshare"},{"type":"related","targetTerm":"MITA","targetId":"mita"},{"type":"related","targetTerm":"SPA (Special Prorate Agreement)","targetId":"spa-special-prorate-agreement"},{"type":"related","targetTerm":"Proration","targetId":"proration"},{"type":"related","targetTerm":"IATA Clearing House","targetId":"iata-clearing-house"},{"type":"related","targetTerm":"Validating Carrier","targetId":"validating-carrier"}],"distinctions":[{"targetTerm":"Codeshare","explanation":"Interline involves no sharing of flight codes; codeshare specifically places the marketing carrier's designator on the operating carrier's flight.","explanation_ko":"인터라인은 편명 공유를 수반하지 않으며, 공동운항은 구체적으로 판매 항공사의 지정자 코드를 운항 항공사의 항공편에 부여한다.","targetId":"codeshare"},{"targetTerm":"MITA","explanation":"MITA is the multilateral framework that establishes the standard interline relationship; interline is the broader concept of cross-carrier ticket and baggage acceptance.","explanation_ko":"MITA는 표준 인터라인 관계를 수립하는 다자간 체계이고, 인터라인은 항공사 간 항공권 및 수하물 인수를 포괄하는 더 넓은 개념이다.","targetId":"mita"}],"sources":[{"name":"Multilateral Interline Traffic Agreements (MITA)","org":"IATA","version":"","section":"","url":""},{"name":"Revenue Accounting Manual (RAM)","org":"IATA","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003ccircle cx=\"11\" cy=\"24\" r=\"5\"/>\u003ccircle cx=\"37\" cy=\"24\" r=\"5\"/>\u003cpath d=\"M16 24h16\"/>\u003cpath d=\"M28 20l4 4-4 4\"/>\u003cpath d=\"M20 28l-4-4 4-4\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"involuntary-reissue","term":"Involuntary Reissue","term_ko":"비자발적 재발행 (Involuntary Reissue)","abbreviation":"","aliases":["Involuntary Exchange","INVOL Reissue","Involuntary Rerouting"],"category":"air-ticket","conceptType":"process","status":"active","definition":"A reissue caused by circumstances attributable to the carrier such as a schedule change, flight cancellation, or IROPS, rather than by passenger request. Because the disruption is airline-caused, change penalties and fare differences are typically waived and the passenger is reaccommodated under involuntary rerouting rules.","definition_ko":"승객의 요청이 아니라 스케줄 변경, 항공편 결항 또는 IROPS와 같이 항공사에 귀책되는 사유로 발생하는 재발행이다. 운항 차질이 항공사 사유에 의한 것이므로 변경 위약금과 운임 차액이 일반적으로 면제되며, 승객은 비자발적 재배정(involuntary rerouting) 규정에 따라 재배정된다.","longDef":"Involuntary reissue is governed by carrier involuntary rerouting/reaccommodation policies and IATA provisions covering failure to operate as scheduled and schedule irregularity. The new ticket is normally endorsed to document the involuntary nature (commonly with a remark such as INVOL and a reference to the disruption reason), and the fare is reissued at no additional collection where reaccommodation is on the same or comparable service. It is distinguished from a voluntary reissue, where the change originates with the passenger and fare-rule penalties apply.","longDef_ko":"비자발적 재발행은 항공사의 비자발적 재배정/재수용 정책 및 정시 운항 실패와 스케줄 불규칙성을 다루는 IATA 규정에 따른다. 새 항공권은 일반적으로 비자발적 성격을 증빙하기 위해 배서되며(흔히 INVOL과 같은 표기 및 운항 차질 사유에 대한 참조 포함), 동일하거나 유사한 서비스로 재배정되는 경우 추가 징수 없이 재발행된다. 이는 변경이 승객으로부터 비롯되고 운임 규정상의 위약금이 적용되는 자발적 재발행과 구별된다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"contrasts","targetTerm":"Reissue","targetId":"reissue"},{"type":"related","targetTerm":"Schedule Change","targetId":"schedule-change"},{"type":"related","targetTerm":"IROPS","targetId":"irops"},{"type":"related","targetTerm":"Refund","targetId":"refund"},{"type":"related","targetTerm":"E-ticket","targetId":"e-ticket"}],"distinctions":[{"targetTerm":"Reissue","explanation":"A (voluntary) reissue is passenger-initiated with penalties per fare rules; an involuntary reissue is airline-caused and normally penalty-free.","explanation_ko":"(자발적) 재발행은 승객이 주도하며 운임 규정에 따른 위약금이 적용되고, 비자발적 재발행은 항공사 사유에 의한 것으로 통상 위약금이 없다.","targetId":"reissue"},{"targetTerm":"Schedule Change","explanation":"Schedule Change is the trigger event in the schedule; involuntary reissue is the ticketing action taken to reaccommodate the passenger.","explanation_ko":"Schedule Change는 스케줄상의 유발 사건이며, 비자발적 재발행은 승객을 재배정하기 위해 취하는 발권 조치이다.","targetId":"schedule-change"}],"sources":[{"name":"Passenger Services Conference Resolutions Manual (PSCRM)","org":"IATA","version":"","section":"","url":""}],"lastReviewed":"2026-06-15","icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"6\" y=\"12\" width=\"24\" height=\"16\" rx=\"3\"/>\u003cpath d=\"M11 18h8M11 22h5\"/>\u003cpath d=\"M33 35a8 8 0 01-12-2\"/>\u003cpath d=\"M21 39v-5h5\"/>\u003ccircle cx=\"36\" cy=\"16\" r=\"7\"/>\u003cpath d=\"M36 13v3M36 19v.01\"/>\u003c/svg>"},{"id":"irops","term":"IROPS","term_ko":"IROPS(비정상 운항)","abbreviation":"IROPS","aliases":["Irregular Operations","IRROPS","Irregular Ops"],"category":"air-partner","conceptType":"process","status":"active","definition":"Irregular Operations: the handling of unplanned disruptions to flight operations such as delays, cancellations, diversions, and missed connections, and the associated reaccommodation of affected passengers, baggage, and crew. IROPS processes restore travelers to their itineraries through rebooking, involuntary reissue, refunds, and care obligations.","definition_ko":"비정상 운항(Irregular Operations): 지연, 취소, 회항, 연결편 놓침과 같은 계획되지 않은 항공 운항 중단의 처리와 그에 따른 승객, 수하물, 승무원의 재수용. IROPS 프로세스는 재예약, 비자발적 재발권, 환불, 돌봄(care) 의무를 통해 여행객을 원래의 여정으로 복귀시킨다.","longDef":"IROPS encompasses both the operational recovery (returning the schedule to normal) and the passenger-service response triggered by day-of disruptions. Reaccommodation may use the disrupting carrier's own flights or, under interline and codeshare agreements, partner carriers' flights, supported by interline e-ticketing and involuntary reissue rules. IROPS is distinct from a planned schedule change because it concerns real-time, unforeseen events rather than advance schedule amendments.","longDef_ko":"IROPS는 운영 복구(스케줄을 정상으로 되돌리는 것)와 당일 중단으로 촉발된 승객 서비스 대응을 모두 포괄한다. 재수용은 중단을 겪은 항공사 자체 항공편을 이용하거나, 인터라인 및 공동운항 협정에 따라 인터라인 e-티켓팅과 비자발적 재발권 규칙의 지원을 받아 파트너 항공사의 항공편을 이용할 수 있다. IROPS는 사전 스케줄 수정이 아니라 실시간의 예기치 못한 사건을 다루므로 계획된 스케줄 변경과 구별된다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Schedule Change","targetId":"schedule-change"},{"type":"related","targetTerm":"Involuntary Reissue","targetId":"involuntary-reissue"},{"type":"related","targetTerm":"Refund","targetId":"refund"},{"type":"related","targetTerm":"Interline","targetId":"interline"},{"type":"related","targetTerm":"Queue","targetId":"queue"},{"type":"related","targetTerm":"MCT","targetId":"mct"}],"distinctions":[{"targetTerm":"Schedule Change","explanation":"IROPS is unplanned, day-of operational disruption; a schedule change is a planned amendment to the published schedule communicated in advance.","explanation_ko":"IROPS는 계획되지 않은 당일 운영 중단이고, 스케줄 변경은 사전에 통지되는, 게시된 스케줄에 대한 계획된 수정이다.","targetId":"schedule-change"},{"targetTerm":"Involuntary Reissue","explanation":"IROPS is the disruption scenario; involuntary reissue is one of the ticketing actions used to reaccommodate passengers during IROPS.","explanation_ko":"IROPS는 중단 상황이고, 비자발적 재발권은 IROPS 동안 승객을 재수용하기 위해 사용되는 발권 처리 중 하나다.","targetId":"involuntary-reissue"}],"sources":[{"name":"Passenger Services Conference Resolutions Manual (PSCRM) — interline reaccommodation","org":"IATA","version":"","section":"","url":""},{"name":"A4A IROPS / contingency planning guidance","org":"Airlines for America (A4A)","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M24 8l16 30H8z\"/>\u003cline x1=\"24\" y1=\"18\" x2=\"24\" y2=\"28\"/>\u003ccircle cx=\"24\" cy=\"33\" r=\"0.5\" fill=\"currentColor\"/>\u003cpath d=\"M14 14l-4-4M34 14l4-4\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"iso-3166-country-code","term":"ISO 3166 Country Code","term_ko":"ISO 3166 국가 코드","abbreviation":"ISO 3166","aliases":["Country Code","ISO Country Code","Alpha-2 Country Code","Alpha-3 Country Code","ISO 3166-1"],"category":"codes","conceptType":"code","status":"active","definition":"The international standard defining codes for countries and their subdivisions. ISO 3166-1 provides two-letter (alpha-2, e.g., US, GB, DE), three-letter (alpha-3, e.g., USA, GBR, DEU), and three-digit numeric codes for countries and territories.","definition_ko":"국가와 그 하위 지역에 대한 코드를 정의하는 국제 표준. ISO 3166-1은 국가 및 영토에 대해 2자리(alpha-2, 예: US, GB, DE), 3자리(alpha-3, 예: USA, GBR, DEU), 그리고 3자리 숫자 코드를 제공한다.","longDef":"ISO 3166-1 alpha-2 codes are the most widely used in travel and IT (also the basis for country-code top-level domains and the country segment of UN/LOCODE). ISO 3166-2 covers principal subdivisions (states, provinces, regions). Country codes appear throughout travel data for nationality, country of residence, point of sale, tax/visa rules, and address handling.","longDef_ko":"ISO 3166-1 alpha-2 코드는 여행 및 IT 분야에서 가장 널리 사용된다(국가 코드 최상위 도메인과 UN/LOCODE의 국가 부분의 기준이기도 하다). ISO 3166-2는 주요 하위 지역(주, 도, 지역)을 다룬다. 국가 코드는 국적, 거주 국가, 판매 지점(POS), 세금/비자 규정, 주소 처리 등 여행 데이터 전반에 등장한다.","standardBody":"ISO","providerTerms":[],"relationships":[{"type":"related","targetTerm":"ISO 4217 Currency Code","targetId":"iso-4217-currency-code"},{"type":"related","targetTerm":"UN/LOCODE","targetId":"un-locode"},{"type":"related","targetTerm":"Secure Flight","targetId":"secure-flight"}],"distinctions":[{"targetTerm":"UN/LOCODE","explanation":"ISO 3166 identifies a whole country (2/3-letter); UN/LOCODE identifies a specific location within a country and embeds the ISO 3166 alpha-2 as its first two characters.","explanation_ko":"ISO 3166은 국가 전체를 식별하는(2/3자리) 코드인 반면, UN/LOCODE는 국가 내의 특정 위치를 식별하며 앞 두 글자에 ISO 3166 alpha-2를 포함한다.","targetId":"un-locode"}],"sources":[{"name":"ISO 3166 Country Codes","org":"ISO","version":"","section":"","url":"https://www.iso.org/iso-3166-country-codes.html"}],"lastReviewed":"2026-06-15","icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M12 6v36\"/>\u003cpath d=\"M12 8h22l-4 6 4 6H12\"/>\u003crect x=\"6\" y=\"36\" width=\"30\" height=\"8\" rx=\"2\"/>\u003cpath d=\"M11 40h2M16 40h2M21 40h2\"/>\u003c/svg>"},{"id":"iso-4217-currency-code","term":"ISO 4217 Currency Code","term_ko":"ISO 4217 통화 코드","abbreviation":"ISO 4217","aliases":["Currency Code","ISO Currency Code","Three-Letter Currency Code"],"category":"codes","conceptType":"code","status":"active","definition":"The international standard defining three-letter alphabetic codes (and corresponding numeric codes) for currencies, e.g., USD, EUR, GBP, JPY. It is used throughout travel pricing, ticketing, and settlement to unambiguously denote the currency of an amount.","definition_ko":"통화에 대한 3자리 알파벳 코드(및 그에 대응하는 숫자 코드)를 정의하는 국제 표준(예: USD, EUR, GBP, JPY). 여행 가격 산정, 발권, 정산 전반에서 금액의 통화를 명확하게 나타내는 데 사용된다.","longDef":"ISO 4217 alphabetic codes are typically formed from the ISO 3166 country code plus a letter for the currency name (e.g., US + D = USD). The standard also defines the minor unit (number of decimal places) for each currency. In airline pricing, fares are filed and converted between currencies and the neutral NUC; the local currency on a ticket is expressed using an ISO 4217 code.","longDef_ko":"ISO 4217 알파벳 코드는 일반적으로 ISO 3166 국가 코드에 통화 명칭의 한 글자를 더해 구성된다(예: US + D = USD). 이 표준은 또한 각 통화의 최소 단위(소수점 자릿수)도 정의한다. 항공 가격 산정에서 운임은 여러 통화와 중립 단위인 NUC 사이에서 신고·환산되며, 항공권상의 현지 통화는 ISO 4217 코드로 표현된다.","standardBody":"ISO","providerTerms":[],"relationships":[{"type":"related","targetTerm":"ISO 3166 Country Code","targetId":"iso-3166-country-code"},{"type":"related","targetTerm":"NUC","targetId":"nuc"},{"type":"related","targetTerm":"BSP","targetId":"bsp"}],"distinctions":[{"targetTerm":"NUC","explanation":"ISO 4217 codes denote real-world currencies; NUC is a fare-construction neutral unit used internally to convert fares between currencies, not an ISO 4217 currency.","explanation_ko":"ISO 4217 코드는 실제 통화를 나타내는 반면, NUC는 운임을 통화 간에 환산하기 위해 내부적으로 사용되는 운임 산정용 중립 단위이며 ISO 4217 통화가 아니다.","targetId":"nuc"}],"sources":[{"name":"ISO 4217 Currency codes","org":"ISO","version":"","section":"","url":"https://www.iso.org/iso-4217-currency-codes.html"}],"lastReviewed":"2026-06-15","icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"8\" y=\"10\" width=\"32\" height=\"28\" rx=\"3\"/>\u003cpath d=\"M28 18a6 5 0 0 0-9 4c0 6 9 3 9 9a6 5 0 0 1-9 4\"/>\u003cpath d=\"M23 14v3M23 31v3\"/>\u003c/svg>"},{"id":"itinerary","term":"Itinerary","abbreviation":"","aliases":["Travel Itinerary","Itinerary Receipt","Trip Itinerary"],"category":"air-ops","conceptType":"document","status":"active","definition":"An Itinerary is the ordered list of travel segments — flights and any surface/non-air elements — that make up a passenger's journey as recorded in a PNR. The Itinerary/Receipt is also the passenger-facing document that summarizes these segments together with dates, times, booking status, and ticketing information.","longDef":"Within a PNR the itinerary holds the air Segments (and their Legs), any ARNK surface gaps, and connecting points, in chronological sequence; it underpins fare construction over the Origin & Destination and journey. The combined Itinerary/Receipt document (for electronic tickets, the e-ticket Itinerary/Receipt) is what the traveller carries and presents, listing flight numbers, carriers, times, fare/ticketing details and conditions. The order and continuity of itinerary segments matter for ticketing validity and for minimum connection time checks.","standardBody":"","term_ko":"Itinerary (여정)","definition_ko":"Itinerary는 PNR에 기록된 승객 여정을 구성하는 여행 segment(항공편 및 surface/비항공 요소)의 순서화된 목록이다. Itinerary/Receipt는 이 segment들을 날짜·시간·예약 status·발권 정보와 함께 요약한 승객용 문서이기도 하다.","longDef_ko":"PNR 안에서 itinerary는 항공 Segment(및 그 Leg), ARNK surface 구간, 환승점을 시간 순서로 담으며, Origin & Destination과 journey 단위의 운임 산출 기반이 된다. 결합된 Itinerary/Receipt 문서(전자항공권의 경우 e-ticket Itinerary/Receipt)는 승객이 소지·제시하는 것으로 편명, 항공사, 시간, 운임/발권 상세, 조건을 나열한다. itinerary segment의 순서와 연속성은 발권 유효성과 최소 연결시간(MCT) 점검에 중요하다.","providerTerms":[],"relationships":[{"type":"related","targetTerm":"PNR","targetId":"pnr"},{"type":"broader","targetTerm":"Segment","targetId":"segment"},{"type":"related","targetTerm":"Journey","targetId":"journey"},{"type":"related","targetTerm":"ARNK","targetId":"arnk"},{"type":"related","targetTerm":"E-ticket","targetId":"e-ticket"}],"distinctions":[{"targetTerm":"Journey","explanation":"A Journey is the fare/pricing concept describing the overall trip (e.g., one-way, round-trip, open-jaw) used in fare construction; the Itinerary is the concrete ordered list of booked segments. One itinerary realizes a journey but adds specific flights, dates and times.","explanation_ko":"Journey는 운임 산출에서 쓰는 전체 여행의 운임 개념(편도, 왕복, open-jaw 등)이고, Itinerary는 예약된 segment의 구체적 순서 목록이다. 하나의 itinerary가 journey를 실현하되 구체적 편명·날짜·시간을 더한다.","targetId":"journey"},{"targetTerm":"E-ticket","explanation":"The e-ticket is the electronic record of the contract of carriage and coupons; the Itinerary/Receipt is the human-readable summary issued alongside it. They are related documents, not the same artifact.","explanation_ko":"E-ticket은 운송계약과 coupon의 전자 기록이고, Itinerary/Receipt는 그와 함께 발행되는 사람이 읽을 수 있는 요약본이다. 관련 문서이지 동일한 산출물은 아니다.","targetId":"e-ticket"}],"sources":[{"org":"IATA","name":"Passenger Services Conference Resolutions Manual (PSCRM)","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"11\" y=\"7\" width=\"26\" height=\"34\" rx=\"3\"/>\u003ccircle cx=\"18\" cy=\"15\" r=\"1.6\" fill=\"currentColor\" stroke=\"none\"/>\u003ccircle cx=\"18\" cy=\"24\" r=\"1.6\" fill=\"currentColor\" stroke=\"none\"/>\u003ccircle cx=\"18\" cy=\"33\" r=\"1.6\" fill=\"currentColor\" stroke=\"none\"/>\u003cpath d=\"M24 15h7M24 24h7M24 33h7\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"joint-venture","term":"Joint Venture","term_ko":"조인트 벤처(공동 사업)","abbreviation":"JV","aliases":["JV","Joint Business","Joint Business Agreement","Metal-Neutral Joint Venture"],"category":"air-partner","conceptType":"business-term","status":"active","definition":"A deep commercial cooperation in which two or more airlines coordinate pricing, scheduling, capacity, and marketing on defined markets (often a region or set of routes) and share the associated revenues or profits. JVs are typically \"metal-neutral,\" meaning each partner's economics are unaffected by which carrier's aircraft a passenger actually flies, and they usually require regulatory antitrust immunity.","definition_ko":"둘 이상의 항공사가 정해진 시장(흔히 특정 지역이나 노선군)에서 가격 책정, 스케줄, 공급(capacity), 마케팅을 조율하고 그에 따른 수익 또는 이익을 공유하는 깊은 수준의 상업 협력. JV는 일반적으로 \"metal-neutral\"하여 승객이 실제로 어느 항공사의 항공기를 이용하는지가 각 파트너의 손익에 영향을 주지 않으며, 보통 규제 당국의 반독점 면제(antitrust immunity)를 필요로 한다.","longDef":"Going beyond a codeshare or alliance, a joint venture lets partner airlines behave commercially almost as a single carrier on the covered markets, jointly optimizing schedules, capacity, fares, and sales while pooling and re-dividing revenue or profit. Because such coordination would otherwise raise competition-law concerns, JVs commonly depend on grants of antitrust immunity from regulators (for example the U.S. DOT or the European Commission), sometimes with route carve-outs. JVs are frequently established among members of the same alliance on a specific geography, such as transatlantic or transpacific markets.","longDef_ko":"조인트 벤처는 공동운항이나 동맹을 넘어, 파트너 항공사가 대상 시장에서 스케줄, 공급, 운임, 판매를 공동으로 최적화하고 수익 또는 이익을 통합한 뒤 재분배함으로써 사실상 단일 항공사처럼 상업적으로 행동할 수 있게 한다. 이러한 조율은 그 자체로 경쟁법상 문제를 일으킬 수 있으므로, JV는 일반적으로 규제 당국(예: 미국 DOT 또는 유럽연합 집행위원회)의 반독점 면제 부여에 의존하며, 때로는 일부 노선이 면제 대상에서 제외(carve-out)되기도 한다. JV는 대서양 횡단이나 태평양 횡단 시장과 같은 특정 지역에서 동일 동맹 회원사들 간에 형성되는 경우가 많다.","standardBody":"","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Airline Alliance","targetId":"airline-alliance"},{"type":"related","targetTerm":"Codeshare","targetId":"codeshare"},{"type":"related","targetTerm":"Block Space Agreement","targetId":"block-space-agreement"},{"type":"related","targetTerm":"Proration","targetId":"proration"}],"distinctions":[{"targetTerm":"Airline Alliance","explanation":"An alliance is broad multilateral cooperation without revenue sharing on specific markets; a joint venture adds revenue/profit sharing and metal neutrality on defined routes, usually under antitrust immunity.","explanation_ko":"동맹은 특정 시장에서 수익 공유가 없는 광범위한 다자간 협력이고, 조인트 벤처는 정해진 노선에서 수익/이익 공유와 metal neutrality를 더하며 보통 반독점 면제 하에 운영된다.","targetId":"airline-alliance"},{"targetTerm":"Codeshare","explanation":"A codeshare shares flight codes and may settle per-flight; a JV shares the commercial outcome (revenue or profit) of a whole market regardless of which carrier flies the passenger.","explanation_ko":"공동운항은 편명을 공유하고 항공편 단위로 정산될 수 있는 반면, JV는 어느 항공사가 승객을 운송하든 무관하게 시장 전체의 상업적 결과(수익 또는 이익)를 공유한다.","targetId":"codeshare"}],"sources":[{"name":"The economic benefits generated by alliances and joint ventures (IATA Economics Briefing)","org":"IATA","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003ccircle cx=\"18\" cy=\"24\" r=\"10\"/>\u003ccircle cx=\"30\" cy=\"24\" r=\"10\"/>\u003cpath d=\"M24 16.5 a10 10 0 0 1 0 15 a10 10 0 0 1 0 -15z\" fill=\"currentColor\" stroke=\"none\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"journey","term":"Journey","term_ko":"여정","abbreviation":"","aliases":["Itinerary","Travel Journey"],"category":"air-shop","conceptType":"business-term","status":"active","definition":"A journey is the complete travel a passenger undertakes from the point of origin to final destination, including all flights and any return or onward portions. In shopping and ordering it is the end-to-end itinerary against which offers are constructed.","definition_ko":"여정(journey)은 승객이 출발지에서 최종 목적지까지 수행하는 전체 여행으로, 모든 항공편과 귀환 또는 후속 구간을 포함한다. 쇼핑 및 주문(ordering) 단계에서는 오퍼가 구성되는 기준이 되는 처음부터 끝까지의 전체 일정이다.","longDef":"A journey encompasses one or more O&Ds: a one-way journey is a single O&D, a round trip is typically two O&Ds, and multi-city travel comprises several. For pricing, a journey is decomposed into fare components, each priced over an O&D, which are then summed. In NDC shopping, a journey (or origin-destination request) defines the trip for which offers and orders are produced. The journey aggregates segments and legs into the traveler's overall trip view.","longDef_ko":"여정은 하나 이상의 O&D를 포함한다. 편도 여정은 하나의 O&D이고, 왕복은 일반적으로 두 개의 O&D이며, 다구간(multi-city) 여행은 여러 개로 구성된다. 운임 산정 시 여정은 각각 O&D 단위로 가격이 매겨지는 운임 컴포넌트로 분해된 뒤 합산된다. NDC 쇼핑에서는 여정(또는 origin-destination 요청)이 오퍼와 주문이 생성되는 대상 여행을 정의한다. 여정은 세그먼트와 레그를 여행자의 전체 여행 관점으로 집계한다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Origin & Destination","targetId":"origin-destination"},{"type":"related","targetTerm":"Fare Component","targetId":"fare-component"},{"type":"related","targetTerm":"Segment","targetId":"segment"},{"type":"related","targetTerm":"Offer","targetId":"offer"},{"type":"related","targetTerm":"Order","targetId":"order"}],"distinctions":[{"targetTerm":"Origin & Destination","explanation":"A journey is the whole trip; an O&D is a single directional point-pair, and a journey may contain several O&Ds.","explanation_ko":"여정은 전체 여행이고, O&D는 방향성을 가진 하나의 지점 쌍이며, 한 여정은 여러 O&D를 포함할 수 있다.","targetId":"origin-destination"},{"targetTerm":"Segment","explanation":"A segment is one priced/booked flight portion within a journey; the journey is the full set of segments end to end.","explanation_ko":"세그먼트는 여정 내에서 가격이 매겨지거나 예약된 하나의 비행 구간이고, 여정은 처음부터 끝까지의 전체 세그먼트 집합이다.","targetId":"segment"}],"sources":[{"name":"IATA NDC / Offer and Order management standards","org":"IATA","version":"","section":"","url":""},{"name":"IATA fare construction principles","org":"IATA","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M10 12h9a5 5 0 010 10H16a5 5 0 000 10h12\"/>\u003ccircle cx=\"10\" cy=\"12\" r=\"3\"/>\u003ccircle cx=\"38\" cy=\"32\" r=\"3\"/>\u003ccircle cx=\"24\" cy=\"22\" r=\"2\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"known-traveler-number","term":"Known Traveler Number","abbreviation":"KTN","aliases":["KTN","Trusted Traveler ID","PASS ID"],"category":"customer","conceptType":"code","status":"active","definition":"A Known Traveler Number (KTN) is a unique identifier issued by the U.S. Transportation Security Administration (TSA) or U.S. Customs and Border Protection (CBP) to travelers approved for a trusted traveler program such as TSA PreCheck, Global Entry, NEXUS, or SENTRI. When entered into an airline reservation, it allows the traveler's eligibility for expedited screening to be vetted through the TSA Secure Flight program and reflected on the boarding pass.","longDef":"The KTN is stored in the passenger's reservation and passed by the carrier to TSA via the Secure Flight watch-list matching process. For travelers approved through the TSA PreCheck Application Program, the KTN is typically 9 or 10 characters and may combine letters and digits (often prefixed TT, TE, or AC depending on the enrollment provider). For Global Entry, NEXUS, and SENTRI members, the KTN is the CBP-assigned PASS ID, a nine-digit number. The KTN is distinct from a Redress Number: the KTN grants access to expedited screening for low-risk vetted travelers, whereas a Redress Number resolves recurring misidentification problems. In a GDS/PNR context the KTN is generally transmitted to the operating carrier via the Secure Flight SSR (DOCO/Secure Flight passenger data fields) rather than stored only as a free-text remark.","standardBody":"TSA (U.S. Department of Homeland Security)","term_ko":"KTN(Known Traveler Number, 신뢰여행자번호)","definition_ko":"KTN(Known Traveler Number)은 TSA PreCheck, Global Entry, NEXUS, SENTRI 같은 신뢰여행자 프로그램에 승인된 여행자에게 미국 교통보안청(TSA) 또는 세관국경보호청(CBP)이 부여하는 고유 식별번호다. 항공 예약에 입력하면 해당 여행자의 신속 보안검색 자격이 Secure Flight 절차를 통해 확인되어 탑승권에 PreCheck 표시로 반영된다.","longDef_ko":"KTN은 승객 예약(PNR)에 저장되어 Secure Flight 대조 절차를 통해 항공사가 TSA로 전송한다. TSA PreCheck Application Program 승인자의 KTN은 보통 9~10자리이며 문자와 숫자가 섞일 수 있고(등록 사업자에 따라 TT, TE, AC 등으로 시작), Global Entry/NEXUS/SENTRI 회원의 KTN은 CBP가 부여한 9자리 PASS ID다. KTN은 Redress Number와 다르다. KTN은 저위험으로 사전 심사된 여행자에게 신속 검색 자격을 주는 번호이고, Redress Number는 반복되는 오인 식별 문제를 해결하기 위한 번호다. GDS/PNR에서 KTN은 보통 단순 메모가 아니라 Secure Flight 승객정보(DOCO 등) 항목을 통해 운항 항공사로 전달된다.","providerTerms":[{"provider":"TSA","term":"TSA PreCheck","context":"Expedited screening program whose approval results in issuance of a KTN.","context_ko":"승인 시 KTN이 발급되는 신속 보안검색 프로그램.","relationship":"related"},{"provider":"CBP","term":"PASS ID","context":"The nine-digit CBP membership number that serves as the KTN for Global Entry, NEXUS and SENTRI members.","context_ko":"Global Entry/NEXUS/SENTRI 회원에게 KTN 역할을 하는 9자리 CBP 회원번호.","relationship":"same"}],"relationships":[{"type":"related","targetTerm":"Secure Flight","targetId":"secure-flight"},{"type":"related","targetTerm":"Customer Profile","targetId":"customer-profile"},{"type":"related","targetTerm":"PNR","targetId":"pnr"},{"type":"contrasts","targetTerm":"Redress Number","targetId":"redress-number"}],"distinctions":[{"targetTerm":"Redress Number","explanation":"A KTN grants pre-vetted travelers access to expedited screening, while a Redress Number is issued to travelers who experienced repeated screening difficulties due to misidentification; the two programs are separate and a traveler may hold neither, either, or both.","explanation_ko":"KTN은 사전 심사된 여행자에게 신속 검색 자격을 주는 번호이고, Redress Number는 오인 식별로 반복적인 검색 문제를 겪은 여행자에게 발급되는 번호다. 두 프로그램은 서로 별개이며 여행자는 둘 다, 하나만, 또는 둘 다 없을 수 있다.","targetId":"redress-number"},{"targetTerm":"Secure Flight","explanation":"Secure Flight is the TSA watch-list matching process; the KTN is the data element a traveler supplies so that Secure Flight can confirm trusted-traveler eligibility.","explanation_ko":"Secure Flight는 TSA의 감시목록 대조 절차이고, KTN은 그 절차가 신뢰여행자 자격을 확인할 수 있도록 여행자가 제공하는 데이터 요소다.","targetId":"secure-flight"}],"sources":[{"org":"TSA","name":"What is a Known Traveler Number (KTN)? - Frequently Asked Questions","version":"","section":"","url":"https://www.tsa.gov/travel/frequently-asked-questions/what-known-traveler-number-ktn"},{"org":"TSA","name":"TSA PreCheck FAQ","version":"","section":"","url":"https://www.tsa.gov/precheck/faq"}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"6\" y=\"12\" width=\"36\" height=\"24\" rx=\"3\"/>\u003ccircle cx=\"16\" cy=\"22\" r=\"4\"/>\u003cpath d=\"M10 32c1-3 4-5 6-5s5 2 6 5\"/>\u003cpath d=\"M28 20h10\"/>\u003cpath d=\"M28 26h8\"/>\u003cpath d=\"M20 16l2 2 3-4\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"leg","term":"Leg","abbreviation":"","aliases":["Flight Leg","Hop"],"category":"air-ops","conceptType":"business-term","status":"active","definition":"A leg is a single physical movement of an aircraft from one takeoff (departure airport) to the next landing (arrival airport). It is the operational building block of a flight; a flight number may operate over one or more legs.","definition_ko":"leg(운항 구간)은 한 번의 이륙(출발 공항)에서 다음 착륙(도착 공항)까지의 항공기 단일 물리적 이동이다. 항공편의 운영상 기본 단위이며, 하나의 편명이 하나 이상의 leg으로 운항될 수 있다.","term_ko":"운항 구간(Leg)","longDef":"Legs describe the operational reality of an aircraft's routing, used in schedule data (e.g., SSIM leg records) and operations control. A multi-leg flight under a single flight number (a through or direct flight) presents to the buyer as one segment but is operated as two or more legs, each with its own departure/arrival times and possibly different equipment.","longDef_ko":"leg은 항공기 노선의 운영상 실제를 나타내며, 스케줄 데이터(예: SSIM leg 레코드)와 운항 통제에 사용된다. 단일 편명으로 운항되는 여러 leg 항공편(through 또는 직항편)은 구매자에게는 하나의 segment로 표시되지만, 각각 고유한 출발/도착 시각과 경우에 따라 다른 기재(equipment)를 가진 둘 이상의 leg으로 운항된다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"child","targetTerm":"Segment","targetId":"segment"},{"type":"related","targetTerm":"Schedule Change","targetId":"schedule-change"}],"distinctions":[{"targetTerm":"Segment","explanation":"A leg is one physical takeoff-to-landing hop, while a segment is the sold/marketed flight under one flight number that may span several legs.","explanation_ko":"leg은 하나의 물리적 이착륙 구간인 반면, segment는 여러 leg에 걸칠 수 있는, 하나의 편명으로 판매·마케팅되는 항공편이다.","targe
