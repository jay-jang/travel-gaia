D 조정이 발생할 수 있다. 오픈 티켓은 현대 수익 발권에서는 훨씬 드물어졌고 많은 항공사가 날짜 변경 가능한 유연 운임으로 대체했으나, 오픈 쿠폰 개념은 특정 운임 유형, 인터라인 상황, 운항 차질 처리 등에서 여전히 존속한다.","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Coupon Status","targetId":"coupon-status"},{"type":"related","targetTerm":"Flight Coupon","targetId":"flight-coupon"},{"type":"related","targetTerm":"E-ticket","targetId":"e-ticket"},{"type":"related","targetTerm":"Ticketing Time Limit","targetId":"ticketing-time-limit"},{"type":"related","targetTerm":"Reissue","targetId":"reissue"}],"distinctions":[{"targetTerm":"Coupon Status","explanation":"Coupon status is the lifecycle state of any flight coupon (e.g. OPEN FOR USE, FLOWN, USED); an open ticket is specifically a ticket whose coupon(s) remain in the OPEN status with no fixed flight or date.","explanation_ko":"Coupon status는 모든 항공편 쿠폰의 생애주기 상태(예: OPEN FOR USE, FLOWN, USED)이고, open ticket은 특히 쿠폰이 확정된 항공편·날짜 없이 OPEN 상태에 머무는 항공권을 말한다.","targetId":"coupon-status"}],"sources":[{"org":"IATA","name":"Ticketing Handbook","version":"","section":"","url":""},{"org":"AltexSoft","name":"Open ticket (Travel Glossary)","version":"","section":"","url":"https://www.altexsoft.com/glossary/open-ticket/"}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M7 16h26v16H7z\"/>\u003cpath d=\"M33 16l8 8-8 8\"/>\u003cline x1=\"13\" y1=\"22\" x2=\"24\" y2=\"22\"/>\u003cline x1=\"13\" y1=\"27\" x2=\"20\" y2=\"27\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"opentravel-alliance","term":"OpenTravel Alliance","term_ko":"OpenTravel Alliance(오픈트래블 얼라이언스)","abbreviation":"OTA","aliases":["OpenTravel","OTA Specification","OpenTravel Alliance Message Specification"],"category":"standards","conceptType":"standard","status":"active","definition":"The OpenTravel Alliance is a non-profit, cross-industry organization that develops and maintains open XML (and JSON) message specifications for the exchange of travel information across air, hotel, car rental, cruise, and other sectors. Its message set is commonly abbreviated 'OTA', which is unrelated to Online Travel Agencies.","definition_ko":"OpenTravel Alliance는 항공, 호텔, 렌터카, 크루즈 등 여러 분야에 걸쳐 여행 정보를 교환하기 위한 개방형 XML(및 JSON) 메시지 명세를 개발하고 유지하는 비영리 범산업 단체이다. 그 메시지 집합은 흔히 'OTA'로 약칭되는데, 이는 온라인 여행사와는 무관하다.","longDef":"OpenTravel publishes a standardized schema library (e.g., OTA_HotelAvailRQ/RS, OTA_AirBookRQ/RS) widely used in hotel and air distribution integrations. It has collaborated with bodies such as HTNG and provides a common vocabulary and message structure for system-to-system communication between suppliers, intermediaries, and sellers.","longDef_ko":"OpenTravel은 호텔 및 항공 유통 연동에 널리 쓰이는 표준화된 스키마 라이브러리(예: OTA_HotelAvailRQ/RS, OTA_AirBookRQ/RS)를 발행한다. HTNG 등의 단체와 협력해 왔으며, 공급사, 중개자, 판매자 간 시스템 대 시스템 통신을 위한 공통 어휘와 메시지 구조를 제공한다.","standardBody":"OpenTravel","providerTerms":[],"relationships":[{"type":"related","targetTerm":"HTNG","targetId":"htng"},{"type":"related","targetTerm":"NDC","targetId":"ndc"},{"type":"related","targetTerm":"ARI","targetId":"ari"},{"type":"related","targetTerm":"Channel Manager","targetId":"channel-manager"},{"type":"related","targetTerm":"CRS","targetId":"crs"}],"distinctions":[{"targetTerm":"OTA (Online Travel Agency)","explanation":"OpenTravel Alliance is an XML standards body (its messages are abbreviated 'OTA'); an Online Travel Agency is a consumer-facing travel retailer — same abbreviation, unrelated concepts.","explanation_ko":"OpenTravel Alliance는 XML 표준 단체(그 메시지가 'OTA'로 약칭됨)이고, 온라인 여행사는 소비자 대상 여행 소매업체이다. 약어는 같지만 서로 무관한 개념이다.","targetId":"ota-online-travel-agency"},{"targetTerm":"HTNG","explanation":"OpenTravel maintains general cross-sector travel XML message specifications; HTNG focuses on hospitality technology interoperability standards and frameworks.","explanation_ko":"OpenTravel은 분야를 아우르는 일반적인 여행 XML 메시지 명세를 유지하고, HTNG는 호스피탈리티 기술 상호운용성 표준과 프레임워크에 집중한다.","targetId":"htng"},{"targetTerm":"NDC","explanation":"OpenTravel is a broad multi-sector travel XML standard; NDC is IATA's air-specific distribution XML standard.","explanation_ko":"OpenTravel은 여러 분야를 아우르는 광범위한 여행 XML 표준이고, NDC는 IATA의 항공 전용 유통 XML 표준이다.","targetId":"ndc"}],"sources":[{"name":"OpenTravel Specifications","org":"OpenTravel Alliance","version":"","section":"","url":""}],"lastReviewed":"2026-06-15","icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003ccircle cx=\"24\" cy=\"24\" r=\"16\"/>\u003cpath d=\"M8 24h32\"/>\u003cpath d=\"M24 8c5 4 5 28 0 32M24 8c-5 4-5 28 0 32\"/>\u003cpath d=\"M15 25l4-4 3 3 5-6 4 4\"/>\u003c/svg>"},{"id":"operating-carrier","term":"Operating Carrier","term_ko":"운항 항공사(오퍼레이팅 캐리어)","abbreviation":"","aliases":["Operating Airline"],"category":"air-partner","conceptType":"role","status":"active","definition":"The airline that physically operates a flight, providing the aircraft, crew, and operational control, regardless of which carriers' codes are sold on it. On a codeshare flight there is one operating carrier but potentially several marketing carriers.","definition_ko":"어떤 항공사의 코드가 판매되든 관계없이 항공기, 승무원, 운항 통제를 제공하여 실제로 항공편을 운항하는 항공사. 공동운항편에서는 운항 항공사는 하나이지만 판매 항공사는 여럿일 수 있다.","longDef":"The operating carrier holds operational responsibility for the flight, including safety, schedule, and ground handling. Passenger disclosure regulations require that travelers be informed of the operating carrier when it differs from the marketing carrier whose code they booked. In reservation and schedule data the operating carrier is identified separately from the marketing carrier, so selling systems can show both the code sold and the airline actually flying.","longDef_ko":"운항 항공사는 안전, 스케줄, 지상 조업을 포함한 항공편의 운항 책임을 진다. 승객 고지 규정은 승객이 예약한 코드의 판매 항공사와 운항 항공사가 다를 경우 운항 항공사를 승객에게 알리도록 요구한다. 예약 및 스케줄 데이터에서 운항 항공사는 판매 항공사와 별도로 식별되어, 판매 시스템이 판매된 코드와 실제로 운항하는 항공사를 모두 표시할 수 있다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Marketing Carrier","targetId":"marketing-carrier"},{"type":"related","targetTerm":"Codeshare","targetId":"codeshare"},{"type":"related","targetTerm":"Airline Designator","targetId":"airline-designator"}],"distinctions":[{"targetTerm":"Marketing Carrier","explanation":"The operating carrier flies the aircraft; the marketing carrier sells the flight under its own code and number.","explanation_ko":"운항 항공사는 항공기를 운항하고, 판매 항공사는 자사의 코드와 편명으로 항공편을 판매한다.","targetId":"marketing-carrier"},{"targetTerm":"Codeshare","explanation":"Operating carrier is a role on a specific flight; codeshare is the commercial arrangement that creates the distinction between operating and marketing carriers.","explanation_ko":"운항 항공사는 특정 항공편에서의 역할이고, 공동운항은 운항 항공사와 판매 항공사의 구분을 만들어내는 상업적 협정이다.","targetId":"codeshare"}],"sources":[{"name":"Standard Schedules Information Manual (SSIM)","org":"IATA","version":"","section":"","url":""},{"name":"DOT rules on disclosure of code-share arrangements","org":"U.S. Department of Transportation","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M6 26l14-3 6-9 3 1-3 9 9-2 3-3 3 1-2 5\"/>\u003ccircle cx=\"38\" cy=\"36\" r=\"7\"/>\u003cpath d=\"M38 32v4l3 2\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"order","term":"Order","term_ko":"주문(Order)","abbreviation":"","aliases":["Air Order","NDC Order","Customer Order"],"category":"standards","conceptType":"standard-term","status":"active","definition":"In IATA's Offer and Order model, an Order is the single record that captures everything a customer has purchased, including products, services, prices, payment, and fulfillment status, created when a customer accepts an Offer. It is intended to consolidate and eventually replace the PNR, e-ticket, and EMD.","definition_ko":"IATA의 Offer and Order 모델에서 주문(Order)은 고객이 구매한 모든 내용, 즉 상품, 서비스, 가격, 결제, 이행 상태를 담는 단일 기록으로, 고객이 오퍼를 수락할 때 생성된다. PNR, e-ticket, EMD를 통합하고 궁극적으로 대체하는 것을 목표로 한다.","longDef":"The Order is the central data object in NDC OrderCreate/OrderManagement and is the foundation of the ONE Order initiative, which aims to make the Order the single source of truth across the booking and delivery lifecycle, simplifying accounting and settlement compared with separate PNR/document constructs.","longDef_ko":"주문은 NDC OrderCreate/OrderManagement의 핵심 데이터 객체이자 ONE Order 이니셔티브의 기반으로, 예약부터 이행에 이르는 전체 주기에 걸쳐 주문을 단일 진실 공급원(single source of truth)으로 삼는 것을 목표로 하며, 별도의 PNR/문서 구조에 비해 회계와 정산을 단순화한다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Offer","targetId":"offer"},{"type":"related","targetTerm":"NDC","targetId":"ndc"},{"type":"related","targetTerm":"ONE Order","targetId":"one-order"},{"type":"related","targetTerm":"PNR","targetId":"pnr"},{"type":"related","targetTerm":"E-ticket","targetId":"e-ticket"},{"type":"related","targetTerm":"EMD","targetId":"emd"}],"distinctions":[{"targetTerm":"Offer","explanation":"An Order is the committed purchase record; an Offer is the priced proposal the customer accepts to create the Order.","explanation_ko":"주문은 확정된 구매 기록이고, 오퍼는 고객이 수락하여 주문을 생성하는 가격이 책정된 제안이다.","targetId":"offer"},{"targetTerm":"PNR","explanation":"An Order is the modern single sales/fulfillment record intended to replace the legacy PNR plus separate e-ticket/EMD documents.","explanation_ko":"주문은 레거시 PNR과 별도의 e-ticket/EMD 문서를 대체하기 위한 현대적 단일 판매/이행 기록이다.","targetId":"pnr"},{"targetTerm":"ONE Order","explanation":"Order is the data object; ONE Order is the IATA standard/initiative defining and promoting that single Order record.","explanation_ko":"Order는 데이터 객체이고, ONE Order는 그 단일 주문 기록을 정의하고 확산시키는 IATA 표준이자 이니셔티브이다.","targetId":"one-order"}],"sources":[{"name":"Offer and Order (Airline Retailing)","org":"IATA","version":"","section":"","url":""},{"name":"ONE Order","org":"IATA","version":"","section":"","url":""}],"lastReviewed":"2026-06-15","icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M12 6h18l8 8v28a2 2 0 0 1-2 2H12a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2z\"/>\u003cpath d=\"M30 6v8h8\"/>\u003cpath d=\"M16 22l2 2 3-3\"/>\u003cpath d=\"M25 23h8\"/>\u003cpath d=\"M16 30l2 2 3-3\"/>\u003cpath d=\"M25 31h8\"/>\u003c/svg>"},{"id":"order-management-system-oms","term":"Order Management System (OMS)","term_ko":"주문 관리 시스템(Order Management System, OMS)","abbreviation":"OMS","aliases":["Order Management System","Airline OMS","Offer and Order Management System"],"category":"standards","conceptType":"system","status":"active","definition":"An Order Management System is the airline-retailing platform that creates, stores, and services the customer Order across its lifecycle, acting as the single source of truth for all purchased air and non-air products, payments, fulfillment, and changes. It is the 'order' side counterpart to the Offer Management System and the operational foundation of IATA's ONE Order.","definition_ko":"주문 관리 시스템(Order Management System)은 고객 주문(Order)을 전체 주기에 걸쳐 생성·저장·서비스하는 항공 리테일링 플랫폼으로, 구매한 모든 항공/비항공 상품, 결제, 이행, 변경에 대한 단일 진실 공급원(single source of truth) 역할을 한다. 오퍼 관리 시스템에 대응하는 '주문(order)' 측 시스템이며 IATA ONE Order의 운영 기반이다.","longDef":"Supported by IATA's ONE Order initiative, an OMS provides a unified, single-record view of an Order and every change to it, handling payment, fulfillment, delivery, servicing, and order-level accounting. It is designed to consolidate and eventually replace the legacy PNR, e-ticket, and EMD constructs and their document-based settlement. Vendors and airlines frequently market a combined 'Offer & Order Management System', so 'OMS' may denote the order half or the whole platform depending on context.","longDef_ko":"IATA의 ONE Order 이니셔티브가 뒷받침하는 OMS는 주문과 그에 대한 모든 변경에 대해 통합된 단일 기록 관점을 제공하며, 결제·이행·전달·서비스·주문 단위 회계를 처리한다. 레거시 PNR, e-ticket, EMD 구조와 문서 기반 정산을 통합하고 궁극적으로 대체하도록 설계되었다. 벤더와 항공사는 흔히 통합 'Offer & Order Management System'으로 마케팅하므로, 'OMS'는 맥락에 따라 주문 절반 또는 전체 플랫폼을 가리킬 수 있다.","standardBody":"","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Order","targetId":"order"},{"type":"related","targetTerm":"Offer Management System","targetId":"offer-management-system"},{"type":"related","targetTerm":"ONE Order","targetId":"one-order"},{"type":"related","targetTerm":"NDC","targetId":"ndc"},{"type":"related","targetTerm":"PNR","targetId":"pnr"},{"type":"related","targetTerm":"EMD","targetId":"emd"}],"distinctions":[{"targetTerm":"Offer Management System","explanation":"The Order Management System owns the post-sale Order (creation, servicing, accounting); the Offer Management System owns pre-sale Offer construction and pricing. Both are commonly bundled as one 'Offer & Order' platform.","explanation_ko":"주문 관리 시스템은 판매 이후의 주문(생성·서비스·회계)을 담당하고, 오퍼 관리 시스템은 판매 이전의 오퍼 구성과 가격책정을 담당한다. 둘은 흔히 하나의 'Offer & Order' 플랫폼으로 묶여 제공된다.","targetId":"offer-management-system"},{"targetTerm":"ONE Order","explanation":"ONE Order is the IATA standard/initiative defining the single Order record and its messages; an Order Management System is the platform that implements and operates it.","explanation_ko":"ONE Order는 단일 주문 기록과 그 메시지를 정의하는 IATA 표준·이니셔티브이고, 주문 관리 시스템은 그것을 구현·운영하는 플랫폼이다.","targetId":"one-order"},{"targetTerm":"PNR","explanation":"An OMS centers on the modern single Order record; the PNR is the legacy reservation construct an OMS aims to consolidate and replace.","explanation_ko":"OMS는 현대적 단일 주문 기록을 중심에 두고, PNR은 OMS가 통합·대체하려는 레거시 예약 구조이다.","targetId":"pnr"}],"sources":[{"org":"IATA","name":"Airline Retailing - Order and Offer Management","version":"","section":"","url":""},{"org":"IATA","name":"ONE Order","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M10 14h28l-3 24a2 2 0 0 1-2 2H15a2 2 0 0 1-2-2z\"/>\u003cpath d=\"M17 14a7 7 0 0 1 14 0\"/>\u003cpath d=\"M19 26l3 3 6-6\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"origin-destination","term":"Origin & Destination","term_ko":"출발지 및 도착지 (O&D)","abbreviation":"O&D","aliases":["Origin and Destination","O&D","OnD"],"category":"air-shop","conceptType":"business-term","status":"active","definition":"Origin & Destination (O&D) is the city or airport pair representing where a passenger's journey or priced portion begins and ends, irrespective of intermediate connecting points. It is the unit airlines use for availability requests, revenue management, and pricing rather than individual flight legs.","definition_ko":"Origin & Destination(O&D, 출발지 및 도착지)은 중간 연결 지점과 무관하게 승객의 여정 또는 운임 산정 구간이 시작되고 끝나는 도시 또는 공항 쌍을 의미한다. 이는 항공사가 개별 비행 구간(leg) 대신 가용성 요청, 수익 관리, 운임 산정에 사용하는 단위이다.","longDef":"O&D pricing and inventory control treat the full market between the true origin and true destination as the optimization unit, so that a connecting itinerary BOS-ORD-LAX is managed as the O&D BOS-LAX rather than as two separate legs. O&D-based availability (often combined with married-segment logic) lets carriers offer different class availability to a through passenger than to local passengers on the same legs. The concept underlies fare construction, where a journey is broken into fare components each defined by an O&D.","longDef_ko":"O&D 기반 운임 산정 및 재고 관리는 실제 출발지와 실제 도착지 사이의 전체 시장을 최적화 단위로 취급한다. 따라서 BOS-ORD-LAX 연결 여정은 두 개의 개별 구간이 아니라 BOS-LAX라는 하나의 O&D로 관리된다. O&D 기반 가용성(흔히 결합 구간 로직과 결합됨)을 통해 항공사는 동일 구간이라도 통과 승객과 로컬 승객에게 서로 다른 등급 가용성을 제공할 수 있다. 이 개념은 운임 산정의 기반이 되며, 여기서 여정은 각각 O&D로 정의되는 운임 컴포넌트로 분할된다.","standardBody":"IATA","providerTerms":[{"provider":"Sabre","term":"O&D / Origin and Destination","context":"Sabre availability and revenue-management documentation uses O&D as the market unit.","context_ko":"Sabre의 가용성 및 수익 관리 문서는 O&D를 시장 단위로 사용한다.","relationship":"same"}],"relationships":[{"type":"related","targetTerm":"Journey","targetId":"journey"},{"type":"related","targetTerm":"Fare Component","targetId":"fare-component"},{"type":"related","targetTerm":"Availability","targetId":"availability"},{"type":"related","targetTerm":"Married Segment","targetId":"married-segment"},{"type":"related","targetTerm":"Segment","targetId":"segment"},{"type":"related","targetTerm":"Leg","targetId":"leg"}],"distinctions":[{"targetTerm":"Leg","explanation":"A leg is a single nonstop flight operation; an O&D is the full market between true origin and destination, possibly spanning multiple legs.","explanation_ko":"레그(leg)는 하나의 직항 비행 운항이고, O&D는 실제 출발지와 도착지 사이의 전체 시장으로 여러 레그에 걸칠 수 있다.","targetId":"leg"},{"targetTerm":"Journey","explanation":"A journey is the passenger's entire travel arc; an O&D is a directional point-pair, and a round trip contains two O&Ds.","explanation_ko":"여정(journey)은 승객의 전체 여행 흐름이고, O&D는 방향성을 가진 지점 쌍이며, 왕복 여행은 두 개의 O&D를 포함한다.","targetId":"journey"}],"sources":[{"name":"IATA fare construction / pricing principles","org":"IATA","version":"","section":"","url":""},{"name":"Airline revenue management literature on O&D control","org":"","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003ccircle cx=\"12\" cy=\"34\" r=\"4\"/>\u003cpath d=\"M16 32c8-2 12-6 16-16\"/>\u003cpath d=\"M34 11l3 1 1 3\"/>\u003cpath d=\"M33 8a4 4 0 11-1 8 4 4 0 011-8z\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"osi","term":"OSI","abbreviation":"OSI","aliases":["Other Service Information","Other Supplementary Information"],"category":"air-ops","conceptType":"standard-term","status":"active","definition":"Other Service Information (OSI) is an informational free-text or semi-structured message element in a PNR sent to one or all carriers to communicate information that does not require any carrier action or reply, such as a passenger contact note or VIP advisory. Unlike an SSR, it carries no action/status code.","definition_ko":"OSI(Other Service Information, 기타 서비스 정보)는 승객 연락처 메모나 VIP 안내처럼 항공사의 조치나 응답이 필요 없는 정보를 전달하기 위해 한 곳 또는 모든 항공사에 전송되는, PNR 내의 정보성 자유 텍스트 또는 반정형 메시지 요소다. SSR과 달리 action/status 코드를 포함하지 않는다.","term_ko":"기타 서비스 정보(OSI)","longDef":"OSI elements convey advisory information to the carrier (for example, frequent-flyer notes, special handling courtesies, or operational remarks) and are addressed either to a specific airline or to all carriers in the itinerary. Because OSI is non-actionable, the carrier is not expected to confirm or respond, which is the key operational difference from an SSR.","longDef_ko":"OSI 요소는 항공사에 안내성 정보(예: 상용고객 메모, 특별 응대 사항, 운영상 비고)를 전달하며, 특정 항공사 또는 여정 내 모든 항공사를 수신 대상으로 지정한다. OSI는 조치를 요하지 않으므로 항공사가 확인하거나 응답할 것으로 기대되지 않으며, 이것이 SSR과의 핵심적인 운영상 차이점이다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"SSR","targetId":"ssr"},{"type":"related","targetTerm":"PNR","targetId":"pnr"}],"distinctions":[{"targetTerm":"SSR","explanation":"OSI is purely informational with no required carrier action or reply, whereas an SSR is an action request that expects a confirming status code from the carrier.","explanation_ko":"OSI는 항공사의 조치나 응답이 필요 없는 순수 정보성인 반면, SSR은 항공사로부터 확인 상태 코드를 기대하는 조치 요청이다.","targetId":"ssr"}],"sources":[{"name":"Passenger Services Conference Resolutions Manual (PSCRM)","org":"IATA","version":"","section":"","url":""},{"name":"PADIS EDIFACT/XML Message Standards","org":"IATA","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003ccircle cx=\"24\" cy=\"24\" r=\"17\"/>\u003cline x1=\"24\" y1=\"22\" x2=\"24\" y2=\"33\"/>\u003ccircle cx=\"24\" cy=\"16\" r=\"0.5\" fill=\"currentColor\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"ota-online-travel-agency","term":"OTA (Online Travel Agency)","term_ko":"온라인 여행사(OTA)","abbreviation":"OTA","aliases":["Online Travel Agency","Online Travel Agent"],"category":"standards","conceptType":"business-term","status":"active","definition":"An Online Travel Agency is a web- or app-based retailer that aggregates and sells travel products (flights, hotels, packages, car rental, activities) from multiple suppliers to consumers, typically sourcing content from GDSs, bedbanks, and direct supplier connections. Examples include Expedia, Booking.com, and Trip.com.","definition_ko":"온라인 여행사(OTA)는 여러 공급사의 여행 상품(항공편, 호텔, 패키지, 렌터카, 액티비티)을 통합하여 소비자에게 판매하는 웹 또는 앱 기반 소매업체로, 보통 GDS, 베드뱅크(bedbank), 공급사 직접 연결을 통해 콘텐츠를 확보한다. Expedia, Booking.com, Trip.com 등이 그 예이다.","longDef":"OTAs operate under various commercial models including the agency (commissionable) model and the merchant model, and may act as merchant of record. They are distinct from metasearch sites, which redirect users to booking sites rather than completing the transaction themselves. Note: the acronym 'OTA' also separately denotes the OpenTravel Alliance XML standard, an unrelated concept.","longDef_ko":"OTA는 에이전시(수수료) 모델과 머천트(merchant) 모델 등 다양한 상업 모델로 운영되며 등록 판매자(merchant of record) 역할을 하기도 한다. 거래를 직접 완료하지 않고 사용자를 예약 사이트로 연결해 주는 메타서치 사이트와는 구별된다. 참고: 'OTA'라는 약어는 별개로 OpenTravel Alliance XML 표준을 가리키기도 하며, 이는 무관한 개념이다.","standardBody":"","providerTerms":[],"relationships":[{"type":"related","targetTerm":"GDS","targetId":"gds"},{"type":"related","targetTerm":"Metasearch","targetId":"metasearch"},{"type":"related","targetTerm":"Aggregator","targetId":"aggregator"},{"type":"related","targetTerm":"Bedbank","targetId":"bedbank"},{"type":"related","targetTerm":"Merchant Model","targetId":"merchant-model"},{"type":"related","targetTerm":"Agency Model","targetId":"agency-model"},{"type":"related","targetTerm":"Merchant of Record","targetId":"merchant-of-record"}],"distinctions":[{"targetTerm":"OpenTravel Alliance","explanation":"This OTA is an online travel retailer (agency); the identically abbreviated OpenTravel Alliance is an XML messaging standards body — entirely unrelated.","explanation_ko":"여기서 OTA는 온라인 여행 소매업체(여행사)이고, 동일하게 약칭되는 OpenTravel Alliance는 XML 메시징 표준 단체로 전혀 관련이 없다.","targetId":"opentravel-alliance"},{"targetTerm":"Metasearch","explanation":"An OTA sells and processes the booking itself; a metasearch only compares prices and refers the user to an OTA or supplier to book.","explanation_ko":"OTA는 예약을 직접 판매하고 처리하며, 메타서치는 가격만 비교하고 예약을 위해 사용자를 OTA나 공급사로 연결한다.","targetId":"metasearch"},{"targetTerm":"GDS","explanation":"An OTA is a consumer-facing seller; a GDS is the wholesale distribution platform that supplies content to sellers.","explanation_ko":"OTA는 소비자 대상 판매자이고, GDS는 판매자에게 콘텐츠를 공급하는 도매 유통 플랫폼이다.","targetId":"gds"}],"sources":[{"name":"Online Travel Agency (industry definition)","org":"Phocuswright / industry usage","version":"","section":"","url":""}],"lastReviewed":"2026-06-15","icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"8\" y=\"10\" width=\"32\" height=\"24\" rx=\"2\"/>\u003cpath d=\"M8 16h32\"/>\u003cpath d=\"M18 42h12M24 34v8\"/>\u003cpath d=\"M28 20l-7 3 1 4M21 23l3 3\"/>\u003ccircle cx=\"29\" cy=\"21\" r=\"1\" fill=\"currentColor\"/>\u003c/svg>"},{"id":"overbooking","term":"Overbooking","term_ko":"초과 예약 (오버부킹)","abbreviation":"","aliases":["Oversell","Overselling"],"category":"air-shop","conceptType":"business-term","status":"active","definition":"Overbooking is the deliberate practice of selling more seats on a flight than the aircraft physically has, to offset expected no-shows and cancellations and maximize load factor and revenue. When more passengers show up than there are seats, the carrier must deny boarding, usually offering compensation or rebooking.","definition_ko":"Overbooking(초과 예약)은 예상되는 노쇼(no-show)와 취소를 상쇄하고 탑승률과 수익을 극대화하기 위해, 항공기가 물리적으로 보유한 좌석보다 더 많은 좌석을 의도적으로 판매하는 관행이다. 좌석 수보다 많은 승객이 나타나면 항공사는 탑승을 거부해야 하며, 보통 보상이나 재예약을 제공한다.","longDef":"Revenue management systems set overbooking levels per flight and class using forecasts of no-show and cancellation rates, balancing the cost of spoiled (empty) seats against the cost of denied boarding. Overbooking directly affects availability, since authorized booking levels can exceed physical capacity. Denied boarding that results from oversell is regulated in many jurisdictions (for example US DOT oversales rules and EU air passenger rights regulation), which mandate compensation and care, and it often triggers involuntary rebooking and IROPS-style handling.","longDef_ko":"수익 관리 시스템은 노쇼 및 취소율 예측을 사용해 항공편 및 등급별 초과 예약 수준을 설정하며, 빈 좌석(spoiled seat) 비용과 탑승 거부 비용 사이의 균형을 맞춘다. 승인된 예약 수준이 물리적 수용 능력을 초과할 수 있으므로, Overbooking은 가용성에 직접적인 영향을 미친다. 초과 판매로 인한 탑승 거부는 여러 관할권에서 규제되며(예: 미국 DOT 초과 판매 규정 및 EU 항공 승객 권리 규정), 이들 규정은 보상과 편의 제공을 의무화한다. 또한 이는 흔히 비자발적 재예약과 IROPS 방식의 처리를 유발한다.","standardBody":"","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Availability","targetId":"availability"},{"type":"related","targetTerm":"Involuntary Reissue","targetId":"involuntary-reissue"},{"type":"related","targetTerm":"IROPS","targetId":"irops"},{"type":"related","targetTerm":"RBD","targetId":"rbd"}],"distinctions":[{"targetTerm":"Availability","explanation":"Availability is the seats currently sellable; overbooking is the policy that can push that count above physical capacity.","explanation_ko":"가용성은 현재 판매 가능한 좌석이고, 초과 예약은 그 수를 물리적 수용 능력 이상으로 끌어올릴 수 있는 정책이다.","targetId":"availability"},{"targetTerm":"Free Sale","explanation":"Free sale lets a seller book without real-time confirmation; overbooking is the carrier intentionally selling beyond capacity.","explanation_ko":"프리세일(free sale)은 판매자가 실시간 확인 없이 예약할 수 있게 하는 것이고, 초과 예약은 항공사가 수용 능력을 넘어 의도적으로 판매하는 것이다.","targetId":"free-sale"}],"sources":[{"name":"Airline revenue management literature on overbooking and denied boarding","org":"","version":"","section":"","url":""},{"name":"US DOT oversales / denied boarding compensation rules","org":"US DOT","version":"","section":"","url":""},{"name":"EU air passenger rights regulation (denied boarding compensation)","org":"European Union","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003ccircle cx=\"16\" cy=\"15\" r=\"5\"/>\u003cpath d=\"M8 34v-2a8 8 0 0116 0v2z\"/>\u003ccircle cx=\"33\" cy=\"17\" r=\"4\"/>\u003cpath d=\"M27 34v-1a6 6 0 0112 0v1z\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"package-rate","term":"Package Rate","abbreviation":"","aliases":["Package Plan","Bundled Rate"],"category":"hotel-rate","conceptType":"business-term","status":"active","definition":"A package rate is a room rate that bundles the accommodation with additional goods or services (such as breakfast, parking, spa access, meals or activities) sold for a single combined price. The blended price is normally lower than buying each element separately, and the package may be presented as a single rate to the guest while internally splitting revenue across components.","longDef":"Package rates are built by attaching package elements to a rate code, giving the staying guest a defined set of entitlements. They range from a simple room-and-breakfast package up to all-inclusive plans where the room price also covers meals, drinks and on-site activities. Because the elements have different revenue and tax treatment, PMS/CRS systems typically allocate the bundled amount across room revenue and non-room components for accounting and yield purposes. In OpenTravel distribution the per-product amounts are carried in rate-amount messages (e.g. OTA_HotelRateAmountNotifRQ). Package rate relates to Board Basis where the bundled element is a meal plan, but it is broader because it can include non-food services.","standardBody":"","term_ko":"Package Rate (패키지 요금)","definition_ko":"Package Rate(패키지 요금)는 객실 숙박에 조식·주차·스파·식사·액티비티 같은 부가 상품/서비스를 묶어 하나의 합산 가격으로 판매하는 객실 요금이다. 통상 각 구성요소를 따로 구매하는 것보다 저렴하며, 고객에게는 단일 요금으로 제시되지만 내부적으로는 구성요소별로 매출이 분배되기도 한다.","longDef_ko":"패키지 요금은 rate code에 패키지 구성요소(package element)를 연결해 투숙객에게 정의된 entitlement 묶음을 제공함으로써 구성된다. 단순한 객실+조식 패키지부터, 객실 요금에 식사·음료·부대 액티비티까지 포함하는 올인클루시브 플랜까지 범위가 넓다. 구성요소마다 매출·세무 처리가 다르므로 PMS/CRS는 통상 객실 매출과 비객실 구성요소로 금액을 배분한다. OpenTravel 유통에서는 상품별 금액이 rate-amount 메시지(예: OTA_HotelRateAmountNotifRQ)로 전달된다. 묶인 구성요소가 식사 플랜일 때는 Board Basis와 관련되지만, 비식음료 서비스도 포함할 수 있어 더 넓은 개념이다.","providerTerms":[],"relationships":[{"type":"child","targetTerm":"Rate Plan","targetId":"rate-plan"},{"type":"related","targetTerm":"Board Basis","targetId":"board-basis"},{"type":"related","targetTerm":"Rate Code","targetId":"rate-code"},{"type":"related","targetTerm":"BAR","targetId":"bar"}],"distinctions":[{"targetTerm":"Board Basis","explanation":"Board Basis describes only the meal component included in a rate (room-only, B&B, half-board, etc.); a Package Rate is broader, bundling any combination of services and amenities, of which meals are just one possible element.","explanation_ko":"Board Basis는 요금에 포함된 식사 구성요소(객실 단독, B&B, 하프보드 등)만을 가리키지만, Package Rate는 식사를 포함한 임의의 서비스·편의시설 조합을 묶는 더 넓은 개념이다.","targetId":"board-basis"}],"sources":[{"org":"Xotels","name":"Revenue Management Glossary — Package Rate","version":"","section":"","url":"https://www.xotels.com/en/glossary/package-rate"},{"org":"Oracle","name":"OPERA Help — Rate Codes (package elements)","version":"","section":"Rate Management","url":"https://docs.oracle.com/cd/E98457_01/opera_5_6_core_help/rate_codes.htm"}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M8 18l16-8 16 8-16 8z\"/>\u003cpath d=\"M8 18v14l16 8 16-8V18\"/>\u003cpath d=\"M24 26v14M16 14l16 8\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"passenger-type-code","term":"Passenger Type Code","term_ko":"여객 유형 코드 (PTC)","abbreviation":"PTC","aliases":["PTC","Passenger Type","Pax Type Code"],"category":"customer","conceptType":"code","status":"active","definition":"A standardized code (typically three alphanumeric characters, e.g. ADT, CHD, INF) that classifies a traveler into a category for the purpose of fare eligibility, pricing and discounts. Passenger Type Codes are maintained by ATPCO and used across shopping, pricing and reservation systems.","definition_ko":"운임 적용 자격, 가격 산정, 할인 적용을 위해 여행자를 특정 범주로 분류하는 표준화된 코드(통상 ADT, CHD, INF 등 영숫자 3자리)이다. PTC는 ATPCO가 관리하며 쇼핑, 운임 계산, 예약 시스템 전반에서 사용된다.","longDef":"Passenger Type Codes drive which fares a traveler qualifies for. Common examples include ADT (adult), CHD/CNN (child), INF (infant not occupying a seat), SRC (senior) and YTH (youth), along with specialized codes such as MIL (military) or student types. A fare rule (Category 1, Eligibility) restricts a Fare Basis Code to one or more PTCs, and the PTC requested during shopping determines which fares are returned and how they are priced. PTCs are distinct from RBDs, which control inventory and class of service rather than who is eligible.","longDef_ko":"PTC는 여행자가 어떤 운임에 자격이 있는지를 결정한다. 대표적인 예로 ADT(성인), CHD/CNN(소아), INF(좌석 비점유 유아), SRC(시니어), YTH(청소년)가 있으며, MIL(군인)이나 학생 유형 같은 특수 코드도 있다. 운임 규정(Category 1, Eligibility)은 특정 Fare Basis Code를 하나 이상의 PTC로 제한하며, 쇼핑 시 요청된 PTC에 따라 어떤 운임이 반환되고 어떻게 가격이 산정되는지가 결정된다. PTC는 자격이 누구에게 있는지가 아니라 좌석 재고와 운송 등급을 제어하는 RBD와는 구별된다.","standardBody":"ATPCO","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Fare Basis Code","targetId":"fare-basis-code"},{"type":"related","targetTerm":"ATPCO","targetId":"atpco"},{"type":"related","targetTerm":"RBD","targetId":"rbd"}],"distinctions":[{"targetTerm":"RBD","explanation":"PTC classifies who the traveler is for fare eligibility; RBD is the booking class controlling seat inventory and class of service.","explanation_ko":"PTC는 운임 자격을 위해 여행자가 누구인지를 분류하고, RBD는 좌석 재고와 운송 등급을 제어하는 예약 등급이다.","targetId":"rbd"},{"targetTerm":"Fare Basis Code","explanation":"A PTC is an input that restricts which Fare Basis Codes a passenger can use; the Fare Basis Code identifies the specific priced fare.","explanation_ko":"PTC는 승객이 사용할 수 있는 Fare Basis Code를 제한하는 입력값이고, Fare Basis Code는 가격이 산정된 특정 운임을 식별한다.","targetId":"fare-basis-code"}],"sources":[{"name":"ATPCO Passenger Type Codes","org":"ATPCO","version":"","section":"","url":""},{"name":"ATPCO Automated Rules (Category 1 — Eligibility)","org":"ATPCO","version":"","section":"","url":""}],"lastReviewed":"2026-06-15","icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003ccircle cx=\"17\" cy=\"15\" r=\"6\"/>\u003cpath d=\"M7 39c0-6 5-10 10-10s10 4 10 10\"/>\u003cpath d=\"M30 16h8a3 3 0 0 1 3 3v8a3 3 0 0 1-3 3h-8z\"/>\u003ccircle cx=\"35\" cy=\"23\" r=\"1.5\" fill=\"currentColor\"/>\u003c/svg>"},{"id":"passive-segment","term":"Passive Segment","abbreviation":"","aliases":["Passive Booking","Informational Segment","Ghost Segment"],"category":"air-ops","conceptType":"business-term","status":"active","definition":"A passive segment is a flight segment added to a PNR for record-keeping, pricing, or ticketing purposes that does not generate a real inventory request to, or hold space in, the operating carrier's reservation system. It mirrors a booking that was actually confirmed elsewhere (e.g., directly with the airline or in another system).","definition_ko":"passive segment(수동 구간)는 기록 관리, 운임 산정 또는 발권 목적으로 PNR에 추가되는 항공 segment로, 운항 항공사의 예약 시스템에 실제 재고 요청을 보내거나 좌석을 점유하지 않는다. 실제로는 다른 곳(예: 항공사 직접 또는 다른 시스템)에서 확약된 예약을 반영한다.","term_ko":"수동 구간(Passive Segment)","longDef":"Passive segments are typically created with passive status codes so the GDS shows the itinerary for ticketing and documentation without sending an active sell message that would decrement seat inventory. They are commonly used to ticket a booking made outside the GDS, to build complete itineraries for fare construction, or for airline reporting. Misuse of passive segments (e.g., to circumvent ticketing) is policed by GDSs and airlines, and ARNK is a related non-air placeholder for surface gaps.","longDef_ko":"passive segment는 일반적으로 passive 상태 코드로 생성되어, 좌석 재고를 차감하는 능동 판매(sell) 메시지를 보내지 않고도 GDS가 발권 및 문서화를 위해 여정을 표시하도록 한다. 주로 GDS 외부에서 이루어진 예약을 발권하거나, 운임 구성을 위해 완전한 여정을 구성하거나, 항공사 보고 목적으로 사용된다. passive segment의 오용(예: 발권 회피)은 GDS와 항공사에 의해 단속되며, ARNK는 지상 구간 공백을 나타내는 관련 비항공 자리표시자(placeholder)다.","standardBody":"","providerTerms":[{"provider":"Sabre","term":"Passive Segment / GK status","context":"Sabre uses passive status codes such as GK to add informational segments that do not access inventory","context_ko":"Sabre는 GK와 같은 passive 상태 코드를 사용하여 재고에 접근하지 않는 정보성 segment를 추가한다","relationship":"same"},{"provider":"Amadeus","term":"Passive Segment","context":"Amadeus supports passive segments for ticketing of externally confirmed space","context_ko":"Amadeus는 외부에서 확약된 좌석의 발권을 위해 passive segment를 지원한다","relationship":"same"}],"relationships":[{"type":"related","targetTerm":"Segment","targetId":"segment"},{"type":"related","targetTerm":"ARNK","targetId":"arnk"},{"type":"related","targetTerm":"PNR","targetId":"pnr"},{"type":"related","targetTerm":"Ticketing Time Limit","targetId":"ticketing-time-limit"}],"distinctions":[{"targetTerm":"ARNK","explanation":"A passive segment is an informational air segment that does not access inventory, whereas ARNK is a non-air placeholder marking a surface (non-flown) gap in the itinerary.","explanation_ko":"passive segment는 재고에 접근하지 않는 정보성 항공 segment인 반면, ARNK는 여정에서 지상(비운항) 공백을 표시하는 비항공 자리표시자다.","targetId":"arnk"},{"targetTerm":"Married Segment","explanation":"A passive segment holds no live inventory, while married segments are active inventory-controlled connections sold and managed as a unit.","explanation_ko":"passive segment는 실시간 재고를 점유하지 않는 반면, married segment는 하나의 단위로 판매·관리되는, 재고 통제를 받는 능동 연결편이다.","targetId":"married-segment"}],"sources":[{"name":"Sabre Format Finder — Passive Segments","org":"Sabre","version":"","section":"","url":""},{"name":"Amadeus Functional Documentation — Passive Segments","org":"Amadeus","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003ccircle cx=\"10\" cy=\"34\" r=\"3.5\"/>\u003ccircle cx=\"38\" cy=\"14\" r=\"3.5\"/>\u003cline x1=\"13\" y1=\"31\" x2=\"35.4\" y2=\"16.6\" stroke-dasharray=\"1 5\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"pci-dss","term":"PCI DSS","abbreviation":"PCI DSS","aliases":["Payment Card Industry Data Security Standard"],"category":"pay","conceptType":"standard","status":"active","definition":"The Payment Card Industry Data Security Standard is a set of security requirements maintained by the PCI Security Standards Council that all entities storing, processing, or transmitting cardholder data must meet to protect that data. It defines controls across areas such as network security, encryption, access control, monitoring, and vulnerability management.","longDef":"PCI DSS applies to merchants, acquirers, processors, and service providers that handle payment card data, and compliance is enforced contractually by the card networks (Visa, Mastercard, American Express, Discover, JCB) rather than by law. The current version is v4.0.1, published in June 2024, which became the only supported version after v3.2.1 and then v4.0 were retired (v4.0.1 is the sole supported release as of 1 January 2025). It organizes requirements into 12 high-level requirements grouped under six control objectives, with validation performed via a Report on Compliance (ROC) or Self-Assessment Questionnaire (SAQ) depending on the entity's transaction volume and processing model. Travel sellers (airlines, OTAs, hotels) that capture card data fall in scope, and approaches such as tokenization and outsourcing to a Merchant of Record are used to reduce PCI scope.","standardBody":"PCI Security Standards Council (PCI SSC)","term_ko":"PCI DSS (지불카드 산업 데이터 보안 표준)","definition_ko":"PCI DSS는 카드 소지자 데이터를 저장·처리·전송하는 모든 주체가 준수해야 하는, PCI Security Standards Council이 관리하는 보안 요구사항 집합이다. 네트워크 보안, 암호화, 접근 통제, 모니터링, 취약점 관리 등 영역의 통제 항목을 정의한다.","longDef_ko":"PCI DSS는 카드 결제 데이터를 다루는 가맹점·매입사(Acquirer)·프로세서·서비스 제공자에게 적용되며, 법률이 아니라 카드 네트워크(Visa, Mastercard, American Express 등)와의 계약으로 강제된다. 현재 버전은 2024년 6월에 발표된 v4.0.1이며, v3.2.1과 v4.0이 차례로 폐기된 뒤 2025년 1월 1일부터 유일하게 지원되는 버전이다. 6개 통제 목표 아래 12개 상위 요구사항으로 구성되며, 처리 거래량과 방식에 따라 ROC(Report on Compliance) 또는 SAQ(Self-Assessment Questionnaire)로 검증한다. 카드 데이터를 받는 항공사·OTA·호텔 등 여행 판매자도 적용 대상이며, Tokenization이나 Merchant of Record 위탁 등으로 PCI 적용 범위(scope)를 줄인다.","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Tokenization","targetId":"tokenization"},{"type":"related","targetTerm":"3-D Secure","targetId":"3-d-secure"},{"type":"related","targetTerm":"Merchant of Record","targetId":"merchant-of-record"},{"type":"related","targetTerm":"VCC","targetId":"vcc"}],"distinctions":[{"targetTerm":"3-D Secure","explanation":"PCI DSS is a broad data-security compliance standard for protecting stored and transmitted cardholder data, while 3-D Secure is a specific cardholder authentication protocol applied at the moment of an e-commerce transaction.","explanation_ko":"PCI DSS는 저장·전송되는 카드 데이터를 보호하는 광범위한 데이터 보안 준수 표준이고, 3-D Secure는 전자상거래 거래 시점에 적용되는 특정 카드 소지자 인증 프로토콜이다.","targetId":"3-d-secure"},{"targetTerm":"Tokenization","explanation":"PCI DSS is the obligation; tokenization is one technical method used to reduce the systems in scope for that obligation by removing raw PANs.","explanation_ko":"PCI DSS는 준수 의무이고, Tokenization은 원본 PAN을 제거해 그 의무의 적용 범위를 줄이는 데 쓰이는 기술적 수단 중 하나다.","targetId":"tokenization"}],"sources":[{"org":"PCI Security Standards Council","name":"Payment Card Industry Data Security Standard (PCI DSS)","version":"4.0.1","section":"","url":"https://www.pcisecuritystandards.org/"}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M24 5l14 5v9c0 9-6 16-14 19-8-3-14-10-14-19v-9z\"/>\u003crect x=\"17\" y=\"22\" width=\"14\" height=\"10\" rx=\"1.5\"/>\u003cpath d=\"M20 22v-3a4 4 0 0 1 8 0v3\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"penalty-fee","term":"Penalty Fee","abbreviation":"","aliases":["Change Fee","Cancellation Penalty","Change Penalty"],"category":"air-ticket","conceptType":"business-term","status":"active","definition":"A penalty fee is a charge imposed under a fare's rules when a ticket is changed (reissued/exchanged) or cancelled/refunded, over and above any fare difference and taxes. The applicable penalties and conditions are defined in the fare rule, traditionally ATPCO Category 16 (Penalties) and, for automated processing, Category 31 (Voluntary Changes) and Category 33 (Voluntary Refunds).","longDef":"Penalty fees express the cost a passenger incurs to modify or cancel a purchased ticket, as set by the fare's filed rules. In the ATPCO fare-rule structure, Category 16 (Penalties) carries the textual terms describing change and refund penalties, while automated change and refund processing is driven by Category 31 (Voluntary Changes) and Category 33 (Voluntary Refunds). Penalty amounts can be fixed, per-direction, per fare component, or percentage-based, and may differ for changes versus cancellations and by fare family or cabin. In an exchange, the penalty is collected alongside any additional fare collection and tax difference; in a refund, the penalty is deducted from the amount returned. Penalty fees are distinct from carrier service fees and from agency-imposed service charges.","standardBody":"ATPCO","term_ko":"Penalty Fee (위약금)","definition_ko":"Penalty Fee(위약금)는 운임 규정에 따라 항공권을 변경(재발행/교환)하거나 취소/환불할 때, 운임 차액 및 세금과 별도로 부과되는 비용이다. 적용 위약금과 조건은 운임 규정에 정의되며, 전통적으로 ATPCO Category 16(Penalties), 그리고 자동 처리의 경우 Category 31(자발적 변경)과 Category 33(자발적 환불)에 담긴다.","longDef_ko":"Penalty fee는 구매한 항공권을 변경하거나 취소할 때 승객이 부담하는 비용으로, 운임의 등록 규정에 따라 정해진다. ATPCO 운임 규정 구조에서 Category 16(Penalties)은 변경·환불 위약금을 기술하는 텍스트 조건을 담고, 자동 변경·환불 처리는 Category 31(자발적 변경)과 Category 33(자발적 환불)이 구동한다. 위약금 금액은 정액, 방향별, fare component별, 또는 비율 기반일 수 있으며, 변경과 취소에 따라, fare family나 좌석 등급에 따라 다를 수 있다. 교환 시에는 추가 운임 징수액 및 세금 차액과 함께 위약금이 징수되고, 환불 시에는 반환 금액에서 차감된다. 위약금은 항공사 서비스 수수료나 대리점 부과 서비스 차지와는 구별된다.","providerTerms":[{"provider":"ATPCO","term":"Category 16 (Penalties)","context":"ATPCO Category 16 describes penalties and charges for ticket changes and refunds; automated processing uses Category 31 (changes) and Category 33 (refunds).","context_ko":"ATPCO Category 16은 항공권 변경·환불에 대한 위약금과 비용을 기술하며, 자동 처리에는 Category 31(변경)과 Category 33(환불)이 사용된다.","relationship":"narrower"}],"relationships":[{"type":"related","targetTerm":"ATPCO","targetId":"atpco"},{"type":"related","targetTerm":"Reissue","targetId":"reissue"},{"type":"related","targetTerm":"Exchange","targetId":"exchange"},{"type":"related","targetTerm":"Refund","targetId":"refund"},{"type":"related","targetTerm":"Fare Basis Code","targetId":"fare-basis-code"},{"type":"related","targetTerm":"Fare Family","targetId":"fare-family"}],"distinctions":[{"targetTerm":"Residual Value","explanation":"A penalty fee is a charge deducted during a change or refund; residual value is the surplus that may remain after the penalty and fare difference are applied in an exchange.","explanation_ko":"Penalty fee는 변경·환불 시 차감되는 비용이고, residual value는 교환에서 위약금과 운임 차액을 적용한 뒤 남을 수 있는 잉여분이다.","targetId":"residual-value"}],"sources":[{"org":"ATPCO","name":"What are ATPCO fare rules categories?","version":"","section":"Category 16 / 31 / 33","url":"https://atpco.net/single-blog/what-are-atpco-fare-rules-categories/"},{"org":"Travelport","name":"Fare Rules Guide","version":"","section":"","url":"https://support.travelport.com/webhelp/JSONAPIs/Airv11/Content/Air11/Price/FareRulesGuide.htm"}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003ccircle cx=\"24\" cy=\"24\" r=\"15\"/>\u003cline x1=\"24\" y1=\"16\" x2=\"24\" y2=\"26\"/>\u003ccircle cx=\"24\" cy=\"31\" r=\"0.5\" fill=\"currentColor\"/>\u003cline x1=\"24\" y1=\"31\" x2=\"24\" y2=\"31\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"pms","term":"PMS","term_ko":"자산 관리 시스템(PMS)","abbreviation":"PMS","aliases":["Property Management System","Hotel Property Management System"],"category":"hotel-dist","conceptType":"acronym","status":"active","definition":"A Property Management System is the operational software used at an individual hotel property to manage front-office and back-office functions such as reservations, check-in/check-out, room assignment, guest folios, housekeeping status, and night audit. It is the system of record for the on-property guest stay and billing.","definition_ko":"자산 관리 시스템(PMS)은 개별 호텔 자산에서 예약, 체크인/체크아웃, 객실 배정, 고객 폴리오(folio), 하우스키핑 상태, 야간 감사(night audit) 등 프런트오피스 및 백오피스 기능을 관리하는 운영 소프트웨어다. 현장 투숙과 청구에 대한 기록 시스템(system of record)이다.","longDef":"The PMS handles the operational lifecycle of a stay at the property level, including guest profiles, folio/charges, and room status. It commonly integrates with a CRS (for centralized distribution and incoming reservations) and downstream point-of-sale, payment, and door-lock systems. Reservations created in distribution channels typically arrive in the PMS via the CRS or a two-way interface.","longDef_ko":"PMS는 고객 프로필, 폴리오/요금, 객실 상태 등 자산 단위에서 투숙의 운영 생애주기를 처리한다. 일반적으로 CRS(중앙 분배 및 유입 예약용)와, 하류의 POS, 결제, 도어록 시스템과 통합된다. 분배 채널에서 생성된 예약은 보통 CRS 또는 양방향 인터페이스를 통해 PMS로 전달된다.","standardBody":"","providerTerms":[],"relationships":[{"type":"related","targetTerm":"CRS","targetId":"crs"},{"type":"related","targetTerm":"Channel Manager","targetId":"channel-manager"},{"type":"related","targetTerm":"Room Type","targetId":"room-type"},{"type":"related","targetTerm":"Customer Profile","targetId":"customer-profile"}],"distinctions":[{"targetTerm":"CRS","explanation":"PMS runs property operations and is the system of record for the stay; CRS centralizes inventory/rates and distributes them across channels.","explanation_ko":"PMS는 자산 운영을 수행하며 투숙에 대한 기록 시스템이고, CRS는 인벤토리/요금을 중앙화하여 여러 채널에 분배한다.","targetId":"crs"}],"sources":[{"name":"HTNG interface specifications","org":"HTNG","version":"","section":"","url":""},{"name":"OpenTravel Specification","org":"OpenTravel Alliance","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M8 42V14l12-6 12 6v28\"/>\u003cpath d=\"M8 42h32\"/>\u003cpath d=\"M14 22h4M22 22h4M14 30h4M22 30h4\"/>\u003ccircle cx=\"36\" cy=\"34\" r=\"6\"/>\u003cpath d=\"M36 30v-2M36 40v-2M40.2 31.8l-1.4 1.4M33.2 38.6l-1.4-1.4M42 34h-2M32 34h-2M40.2 38.6l-1.4-1.4M33.2 31.8l-1.4 1.4\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"pnr","term":"PNR","abbreviation":"PNR","aliases":["Passenger Name Record","Booking Record","Booking File","Reservation Record"],"category":"air-ops","conceptType":"document","status":"active","definition":"A Passenger Name Record (PNR) is the data record in a reservation system (CRS/GDS or airline host) that holds the itinerary, passenger details, and contact information for one or more travelers traveling together. It is identified by a unique alphanumeric record locator and serves as the central container for all booking-related data.","definition_ko":"PNR(Passenger Name Record, 여객 예약 기록)은 함께 여행하는 한 명 이상의 여행객에 대한 여정, 승객 정보, 연락처 정보를 담는 예약 시스템(CRS/GDS 또는 항공사 호스트)의 데이터 레코드다. 고유한 영숫자 record locator로 식별되며, 예약 관련 모든 데이터를 담는 중심 컨테이너 역할을 한다.","term_ko":"여객 예약 기록(PNR)","longDef":"A PNR minimally requires the five mandatory elements often summarized as 'PRINT': Phone (contact), Received from, Itinerary (segments), Name(s), and Ticketing arrangement. Beyond these, it can hold SSR/OSI elements, frequent flyer data, fare/pricing records, ticket numbers, and remarks. Each reservation system assigns its own record locator, so a single booking distributed across a GDS and multiple airline hosts may have several distinct locators linked by the itinerary.","longDef_ko":"PNR은 흔히 'PRINT'로 요약되는 다섯 가지 필수 요소, 즉 Phone(연락처), Received from(접수처), Itinerary(여정, 즉 segment), Name(승객명), Ticketing(발권 처리)을 최소한으로 요구한다. 이 외에도 SSR/OSI 요소, 상용고객 정보, 운임/요금 기록, 항공권 번호, 비고 사항 등을 담을 수 있다. 각 예약 시스템은 고유한 record locator를 부여하므로, 하나의 예약이 GDS와 여러 항공사 호스트에 분산되면 여정으로 연결된 서로 다른 record locator를 여러 개 가질 수 있다.","standardBody":"IATA","providerTerms":[{"provider":"Amadeus","term":"PNR","context":"Amadeus calls the booking record a PNR with a 6-character record locator","context_ko":"Amadeus는 예약 기록을 6자리 record locator를 가진 PNR이라고 부른다","relationship":"same"},{"provider":"Sabre","term":"PNR / Record Locator","context":"Sabre refers to the booking file as a PNR identified by a record locator","context_ko":"Sabre는 예약 파일을 record locator로 식별되는 PNR이라고 지칭한다","relationship":"same"}],"relationships":[{"type":"related","targetTerm":"Segment","targetId":"segment"},{"type":"related","targetTerm":"SSR","targetId":"ssr"},{"type":"related","targetTerm":"OSI","targetId":"osi"},{"type":"related","targetTerm":"Queue","targetId":"queue"},{"type":"related","targetTerm":"E-ticket","targetId":"e-ticket"},{"type":"related","targetTerm":"Order","targetId":"order"}],"distinctions":[{"targetTerm":"Order","explanation":"An NDC Order is the airline-centric, order-management successor concept to the PNR; the PNR is the legacy GDS/host reservation record.","explanation_ko":"NDC Order는 항공사 중심의 주문 관리 개념으로 PNR을 계승하는 개념이며, PNR은 기존 GDS/호스트 예약 기록이다.","targetId":"order"},{"targetTerm":"E-ticket","explanation":"The PNR is the reservation/itinerary record, whereas the e-ticket is the separate proof-of-payment/fulfillment document created when the PNR is ticketed.","explanation_ko":"PNR은 예약/여정 기록인 반면, e-ticket은 PNR이 발권될 때 생성되는 별도의 결제 증빙/이행 문서다.","targetId":"e-ticket"}],"sources":[{"name":"Passenger Services Conference Resolutions Manual (PSCRM)","org":"IATA","version":"","section":"","url":""},{"name":"Amadeus Functional Documentation — PNR","org":"Amadeus","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"11\" y=\"6\" width=\"26\" height=\"36\" rx=\"3\"/>\u003cline x1=\"16\" y1=\"14\" x2=\"32\" y2=\"14\"/>\u003cline x1=\"16\" y1=\"20\" x2=\"32\" y2=\"20\"/>\u003cline x1=\"16\" y1=\"26\" x2=\"28\" y2=\"26\"/>\u003ccircle cx=\"29\" cy=\"34\" r=\"4.5\"/>\u003cpath d=\"M32.2 37.2 35 40\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"pricing-unit","term":"Pricing Unit","abbreviation":"PU","aliases":["Priceable Unit","Priceable-Unit"],"category":"air-shop","conceptType":"standard-term","status":"active","definition":"A Pricing Unit is a journey or portion of a journey that is priced as a single entity, made up of one or more fare components. It has a defined unit origin (its starting point) and unit destination, and its type (one-way, round trip, circle trip, open jaw) governs which fare-construction checks and rules apply.","longDef":"In IATA/ATPCO fare construction, fare components are grouped into pricing units (also called priceable units) before fares are validated and combined. Each pricing unit is classified by type, for example one-way (OW), round trip (RT), circle trip (CT), or open jaw, and this type determines minimum-fare checks (such as Circle Trip Minimum or Higher Intermediate Point checks), combinability rules, and stopover/transfer counting. The total fare for a journey is the sum of its pricing units, each constructed and rule-checked independently before aggregation. Distinguishing the pricing unit from the fare component is essential because some rule provisions (e.g., minimum stay, combinations) apply at the pricing-unit level rather than the individual component level.","standardBody":"IATA","term_ko":"프라이싱 유닛 (Pricing Unit)","definition_ko":"Pricing Unit은 하나의 단위로 운임이 책정되는 여정 또는 여정의 일부로, 하나 이상의 fare component로 구성된다. 정해진 unit origin(시작점)과 unit destination(끝점)을 가지며, 그 유형(편도, 왕복, circle trip, open jaw)에 따라 적용되는 운임 산출 점검과 규정이 달라진다.","longDef_ko":"IATA/ATPCO 운임 산출에서 fare component는 운임이 검증·결합되기 전에 pricing unit(priceable unit이라고도 함)으로 묶인다. 각 pricing unit은 편도(OW), 왕복(RT), circle trip(CT), open jaw 등 유형으로 분류되며, 이 유형은 최저운임 점검(Circle Trip Minimum, Higher Intermediate Point 점검 등), 결합(combinability) 규정, stopover/transfer 계산 방식을 결정한다. 여정의 총운임은 각 pricing unit의 합이며, 각 unit은 합산 전에 독립적으로 산출·규정 점검된다. 일부 규정 조항(예: 최소 체류, 결합)은 개별 component가 아니라 pricing unit 단위로 적용되므로 pricing unit과 fare component를 구분하는 것이 필수적이다.","providerTerms":[],"relationships":[{"type":"parent","targetTerm":"Fare Component","targetId":"fare-component"},{"type":"related","targetTerm":"Fare Construction","targetId":"fare-construction"},{"type":"related","targetTerm":"Journey","targetId":"journey"},{"type":"related","targetTerm":"NUC","targetId":"nuc"}],"distinctions":[{"targetTerm":"Fare Component","explanation":"A Fare Component is a single fare and the flights it covers; a Pricing Unit groups one or more fare components into the entity that is actually priced and rule-checked together.","explanation_ko":"Fare Component는 단일 운임과 그 운임이 적용되는 비행 구간이고, Pricing Unit은 하나 이상의 fare component를 묶어 실제로 함께 가격이 책정되고 규정이 점검되는 단위다.","targetId":"fare-component"},{"targetTerm":"Journey","explanation":"A Journey is the whole travel from start to end; a Pricing Unit is a sub-portion of the journey priced as one entity, and a journey may contain several pricing units.","explanation_ko":"Journey는 시작부터 끝까지의 전체 여행이고, Pricing Unit은 한 단위로 가격이 책정되는 여정의 하위 부분이며, 한 journey는 여러 pricing unit을 포함할 수 있다.","targetId":"journey"}],"sources":[{"org":"IATA","name":"Fundamental Skills in Journey Pricing and Ticketing","version":"","section":"Pricing units","url":"https://www.iata.org/en/training/courses/journey-pricing-ticketing/tttg14/en/"},{"org":"IATA","name":"Passenger Fares and Ticketing - Advanced","version":"","section":"Pricing unit construction","url":"https://www.iata.org/en/training/courses/passenger-fares-advanced/talf24/en/"}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"9\" y=\"13\" width=\"30\" height=\"22\" rx=\"3\"/>\u003cline x1=\"19\" y1=\"13\" x2=\"19\" y2=\"35\" stroke-dasharray=\"3 3\"/>\u003ccircle cx=\"14\" cy=\"24\" r=\"2\"/>\u003ccircle cx=\"29\" cy=\"24\" r=\"2\"/>\u003cline x1=\"23\" y1=\"24\" x2=\"34\" y2=\"24\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"prm","term":"PRM","term_ko":"거동 불편 승객 (PRM)","abbreviation":"PRM","aliases":["Passenger with Reduced Mobility","Person with Reduced Mobility","Passengers with Reduced Mobility","Disabled passenger"],"category":"customer","conceptType":"business-term","status":"active","definition":"A Passenger with Reduced Mobility — any person whose mobility is reduced due to physical or mental disability, age, illness or other cause and who needs special assistance during travel. PRM needs are communicated to carriers and airports through standardized special-service request codes.","definition_ko":"거동 불편 승객(Passenger with Reduced Mobility)으로, 신체적·정신적 장애, 연령, 질병 또는 기타 사유로 거동이 불편하여 여행 중 특별 지원이 필요한 모든 사람을 말한다. PRM의 요구 사항은 표준화된 특별 서비스 요청(SSR) 코드를 통해 항공사와 공항에 전달된다.","longDef":"PRM is an umbrella concept covering travelers requiring assistance; specific needs are encoded as SSR codes such as WCHR (wheelchair to ramp), WCHS (to steps), WCHC (to seat), BLND (blind), DEAF, and DPNA (intellectual/developmental disability). These requests ensure airports and airlines arrange wheelchairs, escorts and other accommodations, and they are governed by accessibility regulations (e.g. EC Regulation 1107/2006 in Europe and the US Air Carrier Access Act). PRM handling is a service obligation distinct from general OSI informational messages.","longDef_ko":"PRM은 지원이 필요한 여행자를 포괄하는 상위 개념이며, 구체적인 요구 사항은 WCHR(램프까지 휠체어), WCHS(계단까지), WCHC(좌석까지), BLND(시각장애), DEAF(청각장애), DPNA(지적/발달 장애) 같은 SSR 코드로 부호화된다. 이러한 요청은 공항과 항공사가 휠체어, 동행 안내, 기타 편의를 준비하도록 보장하며, 접근성 규정(예: 유럽의 EC Regulation 1107/2006, 미국의 Air Carrier Access Act)의 적용을 받는다. PRM 처리는 일반적인 OSI 정보성 메시지와 구별되는 서비스 의무이다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"SSR","targetId":"ssr"},{"type":"related","targetTerm":"OSI","targetId":"osi"},{"type":"related","targetTerm":"PNR","targetId":"pnr"}],"distinctions":[{"targetTerm":"SSR","explanation":"PRM is the traveler category/need; SSR codes (e.g. WCHR, BLND) are the standardized messages used to request the corresponding assistance.","explanation_ko":"PRM은 여행자 범주/요구 사항이고, SSR 코드(예: WCHR, BLND)는 해당 지원을 요청하는 데 사용되는 표준화된 메시지이다.","targetId":"ssr"},{"targetTerm":"OSI","explanation":"PRM assistance requires action via an actionable SSR; OSI carries purely informational, non-actionable remarks.","explanation_ko":"PRM 지원은 조치가 필요한 SSR을 통한 처리가 요구되고, OSI는 순수하게 정보성이며 조치가 필요 없는 비고를 담는다.","targetId":"osi"}],"sources":[{"name":"Passenger Services Conference Resolutions Manual (SSR codes)","org":"IATA","version":"","section":"","url":""}],"lastReviewed":"2026-06-15","icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003ccircle cx=\"22\" cy=\"10\" r=\"4\"/>\u003cpath d=\"M22 16v12h10\"/>\u003cpath d=\"M32 42l-4-14\"/>\u003ccircle cx=\"23\" cy=\"33\" r=\"10\"/>\u003c/svg>"},{"id":"property-mapping","term":"Property Mapping","abbreviation":"","aliases":["Hotel Mapping","Room & Rate Mapping","Content Mapping"],"category":"hotel-dist","conceptType":"process","status":"active","definition":"Property mapping is the process of matching a hotel — and its room types and rate plans — to the corresponding identifiers used by another system or distribution channel, so that ARI and reservation messages reference the same property and product on both sides. It resolves the fact that the same hotel carries different property codes (hotelCode) and room/rate codes across CRSs, GDSs, OTAs, switches, and bedbanks.","longDef":"Because each distribution platform assigns its own identifiers, a single physical hotel may appear as different property IDs across systems, and its \"Deluxe King, Breakfast Included\" product may carry different room-type and rate-plan codes on each channel. Property mapping (and the finer-grained room and rate mapping) establishes the correspondence so that an inbound availability request or booking is routed to the correct property and product. Mapping can be manual, rules-based, or increasingly machine-learning assisted using attributes such as name, address, geocode, and star rating. Incorrect mapping is a common root cause of distribution errors: rooms sold against the wrong product, rate discrepancies, parity breaches, or overbookings. In OpenTravel/HTNG messaging the mapped property identifier is the hotelCode (and chainCode) used in OTA_Hotel* requests.","standardBody":"OpenTravel Alliance","term_ko":"프로퍼티 매핑 (Property Mapping)","definition_ko":"프로퍼티 매핑은 한 호텔과 그 객실 유형·요금 플랜을 다른 시스템 또는 유통 채널에서 사용하는 식별자에 일치시켜, 양측의 ARI·예약 메시지가 동일한 호텔과 상품을 가리키도록 하는 작업이다. 동일한 호텔이라도 CRS·GDS·OTA·스위치·Bedbank마다 서로 다른 프로퍼티 코드(hotelCode)와 객실/요금 코드를 갖는 문제를 해소한다.","longDef_ko":"각 유통 플랫폼이 자체 식별자를 부여하기 때문에, 하나의 실제 호텔이 시스템마다 서로 다른 property ID로 나타나고 'Deluxe King, 조식 포함' 상품도 채널마다 다른 객실 유형·요금 플랜 코드를 가질 수 있다. 프로퍼티 매핑(및 더 세밀한 객실·요금 매핑)은 이 대응 관계를 설정하여, 들어오는 가용성 요청이나 예약이 올바른 호텔과 상품으로 라우팅되게 한다. 매핑은 수작업, 규칙 기반, 또는 이름·주소·좌표·등급 등 속성을 활용한 머신러닝 보조 방식으로 이뤄진다. 잘못된 매핑은 엉뚱한 상품으로 판매, 요금 불일치, parity 위반, 오버부킹 등 유통 오류의 흔한 원인이다. OpenTravel/HTNG 메시징에서 매핑된 프로퍼티 식별자는 OTA_Hotel* 요청에 사용되는 hotelCode(및 chainCode)다.","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Hotel Switch","targetId":"hotel-switch"},{"type":"related","targetTerm":"Channel Manager","targetId":"channel-manager"},{"type":"related","targetTerm":"ARI","targetId":"ari"},{"type":"related","targetTerm":"Room Type","targetId":"room-type"},{"type":"related","targetTerm":"Rate Plan","targetId":"rate-plan"},{"type":"related","targetTerm":"Chain Code","targetId":"chain-code"}],"distinctions":[{"targetTerm":"ARI","explanation":"ARI is the availability/rate/inventory data exchanged between systems; property mapping is the prerequisite that ensures each ARI message is attributed to the correct property and product on the receiving side.","explanation_ko":"ARI는 시스템 간에 교환되는 가용성·요금·재고 데이터이고, 프로퍼티 매핑은 각 ARI 메시지가 수신 측에서 올바른 호텔·상품에 귀속되도록 보장하는 선행 조건이다.","targetId":"ari"}],"sources":[{"org":"AltexSoft","name":"Hotel Tech Specifications by HTNG, OpenTravel, and HEDNA","version":"","section":"Property Identification","url":"https://www.altexsoft.com/blog/hotel-tech-specifications-htng-opentravel/"},{"org":"OpenTravel Alliance","name":"OpenTravel Object Model (Hospitality)","version":"","section":"","url":"https://opentravel.org/"}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"5\" y=\"14\" width=\"14\" height=\"20\" rx=\"2\"/>\u003cline x1=\"9\" y1=\"19\" x2=\"15\" y2=\"19\"/>\u003cline x1=\"9\" y1=\"24\" x2=\"15\" y2=\"24\"/>\u003crect x=\"29\" y=\"14\" width=\"14\" height=\"20\" rx=\"2\"/>\u003cline x1=\"33\" y1=\"19\" x2=\"39\" y2=\"19\"/>\u003cline x1=\"33\" y1=\"24\" x2=\"39\" y2=\"24\"/>\u003cpath d=\"M19 24h4l2-3 2 6 1-3h1\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"proration","term":"Proration","term_ko":"프로레이션(운임 배분)","abbreviation":"","aliases":["Prorate","Prorating","Fare Proration","Pro-ration"],"category":"air-partner","conceptType":"process","status":"active","definition":"The process of dividing the total fare of an interline or multi-carrier ticket among the participating carriers to determine how much revenue each is owed for the portion it carries. Proration uses standardized prorate factors or negotiated special prorate agreements to allocate the fare across fare components and flight coupons.","definition_ko":"인터라인 또는 다중 항공사 항공권의 총 운임을 참여 항공사 간에 나누어, 각 항공사가 자신이 운송한 구간에 대해 받을 수익이 얼마인지 산정하는 과정. 프로레이션은 표준화된 프로레이트 계수 또는 협상된 특별 운임 배분 협정을 사용하여 운임을 운임 구성요소(fare component)와 비행 쿠폰(flight coupon) 전반에 걸쳐 배분한다.","longDef":"Proration translates a single through-fare into per-carrier revenue shares used for interline billing and settlement. The default method applies standard prorate factors (often distance/mileage-based weighting) to each segment, but carriers may override these with Special Prorate Agreements (SPAs) for specified markets. The resulting amounts are then billed and cleared, commonly through the IATA Clearing House, as part of revenue accounting.","longDef_ko":"프로레이션은 단일 일관 운임(through-fare)을 인터라인 청구 및 정산에 사용되는 항공사별 수익 배분 몫으로 변환한다. 기본 방식은 각 구간에 표준 프로레이트 계수(흔히 거리/마일리지 기반 가중치)를 적용하지만, 항공사는 특정 시장에 대해 SPA(Special Prorate Agreement)로 이를 대체할 수 있다. 그 결과로 산출된 금액은 수익 회계의 일부로 청구되고, 일반적으로 IATA Clearing House를 통해 정산된다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"SPA (Special Prorate Agreement)","targetId":"spa-special-prorate-agreement"},{"type":"related","targetTerm":"Interline","targetId":"interline"},{"type":"related","targetTerm":"MITA","targetId":"mita"},{"type":"related","targetTerm":"IATA Clearing House","targetId":"iata-clearing-house"},{"type":"related","targetTerm":"Fare Component","targetId":"fare-component"},{"type":"related","targetTerm":"Flight Coupon","targetId":"flight-coupon"}],"distinctions":[{"targetTerm":"SPA (Special Prorate Agreement)","explanation":"Proration is the general allocation process; an SPA is a specific bilateral agreement supplying special values used in that process.","explanation_ko":"프로레이션은 일반적인 배분 과정이고, SPA는 그 과정에서 사용되는 특별 값을 제공하는 구체적인 양자 간 협정이다.","targetId":"spa-special-prorate-agreement"},{"targetTerm":"Fare Component","explanation":"A fare component is a priced portion of an itinerary; proration is the act of splitting that fare's value among the carriers operating it.","explanation_ko":"운임 구성요소(fare component)는 여정에서 운임이 책정된 일부 구간이고, 프로레이션은 그 운임 값을 해당 구간을 운항하는 항공사들 간에 나누는 행위다.","targetId":"fare-component"}],"sources":[{"name":"Prorate Manual — Passenger (PMP)","org":"IATA","version":"","section":"","url":""},{"name":"Revenue Accounting Manual (RAM)","org":"IATA","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003ccircle cx=\"24\" cy=\"24\" r=\"15\"/>\u003cpath d=\"M24 9v15l11 7\"/>\u003cpath d=\"M24 24L13 16\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"pseudo-city-code","term":"Pseudo City Code","term_ko":"의사 도시 코드(PCC)","abbreviation":"PCC","aliases":["Office ID","OID","Subscriber ID","Agency Pseudo City Code"],"category":"codes","conceptType":"code","status":"active","definition":"An alphanumeric identifier assigned by a GDS/CRS to a subscriber such as a travel agency or corporate travel department, used to associate bookings with the agency, access private (negotiated) fares, and control privileges. Despite the name it does not identify a geographic city.","definition_ko":"GDS/CRS가 여행사나 기업 출장 부서 같은 가입자에게 부여하는 영숫자 식별자로, 예약을 해당 여행사와 연결하고, 비공개(협상) 운임에 접근하며, 권한을 통제하는 데 사용된다. 명칭과 달리 지리적 도시를 식별하지 않는다.","longDef":"A PCC scopes ownership and visibility of PNRs/bookings within a GDS: agents normally can only access reservations created under their own PCC. It also governs entitlements such as agency-specific negotiated (private) fares, queues, and ticketing authority. Format and length vary by vendor (Sabre/Travelport typically 3-4 characters; Amadeus uses a longer Office ID of up to nine characters), and across systems the concept is variously called Pseudo City Code, Office ID, or Subscriber ID.","longDef_ko":"PCC는 GDS 내에서 PNR/예약의 소유권과 가시성을 한정한다. 대개 직원은 자신의 PCC로 생성된 예약만 접근할 수 있다. 또한 여행사별 협상(비공개) 운임, 큐(queue), 발권 권한 같은 권한을 관리한다. 형식과 길이는 사업자별로 다르며(Sabre/Travelport는 일반적으로 3~4자리, Amadeus는 최대 9자리의 더 긴 Office ID를 사용), 시스템에 따라 이 개념은 Pseudo City Code, Office ID, Subscriber ID 등으로 다양하게 불린다.","standardBody":"","providerTerms":[{"provider":"Amadeus","term":"Office ID","context":"Amadeus identifier for an agency/office, analogous to a PCC","context_ko":"여행사/사무소를 식별하는 Amadeus의 식별자로 PCC에 해당한다","relationship":"same"},{"provider":"Sabre","term":"Pseudo City Code (PCC)","context":"Sabre agency identifier scoping bookings and fares","context_ko":"예약과 운임의 범위를 한정하는 Sabre의 여행사 식별자","relationship":"same"},{"provider":"Travelport","term":"Pseudo City Code (PCC)","context":"Travelport agency/office identifier","context_ko":"Travelport의 여행사/사무소 식별자","relationship":"same"}],"relationships":[{"type":"related","targetTerm":"GDS","targetId":"gds"},{"type":"related","targetTerm":"CRS","targetId":"crs"},{"type":"related","targetTerm":"PNR","targetId":"pnr"},{"type":"related","targetTerm":"Queue","targetId":"queue"},{"type":"related","targetTerm":"OTA (Online Travel Agency)","targetId":"ota-online-travel-agency"}],"distinctions":[{"targetTerm":"City Code","explanation":"A City Code is an IATA geographic metro-area code; a Pseudo City Code identifies a GDS subscriber/agency and is not geographic despite the name.","explanation_ko":"도시 코드는 IATA의 지리적 대도시권 코드인 반면, 의사 도시 코드(PCC)는 GDS 가입자/여행사를 식별하며 명칭과 달리 지리적 의미가 없다.","targetId":"city-code"}],"sources":[{"name":"Pseudo city code","org":"Wikipedia","version":"","section":"","url":"https://en.wikipedia.org/wiki/Pseudo_city_code"}],"lastReviewed":"2026-06-15","icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M8 28h6V14l4-3 4 3v14\"/>\u003cpath d=\"M22 28V18h8v10\"/>\u003cpath d=\"M8 38c2-3 5-3 7 0s5 3 7 0 5-3 7 0 5 3 7 0\"/>\u003c/svg>"},{"id":"queue","term":"Queue","abbreviation":"","aliases":["GDS Queue","PNR Queue","Work Queue"],"category":"air-ops","conceptType":"business-term","status":"active","definition":"A queue is an electronic work list within a CRS/GDS or airline host into which PNRs (or messages) are automatically or manually placed so that they can be reviewed and acted upon, for example after a schedule change, ticketing time limit, or waitlist clearance. Each queue is identified by a number/category and routes work to the appropriate agent or office.","definition_ko":"queue(큐, 작업 대기열)는 CRS/GDS 또는 항공사 호스트 내의 전자 작업 목록으로, 스케줄 변경, 발권 시한, 대기자 확약 등의 이후에 PNR(또는 메시지)이 자동 또는 수동으로 배치되어 검토 및 처리될 수 있도록 한다. 각 queue는 번호/카테고리로 식별되며 작업을 적절한 에이전트나 사무소로 라우팅한다.","term_ko":"작업 대기열(Queue)","longDef":"Queues are the workflow backbone of reservation systems: the host places a PNR on a designated queue when an event requires human follow-up (schedule changes, time-limit warnings, confirmations from waitlist, special service replies). Agents 'work the queue' by retrieving PNRs one by one, taking action, and removing or re-queuing them. Numbering and category conventions differ by GDS (for example, schedule-change and ticketing queues), but the concept of an event-driven work list is common across systems.","longDef_ko":"queue는 예약 시스템 워크플로의 근간이다. 호스트는 사람이 후속 처리해야 하는 이벤트(스케줄 변경, 시한 경고, 대기자 확약, 특별 서비스 응답)가 발생하면 지정된 queue에 PNR을 배치한다. 에이전트는 PNR을 하나씩 조회하여 조치를 취하고 이를 제거하거나 다시 큐에 넣는 방식으로 'queue를 처리'한다. 번호 및 카테고리 규칙은 GDS마다 다르지만(예: 스케줄 변경 및 발권 queue), 이벤트 기반 작업 목록이라는 개념은 시스템 전반에 공통적이다.","standardBody":"","providerTerms":[{"provider":"Amadeus","term":"Queue","context":"Amadeus organizes PNR follow-up work into numbered queues and categories","context_ko":"Amadeus는 PNR 후속 처리 작업을 번호가 매겨진 queue와 카테고리로 구성한다","relationship":"same"},{"provider":"Sabre","term":"Queue","context":"Sabre routes PNRs needing action to numbered queues for agents to work","context_ko":"Sabre는 조치가 필요한 PNR을 에이전트가 처리하도록 번호가 매겨진 queue로 라우팅한다","relationship":"same"},{"provider":"Travelport","term":"Queue","context":"Galileo/Apollo and Worldspan use queues to manage PNR follow-up","context_ko":"Galileo/Apollo와 Worldspan은 PNR 후속 처리를 관리하기 위해 queue를 사용한다","relationship":"same"}],"relationships":[{"type":"related","targetTerm":"PNR","targetId":"pnr"},{"type":"related","targetTerm":"Schedule Change","targetId":"schedule-change"},{"type":"related","targetTerm":"Ticketing Time Limit","targetId":"ticketing-time-limit"},{"type":"related","targetTerm":"IROPS","targetId":"irops"}],"distinctions":[],"sources":[{"name":"Amadeus Functional Documentation — Queues","org":"Amadeus","version":"","section":"","url":""},{"name":"Sabre Format Finder — Queues","org":"Sabre","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003ccircle cx=\"9\" cy=\"12\" r=\"2\"/>\u003ccircle cx=\"9\" cy=\"24\" r=\"2\"/>\u003ccircle cx=\"9\" cy=\"36\" r=\"2\"/>\u003cline x1=\"17\" y1=\"12\" x2=\"40\" y2=\"12\"/>\u003cline x1=\"17\" y1=\"24\" x2=\"40\" y2=\"24\"/>\u003cline x1=\"17\" y1=\"36\" x2=\"40\" y2=\"36\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"rate-code","term":"Rate Code","abbreviation":"","aliases":["Rate Plan Code","Rate ID"],"category":"hotel-rate","conceptType":"code","status":"active","definition":"A rate code is the short alphanumeric identifier a hotel uses to label and configure a specific set of pricing rules (the rate amounts, applicable room types, date or season ranges, restrictions and any bundled elements) within a PMS, CRS or distribution channel. It is the operational key that ties a stay to a particular Rate Plan when a reservation is created.","longDef":"In property systems such as Oracle OPERA, rate codes sit at the core of the reservation and yield-management process: each rate code defines amounts (often differentiated by day-of-week, occupancy or per-person), the room types it applies to, valid date ranges or rate seasons, and may attach package elements that give the guest entitlements (breakfast, parking, etc.). When a rate code is distributed electronically it surfaces as the RatePlanCode value in OpenTravel (OTA) messages exchanged between PMS, CRS and channels. Special-purpose rate codes exist for internal needs (house-use or zero rate codes for dummy/paymaster/group-master rooms) and for derived pricing (virtual or follow rates whose amounts are computed from another code). Rate code is the implementation-level identifier, whereas Rate Plan is the conceptual product it represents.","standardBody":"","term_ko":"Rate Code (요금 코드)","definition_ko":"Rate Code(요금 코드)는 호텔이 특정 가격 규칙 묶음(요금 금액, 적용 객실 타입, 날짜/시즌 범위, 제약 조건, 패키지 구성요소 등)을 PMS·CRS·유통 채널 안에서 식별하고 설정하기 위해 사용하는 짧은 영숫자 식별자다. 예약 생성 시 해당 투숙을 특정 Rate Plan에 연결하는 운영상의 키 역할을 한다.","longDef_ko":"Oracle OPERA 같은 PMS에서 Rate Code는 예약 및 수익관리 프로세스의 핵심이다. 각 Rate Code는 금액(요일·인원·1인당 단위로 차등화되기도 함), 적용 객실 타입, 유효 날짜 범위 또는 rate season, 그리고 조식·주차 등 패키지 구성요소를 정의한다. 전자적으로 유통될 때는 OpenTravel(OTA) 메시지의 RatePlanCode 값으로 노출된다. 내부용 코드(더미·페이마스터·그룹마스터 객실용 house-use/zero rate code)나 다른 코드에서 금액을 파생시키는 virtual/follow rate 같은 특수 목적 코드도 존재한다. Rate Code는 구현 수준의 식별자이고, Rate Plan은 그것이 나타내는 개념적 상품이다.","providerTerms":[{"provider":"Oracle OPERA","term":"Rate Code","context":"Rate codes define the prices for each room type over a date range or rate season and form the core of OPERA's yield management and reservation processes.","context_ko":"OPERA에서 Rate Code는 날짜 범위 또는 rate season별 객실 타입 가격을 정의하며 수익관리·예약 프로세스의 핵심을 이룬다.","relationship":"same"},{"provider":"OpenTravel Alliance","term":"RatePlanCode","context":"The RatePlanCode attribute in OTA hotel messages carries the rate code value when rates are distributed between PMS, CRS and channels.","context_ko":"OTA 호텔 메시지의 RatePlanCode 속성이 PMS·CRS·채널 간 요금 유통 시 rate code 값을 전달한다.","relationship":"same"}],"relationships":[{"type":"child","targetTerm":"Rate Plan","targetId":"rate-plan"},{"type":"related","targetTerm":"Room Type","targetId":"room-type"},{"type":"related","targetTerm":"BAR","targetId":"bar"},{"type":"related","targetTerm":"PMS","targetId":"pms"},{"type":"related","targetTerm":"CRS","targetId":"crs"}],"distinctions":[{"targetTerm":"Rate Plan","explanation":"Rate Plan is the conceptual commercial product (e.g. Best Available Rate, room-only); Rate Code is the system identifier that implements and labels that product so it can be loaded, sold and exchanged electronically.","explanation_ko":"Rate Plan은 개념적 상품(예: BAR, 객실 단독)이고, Rate Code는 그 상품을 시스템에 적재·판매·전자교환할 수 있도록 구현하고 라벨링하는 식별자다.","targetId":"rate-plan"}],"sources":[{"org":"Oracle","name":"OPERA Cloud / OPERA 5 Help — Rate Codes","version":"","section":"Rate Management","url":"https://docs.oracle.com/cd/E98457_01/opera_5_6_core_help/rate_codes.htm"},{"org":"OpenTravel Alliance","name":"OpenTravel Hotel Specification (RatePlanCode)","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"6\" y=\"12\" width=\"36\" height=\"24\" rx=\"3\"/>\u003cpath d=\"M14 22h8M14 28h12\"/>\u003ccircle cx=\"32\" cy=\"24\" r=\"3\"/>\u003cpath d=\"M32 21v-3M32 30v-2\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"rate-parity","term":"Rate Parity","term_ko":"요금 동등성(Rate Parity)","abbreviation":"","aliases":["Price Parity","Rate Parity Agreement","Most Favoured Nation (rate clause)"],"category":"hotel-rate","conceptType":"business-term","status":"active","definition":"Rate parity is the practice or contractual commitment of maintaining consistent rates (and often availability/conditions) for the same room type and dates across distribution channels, so that, for example, an OTA does not show a different public rate than the hotel's own website. It is frequently enforced through parity clauses in distribution contracts.","definition_ko":"Rate parity는 동일한 객실 유형과 날짜에 대해 유통 채널 전반에서 일관된 요금(그리고 흔히 가용 여부·조건)을 유지하는 관행 또는 계약상 약정으로, 예를 들어 OTA가 호텔 자체 웹사이트와 다른 공개 요금을 표시하지 않도록 한다. 유통 계약의 parity 조항을 통해 시행되는 경우가 많다.","longDef":"Rate parity typically applies to public/BAR-type rates and aims to prevent channel undercutting. Clauses range from 'wide parity' (parity required across all channels including direct) to 'narrow parity' (parity only relative to the hotel's own direct channels). Such clauses have faced regulatory and competition-law scrutiny in several jurisdictions, leading to restrictions or bans on wide parity, so the term's applicability varies by market.","longDef_ko":"Rate parity는 일반적으로 공개 요금/BAR 유형 요금에 적용되며 채널 간 가격 후려치기를 방지하는 것을 목표로 한다. 조항은 '광의 parity'(직판을 포함한 모든 채널에서 동등성 요구)부터 '협의 parity'(호텔 자체 직판 채널에 대해서만 동등성 요구)까지 다양하다. 이러한 조항은 여러 관할권에서 규제 및 경쟁법상 검토를 받아 광의 parity에 대한 제한이나 금지로 이어졌으므로, 이 용어의 적용 가능성은 시장마다 다르다.","standardBody":"","providerTerms":[],"relationships":[{"type":"related","targetTerm":"BAR","targetId":"bar"},{"type":"related","targetTerm":"OTA (Online Travel Agency)","targetId":"ota-online-travel-agency"},{"type":"related","targetTerm":"Rate Plan","targetId":"rate-plan"},{"type":"related","targetTerm":"Channel Manager","targetId":"channel-manager"}],"distinctions":[{"targetTerm":"BAR","explanation":"BAR is the actual best public rate; rate parity is the policy that this rate stays consistent across channels.","explanation_ko":"BAR은 실제 최저 공개 요금이고, rate parity는 이 요금이 채널 전반에서 일관되게 유지되도록 하는 정책이다.","targetId":"bar"}],"sources":[{"name":"Industry distribution and competition-law commentary on hotel rate parity","org":"","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M24 8v30\"/>\u003cpath d=\"M14 38h20\"/>\u003cpath d=\"M10 14h28\"/>\u003cpath d=\"M10 14l-5 9a5 5 0 0 0 10 0z\"/>\u003cpath d=\"M38 14l-5 9a5 5 0 0 0 10 0z\"/>\u003ccircle cx=\"24\" cy=\"10\" r=\"2\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"rate-plan","term":"Rate Plan","term_ko":"요금제(Rate Plan)","abbreviation":"","aliases":["Rate Code","Rate Type","Tariff"],"category":"hotel-rate","conceptType":"business-term","status":"active","definition":"A named, sellable pricing offer attached to one or more room types that defines the price and the commercial conditions under which a room is sold, such as inclusions, cancellation rules, payment terms, and eligibility. Examples include a Best Available Rate, an advance-purchase non-refundable rate, or a corporate negotiated rate.","definition_ko":"하나 이상의 객실 유형에 연결되어 객실이 판매되는 가격과 상업적 조건(포함 항목, 취소 규정, 결제 조건, 적용 대상 등)을 정의하는 명명된 판매용 가격 상품이다. BAR(Best Available Rate), 사전 구매형 환불 불가 요금, 기업 협상 요금 등이 그 예이다.","longDef":"A rate plan bundles a price (or pricing logic) together with rules and restrictions: board basis, cancellation/guarantee policy, minimum/maximum length of stay, advance booking and stay-date windows, market segment or qualification (e.g. corporate, member, opaque), and whether the rate is commissionable or net. In a CRS/PMS a rate plan is identified by a rate code and mapped to room types and date ranges; the same physical room can be sold under many rate plans at different prices and conditions.","longDef_ko":"요금제는 가격(또는 가격 산정 로직)을 식사 조건, 취소/보증 정책, 최소/최대 숙박일수, 사전 예약 및 투숙일 기간, 시장 세그먼트나 자격 조건(예: 기업, 회원, 비공개), 수수료 지급 여부 또는 net 여부 등의 규칙·제약과 함께 묶은 것이다. CRS/PMS에서 요금제는 rate code로 식별되며 객실 유형과 날짜 범위에 매핑된다. 동일한 실제 객실이라도 여러 요금제 아래 서로 다른 가격과 조건으로 판매될 수 있다.","standardBody":"OpenTravel Alliance","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Room Type","targetId":"room-type"},{"type":"related","targetTerm":"Board Basis","targetId":"board-basis"},{"type":"narrower","targetTerm":"BAR","targetId":"bar"},{"type":"related","targetTerm":"Cancellation Po
