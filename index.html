:root{
  --bg:#f4f5f9; --surface:#ffffff; --surface-2:#eef0f7; --border:#e3e6f0;
  --text:#0b1020; --muted:#535d77; --faint:#9aa3bd;
  --accent:#4f2bff; --accent-2:#ff2d8e; --accent-3:#00c2a8; --accent-weak:#ece7ff;
  --grad:linear-gradient(115deg,#4f2bff 0%,#a01cff 45%,#ff2d8e 100%);
  --grad-soft:linear-gradient(115deg,#6d4bff22,#ff2d8e18);
  --warn:#d9730d; --warn-weak:#fff3e2; --danger:#e0245e;
  --shadow:0 2px 6px rgba(20,16,60,.06),0 12px 36px rgba(20,16,60,.10);
  --shadow-lg:0 8px 28px rgba(40,20,90,.14),0 30px 70px rgba(40,20,90,.18);
  --ring:0 0 0 4px var(--accent-weak);
  --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  --sans:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR","Apple SD Gothic Neo",sans-serif;
  --display:'Archivo','Space Grotesk',var(--sans);
  --grotesk:'Space Grotesk',var(--sans);
  --side:300px; --maxw:920px; --hh:64px;
}
[data-theme="dark"]{
  --bg:#070912; --surface:#0f1322; --surface-2:#171c30; --border:#262d47;
  --text:#f3f5ff; --muted:#a3acca; --faint:#5f6a8c;
  --accent:#8b6bff; --accent-2:#ff5fa6; --accent-3:#2fe0c4; --accent-weak:#1d1a3e;
  --grad:linear-gradient(115deg,#7b5bff 0%,#c44bff 45%,#ff5fa6 100%);
  --grad-soft:linear-gradient(115deg,#7b5bff2a,#ff5fa61f);
  --warn:#f0a85a; --warn-weak:#2a1e0c; --danger:#ff5b86;
  --shadow:0 2px 6px rgba(0,0,0,.4),0 14px 40px rgba(0,0,0,.5);
  --shadow-lg:0 10px 34px rgba(0,0,0,.55),0 36px 80px rgba(0,0,0,.6);
  --ring:0 0 0 4px #6d4bff44;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:16px;line-height:1.62;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
code,kbd{font-family:var(--mono);font-size:.86em;background:var(--surface-2);padding:.14em .45em;border-radius:6px;border:1px solid var(--border)}
::selection{background:var(--accent);color:#fff}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes pop{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:none}}
@keyframes drift{0%{transform:translate(0,0) rotate(0)}50%{transform:translate(-3%,4%) rotate(8deg)}100%{transform:translate(0,0) rotate(0)}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* header */
header.top{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:14px;height:var(--hh);padding:0 22px;
  background:color-mix(in srgb,var(--surface) 80%,transparent);backdrop-filter:blur(18px) saturate(1.4);-webkit-backdrop-filter:blur(18px) saturate(1.4);
  border-bottom:1px solid var(--border)}
.brand{display:flex;align-items:center;gap:11px;font-family:var(--grotesk);font-weight:700;font-size:1.2rem;letter-spacing:-.03em;white-space:nowrap;color:var(--text);cursor:pointer}
.brand .globe{width:36px;height:36px;border-radius:12px;display:grid;place-items:center;color:#fff;background:var(--grad);box-shadow:0 6px 18px rgba(120,40,255,.4);font-size:18px;transition:transform .4s cubic-bezier(.34,1.56,.64,1)}
.brand:hover .globe{transform:rotate(-12deg) scale(1.08)}
.brand small{display:block;font-family:var(--sans);font-weight:600;color:var(--faint);font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;margin-top:1px}
.searchwrap{flex:1;max-width:520px;position:relative;margin-left:8px}
#q{width:100%;padding:11px 40px;border:1.5px solid var(--border);border-radius:14px;background:var(--surface-2);color:var(--text);font-size:.95rem;font-weight:500;outline:none;transition:.2s}
#q:focus{border-color:var(--accent);background:var(--surface);box-shadow:var(--ring)}
.searchwrap .mag{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--faint);pointer-events:none}
.searchwrap .hint{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--faint);font-size:.72rem;font-weight:700;border:1px solid var(--border);border-radius:6px;padding:1px 7px;pointer-events:none}
.tbtn{border:1.5px solid var(--border);background:var(--surface);color:var(--text);height:42px;min-width:42px;padding:0 12px;border-radius:13px;cursor:pointer;font-family:var(--grotesk);font-size:14px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;gap:6px;transition:.18s}
.tbtn:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-1px)}
.actions{margin-left:auto;display:flex;gap:9px;align-items:center}
.menu-toggle{display:none;border:1.5px solid var(--border);background:var(--surface);color:var(--text);width:42px;height:42px;border-radius:13px;cursor:pointer;font-size:18px}

/* layout */
.shell{display:grid;grid-template-columns:var(--side) 1fr;align-items:start}
aside.nav{position:sticky;top:var(--hh);height:calc(100vh - var(--hh));overflow-y:auto;border-right:1px solid var(--border);background:var(--surface);padding:20px 14px}
aside .nav-title{font-family:var(--grotesk);font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--faint);margin:20px 10px 7px}
aside .nav-title:first-of-type{margin-top:2px}
.cat-link{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:9px 12px;border-radius:11px;color:var(--text);cursor:pointer;font-size:.9rem;font-weight:500;transition:.16s}
.cat-link:hover{background:var(--surface-2);color:var(--accent);text-decoration:none;transform:translateX(2px)}
.cat-link.active{background:var(--grad);color:#fff;font-weight:700;box-shadow:0 6px 16px rgba(120,40,255,.32)}
.cat-link .cnt{font-size:.72rem;font-weight:700;color:var(--muted);background:var(--surface-2);border-radius:20px;padding:1px 9px;min-width:28px;text-align:center}
.cat-link.active .cnt{background:rgba(255,255,255,.25);color:#fff}
.cat-link .dot{width:9px;height:9px;border-radius:3px;flex:none}
main{min-width:0;padding:38px clamp(18px,4.5vw,60px) 120px;max-width:calc(var(--maxw) + 120px);margin:0 auto;width:100%}
.scrim{display:none}

/* icons */
.icon{display:inline-grid;place-items:center;flex:none}
.icon svg{width:100%;height:100%;display:block}
.term-icon{width:60px;height:60px;border-radius:16px;background:var(--grad-soft);border:1px solid var(--border);padding:11px}
.tl-icon{width:40px;height:40px;border-radius:11px;background:var(--surface-2);padding:8px}
.idx-icon{width:30px;height:30px;border-radius:9px;background:var(--surface-2);padding:6px}

/* hero */
.hero{position:relative;overflow:hidden;background:var(--surface);border:1px solid var(--border);border-radius:28px;padding:46px 42px;box-shadow:var(--shadow);margin-bottom:30px;animation:fadeUp .5s both}
.hero::before{content:"";position:absolute;inset:-40% -10% auto auto;width:60%;height:160%;background:var(--grad);filter:blur(70px);opacity:.18;animation:drift 14s ease-in-out infinite}
.hero h1{position:relative;font-family:var(--display);font-weight:800;margin:.05em 0 .3em;font-size:clamp(2rem,4.6vw,3.4rem);line-height:1.04;letter-spacing:-.035em}
.hero p{position:relative;margin:.2em 0;color:var(--muted);max-width:64ch;font-size:1.02rem}
.stats{position:relative;display:flex;flex-wrap:wrap;gap:14px;margin-top:26px}
.stat{background:var(--surface-2);border:1px solid var(--border);border-radius:16px;padding:14px 22px;min-width:128px}
.stat b{display:block;font-family:var(--display);font-weight:800;font-size:2rem;letter-spacing:-.03em;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.stat span{color:var(--muted);font-size:.8rem;font-weight:600}
.sec-title{font-family:var(--grotesk);font-weight:700;font-size:1.3rem;margin:32px 0 14px;letter-spacing:-.02em;animation:fadeUp .45s both}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(244px,1fr));gap:14px}
.card{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:18px;cursor:pointer;box-shadow:var(--shadow);transition:transform .14s,box-shadow .14s,border-color .14s;animation:fadeUp .5s both;overflow:hidden}
.card::after{content:"";position:absolute;left:0;top:0;height:100%;width:4px;background:var(--cc,var(--accent));opacity:.85}
.card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:transparent;text-decoration:none}
.card .ct{display:flex;align-items:center;gap:9px;font-family:var(--grotesk);font-weight:700;font-size:1rem}
.card .cd{color:var(--muted);font-size:.85rem;margin-top:7px;line-height:1.5}
.card .cn{color:var(--faint);font-size:.74rem;font-weight:600;margin-top:11px;text-transform:uppercase;letter-spacing:.05em}
.cards .card:nth-child(1){animation-delay:.03s}.cards .card:nth-child(2){animation-delay:.06s}.cards .card:nth-child(3){animation-delay:.09s}.cards .card:nth-child(4){animation-delay:.12s}.cards .card:nth-child(5){animation-delay:.15s}.cards .card:nth-child(6){animation-delay:.18s}.cards .card:nth-child(7){animation-delay:.21s}.cards .card:nth-child(8){animation-delay:.24s}
.cta-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:22px;position:relative}
.cta-graph,.cta-2{display:inline-flex;align-items:center;gap:9px;border-radius:14px;padding:13px 22px;font-family:var(--grotesk);font-weight:700;font-size:.95rem}
.cta-graph{background:var(--grad);color:#fff;box-shadow:0 8px 24px rgba(120,40,255,.34)}
.cta-graph:hover{text-decoration:none;transform:translateY(-2px)}
.cta-2{background:var(--surface-2);color:var(--text);border:1px solid var(--border)}
.cta-2:hover{text-decoration:none;border-color:var(--accent);color:var(--accent)}
.conflict{display:block;background:var(--warn-weak);border:1px solid var(--border);border-left:4px solid var(--warn);border-radius:14px;padding:14px 16px;margin-bottom:11px;animation:fadeUp .5s both}
.conflict b{color:var(--warn)}
.disclaimer{max-width:var(--maxw);margin:24px auto 0;color:var(--faint);font-size:.78rem;line-height:1.55;text-align:center}

/* lists */
.crumbs{font-size:.82rem;color:var(--muted);margin-bottom:14px;font-weight:500}
.crumbs a{color:var(--muted)}
.termlist{display:grid;gap:9px}
.tl-item{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:13px 16px;cursor:pointer;transition:transform .13s,border-color .13s,box-shadow .13s}
.tl-item:hover{border-color:var(--accent);transform:translateX(4px);box-shadow:var(--shadow);text-decoration:none}
.tl-item .tl-body{min-width:0;flex:1}
.tl-item .h{font-family:var(--grotesk);font-weight:700;color:var(--text)}
.tl-item .d{color:var(--muted);font-size:.85rem;margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tl-item .abbr{color:var(--faint);font-weight:500;font-size:.85em}
.termlist{animation:fadeUp .45s both}

/* article */
article{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:clamp(22px,3.4vw,40px);box-shadow:var(--shadow);animation:fadeUp .5s both}
.term-hero{display:flex;align-items:center;gap:18px;margin-bottom:6px}
article h1{font-family:var(--display);font-weight:800;margin:0;font-size:clamp(1.7rem,3.6vw,2.4rem);letter-spacing:-.035em;line-height:1.1}
.term-sub{color:var(--muted);font-size:1.05rem;font-weight:600;margin:3px 0 0}
.badges{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0 4px}
.badge{font-size:.74rem;font-weight:600;padding:4px 11px;border-radius:20px;border:1px solid var(--border);background:var(--surface-2);color:var(--muted)}
.badge.cat{background:var(--grad);color:#fff;border-color:transparent;cursor:pointer}
.badge.st-active{color:var(--accent-3)}.badge.st-deprecated{color:var(--danger)}.badge.st-ambiguous{color:var(--warn)}
.lead{font-size:1.12rem;margin:18px 0;color:var(--text);line-height:1.6}
.field{margin-top:26px}
.field h3{font-family:var(--grotesk);font-size:.76rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);margin:0 0 11px;padding-bottom:7px;border-bottom:2px solid var(--border)}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{font-size:.82rem;background:var(--surface-2);border:1px solid var(--border);border-radius:9px;padding:4px 10px;color:var(--muted)}
table.pt{width:100%;border-collapse:collapse;font-size:.88rem}
table.pt th,table.pt td{text-align:left;padding:9px 11px;border-bottom:1px solid var(--border);vertical-align:top}
table.pt th{font-family:var(--grotesk);color:var(--faint);font-size:.72rem;text-transform:uppercase;letter-spacing:.06em}
table.pt td.prov{font-weight:700;white-space:nowrap}
table.pt code{white-space:nowrap}
.rel-group{margin-bottom:9px}
.rel-group .rl{font-family:var(--grotesk);font-size:.72rem;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:.06em;margin-right:7px}
.rel-link{display:inline-block;background:var(--accent-weak);color:var(--accent);border-radius:9px;padding:3px 11px;margin:3px 5px 3px 0;font-size:.85rem;font-weight:600}
.rel-link:hover{text-decoration:none;background:var(--accent);color:#fff}
.rel-dead{display:inline-block;background:var(--surface-2);color:var(--muted);border-radius:9px;padding:3px 11px;margin:3px 5px 3px 0;font-size:.85rem}
.dist{background:var(--surface-2);border:1px solid var(--border);border-left:3px solid var(--accent-2);border-radius:11px;padding:11px 13px;margin-bottom:8px;font-size:.9rem}
.dist b a{color:var(--text)}
ul.src{margin:0;padding-left:18px;font-size:.86rem;color:var(--muted)}
ul.src li{margin:4px 0}
.notes{background:var(--surface-2);border-left:3px solid var(--accent);border-radius:0 10px 10px 0;padding:11px 15px;font-size:.9rem;color:var(--muted)}
.rel-meta{margin-top:28px;color:var(--faint);font-size:.78rem;border-top:1px solid var(--border);padding-top:14px}

/* search / empty */
.searchmeta{color:var(--muted);font-size:.9rem;margin-bottom:14px}
mark{background:var(--accent-weak);color:var(--accent);padding:0 2px;border-radius:4px}
.empty{color:var(--muted);text-align:center;padding:70px 10px}

/* index page */
.idx-head{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:12px;margin-bottom:6px}
.idx-toggle{display:inline-flex;background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:3px;gap:2px}
.idx-toggle button{border:0;background:none;color:var(--muted);font-family:var(--grotesk);font-weight:700;font-size:.82rem;padding:6px 14px;border-radius:9px;cursor:pointer}
.idx-toggle button.on{background:var(--grad);color:#fff}
.idx-bar{position:sticky;top:var(--hh);z-index:5;display:flex;flex-wrap:wrap;gap:4px;padding:12px 0;margin-bottom:8px;background:linear-gradient(var(--bg),var(--bg) 70%,transparent)}
.idx-bar button{width:30px;height:30px;border:1px solid var(--border);background:var(--surface);color:var(--muted);border-radius:9px;font-family:var(--grotesk);font-weight:700;font-size:.8rem;cursor:pointer}
.idx-bar button:hover{background:var(--grad);color:#fff;border-color:transparent}
.idx-group{margin-bottom:18px;animation:fadeUp .4s both}
.idx-gh{font-family:var(--display);font-weight:800;font-size:1.3rem;color:var(--accent);padding:6px 0;border-bottom:2px solid var(--border);margin-bottom:8px;display:flex;align-items:center;gap:10px}
.idx-gh .gc{width:12px;height:12px;border-radius:4px}
.idx-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px}
.idx-row{display:flex;align-items:center;gap:12px;padding:9px 12px;border:1px solid transparent;border-radius:12px;cursor:pointer}
.idx-row:hover{background:var(--surface);border-color:var(--border);box-shadow:var(--shadow);text-decoration:none}
.idx-row .ir-body{min-width:0}
.idx-row .ir-term{font-family:var(--grotesk);font-weight:700;color:var(--text);font-size:.92rem}
.idx-row .ir-ko{color:var(--faint);font-weight:500;font-size:.84em}
.idx-row .ir-cat{color:var(--faint);font-size:.74rem;margin-top:1px}

/* graph */
.graph-head{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:8px}
.kg-legend{display:flex;flex-wrap:wrap;gap:7px;margin:10px 0 14px}
.legend-item{display:inline-flex;align-items:center;gap:7px;font-size:.78rem;font-weight:600;border:1px solid var(--border);background:var(--surface);border-radius:20px;padding:4px 12px;cursor:pointer;user-select:none}
.legend-item .ld{width:11px;height:11px;border-radius:4px}
.legend-item.off{opacity:.35}
.graph-wrap{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:20px;box-shadow:var(--shadow);overflow:hidden;animation:fadeUp .5s both}
#kg{display:block;width:100%;touch-action:none;cursor:grab}
#kg:active{cursor:grabbing}
.kg-tip{position:absolute;pointer-events:none;background:var(--text);color:var(--surface);font-size:.78rem;font-weight:600;padding:6px 10px;border-radius:9px;opacity:0;transform:translate(-50%,-130%);transition:opacity .1s;white-space:nowrap;z-index:5;max-width:260px}

/* classroom page */
.classroom-wrap{display:grid;grid-template-columns:350px 1fr;gap:24px;background:var(--surface);border:1px solid var(--border);border-radius:20px;box-shadow:var(--shadow);overflow:hidden;animation:fadeUp .5s both;min-height:500px;margin-bottom:30px}
@media (max-width:900px){.classroom-wrap{grid-template-columns:1fr}}
.classroom-left{padding:24px;display:flex;flex-direction:column;gap:20px;border-right:1px solid var(--border);background:var(--surface-2)}
@media (max-width:900px){.classroom-left{border-right:none;border-bottom:1px solid var(--border)}}
.classroom-tabs{display:flex;gap:8px;border-bottom:1px solid var(--border);padding-bottom:12px}
.classroom-tab{flex:1;padding:10px;border:1px solid var(--border);background:var(--surface);color:var(--text);border-radius:8px;cursor:pointer;font-family:var(--grotesk);font-weight:700;font-size:0.85rem;text-align:center;transition:all 0.2s}
.classroom-tab.active{background:var(--grad);color:#fff;border-color:transparent;box-shadow:0 4px 12px rgba(120,40,255,0.25)}
.classroom-tab:hover:not(.active){border-color:var(--accent);color:var(--accent)}
.classroom-content{flex:1;display:flex;flex-direction:column;gap:12px}
.classroom-title{font-family:var(--grotesk);font-size:1.25rem;font-weight:700;margin:0;color:var(--text)}
.classroom-step-count{font-size:0.85rem;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:0.05em}
.classroom-narration{font-size:0.95rem;line-height:1.62;color:var(--muted);min-height:120px}
.classroom-controls{display:flex;gap:12px;margin-top:auto}
.classroom-btn{flex:1;padding:11px 16px;border:1px solid var(--border);background:var(--surface);color:var(--text);border-radius:10px;cursor:pointer;font-family:var(--grotesk);font-weight:700;font-size:0.9rem;text-align:center;transition:all 0.2s;display:inline-flex;align-items:center;justify-content:center}
.classroom-btn:disabled{opacity:0.4;cursor:not-allowed;border-color:var(--border)!important;color:var(--muted)!important;background:var(--surface)!important}
.classroom-btn-primary{background:var(--grad);color:#fff;border-color:transparent;box-shadow:0 4px 12px rgba(120,40,255,0.25)}
.classroom-btn-primary:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 16px rgba(120,40,255,0.35)}
.classroom-btn-secondary:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.classroom-right{position:relative;flex:1;background:var(--surface);display:flex;align-items:center;justify-content:center}
#classroomCanvas{display:block;width:100%;height:100%;min-height:400px}

footer{color:var(--faint);font-size:.78rem;text-align:center;padding:26px;border-top:1px solid var(--border);margin-top:30px}

@media (max-width:880px){
  :root{--side:0px}
  .menu-toggle{display:inline-flex;align-items:center;justify-content:center;order:-1}
  aside.nav{position:fixed;left:0;top:var(--hh);width:282px;z-index:35;transform:translateX(-100%);transition:transform .22s;box-shadow:var(--shadow-lg)}
  body.nav-open aside.nav{transform:translateX(0)}
  .shell{grid-template-columns:1fr}
  .searchwrap .hint{display:none}.brand small{display:none}
  .idx-bar{top:var(--hh)}
  .scrim{display:none;position:fixed;inset:var(--hh) 0 0 0;background:rgba(0,0,0,.4);z-index:34}
  body.nav-open .scrim{display:block}
}

 등 고객/프로파일 개념.","desc_en":"Passenger type codes, FFP, One ID — customer & profile concepts."},{"id":"standards","short":"유통표준·API","title":"Distribution Standards & APIs","color":"#444c5e","desc":"GDS·NDC·OpenTravel·HTNG 등 유통 표준과 API.","desc_en":"GDS, NDC, OpenTravel, HTNG — distribution standards & APIs."}],"entries":[{"id":"3-d-secure","term":"3-D Secure","abbreviation":"3DS","aliases":["3DS","Three-Domain Secure","EMV 3-D Secure","EMV 3DS"],"category":"pay","conceptType":"standard-term","status":"active","definition":"3-D Secure is a messaging protocol that adds an authentication layer to card-not-present (online) card payments, enabling the issuer to verify the cardholder before authorization. The current generation, EMV 3-D Secure (3DS2), is managed by EMVCo and underpins liability shift and Strong Customer Authentication (SCA) compliance.","term_ko":"3-D Secure(3DS)","definition_ko":"3-D Secure는 카드 비대면(온라인) 결제에 인증 계층을 추가하는 메시징 프로토콜로, 발급사가 승인 전에 카드 소지자를 검증할 수 있게 한다. 현 세대인 EMV 3-D Secure(3DS2)는 EMVCo가 관리하며, 책임 전환(liability shift)과 강력한 고객 인증(SCA) 준수의 기반이 된다.","longDef":"The name refers to the three domains involved: the issuer (cardholder) domain, the acquirer (merchant) domain, and the interoperability domain. 3DS2 supports frictionless flows using risk data as well as challenge flows (one-time passcodes, biometrics) and is the primary mechanism for meeting PSD2 SCA on CNP transactions in the EU/UK. In travel it is relevant wherever an intermediary is Merchant of Record taking cardholder payments online.","longDef_ko":"이 명칭은 관련된 세 개의 도메인을 가리킨다. 발급사(카드 소지자) 도메인, 매입사(가맹점) 도메인, 상호 운용성 도메인이다. 3DS2는 위험 데이터를 활용한 무마찰(frictionless) 흐름과 챌린지 흐름(일회용 비밀번호, 생체인증)을 모두 지원하며, EU/영국에서 CNP(비대면) 거래에 대한 PSD2 SCA를 충족하는 주요 메커니즘이다. 여행 업계에서는 중개업체가 Merchant of Record로서 온라인으로 카드 소지자의 결제를 수납하는 모든 경우에 관련된다.","standardBody":"EMVCo","providerTerms":[{"provider":"EMVCo","term":"EMV 3-D Secure","context":"EMVCo specifies and manages the EMV 3DS protocol","context_ko":"EMVCo가 EMV 3DS 프로토콜을 규정하고 관리한다","relationship":"same"}],"relationships":[{"type":"related","targetTerm":"Chargeback","targetId":"chargeback"},{"type":"related","targetTerm":"Merchant of Record","targetId":"merchant-of-record"},{"type":"related","targetTerm":"VCC","targetId":"vcc"}],"distinctions":[{"targetTerm":"Chargeback","explanation":"3-D Secure authenticates the cardholder up front and can shift fraud liability, whereas a chargeback is a post-transaction dispute reversal.","explanation_ko":"3-D Secure는 거래 전에 카드 소지자를 인증하여 사기 책임을 전환할 수 있는 반면, 차지백은 거래 후 분쟁에 따른 거래 취소다.","targetId":"chargeback"}],"sources":[{"name":"EMV 3-D Secure","org":"EMVCo","version":"","section":"","url":"https://www.emvco.com/emv-technologies/3-d-secure/"},{"name":"EMVCo explains how EMV 3DS helps meet PSD2 requirements for strong customer authentication","org":"NFCW","version":"","section":"","url":"https://www.nfcw.com/2020/09/09/367797/emvco-explains-how-emv-3ds-helps-meet-psd2-requirements-for-strong-customer-authentication/"}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M24 5 9 11v11c0 9 6 16 15 21 9-5 15-12 15-21V11z\"/>\u003cpath d=\"M17 24l5 5 9-10\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"acquirer","term":"Acquirer","abbreviation":"","aliases":["acquiring bank","merchant acquirer","acquiring institution"],"category":"pay","conceptType":"role","status":"active","definition":"An acquirer (acquiring bank) is the financial institution that holds a merchant's account, processes card payments on its behalf, and routes transactions through the card networks to the issuing banks. The acquirer credits the merchant for sales, manages chargebacks, and is responsible to the card schemes for the merchant's activity.","longDef":"In the four-party card model, the acquirer sits between the merchant and the card network, opposite the issuer (the cardholder's bank). The acquirer (or a payment processor acting for it) submits authorization and clearing messages, receives funds via interchange and network settlement, deducts the merchant discount rate and fees, and pays the net amount to the merchant. The acquirer also underwrites and assumes settlement risk for the merchant, handles chargeback processing, and enforces card-scheme rules including PCI DSS. In travel, an airline operating under the merchant model uses its own or a contracted acquirer to settle card sales directly, whereas agency-model sales are remitted through BSP or ARC instead; a Merchant of Record often interposes its own acquiring relationship so individual suppliers do not each need one.","standardBody":"","term_ko":"매입사 (Acquirer / 매입은행)","definition_ko":"Acquirer(매입사/매입은행)는 가맹점 계좌를 보유하고 가맹점을 대신해 카드 결제를 처리하며, 거래를 카드 네트워크를 거쳐 발급은행으로 라우팅하는 금융기관이다. 매입사는 판매 대금을 가맹점에 입금하고 Chargeback을 관리하며, 가맹점 활동에 대해 카드 네트워크에 책임을 진다.","longDef_ko":"4자 카드 모델에서 매입사는 가맹점과 카드 네트워크 사이에 위치하며, 카드 소지자의 은행인 발급사(issuer)의 반대편에 있다. 매입사(또는 그를 대신하는 결제 프로세서)는 승인·청산 메시지를 전송하고, 인터체인지(Interchange)와 네트워크 정산을 통해 자금을 받아 가맹점 할인율(merchant discount rate)과 수수료를 공제한 뒤 순액을 가맹점에 지급한다. 또한 가맹점을 심사하고 정산 위험을 부담하며, Chargeback 처리와 PCI DSS 등 카드 네트워크 규칙 준수를 집행한다. 여행 분야에서 Merchant Model로 운영하는 항공사는 자체 또는 계약된 매입사를 통해 카드 판매를 직접 정산하지만, Agency Model 판매는 대신 BSP나 ARC를 통해 송금된다. Merchant of Record는 흔히 자체 매입 관계를 끼워 넣어 개별 공급사가 각각 매입사를 둘 필요가 없게 한다.","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Interchange Fee","targetId":"interchange-fee"},{"type":"related","targetTerm":"Chargeback","targetId":"chargeback"},{"type":"related","targetTerm":"Merchant of Record","targetId":"merchant-of-record"},{"type":"related","targetTerm":"Merchant Model","targetId":"merchant-model"},{"type":"related","targetTerm":"Settlement Cycle","targetId":"settlement-cycle"}],"distinctions":[{"targetTerm":"Merchant of Record","explanation":"The acquirer is the bank that processes and settles card transactions; the Merchant of Record is the legal seller responsible to the cardholder for the sale, which contracts with an acquirer but is not itself one.","explanation_ko":"Acquirer는 카드 거래를 처리·정산하는 은행이고, Merchant of Record는 판매에 대해 카드 소지자에게 책임지는 법적 판매자로서 매입사와 계약하지만 그 자신이 매입사는 아니다.","targetId":"merchant-of-record"},{"targetTerm":"IATA Clearing House","explanation":"The acquirer settles consumer card payments between merchants and issuers via the card networks, whereas the IATA Clearing House settles obligations between airlines and other industry members.","explanation_ko":"Acquirer는 카드 네트워크를 통해 가맹점과 발급사 간 소비자 카드 결제를 정산하는 반면, IATA Clearing House는 항공사 등 업계 회원 간 채무를 정산한다.","targetId":"iata-clearing-house"}],"sources":[{"org":"EMVCo","name":"EMVCo Terminology / Book of Glossary","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M24 6l16 7v3H8v-3z\"/>\u003cline x1=\"12\" y1=\"19\" x2=\"12\" y2=\"34\"/>\u003cline x1=\"20\" y1=\"19\" x2=\"20\" y2=\"34\"/>\u003cline x1=\"28\" y1=\"19\" x2=\"28\" y2=\"34\"/>\u003cline x1=\"36\" y1=\"19\" x2=\"36\" y2=\"34\"/>\u003cline x1=\"8\" y1=\"38\" x2=\"40\" y2=\"38\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"adr","term":"ADR","term_ko":"객실 평균 단가(ADR, Average Daily Rate)","abbreviation":"ADR","aliases":["Average Daily Rate","Average Room Rate","ARR"],"category":"hotel-rate","conceptType":"metric","status":"active","definition":"Average Daily Rate is a core lodging performance metric equal to total room revenue divided by the number of rooms sold (occupied) over a given period. It measures the average price actually realized per occupied room and excludes complimentary and house-use rooms.","definition_ko":"ADR(Average Daily Rate)은 일정 기간의 총 객실 매출을 판매된(투숙된) 객실 수로 나눈 값과 같은 핵심 숙박 성과 지표이다. 투숙 객실당 실제 실현된 평균 가격을 측정하며, 무료 제공 객실과 자체 사용 객실은 제외한다.","longDef":"ADR = Room Revenue / Rooms Sold. It captures rate performance independent of how full the property is, so it is typically read alongside occupancy rate and RevPAR. ADR normally counts only revenue-generating occupied rooms (excluding complimentary rooms), and definitions follow industry-standard accounting such as USALI and STR's metric conventions to keep comparisons consistent across properties.","longDef_ko":"ADR = 객실 매출 / 판매 객실 수. 숙소가 얼마나 찼는지와 무관하게 요금 성과를 포착하므로, 보통 객실 점유율 및 RevPAR과 함께 본다. ADR은 일반적으로 매출이 발생한 투숙 객실만 집계하며(무료 객실 제외), 정의는 USALI나 STR의 지표 관행과 같은 업계 표준 회계를 따라 숙소 간 비교의 일관성을 유지한다.","standardBody":"","providerTerms":[],"relationships":[{"type":"related","targetTerm":"RevPAR","targetId":"revpar"},{"type":"related","targetTerm":"Occupancy","targetId":"occupancy"},{"type":"related","targetTerm":"BAR","targetId":"bar"}],"distinctions":[{"targetTerm":"RevPAR","explanation":"ADR divides revenue by rooms sold (occupied), while RevPAR divides revenue by rooms available, so RevPAR reflects both rate and occupancy.","explanation_ko":"ADR은 매출을 판매된(투숙된) 객실 수로 나누는 반면 RevPAR은 매출을 가용 객실 수로 나누므로, RevPAR은 요금과 점유율을 모두 반영한다.","targetId":"revpar"},{"targetTerm":"BAR","explanation":"ADR is a realized average measured after the fact; BAR is a forward-looking published selling rate, not an average outcome.","explanation_ko":"ADR은 사후에 측정된 실현 평균이고, BAR은 미래 지향적으로 게시된 판매 요금일 뿐 평균 결과가 아니다.","targetId":"bar"}],"sources":[{"name":"STR lodging performance metric definitions","org":"STR (CoStar)","version":"","section":"","url":""},{"name":"Uniform System of Accounts for the Lodging Industry (USALI)","org":"AHLA / HFTP","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"8\" y=\"10\" width=\"32\" height=\"30\" rx=\"3\"/>\u003cline x1=\"8\" y1=\"18\" x2=\"40\" y2=\"18\"/>\u003cline x1=\"16\" y1=\"8\" x2=\"16\" y2=\"14\"/>\u003cline x1=\"32\" y1=\"8\" x2=\"32\" y2=\"14\"/>\u003cpath d=\"M27 24h-5a2.5 2.5 0 0 0 0 5h4a2.5 2.5 0 0 1 0 5h-6\"/>\u003cline x1=\"24\" y1=\"22\" x2=\"24\" y2=\"36\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"agency-debit-memo-adm","term":"Agency Debit Memo (ADM)","abbreviation":"ADM","aliases":["Agency Debit Memo","Debit Memo"],"category":"air-ticket","conceptType":"document","status":"active","definition":"An Agency Debit Memo (ADM) is an accounting notice issued by an airline to a travel agent to claim an amount owed in connection with the issuance and use of standard traffic documents — for example incorrect fares, taxes, commission, fees, or fare rule violations. ADMs are processed through the BSP (typically via BSPlink) under IATA Passenger Agency Conference rules.","longDef":"The ADM is the recognized mechanism by which a BSP airline collects post-sale adjustments from an accredited agent for discrepancies on tickets and other accountable documents the agent issued. Common causes include underpaid fares or taxes, incorrect commission claims, fare rule or fare basis misuse, and ticketing errors. Under the IATA Passenger Agency Conference framework, an ADM must reference the document and reason, and the agent is generally given a dispute window (commonly 14–15 days in BSPlink) before the amount is debited through the BSP settlement; airlines are expected to respond to disputes within a defined period. The mirror-image credit document is the Agency Credit Memo (ACM), which an airline issues when it owes the agent.","standardBody":"IATA","term_ko":"ADM (Agency Debit Memo, 대리점 차변 통지서)","definition_ko":"ADM(Agency Debit Memo)은 항공사가 여행사(대리점)에게 표준 여행 서류의 발권·사용과 관련해 받아야 할 금액(잘못된 운임·세금·커미션·수수료, 운임 규정 위반 등)을 청구하기 위해 발행하는 회계 통지서이다. ADM은 IATA 여객대리점회의(Passenger Agency Conference) 규정에 따라 BSP(일반적으로 BSPlink)를 통해 처리된다.","longDef_ko":"ADM은 BSP 항공사가 대리점이 발행한 항공권 및 기타 정산 가능 서류상의 불일치에 대해 인가 대리점으로부터 사후 조정 금액을 징수하는 공인 수단이다. 흔한 사유로는 운임·세금 과소 징수, 잘못된 커미션 청구, 운임 규정·fare basis 오용, 발권 오류 등이 있다. IATA 여객대리점회의 체계상 ADM은 대상 서류와 사유를 명시해야 하며, BSP 정산을 통해 금액이 차감되기 전에 대리점에게 보통 BSPlink 기준 14~15일의 이의 제기 기간이 주어진다. 항공사는 정해진 기간 내에 이의에 응답해야 한다. 반대로 항공사가 대리점에 지급해야 할 때 발행하는 대칭 문서는 ACM(Agency Credit Memo, 대리점 대변 통지서)이다.","providerTerms":[],"relationships":[{"type":"related","targetTerm":"BSP","targetId":"bsp"},{"type":"related","targetTerm":"ARC","targetId":"arc"},{"type":"related","targetTerm":"Fare Basis Code","targetId":"fare-basis-code"},{"type":"related","targetTerm":"Reissue","targetId":"reissue"},{"type":"related","targetTerm":"Validating Carrier","targetId":"validating-carrier"}],"distinctions":[{"targetTerm":"Refund","explanation":"A refund returns value to a customer for an unused or partially used ticket; an ADM is a back-office claim from the airline against the agent for a billing discrepancy, settled through the BSP rather than to a passenger.","explanation_ko":"Refund는 미사용·부분 사용 항공권에 대해 고객에게 가치를 돌려주지만, ADM은 청구 불일치에 대해 항공사가 대리점을 상대로 제기하는 후선 업무 청구로, 승객이 아니라 BSP를 통해 정산된다.","targetId":"refund"}],"sources":[{"org":"IATA","name":"ADM Management & Reduction","version":"","section":"","url":"https://www.iata.org/whatwedo/airline-distribution/Pages/adm.aspx"},{"org":"IATA","name":"Passenger Agency Conference Resolutions Manual","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"10\" y=\"8\" width=\"28\" height=\"32\" rx=\"3\"/>\u003cline x1=\"16\" y1=\"16\" x2=\"32\" y2=\"16\"/>\u003cline x1=\"16\" y1=\"22\" x2=\"32\" y2=\"22\"/>\u003ccircle cx=\"24\" cy=\"31\" r=\"5\"/>\u003cline x1=\"21\" y1=\"31\" x2=\"27\" y2=\"31\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"agency-model","term":"Agency Model","abbreviation":"","aliases":["Retail Model","Pass-through Model"],"category":"pay","conceptType":"business-term","status":"active","definition":"The agency model is a travel distribution arrangement in which the intermediary (e.g. an OTA or travel agency) acts as an agent for the supplier: the supplier sets the price, is the Merchant of Record, and pays the agency a commission. The customer's payment is passed to or collected on behalf of the supplier, whose name appears on the card statement.","term_ko":"에이전시 모델","definition_ko":"에이전시 모델은 중개업체(예: OTA 또는 여행사)가 공급업체의 대리인 역할을 하는 여행 유통 방식이다. 공급업체가 가격을 책정하고 Merchant of Record가 되며 여행사에 수수료를 지급한다. 고객의 결제는 공급업체에 전달되거나 공급업체를 대신해 수납되며, 카드 명세서에는 공급업체의 명의가 표시된다.","longDef":"In the agency model the supplier owns the customer-facing price and the payment relationship, while the intermediary earns a commission or fee. This contrasts with the merchant model, where the intermediary buys at net rates, sets the retail price, and acts as Merchant of Record. The two models differ in who holds pricing control, payment liability, and chargeback risk.","longDef_ko":"에이전시 모델에서는 공급업체가 고객 대면 가격과 결제 관계를 소유하고, 중개업체는 수수료 또는 요금을 받는다. 이는 중개업체가 넷 요금(net rate)으로 매입하여 소매가를 책정하고 Merchant of Record 역할을 하는 머천트 모델과 대비된다. 두 모델은 가격 통제권, 결제 책임, 차지백 위험을 누가 보유하는지에서 차이가 있다.","standardBody":"","providerTerms":[],"relationships":[{"type":"contrasts","targetTerm":"Merchant Model","targetId":"merchant-model"},{"type":"related","targetTerm":"Merchant of Record","targetId":"merchant-of-record"},{"type":"related","targetTerm":"Commissionable Rate","targetId":"commissionable-rate"},{"type":"related","targetTerm":"OTA (Online Travel Agency)","targetId":"ota-online-travel-agency"}],"distinctions":[{"targetTerm":"Merchant Model","explanation":"Under the agency model the supplier sets the price and is Merchant of Record; under the merchant model the intermediary does.","explanation_ko":"에이전시 모델에서는 공급업체가 가격을 책정하고 Merchant of Record가 되며, 머천트 모델에서는 중개업체가 그 역할을 한다.","targetId":"merchant-model"},{"targetTerm":"Commissionable Rate","explanation":"Commissionable rates are the typical pricing basis for the agency model, where the agency earns commission rather than a markup.","explanation_ko":"커미셔너블 요금(commissionable rate)은 여행사가 마크업이 아닌 수수료를 받는 에이전시 모델의 전형적인 가격 기준이다.","targetId":"commissionable-rate"}],"sources":[{"name":"Agency Model in Travel: Payment Flows and Revenue Streams","org":"AltexSoft","version":"","section":"","url":"https://www.altexsoft.com/blog/agency-model/"},{"name":"Merchant model vs. agency model: A guide for business success","org":"WEX Inc.","version":"","section":"","url":"https://www.wexinc.com/resources/blog/merchant-vs-agency-model-travel-payments/"}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003ccircle cx=\"24\" cy=\"14\" r=\"6\"/>\u003cpath d=\"M14 40a10 10 0 0 1 20 0\"/>\u003cpath d=\"M8 22h6\"/>\u003cpath d=\"M34 22h6\"/>\u003cpath d=\"M11 19l-3 3 3 3\"/>\u003cpath d=\"M37 19l3 3-3 3\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"aggregator","term":"Aggregator","term_ko":"애그리게이터(콘텐츠 통합자)","abbreviation":"","aliases":["Content Aggregator","Inventory Aggregator","Travel Aggregator"],"category":"standards","conceptType":"business-term","status":"active","definition":"In travel distribution, an aggregator is an intermediary that consolidates inventory, rates, and content from many suppliers into a single normalized feed or API for resellers (such as OTAs and travel agencies). Examples include hotel bedbanks and NDC/content aggregation platforms.","definition_ko":"여행 유통에서 애그리게이터(aggregator)는 여러 공급사의 재고, 요금, 콘텐츠를 하나의 정규화된 피드나 API로 통합하여 재판매자(OTA, 여행사 등)에게 제공하는 중개자이다. 호텔 베드뱅크와 NDC/콘텐츠 통합 플랫폼 등이 그 예이다.","longDef":"Aggregators reduce integration overhead by giving sellers one connection to reach many suppliers, normalizing differing formats (EDIFACT, NDC, OpenTravel, proprietary APIs) into a unified interface. A hotel bedbank is a common aggregator type; NDC aggregators consolidate multiple airlines' NDC connections for travel sellers.","longDef_ko":"애그리게이터는 판매자에게 단일 연결로 여러 공급사에 도달할 수 있게 하여 연동 부담을 줄이며, 서로 다른 형식(EDIFACT, NDC, OpenTravel, 자체 API)을 하나의 통합 인터페이스로 정규화한다. 호텔 베드뱅크가 대표적인 애그리게이터 유형이며, NDC 애그리게이터는 여러 항공사의 NDC 연결을 여행 판매자를 위해 통합한다.","standardBody":"","providerTerms":[],"relationships":[{"type":"related","targetTerm":"GDS Bypass","targetId":"gds-bypass"},{"type":"related","targetTerm":"OTA (Online Travel Agency)","targetId":"ota-online-travel-agency"},{"type":"related","targetTerm":"Metasearch","targetId":"metasearch"},{"type":"related","targetTerm":"GDS","targetId":"gds"},{"type":"related","targetTerm":"Bedbank","targetId":"bedbank"},{"type":"related","targetTerm":"NDC","targetId":"ndc"}],"distinctions":[{"targetTerm":"Metasearch","explanation":"An aggregator pools supplier content into a feed/API for resellers (back-end); metasearch is a consumer-facing price-comparison and referral product.","explanation_ko":"애그리게이터는 공급사 콘텐츠를 모아 재판매자를 위한 피드/API로 제공하는 백엔드이고, 메타서치는 소비자 대상 가격 비교 및 연결 서비스이다.","targetId":"metasearch"},{"targetTerm":"GDS","explanation":"A GDS is a large, established global aggregation platform with ticketing/settlement; 'aggregator' is a broader term for any supplier-content consolidator, including bedbanks and NDC hubs.","explanation_ko":"GDS는 발권/정산 기능을 갖춘 대규모의 확립된 글로벌 통합 플랫폼이고, '애그리게이터'는 베드뱅크와 NDC 허브를 포함해 공급사 콘텐츠를 통합하는 모든 주체를 아우르는 더 넓은 용어이다.","targetId":"gds"},{"targetTerm":"Bedbank","explanation":"A bedbank is a specific hotel-inventory aggregator selling net rates wholesale; aggregator is the general category.","explanation_ko":"베드뱅크는 순요금(net rate)을 도매로 판매하는 특정 호텔 재고 애그리게이터이고, 애그리게이터는 그 상위의 일반 범주이다.","targetId":"bedbank"}],"sources":[{"name":"Travel content aggregation (industry definition)","org":"Phocuswright / industry usage","version":"","section":"","url":""}],"lastReviewed":"2026-06-15","icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003ccircle cx=\"10\" cy=\"10\" r=\"4\"/>\u003ccircle cx=\"10\" cy=\"24\" r=\"4\"/>\u003ccircle cx=\"10\" cy=\"38\" r=\"4\"/>\u003ccircle cx=\"38\" cy=\"24\" r=\"5\"/>\u003cpath d=\"M14 11l8 8M14 24h10M14 37l8-8\"/>\u003cpath d=\"M26 24l8 0\"/>\u003c/svg>"},{"id":"aircraft-type-code","term":"Aircraft Type Code","term_ko":"항공기 기종 코드(장비 코드)","abbreviation":"","aliases":["Equipment Code","Aircraft Type Designator","Equipment Type Code","IATA Aircraft Type Code","ICAO Aircraft Type Designator"],"category":"codes","conceptType":"code","status":"active","definition":"A short code identifying the type/variant of aircraft operating a flight. The IATA aircraft type designator is 3 characters and reflects commercial differences (e.g., 738 for Boeing 737-800, 388 for Airbus A380-800); the ICAO designator is up to 4 characters and reflects operational/performance differences (e.g., B738, A388).","definition_ko":"항공편을 운항하는 항공기의 기종/형식을 식별하는 짧은 코드. IATA 항공기 기종 지정 코드는 3자리로 상업적 차이를 반영하고(예: Boeing 737-800은 738, Airbus A380-800은 388), ICAO 지정 코드는 최대 4자리로 운항·성능상의 차이를 반영한다(예: B738, A388).","longDef":"IATA aircraft type designators are 3 characters and are used in schedules, displays, and reservation systems to distinguish types and variants that matter commercially (size, role, cabin configuration). ICAO type designators run up to 4 characters and are used for air traffic control and flight planning, distinguishing variants by performance. Because the two systems are built for different purposes, a single physical aircraft can map to one ICAO code but multiple IATA codes (or vice versa). Schedule data providers such as OAG carry both and may publish a recommended value.","longDef_ko":"IATA 항공기 기종 지정 코드는 3자리이며, 스케줄·표시 화면·예약 시스템에서 상업적으로 의미 있는(크기, 용도, 객실 구성) 기종 및 형식을 구분하는 데 쓰인다. ICAO 기종 지정 코드는 최대 4자리이며, 항공교통관제와 비행 계획에 사용되어 성능에 따라 형식을 구분한다. 두 체계가 서로 다른 목적으로 만들어졌기 때문에, 하나의 실제 항공기가 ICAO 코드는 하나이면서 IATA 코드는 여러 개에 대응(또는 그 반대)할 수 있다. OAG 같은 스케줄 데이터 제공사는 두 코드를 모두 보유하며 권장 값을 제공하기도 한다.","standardBody":"IATA","providerTerms":[{"provider":"OAG","term":"Equipment / Aircraft Type","context":"OAG schedule data carries IATA (3-char) and ICAO (4-char) equipment codes plus an OAG recommended type","context_ko":"OAG 스케줄 데이터는 IATA(3자리)·ICAO(4자리) 장비 코드와 OAG 권장 기종을 함께 제공한다","relationship":"related"}],"relationships":[{"type":"related","targetTerm":"IATA Code","targetId":"iata-code"},{"type":"related","targetTerm":"ICAO Code","targetId":"icao-code"},{"type":"related","targetTerm":"Flight Number","targetId":"flight-number"},{"type":"related","targetTerm":"Operating Carrier","targetId":"operating-carrier"}],"distinctions":[{"targetTerm":"ICAO Code","explanation":"The IATA aircraft type code is 3 characters for commercial/schedule use; the ICAO aircraft type designator is up to 4 characters for ATC and flight planning, reflecting performance rather than commercial differences.","explanation_ko":"IATA 항공기 기종 코드는 상업·스케줄 용도의 3자리이고, ICAO 항공기 기종 지정 코드는 ATC·비행 계획용의 최대 4자리로 상업적 차이가 아니라 성능 차이를 반영한다.","targetId":"icao-code"}],"sources":[{"org":"IATA","name":"Standard Schedules Information Manual (SSIM)","version":"","section":"","url":""},{"org":"OAG","name":"Master Data: Equipment Data Fields Explained","version":"","section":"","url":"https://knowledge.oag.com/docs/master-data-equipment-data-fields-explained"},{"org":"Wikipedia","name":"List of aircraft type designators","version":"","section":"","url":"https://en.wikipedia.org/wiki/List_of_aircraft_type_designators"}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M24 6c2.5 0 3.5 4 3.5 9v6l13 8v3l-13-4v7l4 3v2l-7.5-2L17 50v-2l4-3v-7l-13 4v-3l13-8v-6c0-5 1-9 3-9z\" transform=\"translate(0 -4)\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"airline-accounting-code","term":"Airline Accounting Code","term_ko":"항공사 정산 코드(3자리 숫자 코드)","abbreviation":"","aliases":["Airline Numeric Code","Three-Digit Airline Code","Airline Prefix Code","Ticketing Prefix","Airline Code Number"],"category":"codes","conceptType":"code","status":"active","definition":"A three-digit numeric code assigned by IATA to identify an airline in traffic documents and settlement. It forms the first three digits of the 13-digit airline ticket number (e.g., 001 = American Airlines, 006 = Delta, 014 = Air Canada).","definition_ko":"IATA가 항공사를 식별하기 위해 부여하는 3자리 숫자 코드로, 운송 서류와 정산에 사용된다. 13자리 항공권 번호의 앞 세 자리를 구성한다(예: 001 = American Airlines, 006 = Delta, 014 = Air Canada).","longDef":"The accounting code applies to passenger operations; a parallel three-digit prefix code applies to cargo. An airline that operates both may hold the same number for both, but each code is applied for separately. The code prefixes the ticket/document number used in BSP and ARC settlement, so it identifies the issuing/validating carrier for reporting, proration, and interline billing. Because it is purely numeric and three digits, it is distinct from the two-character IATA airline designator (e.g., AA) used in flight numbers and reservations.","longDef_ko":"정산 코드(accounting code)는 여객 운송에 적용되며, 화물에는 별도의 3자리 prefix code가 적용된다. 여객과 화물을 모두 운영하는 항공사는 두 용도에 같은 번호를 보유할 수 있으나, 각 코드는 별도로 신청해야 한다. 이 코드는 BSP·ARC 정산에 사용되는 항공권/서류 번호의 접두부를 이루므로, 보고·프로레이션(proration)·인터라인 정산에서 발권/검증 항공사를 식별한다. 순수하게 숫자 3자리이므로, 편명과 예약에 쓰이는 2자리 IATA 항공사 지정 코드(예: AA)와는 구별된다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Airline Designator","targetId":"airline-designator"},{"type":"related","targetTerm":"E-ticket","targetId":"e-ticket"},{"type":"related","targetTerm":"BSP","targetId":"bsp"},{"type":"related","targetTerm":"ARC","targetId":"arc"},{"type":"related","targetTerm":"Validating Carrier","targetId":"validating-carrier"}],"distinctions":[{"targetTerm":"Airline Designator","explanation":"The accounting code is a 3-digit numeric airline identifier used in ticket/document numbers and settlement; the airline designator is the 2-character alphanumeric code (e.g., AA) used in reservations and flight numbers.","explanation_ko":"정산 코드는 항공권/서류 번호와 정산에 쓰이는 3자리 숫자 항공사 식별자이고, 항공사 지정 코드는 예약과 편명에 쓰이는 2자리 영숫자 코드(예: AA)이다.","targetId":"airline-designator"}],"sources":[{"org":"IATA","name":"Airline Coding Directory","version":"","section":"","url":""},{"org":"AltexSoft","name":"IATA Numbers and Codes Explained","version":"","section":"","url":"https://www.altexsoft.com/blog/iata-numbers-codes/"}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"7\" y=\"16\" width=\"34\" height=\"16\" rx=\"3\"/>\u003cpath d=\"M14 22v4M14 22h2M14 26h2M14 24h2\"/>\u003cpath d=\"M22 22v4M26 22v4M22 22h4M22 24h4\"/>\u003cpath d=\"M31 22v4M35 22v4M31 22h4\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"airline-alliance","term":"Airline Alliance","term_ko":"항공 동맹(얼라이언스)","abbreviation":"","aliases":["Global Airline Alliance","Aviation Alliance"],"category":"air-partner","conceptType":"business-term","status":"active","definition":"A long-term commercial cooperation among multiple airlines that pools networks, frequent-flyer programs, lounges, and customer benefits under a common brand, typically built on a web of codeshare and interline agreements. The three major global passenger alliances are Star Alliance, Oneworld, and SkyTeam.","definition_ko":"여러 항공사가 공동 브랜드 아래 네트워크, 상용고객(frequent-flyer) 프로그램, 라운지, 고객 혜택을 통합하는 장기적 상업 협력으로, 일반적으로 공동운항(codeshare) 및 인터라인 협정의 망 위에 구축된다. 대표적인 3대 글로벌 여객 동맹은 Star Alliance, Oneworld, SkyTeam이다.","longDef":"An airline alliance coordinates schedules, reciprocal loyalty earning and redemption, tier-status recognition, shared lounges, and joint customer handling across member carriers, while each airline remains a legally and financially independent company. Alliances generally do not involve revenue or profit sharing on specific markets; that deeper integration is the role of a joint venture, which is often formed among a subset of alliance members on particular regions or routes. Alliance membership provides a broad framework of codeshare and interline relationships over which bilateral commercial deals are layered.","longDef_ko":"항공 동맹은 회원 항공사 전반에 걸쳐 스케줄 조정, 상호 마일리지 적립·사용, 등급(tier) 지위 인정, 라운지 공유, 공동 고객 응대를 조율하지만, 각 항공사는 법적·재무적으로 독립된 회사로 남는다. 동맹은 일반적으로 특정 시장에서의 수익이나 이익 공유를 수반하지 않으며, 그러한 더 깊은 통합은 조인트 벤처(joint venture)의 역할로, 흔히 동맹 회원 중 일부가 특정 지역이나 노선에서 형성한다. 동맹 가입은 양자 간 상업 거래가 얹히는 공동운항 및 인터라인 관계의 폭넓은 기반을 제공한다.","standardBody":"","providerTerms":[{"provider":"Star Alliance","term":"Star Alliance","context":"One of the three major global airline alliances, founded 1997.","context_ko":"1997년 설립된 3대 글로벌 항공 동맹 중 하나.","relationship":"narrower"},{"provider":"Oneworld","term":"Oneworld","context":"Global airline alliance founded 1999.","context_ko":"1999년 설립된 글로벌 항공 동맹.","relationship":"narrower"},{"provider":"SkyTeam","term":"SkyTeam","context":"Global airline alliance founded 2000.","context_ko":"2000년 설립된 글로벌 항공 동맹.","relationship":"narrower"}],"relationships":[{"type":"related","targetTerm":"Codeshare","targetId":"codeshare"},{"type":"related","targetTerm":"Interline","targetId":"interline"},{"type":"related","targetTerm":"Joint Venture","targetId":"joint-venture"},{"type":"related","targetTerm":"Frequent Flyer Program","targetId":"frequent-flyer-program"},{"type":"related","targetTerm":"SPA (Special Prorate Agreement)","targetId":"spa-special-prorate-agreement"}],"distinctions":[{"targetTerm":"Joint Venture","explanation":"An alliance is a broad multilateral cooperation without shared revenue on specific markets; a joint venture is a deeper, usually bilateral or small-group arrangement with revenue/profit sharing on defined routes, often requiring antitrust immunity.","explanation_ko":"동맹은 특정 시장에서 수익을 공유하지 않는 광범위한 다자간 협력이고, 조인트 벤처는 정해진 노선에서 수익/이익을 공유하는 더 깊은(보통 양자 또는 소수) 협정으로, 흔히 반독점 면제(antitrust immunity)를 요구한다.","targetId":"joint-venture"},{"targetTerm":"Codeshare","explanation":"Codeshare is a specific flight-level arrangement placing one carrier's code on another's flight; an alliance is the overarching partnership framework that typically encompasses many codeshares among members.","explanation_ko":"공동운항은 한 항공사의 코드를 다른 항공사의 항공편에 부여하는 항공편 단위의 구체적 협정이고, 동맹은 회원 간 다수의 공동운항을 포괄하는 상위의 협력 체계다.","targetId":"codeshare"}],"sources":[{"name":"The economic benefits generated by alliances and joint ventures (IATA Economics Briefing)","org":"IATA","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003ccircle cx=\"12\" cy=\"14\" r=\"5\"/>\u003ccircle cx=\"36\" cy=\"14\" r=\"5\"/>\u003ccircle cx=\"24\" cy=\"34\" r=\"5\"/>\u003cline x1=\"16\" y1=\"16\" x2=\"32\" y2=\"16\"/>\u003cline x1=\"14\" y1=\"18\" x2=\"21\" y2=\"31\"/>\u003cline x1=\"34\" y1=\"18\" x2=\"27\" y2=\"31\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"airline-designator","term":"Airline Designator","term_ko":"항공사 지정 코드","abbreviation":"","aliases":["Airline Code","Carrier Code","IATA Airline Designator","Two-Letter Airline Code","Marketing Carrier Code"],"category":"codes","conceptType":"code","status":"active","definition":"A code identifying an airline. The 2-character IATA airline designator (e.g., AA, BA, LH) is used in reservations, ticketing, and flight numbers, while the 3-letter ICAO airline designator (e.g., AAL, BAW, DLH) is used operationally and is paired with a radio call sign.","definition_ko":"항공사를 식별하는 코드. 2자리 IATA 항공사 지정 코드(예: AA, BA, LH)는 예약, 발권, 편명에 사용되고, 3자리 ICAO 항공사 지정 코드(예: AAL, BAW, DLH)는 운항에 사용되며 무선 호출 부호(콜사인)와 짝을 이룬다.","longDef":"IATA airline designators are two characters (alphabetic or alphanumeric) and form the prefix of a flight number (e.g., 'AA100'). Because the 2-character space is limited, IATA also issues controlled-duplicate and numeric/alpha-numeric designators. ICAO 3-letter designators are unique and accompanied by a telephony designator (call sign) for ATC. The marketing carrier designator on a ticket may differ from the operating carrier designator under codeshare arrangements.","longDef_ko":"IATA 항공사 지정 코드는 2자리(알파벳 또는 영숫자 혼합)이며 편명의 접두어를 이룬다(예: 'AA100'). 2자리 공간이 제한적이기 때문에 IATA는 통제된 중복(controlled-duplicate) 코드와 숫자/영숫자 혼합 코드도 발급한다. ICAO의 3자리 지정 코드는 고유하며 ATC를 위한 전화 호출 부호(콜사인)를 동반한다. 공동운항(codeshare) 약정에서는 항공권에 표시되는 마케팅 항공사 지정 코드가 실제 운항 항공사 지정 코드와 다를 수 있다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"narrower","targetTerm":"IATA Code","targetId":"iata-code"},{"type":"related","targetTerm":"ICAO Code","targetId":"icao-code"},{"type":"related","targetTerm":"Marketing Carrier","targetId":"marketing-carrier"},{"type":"related","targetTerm":"Operating Carrier","targetId":"operating-carrier"},{"type":"related","targetTerm":"Validating Carrier","targetId":"validating-carrier"}],"distinctions":[{"targetTerm":"ICAO Code","explanation":"The IATA airline designator is 2 characters for commercial use; the ICAO airline designator is 3 letters with a call sign for operational/ATC use.","explanation_ko":"IATA 항공사 지정 코드는 상업적 용도의 2자리이고, ICAO 항공사 지정 코드는 운항/ATC 용도의 3자리로 콜사인을 동반한다.","targetId":"icao-code"}],"sources":[{"name":"IATA Airline and Airport Code Search","org":"IATA","version":"","section":"","url":"https://www.iata.org/en/publications/directories/code-search/"},{"name":"Doc 8585 — Designators for Aircraft Operating Agencies, Aeronautical Authorities and Services","org":"ICAO","version":"","section":"","url":"https://www.icao.int/operational-safety/Designators-and-indicators"}],"lastReviewed":"2026-06-15","icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M10 14h22a6 6 0 0 1 0 12H10z\"/>\u003cpath d=\"M32 14l8-4M32 26l8 4\"/>\u003cpath d=\"M15 20h2M21 20h2\"/>\u003c/svg>"},{"id":"airline-retailing-maturity-arm","term":"Airline Retailing Maturity (ARM)","term_ko":"항공 리테일링 성숙도 지수(ARM index)","abbreviation":"ARM","aliases":["ARM index","Airline Retailing Maturity index","IATA ARM"],"category":"standards","conceptType":"metric","status":"active","definition":"The Airline Retailing Maturity (ARM) index is an IATA framework that measures how far airlines and their partners have progressed toward a world of 100% Offers and Orders. Introduced in 2021, it consolidates and replaces IATA's earlier NDC and ONE Order certification registries with a single maturity assessment.","definition_ko":"항공 리테일링 성숙도(Airline Retailing Maturity, ARM) 지수는 항공사와 그 파트너가 100% Offer 및 Order 세계로 얼마나 나아갔는지를 측정하는 IATA 프레임워크이다. 2021년 도입되었으며, 이전의 NDC 및 ONE Order 인증 등록제를 단일 성숙도 평가로 통합·대체한다.","longDef":"The ARM index is organized around pillars including Capabilities Verification (a registry of proven technical abilities to shop, order, pay, settle, account, and set up, expressed in business rather than technical language), Partnerships Deployment (how effectively airlines and sellers scale across the value chain), and the Value Capture Compass (an airline-only ~50-question self-assessment across eight value drivers). Airlines completing the assessment receive a numbered score out of 100 representing their retailing maturity and strategy, enabling benchmarking against peers.","longDef_ko":"ARM 지수는 Capabilities Verification(조회·주문·결제·정산·회계·셋업 능력을 기술 용어가 아닌 업무 언어로 표현한, 검증된 기술 역량 등록제), Partnerships Deployment(항공사와 판매자가 가치사슬 전반으로 얼마나 효과적으로 확장하는지), Value Capture Compass(항공사 전용으로 8개 가치 동인을 다루는 약 50문항 자가평가) 등의 기둥(pillar)으로 구성된다. 평가를 완료한 항공사는 리테일링 성숙도와 전략을 나타내는 100점 만점의 점수를 받아 동종 업계와 벤치마킹할 수 있다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"NDC","targetId":"ndc"},{"type":"related","targetTerm":"ONE Order","targetId":"one-order"},{"type":"related","targetTerm":"Offer","targetId":"offer"},{"type":"related","targetTerm":"Order","targetId":"order"}],"distinctions":[{"targetTerm":"NDC","explanation":"ARM is a maturity measurement and registry of an organization's retailing progress; NDC is the underlying XML distribution standard whose adoption ARM helps assess.","explanation_ko":"ARM은 조직의 리테일링 진척도를 측정하고 등록하는 성숙도 지표이고, NDC는 ARM이 그 채택 정도를 평가하는 데 쓰이는 기반 XML 유통 표준이다.","targetId":"ndc"},{"targetTerm":"ONE Order","explanation":"ARM is the assessment/registry framework (which replaced the separate NDC and ONE Order certification registries); ONE Order is one of the standards whose maturity ARM measures.","explanation_ko":"ARM은 (별도의 NDC·ONE Order 인증 등록제를 대체한) 평가·등록 프레임워크이고, ONE Order는 ARM이 성숙도를 측정하는 대상 표준 중 하나이다.","targetId":"one-order"}],"sources":[{"org":"IATA","name":"The Airline Retailing Maturity index (ARM index) Factsheet","version":"","section":"","url":""},{"org":"IATA","name":"Airline Retailing","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cline x1=\"8\" y1=\"40\" x2=\"40\" y2=\"40\"/>\u003crect x=\"10\" y=\"28\" width=\"7\" height=\"12\"/>\u003crect x=\"20\" y=\"20\" width=\"7\" height=\"20\"/>\u003crect x=\"30\" y=\"12\" width=\"7\" height=\"28\"/>\u003cpath d=\"M10 24l11-9 8 4 9-11\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"airport-code","term":"Airport Code","term_ko":"공항 코드","abbreviation":"","aliases":["Airport Identifier","IATA Airport Code","ICAO Airport Code","Aerodrome Code"],"category":"codes","conceptType":"code","status":"active","definition":"A short alphabetic code identifying an airport. The 3-letter IATA airport code (e.g., JFK, LHR) is used for tickets, baggage tags, and schedules, while the 4-letter ICAO location indicator (e.g., KJFK, EGLL) is used for operations and air traffic control.","definition_ko":"공항을 식별하는 짧은 알파벳 코드. 3자리 IATA 공항 코드(예: JFK, LHR)는 항공권, 수하물 태그, 스케줄에 사용되고, 4자리 ICAO 위치 지시자(예: KJFK, EGLL)는 운항 및 항공교통관제에 사용된다.","longDef":"IATA airport codes are 3 letters and are unique across the IATA system but are assigned for airports with commercial service. ICAO airport codes are 4 letters, regionally structured, and assigned to a much broader set of aerodromes. A single metropolitan area may have multiple airports with distinct airport codes that roll up to a shared city code (e.g., JFK, LGA, EWR under NYC).","longDef_ko":"IATA 공항 코드는 3자리로 IATA 체계 내에서 고유하지만, 상업 운항이 있는 공항에만 부여된다. ICAO 공항 코드는 4자리로 지역별로 구조화되어 있으며 훨씬 더 광범위한 비행장에 부여된다. 하나의 대도시권에 여러 공항이 있을 수 있으며, 각각 별개의 공항 코드를 가지면서 하나의 공통 도시 코드로 묶일 수 있다(예: JFK, LGA, EWR가 NYC로 묶임).","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"narrower","targetTerm":"IATA Code","targetId":"iata-code"},{"type":"related","targetTerm":"ICAO Code","targetId":"icao-code"},{"type":"related","targetTerm":"City Code","targetId":"city-code"},{"type":"related","targetTerm":"Origin & Destination","targetId":"origin-destination"}],"distinctions":[{"targetTerm":"City Code","explanation":"An airport code identifies a single airport, whereas a city code identifies a metropolitan area that may aggregate several airports.","explanation_ko":"공항 코드는 단일 공항을 식별하는 반면, 도시 코드는 여러 공항을 묶을 수 있는 대도시권을 식별한다.","targetId":"city-code"}],"sources":[{"name":"IATA Airline and Airport Code Search","org":"IATA","version":"","section":"","url":"https://www.iata.org/en/publications/directories/code-search/"},{"name":"Doc 7910 — Location Indicators","org":"ICAO","version":"","section":"","url":"https://store.icao.int/en/location-indicators-doc-7910"}],"lastReviewed":"2026-06-15","icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M20 30V12l4-4 4 4v18\"/>\u003cpath d=\"M22 8l-1-3M26 8l1-3\"/>\u003cpath d=\"M14 42l6-12h8l6 12z\"/>\u003cpath d=\"M20 36h8\"/>\u003c/svg>"},{"id":"allotment","term":"Allotment","term_ko":"객실 할당량(Allotment)","abbreviation":"","aliases":["Room Allocation","Inventory Allocation","Contracted Allotment"],"category":"hotel-rate","conceptType":"business-term","status":"active","definition":"A block of room inventory that a hotel pre-assigns to a specific distribution partner, channel, group, or contract for a defined period, allowing that partner to sell those rooms up to the allotted quantity without checking real-time availability for each booking. Unsold rooms are typically released back to the hotel by a contracted release (cut-off) date.","definition_ko":"호텔이 특정 유통 파트너, 채널, 단체, 계약에 일정 기간 동안 미리 배정하는 객실 재고 블록으로, 해당 파트너가 예약마다 실시간 가용 여부를 확인하지 않고도 할당된 수량까지 객실을 판매할 수 있게 한다. 판매되지 않은 객실은 보통 계약상 반환(cut-off) 일자에 호텔로 반환된다.","longDef":"Allotments are central to contracted distribution (tour operators, bedbanks, group blocks, corporate accounts). They are governed by terms such as the allotment size per date, the release period, and whether sales are on allotment, on request, or free sale. When a partner can sell beyond or without a fixed allotment subject to availability, the arrangement is often called free sale. Allotment management is handled in CRS/PMS and channel managers via ARI updates.","longDef_ko":"Allotment는 계약 기반 유통(투어 오퍼레이터, 베드뱅크, 단체 블록, 기업 계정)의 핵심이다. 날짜별 할당 규모, 반환 기간, 판매 방식이 allotment 기반인지 요청형(on request)인지 free sale인지 등의 조건으로 관리된다. 파트너가 고정 할당량을 초과하거나 고정 할당량 없이 가용 여부에 따라 판매할 수 있는 경우, 이를 흔히 free sale이라 부른다. Allotment 관리는 ARI 업데이트를 통해 CRS/PMS와 채널 매니저에서 처리된다.","standardBody":"","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Free Sale","targetId":"free-sale"},{"type":"related","targetTerm":"Bedbank","targetId":"bedbank"},{"type":"related","targetTerm":"ARI","targetId":"ari"},{"type":"related","targetTerm":"Room Type","targetId":"room-type"},{"type":"related","targetTerm":"Channel Manager","targetId":"channel-manager"}],"distinctions":[{"targetTerm":"Free Sale","explanation":"An allotment is a fixed pre-assigned block with a release date; free sale lets a partner sell without a fixed block, relying on real-time availability.","explanation_ko":"Allotment는 반환 일자가 있는 고정 사전 배정 블록이고, free sale은 고정 블록 없이 실시간 가용 여부에 의존해 파트너가 판매하도록 한다.","targetId":"free-sale"}],"sources":[{"name":"OpenTravel Specification (Hotel inventory and allocation messages)","org":"OpenTravel Alliance","version":"","section":"","url":""},{"name":"HTNG inventory distribution specifications","org":"HTNG","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"7\" y=\"8\" width=\"14\" height=\"14\" rx=\"2\"/>\u003crect x=\"27\" y=\"8\" width=\"14\" height=\"14\" rx=\"2\"/>\u003crect x=\"7\" y=\"28\" width=\"14\" height=\"14\" rx=\"2\"/>\u003crect x=\"27\" y=\"28\" width=\"14\" height=\"14\" rx=\"2\" fill=\"currentColor\" stroke=\"none\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"ancillary-service","term":"Ancillary Service","term_ko":"부가 서비스 (Ancillary Service)","abbreviation":"","aliases":["Ancillary","Ancillaries","Add-on Service","Optional Service"],"category":"air-ticket","conceptType":"business-term","status":"active","definition":"A chargeable product or service sold by an airline in addition to the base air transportation, such as paid checked baggage, advance seat selection, priority boarding, lounge access, or onboard amenities. Ancillary services are documented and settled via EMDs and described through ATPCO/NDC service definitions.","definition_ko":"기본 항공 운송에 더해 항공사가 판매하는 유료 상품 또는 서비스로, 유료 위탁 수하물, 사전 좌석 지정, 우선 탑승, 라운지 이용, 기내 편의 용품 등이 이에 해당한다. 부가 서비스는 EMD를 통해 증빙 및 정산되며 ATPCO/NDC 서비스 정의를 통해 기술된다.","longDef":"Ancillary services are commonly divided into a-la-carte items (purchasable optional services) and service fees (e.g., change or payment fees). They are filed and described in industry data via ATPCO Optional Services data and standardized service codes (including RFISC, the Reason For Issuance Sub Code), and increasingly merchandised through NDC offers. When sold, an ancillary is typically issued as an EMD-A (associated to a flight) or EMD-S (standalone). Ancillaries are a major and growing revenue stream for airlines and a core element of modern airline retailing.","longDef_ko":"부가 서비스는 일반적으로 알라카르트 항목(구매 가능한 선택 서비스)과 서비스 수수료(예: 변경 또는 지불 수수료)로 구분된다. 이들은 ATPCO Optional Services 데이터와 표준화된 서비스 코드(RFISC, 즉 Reason For Issuance Sub Code 포함)를 통해 업계 데이터에 등록 및 기술되며, 점점 더 NDC 오퍼를 통해 판매되고 있다. 판매될 때 부가 서비스는 일반적으로 EMD-A(항공편에 연결됨) 또는 EMD-S(독립형)로 발행된다. 부가 서비스는 항공사에게 주요하고 성장하는 수익원이며 현대 항공사 리테일링의 핵심 요소이다.","standardBody":"ATPCO","providerTerms":[],"relationships":[{"type":"related","targetTerm":"EMD","targetId":"emd"},{"type":"related","targetTerm":"NDC","targetId":"ndc"},{"type":"related","targetTerm":"Offer","targetId":"offer"},{"type":"related","targetTerm":"ATPCO","targetId":"atpco"},{"type":"related","targetTerm":"Fare Family","targetId":"fare-family"}],"distinctions":[{"targetTerm":"EMD","explanation":"Ancillary Service is the product offered/sold; the EMD is the document that issues and settles it.","explanation_ko":"Ancillary Service는 제공/판매되는 상품이며, EMD는 이를 발행하고 정산하는 서류이다.","targetId":"emd"},{"targetTerm":"Fare Family","explanation":"A fare family bundles fare attributes and included benefits into branded fares; ancillary services are the unbundled add-ons sold separately.","explanation_ko":"Fare Family는 운임 속성과 포함 혜택을 브랜드 운임으로 묶은 것이며, 부가 서비스는 별도로 판매되는 언번들된 추가 상품이다.","targetId":"fare-family"}],"sources":[{"name":"ATPCO Optional Services data","org":"ATPCO","version":"","section":"","url":""},{"name":"New Distribution Capability (NDC)","org":"IATA","version":"","section":"","url":""}],"lastReviewed":"2026-06-15","icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M24 8l3 12 12 3-12 3-3 12-3-12-12-3 12-3z\"/>\u003cpath d=\"M11 10v4M9 12h4\"/>\u003cpath d=\"M38 34v4M36 36h4\"/>\u003c/svg>"},{"id":"arc","term":"ARC","abbreviation":"ARC","aliases":["Airlines Reporting Corporation","Airline Reporting Corporation"],"category":"pay","conceptType":"provider-term","status":"active","definition":"The Airlines Reporting Corporation is a US-based entity, owned by major airlines, that accredits travel agencies and processes the reporting and settlement of air ticket and ancillary sales between US travel agencies and participating airlines. It performs the same agent-airline settlement role in the United States that IATA's BSP performs in most other markets.","term_ko":"항공사 보고 기관(ARC)","definition_ko":"ARC(Airlines Reporting Corporation)는 주요 항공사들이 소유한 미국 기반 기관으로, 여행사를 인증하고 미국 여행사와 참여 항공사 간의 항공권 및 부가서비스 판매 보고와 정산을 처리한다. 그 외 대부분의 시장에서 IATA의 BSP가 수행하는 여행사-항공사 정산 역할을 미국에서 동일하게 수행한다.","longDef":"ARC publishes the Industry Agents' Handbook (IAH) that governs US agency accreditation and operates the Interactive Agent Reporting (IAR) system, through which US agencies report sales and ARC nets and settles funds to carriers. ARC processes well over one hundred billion US dollars in US-based agency air sales annually and also provides settlement and data products to the travel industry.","longDef_ko":"ARC는 미국 여행사 인증을 규율하는 Industry Agents' Handbook(IAH)을 발행하며, 미국 여행사가 판매를 보고하고 ARC가 항공사에 자금을 차감 정산하는 Interactive Agent Reporting(IAR) 시스템을 운영한다. ARC는 연간 미국 기반 여행사 항공 판매로 1,000억 달러를 훨씬 넘는 금액을 처리하며, 여행 업계에 정산 및 데이터 제품도 제공한다.","standardBody":"","providerTerms":[],"relationships":[{"type":"contrasts","targetTerm":"BSP","targetId":"bsp"},{"type":"related","targetTerm":"E-ticket","targetId":"e-ticket"},{"type":"related","targetTerm":"Validating Carrier","targetId":"validating-carrier"},{"type":"related","targetTerm":"Pseudo City Code","targetId":"pseudo-city-code"}],"distinctions":[{"targetTerm":"BSP","explanation":"ARC is the US agent-airline settlement system; BSP is IATA's equivalent for most non-US markets.","explanation_ko":"ARC는 미국의 여행사-항공사 정산 시스템이며, BSP는 미국 외 대부분의 시장을 위한 IATA의 등가 시스템이다.","targetId":"bsp"},{"targetTerm":"IATA Clearing House","explanation":"ARC settles US agent-to-airline sales; the IATA Clearing House settles interline (airline-to-airline) accounts.","explanation_ko":"ARC는 미국 여행사-항공사 간 판매를 정산하고, IATA Clearing House는 인터라인(항공사 간) 계정을 정산한다.","targetId":"iata-clearing-house"}],"sources":[{"name":"Airlines Reporting Corporation","org":"ARC","version":"","section":"","url":"https://www2.arccorp.com/"},{"name":"Interactive Agent Reporting (IAR)","org":"ARC","version":"","section":"","url":"https://www2.arccorp.com/products-participation/travel-agencies/agency-participation/participation-products/interactive-agent-reporting-iar"}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M12 6h17l7 7v29H12z\"/>\u003cpath d=\"M28 6v8h8\"/>\u003cpath d=\"M17 24a7 7 0 0 1 14 0\"/>\u003cline x1=\"17\" y1=\"33\" x2=\"31\" y2=\"33\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"ari","term":"ARI","term_ko":"가용성·요금·인벤토리(ARI)","abbreviation":"ARI","aliases":["Availability, Rates and Inventory","Availability Rates Inventory"],"category":"hotel-dist","conceptType":"acronym","status":"active","definition":"ARI stands for Availability, Rates, and Inventory — the core set of data a hotel distributes to sales channels: which dates/room types are available, at what prices, and how many units remain. Keeping ARI synchronized and accurate across channels is the central function of hotel distribution.","definition_ko":"ARI는 Availability(가용성), Rates(요금), Inventory(인벤토리)의 약어로, 호텔이 판매 채널에 분배하는 핵심 데이터 묶음을 가리킨다. 즉 어떤 날짜/객실 유형이 판매 가능한지, 어떤 가격인지, 몇 개의 객실이 남아 있는지를 의미한다. ARI를 채널 전반에 걸쳐 동기화하고 정확하게 유지하는 것이 호텔 분배의 핵심 기능이다.","longDef":"ARI is the data payload exchanged between a hotel's inventory source (CRS/PMS) and its channels via a Channel Manager. It is commonly transmitted using standardized messages that update availability counts, rate values, and restrictions such as length-of-stay or stop-sell. Inconsistent ARI leads to overbooking or rate parity breaches.","longDef_ko":"ARI는 호텔의 인벤토리 소스(CRS/PMS)와 채널 사이에 채널 매니저를 통해 교환되는 데이터 페이로드다. 일반적으로 가용성 수량, 요금 값, 그리고 최소 숙박일수(length-of-stay)나 판매 중지(stop-sell) 같은 제약 조건을 갱신하는 표준화된 메시지로 전송된다. ARI가 일관되지 않으면 오버부킹이나 요금 패리티 위반으로 이어진다.","standardBody":"OpenTravel","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Channel Manager","targetId":"channel-manager"},{"type":"related","targetTerm":"CRS","targetId":"crs"},{"type":"related","targetTerm":"Availability","targetId":"availability"},{"type":"related","targetTerm":"Rate Plan","targetId":"rate-plan"},{"type":"related","targetTerm":"Allotment","targetId":"allotment"},{"type":"related","targetTerm":"Rate Parity","targetId":"rate-parity"},{"type":"related","targetTerm":"Length of Stay","targetId":"length-of-stay"}],"distinctions":[{"targetTerm":"Channel Manager","explanation":"ARI is the availability/rate/inventory data; the Channel Manager is the system that distributes and synchronizes that data.","explanation_ko":"ARI는 가용성/요금/인벤토리 데이터이고, 채널 매니저는 그 데이터를 분배하고 동기화하는 시스템이다.","targetId":"channel-manager"},{"targetTerm":"Availability","explanation":"Availability is just the 'A' (whether a room can be sold for given dates); ARI bundles availability together with rates and inventory counts.","explanation_ko":"Availability(가용성)는 ARI 중 'A'(특정 날짜에 객실을 판매할 수 있는지 여부)만을 가리키며, ARI는 가용성을 요금 및 인벤토리 수량과 함께 묶은 개념이다.","targetId":"availability"}],"sources":[{"name":"OpenTravel Specification","org":"OpenTravel Alliance","version":"","section":"","url":""},{"name":"HTNG interface specifications","org":"HTNG","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"6\" y=\"9\" width=\"28\" height=\"28\" rx=\"2\"/>\u003cpath d=\"M6 17h28M14 9V5M26 9V5\"/>\u003cpath d=\"M12 23h2M19 23h2M12 30h2\"/>\u003ccircle cx=\"36\" cy=\"32\" r=\"8\"/>\u003cpath d=\"M33 32l2 2 4-4\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"arnk","term":"ARNK","abbreviation":"ARNK","aliases":["Arrival Unknown","Arunk","Surface Segment","Off-Point Segment"],"category":"air-ops","conceptType":"business-term","status":"active","definition":"ARNK ('Arrival Unknown') is a non-air itinerary element inserted into a PNR to indicate a surface (non-flown) break between the arrival point of one flight segment and the departure point of the next. It tells the system the gap is intentional rather than an error and is not a bookable flight.","definition_ko":"ARNK('Arrival Unknown', 도착지 미상)는 한 항공 segment의 도착 지점과 다음 segment의 출발 지점 사이의 지상(비운항) 단절을 나타내기 위해 PNR에 삽입되는 비항공 여정 요소다. 해당 공백이 오류가 아니라 의도된 것이며 예약 가능한 항공편이 아님을 시스템에 알린다.","term_ko":"지상 구간 표시(ARNK, 도착지 미상)","longDef":"An ARNK element is added when a passenger flies into one city and departs from a different city (an open-jaw or surface sector), bridging the gap so the itinerary remains continuous for ticketing and fare construction. It carries no flight, holds no inventory, and is non-revenue; many GDSs warn or require an ARNK when off-points do not match so the agent confirms the surface segment is deliberate.","longDef_ko":"ARNK 요소는 승객이 한 도시로 입국하여 다른 도시에서 출발할 때(오픈조 또는 지상 구간) 추가되며, 그 공백을 연결하여 발권 및 운임 구성을 위해 여정이 연속성을 유지하도록 한다. 항공편을 포함하지 않고, 재고를 점유하지 않으며, 수익이 발생하지 않는다. 많은 GDS는 하기지가 일치하지 않을 때 ARNK를 경고하거나 요구하여, 에이전트가 해당 지상 구간이 의도된 것임을 확인하도록 한다.","standardBody":"","providerTerms":[{"provider":"Sabre","term":"ARNK","context":"Sabre inserts an ARNK segment to mark a surface break in the itinerary","context_ko":"Sabre는 여정의 지상 구간 단절을 표시하기 위해 ARNK segment를 삽입한다","relationship":"same"},{"provider":"Amadeus","term":"ARNK","context":"Amadeus uses ARNK to denote an arrival-unknown surface sector","context_ko":"Amadeus는 도착지 미상 지상 구간을 나타내기 위해 ARNK를 사용한다","relationship":"same"}],"relationships":[{"type":"related","targetTerm":"Segment","targetId":"segment"},{"type":"related","targetTerm":"Passive Segment","targetId":"passive-segment"},{"type":"related","targetTerm":"Journey","targetId":"journey"},{"type":"related","targetTerm":"Origin & Destination","targetId":"origin-destination"}],"distinctions":[{"targetTerm":"Passive Segment","explanation":"ARNK marks a surface (non-flown) gap with no flight at all, whereas a passive segment is an informational air segment for a flight confirmed outside the active inventory.","explanation_ko":"ARNK는 항공편이 전혀 없는 지상(비운항) 공백을 표시하는 반면, passive segment는 능동 재고 외부에서 확약된 항공편에 대한 정보성 항공 segment다.","targetId":"passive-segment"},{"targetTerm":"Leg","explanation":"ARNK is a non-flown placeholder bridging a surface break, while a leg is an actual physical flown hop of an aircraft.","explanation_ko":"ARNK는 지상 구간 단절을 연결하는 비운항 자리표시자인 반면, leg은 항공기의 실제 물리적 운항 구간이다.","targetId":"leg"}],"sources":[{"name":"Sabre Format Finder — ARNK","org":"Sabre","version":"","section":"","url":""},{"name":"Amadeus Functional Documentation — Itinerary Elements","org":"Amadeus","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003ccircle cx=\"8\" cy=\"24\" r=\"3\"/>\u003ccircle cx=\"40\" cy=\"24\" r=\"3\"/>\u003cline x1=\"13\" y1=\"24\" x2=\"19\" y2=\"24\"/>\u003cline x1=\"29\" y1=\"24\" x2=\"35\" y2=\"24\"/>\u003cpath d=\"M21 19 L27 29 M27 19 L21 29\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"atpco","term":"ATPCO","term_ko":"ATPCO (항공 운임 공시 회사)","abbreviation":"ATPCO","aliases":["Airline Tariff Publishing Company","ATPCO Inc."],"category":"air-shop","conceptType":"provider-term","status":"active","definition":"ATPCO (Airline Tariff Publishing Company) is the airline-owned organization that collects, processes, and distributes the world's airfares, fare rules, and related pricing data to airlines, GDSs, and other industry systems. Its data underpins automated pricing and fare display across most distribution channels.","definition_ko":"ATPCO(Airline Tariff Publishing Company, 항공 운임 공시 회사)는 전 세계 항공 운임, 운임 규정 및 관련 가격 데이터를 수집·처리·배포하여 항공사, GDS 및 기타 산업 시스템에 제공하는 항공사 소유 기관이다. ATPCO의 데이터는 대부분의 유통 채널에서 자동 운임 산정과 운임 표시의 기반이 된다.","longDef":"ATPCO publishes filed fares, fare rules (categories such as advance purchase, minimum stay, penalties), routings, footnotes, and products like Branded Fares and Optional Services that drive ancillary pricing. Carriers file their fares and rules with ATPCO, which standardizes and distributes the data multiple times per day so that pricing engines in GDSs and airline systems can compute consistent fares. ATPCO data is the reference source for fare basis codes, fare components, and rule application in traditional (EDIFACT/GDS) pricing.","longDef_ko":"ATPCO는 신고된 운임, 운임 규정(사전 구매, 최소 체류 기간, 위약금 등의 카테고리), 라우팅, 각주(footnote), 그리고 부가 서비스 가격 산정을 구동하는 Branded Fares 및 Optional Services와 같은 상품을 공시한다. 항공사는 운임과 규정을 ATPCO에 신고하고, ATPCO는 이 데이터를 표준화하여 하루에 여러 차례 배포함으로써 GDS와 항공사 시스템의 가격 산정 엔진이 일관된 운임을 산출할 수 있게 한다. ATPCO 데이터는 전통적인(EDIFACT/GDS) 가격 산정에서 운임 기준 코드, 운임 컴포넌트 및 규정 적용의 기준 출처이다.","standardBody":"ATPCO","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Fare Basis Code","targetId":"fare-basis-code"},{"type":"related","targetTerm":"Fare Family","targetId":"fare-family"},{"type":"related","targetTerm":"Fare Component","targetId":"fare-component"},{"type":"related","targetTerm":"GDS","targetId":"gds"},{"type":"related","targetTerm":"NDC","targetId":"ndc"}],"distinctions":[{"targetTerm":"GDS","explanation":"ATPCO supplies and processes fare/rule data; a GDS distributes inventory and bookings and consumes ATPCO data for pricing.","explanation_ko":"ATPCO는 운임/규정 데이터를 공급하고 처리하며, GDS는 재고와 예약을 유통하고 가격 산정을 위해 ATPCO 데이터를 소비한다.","targetId":"gds"},{"targetTerm":"Fare Basis Code","explanation":"ATPCO is the organization/data source; the fare basis code is one data element it distributes.","explanation_ko":"ATPCO는 기관이자 데이터 출처이고, 운임 기준 코드는 ATPCO가 배포하는 하나의 데이터 요소이다.","targetId":"fare-basis-code"}],"sources":[{"name":"ATPCO corporate and product documentation","org":"ATPCO","version":"","section":"","url":"https://www.atpco.net/"}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-wi
