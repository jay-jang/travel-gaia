t operates itself, while presenting a seamless single-carrier appearance to the customer. Common models include free-flow/free-sale (the marketing carrier sells from the operating carrier's inventory in real time), block-space (the marketing carrier purchases a fixed block of seats), and capacity-purchase arrangements. Regulators commonly require disclosure to the passenger of the actual operating carrier at the time of sale.","longDef_ko":"공동운항 협정을 통해 항공사는 자사가 직접 운항하지 않는 노선까지 네트워크를 확장하고 연결편을 제공하면서도, 고객에게는 단일 항공사를 이용하는 듯한 매끄러운 경험을 제공할 수 있다. 대표적인 형태로는 free-flow/free-sale(판매 항공사가 운항 항공사의 좌석 재고에서 실시간으로 판매), block-space(판매 항공사가 고정된 좌석 블록을 매입), capacity-purchase 협정 등이 있다. 규제 당국은 일반적으로 판매 시점에 실제 운항 항공사를 승객에게 고지하도록 요구한다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Marketing Carrier","targetId":"marketing-carrier"},{"type":"related","targetTerm":"Operating Carrier","targetId":"operating-carrier"},{"type":"related","targetTerm":"Interline","targetId":"interline"},{"type":"related","targetTerm":"Airline Designator","targetId":"airline-designator"},{"type":"related","targetTerm":"Validating Carrier","targetId":"validating-carrier"}],"distinctions":[{"targetTerm":"Interline","explanation":"Codeshare puts the marketing carrier's own code on another carrier's flight; interline is acceptance of another carrier's ticket without the marketing carrier's code on the flight.","explanation_ko":"공동운항은 판매 항공사의 코드를 다른 항공사의 항공편에 부여하는 것이고, 인터라인은 해당 항공편에 판매 항공사의 코드를 붙이지 않은 채 다른 항공사의 항공권을 인수하는 것이다.","targetId":"interline"},{"targetTerm":"Operating Carrier","explanation":"Codeshare is the agreement/arrangement, while the operating carrier is the airline actually flying the aircraft.","explanation_ko":"공동운항은 협정 또는 협약을 가리키는 반면, 운항 항공사는 실제로 항공기를 운항하는 항공사를 가리킨다.","targetId":"operating-carrier"}],"sources":[{"name":"Standard Schedules Information Manual (SSIM)","org":"IATA","version":"","section":"","url":""},{"name":"DOT rules on disclosure of code-share arrangements","org":"U.S. Department of Transportation","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"commissionable-rate","term":"Commissionable Rate","term_ko":"커미션 요금(commissionable rate)","abbreviation":"","aliases":["Retail Rate (commissionable)","Gross Rate"],"category":"hotel-dist","conceptType":"business-term","status":"active","definition":"A commissionable rate is a published room rate on which the hotel pays the booking travel agent or distributor a commission (a percentage of the room revenue) for the sale. The guest is typically charged the hotel's rate and the agent is paid commission afterward, characteristic of the agency distribution model.","definition_ko":"커미션 요금은 호텔이 판매에 대해 예약을 발생시킨 여행사나 분배자에게 커미션(객실 매출의 일정 비율)을 지급하는 공시 객실 요금이다. 일반적으로 고객은 호텔 요금을 청구받고 대리점은 이후에 커미션을 지급받으며, 이는 에이전시 분배 모델의 특징이다.","longDef":"Under the commissionable/agency model, the traveler pays the hotel (often at check-out) and the agent earns a contracted commission (a percentage of room revenue, which varies by agreement). This contrasts with the merchant/net-rate model where the intermediary marks up a net rate and there is no separate commission. GDS bookings are a classic channel for commissionable rates.","longDef_ko":"커미션/에이전시 모델에서는 여행자가 (흔히 체크아웃 시) 호텔에 지불하고, 대리점은 계약된 커미션(객실 매출의 일정 비율로, 계약에 따라 다름)을 받는다. 이는 중개자가 순 요금에 마크업을 붙이고 별도의 커미션이 없는 머천트/순 요금 모델과 대비된다. GDS 예약은 커미션 요금의 대표적인 채널이다.","standardBody":"","providerTerms":[],"relationships":[{"type":"contrasts","targetTerm":"Net Rate","targetId":"net-rate"},{"type":"related","targetTerm":"Agency Model","targetId":"agency-model"},{"type":"related","targetTerm":"GDS","targetId":"gds"},{"type":"related","targetTerm":"Rate Plan","targetId":"rate-plan"},{"type":"related","targetTerm":"BAR","targetId":"bar"}],"distinctions":[{"targetTerm":"Net Rate","explanation":"A commissionable rate pays the seller a commission on the published price; a net rate is wholesale and non-commissionable with margin from markup.","explanation_ko":"커미션 요금은 판매자에게 공시 가격에 대한 커미션을 지급하고, 순 요금은 도매·비커미션 요금으로 마진이 마크업에서 발생한다.","targetId":"net-rate"},{"targetTerm":"Agency Model","explanation":"Commissionable rate is the priced product; the agency model is the broader settlement model in which the hotel collects from the guest and pays commission.","explanation_ko":"커미션 요금은 가격이 책정된 상품이고, 에이전시 모델은 호텔이 고객으로부터 대금을 수취하고 커미션을 지급하는 더 넓은 정산 모델이다.","targetId":"agency-model"}],"sources":[{"name":"Hotel distribution rate model industry references","org":"","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"crs","term":"CRS","term_ko":"중앙 예약 시스템(CRS)","abbreviation":"CRS","aliases":["Central Reservation System","Central Reservations System","Hotel CRS"],"category":"hotel-dist","conceptType":"acronym","status":"active","definition":"A Central Reservation System is the hotel-side system that stores and distributes room inventory, rates, and availability across multiple channels and that captures and manages reservations centrally. It acts as the single source of truth for sellable inventory and rate plans pushed out to the brand website, GDS, OTAs, and other channels.","definition_ko":"중앙 예약 시스템(CRS)은 객실 인벤토리, 요금, 가용성을 여러 채널에 걸쳐 저장·분배하고 예약을 중앙에서 수집·관리하는 호텔 측 시스템이다. 브랜드 웹사이트, GDS, OTA 및 기타 채널로 송출되는 판매 가능 인벤토리와 요금제의 단일 진실 공급원(single source of truth) 역할을 한다.","longDef":"A hotel CRS centralizes ARI (availability, rates, inventory) for one or many properties and connects upstream to demand channels (brand.com booking engine, GDS, OTAs, metasearch) and downstream to property systems. It differs from a PMS, which runs the on-property operations; bookings typically flow CRS -> PMS for fulfillment. Distribution to many online channels is often handled together with or via a Channel Manager.","longDef_ko":"호텔 CRS는 하나 또는 여러 객실의 ARI(가용성, 요금, 인벤토리)를 중앙화하며, 상류로는 수요 채널(브랜드 닷컴 예약 엔진, GDS, OTA, 메타서치)과, 하류로는 자산 운영 시스템과 연결된다. 이는 현장 운영을 담당하는 PMS와 구별되며, 예약은 일반적으로 CRS에서 PMS로 흘러 이행(fulfillment)된다. 다수의 온라인 채널로의 분배는 흔히 채널 매니저(Channel Manager)와 함께 또는 이를 통해 처리된다.","standardBody":"","providerTerms":[],"relationships":[{"type":"related","targetTerm":"PMS","targetId":"pms"},{"type":"related","targetTerm":"Channel Manager","targetId":"channel-manager"},{"type":"related","targetTerm":"ARI","targetId":"ari"},{"type":"related","targetTerm":"GDS","targetId":"gds"},{"type":"related","targetTerm":"Rate Plan","targetId":"rate-plan"},{"type":"related","targetTerm":"Allotment","targetId":"allotment"}],"distinctions":[{"targetTerm":"PMS","explanation":"CRS manages distribution and central reservations; PMS manages on-property operations like check-in, folios, and housekeeping.","explanation_ko":"CRS는 분배와 중앙 예약을 관리하고, PMS는 체크인, 폴리오(folio), 하우스키핑 같은 현장 운영을 관리한다.","targetId":"pms"},{"targetTerm":"Channel Manager","explanation":"CRS is the central inventory/reservation hub; a Channel Manager is the connectivity layer that syncs ARI to many online channels (sometimes a CRS feature, sometimes a separate product).","explanation_ko":"CRS는 중앙 인벤토리/예약 허브이고, 채널 매니저는 ARI를 다수의 온라인 채널로 동기화하는 연결 계층이다(CRS의 기능일 때도 있고 별도 제품일 때도 있다).","targetId":"channel-manager"}],"sources":[{"name":"HTNG interface specifications","org":"HTNG","version":"","section":"","url":""},{"name":"OpenTravel Specification","org":"OpenTravel Alliance","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"customer-profile","term":"Customer Profile","term_ko":"고객 프로필","abbreviation":"","aliases":["Traveler Profile","Passenger Profile","Guest Profile","Profile"],"category":"customer","conceptType":"business-term","status":"active","definition":"A stored, reusable record of a traveler's identity data, contact details, documents, preferences and loyalty memberships maintained in a reservation, CRM or property management system. Profiles speed up booking and check-in by pre-populating data into a PNR or hotel reservation.","definition_ko":"예약, CRM 또는 PMS에 보관되는, 여행자의 신원 정보, 연락처, 서류, 선호도, 로열티 회원 정보를 담은 저장형 재사용 레코드이다. 프로필은 데이터를 PNR이나 호텔 예약에 미리 채워 넣어 예약과 체크인 속도를 높여 준다.","longDef":"Customer Profiles aggregate attributes such as name, date of birth, contact information, travel document and APIS/Secure Flight data, seat and meal preferences, frequent flyer numbers, payment instruments and corporate/agency associations. In airline systems they may be personal or corporate profiles; in hotels the equivalent is a guest profile in the PMS/CRS. Profiles are subject to data-protection obligations such as GDPR Consent and are increasingly linked to a verified digital identity (IATA One ID).","longDef_ko":"Customer Profile은 이름, 생년월일, 연락처, 여행 서류 및 APIS/Secure Flight 데이터, 좌석 및 기내식 선호도, 상용 고객 번호, 결제 수단, 법인/대행사 연계 정보 같은 속성을 통합한다. 항공사 시스템에서는 개인 프로필 또는 법인 프로필일 수 있으며, 호텔에서는 PMS/CRS의 게스트 프로필이 이에 해당한다. 프로필은 GDPR Consent 같은 데이터 보호 의무의 적용을 받으며, 점차 검증된 디지털 신원(IATA One ID)에 연결되고 있다.","standardBody":"","providerTerms":[],"relationships":[{"type":"related","targetTerm":"PNR","targetId":"pnr"},{"type":"related","targetTerm":"Frequent Flyer Number","targetId":"frequent-flyer-number"},{"type":"related","targetTerm":"GDPR Consent","targetId":"gdpr-consent"},{"type":"related","targetTerm":"IATA One ID","targetId":"iata-one-id"},{"type":"related","targetTerm":"PMS","targetId":"pms"}],"distinctions":[{"targetTerm":"PNR","explanation":"A Customer Profile is persistent traveler master data; a PNR is a single trip's reservation record that may be populated from a profile.","explanation_ko":"Customer Profile은 지속적으로 유지되는 여행자 마스터 데이터이고, PNR은 프로필로부터 채워질 수 있는 단일 여정의 예약 레코드이다.","targetId":"pnr"},{"targetTerm":"IATA One ID","explanation":"A Customer Profile is stored, self-asserted account data; One ID is a verified biometric digital identity used for authentication.","explanation_ko":"Customer Profile은 본인이 입력해 저장한 계정 데이터이고, One ID는 인증에 사용되는 검증된 생체 디지털 신원이다.","targetId":"iata-one-id"}],"sources":[{"name":"OpenTravel Specification (Profile messages)","org":"OpenTravel Alliance","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"e-ticket","term":"E-ticket","term_ko":"전자항공권 (E-ticket)","abbreviation":"ET","aliases":["Electronic Ticket","ETKT","Electronic Ticketing"],"category":"air-ticket","conceptType":"document","status":"active","definition":"An electronic record of a passenger's transportation entitlement held in the issuing/validating carrier's (or BSP) database, identified by a 13-digit ticket number, that replaces the traditional paper ticket. IATA mandated 100% electronic ticketing for BSP-issued air transport documents from 1 June 2008.","definition_ko":"발권/Validating Carrier(또는 BSP)의 데이터베이스에 보관되는 승객의 운송 권리에 대한 전자 기록으로, 13자리 항공권 번호로 식별되며 기존의 종이 항공권을 대체한다. IATA는 2008년 6월 1일부터 BSP 발권 항공운송 서류에 대해 100% 전자 발권을 의무화했다.","longDef":"An e-ticket comprises ticket-level data (passenger name, fare calculation, form of payment, endorsements/restrictions) plus one or more flight coupons, each tied to a flight segment with its own coupon status (e.g., OPEN FOR USE, AIRPORT CONTROL/CHECKED IN, FLOWN/USED, REFUNDED, VOID, EXCHANGED). The 13-digit number consists of a 3-digit airline accounting code (e.g., 006 for Delta), a form/serial portion, and a check digit. The e-ticket is the standard document for carriage of passengers; EMDs are the analogous electronic document for ancillary and non-flight charges.","longDef_ko":"전자항공권은 항공권 단위 데이터(승객명, 운임 계산, 지불 수단, 배서/제한 사항)와 하나 이상의 Flight Coupon으로 구성되며, 각 쿠폰은 특정 비행 구간에 연결되어 고유한 쿠폰 상태(예: OPEN FOR USE, AIRPORT CONTROL/CHECKED IN, FLOWN/USED, REFUNDED, VOID, EXCHANGED)를 가진다. 13자리 번호는 3자리 항공사 회계 코드(예: 델타항공의 경우 006), 폼/일련번호 부분, 그리고 체크 디지트로 구성된다. 전자항공권은 승객 운송을 위한 표준 서류이며, EMD는 부가 서비스 및 비항공 요금에 대응하는 전자 서류이다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"parent","targetTerm":"Flight Coupon","targetId":"flight-coupon"},{"type":"related","targetTerm":"EMD","targetId":"emd"},{"type":"related","targetTerm":"Validating Carrier","targetId":"validating-carrier"},{"type":"related","targetTerm":"BSP","targetId":"bsp"},{"type":"related","targetTerm":"PNR","targetId":"pnr"}],"distinctions":[{"targetTerm":"EMD","explanation":"E-ticket documents flight transportation; EMD documents ancillary services, fees, and non-air charges.","explanation_ko":"전자항공권은 항공 운송을 증빙하고, EMD는 부가 서비스, 수수료 및 비항공 요금을 증빙한다.","targetId":"emd"},{"targetTerm":"PNR","explanation":"PNR is the reservation record; the e-ticket is the issued transport document that fulfills it.","explanation_ko":"PNR은 예약 기록이며, 전자항공권은 이를 이행하기 위해 발권된 운송 서류이다.","targetId":"pnr"},{"targetTerm":"Flight Coupon","explanation":"A flight coupon is one redeemable component within an e-ticket; a single e-ticket may hold up to four coupons.","explanation_ko":"Flight Coupon은 전자항공권 내에서 사용 가능한 하나의 구성 요소이며, 단일 전자항공권은 최대 4개의 쿠폰을 보유할 수 있다.","targetId":"flight-coupon"}],"sources":[{"name":"Electronic Ticketing","org":"IATA","version":"","section":"","url":""},{"name":"Passenger Services Conference Resolutions Manual (PSCRM)","org":"IATA","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"emd","term":"EMD","term_ko":"전자 기타 서류 (EMD)","abbreviation":"EMD","aliases":["Electronic Miscellaneous Document","EMD-A","EMD-S"],"category":"air-ticket","conceptType":"document","status":"active","definition":"An IATA-standard electronic document used to issue, account for, and settle ancillary services, fees, and other non-flight charges (e.g., baggage, seats, change/service fees, deposits). It replaced legacy paper documents such as the MCO (Miscellaneous Charges Order) and Excess Baggage Ticket.","definition_ko":"부가 서비스, 수수료 및 기타 비항공 요금(예: 수하물, 좌석, 변경/서비스 수수료, 예치금)을 발행, 회계 처리 및 정산하는 데 사용되는 IATA 표준 전자 서류이다. MCO(Miscellaneous Charges Order, 기타 요금 청구서)와 초과 수하물 항공권 같은 기존 종이 서류를 대체했다.","longDef":"There are two principal types: EMD-A (Associated), which is linked to one or more flight coupons of an e-ticket and typically issued for services tied to a specific flight (e.g., a paid seat or extra bag); and EMD-S (Standalone), which is not tied to a flight coupon and is used for residual value, deposits, or services not bound to a segment. Like e-tickets, EMDs carry a 13-digit document number with the airline's accounting code and have coupon statuses. EMD adoption is a prerequisite for fully automated ancillary service distribution and settlement through BSP/ARC.","longDef_ko":"두 가지 주요 유형이 있다. EMD-A(Associated)는 전자항공권의 하나 이상의 Flight Coupon에 연결되며 일반적으로 특정 항공편에 묶인 서비스(예: 유료 좌석 또는 추가 수하물)에 대해 발행된다. EMD-S(Standalone)는 Flight Coupon에 연결되지 않으며 잔여 가치, 예치금 또는 특정 구간에 묶이지 않은 서비스에 사용된다. 전자항공권과 마찬가지로 EMD는 항공사 회계 코드를 포함한 13자리 서류 번호를 가지며 쿠폰 상태를 보유한다. EMD 도입은 BSP/ARC를 통한 부가 서비스 유통 및 정산의 완전 자동화를 위한 전제 조건이다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"E-ticket","targetId":"e-ticket"},{"type":"related","targetTerm":"Ancillary Service","targetId":"ancillary-service"},{"type":"related","targetTerm":"BSP","targetId":"bsp"},{"type":"related","targetTerm":"Refund","targetId":"refund"}],"distinctions":[{"targetTerm":"E-ticket","explanation":"E-ticket documents flight carriage; EMD documents ancillary/non-flight charges and fees.","explanation_ko":"전자항공권은 항공 운송을 증빙하고, EMD는 부가/비항공 요금 및 수수료를 증빙한다.","targetId":"e-ticket"},{"targetTerm":"Ancillary Service","explanation":"Ancillary Service is the product sold (e.g., a paid bag); the EMD is the document that fulfills and settles it.","explanation_ko":"Ancillary Service는 판매되는 상품(예: 유료 수하물)이며, EMD는 이를 이행하고 정산하는 서류이다.","targetId":"ancillary-service"}],"sources":[{"name":"Electronic Miscellaneous Document (EMD)","org":"IATA","version":"","section":"","url":""},{"name":"Passenger Services Conference Resolutions Manual (PSCRM)","org":"IATA","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"fare-basis-code","term":"Fare Basis Code","term_ko":"운임 기준 코드","abbreviation":"","aliases":["Fare Basis","FBC"],"category":"air-shop","conceptType":"code","status":"active","definition":"A fare basis code is an alphanumeric string that uniquely identifies a specific fare and its associated rules within a market. It typically begins with the booking class (RBD) letter and may include further characters encoding season, days of the week, fare type, passenger type, and other conditions.","definition_ko":"운임 기준 코드(fare basis code)는 특정 시장 내에서 개별 운임과 그에 연계된 규정을 고유하게 식별하는 영숫자 문자열이다. 일반적으로 예약 등급(RBD) 문자로 시작하며, 시즌, 요일, 운임 유형, 승객 유형 및 기타 조건을 인코딩하는 추가 문자를 포함할 수 있다.","longDef":"The fare basis code is the human-readable key that ties a priced fare to its filed fare and rule record. Its first character is normally the prime booking code (RBD), followed by qualifiers such as fare type letters, ticket designators (after a slash), season indicators, and day/time codes (for example YLXAP, BHE7, QW14). The same RBD can carry many distinct fare basis codes representing different fares and conditions. Fare basis codes are filed by carriers, distributed through ATPCO, and printed on the fare-construction portion of tickets.","longDef_ko":"운임 기준 코드는 산출된 운임을 항공사가 신고한 운임 및 규정 레코드와 연결하는, 사람이 읽을 수 있는 키이다. 첫 글자는 보통 주요 예약 코드(RBD)이며, 그 뒤에 운임 유형 문자, 항공권 지정자(슬래시 이후), 시즌 표시자, 요일/시간 코드 등의 한정자가 따라온다(예: YLXAP, BHE7, QW14). 동일한 RBD라도 서로 다른 운임과 조건을 나타내는 여러 운임 기준 코드를 가질 수 있다. 운임 기준 코드는 항공사가 신고하고 ATPCO를 통해 배포되며, 항공권의 운임 산출(fare construction) 부분에 인쇄된다.","standardBody":"ATPCO","providerTerms":[{"provider":"ATPCO","term":"Fare Class Code / Fare Basis","context":"ATPCO fares records carry the fare class and rules that produce the fare basis.","context_ko":"ATPCO의 운임 레코드는 운임 기준을 생성하는 운임 등급(fare class)과 규정을 담고 있다.","relationship":"same"}],"relationships":[{"type":"related","targetTerm":"RBD","targetId":"rbd"},{"type":"related","targetTerm":"Fare Component","targetId":"fare-component"},{"type":"related","targetTerm":"Fare Family","targetId":"fare-family"},{"type":"related","targetTerm":"ATPCO","targetId":"atpco"},{"type":"related","targetTerm":"Passenger Type Code","targetId":"passenger-type-code"}],"distinctions":[{"targetTerm":"RBD","explanation":"The RBD is a single booking-class letter; the fare basis code is the full alphanumeric fare identifier that usually starts with that letter.","explanation_ko":"RBD는 한 글자의 예약 등급 문자이고, 운임 기준 코드는 보통 그 문자로 시작하는 전체 영숫자 운임 식별자이다.","targetId":"rbd"},{"targetTerm":"Fare Family","explanation":"A fare basis identifies one specific filed fare; a fare family is a marketing bundle that may span multiple fare basis codes.","explanation_ko":"운임 기준은 신고된 하나의 특정 운임을 식별하고, 운임 패밀리(fare family)는 여러 운임 기준 코드에 걸칠 수 있는 마케팅 묶음이다.","targetId":"fare-family"}],"sources":[{"name":"ATPCO Fares and Rules data documentation","org":"ATPCO","version":"","section":"","url":""},{"name":"IATA Ticketing Handbook / fare construction","org":"IATA","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"fare-component","term":"Fare Component","term_ko":"운임 컴포넌트","abbreviation":"","aliases":["Pricing Unit Component"],"category":"air-shop","conceptType":"business-term","status":"active","definition":"A fare component is the portion of an itinerary covered by a single fare, running from one fare-break point to the next and governed by one fare basis and its rules. Fare components are the building blocks summed during fare construction to build the total price of a journey.","definition_ko":"운임 컴포넌트(fare component)는 하나의 운임이 적용되는 여정의 구간으로, 한 운임 분기점(fare-break point)에서 다음 분기점까지 이어지며 하나의 운임 기준과 그 규정의 적용을 받는다. 운임 컴포넌트는 운임 산정 과정에서 합산되어 여정 총액을 구성하는 기본 단위이다.","longDef":"In fare construction, an itinerary is divided at fare-break points into fare components, each defined over an O&D and carrying one fare basis code, one set of fare rules, and (for international) one NUC amount. Multiple fare components are grouped into pricing units (such as round-trip or circle-trip pricing units) where rules like minimum stay, combinability, and through-fare checks apply. Each fare component may itself span several flight segments when no fare break occurs between them.","longDef_ko":"운임 산정에서 여정은 운임 분기점을 기준으로 운임 컴포넌트로 분할되며, 각 컴포넌트는 하나의 O&D로 정의되고 하나의 운임 기준 코드, 하나의 운임 규정 집합, 그리고 (국제선의 경우) 하나의 NUC 금액을 갖는다. 여러 운임 컴포넌트는 가격 산정 단위(pricing unit, 예: 왕복 또는 일주 여행 가격 산정 단위)로 묶이며, 여기서 최소 체류 기간, 결합 가능성(combinability), 통과 운임(through-fare) 검증과 같은 규정이 적용된다. 각 운임 컴포넌트는 그 사이에 운임 분기가 발생하지 않는 경우 여러 비행 세그먼트에 걸칠 수 있다.","standardBody":"IATA","providerTerms":[{"provider":"ATPCO","term":"Fare Component (in fare construction)","context":"ATPCO rules apply at the fare-component level during automated pricing.","context_ko":"ATPCO 규정은 자동 운임 산정 과정에서 운임 컴포넌트 단위로 적용된다.","relationship":"same"}],"relationships":[{"type":"related","targetTerm":"Fare Basis Code","targetId":"fare-basis-code"},{"type":"related","targetTerm":"Origin & Destination","targetId":"origin-destination"},{"type":"related","targetTerm":"Journey","targetId":"journey"},{"type":"related","targetTerm":"NUC","targetId":"nuc"},{"type":"related","targetTerm":"ATPCO","targetId":"atpco"}],"distinctions":[{"targetTerm":"Segment","explanation":"A segment is one booked flight portion; a fare component is a priced span bounded by fare breaks and may cover several segments.","explanation_ko":"세그먼트는 예약된 하나의 비행 구간이고, 운임 컴포넌트는 운임 분기로 경계가 정해진 가격 산정 구간으로 여러 세그먼트를 포함할 수 있다.","targetId":"segment"},{"targetTerm":"Origin & Destination","explanation":"An O&D is a market point-pair; a fare component is the priced unit defined over an O&D with one fare and rule set.","explanation_ko":"O&D는 시장의 지점 쌍이고, 운임 컴포넌트는 하나의 운임과 규정 집합을 갖고 O&D 단위로 정의되는 가격 산정 단위이다.","targetId":"origin-destination"}],"sources":[{"name":"IATA fare construction principles / Ticketing Handbook","org":"IATA","version":"","section":"","url":""},{"name":"ATPCO Automated Rules documentation","org":"ATPCO","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"fare-family","term":"Fare Family","term_ko":"운임 패밀리 (브랜드 운임)","abbreviation":"","aliases":["Branded Fare","Fare Brand","Branded Fares"],"category":"air-shop","conceptType":"business-term","status":"active","definition":"A fare family is a marketed bundle of a fare together with a defined set of attributes and ancillaries (such as baggage, seat selection, changes, and refunds) presented under a brand name like Basic, Standard, or Flex. It groups one or more underlying fares so travelers compare branded products rather than raw fare codes.","definition_ko":"운임 패밀리(fare family)는 운임에 정해진 속성과 부가 서비스(예: 수하물, 좌석 지정, 변경, 환불)를 함께 묶어 Basic, Standard, Flex와 같은 브랜드 이름으로 제공하는 마케팅 상품 묶음이다. 하나 이상의 기초 운임을 묶어, 여행자가 원시 운임 코드 대신 브랜드화된 상품을 비교하도록 한다.","longDef":"Fare families, also called branded fares, are the airline retailing construct in which carriers attach inclusions and restrictions to a fare and display them as named tiers. ATPCO's Branded Fares product is the primary industry mechanism for filing brands and their attributes so that GDSs, NDC offers, and airline.com can render them consistently. A fare family is a higher-level grouping that maps down to specific fare basis codes and RBDs, enabling upsell across the booking funnel.","longDef_ko":"브랜드 운임(branded fares)이라고도 불리는 운임 패밀리는 항공사가 운임에 포함 사항과 제약 사항을 부여하여 이름이 붙은 등급(tier)으로 표시하는 항공 리테일링 구조이다. ATPCO의 Branded Fares 상품은 브랜드와 그 속성을 신고하는 핵심 산업 메커니즘으로, GDS, NDC 오퍼, 항공사 자사 웹사이트(airline.com)가 이를 일관되게 표시할 수 있게 한다. 운임 패밀리는 특정 운임 기준 코드와 RBD로 매핑되는 상위 수준의 묶음으로, 예약 퍼널 전반에서 상위 등급 판매(upsell)를 가능하게 한다.","standardBody":"ATPCO","providerTerms":[{"provider":"ATPCO","term":"Branded Fares","context":"ATPCO Branded Fares lets carriers file brand names and attributes for fare families.","context_ko":"ATPCO Branded Fares는 항공사가 운임 패밀리의 브랜드 이름과 속성을 신고할 수 있게 한다.","relationship":"same"},{"provider":"Amadeus","term":"Fare Families / Branded Fares","context":"Amadeus markets the grouping of fares with attributes as Fare Families.","context_ko":"Amadeus는 속성이 결합된 운임 묶음을 Fare Families로 명명해 제공한다.","relationship":"same"}],"relationships":[{"type":"related","targetTerm":"Fare Basis Code","targetId":"fare-basis-code"},{"type":"related","targetTerm":"RBD","targetId":"rbd"},{"type":"related","targetTerm":"Ancillary Service","targetId":"ancillary-service"},{"type":"related","targetTerm":"Offer","targetId":"offer"},{"type":"related","targetTerm":"ATPCO","targetId":"atpco"}],"distinctions":[{"targetTerm":"Fare Basis Code","explanation":"A fare family is a branded bundle spanning fares; a fare basis code identifies one specific underlying fare.","explanation_ko":"운임 패밀리는 여러 운임에 걸친 브랜드 묶음이고, 운임 기준 코드는 하나의 특정 기초 운임을 식별한다.","targetId":"fare-basis-code"},{"targetTerm":"Ancillary Service","explanation":"Ancillaries are individual extras; a fare family bundles selected ancillaries and conditions into a branded tier.","explanation_ko":"부가 서비스는 개별 추가 항목이고, 운임 패밀리는 선택된 부가 서비스와 조건을 하나의 브랜드 등급으로 묶는다.","targetId":"ancillary-service"}],"sources":[{"name":"ATPCO Branded Fares documentation","org":"ATPCO","version":"","section":"","url":""},{"name":"Amadeus Fare Families / Branded Fares documentation","org":"Amadeus","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"flight-coupon","term":"Flight Coupon","term_ko":"비행 쿠폰 (Flight Coupon)","abbreviation":"","aliases":["Coupon","Electronic Flight Coupon"],"category":"air-ticket","conceptType":"document","status":"active","definition":"The portion of an e-ticket that corresponds to a single flight segment and represents the passenger's entitlement to be carried on that specific flight. Each coupon carries an independent status indicating where it is in its lifecycle.","definition_ko":"단일 비행 구간에 대응하는 전자항공권의 부분으로, 해당 특정 항공편에 탑승할 수 있는 승객의 권리를 나타낸다. 각 쿠폰은 생애 주기상의 현재 위치를 나타내는 독립적인 상태를 가진다.","longDef":"A single ticket may contain up to four flight coupons; itineraries with more segments require conjunction tickets. Typical coupon statuses include OPEN FOR USE (O), AIRPORT CONTROL/CHECKED IN (A), FLOWN/USED (F), VOID (V), REFUNDED (R), EXCHANGED/REISSUED (E), and SUSPENDED (S). Coupon status is the authoritative control point for boarding, refund, reissue, and revenue recognition; for example, a coupon must be open (or under airport control) to be exchanged in a reissue, and final statuses such as Flown, Void, Exchanged, or Refunded block reuse.","longDef_ko":"단일 항공권은 최대 4개의 Flight Coupon을 포함할 수 있으며, 구간이 더 많은 여정에는 연결 항공권(conjunction ticket)이 필요하다. 일반적인 쿠폰 상태로는 OPEN FOR USE (O), AIRPORT CONTROL/CHECKED IN (A), FLOWN/USED (F), VOID (V), REFUNDED (R), EXCHANGED/REISSUED (E), SUSPENDED (S) 등이 있다. 쿠폰 상태는 탑승, 환불, 재발행 및 수익 인식을 위한 핵심 통제 지점이다. 예를 들어, 재발행 시 쿠폰을 교환하려면 해당 쿠폰이 OPEN 상태(또는 airport control 상태)여야 하며, Flown, Void, Exchanged, Refunded와 같은 최종 상태는 재사용을 차단한다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"child","targetTerm":"E-ticket","targetId":"e-ticket"},{"type":"related","targetTerm":"Segment","targetId":"segment"},{"type":"related","targetTerm":"Reissue","targetId":"reissue"},{"type":"related","targetTerm":"Refund","targetId":"refund"}],"distinctions":[{"targetTerm":"Segment","explanation":"A segment is the reservation/operational unit of travel; a flight coupon is the corresponding revenue/entitlement portion of the ticket.","explanation_ko":"Segment는 여행의 예약/운항 단위이며, Flight Coupon은 이에 대응하는 항공권의 수익/권리 부분이다.","targetId":"segment"},{"targetTerm":"E-ticket","explanation":"The e-ticket is the whole document; a flight coupon is one of its (up to four) usable parts.","explanation_ko":"전자항공권은 서류 전체이며, Flight Coupon은 그 안에서 사용 가능한 (최대 4개의) 부분 중 하나이다.","targetId":"e-ticket"}],"sources":[{"name":"Passenger Services Conference Resolutions Manual (PSCRM)","org":"IATA","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"free-sale","term":"Free Sale","term_ko":"프리세일(free sale)","abbreviation":"","aliases":["Freesale","Free Sell","Sell Free","Free Sale Inventory"],"category":"hotel-dist","conceptType":"business-term","status":"active","definition":"Free sale is a distribution arrangement in which a channel may confirm hotel bookings without checking a specific live allotment for each request, typically up to an agreed limit and subject to release/stop-sell conditions. The hotel commits to honor confirmed free-sale bookings, relying on the seller to respect stop-sell signals rather than on real-time allocation checks.","definition_ko":"프리세일(free sale)은 채널이 각 요청마다 특정 실시간 할당량(allotment)을 확인하지 않고도 호텔 예약을 확정할 수 있게 하는 분배 방식으로, 일반적으로 합의된 한도까지 적용되며 해제/판매 중지(stop-sell) 조건의 적용을 받는다. 호텔은 확정된 프리세일 예약을 이행할 것을 약속하며, 실시간 할당 확인이 아니라 판매자가 판매 중지 신호를 준수하는 것에 의존한다.","longDef":"Free sale (or 'sell free') lets a channel sell rooms on the assumption that availability exists, often governed by a free-sale limit and a stop-sell/close-out mechanism the hotel triggers when it wants to stop receiving bookings. It contrasts with allotment-based selling, where the channel can only sell from a finite pre-allocated block, and with fully dynamic two-way (pooled) availability. Free sale increases conversion and reduces missed bookings but carries overbooking risk if stop-sell is not applied promptly.","longDef_ko":"프리세일('sell free')은 채널이 가용성이 존재한다는 가정 하에 객실을 판매하도록 허용하며, 흔히 프리세일 한도와, 호텔이 예약 수신을 중단하고자 할 때 발동하는 판매 중지(stop-sell)/마감(close-out) 메커니즘에 의해 규율된다. 이는 채널이 사전 할당된 유한한 블록에서만 판매할 수 있는 할당량 기반 판매, 그리고 완전 동적 양방향(풀링) 가용성과 대비된다. 프리세일은 전환율을 높이고 놓친 예약을 줄이지만, 판매 중지가 신속히 적용되지 않으면 오버부킹 위험을 수반한다.","standardBody":"OpenTravel","providerTerms":[],"relationships":[{"type":"contrasts","targetTerm":"Allotment","targetId":"allotment"},{"type":"related","targetTerm":"Availability","targetId":"availability"},{"type":"related","targetTerm":"ARI","targetId":"ari"},{"type":"related","targetTerm":"Channel Manager","targetId":"channel-manager"},{"type":"related","targetTerm":"Overbooking","targetId":"overbooking"}],"distinctions":[{"targetTerm":"Allotment","explanation":"Free sale lets a channel confirm bookings without checking a finite block (subject to stop-sell); an allotment is a fixed pre-allocated number of rooms a channel may sell.","explanation_ko":"프리세일은 채널이 유한한 블록을 확인하지 않고도 예약을 확정할 수 있게 하지만(판매 중지의 적용을 받음), 할당량(allotment)은 채널이 판매할 수 있도록 사전에 할당된 고정 객실 수다.","targetId":"allotment"},{"targetTerm":"Overbooking","explanation":"Free sale is a selling mechanism that can lead to overbooking if stop-sell is delayed; overbooking is the resulting state of having sold more rooms than available.","explanation_ko":"프리세일은 판매 중지가 지연되면 오버부킹으로 이어질 수 있는 판매 메커니즘이고, 오버부킹은 가용 객실보다 많은 객실을 판매한 결과 상태다.","targetId":"overbooking"}],"sources":[{"name":"OpenTravel Specification","org":"OpenTravel Alliance","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"frequent-flyer-number","term":"Frequent Flyer Number","term_ko":"상용 고객 번호 (FFN)","abbreviation":"FFN","aliases":["FFN","FQTV Number","Loyalty Number","Membership Number","Frequent Traveler Number"],"category":"customer","conceptType":"code","status":"active","definition":"The unique account identifier assigned to a member of a Frequent Flyer Program, used to accrue and redeem miles and to attach loyalty benefits to a booking. In reservations it is carried in the FQTV SSR together with the issuing program's airline code.","definition_ko":"FFP 회원에게 부여되는 고유한 계정 식별자로, 마일리지를 적립 및 사용하고 예약에 로열티 혜택을 연결하는 데 사용된다. 예약에서는 발급 프로그램의 항공사 코드와 함께 FQTV SSR에 담겨 전달된다.","longDef":"A Frequent Flyer Number identifies a specific member account within a specific program; the same physical person may hold many such numbers across different airlines. When added to a PNR via the FQTV Special Service Request, the system records the program (airline designator) and the membership number so that mileage accrues correctly and tier benefits (priority, baggage, lounge, upgrades) are applied. Because the number is account-specific, it is meaningless without the associated program identifier.","longDef_ko":"FFN은 특정 프로그램 내의 특정 회원 계정을 식별하며, 동일한 사람이 서로 다른 항공사에 여러 개의 번호를 보유할 수 있다. FQTV Special Service Request를 통해 PNR에 추가되면 시스템은 프로그램(항공사 식별 코드)과 회원 번호를 기록하여 마일리지가 정확히 적립되고 등급 혜택(우선권, 수하물, 라운지, 업그레이드)이 적용되도록 한다. 번호는 계정 고유값이므로 연관된 프로그램 식별자 없이는 의미가 없다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"child","targetTerm":"Frequent Flyer Program","targetId":"frequent-flyer-program"},{"type":"related","targetTerm":"SSR","targetId":"ssr"},{"type":"related","targetTerm":"Customer Profile","targetId":"customer-profile"},{"type":"related","targetTerm":"Loyalty Tier Status","targetId":"loyalty-tier-status"}],"distinctions":[{"targetTerm":"Frequent Flyer Program","explanation":"The number is the member's account ID; the program is the scheme that issues and governs that account.","explanation_ko":"번호는 회원의 계정 ID이고, 프로그램은 그 계정을 발급하고 관리하는 제도이다.","targetId":"frequent-flyer-program"},{"targetTerm":"SSR","explanation":"The Frequent Flyer Number is the data value; the FQTV SSR is the message element that carries it into a PNR.","explanation_ko":"FFN은 데이터 값이고, FQTV SSR은 그 값을 PNR에 전달하는 메시지 요소이다.","targetId":"ssr"}],"sources":[{"name":"Airline Industry Reservations Interline Message Procedures — Passenger (AIRIMP), FQTV SSR","org":"IATA","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"frequent-flyer-program","term":"Frequent Flyer Program","term_ko":"상용 고객 우대 프로그램 (FFP)","abbreviation":"FFP","aliases":["FFP","Loyalty Program","Mileage Program","Frequent Traveler Program"],"category":"customer","conceptType":"business-term","status":"active","definition":"An airline loyalty program in which members accrue points or miles for flights and partner activity and redeem them for awards, upgrades and benefits, often progressing through status tiers. Each program is operated by an airline (or alliance) and identifies members by a Frequent Flyer Number.","definition_ko":"회원이 탑승과 제휴사 활동을 통해 포인트나 마일리지를 적립하고 이를 보너스 항공권, 업그레이드, 각종 혜택으로 사용하며 흔히 등급 단계를 거쳐 승급하는 항공사 로열티 프로그램이다. 각 프로그램은 항공사(또는 항공 동맹체)가 운영하며 Frequent Flyer Number로 회원을 식별한다.","longDef":"Frequent Flyer Programs are the core customer-retention mechanism in aviation. Members earn currency (miles/points) based on distance flown, fare paid (revenue-based) or other criteria, and earn elite-qualifying activity that determines their Loyalty Tier Status. Programs are linked across partners through interline and alliance agreements, allowing accrual and redemption on multiple carriers. In a reservation, a member's enrollment is recorded via the FQTV SSR carrying their Frequent Flyer Number.","longDef_ko":"FFP는 항공업계의 핵심 고객 유지 수단이다. 회원은 비행 거리, 지불 운임(매출 기반) 또는 기타 기준에 따라 가치(마일리지/포인트)를 적립하고, Loyalty Tier Status를 결정하는 우수 등급 산정 활동을 쌓는다. 프로그램은 인터라인 및 동맹 협정을 통해 제휴사 간에 연결되어 여러 항공사에서 적립과 사용이 가능하다. 예약에서는 회원의 가입 정보가 Frequent Flyer Number를 담은 FQTV SSR을 통해 기록된다.","standardBody":"","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Frequent Flyer Number","targetId":"frequent-flyer-number"},{"type":"related","targetTerm":"Loyalty Tier Status","targetId":"loyalty-tier-status"},{"type":"related","targetTerm":"Customer Profile","targetId":"customer-profile"},{"type":"related","targetTerm":"SSR","targetId":"ssr"}],"distinctions":[{"targetTerm":"Frequent Flyer Number","explanation":"The Frequent Flyer Program is the loyalty scheme itself; the Frequent Flyer Number is the unique member identifier within that program.","explanation_ko":"FFP는 로열티 제도 그 자체이고, Frequent Flyer Number는 해당 프로그램 내 고유한 회원 식별자이다.","targetId":"frequent-flyer-number"},{"targetTerm":"Loyalty Tier Status","explanation":"The program defines the rules and benefits; the tier status is an individual member's earned standing inside the program.","explanation_ko":"프로그램은 규정과 혜택을 정의하고, 등급 상태는 프로그램 안에서 개별 회원이 획득한 위상이다.","targetId":"loyalty-tier-status"}],"sources":[{"name":"Airline Industry Reservations Interline Message Procedures — Passenger (AIRIMP), FQTV SSR","org":"IATA","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"gdpr-consent","term":"GDPR Consent","term_ko":"GDPR 동의 (개인정보 처리 동의)","abbreviation":"","aliases":["Data Protection Consent","Privacy Consent","GDPR Data Consent"],"category":"customer","conceptType":"business-term","status":"active","definition":"Under the EU General Data Protection Regulation (GDPR), the freely given, specific, informed and unambiguous indication by which a data subject agrees to the processing of their personal data. Consent is one of several lawful bases for processing and must be as easy to withdraw as to give.","definition_ko":"EU 일반 개인정보보호법(GDPR)에 따라, 정보 주체가 자신의 개인정보 처리에 동의함을 나타내는 자유롭게 제공되고, 구체적이며, 정보에 입각하고, 명확한 의사 표시이다. 동의는 여러 적법한 처리 근거 중 하나이며, 부여하는 것만큼 철회하기도 쉬워야 한다.","longDef":"In travel, GDPR Consent commonly applies to marketing communications, profiling, sharing of traveler data with partners, and certain uses of biometric/special-category data (e.g. in digital identity programs). Many operational processing activities (ticketing, security prescreening such as Secure Flight, contract performance) rely on other lawful bases rather than consent. Consent must be granular, recorded/auditable, and revocable, and it interacts with stored traveler data in a Customer Profile and with verified-identity frameworks like IATA One ID.","longDef_ko":"여행 분야에서 GDPR 동의는 일반적으로 마케팅 커뮤니케이션, 프로파일링, 제휴사와의 여행자 데이터 공유, 그리고 (디지털 신원 프로그램 등에서의) 생체/특수 범주 데이터의 특정 사용에 적용된다. 발권, Secure Flight 같은 보안 사전 심사, 계약 이행 등 많은 운영상의 처리 활동은 동의가 아닌 다른 적법한 근거에 의존한다. 동의는 세분화되고, 기록·감사 가능하며, 철회 가능해야 하고, Customer Profile에 저장된 여행자 데이터 및 IATA One ID 같은 검증된 신원 프레임워크와 연계된다.","standardBody":"","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Customer Profile","targetId":"customer-profile"},{"type":"related","targetTerm":"IATA One ID","targetId":"iata-one-id"},{"type":"related","targetTerm":"Frequent Flyer Program","targetId":"frequent-flyer-program"}],"distinctions":[{"targetTerm":"Secure Flight","explanation":"GDPR Consent is an EU privacy lawful basis for processing personal data; Secure Flight is a US security program that processes data under legal obligation, not consent.","explanation_ko":"GDPR 동의는 개인정보 처리를 위한 EU 프라이버시상의 적법 근거이고, Secure Flight는 동의가 아닌 법적 의무에 따라 데이터를 처리하는 미국의 보안 프로그램이다.","targetId":"secure-flight"}],"sources":[{"name":"General Data Protection Regulation (EU) 2016/679","org":"EU","version":"","section":"Art. 4(11), Art. 6, Art. 7","url":"https://eur-lex.europa.eu/eli/reg/2016/679/oj"}],"lastReviewed":"2026-06-15"},{"id":"gds","term":"GDS","term_ko":"글로벌 유통 시스템(GDS)","abbreviation":"GDS","aliases":["Global Distribution System","Computer Reservation System (legacy)"],"category":"standards","conceptType":"provider-term","status":"active","definition":"A Global Distribution System is a centralized intermediary platform that aggregates inventory, fares, and availability from airlines, hotels, car rental, and other suppliers and distributes it to travel agencies for shopping, booking, and ticketing. Major GDSs include Amadeus, Sabre, and Travelport (Galileo/Apollo/Worldspan).","definition_ko":"GDS는 항공사, 호텔, 렌터카 등 여러 공급사의 재고, 운임, 좌석 가용성을 통합하여 여행사가 조회, 예약, 발권할 수 있도록 유통하는 중앙집중식 중개 플랫폼이다. 주요 GDS로는 Amadeus, Sabre, Travelport(Galileo/Apollo/Worldspan)가 있다.","longDef":"GDSs evolved from airline-owned Computer Reservation Systems (CRS) in the 1960s-70s. They traditionally rely on EDIFACT and proprietary messaging and ATPCO-filed fares, holding bookings in a PNR and issuing tickets through BSP/ARC. NDC and direct connect APIs increasingly supplement or bypass classic GDS distribution.","longDef_ko":"GDS는 1960~70년대 항공사 소유의 예약 시스템(CRS)에서 발전했다. 전통적으로 EDIFACT와 자체 메시징, ATPCO에 등록된 운임에 의존하며, 예약을 PNR에 보관하고 BSP/ARC를 통해 발권한다. NDC와 직접 연결(direct connect) API가 점차 기존 GDS 유통을 보완하거나 우회하고 있다.","standardBody":"","providerTerms":[{"provider":"Amadeus","term":"Amadeus GDS","context":"One of the three major global GDS platforms","context_ko":"3대 글로벌 GDS 플랫폼 중 하나","relationship":"narrower"},{"provider":"Sabre","term":"Sabre GDS","context":"Major global GDS platform","context_ko":"주요 글로벌 GDS 플랫폼","relationship":"narrower"},{"provider":"Travelport","term":"Galileo / Apollo / Worldspan","context":"Travelport's GDS platforms","context_ko":"Travelport의 GDS 플랫폼","relationship":"narrower"}],"relationships":[{"type":"related","targetTerm":"NDC","targetId":"ndc"},{"type":"related","targetTerm":"OTA (Online Travel Agency)","targetId":"ota-online-travel-agency"},{"type":"related","targetTerm":"PNR","targetId":"pnr"},{"type":"related","targetTerm":"ATPCO","targetId":"atpco"},{"type":"related","targetTerm":"Pseudo City Code","targetId":"pseudo-city-code"},{"type":"related","targetTerm":"BSP","targetId":"bsp"}],"distinctions":[{"targetTerm":"NDC","explanation":"GDS is the distribution platform/intermediary; NDC is an XML messaging standard that changes how content (including via GDS) is shopped and sold.","explanation_ko":"GDS는 유통 플랫폼이자 중개자이고, NDC는 콘텐츠를 조회하고 판매하는 방식을 바꾸는 XML 메시징 표준이다(GDS를 통한 콘텐츠도 포함).","targetId":"ndc"},{"targetTerm":"OTA (Online Travel Agency)","explanation":"A GDS distributes supplier content to sellers; an OTA is a seller that consumes GDS (or direct) content to sell to consumers.","explanation_ko":"GDS는 공급사 콘텐츠를 판매자에게 유통하고, OTA는 GDS(또는 직접 연결) 콘텐츠를 받아 소비자에게 판매하는 판매자이다.","targetId":"ota-online-travel-agency"},{"targetTerm":"CRS","explanation":"GDS aggregates multiple suppliers across the industry; a CRS is a single carrier's or hotel's own reservation system.","explanation_ko":"GDS는 업계 전반의 여러 공급사를 통합하고, CRS는 개별 항공사 또는 호텔 자체의 예약 시스템이다.","targetId":"crs"}],"sources":[{"name":"Airline Distribution overview","org":"IATA","version":"","section":"","url":""},{"name":"Global Distribution System","org":"Amadeus / Sabre / Travelport documentation","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"guarantee-policy","term":"Guarantee Policy","term_ko":"개런티 정책(예약 보장 정책)","abbreviation":"","aliases":["Reservation Guarantee","Booking Guarantee","Deposit/Guarantee Policy"],"category":"hotel-dist","conceptType":"business-term","status":"active","definition":"A guarantee policy defines how a hotel reservation must be secured so the room is held for the guest, for example by credit card guarantee, advance deposit, prepayment, or company/travel-agent guarantee. It determines what is required at booking and the hotel's recourse (such as charging a no-show fee) if the guest does not arrive.","definition_ko":"개런티 정책은 객실이 고객을 위해 유지되도록 호텔 예약을 어떻게 확보해야 하는지를 정의한다. 예를 들어 신용카드 보증, 사전 보증금, 선결제, 또는 회사/여행사 보증 등이 있다. 예약 시 무엇이 요구되는지, 그리고 고객이 도착하지 않을 경우 호텔의 구제 수단(예: 노쇼 요금 청구)을 결정한다.","longDef":"Guarantee types commonly include credit-card guarantee (room held all night, no-show charge applies), deposit/prepayment guarantee, and 'hold until' (e.g., 6 PM) arrangements where an unguaranteed room may be released. In distribution standards the guarantee requirement is carried as a structured element of the rate/reservation. The guarantee policy governs securing and holding the booking, which is distinct from the cancellation policy that governs penalties when the booking is cancelled.","longDef_ko":"개런티 유형에는 일반적으로 신용카드 보증(객실을 밤새 유지하며 노쇼 요금 부과), 보증금/선결제 보증, 그리고 보장되지 않은 객실이 해제될 수 있는 '특정 시각까지 보류'(예: 오후 6시) 방식이 포함된다. 분배 표준에서는 개런티 요구사항이 요금/예약의 구조화된 요소로 전달된다. 개런티 정책은 예약의 확보와 보장을 규율하며, 이는 예약 취소 시의 위약금을 규율하는 취소 정책과 구별된다.","standardBody":"OpenTravel","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Cancellation Policy","targetId":"cancellation-policy"},{"type":"related","targetTerm":"Rate Plan","targetId":"rate-plan"},{"type":"related","targetTerm":"VCC","targetId":"vcc"},{"type":"related","targetTerm":"3-D Secure","targetId":"3-d-secure"},{"type":"related","targetTerm":"Overbooking","targetId":"overbooking"}],"distinctions":[{"targetTerm":"Cancellation Policy","explanation":"A guarantee policy defines how a booking is secured/held and no-show recourse; a cancellation policy defines deadlines and penalties for cancelling.","explanation_ko":"개런티 정책은 예약을 어떻게 확보·보장하는지와 노쇼 구제 수단을 정의하고, 취소 정책은 취소에 대한 기한과 위약금을 정의한다.","targetId":"cancellation-policy"}],"sources":[{"name":"OpenTravel Specification","org":"OpenTravel Alliance","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"htng","term":"HTNG","term_ko":"호스피탈리티 기술 차세대 협회(HTNG)","abbreviation":"HTNG","aliases":["Hospitality Technology Next Generation","HTNG (now part of AHLA)"],"category":"standards","conceptType":"standard","status":"active","definition":"Hospitality Technology Next Generation (HTNG) is a non-profit trade association that develops interoperability standards and specifications for hospitality technology systems, such as messaging frameworks for property management, reservations, and connected guest-room systems. It is now part of the American Hotel & Lodging Association (AHLA).","definition_ko":"Hospitality Technology Next Generation(HTNG)은 자산 관리, 예약, 연결된 객실 시스템을 위한 메시징 프레임워크 등 호스피탈리티 기술 시스템의 상호운용성 표준과 명세를 개발하는 비영리 무역 협회이다. 현재는 미국호텔숙박업협회(AHLA)의 일부이다.","longDef":"HTNG produces technical workgroup specifications and web-service message standards used among hotel systems (e.g., PMS, CRS, channel managers, in-room technology). It has collaborated with the OpenTravel Alliance, with OpenTravel often providing the underlying XML schema vocabulary that HTNG frameworks reference.","longDef_ko":"HTNG은 호텔 시스템(예: PMS, CRS, 채널 매니저, 객실 내 기술) 간에 사용되는 기술 작업그룹 명세와 웹 서비스 메시지 표준을 만든다. OpenTravel Alliance와 협력해 왔으며, OpenTravel은 HTNG 프레임워크가 참조하는 기반 XML 스키마 어휘를 제공하는 경우가 많다.","standardBody":"HTNG","providerTerms":[],"relationships":[{"type":"related","targetTerm":"OpenTravel Alliance","targetId":"opentravel-alliance"},{"type":"related","targetTerm":"PMS","targetId":"pms"},{"type":"related","targetTerm":"CRS","targetId":"crs"},{"type":"related","targetTerm":"Channel Manager","targetId":"channel-manager"}],"distinctions":[{"targetTerm":"OpenTravel Alliance","explanation":"HTNG focuses on hospitality-system interoperability standards/frameworks; OpenTravel maintains the broader cross-sector travel XML message vocabulary HTNG often builds upon.","explanation_ko":"HTNG은 호스피탈리티 시스템 상호운용성 표준과 프레임워크에 집중하고, OpenTravel은 HTNG이 흔히 기반으로 삼는 더 광범위한 범산업 여행 XML 메시지 어휘를 유지한다.","targetId":"opentravel-alliance"}],"sources":[{"name":"HTNG Standards and Specifications","org":"HTNG (AHLA)","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"iata-clearing-house","term":"IATA Clearing House","abbreviation":"ICH","aliases":["ICH","IATA Clearing House (ICH)"],"category":"pay","conceptType":"provider-term","status":"active","definition":"The IATA Clearing House (ICH) is IATA's central facility for the multilateral netting and settlement of accounts between airlines, airline-associated companies, and travel partners, principally covering interline billings. It nets amounts members owe each other and settles the resulting balances, processing tens of billions of US dollars in annual billings.","term_ko":"IATA 정산소(ICH)","definition_ko":"IATA Clearing House(ICH)는 항공사, 항공사 관련 기업, 여행 파트너 간 계정의 다자간 차감 정산과 결제를 위한 IATA의 중앙 기구로, 주로 인터라인 청구를 담당한다. 회원사가 상호 지급할 금액을 차감하여 그 잔액을 정산하며, 연간 수백억 달러 규모의 청구를 처리한다.","longDef":"ICH allows participants to settle many bilateral interline obligations through a single net position rather than paying each counterparty individually, reducing currency exposure and credit risk. Invoices are submitted via IATA's SIS (Simplified Invoicing and Settlement) platform. ICH interoperates with the separate Airlines Clearing House (ACH); settlements between an ICH participant and an ACH participant are conducted in USD.","longDef_ko":"ICH를 통해 참여사는 다수의 양자 간 인터라인 채무를 각 거래 상대방에게 개별 지급하는 대신 단일 순포지션으로 정산할 수 있어 환 노출과 신용 위험을 줄인다. 인보이스는 IATA의 SIS(Simplified Invoicing and Settlement) 플랫폼을 통해 제출된다. ICH는 별도의 Airlines Clearing House(ACH)와 상호 운용되며, ICH 참여사와 ACH 참여사 간 정산은 미국 달러(USD)로 이루어진다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Interline","targetId":"interline"},{"type":"related","targetTerm":"Proration","targetId":"proration"},{"type":"related","targetTerm":"SPA (Special Prorate Agreement)","targetId":"spa-special-prorate-agreement"},{"type":"related","targetTerm":"MITA","targetId":"mita"},{"type":"contrasts","targetTerm":"BSP","targetId":"bsp"}],"distinctions":[{"targetTerm":"BSP","explanation":"ICH settles airline-to-airline (interline) accounts; BSP settles agent-to-airline sales.","explanation_ko":"ICH는 항공사 간(인터라인) 계정을 정산하고, BSP는 여행사-항공사 간 판매를 정산한다.","targetId":"bsp"},{"targetTerm":"ARC","explanation":"ICH handles interline settlement globally; ARC handles US agent-to-airline settlement.","explanation_ko":"ICH는 전 세계 인터라인 정산을 처리하고, ARC는 미국의 여행사-항공사 정산을 처리한다.","targetId":"arc"}],"sources":[{"name":"IATA Clearing House (ICH)","org":"IATA","version":"","section":"","url":"https://www.iata.org/en/services/finance/clearinghouse/"},{"name":"IATA Clearing House (ICH) FAQs","org":"IATA","version":"","section":"","url":"https://www.iata.org/en/services/finance/clearinghouse/faqs/"}],"lastReviewed":"2026-06-15"},{"id":"iata-code","term":"IATA Code","term_ko":"IATA 코드","abbreviation":"IATA","aliases":["IATA Two-Letter Code","IATA Designator","IATA Location Identifier"],"category":"codes","conceptType":"code","status":"ambiguous","definition":"An umbrella term for the various short codes assigned and administered by the International Air Transport Association (IATA), most commonly the 3-letter airport/city location code and the 2-character airline designator. The exact meaning depends on context (airport, airline, or other IATA-managed code).","definition_ko":"국제항공운송협회(IATA)가 부여하고 관리하는 다양한 단축 코드를 포괄적으로 일컫는 용어로, 가장 흔하게는 3자리 공항/도시 위치 코드와 2자리 항공사 지정 코드를 가리킨다. 정확한 의미는 문맥(공항, 항공사, 또는 IATA가 관리하는 기타 코드)에 따라 달라진다.","longDef":"Because IATA maintains several distinct coding schemes, 'IATA Code' is context-dependent: a 3-letter IATA location code identifies an airport or city served by air transport, while a 2-character IATA airline designator identifies an air carrier. IATA codes are optimized for commercial and consumer-facing use (tickets, schedules, displays) and are not globally unique in the way ICAO codes are. The term is widely used loosely, so precise documentation should specify which IATA code is meant.","longDef_ko":"IATA는 여러 개의 별개 코드 체계를 운영하기 때문에 'IATA 코드'라는 표현은 문맥에 따라 달라진다. 3자리 IATA 위치 코드는 항공 운송이 이루어지는 공항이나 도시를 식별하고, 2자리 IATA 항공사 지정 코드는 항공 운송 사업자를 식별한다. IATA 코드는 상업 및 소비자 대상 용도(항공권, 스케줄, 표시 화면)에 최적화되어 있으며, ICAO 코드처럼 전 세계적으로 고유하지는 않다. 이 용어는 폭넓고 느슨하게 사용되므로, 정확성을 요하는 문서에서는 어떤 IATA 코드를 의미하는지 명시해야 한다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"ICAO Code","targetId":"icao-code"},{"type":"broader","targetTerm":"Airport Code","targetId":"airport-code"},{"type":"broader","targetTerm":"Airline Designator","targetId":"airline-designator"},{"type":"broader","targetTerm":"City Code","targetId":"city-code"}],"distinctions":[{"targetTerm":"ICAO Code","explanation":"IATA codes are short commercial codes (3-letter airport, 2-char airline); ICAO codes are longer (4-letter airport, 3-letter airline) and globally unique for operational/ATC use.","explanation_ko":"IATA 코드는 짧은 상업용 코드(3자리 공항, 2자리 항공사)인 반면, ICAO 코드는 더 길고(4자리 공항, 3자리 항공사) 운항/항공교통관제(ATC) 용도로 전 세계적으로 고유하다.","targetId":"icao-code"}],"sources":[{"name":"IATA Airline and Airport Code Search","org":"IATA","version":"","section":"","url":"https://www.iata.org/en/publications/directories/code-search/"}],"lastReviewed":"2026-06-15"},{"id":"iata-easypay","term":"IATA EasyPay","abbreviation":"","aliases":["IATA EasyPay","IEP","IATA Easy Pay"],"category":"pay","conceptType":"provider-term","status":"active","definition":"IATA EasyPay is an IATA e-wallet (pay-as-you-go) payment method used by IATA-accredited agents to issue tickets and EMDs through the BSP. Agents pre-fund a dedicated account and, at issuance, enter an EasyPay number in the GDS that triggers a real-time authorization blocking the funds, after which IATA settles the amount to the airline via standard BSP processes.","term_ko":"IATA EasyPay","definition_ko":"IATA EasyPay는 IATA 인증 여행사가 BSP를 통해 항공권과 EMD를 발권하는 데 사용하는 IATA 전자지갑(선불 충전식, pay-as-you-go) 결제 수단이다. 여행사는 전용 계정에 미리 자금을 충전하고 발권 시 GDS에 EasyPay 번호를 입력하면 실시간 승인이 발생해 해당 자금이 보류되며, 이후 IATA가 표준 BSP 절차를 통해 항공사에 금액을 정산한다.","longDef":"Introduced under NewGen ISS, IATA EasyPay offers a secure alternative to BSP Cash and BSP Card. Because funds are verified and blocked at the moment of issuance and settled to airlines through the BSP within roughly 48-96 hours of issuance, it eliminates chargeback risk for airlines and reduces the financial security agents must post to IATA. It is optional and does not replace existing BSP payment methods.","longDef_ko":"NewGen ISS 하에서 도입된 IATA EasyPay는 BSP Cash 및 BSP Card에 대한 안전한 대안을 제공한다. 자금이 발권 시점에 검증되고 보류되며 발권 후 약 48~96시간 이내에 BSP를 통해 항공사에 정산되므로, 항공사의 차지백 위험을 제거하고 여행사가 IATA에 예치해야 하는 재무 보증금을 줄인다. 이는 선택 사항이며 기존 BSP 결제 수단을 대체하지 않는다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"parent","targetTerm":"BSP","targetId":"bsp"},{"type":"related","targetTerm":"E-ticket","targetId":"e-ticket"},{"type":"related","targetTerm":"EMD","targetId":"emd"},{"type":"related","targetTerm":"GDS","targetId":"gds"}],"distinctions":[{"targetTerm":"VCC","explanation":"IATA EasyPay is an IATA-operated e-wallet limited to BSP ticket issuance, while a VCC is a general card-rail instrument usable for many supplier payments.","explanation_ko":"IATA EasyPay는 BSP 항공권 발권에 한정된 IATA 운영 전자지갑인 반면, VCC는 다양한 공급업체 결제에 사용할 수 있는 범용 카드 결제망 수단이다.","targetId":"vcc"},{"targetTerm":"Chargeback","explanation":"IATA EasyPay carries no chargeback risk for airlines because funds are pre-funded and blocked at issuance, unlike card payments.","explanation_ko":"IATA EasyPay는 카드 결제와 달리 자금이 사전 충전되고 발권 시 보류되므로 항공사에 차지백 위험이 없다.","targetId":"chargeback"}],"sources":[{"name":"IATA EASY PAY","org":"IATA","version":"","section":"","url":"https://www.iata.org/en/services/finance/iata-easy-pay/"},{"name":"IATA EasyPay | NewGen ISS","org":"IATA","version":"","section":"","url":"https://newgeniss.iata.org/airlines/iata-easy-pay/"}],"lastReviewed":"2026-06-15"},{"id":"iata-one-id","term":"IATA One ID","term_ko":"IATA One ID (디지털 신원)","abbreviation":"","aliases":["One ID","IATA Digital Identity (One ID)"],"category":"customer","conceptType":"standard-term","status":"active","definition":"An IATA initiative and standards framework enabling a contactless, document-free passenger journey based on a single, reusable digital identity and biometric recognition. Travelers verify their identity once and are then authenticated at touchpoints such as check-in, bag drop, security and boarding.","definition_ko":"단일하고 재사용 가능한 디지털 신원과 생체 인식을 기반으로 비접촉, 서류 없는 여객 여정을 가능하게 하는 IATA의 이니셔티브이자 표준 프레임워크이다. 여행자는 신원을 한 번 검증하면 이후 체크인, 수하물 위탁, 보안검색, 탑승 등의 접점에서 인증된다.","longDef":"One ID rests on two pillars: Admissibility (obtaining and verifying entry/immigration permits digitally before travel) and Contactless Travel (using biometric tokens to pass checkpoints without repeatedly presenting physical documents). The framework emphasizes passenger control and informed consent over the sharing of identity credentials, increasingly leveraging verifiable credentials and decentralized identity concepts. It is an identity and process standard, distinct from loyalty identifiers like the Frequent Flyer Number, though a digital identity can be linked to a Customer Profile.","longDef_ko":"One ID는 두 축에 기반한다. 입국 허가(Admissibility, 여행 전 입국/출입국 허가를 디지털로 취득·검증)와 비접촉 여행(Contactless Travel, 생체 인식 토큰을 이용해 실물 서류를 반복적으로 제시하지 않고 검문 지점을 통과)이다. 이 프레임워크는 신원 자격 증명 공유에 대한 승객의 통제권과 정보에 입각한 동의를 강조하며, 점차 검증 가능한 자격 증명과 분산 신원 개념을 활용하고 있다. 디지털 신원은 Customer Profile에 연결될 수 있지만, One ID는 Frequent Flyer Number 같은 로열티 식별자와는 구별되는 신원 및 프로세스 표준이다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Customer Profile","targetId":"customer-profile"},{"type":"related","targetTerm":"GDPR Consent","targetId":"gdpr-consent"},{"type":"related","targetTerm":"Secure Flight","targetId":"secure-flight"}],"distinctions":[{"targetTerm":"Secure Flight","explanation":"One ID is an industry digital-identity and biometric framework for seamless travel; Secure Flight is a US TSA watch-list prescreening program with mandated data fields.","explanation_ko":"One ID는 매끄러운 여행을 위한 업계의 디지털 신원·생체 인식 프레임워크이고, Secure Flight는 데이터 필드가 의무화된 미국 TSA의 감시 명단 사전 심사 프로그램이다.","targetId":"secure-flight"},{"targetTerm":"Customer Profile","explanation":"One ID is a verified, biometric digital identity used at airport touchpoints; a Customer Profile is a stored set of traveler data and preferences in a CRS/booking system.","explanation_ko":"One ID는 공항 접점에서 사용되는 검증된 생체 디지털 신원이고, Customer Profile은 CRS/예약 시스템에 저장된 여행자 데이터와 선호도의 집합이다.","targetId":"customer-profile"}],"sources":[{"name":"One ID program page","org":"IATA","version":"","section":"","url":"https://www.iata.org/en/programs/passenger/one-id/"},{"name":"Fact Sheet — One ID","org":"IATA","version":"","section":"","url":"https://www.iata.org/en/iata-repository/pressroom/fact-sheets/fact-sheet-one-id/"}],"lastReviewed":"2026-06-15"},{"id":"icao-code","term":"ICAO Code","term_ko":"ICAO 코드","abbreviation":"ICAO","aliases":["ICAO Location Indicator","ICAO Designator","ICAO Airport Code","ICAO Airline Designator"],"category":"codes","conceptType":"code","status":"ambiguous","definition":"An umbrella term for codes assigned by the International Civil Aviation Organization (ICAO), principally the 4-letter location indicator for airports/aerodromes and the 3-letter airline designator. ICAO codes are used primarily for air traffic control, flight planning, and operational communications.","definition_ko":"국제민간항공기구(ICAO)가 부여하는 코드를 포괄적으로 일컫는 용어로, 주로 공항/비행장을 위한 4자리 위치 지시자와 3자리 항공사 지정 코드를 가리킨다. ICAO 코드는 주로 항공교통관제, 비행 계획, 운항 통신에 사용된다.","longDef":"ICAO 4-letter location indicators are structured regionally: the first one or two letters denote a region and country (e.g., 'K' for the contiguous USA, 'EG' for the UK), making them globally unique. ICAO 3-letter airline designators are paired with a telephony/call sign for radio communication. Unlike IATA codes, ICAO codes cover aerodromes that have no commercial air service and are oriented toward operations rather than ticketing or consumer display.","longDef_ko":"ICAO의 4자리 위치 지시자는 지역별로 구조화되어 있다. 첫 한두 글자가 지역과 국가를 나타내며(예: 미국 본토는 'K', 영국은 'EG'), 이로써 전 세계적으로 고유성을 갖는다. ICAO의 3자리 항공사 지정 코드는 무선 통신을 위한 전화 호출 부호(콜사인)와 짝을 이룬다. IATA 코드와 달리 ICAO 코드는 상업 항공 서비스가 없는 비행장까지 포괄하며, 발권이나 소비자 대상 표시보다 운항에 초점이 맞춰져 있다.","standardBody":"ICAO","providerTerms":[],"relationships":[{"type":"related","targetTerm":"IATA Code","targetId":"iata-code"},{"type":"related","targetTerm":"Airport Code","targetId":"airport-code"},{"type":"related","targetTerm":"Airline Designator","targetId":"airline-designator"}],"distinctions":[{"targetTerm":"IATA Code","explanation":"ICAO codes are 4-letter (airport) / 3-letter (airline), globally unique and operations-focused; IATA codes are shorter and used for commercial booking and display.","explanation_ko":"ICAO 코드는 4자리(공항)/3자리(항공사)로 전 세계적으로 고유하며 운항 중심인 반면, IATA 코드는 더 짧고 상업적 예약 및 표시에 사용된다.","targetId":"iata-code"}],"sources":[{"name":"Doc 7910 — Location Indicators","org":"ICAO","version":"","section":"","url":"https://store.icao.int/en/location-indicators-doc-7910"},{"name":"Doc 8585 — Designators for Aircraft Operating Agencies, Aeronautical Authorities and Services","org":"ICAO","version":"","section":"","url":"https://www.icao.int/operational-safety/Designators-and-indicators"}],"lastReviewed":"2026-06-15"},{"id":"interline","term":"Interline","term_ko":"인터라인(연계 운송)","abbreviation":"","aliases":["Interline Agreement","Interlining","Interline Traffic Agreement"],"category":"air-partner","conceptType":"business-term","status":"active","definition":"A commercial agreement between two or more airlines to handle passengers, baggage, and tickets traveling on itineraries that involve more than one carrier, allowing one airline to issue a ticket and have it accepted for travel on another. Unlike codeshare, each flight is sold and flown under the operating carrier's own designator.","definition_ko":"둘 이상의 항공사가 한 개 이상의 항공사가 관여하는 여정에서 승객, 수하물, 항공권을 처리하기 위해 맺는 상업적 협정으로, 한 항공사가 발권한 항공권을 다른 항공사가 운송에 인수할 수 있도록 한다. 공동운항과 달리 각 항공편은 운항 항공사 자체의 지정자 코드로 판매되고 운항된다.","longDef":"Interline agreements enable through-ticketing, mutual ticket acceptance, baggage through-checking, and revenue settlement between carriers without any sharing of flight codes. They underpin multi-carrier journeys and are typically settled financially through the IATA Clearing House and via proration based on the Multilateral Interline Traffic Agreements (MITA) or bilateral Special Prorate Agreements (SPA).","longDef_ko":"인터라인 협정은 편명 공유 없이도 항공사 간 일관 발권(through-ticketing), 상호 항공권 인수, 수하물 일관 위탁(through-checking), 수익 정산을 가능하게 한다. 이는 여러 항공사가 관여하는 여정의 기반이 되며, 일반적으로 IATA Clearing House를 통해, 그리고 MITA(Multilateral Interline Traffic Agreements)나 양자 간 SPA(Special Prorate Agreement)에 기반한 프로레이션을 통해 재무적으로 정산된다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Codeshare","targetId":"codeshare"},{"type":"related","targetTerm":"MITA","targetId":"mita"},{"type":"related","targetTerm":"SPA (Special Prorate Agreement)","targetId":"spa-special-prorate-agreement"},{"type":"related","targetTerm":"Proration","targetId":"proration"},{"type":"related","targetTerm":"IATA Clearing House","targetId":"iata-clearing-house"},{"type":"related","targetTerm":"Validating Carrier","targetId":"validating-carrier"}],"distinctions":[{"targetTerm":"Codeshare","explanation":"Interline involves no sharing of flight codes; codeshare specifically places the marketing carrier's designator on the operating carrier's flight.","explanation_ko":"인터라인은 편명 공유를 수반하지 않으며, 공동운항은 구체적으로 판매 항공사의 지정자 코드를 운항 항공사의 항공편에 부여한다.","targetId":"codeshare"},{"targetTerm":"MITA","explanation":"MITA is the multilateral framework that establishes the standard interline relationship; interline is the broader concept of cross-carrier ticket and baggage acceptance.","explanation_ko":"MITA는 표준 인터라인 관계를 수립하는 다자간 체계이고, 인터라인은 항공사 간 항공권 및 수하물 인수를 포괄하는 더 넓은 개념이다.","targetId":"mita"}],"sources":[{"name":"Multilateral Interline Traffic Agreements (MITA)","org":"IATA","version":"","section":"","url":""},{"name":"Revenue Accounting Manual (RAM)","org":"IATA","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"involuntary-reissue","term":"Involuntary Reissue","term_ko":"비자발적 재발행 (Involuntary Reissue)","abbreviation":"","aliases":["Involuntary Exchange","INVOL Reissue","Involuntary Rerouting"],"category":"air-ticket","conceptType":"process","status":"active","definition":"A reissue caused by circumstances attributable to the carrier such as a schedule change, flight cancellation, or IROPS, rather than by passenger request. Because the disruption is airline-caused, change penalties and fare differences are typically waived and the passenger is reaccommodated under involuntary rerouting rules.","definition_ko":"승객의 요청이 아니라 스케줄 변경, 항공편 결항 또는 IROPS와 같이 항공사에 귀책되는 사유로 발생하는 재발행이다. 운항 차질이 항공사 사유에 의한 것이므로 변경 위약금과 운임 차액이 일반적으로 면제되며, 승객은 비자발적 재배정(involuntary rerouting) 규정에 따라 재배정된다.","longDef":"Involuntary reissue is governed by carrier involuntary rerouting/reaccommodation policies and IATA provisions covering failure to operate as scheduled and schedule irregularity. The new ticket is normally endorsed to document the involuntary nature (commonly with a remark such as INVOL and a reference to the disruption reason), and the fare is reissued at no additional collection where reaccommodation is on the same or comparable service. It is distinguished from a voluntary reissue, where the change originates with the passenger and fare-rule penalties apply.","longDef_ko":"비자발적 재발행은 항공사의 비자발적 재배정/재수용 정책 및 정시 운항 실패와 스케줄 불규칙성을 다루는 IATA 규정에 따른다. 새 항공권은 일반적으로 비자발적 성격을 증빙하기 위해 배서되며(흔히 INVOL과 같은 표기 및 운항 차질 사유에 대한 참조 포함), 동일하거나 유사한 서비스로 재배정되는 경우 추가 징수 없이 재발행된다. 이는 변경이 승객으로부터 비롯되고 운임 규정상의 위약금이 적용되는 자발적 재발행과 구별된다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"contrasts","targetTerm":"Reissue","targetId":"reissue"},{"type":"related","targetTerm":"Schedule Change","targetId":"schedule-change"},{"type":"related","targetTerm":"IROPS","targetId":"irops"},{"type":"related","targetTerm":"Refund","targetId":"refund"},{"type":"related","targetTerm":"E-ticket","targetId":"e-ticket"}],"distinctions":[{"targetTerm":"Reissue","explanation":"A (voluntary) reissue is passenger-initiated with penalties per fare rules; an involuntary reissue is airline-caused and normally penalty-free.","explanation_ko":"(자발적) 재발행은 승객이 주도하며 운임 규정에 따른 위약금이 적용되고, 비자발적 재발행은 항공사 사유에 의한 것으로 통상 위약금이 없다.","targetId":"reissue"},{"targetTerm":"Schedule Change","explanation":"Schedule Change is the trigger event in the schedule; involuntary reissue is the ticketing action taken to reaccommodate the passenger.","explanation_ko":"Schedule Change는 스케줄상의 유발 사건이며, 비자발적 재발행은 승객을 재배정하기 위해 취하는 발권 조치이다.","targetId":"schedule-change"}],"sources":[{"name":"Passenger Services Conference Resolutions Manual (PSCRM)","org":"IATA","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"irops","term":"IROPS","term_ko":"IROPS(비정상 운항)","abbreviation":"IROPS","aliases":["Irregular Operations","IRROPS","Irregular Ops"],"category":"air-partner","conceptType":"process","status":"active","definition":"Irregular Operations: the handling of unplanned disruptions to flight operations such as delays, cancellations, diversions, and missed connections, and the associated reaccommodation of affected passengers, baggage, and crew. IROPS processes restore travelers to their itineraries through rebooking, involuntary reissue, refunds, and care obligations.","definition_ko":"비정상 운항(Irregular Operations): 지연, 취소, 회항, 연결편 놓침과 같은 계획되지 않은 항공 운항 중단의 처리와 그에 따른 승객, 수하물, 승무원의 재수용. IROPS 프로세스는 재예약, 비자발적 재발권, 환불, 돌봄(care) 의무를 통해 여행객을 원래의 여정으로 복귀시킨다.","longDef":"IROPS encompasses both the operational recovery (returning the schedule to normal) and the passenger-service response triggered by day-of disruptions. Reaccommodation may use the disrupting carrier's own flights or, under interline and codeshare agreements, partner carriers' flights, supported by interline e-ticketing and involuntary reissue rules. IROPS is distinct from a planned schedule change because it concerns real-time, unforeseen events rather than advance schedule amendments.","longDef_ko":"IROPS는 운영 복구(스케줄을 정상으로 되돌리는 것)와 당일 중단으로 촉발된 승객 서비스 대응을 모두 포괄한다. 재수용은 중단을 겪은 항공사 자체 항공편을 이용하거나, 인터라인 및 공동운항 협정에 따라 인터라인 e-티켓팅과 비자발적 재발권 규칙의 지원을 받아 파트너 항공사의 항공편을 이용할 수 있다. IROPS는 사전 스케줄 수정이 아니라 실시간의 예기치 못한 사건을 다루므로 계획된 스케줄 변경과 구별된다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Schedule Change","targetId":"schedule-change"},{"type":"related","targetTerm":"Involuntary Reissue","targetId":"involuntary-reissue"},{"type":"related","targetTerm":"Refund","targetId":"refund"},{"type":"related","targetTerm":"Interline","targetId":"interline"},{"type":"related","targetTerm":"Queue","targetId":"queue"},{"type":"related","targetTerm":"MCT","targetId":"mct"}],"distinctions":[{"targetTerm":"Schedule Change","explanation":"IROPS is unplanned, day-of operational disruption; a schedule change is a planned amendment to the published schedule communicated in advance.","explanation_ko":"IROPS는 계획되지 않은 당일 운영 중단이고, 스케줄 변경은 사전에 통지되는, 게시된 스케줄에 대한 계획된 수정이다.","targetId":"schedule-change"},{"targetTerm":"Involuntary Reissue","explanation":"IROPS is the disruption scenario; involuntary reissue is one of the ticketing actions used to reaccommodate passengers during IROPS.","explanation_ko":"IROPS는 중단 상황이고, 비자발적 재발권은 IROPS 동안 승객을 재수용하기 위해 사용되는 발권 처리 중 하나다.","targetId":"involuntary-reissue"}],"sources":[{"name":"Passenger Services Conference Resolutions Manual (PSCRM) — interline reaccommodation","org":"IATA","version":"","section":"","url":""},{"name":"A4A IROPS / contingency planning guidance","org":"Airlines for America (A4A)","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"iso-3166-country-code","term":"ISO 3166 Country Code","term_ko":"ISO 3166 국가 코드","abbreviation":"ISO 3166","aliases":["Country Code","ISO Country Code","Alpha-2 Country Code","Alpha-3 Country Code","ISO 3166-1"],"category":"codes","conceptType":"code","status":"active","definition":"The international standard defining codes for countries and their subdivisions. ISO 3166-1 provides two-letter (alpha-2, e.g., US, GB, DE), three-letter (alpha-3, e.g., USA, GBR, DEU), and three-digit numeric codes for countries and territories.","definition_ko":"국가와 그 하위 지역에 대한 코드를 정의하는 국제 표준. ISO 3166-1은 국가 및 영토에 대해 2자리(alpha-2, 예: US, GB, DE), 3자리(alpha-3, 예: USA, GBR, DEU), 그리고 3자리 숫자 코드를 제공한다.","longDef":"ISO 3166-1 alpha-2 codes are the most widely used in travel and IT (also the basis for country-code top-level domains and the country segment of UN/LOCODE). ISO 3166-2 covers principal subdivisions (states, provinces, regions). Country codes appear throughout travel data for nationality, country of residence, point of sale, tax/visa rules, and address handling.","longDef_ko":"ISO 3166-1 alpha-2 코드는 여행 및 IT 분야에서 가장 널리 사용된다(국가 코드 최상위 도메인과 UN/LOCODE의 국가 부분의 기준이기도 하다). ISO 3166-2는 주요 하위 지역(주, 도, 지역)을 다룬다. 국가 코드는 국적, 거주 국가, 판매 지점(POS), 세금/비자 규정, 주소 처리 등 여행 데이터 전반에 등장한다.","standardBody":"ISO","providerTerms":[],"relationships":[{"type":"related","targetTerm":"ISO 4217 Currency Code","targetId":"iso-4217-currency-code"},{"type":"related","targetTerm":"UN/LOCODE","targetId":"un-locode"},{"type":"related","targetTerm":"Secure Flight","targetId":"secure-flight"}],"distinctions":[{"targetTerm":"UN/LOCODE","explanation":"ISO 3166 identifies a whole country (2/3-letter); UN/LOCODE identifies a specific location within a country and embeds the ISO 3166 alpha-2 as its first two characters.","explanation_ko":"ISO 3166은 국가 전체를 식별하는(2/3자리) 코드인 반면, UN/LOCODE는 국가 내의 특정 위치를 식별하며 앞 두 글자에 ISO 3166 alpha-2를 포함한다.","targetId":"un-locode"}],"sources":[{"name":"ISO 3166 Country Codes","org":"ISO","version":"","section":"","url":"https://www.iso.org/iso-3166-country-codes.html"}],"lastReviewed":"2026-06-15"},{"id":"iso-4217-currency-code","term":"ISO 4217 Currency Code","term_ko":"ISO 4217 통화 코드","abbreviation":"ISO 4217","aliases":["Currency Code","ISO Currency Code","Three-Letter Currency Code"],"category":"codes","conceptType":"code","status":"active","definition":"The international standard defining three-letter alphabetic codes (and corresponding numeric codes) for currencies, e.g., USD, EUR, GBP, JPY. It is used throughout travel pricing, ticketing, and settlement to unambiguously denote the currency of an amount.","definition_ko":"통화에 대한 3자리 알파벳 코드(및 그에 대응하는 숫자 코드)를 정의하는 국제 표준(예: USD, EUR, GBP, JPY). 여행 가격 산정, 발권, 정산 전반에서 금액의 통화를 명확하게 나타내는 데 사용된다.","longDef":"ISO 4217 alphabetic codes are typically formed from the ISO 3166 country code plus a letter for the currency name (e.g., US + D = USD). The standard also defines the minor unit (number of decimal places) for each currency. In airline pricing, fares are filed and converted between currencies and the neutral NUC; the local currency on a ticket is expressed using an ISO 4217 code.","longDef_ko":"ISO 4217 알파벳 코드는 일반적으로 ISO 3166 국가 코드에 통화 명칭의 한 글자를 더해 구성된다(예: US + D = USD). 이 표준은 또한 각 통화의 최소 단위(소수점 자릿수)도 정의한다. 항공 가격 산정에서 운임은 여러 통화와 중립 단위인 NUC 사이에서 신고·환산되며, 항공권상의 현지 통화는 ISO 4217 코드로 표현된다.","standardBody":"ISO","providerTerms":[],"relationships":[{"type":"related","targetTerm":"ISO 3166 Country Code","targetId":"iso-3166-country-code"},{"type":"related","targetTerm":"NUC","targetId":"nuc"},{"type":"related","targetTerm":"BSP","targetId":"bsp"}],"distinctions":[{"targetTerm":"NUC","explanation":"ISO 4217 codes denote real-world currencies; NUC is a fare-construction neutral unit used internally to convert fares between currencies, not an ISO 4217 currency.","explanation_ko":"ISO 4217 코드는 실제 통화를 나타내는 반면, NUC는 운임을 통화 간에 환산하기 위해 내부적으로 사용되는 운임 산정용 중립 단위이며 ISO 4217 통화가 아니다.","targetId":"nuc"}],"sources":[{"name":"ISO 4217 Currency codes","org":"ISO","version":"","section":"","url":"https://www.iso.org/iso-4217-currency-codes.html"}],"lastReviewed":"2026-06-15"},{"id":"journey","term":"Journey","term_ko":"여정","abbreviation":"","aliases":["Itinerary","Travel Journey"],"category":"air-shop","conceptType":"business-term","status":"active","definition":"A journey is the complete travel a passenger undertakes from the point of origin to final destination, including all flights and any return or onward portions. In shopping and ordering it is the end-to-end itinerary against which offers are constructed.","definition_ko":"여정(journey)은 승객이 출발지에서 최종 목적지까지 수행하는 전체 여행으로, 모든 항공편과 귀환 또는 후속 구간을 포함한다. 쇼핑 및 주문(ordering) 단계에서는 오퍼가 구성되는 기준이 되는 처음부터 끝까지의 전체 일정이다.","longDef":"A journey encompasses one or more O&Ds: a one-way journey is a single O&D, a round trip is typically two O&Ds, and multi-city travel comprises several. For pricing, a journey is decomposed into fare components, each priced over an O&D, which are then summed. In NDC shopping, a journey (or origin-destination request) defines the trip for which offers and orders are produced. The journey aggregates segments and legs into the traveler's overall trip view.","longDef_ko":"여정은 하나 이상의 O&D를 포함한다. 편도 여정은 하나의 O&D이고, 왕복은 일반적으로 두 개의 O&D이며, 다구간(multi-city) 여행은 여러 개로 구성된다. 운임 산정 시 여정은 각각 O&D 단위로 가격이 매겨지는 운임 컴포넌트로 분해된 뒤 합산된다. NDC 쇼핑에서는 여정(또는 origin-destination 요청)이 오퍼와 주문이 생성되는 대상 여행을 정의한다. 여정은 세그먼트와 레그를 여행자의 전체 여행 관점으로 집계한다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Origin & Destination","targetId":"origin-destination"},{"type":"related","targetTerm":"Fare Component","targetId":"fare-component"},{"type":"related","targetTerm":"Segment","targetId":"segment"},{"type":"related","targetTerm":"Offer","targetId":"offer"},{"type":"related","targetTerm":"Order","targetId":"order"}],"distinctions":[{"targetTerm":"Origin & Destination","explanation":"A journey is the whole trip; an O&D is a single directional point-pair, and a journey may contain several O&Ds.","explanation_ko":"여정은 전체 여행이고, O&D는 방향성을 가진 하나의 지점 쌍이며, 한 여정은 여러 O&D를 포함할 수 있다.","targetId":"origin-destination"},{"targetTerm":"Segment","explanation":"A segment is one priced/booked flight portion within a journey; the journey is the full set of segments end to end.","explanation_ko":"세그먼트는 여정 내에서 가격이 매겨지거나 예약된 하나의 비행 구간이고, 여정은 처음부터 끝까지의 전체 세그먼트 집합이다.","targetId":"segment"}],"sources":[{"name":"IATA NDC / Offer and Order management standards","org":"IATA","version":"","section":"","url":""},{"name":"IATA fare construction principles","org":"IATA","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"leg","term":"Leg","abbreviation":"","aliases":["Flight Leg","Hop"],"category":"air-ops","conceptType":"business-term","status":"active","definition":"A leg is a single physical movement of an aircraft from one takeoff (departure airport) to the next landing (arrival airport). It is the operational building block of a flight; a flight number may operate over one or more legs.","definition_ko":"leg(운항 구간)은 한 번의 이륙(출발 공항)에서 다음 착륙(도착 공항)까지의 항공기 단일 물리적 이동이다. 항공편의 운영상 기본 단위이며, 하나의 편명이 하나 이상의 leg으로 운항될 수 있다.","term_ko":"운항 구간(Leg)","longDef":"Legs describe the operational reality of an aircraft's routing, used in schedule data (e.g., SSIM leg records) and operations control. A multi-leg flight under a single flight number (a through or direct flight) presents to the buyer as one segment but is operated as two or more legs, each with its own departure/arrival times and possibly different equipment.","longDef_ko":"leg은 항공기 노선의 운영상 실제를 나타내며, 스케줄 데이터(예: SSIM leg 레코드)와 운항 통제에 사용된다. 단일 편명으로 운항되는 여러 leg 항공편(through 또는 직항편)은 구매자에게는 하나의 segment로 표시되지만, 각각 고유한 출발/도착 시각과 경우에 따라 다른 기재(equipment)를 가진 둘 이상의 leg으로 운항된다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"child","targetTerm":"Segment","targetId":"segment"},{"type":"related","targetTerm":"Schedule Change","targetId":"schedule-change"}],"distinctions":[{"targetTerm":"Segment","explanation":"A leg is one physical takeoff-to-landing hop, while a segment is the sold/marketed flight under one flight number that may span several legs.","explanation_ko":"leg은 하나의 물리적 이착륙 구간인 반면, segment는 여러 leg에 걸칠 수 있는, 하나의 편명으로 판매·마케팅되는 항공편이다.","targetId":"segment"}],"sources":[{"name":"Standard Schedules Information Manual (SSIM)","org":"IATA","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"length-of-stay","term":"Length of Stay","term_ko":"숙박일수(LOS, Length of Stay)","abbreviation":"LOS","aliases":["LOS","Stay Length","Minimum Length of Stay","Maximum Length of Stay"],"category":"hotel-rate","conceptType":"business-term","status":"active","definition":"Length of Stay is the number of nights of a hotel booking, and as a rate control it refers to restrictions tied to that duration — most commonly Minimum Length of Stay (MinLOS) and Maximum Length of Stay (MaxLOS) — used to qualify or block availability for a rate plan on specific dates. Related controls include length-of-stay-based pricing and arrival-day restrictions.","definition_ko":"LOS(Length of Stay)는 호텔 예약의 숙박 일수를 의미하며, 요금 통제 수단으로서는 그 기간에 연동된 제약(가장 흔히 최소 숙박일수(MinLOS)와 최대 숙박일수(MaxLOS))을 가리킨다. 이는 특정 날짜에 요금제의 가용 여부를 한정하거나 차단하는 데 사용된다. 관련 통제로는 숙박일수 기반 가격 산정과 도착일 제약이 있다.","longDef":"Revenue managers use LOS restrictions to shape demand: a MinLOS requires guests to book at least N nights to be eligible (or to receive a rate) on a given arrival date, while MaxLOS caps the bookable duration. Variants include MinLOS Through and Closed to Arrival (CTA) / Closed to Departure (CTD), which interact with stay-through logic. LOS controls are distributed as restriction attributes alongside rates and availability in CRS, channel managers, and ARI/OpenTravel messages.","longDef_ko":"수익 관리자는 수요를 조정하기 위해 LOS 제약을 사용한다. MinLOS는 특정 도착일에 자격을 얻거나(또는 해당 요금을 받기) 위해 투숙객이 최소 N박을 예약하도록 요구하고, MaxLOS는 예약 가능한 기간에 상한을 둔다. 변형으로는 stay-through 로직과 상호작용하는 MinLOS Through, Closed to Arrival(CTA) / Closed to Departure(CTD)가 있다. LOS 통제는 CRS, 채널 매니저, ARI/OpenTravel 메시지에서 요금 및 가용 정보와 함께 제약 속성으로 유통된다.","standardBody":"OpenTravel Alliance","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Rate Plan","targetId":"rate-plan"},{"type":"related","targetTerm":"ARI","targetId":"ari"},{"type":"related","targetTerm":"BAR","targetId":"bar"}],"distinctions":[{"targetTerm":"Rate Plan","explanation":"Length of Stay is a restriction/control that can gate a rate plan; the rate plan is the broader offer that the LOS rule conditions.","explanation_ko":"숙박일수는 요금제를 제한할 수 있는 제약/통제이고, 요금제는 LOS 규칙이 조건을 거는 더 넓은 범위의 상품이다.","targetId":"rate-plan"}],"sources":[{"name":"OpenTravel Specification (Hotel availability and restriction messages, length of stay)","org":"OpenTravel Alliance","version":"","section":"","url":""},{"name":"HTNG ARI messaging specifications","org":"HTNG","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"loyalty-tier-status","term":"Loyalty Tier Status","term_ko":"로열티 등급 상태 (우수 등급)","abbreviation":"","aliases":["Elite Status","Tier Status","Membership Tier","Frequent Flyer Tier"],"category":"customer","conceptType":"business-term","status":"active","definition":"The graded level a member holds within a Frequent Flyer Program (e.g. Silver, Gold, Platinum), earned through qualifying activity and conferring escalating benefits such as priority services, lounge access, extra baggage and upgrade eligibility. Status is typically tied to the member's Frequent Flyer Number and recalculated each qualification period.","definition_ko":"회원이 FFP 내에서 보유하는 등급화된 수준(예: 실버, 골드, 플래티넘)으로, 자격 산정 활동을 통해 획득하며 우선 서비스, 라운지 이용, 추가 수하물, 업그레이드 자격 등 단계적으로 상향되는 혜택을 부여한다. 등급 상태는 통상 회원의 Frequent Flyer Number에 연동되며 자격 산정 기간마다 재산정된다.","longDef":"Tiers are usually achieved by accumulating tier/status points, qualifying miles, or qualifying segments within a defined window, and they map to alliance-wide recognition levels (for example Star Alliance Silver/Gold or oneworld Ruby/Sapphire/Emerald) so benefits travel across partne
