r carriers. A member's tier influences service handling encoded in a reservation and drives differentiated offers. Tier status is a property of an individual member, not of the program as a whole.","longDef_ko":"등급은 일반적으로 정해진 기간 내에 등급/상태 포인트, 자격 마일리지 또는 자격 구간을 누적하여 달성하며, 동맹 전반의 인정 등급(예: Star Alliance의 Silver/Gold 또는 oneworld의 Ruby/Sapphire/Emerald)에 매핑되어 혜택이 제휴 항공사 간에 이어진다. 회원의 등급은 예약에 기록되는 서비스 처리에 영향을 주고 차별화된 제안을 이끈다. 등급 상태는 프로그램 전체가 아니라 개별 회원의 속성이다.","standardBody":"","providerTerms":[],"relationships":[{"type":"child","targetTerm":"Frequent Flyer Program","targetId":"frequent-flyer-program"},{"type":"related","targetTerm":"Frequent Flyer Number","targetId":"frequent-flyer-number"},{"type":"related","targetTerm":"Customer Profile","targetId":"customer-profile"}],"distinctions":[{"targetTerm":"Frequent Flyer Program","explanation":"Tier status is one member's earned standing; the program is the overall scheme that defines the tiers.","explanation_ko":"등급 상태는 한 회원이 획득한 위상이고, 프로그램은 그 등급들을 정의하는 전체 제도이다.","targetId":"frequent-flyer-program"},{"targetTerm":"Frequent Flyer Number","explanation":"The number identifies the account; the tier status is the benefit level attached to that account.","explanation_ko":"번호는 계정을 식별하고, 등급 상태는 그 계정에 부여된 혜택 수준이다.","targetId":"frequent-flyer-number"}],"sources":[{"name":"Star Alliance tier recognition (program documentation)","org":"Star Alliance","version":"","section":"","url":""},{"name":"oneworld tier recognition (program documentation)","org":"oneworld","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"marketing-carrier","term":"Marketing Carrier","term_ko":"판매 항공사(마케팅 캐리어)","abbreviation":"","aliases":["Marketing Airline","Selling Carrier"],"category":"air-partner","conceptType":"role","status":"active","definition":"The airline whose designator code and flight number appear on a ticket or in a reservation for a given flight, and which markets and sells that flight to the customer. On a codeshare flight the marketing carrier may differ from the airline that physically operates the flight.","definition_ko":"특정 항공편에 대해 항공권이나 예약에 자사의 지정자 코드와 편명이 표시되며, 해당 항공편을 고객에게 마케팅하고 판매하는 항공사. 공동운항편에서는 판매 항공사가 실제로 항공편을 운항하는 항공사와 다를 수 있다.","longDef":"In a codeshare relationship the marketing carrier is the airline placing its code on the flight, regardless of who operates the aircraft. The marketing carrier's flight number is what the passenger sees at booking, and disclosure rules require informing the passenger of the underlying operating carrier. The marketing carrier is distinct from the validating carrier, which is the carrier whose stock and accounting are used to issue the ticket.","longDef_ko":"공동운항 관계에서 판매 항공사는 누가 항공기를 운항하는지와 무관하게 자사의 코드를 항공편에 부여하는 항공사다. 승객이 예약 시 보게 되는 것은 판매 항공사의 편명이며, 고지 규정에 따라 그 기반이 되는 운항 항공사를 승객에게 알려야 한다. 판매 항공사는 발권 항공사(validating carrier), 즉 항공권 발권에 그 항공권 양식과 회계가 사용되는 항공사와는 구별된다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Operating Carrier","targetId":"operating-carrier"},{"type":"related","targetTerm":"Codeshare","targetId":"codeshare"},{"type":"related","targetTerm":"Airline Designator","targetId":"airline-designator"},{"type":"related","targetTerm":"Validating Carrier","targetId":"validating-carrier"}],"distinctions":[{"targetTerm":"Operating Carrier","explanation":"The marketing carrier sells the flight under its code; the operating carrier physically flies the aircraft.","explanation_ko":"판매 항공사는 자사의 코드로 항공편을 판매하고, 운항 항공사는 실제로 항공기를 운항한다.","targetId":"operating-carrier"},{"targetTerm":"Validating Carrier","explanation":"The marketing carrier owns the flight code shown to the passenger; the validating carrier is the airline on whose document/stock the ticket is issued and settled.","explanation_ko":"판매 항공사는 승객에게 표시되는 편명 코드를 보유하고, 발권 항공사는 그 항공권 서류/양식을 사용해 항공권이 발권되고 정산되는 항공사다.","targetId":"validating-carrier"}],"sources":[{"name":"Standard Schedules Information Manual (SSIM)","org":"IATA","version":"","section":"","url":""},{"name":"DOT rules on disclosure of code-share arrangements","org":"U.S. Department of Transportation","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"married-segment","term":"Married Segment","abbreviation":"","aliases":["Married Segments","Married Segment Logic","Segment Marriage"],"category":"air-ops","conceptType":"business-term","status":"active","definition":"Married segments are two or more connecting segments that an airline links together in availability and inventory control so they must be sold, modified, and cancelled as a single inseparable unit. The logic prevents agents from breaking the connection to access more favorable class availability that the airline would not offer for the individual local segment.","definition_ko":"married segment(결합 구간)는 항공사가 좌석 가용성 및 재고 통제에서 함께 연결하여, 분리할 수 없는 하나의 단위로 판매·변경·취소해야 하는 둘 이상의 연결 segment를 말한다. 이 로직은 항공사가 개별 로컬 segment에 대해서는 제공하지 않을 더 유리한 등급 가용성에 접근하기 위해 에이전트가 연결을 임의로 분리하는 것을 방지한다.","term_ko":"결합 구간(Married Segment)","longDef":"Carriers use married-segment logic so that availability returned for a connection (origin-to-destination) reflects the airline's O&D revenue-management decision rather than the standalone availability of each point-to-point leg. Attempting to cancel or split one married segment, or to book it separately at a class only offered for the through journey, is rejected by the host inventory system. This is a key mechanism enforcing O&D control and limiting 'cross-class' or married-segment abuse.","longDef_ko":"항공사는 연결편(출발지에서 도착지)에 반환되는 가용성이 각 지점 간 leg의 독립적인 가용성이 아니라 항공사의 O&D 수익 관리(revenue management) 결정을 반영하도록 married-segment 로직을 사용한다. 하나의 married segment를 취소하거나 분리하려는 시도, 또는 통과 여정(through journey)에 대해서만 제공되는 등급으로 별도 예약하려는 시도는 호스트 재고 시스템에 의해 거부된다. 이는 O&D 통제를 강제하고 'cross-class' 또는 married-segment 남용을 제한하는 핵심 메커니즘이다.","standardBody":"","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Segment","targetId":"segment"},{"type":"related","targetTerm":"Availability","targetId":"availability"},{"type":"related","targetTerm":"Origin & Destination","targetId":"origin-destination"},{"type":"related","targetTerm":"RBD","targetId":"rbd"}],"distinctions":[{"targetTerm":"Passive Segment","explanation":"A married segment is a live, inventory-controlled connection sold as a unit, whereas a passive segment is an informational segment that does not draw on the operating carrier's inventory.","explanation_ko":"married segment는 하나의 단위로 판매되는, 재고 통제를 받는 실시간 연결편인 반면, passive segment는 운항 항공사의 재고를 차감하지 않는 정보성 segment다.","targetId":"passive-segment"}],"sources":[{"name":"Passenger Services Conference Resolutions Manual (PSCRM)","org":"IATA","version":"","section":"","url":""},{"name":"Amadeus Functional Documentation — Availability and Married Segment Logic","org":"Amadeus","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"mct","term":"MCT","abbreviation":"MCT","aliases":["Minimum Connecting Time","Minimum Connect Time"],"category":"air-ops","conceptType":"standard-term","status":"active","definition":"Minimum Connecting Time (MCT) is the shortest published time interval required for a passenger and their baggage to transfer between two flights at a given airport for the connection to be considered legal and bookable. It varies by airport, terminal, domestic/international status, and carrier combination.","definition_ko":"MCT(Minimum Connecting Time, 최소 연결 시간)는 특정 공항에서 두 항공편 간 승객과 수하물이 환승하는 데 필요한, 해당 연결이 정상적이고 예약 가능한 것으로 간주되기 위한 최소 공시 시간 간격이다. 공항, 터미널, 국내/국제 여부, 항공사 조합에 따라 달라진다.","term_ko":"최소 연결 시간(MCT)","longDef":"MCT values are published by airports and carriers and aggregated by IATA in standard reference data, and reservation/availability systems use them to validate whether a connection is legal before offering it. Distinct MCTs apply to combinations such as domestic-to-domestic, domestic-to-international, international-to-international, and online versus interline connections. A connection shorter than the applicable MCT is normally rejected by booking systems as an illegal connection.","longDef_ko":"MCT 값은 공항과 항공사가 공시하고 IATA가 표준 참조 데이터로 집계하며, 예약/가용성 시스템은 연결편을 제공하기 전에 해당 연결이 정상적인지 검증하는 데 이를 사용한다. 국내-국내, 국내-국제, 국제-국제, 그리고 online(자사) 연결과 interline 연결과 같은 조합에 각각 다른 MCT가 적용된다. 적용 MCT보다 짧은 연결은 일반적으로 예약 시스템에 의해 비정상 연결(illegal connection)로 거부된다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Segment","targetId":"segment"},{"type":"related","targetTerm":"Journey","targetId":"journey"},{"type":"related","targetTerm":"Interline","targetId":"interline"},{"type":"related","targetTerm":"Availability","targetId":"availability"}],"distinctions":[{"targetTerm":"Slot","explanation":"MCT is the minimum passenger/baggage transfer time governing connection legality, whereas a slot is an allocated airport authorization to use runway/terminal capacity at a specific time.","explanation_ko":"MCT는 연결 적법성을 좌우하는 승객/수하물의 최소 환승 시간인 반면, slot은 특정 시각에 활주로/터미널 용량을 사용하도록 배정된 공항 허가다.","targetId":"slot"}],"sources":[{"name":"Standard Schedules Information Manual (SSIM)","org":"IATA","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"merchant-model","term":"Merchant Model","abbreviation":"","aliases":["Merchant of Record Model","Net Rate Model"],"category":"pay","conceptType":"business-term","status":"active","definition":"The merchant model is a travel distribution arrangement in which the intermediary (e.g. an OTA) buys inventory from suppliers at net rates, sets the retail price including markup, collects payment from the traveler, and acts as the Merchant of Record. The intermediary's name appears on the customer's card statement and it remits the supplier its share.","term_ko":"머천트 모델","definition_ko":"머천트 모델은 중개업체(예: OTA)가 공급업체로부터 재고를 넷 요금(net rate)으로 매입하여 마크업을 포함한 소매가를 책정하고, 여행객으로부터 결제를 수납하며, Merchant of Record 역할을 하는 여행 유통 방식이다. 고객의 카드 명세서에는 중개업체의 명의가 표시되며, 중개업체는 공급업체에 해당 몫을 송금한다.","longDef":"The merchant model, used widely by OTAs for hotel inventory, gives the intermediary control over pricing and margin and ownership of the payment relationship, along with the associated payment liability, refunds, and chargeback risk. It contrasts with the agency model, where the supplier sets the price and is the Merchant of Record.","longDef_ko":"OTA가 호텔 재고에 널리 사용하는 머천트 모델은 중개업체에 가격과 마진에 대한 통제권 및 결제 관계의 소유권을 부여하며, 이에 따른 결제 책임, 환불, 차지백 위험도 함께 부담하게 한다. 이는 공급업체가 가격을 책정하고 Merchant of Record가 되는 에이전시 모델과 대비된다.","standardBody":"","providerTerms":[],"relationships":[{"type":"contrasts","targetTerm":"Agency Model","targetId":"agency-model"},{"type":"related","targetTerm":"Merchant of Record","targetId":"merchant-of-record"},{"type":"related","targetTerm":"Net Rate","targetId":"net-rate"},{"type":"related","targetTerm":"VCC","targetId":"vcc"},{"type":"related","targetTerm":"OTA (Online Travel Agency)","targetId":"ota-online-travel-agency"}],"distinctions":[{"targetTerm":"Agency Model","explanation":"Under the merchant model the intermediary sets the price and is Merchant of Record; under the agency model the supplier does.","explanation_ko":"머천트 모델에서는 중개업체가 가격을 책정하고 Merchant of Record가 되며, 에이전시 모델에서는 공급업체가 그 역할을 한다.","targetId":"agency-model"},{"targetTerm":"Net Rate","explanation":"Net rates are the wholesale buying price the intermediary marks up under the merchant model.","explanation_ko":"넷 요금(net rate)은 머천트 모델에서 중개업체가 마크업을 적용하는 도매 매입가다.","targetId":"net-rate"}],"sources":[{"name":"Merchant model vs. agency model: A guide for business success","org":"WEX Inc.","version":"","section":"","url":"https://www.wexinc.com/resources/blog/merchant-vs-agency-model-travel-payments/"},{"name":"Merchant of Record in Travel: OTA's Guide to Owning the Payment Flow","org":"AltexSoft","version":"","section":"","url":"https://www.altexsoft.com/blog/merchant-of-record-in-travel/"}],"lastReviewed":"2026-06-15"},{"id":"merchant-of-record","term":"Merchant of Record","abbreviation":"MoR","aliases":["MoR","Merchant on Record"],"category":"pay","conceptType":"role","status":"active","definition":"The Merchant of Record is the legal entity that accepts the customer's payment and is responsible for processing the card transaction, including tax handling, refunds, and chargeback liability. In travel, the MoR is the name that appears on the customer's card statement for a booking.","term_ko":"기록상 가맹점(Merchant of Record, MoR)","definition_ko":"기록상 가맹점(Merchant of Record, MoR)은 고객의 결제를 수납하고 세금 처리, 환불, 차지백 책임을 포함한 카드 거래 처리를 담당하는 법적 주체다. 여행 업계에서 MoR은 예약 건에 대해 고객의 카드 명세서에 표시되는 명의다.","longDef":"Whether the supplier or the intermediary is the MoR depends on the distribution model. Under the agency model the supplier is the MoR; under the merchant model the OTA or agency is the MoR, collecting payment from the traveler and remitting suppliers their share. Being the MoR carries compliance obligations (PCI DSS, SCA/3-D Secure where applicable) and the financial liability for disputes and chargebacks.","longDef_ko":"공급업체와 중개업체 중 누가 MoR이 되는지는 유통 모델에 따라 달라진다. 에이전시 모델에서는 공급업체가 MoR이고, 머천트 모델에서는 OTA 또는 여행사가 MoR이 되어 여행객으로부터 결제를 수납하고 공급업체에 해당 몫을 송금한다. MoR이 된다는 것은 규정 준수 의무(PCI DSS, 해당되는 경우 SCA/3-D Secure)와 분쟁 및 차지백에 대한 재무적 책임을 수반한다.","standardBody":"","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Agency Model","targetId":"agency-model"},{"type":"related","targetTerm":"Merchant Model","targetId":"merchant-model"},{"type":"related","targetTerm":"Chargeback","targetId":"chargeback"},{"type":"related","targetTerm":"OTA (Online Travel Agency)","targetId":"ota-online-travel-agency"}],"distinctions":[{"targetTerm":"Agency Model","explanation":"In the agency model the supplier is the Merchant of Record; the role describes who bears payment responsibility, not the commercial model itself.","explanation_ko":"에이전시 모델에서는 공급업체가 Merchant of Record이다. 이 역할은 상업적 모델 자체가 아니라 결제 책임을 누가 지는지를 나타낸다.","targetId":"agency-model"},{"targetTerm":"Merchant Model","explanation":"In the merchant model the intermediary becomes the Merchant of Record and shows on the cardholder's statement.","explanation_ko":"머천트 모델에서는 중개업체가 Merchant of Record가 되어 카드 소지자의 명세서에 표시된다.","targetId":"merchant-model"}],"sources":[{"name":"Merchant of Record in Travel: OTA's Guide to Owning the Payment Flow","org":"AltexSoft","version":"","section":"","url":"https://www.altexsoft.com/blog/merchant-of-record-in-travel/"},{"name":"Merchant model vs. agency model: A guide for business success","org":"WEX Inc.","version":"","section":"","url":"https://www.wexinc.com/resources/blog/merchant-vs-agency-model-travel-payments/"}],"lastReviewed":"2026-06-15"},{"id":"metasearch","term":"Metasearch","term_ko":"메타서치(가격 비교 검색)","abbreviation":"","aliases":["Metasearch Engine","Travel Metasearch","Price Comparison Engine"],"category":"standards","conceptType":"business-term","status":"active","definition":"A travel metasearch engine aggregates and compares prices and availability for flights, hotels, or other travel products across many OTAs and suppliers, then refers the user to the chosen site to complete the booking. Examples include Kayak, Skyscanner, Google Flights, and Trivago.","definition_ko":"여행 메타서치 엔진은 여러 OTA와 공급사에 걸쳐 항공편, 호텔 등 여행 상품의 가격과 가용성을 통합하여 비교한 뒤, 사용자가 선택한 사이트로 연결해 예약을 완료하도록 한다. Kayak, Skyscanner, Google Flights, Trivago 등이 그 예이다.","longDef":"Metasearch typically monetizes via referral fees, cost-per-click, or commission rather than processing the transaction itself, though some operate 'book-on-metasearch' facilitated bookings. It is distinct from an OTA, which completes and owns the customer transaction.","longDef_ko":"메타서치는 일반적으로 거래를 직접 처리하기보다 추천 수수료, 클릭당 비용(CPC), 커미션을 통해 수익을 올리지만, 일부는 '북 온 메타서치(book-on-metasearch)' 방식의 중개 예약을 운영하기도 한다. 고객 거래를 완료하고 소유하는 OTA와는 구별된다.","standardBody":"","providerTerms":[],"relationships":[{"type":"related","targetTerm":"OTA (Online Travel Agency)","targetId":"ota-online-travel-agency"},{"type":"related","targetTerm":"Aggregator","targetId":"aggregator"},{"type":"related","targetTerm":"GDS","targetId":"gds"}],"distinctions":[{"targetTerm":"OTA (Online Travel Agency)","explanation":"Metasearch compares prices and refers out; an OTA actually sells and processes the booking.","explanation_ko":"메타서치는 가격을 비교하고 외부로 연결하며, OTA는 실제로 예약을 판매하고 처리한다.","targetId":"ota-online-travel-agency"},{"targetTerm":"Aggregator","explanation":"Metasearch is a consumer-facing comparison/referral product; an aggregator is a back-end content consolidator that pools supplier inventory for resellers.","explanation_ko":"메타서치는 소비자 대상 비교/연결 서비스이고, 애그리게이터는 재판매자를 위해 공급사 재고를 모으는 백엔드 콘텐츠 통합자이다.","targetId":"aggregator"}],"sources":[{"name":"Travel Metasearch (industry definition)","org":"Phocuswright / industry usage","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"mita","term":"MITA","term_ko":"MITA(다자간 인터라인 운송 협정)","abbreviation":"MITA","aliases":["Multilateral Interline Traffic Agreement","Multilateral Interline Traffic Agreements","IATA MITA"],"category":"air-partner","conceptType":"document","status":"active","definition":"The IATA Multilateral Interline Traffic Agreements, a standardized framework that lets participating airlines (and accredited agents) accept each other's traffic documents and through-check passengers and baggage under common terms. Joining MITA establishes default interline relationships with other signatories rather than requiring individual bilateral agreements.","definition_ko":"IATA의 다자간 인터라인 운송 협정으로, 참여 항공사(및 인가 대리점)가 공통 조건 하에 서로의 운송 서류를 인수하고 승객과 수하물을 일관 위탁할 수 있도록 하는 표준화된 체계다. MITA에 가입하면 개별 양자 협정을 맺을 필요 없이 다른 서명 당사자들과 기본 인터라인 관계가 성립된다.","longDef":"MITA covers passenger and/or cargo interlining and defines the standard conditions under which carriers honor one another's tickets and handle baggage and settlement. Participation is recorded so trading partners know who interlines with whom; carriers can be MITA participants for passenger, cargo, or both. MITA provides the baseline relationship over which carriers may layer bilateral Special Prorate Agreements and codeshare deals.","longDef_ko":"MITA는 여객 및/또는 화물 인터라인을 포괄하며, 항공사가 서로의 항공권을 인정하고 수하물과 정산을 처리하는 표준 조건을 정의한다. 어느 항공사가 누구와 인터라인하는지 거래 파트너가 알 수 있도록 참여 여부가 기록되며, 항공사는 여객, 화물 또는 둘 다에 대해 MITA 참여자가 될 수 있다. MITA는 항공사가 그 위에 양자 간 SPA와 공동운항 거래를 추가로 얹을 수 있는 기준 관계를 제공한다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Interline","targetId":"interline"},{"type":"related","targetTerm":"SPA (Special Prorate Agreement)","targetId":"spa-special-prorate-agreement"},{"type":"related","targetTerm":"Proration","targetId":"proration"},{"type":"related","targetTerm":"IATA Clearing House","targetId":"iata-clearing-house"}],"distinctions":[{"targetTerm":"Interline","explanation":"Interline is the general practice of cross-carrier ticket/baggage acceptance; MITA is the specific IATA multilateral agreement that standardizes it among signatories.","explanation_ko":"인터라인은 항공사 간 항공권/수하물 인수의 일반적인 관행이고, MITA는 서명 당사자들 사이에서 이를 표준화하는 구체적인 IATA 다자간 협정이다.","targetId":"interline"},{"targetTerm":"SPA (Special Prorate Agreement)","explanation":"MITA is multilateral and sets the standard relationship; an SPA is bilateral and sets negotiated special prorate values between two carriers.","explanation_ko":"MITA는 다자간 협정으로 표준 관계를 설정하고, SPA는 양자 간 협정으로 두 항공사 사이의 협상된 특별 프로레이트 값을 설정한다.","targetId":"spa-special-prorate-agreement"}],"sources":[{"name":"Multilateral Interline Traffic Agreements (MITA)","org":"IATA","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"name-change","term":"Name Change","term_ko":"이름 변경","abbreviation":"","aliases":["Name Correction","Passenger Name Change","Name Adjustment"],"category":"customer","conceptType":"process","status":"active","definition":"Altering the passenger name on a booking or ticket, ranging from a minor spelling correction to substituting a different traveler. Because most published airline fares and e-tickets are non-transferable, true name changes are generally prohibited while limited name corrections may be permitted under fare rules.","definition_ko":"예약이나 항공권상의 승객 이름을 변경하는 것으로, 사소한 철자 정정부터 다른 여행자로의 교체까지 포함한다. 대부분의 공시 항공 운임과 전자 항공권은 양도가 불가하므로, 진정한 의미의 이름 변경은 일반적으로 금지되며 제한적인 이름 정정만이 운임 규정에 따라 허용될 수 있다.","longDef":"Carriers distinguish between a name correction (fixing typos, transposed letters, or adding a middle name to match a government ID, especially for Secure Flight compliance) and a name change/transfer (replacing one passenger with another), which is usually not allowed on scheduled fares and would require cancellation and rebooking. Allowed corrections may trigger a reissue and fees, and must keep the name consistent with the traveler's identity document. Name handling interacts with SSR data such as DOCS/Secure Flight elements and with ticket validity.","longDef_ko":"항공사는 이름 정정(특히 Secure Flight 준수를 위해 오타·자리바뀐 철자 수정이나 정부 발급 신분증과 일치시키기 위한 중간 이름 추가)과 이름 변경/양도(한 승객을 다른 승객으로 교체)를 구분하며, 후자는 정기편 운임에서는 통상 허용되지 않고 취소 및 재예약이 필요하다. 허용된 정정은 재발행과 수수료를 유발할 수 있으며, 이름은 여행자의 신분 증명서와 일치하게 유지되어야 한다. 이름 처리는 DOCS/Secure Flight 요소 같은 SSR 데이터 및 항공권 유효성과 연계된다.","standardBody":"","providerTerms":[],"relationships":[{"type":"related","targetTerm":"PNR","targetId":"pnr"},{"type":"related","targetTerm":"Reissue","targetId":"reissue"},{"type":"related","targetTerm":"E-ticket","targetId":"e-ticket"},{"type":"related","targetTerm":"Secure Flight","targetId":"secure-flight"}],"distinctions":[{"targetTerm":"Reissue","explanation":"A name change is a data correction that may require ticket action; a reissue is the broader ticketing transaction (often triggered by such changes) that produces a new e-ticket.","explanation_ko":"이름 변경은 항공권 조치가 필요할 수 있는 데이터 정정이고, 재발행(Reissue)은 이러한 변경으로 흔히 유발되어 새 전자 항공권을 생성하는 보다 포괄적인 발권 거래이다.","targetId":"reissue"}],"sources":[{"name":"ATPCO Automated Rules (fare rule conditions)","org":"ATPCO","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"ndc","term":"NDC","term_ko":"신유통역량(NDC)","abbreviation":"NDC","aliases":["New Distribution Capability"],"category":"standards","conceptType":"standard","status":"active","definition":"New Distribution Capability is an IATA-led, XML-based data transmission standard that enables airlines to distribute rich, personalized content (including ancillaries, branded fares, and dynamic offers) directly to travel sellers, independent of traditional GDS/EDIFACT messaging. It uses an Offer/Order data model.","definition_ko":"NDC는 IATA가 주도하는 XML 기반 데이터 전송 표준으로, 항공사가 부가 서비스, 브랜디드 운임, 동적 오퍼(Offer)를 포함한 풍부하고 개인화된 콘텐츠를 기존 GDS/EDIFACT 메시징과 무관하게 여행 판매자에게 직접 유통할 수 있게 한다. Offer/Order 데이터 모델을 사용한다.","longDef":"NDC defines a suite of XML schemas (e.g., AirShopping, OfferPrice, OrderCreate, OrderRetrieve) under IATA's Passenger Standards Conference. It supports product differentiation and dynamic pricing that legacy ATPCO filed-fare/availability messaging cannot fully express, and is a foundational standard alongside ONE Order in IATA's move toward an Offer-and-Order retailing model.","longDef_ko":"NDC는 IATA 여객표준회의(Passenger Standards Conference) 산하에서 일련의 XML 스키마(예: AirShopping, OfferPrice, OrderCreate, OrderRetrieve)를 정의한다. 기존 ATPCO 등록 운임/가용성 메시징으로는 충분히 표현할 수 없는 상품 차별화와 동적 가격 책정을 지원하며, IATA가 추진하는 Offer-and-Order 리테일링 모델에서 ONE Order와 함께 핵심 기반 표준이다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"GDS","targetId":"gds"},{"type":"related","targetTerm":"Offer","targetId":"offer"},{"type":"related","targetTerm":"Order","targetId":"order"},{"type":"related","targetTerm":"ONE Order","targetId":"one-order"},{"type":"related","targetTerm":"Ancillary Service","targetId":"ancillary-service"},{"type":"related","targetTerm":"Fare Family","targetId":"fare-family"},{"type":"contrasts","targetTerm":"OpenTravel Alliance","targetId":"opentravel-alliance"}],"distinctions":[{"targetTerm":"GDS","explanation":"NDC is a messaging standard for distributing content; a GDS is a distribution platform that may carry NDC or legacy content.","explanation_ko":"NDC는 콘텐츠를 유통하기 위한 메시징 표준이고, GDS는 NDC 콘텐츠나 레거시 콘텐츠를 실어 나를 수 있는 유통 플랫폼이다.","targetId":"gds"},{"targetTerm":"OpenTravel Alliance","explanation":"NDC is IATA's air-distribution XML standard; OpenTravel is a separate, broader cross-sector travel XML schema body.","explanation_ko":"NDC는 IATA의 항공 유통 XML 표준이고, OpenTravel은 이와 별개로 여러 산업 분야를 아우르는 더 광범위한 여행 XML 스키마 단체이다.","targetId":"opentravel-alliance"},{"targetTerm":"ONE Order","explanation":"NDC standardizes shopping/booking offers and orders; ONE Order standardizes the single customer order record that replaces PNR/e-ticket/EMD.","explanation_ko":"NDC는 조회/예약 단계의 오퍼와 주문을 표준화하고, ONE Order는 PNR/e-ticket/EMD를 대체하는 단일 고객 주문 기록을 표준화한다.","targetId":"one-order"}],"sources":[{"name":"New Distribution Capability (NDC)","org":"IATA","version":"","section":"","url":""},{"name":"NDC Standards / Passenger Standards Conference","org":"IATA","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"net-rate","term":"Net Rate","term_ko":"순 요금(Net Rate, 도매 요금)","abbreviation":"","aliases":["Wholesale Rate","Nett Rate","Net Price"],"category":"hotel-dist","conceptType":"business-term","status":"active","definition":"A net rate is a wholesale, non-commissionable room rate that a hotel contracts to a reseller (such as a bedbank, tour operator, or OTA under the merchant model). The reseller adds its own markup to reach the price shown to the traveler, so its margin is the difference between the selling price and the net rate rather than a commission.","definition_ko":"순 요금(Net Rate)은 호텔이 재판매업체(베드뱅크, 투어 오퍼레이터, 또는 머천트 모델 하의 OTA 등)에 계약하는 도매·비커미션 객실 요금이다. 재판매업체는 자체 마크업을 붙여 여행자에게 보이는 가격을 산정하므로, 그 마진은 커미션이 아니라 판매 가격과 순 요금의 차액이다.","longDef":"Net rates are the basis of the merchant/wholesale distribution model: the hotel receives the agreed net amount and the intermediary keeps any markup. This contrasts with the agency/commissionable model, where the guest pays the hotel's published rate and the agent earns a percentage commission. Net rates are central to bedbanks and packaged/opaque inventory, and their leakage into public channels is a frequent rate parity concern.","longDef_ko":"순 요금은 머천트/도매 분배 모델의 기반이다. 호텔은 합의된 순 금액을 받고 중개자는 마크업을 모두 가져간다. 이는 고객이 호텔의 공시 요금을 지불하고 대리점이 일정 비율의 커미션을 받는 에이전시/커미션 모델과 대비된다. 순 요금은 베드뱅크와 패키지/불투명 인벤토리의 핵심이며, 그것이 공개 채널로 유출되는 것은 빈번한 요금 패리티 우려 사항이다.","standardBody":"","providerTerms":[],"relationships":[{"type":"contrasts","targetTerm":"Commissionable Rate","targetId":"commissionable-rate"},{"type":"related","targetTerm":"Bedbank","targetId":"bedbank"},{"type":"related","targetTerm":"Merchant Model","targetId":"merchant-model"},{"type":"related","targetTerm":"Rate Plan","targetId":"rate-plan"},{"type":"related","targetTerm":"Rate Parity","targetId":"rate-parity"},{"type":"related","targetTerm":"BAR","targetId":"bar"}],"distinctions":[{"targetTerm":"Commissionable Rate","explanation":"A net rate is non-commissionable (margin via markup); a commissionable rate pays the seller a percentage commission on the published price.","explanation_ko":"순 요금은 비커미션 요금이며(마진은 마크업으로 발생), 커미션 요금은 판매자에게 공시 가격에 대한 일정 비율의 커미션을 지급한다.","targetId":"commissionable-rate"},{"targetTerm":"Merchant Model","explanation":"Net rate is the contracted wholesale price; the merchant model is the broader payment/distribution arrangement in which net rates are typically used.","explanation_ko":"순 요금은 계약된 도매 가격이고, 머천트 모델은 순 요금이 일반적으로 사용되는 더 넓은 결제/분배 체계다.","targetId":"merchant-model"}],"sources":[{"name":"Hotel distribution rate model industry references","org":"","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"nuc","term":"NUC","term_ko":"중립 산정 단위 (NUC)","abbreviation":"NUC","aliases":["Neutral Unit of Construction"],"category":"air-shop","conceptType":"standard-term","status":"active","definition":"NUC (Neutral Unit of Construction) is a common, currency-neutral unit used in international fare construction to add and compare fare components filed in different currencies. Fare-component amounts are converted to NUCs, summed, then converted to the currency of the country of commencement using IATA Rates of Exchange (ROE).","definition_ko":"NUC(Neutral Unit of Construction, 중립 산정 단위)는 서로 다른 통화로 신고된 운임 컴포넌트를 합산하고 비교하기 위해 국제선 운임 산정에 사용되는 공통의 통화 중립 단위이다. 운임 컴포넌트 금액은 NUC로 환산되어 합산된 뒤, IATA 환산율(ROE)을 사용해 여행 개시국의 통화로 환산된다.","longDef":"Because an international journey can traverse fares published in multiple local currencies, the NUC provides a single accumulation unit so that fare components can be combined and checked against fare ladders. Each currency has an IATA-published Rate of Exchange (ROE) used to convert local currency to and from NUCs; NUC totals are converted back to the selling/local currency at the end of construction. NUCs are central to IATA's mileage- and route-based international fare construction and appear on the linear fare calculation of tickets.","longDef_ko":"국제선 여정은 여러 현지 통화로 공시된 운임을 거칠 수 있으므로, NUC는 운임 컴포넌트를 결합하고 운임 단계(fare ladder)와 대조할 수 있도록 단일 누적 단위를 제공한다. 각 통화에는 현지 통화를 NUC로 환산하거나 그 반대로 환산하는 데 사용되는 IATA 공시 환산율(ROE)이 있으며, NUC 합계는 산정 종료 시점에 다시 판매/현지 통화로 환산된다. NUC는 마일리지 및 노선 기반의 IATA 국제선 운임 산정의 핵심이며, 항공권의 선형 운임 계산(linear fare calculation)에 표시된다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Fare Component","targetId":"fare-component"},{"type":"related","targetTerm":"ISO 4217 Currency Code","targetId":"iso-4217-currency-code"},{"type":"related","targetTerm":"Proration","targetId":"proration"},{"type":"related","targetTerm":"E-ticket","targetId":"e-ticket"}],"distinctions":[{"targetTerm":"ISO 4217 Currency Code","explanation":"ISO 4217 codes name real local currencies; the NUC is a neutral construction unit, not a tradeable currency.","explanation_ko":"ISO 4217 코드는 실제 현지 통화를 지칭하고, NUC는 거래 가능한 통화가 아니라 중립적인 산정 단위이다.","targetId":"iso-4217-currency-code"},{"targetTerm":"Proration","explanation":"NUC is the unit for building a fare; proration uses fare values to split revenue among carriers on a ticket.","explanation_ko":"NUC는 운임을 구성하기 위한 단위이고, 정산 배분(proration)은 운임 가치를 사용해 한 항공권의 수익을 항공사 간에 분배한다.","targetId":"proration"}],"sources":[{"name":"IATA fare construction / Ticketing Handbook (NUC and ROE)","org":"IATA","version":"","section":"","url":""},{"name":"IATA Passenger Tariff / fare construction rules","org":"IATA","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"occupancy","term":"Occupancy","term_ko":"투숙(Occupancy) / 객실 점유","abbreviation":"","aliases":["Occupancy Rate","Number of Guests","Pax Occupancy"],"category":"hotel-rate","conceptType":"business-term","status":"ambiguous","definition":"In hotel inventory and rates, occupancy has two common meanings: (1) the number and composition of guests assigned to a room (e.g. single, double, or 2 adults + 1 child), which can drive occupancy-based pricing; and (2) occupancy rate, the operational metric of rooms sold divided by rooms available over a period.","definition_ko":"호텔 재고 및 요금에서 occupancy는 두 가지 일반적인 의미를 가진다. (1) 객실에 배정된 투숙객의 수와 구성(예: 싱글, 더블, 또는 성인 2명 + 아동 1명)으로, occupancy 기반 가격 산정에 영향을 줄 수 있다. (2) 객실 점유율(occupancy rate)로, 일정 기간 동안 판매된 객실 수를 가용 객실 수로 나눈 운영 지표이다.","longDef":"As a pricing/inventory attribute, occupancy specifies how many adults and children occupy a room and is used to apply per-person or occupancy-based rates and to validate that a booking fits a room type's maximum occupancy. As a performance metric, Occupancy Rate = Rooms Sold / Rooms Available, expressed as a percentage, and combines with ADR to derive RevPAR (RevPAR = ADR x Occupancy Rate). The intended sense is usually clear from context, but the term is genuinely overloaded.","longDef_ko":"가격/재고 속성으로서 occupancy는 객실에 성인과 아동이 각각 몇 명 투숙하는지를 명시하며, 1인당 요금이나 occupancy 기반 요금을 적용하고 예약이 객실 유형의 최대 수용 인원에 맞는지 검증하는 데 사용된다. 성과 지표로서 객실 점유율은 판매 객실 수 / 가용 객실 수이며 백분율로 표현되고, ADR과 결합해 RevPAR을 산출한다(RevPAR = ADR x 객실 점유율). 의도된 의미는 보통 맥락에서 명확하지만, 이 용어는 실제로 여러 의미가 중첩되어 있다.","standardBody":"","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Room Type","targetId":"room-type"},{"type":"related","targetTerm":"ADR","targetId":"adr"},{"type":"related","targetTerm":"RevPAR","targetId":"revpar"}],"distinctions":[{"targetTerm":"RevPAR","explanation":"Occupancy rate is one factor (rooms sold vs available); RevPAR is revenue per available room and equals ADR multiplied by occupancy rate.","explanation_ko":"객실 점유율은 하나의 요소(판매 객실 대 가용 객실)이며, RevPAR은 가용 객실당 매출로 ADR에 객실 점유율을 곱한 값과 같다.","targetId":"revpar"},{"targetTerm":"ADR","explanation":"ADR measures average price per occupied room; occupancy rate measures how full the hotel is — the two are independent inputs to RevPAR.","explanation_ko":"ADR은 판매된 객실당 평균 가격을 측정하고, 객실 점유율은 호텔이 얼마나 찼는지를 측정한다. 둘은 RevPAR에 독립적으로 입력되는 요소이다.","targetId":"adr"}],"sources":[{"name":"Uniform System of Accounts for the Lodging Industry (USALI)","org":"AHLA / HFTP","version":"","section":"","url":""},{"name":"STR lodging performance metric definitions","org":"STR (CoStar)","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"offer","term":"Offer","term_ko":"오퍼(Offer)","abbreviation":"","aliases":["Air Offer","NDC Offer"],"category":"standards","conceptType":"standard-term","status":"active","definition":"In IATA's Offer and Order retailing model, an Offer is a seller-controlled, time-bound proposal presented to a customer that bundles one or more products (flights, ancillaries, services) with a price and conditions. The customer selects an Offer (or OfferItems) to create an Order.","definition_ko":"IATA의 Offer and Order 리테일링 모델에서 오퍼(Offer)는 판매자가 통제하는 유효기간이 정해진 제안으로, 하나 이상의 상품(항공편, 부가 서비스, 서비스)을 가격 및 조건과 함께 묶어 고객에게 제시한다. 고객이 오퍼(또는 OfferItem)를 선택하면 주문(Order)이 생성된다.","longDef":"Offers are central to NDC, where the airline constructs and prices Offers in response to shopping requests, enabling dynamic and personalized pricing; in interline scenarios IATA terms the airline that owns and is accountable for an Offer the Offer Responsible Airline (ORA). An Offer is composed of OfferItems and is distinct from the resulting Order, which represents the committed sale.","longDef_ko":"오퍼는 NDC의 핵심으로, 항공사는 조회 요청에 대응하여 오퍼를 구성하고 가격을 책정함으로써 동적이고 개인화된 가격 책정을 가능하게 한다. 인터라인(interline) 상황에서 IATA는 오퍼를 소유하고 책임지는 항공사를 Offer Responsible Airline(ORA)이라 부른다. 오퍼는 OfferItem으로 구성되며, 확정된 판매를 나타내는 결과물인 주문(Order)과는 구별된다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Order","targetId":"order"},{"type":"related","targetTerm":"NDC","targetId":"ndc"},{"type":"related","targetTerm":"ONE Order","targetId":"one-order"},{"type":"related","targetTerm":"Availability","targetId":"availability"},{"type":"related","targetTerm":"Ancillary Service","targetId":"ancillary-service"}],"distinctions":[{"targetTerm":"Order","explanation":"An Offer is a non-binding priced proposal before purchase; an Order is the committed record created when the customer accepts an Offer.","explanation_ko":"오퍼는 구매 이전의 구속력 없는 가격 제안이고, 주문은 고객이 오퍼를 수락할 때 생성되는 확정 기록이다.","targetId":"order"},{"targetTerm":"Availability","explanation":"Availability indicates whether seats/classes are sellable; an Offer is a constructed, priced bundle proposal built on top of availability.","explanation_ko":"가용성(Availability)은 좌석/등급의 판매 가능 여부를 나타내고, 오퍼는 그 가용성을 토대로 구성하여 가격을 책정한 묶음 제안이다.","targetId":"availability"}],"sources":[{"name":"Offer and Order (Airline Retailing)","org":"IATA","version":"","section":"","url":""},{"name":"NDC Standards","org":"IATA","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"one-order","term":"ONE Order","term_ko":"ONE Order(원 오더)","abbreviation":"","aliases":["ONE Order","IATA ONE Order"],"category":"standards","conceptType":"standard","status":"active","definition":"ONE Order is an IATA standard and industry initiative that establishes a single, consolidated customer Order record to replace the separate legacy constructs of PNR, e-ticket, and EMD. It streamlines order management, delivery, and accounting across the order lifecycle.","definition_ko":"ONE Order는 PNR, e-ticket, EMD로 분리된 레거시 구조를 대체하기 위해 단일 통합 고객 주문(Order) 기록을 확립하는 IATA 표준이자 산업 이니셔티브이다. 주문 전체 주기에 걸쳐 주문 관리, 이행, 회계를 간소화한다.","longDef":"Complementing NDC (which standardizes Offer creation and shopping/booking), ONE Order defines the Order Management messages and data model so that all products and services purchased are tracked in one record with order-level accounting, removing reliance on coupon-based ticket/EMD documents and BSP/ARC document-based settlement over time.","longDef_ko":"오퍼 생성과 조회/예약을 표준화하는 NDC를 보완하여, ONE Order는 Order Management 메시지와 데이터 모델을 정의함으로써 구매한 모든 상품과 서비스가 주문 단위 회계와 함께 하나의 기록에서 추적되도록 한다. 이로써 시간이 지나면서 쿠폰 기반 항공권/EMD 문서와 BSP/ARC의 문서 기반 정산에 대한 의존을 없앤다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"NDC","targetId":"ndc"},{"type":"related","targetTerm":"Order","targetId":"order"},{"type":"related","targetTerm":"Offer","targetId":"offer"},{"type":"replaces","targetTerm":"PNR","targetId":"pnr"},{"type":"replaces","targetTerm":"E-ticket","targetId":"e-ticket"},{"type":"replaces","targetTerm":"EMD","targetId":"emd"}],"distinctions":[{"targetTerm":"NDC","explanation":"ONE Order standardizes the single post-sale Order record and its management; NDC standardizes the shopping/offer and booking messaging that creates it.","explanation_ko":"ONE Order는 판매 이후의 단일 주문 기록과 그 관리를 표준화하고, NDC는 그것을 생성하는 조회/오퍼 및 예약 메시징을 표준화한다.","targetId":"ndc"},{"targetTerm":"Order","explanation":"ONE Order is the IATA standard/initiative; Order is the underlying single-record data object it defines and promotes.","explanation_ko":"ONE Order는 IATA 표준이자 이니셔티브이고, Order는 그것이 정의하고 확산시키는 기반 단일 기록 데이터 객체이다.","targetId":"order"},{"targetTerm":"E-ticket","explanation":"ONE Order's single Order record is designed to replace document-based e-tickets (and EMDs) with order-level accounting and fulfillment.","explanation_ko":"ONE Order의 단일 주문 기록은 주문 단위의 회계와 이행을 통해 문서 기반 e-ticket(및 EMD)을 대체하도록 설계되었다.","targetId":"e-ticket"}],"sources":[{"name":"ONE Order","org":"IATA","version":"","section":"","url":""},{"name":"ONE Order Standards","org":"IATA","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"opentravel-alliance","term":"OpenTravel Alliance","term_ko":"OpenTravel Alliance(오픈트래블 얼라이언스)","abbreviation":"OTA","aliases":["OpenTravel","OTA Specification","OpenTravel Alliance Message Specification"],"category":"standards","conceptType":"standard","status":"active","definition":"The OpenTravel Alliance is a non-profit, cross-industry organization that develops and maintains open XML (and JSON) message specifications for the exchange of travel information across air, hotel, car rental, cruise, and other sectors. Its message set is commonly abbreviated 'OTA', which is unrelated to Online Travel Agencies.","definition_ko":"OpenTravel Alliance는 항공, 호텔, 렌터카, 크루즈 등 여러 분야에 걸쳐 여행 정보를 교환하기 위한 개방형 XML(및 JSON) 메시지 명세를 개발하고 유지하는 비영리 범산업 단체이다. 그 메시지 집합은 흔히 'OTA'로 약칭되는데, 이는 온라인 여행사와는 무관하다.","longDef":"OpenTravel publishes a standardized schema library (e.g., OTA_HotelAvailRQ/RS, OTA_AirBookRQ/RS) widely used in hotel and air distribution integrations. It has collaborated with bodies such as HTNG and provides a common vocabulary and message structure for system-to-system communication between suppliers, intermediaries, and sellers.","longDef_ko":"OpenTravel은 호텔 및 항공 유통 연동에 널리 쓰이는 표준화된 스키마 라이브러리(예: OTA_HotelAvailRQ/RS, OTA_AirBookRQ/RS)를 발행한다. HTNG 등의 단체와 협력해 왔으며, 공급사, 중개자, 판매자 간 시스템 대 시스템 통신을 위한 공통 어휘와 메시지 구조를 제공한다.","standardBody":"OpenTravel","providerTerms":[],"relationships":[{"type":"related","targetTerm":"HTNG","targetId":"htng"},{"type":"related","targetTerm":"NDC","targetId":"ndc"},{"type":"related","targetTerm":"ARI","targetId":"ari"},{"type":"related","targetTerm":"Channel Manager","targetId":"channel-manager"},{"type":"related","targetTerm":"CRS","targetId":"crs"}],"distinctions":[{"targetTerm":"OTA (Online Travel Agency)","explanation":"OpenTravel Alliance is an XML standards body (its messages are abbreviated 'OTA'); an Online Travel Agency is a consumer-facing travel retailer — same abbreviation, unrelated concepts.","explanation_ko":"OpenTravel Alliance는 XML 표준 단체(그 메시지가 'OTA'로 약칭됨)이고, 온라인 여행사는 소비자 대상 여행 소매업체이다. 약어는 같지만 서로 무관한 개념이다.","targetId":"ota-online-travel-agency"},{"targetTerm":"HTNG","explanation":"OpenTravel maintains general cross-sector travel XML message specifications; HTNG focuses on hospitality technology interoperability standards and frameworks.","explanation_ko":"OpenTravel은 분야를 아우르는 일반적인 여행 XML 메시지 명세를 유지하고, HTNG는 호스피탈리티 기술 상호운용성 표준과 프레임워크에 집중한다.","targetId":"htng"},{"targetTerm":"NDC","explanation":"OpenTravel is a broad multi-sector travel XML standard; NDC is IATA's air-specific distribution XML standard.","explanation_ko":"OpenTravel은 여러 분야를 아우르는 광범위한 여행 XML 표준이고, NDC는 IATA의 항공 전용 유통 XML 표준이다.","targetId":"ndc"}],"sources":[{"name":"OpenTravel Specifications","org":"OpenTravel Alliance","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"operating-carrier","term":"Operating Carrier","term_ko":"운항 항공사(오퍼레이팅 캐리어)","abbreviation":"","aliases":["Operating Airline"],"category":"air-partner","conceptType":"role","status":"active","definition":"The airline that physically operates a flight, providing the aircraft, crew, and operational control, regardless of which carriers' codes are sold on it. On a codeshare flight there is one operating carrier but potentially several marketing carriers.","definition_ko":"어떤 항공사의 코드가 판매되든 관계없이 항공기, 승무원, 운항 통제를 제공하여 실제로 항공편을 운항하는 항공사. 공동운항편에서는 운항 항공사는 하나이지만 판매 항공사는 여럿일 수 있다.","longDef":"The operating carrier holds operational responsibility for the flight, including safety, schedule, and ground handling. Passenger disclosure regulations require that travelers be informed of the operating carrier when it differs from the marketing carrier whose code they booked. In reservation and schedule data the operating carrier is identified separately from the marketing carrier, so selling systems can show both the code sold and the airline actually flying.","longDef_ko":"운항 항공사는 안전, 스케줄, 지상 조업을 포함한 항공편의 운항 책임을 진다. 승객 고지 규정은 승객이 예약한 코드의 판매 항공사와 운항 항공사가 다를 경우 운항 항공사를 승객에게 알리도록 요구한다. 예약 및 스케줄 데이터에서 운항 항공사는 판매 항공사와 별도로 식별되어, 판매 시스템이 판매된 코드와 실제로 운항하는 항공사를 모두 표시할 수 있다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Marketing Carrier","targetId":"marketing-carrier"},{"type":"related","targetTerm":"Codeshare","targetId":"codeshare"},{"type":"related","targetTerm":"Airline Designator","targetId":"airline-designator"}],"distinctions":[{"targetTerm":"Marketing Carrier","explanation":"The operating carrier flies the aircraft; the marketing carrier sells the flight under its own code and number.","explanation_ko":"운항 항공사는 항공기를 운항하고, 판매 항공사는 자사의 코드와 편명으로 항공편을 판매한다.","targetId":"marketing-carrier"},{"targetTerm":"Codeshare","explanation":"Operating carrier is a role on a specific flight; codeshare is the commercial arrangement that creates the distinction between operating and marketing carriers.","explanation_ko":"운항 항공사는 특정 항공편에서의 역할이고, 공동운항은 운항 항공사와 판매 항공사의 구분을 만들어내는 상업적 협정이다.","targetId":"codeshare"}],"sources":[{"name":"Standard Schedules Information Manual (SSIM)","org":"IATA","version":"","section":"","url":""},{"name":"DOT rules on disclosure of code-share arrangements","org":"U.S. Department of Transportation","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"order","term":"Order","term_ko":"주문(Order)","abbreviation":"","aliases":["Air Order","NDC Order","Customer Order"],"category":"standards","conceptType":"standard-term","status":"active","definition":"In IATA's Offer and Order model, an Order is the single record that captures everything a customer has purchased, including products, services, prices, payment, and fulfillment status, created when a customer accepts an Offer. It is intended to consolidate and eventually replace the PNR, e-ticket, and EMD.","definition_ko":"IATA의 Offer and Order 모델에서 주문(Order)은 고객이 구매한 모든 내용, 즉 상품, 서비스, 가격, 결제, 이행 상태를 담는 단일 기록으로, 고객이 오퍼를 수락할 때 생성된다. PNR, e-ticket, EMD를 통합하고 궁극적으로 대체하는 것을 목표로 한다.","longDef":"The Order is the central data object in NDC OrderCreate/OrderManagement and is the foundation of the ONE Order initiative, which aims to make the Order the single source of truth across the booking and delivery lifecycle, simplifying accounting and settlement compared with separate PNR/document constructs.","longDef_ko":"주문은 NDC OrderCreate/OrderManagement의 핵심 데이터 객체이자 ONE Order 이니셔티브의 기반으로, 예약부터 이행에 이르는 전체 주기에 걸쳐 주문을 단일 진실 공급원(single source of truth)으로 삼는 것을 목표로 하며, 별도의 PNR/문서 구조에 비해 회계와 정산을 단순화한다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Offer","targetId":"offer"},{"type":"related","targetTerm":"NDC","targetId":"ndc"},{"type":"related","targetTerm":"ONE Order","targetId":"one-order"},{"type":"related","targetTerm":"PNR","targetId":"pnr"},{"type":"related","targetTerm":"E-ticket","targetId":"e-ticket"},{"type":"related","targetTerm":"EMD","targetId":"emd"}],"distinctions":[{"targetTerm":"Offer","explanation":"An Order is the committed purchase record; an Offer is the priced proposal the customer accepts to create the Order.","explanation_ko":"주문은 확정된 구매 기록이고, 오퍼는 고객이 수락하여 주문을 생성하는 가격이 책정된 제안이다.","targetId":"offer"},{"targetTerm":"PNR","explanation":"An Order is the modern single sales/fulfillment record intended to replace the legacy PNR plus separate e-ticket/EMD documents.","explanation_ko":"주문은 레거시 PNR과 별도의 e-ticket/EMD 문서를 대체하기 위한 현대적 단일 판매/이행 기록이다.","targetId":"pnr"},{"targetTerm":"ONE Order","explanation":"Order is the data object; ONE Order is the IATA standard/initiative defining and promoting that single Order record.","explanation_ko":"Order는 데이터 객체이고, ONE Order는 그 단일 주문 기록을 정의하고 확산시키는 IATA 표준이자 이니셔티브이다.","targetId":"one-order"}],"sources":[{"name":"Offer and Order (Airline Retailing)","org":"IATA","version":"","section":"","url":""},{"name":"ONE Order","org":"IATA","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"origin-destination","term":"Origin & Destination","term_ko":"출발지 및 도착지 (O&D)","abbreviation":"O&D","aliases":["Origin and Destination","O&D","OnD"],"category":"air-shop","conceptType":"business-term","status":"active","definition":"Origin & Destination (O&D) is the city or airport pair representing where a passenger's journey or priced portion begins and ends, irrespective of intermediate connecting points. It is the unit airlines use for availability requests, revenue management, and pricing rather than individual flight legs.","definition_ko":"Origin & Destination(O&D, 출발지 및 도착지)은 중간 연결 지점과 무관하게 승객의 여정 또는 운임 산정 구간이 시작되고 끝나는 도시 또는 공항 쌍을 의미한다. 이는 항공사가 개별 비행 구간(leg) 대신 가용성 요청, 수익 관리, 운임 산정에 사용하는 단위이다.","longDef":"O&D pricing and inventory control treat the full market between the true origin and true destination as the optimization unit, so that a connecting itinerary BOS-ORD-LAX is managed as the O&D BOS-LAX rather than as two separate legs. O&D-based availability (often combined with married-segment logic) lets carriers offer different class availability to a through passenger than to local passengers on the same legs. The concept underlies fare construction, where a journey is broken into fare components each defined by an O&D.","longDef_ko":"O&D 기반 운임 산정 및 재고 관리는 실제 출발지와 실제 도착지 사이의 전체 시장을 최적화 단위로 취급한다. 따라서 BOS-ORD-LAX 연결 여정은 두 개의 개별 구간이 아니라 BOS-LAX라는 하나의 O&D로 관리된다. O&D 기반 가용성(흔히 결합 구간 로직과 결합됨)을 통해 항공사는 동일 구간이라도 통과 승객과 로컬 승객에게 서로 다른 등급 가용성을 제공할 수 있다. 이 개념은 운임 산정의 기반이 되며, 여기서 여정은 각각 O&D로 정의되는 운임 컴포넌트로 분할된다.","standardBody":"IATA","providerTerms":[{"provider":"Sabre","term":"O&D / Origin and Destination","context":"Sabre availability and revenue-management documentation uses O&D as the market unit.","context_ko":"Sabre의 가용성 및 수익 관리 문서는 O&D를 시장 단위로 사용한다.","relationship":"same"}],"relationships":[{"type":"related","targetTerm":"Journey","targetId":"journey"},{"type":"related","targetTerm":"Fare Component","targetId":"fare-component"},{"type":"related","targetTerm":"Availability","targetId":"availability"},{"type":"related","targetTerm":"Married Segment","targetId":"married-segment"},{"type":"related","targetTerm":"Segment","targetId":"segment"},{"type":"related","targetTerm":"Leg","targetId":"leg"}],"distinctions":[{"targetTerm":"Leg","explanation":"A leg is a single nonstop flight operation; an O&D is the full market between true origin and destination, possibly spanning multiple legs.","explanation_ko":"레그(leg)는 하나의 직항 비행 운항이고, O&D는 실제 출발지와 도착지 사이의 전체 시장으로 여러 레그에 걸칠 수 있다.","targetId":"leg"},{"targetTerm":"Journey","explanation":"A journey is the passenger's entire travel arc; an O&D is a directional point-pair, and a round trip contains two O&Ds.","explanation_ko":"여정(journey)은 승객의 전체 여행 흐름이고, O&D는 방향성을 가진 지점 쌍이며, 왕복 여행은 두 개의 O&D를 포함한다.","targetId":"journey"}],"sources":[{"name":"IATA fare construction / pricing principles","org":"IATA","version":"","section":"","url":""},{"name":"Airline revenue management literature on O&D control","org":"","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"osi","term":"OSI","abbreviation":"OSI","aliases":["Other Service Information","Other Supplementary Information"],"category":"air-ops","conceptType":"standard-term","status":"active","definition":"Other Service Information (OSI) is an informational free-text or semi-structured message element in a PNR sent to one or all carriers to communicate information that does not require any carrier action or reply, such as a passenger contact note or VIP advisory. Unlike an SSR, it carries no action/status code.","definition_ko":"OSI(Other Service Information, 기타 서비스 정보)는 승객 연락처 메모나 VIP 안내처럼 항공사의 조치나 응답이 필요 없는 정보를 전달하기 위해 한 곳 또는 모든 항공사에 전송되는, PNR 내의 정보성 자유 텍스트 또는 반정형 메시지 요소다. SSR과 달리 action/status 코드를 포함하지 않는다.","term_ko":"기타 서비스 정보(OSI)","longDef":"OSI elements convey advisory information to the carrier (for example, frequent-flyer notes, special handling courtesies, or operational remarks) and are addressed either to a specific airline or to all carriers in the itinerary. Because OSI is non-actionable, the carrier is not expected to confirm or respond, which is the key operational difference from an SSR.","longDef_ko":"OSI 요소는 항공사에 안내성 정보(예: 상용고객 메모, 특별 응대 사항, 운영상 비고)를 전달하며, 특정 항공사 또는 여정 내 모든 항공사를 수신 대상으로 지정한다. OSI는 조치를 요하지 않으므로 항공사가 확인하거나 응답할 것으로 기대되지 않으며, 이것이 SSR과의 핵심적인 운영상 차이점이다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"SSR","targetId":"ssr"},{"type":"related","targetTerm":"PNR","targetId":"pnr"}],"distinctions":[{"targetTerm":"SSR","explanation":"OSI is purely informational with no required carrier action or reply, whereas an SSR is an action request that expects a confirming status code from the carrier.","explanation_ko":"OSI는 항공사의 조치나 응답이 필요 없는 순수 정보성인 반면, SSR은 항공사로부터 확인 상태 코드를 기대하는 조치 요청이다.","targetId":"ssr"}],"sources":[{"name":"Passenger Services Conference Resolutions Manual (PSCRM)","org":"IATA","version":"","section":"","url":""},{"name":"PADIS EDIFACT/XML Message Standards","org":"IATA","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"ota-online-travel-agency","term":"OTA (Online Travel Agency)","term_ko":"온라인 여행사(OTA)","abbreviation":"OTA","aliases":["Online Travel Agency","Online Travel Agent"],"category":"standards","conceptType":"business-term","status":"active","definition":"An Online Travel Agency is a web- or app-based retailer that aggregates and sells travel products (flights, hotels, packages, car rental, activities) from multiple suppliers to consumers, typically sourcing content from GDSs, bedbanks, and direct supplier connections. Examples include Expedia, Booking.com, and Trip.com.","definition_ko":"온라인 여행사(OTA)는 여러 공급사의 여행 상품(항공편, 호텔, 패키지, 렌터카, 액티비티)을 통합하여 소비자에게 판매하는 웹 또는 앱 기반 소매업체로, 보통 GDS, 베드뱅크(bedbank), 공급사 직접 연결을 통해 콘텐츠를 확보한다. Expedia, Booking.com, Trip.com 등이 그 예이다.","longDef":"OTAs operate under various commercial models including the agency (commissionable) model and the merchant model, and may act as merchant of record. They are distinct from metasearch sites, which redirect users to booking sites rather than completing the transaction themselves. Note: the acronym 'OTA' also separately denotes the OpenTravel Alliance XML standard, an unrelated concept.","longDef_ko":"OTA는 에이전시(수수료) 모델과 머천트(merchant) 모델 등 다양한 상업 모델로 운영되며 등록 판매자(merchant of record) 역할을 하기도 한다. 거래를 직접 완료하지 않고 사용자를 예약 사이트로 연결해 주는 메타서치 사이트와는 구별된다. 참고: 'OTA'라는 약어는 별개로 OpenTravel Alliance XML 표준을 가리키기도 하며, 이는 무관한 개념이다.","standardBody":"","providerTerms":[],"relationships":[{"type":"related","targetTerm":"GDS","targetId":"gds"},{"type":"related","targetTerm":"Metasearch","targetId":"metasearch"},{"type":"related","targetTerm":"Aggregator","targetId":"aggregator"},{"type":"related","targetTerm":"Bedbank","targetId":"bedbank"},{"type":"related","targetTerm":"Merchant Model","targetId":"merchant-model"},{"type":"related","targetTerm":"Agency Model","targetId":"agency-model"},{"type":"related","targetTerm":"Merchant of Record","targetId":"merchant-of-record"}],"distinctions":[{"targetTerm":"OpenTravel Alliance","explanation":"This OTA is an online travel retailer (agency); the identically abbreviated OpenTravel Alliance is an XML messaging standards body — entirely unrelated.","explanation_ko":"여기서 OTA는 온라인 여행 소매업체(여행사)이고, 동일하게 약칭되는 OpenTravel Alliance는 XML 메시징 표준 단체로 전혀 관련이 없다.","targetId":"opentravel-alliance"},{"targetTerm":"Metasearch","explanation":"An OTA sells and processes the booking itself; a metasearch only compares prices and refers the user to an OTA or supplier to book.","explanation_ko":"OTA는 예약을 직접 판매하고 처리하며, 메타서치는 가격만 비교하고 예약을 위해 사용자를 OTA나 공급사로 연결한다.","targetId":"metasearch"},{"targetTerm":"GDS","explanation":"An OTA is a consumer-facing seller; a GDS is the wholesale distribution platform that supplies content to sellers.","explanation_ko":"OTA는 소비자 대상 판매자이고, GDS는 판매자에게 콘텐츠를 공급하는 도매 유통 플랫폼이다.","targetId":"gds"}],"sources":[{"name":"Online Travel Agency (industry definition)","org":"Phocuswright / industry usage","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"overbooking","term":"Overbooking","term_ko":"초과 예약 (오버부킹)","abbreviation":"","aliases":["Oversell","Overselling"],"category":"air-shop","conceptType":"business-term","status":"active","definition":"Overbooking is the deliberate practice of selling more seats on a flight than the aircraft physically has, to offset expected no-shows and cancellations and maximize load factor and revenue. When more passengers show up than there are seats, the carrier must deny boarding, usually offering compensation or rebooking.","definition_ko":"Overbooking(초과 예약)은 예상되는 노쇼(no-show)와 취소를 상쇄하고 탑승률과 수익을 극대화하기 위해, 항공기가 물리적으로 보유한 좌석보다 더 많은 좌석을 의도적으로 판매하는 관행이다. 좌석 수보다 많은 승객이 나타나면 항공사는 탑승을 거부해야 하며, 보통 보상이나 재예약을 제공한다.","longDef":"Revenue management systems set overbooking levels per flight and class using forecasts of no-show and cancellation rates, balancing the cost of spoiled (empty) seats against the cost of denied boarding. Overbooking directly affects availability, since authorized booking levels can exceed physical capacity. Denied boarding that results from oversell is regulated in many jurisdictions (for example US DOT oversales rules and EU air passenger rights regulation), which mandate compensation and care, and it often triggers involuntary rebooking and IROPS-style handling.","longDef_ko":"수익 관리 시스템은 노쇼 및 취소율 예측을 사용해 항공편 및 등급별 초과 예약 수준을 설정하며, 빈 좌석(spoiled seat) 비용과 탑승 거부 비용 사이의 균형을 맞춘다. 승인된 예약 수준이 물리적 수용 능력을 초과할 수 있으므로, Overbooking은 가용성에 직접적인 영향을 미친다. 초과 판매로 인한 탑승 거부는 여러 관할권에서 규제되며(예: 미국 DOT 초과 판매 규정 및 EU 항공 승객 권리 규정), 이들 규정은 보상과 편의 제공을 의무화한다. 또한 이는 흔히 비자발적 재예약과 IROPS 방식의 처리를 유발한다.","standardBody":"","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Availability","targetId":"availability"},{"type":"related","targetTerm":"Involuntary Reissue","targetId":"involuntary-reissue"},{"type":"related","targetTerm":"IROPS","targetId":"irops"},{"type":"related","targetTerm":"RBD","targetId":"rbd"}],"distinctions":[{"targetTerm":"Availability","explanation":"Availability is the seats currently sellable; overbooking is the policy that can push that count above physical capacity.","explanation_ko":"가용성은 현재 판매 가능한 좌석이고, 초과 예약은 그 수를 물리적 수용 능력 이상으로 끌어올릴 수 있는 정책이다.","targetId":"availability"},{"targetTerm":"Free Sale","explanation":"Free sale lets a seller book without real-time confirmation; overbooking is the carrier intentionally selling beyond capacity.","explanation_ko":"프리세일(free sale)은 판매자가 실시간 확인 없이 예약할 수 있게 하는 것이고, 초과 예약은 항공사가 수용 능력을 넘어 의도적으로 판매하는 것이다.","targetId":"free-sale"}],"sources":[{"name":"Airline revenue management literature on overbooking and denied boarding","org":"","version":"","section":"","url":""},{"name":"US DOT oversales / denied boarding compensation rules","org":"US DOT","version":"","section":"","url":""},{"name":"EU air passenger rights regulation (denied boarding compensation)","org":"European Union","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"passenger-type-code","term":"Passenger Type Code","term_ko":"여객 유형 코드 (PTC)","abbreviation":"PTC","aliases":["PTC","Passenger Type","Pax Type Code"],"category":"customer","conceptType":"code","status":"active","definition":"A standardized code (typically three alphanumeric characters, e.g. ADT, CHD, INF) that classifies a traveler into a category for the purpose of fare eligibility, pricing and discounts. Passenger Type Codes are maintained by ATPCO and used across shopping, pricing and reservation systems.","definition_ko":"운임 적용 자격, 가격 산정, 할인 적용을 위해 여행자를 특정 범주로 분류하는 표준화된 코드(통상 ADT, CHD, INF 등 영숫자 3자리)이다. PTC는 ATPCO가 관리하며 쇼핑, 운임 계산, 예약 시스템 전반에서 사용된다.","longDef":"Passenger Type Codes drive which fares a traveler qualifies for. Common examples include ADT (adult), CHD/CNN (child), INF (infant not occupying a seat), SRC (senior) and YTH (youth), along with specialized codes such as MIL (military) or student types. A fare rule (Category 1, Eligibility) restricts a Fare Basis Code to one or more PTCs, and the PTC requested during shopping determines which fares are returned and how they are priced. PTCs are distinct from RBDs, which control inventory and class of service rather than who is eligible.","longDef_ko":"PTC는 여행자가 어떤 운임에 자격이 있는지를 결정한다. 대표적인 예로 ADT(성인), CHD/CNN(소아), INF(좌석 비점유 유아), SRC(시니어), YTH(청소년)가 있으며, MIL(군인)이나 학생 유형 같은 특수 코드도 있다. 운임 규정(Category 1, Eligibility)은 특정 Fare Basis Code를 하나 이상의 PTC로 제한하며, 쇼핑 시 요청된 PTC에 따라 어떤 운임이 반환되고 어떻게 가격이 산정되는지가 결정된다. PTC는 자격이 누구에게 있는지가 아니라 좌석 재고와 운송 등급을 제어하는 RBD와는 구별된다.","standardBody":"ATPCO","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Fare Basis Code","targetId":"fare-basis-code"},{"type":"related","targetTerm":"ATPCO","targetId":"atpco"},{"type":"related","targetTerm":"RBD","targetId":"rbd"}],"distinctions":[{"targetTerm":"RBD","explanation":"PTC classifies who the traveler is for fare eligibility; RBD is the booking class controlling seat inventory and class of service.","explanation_ko":"PTC는 운임 자격을 위해 여행자가 누구인지를 분류하고, RBD는 좌석 재고와 운송 등급을 제어하는 예약 등급이다.","targetId":"rbd"},{"targetTerm":"Fare Basis Code","explanation":"A PTC is an input that restricts which Fare Basis Codes a passenger can use; the Fare Basis Code identifies the specific priced fare.","explanation_ko":"PTC는 승객이 사용할 수 있는 Fare Basis Code를 제한하는 입력값이고, Fare Basis Code는 가격이 산정된 특정 운임을 식별한다.","targetId":"fare-basis-code"}],"sources":[{"name":"ATPCO Passenger Type Codes","org":"ATPCO","version":"","section":"","url":""},{"name":"ATPCO Automated Rules (Category 1 — Eligibility)","org":"ATPCO","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"passive-segment","term":"Passive Segment","abbreviation":"","aliases":["Passive Booking","Informational Segment","Ghost Segment"],"category":"air-ops","conceptType":"business-term","status":"active","definition":"A passive segment is a flight segment added to a PNR for record-keeping, pricing, or ticketing purposes that does not generate a real inventory request to, or hold space in, the operating carrier's reservation system. It mirrors a booking that was actually confirmed elsewhere (e.g., directly with the airline or in another system).","definition_ko":"passive segment(수동 구간)는 기록 관리, 운임 산정 또는 발권 목적으로 PNR에 추가되는 항공 segment로, 운항 항공사의 예약 시스템에 실제 재고 요청을 보내거나 좌석을 점유하지 않는다. 실제로는 다른 곳(예: 항공사 직접 또는 다른 시스템)에서 확약된 예약을 반영한다.","term_ko":"수동 구간(Passive Segment)","longDef":"Passive segments are typically created with passive status codes so the GDS shows the itinerary for ticketing and documentation without sending an active sell message that would decrement seat inventory. They are commonly used to ticket a booking made outside the GDS, to build complete itineraries for fare construction, or for airline reporting. Misuse of passive segments (e.g., to circumvent ticketing) is policed by GDSs and airlines, and ARNK is a related non-air placeholder for surface gaps.","longDef_ko":"passive segment는 일반적으로 passive 상태 코드로 생성되어, 좌석 재고를 차감하는 능동 판매(sell) 메시지를 보내지 않고도 GDS가 발권 및 문서화를 위해 여정을 표시하도록 한다. 주로 GDS 외부에서 이루어진 예약을 발권하거나, 운임 구성을 위해 완전한 여정을 구성하거나, 항공사 보고 목적으로 사용된다. passive segment의 오용(예: 발권 회피)은 GDS와 항공사에 의해 단속되며, ARNK는 지상 구간 공백을 나타내는 관련 비항공 자리표시자(placeholder)다.","standardBody":"","providerTerms":[{"provider":"Sabre","term":"Passive Segment / GK status","context":"Sabre uses passive status codes such as GK to add informational segments that do not access inventory","context_ko":"Sabre는 GK와 같은 passive 상태 코드를 사용하여 재고에 접근하지 않는 정보성 segment를 추가한다","relationship":"same"},{"provider":"Amadeus","term":"Passive Segment","context":"Amadeus supports passive segments for ticketing of externally confirmed space","context_ko":"Amadeus는 외부에서 확약된 좌석의 발권을 위해 passive segment를 지원한다","relationship":"same"}],"relationships":[{"type":"related","targetTerm":"Segment","targetId":"segment"},{"type":"related","targetTerm":"ARNK","targetId":"arnk"},{"type":"related","targetTerm":"PNR","targetId":"pnr"},{"type":"related","targetTerm":"Ticketing Time Limit","targetId":"ticketing-time-limit"}],"distinctions":[{"targetTerm":"ARNK","explanation":"A passive segment is an informational air segment that does not access inventory, whereas ARNK is a non-air placeholder marking a surface (non-flown) gap in the itinerary.","explanation_ko":"passive segment는 재고에 접근하지 않는 정보성 항공 segment인 반면, ARNK는 여정에서 지상(비운항) 공백을 표시하는 비항공 자리표시자다.","targetId":"arnk"},{"targetTerm":"Married Segment","explanation":"A passive segment holds no live inventory, while married segments are active inventory-controlled connections sold and managed as a unit.","explanation_ko":"passive segment는 실시간 재고를 점유하지 않는 반면, married segment는 하나의 단위로 판매·관리되는, 재고 통제를 받는 능동 연결편이다.","targetId":"married-segment"}],"sources":[{"name":"Sabre Format Finder — Passive Segments","org":"Sabre","version":"","section":"","url":""},{"name":"Amadeus Functional Documentation — Passive Segments","org":"Amadeus","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"pms","term":"PMS","term_ko":"자산 관리 시스템(PMS)","abbreviation":"PMS","aliases":["Property Management System","Hotel Property Management System"],"category":"hotel-dist","conceptType":"acronym","status":"active","definition":"A Property Management System is the operational software used at an individual hotel property to manage front-office and back-office functions such as reservations, check-in/check-out, room assignment, guest folios, housekeeping status, and night audit. It is the system of record for the on-property guest stay and billing.","definition_ko":"자산 관리 시스템(PMS)은 개별 호텔 자산에서 예약, 체크인/체크아웃, 객실 배정, 고객 폴리오(folio), 하우스키핑 상태, 야간 감사(night audit) 등 프런트오피스 및 백오피스 기능을 관리하는 운영 소프트웨어다. 현장 투숙과 청구에 대한 기록 시스템(system of record)이다.","longDef":"The PMS handles the operational lifecycle of a stay at the property level, including guest profiles, folio/charges, and room status. It commonly integrates with a CRS (for centralized distribution and incoming reservations) and downstream point-of-sale, payment, and door-lock systems. Reservations created in distribution channels typically arrive in the PMS via the CRS or a two-way interface.","longDef_ko":"PMS는 고객 프로필, 폴리오/요금, 객실 상태 등 자산 단위에서 투숙의 운영 생애주기를 처리한다. 일반적으로 CRS(중앙 분배 및 유입 예약용)와, 하류의 POS, 결제, 도어록 시스템과 통합된다. 분배 채널에서 생성된 예약은 보통 CRS 또는 양방향 인터페이스를 통해 PMS로 전달된다.","standardBody":"","providerTerms":[],"relationships":[{"type":"related","targetTerm":"CRS","targetId":"crs"},{"type":"related","targetTerm":"Channel Manager","targetId":"channel-manager"},{"type":"related","targetTerm":"Room Type","targetId":"room-type"},{"type":"related","targetTerm":"Customer Profile","targetId":"customer-profile"}],"distinctions":[{"targetTerm":"CRS","explanation":"PMS runs property operations and is the system of record for the stay; CRS centralizes inventory/rates and distributes them across channels.","explanation_ko":"PMS는 자산 운영을 수행하며 투숙에 대한 기록 시스템이고, CRS는 인벤토리/요금을 중앙화하여 여러 채널에 분배한다.","targetId":"crs"}],"sources":[{"name":"HTNG interface specifications","org":"HTNG","version":"","section":"","url":""},{"name":"OpenTravel Specification","org":"OpenTravel Alliance","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"pnr","term":"PNR","abbreviation":"PNR","aliases":["Passenger Name Record","Booking Record","Booking File","Reservation Record"],"category":"air-ops","conceptType":"document","status":"active","definition":"A Passenger Name Record (PNR) is the data record in a reservation system (CRS/GDS or airline host) that holds the itinerary, passenger details, and contact information for one or more travelers traveling together. It is identified by a unique alphanumeric record locator and serves as the central container for all booking-related data.","definition_ko":"PNR(Passenger Name Record, 여객 예약 기록)은 함께 여행하는 한 명 이상의 여행객에 대한 여정, 승객 정보, 연락처 정보를 담는 예약 시스템(CRS/GDS 또는 항공사 호스트)의 데이터 레코드다. 고유한 영숫자 record locator로 식별되며, 예약 관련 모든 데이터를 담는 중심 컨테이너 역할을 한다.","term_ko":"여객 예약 기록(PNR)","longDef":"A PNR minimally requires the five mandatory elements often summarized as 'PRINT': Phone (contact), Received from, Itinerary (segments), Name(s), and Ticketing arrangement. Beyond these, it can hold SSR/OSI elements, frequent flyer data, fare/pricing records, ticket numbers, and remarks. Each reservation system assigns its own record locator, so a single booking distributed across a GDS and multiple airline hosts may have several distinct locators linked by the itinerary.","longDef_ko":"PNR은 흔히 'PRINT'로 요약되는 다섯 가지 필수 요소, 즉 Phone(연락처), Received from(접수처), Itinerary(여정, 즉 segment), Name(승객명), Ticketing(발권 처리)을 최소한으로 요구한다. 이 외에도 SSR/OSI 요소, 상용고객 정보, 운임/요금 기록, 항공권 번호, 비고 사항 등을 담을 수 있다. 각 예약 시스템은 고유한 record locator를 부여하므로, 하나의 예약이 GDS와 여러 항공사 호스트에 분산되면 여정으로 연결된 서로 다른 record locator를 여러 개 가질 수 있다.","standardBody":"IATA","providerTerms":[{"provider":"Amadeus","term":"PNR","context":"Amadeus calls the booking record a PNR with a 6-character record locator","context_ko":"Amadeus는 예약 기록을 6자리 record locator를 가진 PNR이라고 부른다","relationship":"same"},{"provider":"Sabre","term":"PNR / Record Locator","context":"Sabre refers to the booking file as a PNR identified by a record locator","context_ko":"Sabre는 예약 파일을 record locator로 식별되는 PNR이라고 지칭한다","relationship":"same"}],"relationships":[{"type":"related","targetTerm":"Segment","targetId":"segment"},{"type":"related","targetTerm":"SSR","targetId":"ssr"},{"type":"related","targetTerm":"OSI","targetId":"osi"},{"type":"related","targetTerm":"Queue","targetId":"queue"},{"type":"related","targetTerm":"E-ticket","targetId":"e-ticket"},{"type":"related","targetTerm":"Order","targetId":"order"}],"distinctions":[{"targetTerm":"Order","explanation":"An NDC Order is the airline-centric, order-management successor concept to the PNR; the PNR is the legacy GDS/host reservation record.","explanation_ko":"NDC Order는 항공사 중심의 주문 관리 개념으로 PNR을 계승하는 개념이며, PNR은 기존 GDS/호스트 예약 기록이다.","targetId":"order"},{"targetTerm":"E-ticket","explanation":"The PNR is the reservation/itinerary record, whereas the e-ticket is the separate proof-of-payment/fulfillment document created when the PNR is ticketed.","explanation_ko":"PNR은 예약/여정 기록인 반면, e-ticket은 PNR이 발권될 때 생성되는 별도의 결제 증빙/이행 문서다.","targetId":"e-ticket"}],"sources":[{"name":"Passenger Services Conference Resolutions Manual (PSCRM)","org":"IATA","version":"","section":"","url":""},{"name":"Amadeus Functional Documentation — PNR","org":"Amadeus","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"prm","term":"PRM","term_ko":"거동 불편 승객 (PRM)","abbreviation":"PRM","aliases":["Passenger with Reduced Mobility","Person with Reduced Mobility","Passengers with Reduced Mobility","Disabled passenger"],"category":"customer","conceptType":"business-term","status":"active","definition":"A Passenger with Reduced Mobility — any person whose mobility is reduced due to physical or mental disability, age, illness or other cause and who needs special assistance during travel. PRM needs are communicated to carriers and airports through standardized special-service request codes.","definition_ko":"거동 불편 승객(Passenger with Reduced Mobility)으로, 신체적·정신적 장애, 연령, 질병 또는 기타 사유로 거동이 불편하여 여행 중 특별 지원이 필요한 모든 사람을 말한다. PRM의 요구 사항은 표준화된 특별 서비스 요청(SSR) 코드를 통해 항공사와 공항에 전달된다.","longDef":"PRM is an umbrella concept covering travelers requiring assistance; specific needs are encoded as SSR codes such as WCHR (wheelchair to ramp), WCHS (to steps), WCHC (to seat), BLND (blind), DEAF, and DPNA (intellectual/developmental disability). These requests ensure airports and airlines arrange wheelchairs, escorts and other accommodations, and they are governed by accessibility regulations (e.g. EC Regulation 1107/2006 in Europe and the US Air Carrier Access Act). PRM handling is a service obligation distinct from general OSI informational messages.","longDef_ko":"PRM은 지원이 필요한 여행자를 포괄하는 상위 개념이며, 구체적인 요구 사항은 WCHR(램프까지 휠체어), WCHS(계단까지), WCHC(좌석까지), BLND(시각장애), DEAF(청각장애), DPNA(지적/발달 장애) 같은 SSR 코드로 부호화된다. 이러한 요청은 공항과 항공사가 휠체어, 동행 안내, 기타 편의를 준비하도록 보장하며, 접근성 규정(예: 유럽의 EC Regulation 1107/2006, 미국의 Air Carrier Access Act)의 적용을 받는다. PRM 처리는 일반적인 OSI 정보성 메시지와 구별되는 서비스 의무이다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"SSR","targetId":"ssr"},{"type":"related","targetTerm":"OSI","targetId":"osi"},{"type":"related","targetTerm":"PNR","targetId":"pnr"}],"distinctions":[{"targetTerm":"SSR","explanation":"PRM is the traveler category/need; SSR codes (e.g. WCHR, BLND) are the standardized messages used to request the corresponding assistance.","explanation_ko":"PRM은 여행자 범주/요구 사항이고, SSR 코드(예: WCHR, BLND)는 해당 지원을 요청하는 데 사용되는 표준화된 메시지이다.","targetId":"ssr"},{"targetTerm":"OSI","explanation":"PRM assistance requires action via an actionable SSR; OSI carries purely informational, non-actionable remarks.","explanation_ko":"PRM 지원은 조치가 필요한 SSR을 통한 처리가 요구되고, OSI는 순수하게 정보성이며 조치가 필요 없는 비고를 담는다.","targetId":"osi"}],"sources":[{"name":"Passenger Services Conference Resolutions Manual (SSR codes)","org":"IATA","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"proration","term":"Proration","term_ko":"프로레이션(운임 배분)","abbreviation":"","aliases":["Prorate","Prorating","Fare Proration","Pro-ration"],"category":"air-partner","conceptType":"process","status":"active","definition":"The process of dividing the total fare of an interline or multi-carrier ticket among the participating carriers to determine how much revenue each is owed for the portion it carries. Proration uses standardized prorate factors or negotiated special prorate agreements to allocate the fare across fare components and flight coupons.","definition_ko":"인터라인 또는 다중 항공사 항공권의 총 운임을 참여 항공사 간에 나누어, 각 항공사가 자신이 운송한 구간에 대해 받을 수익이 얼마인지 산정하는 과정. 프로레이션은 표준화된 프로레이트 계수 또는 협상된 특별 운임 배분 협정을 사용하여 운임을 운임 구성요소(fare component)와 비행 쿠폰(flight coupon) 전반에 걸쳐 배분한다.","longDef":"Proration translates a single through-fare into per-carrier revenue shares used for interline billing and settlement. The default method applies standard prorate factors (often distance/mileage-based weighting) to each segment, but carriers may override these with Special Prorate Agreements (SPAs) for specified markets. The resulting amounts are then billed and cleared, commonly through the IATA Clearing House, as part of revenue accounting.","longDef_ko":"프로레이션은 단일 일관 운임(through-fare)을 인터라인 청구 및 정산에 사용되는 항공사별 수익 배분 몫으로 변환한다. 기본 방식은 각 구간에 표준 프로레이트 계수(흔히 거리/마일리지 기반 가중치)를 적용하지만, 항공사는 특정 시장에 대해 SPA(Special Prorate Agreement)로 이를 대체할 수 있다. 그 결과로 산출된 금액은 수익 회계의 일부로 청구되고, 일반적으로 IATA Clearing House를 통해 정산된다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"SPA (Special Prorate Agreement)","targetId":"spa-special-prorate-agreement"},{"type":"related","targetTerm":"Interline","targetId":"interline"},{"type":"related","targetTerm":"MITA","targetId":"mita"},{"type":"related","targetTerm":"IATA Clearing House","targetId":"iata-clearing-house"},{"type":"related","targetTerm":"Fare Component","targetId":"fare-component"},{"type":"related","targetTerm":"Flight Coupon","targetId":"flight-coupon"}],"distinctions":[{"targetTerm":"SPA (Special Prorate Agreement)","explanation":"Proration is the general allocation process; an SPA is a specific bilateral agreement supplying special values used in that process.","explanation_ko":"프로레이션은 일반적인 배분 과정이고, SPA는 그 과정에서 사용되는 특별 값을 제공하는 구체적인 양자 간 협정이다.","targetId":"spa-special-prorate-agreement"},{"targetTerm":"Fare Component","explanation":"A fare component is a priced portion of an itinerary; proration is the act of splitting that fare's value among the carriers operating it.","explanation_ko":"운임 구성요소(fare component)는 여정에서 운임이 책정된 일부 구간이고, 프로레이션은 그 운임 값을 해당 구간을 운항하는 항공사들 간에 나누는 행위다.","targetId":"fare-component"}],"sources":[{"name":"Prorate Manual — Passenger (PMP)","org":"IATA","version":"","section":"","url":""},{"name":"Revenue Accounting Manual (RAM)","org":"IATA","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"pseudo-city-code","term":"Pseudo City Code","term_ko":"의사 도시 코드(PCC)","abbreviation":"PCC","aliases":["Office ID","OID","Subscriber ID","Agency Pseudo City Code"],"category":"codes","conceptType":"code","status":"active","definition":"An alphanumeric identifier assigned by a GDS/CRS to a subscriber such as a travel agency or corporate travel department, used to associate bookings with the agency, access private (negotiated) fares, and control privileges. Despite the name it does not identify a geographic city.","definition_ko":"GDS/CRS가 여행사나 기업 출장 부서 같은 가입자에게 부여하는 영숫자 식별자로, 예약을 해당 여행사와 연결하고, 비공개(협상) 운임에 접근하며, 권한을 통제하는 데 사용된다. 명칭과 달리 지리적 도시를 식별하지 않는다.","longDef":"A PCC scopes ownership and visibility of PNRs/bookings within a GDS: agents normally can only access reservations created under their own PCC. It also governs entitlements such as agency-specific negotiated (private) fares, queues, and ticketing authority. Format and length vary by vendor (Sabre/Travelport typically 3-4 characters; Amadeus uses a longer Office ID of up to nine characters), and across systems the concept is variously called Pseudo City Code, Office ID, or Subscriber ID.","longDef_ko":"PCC는 GDS 내에서 PNR/예약의 소유권과 가시성을 한정한다. 대개 직원은 자신의 PCC로 생성된 예약만 접근할 수 있다. 또한 여행사별 협상(비공개) 운임, 큐(queue), 발권 권한 같은 권한을 관리한다. 형식과 길이는 사업자별로 다르며(Sabre/Travelport는 일반적으로 3~4자리, Amadeus는 최대 9자리의 더 긴 Office ID를 사용), 시스템에 따라 이 개념은 Pseudo City Code, Office ID, Subscriber ID 등으로 다양하게 불린다.","standardBody":"","providerTerms":[{"provider":"Amadeus","term":"Office ID","context":"Amadeus identifier for an agency/office, analogous to a PCC","context_ko":"여행사/사무소를 식별하는 Amadeus의 식별자로 PCC에 해당한다","relationship":"same"},{"provider":"Sabre","term":"Pseudo City Code (PCC)","context":"Sabre agency identifier scoping bookings and fares","context_ko":"예약과 운임의 범위를 한정하는 Sabre의 여행사 식별자","relationship":"same"},{"provider":"Travelport","term":"Pseudo City Code (PCC)","context":"Travelport agency/office identifier","context_ko":"Travelport의 여행사/사무소 식별자","relationship":"same"}],"relationships":[{"type":"related","targetTerm":"GDS","targetId":"gds"},{"type":"related","targetTerm":"CRS","targetId":"crs"},{"type":"related","targetTerm":"PNR","targetId":"pnr"},{"type":"related","targetTerm":"Queue","targetId":"queue"},{"type":"related","targetTerm":"OTA (Online Travel Agency)","targetId":"ota-online-travel-agency"}],"distinctions":[{"targetTerm":"City Code","explanation":"A City Code is an IATA geographic metro-area code; a Pseudo City Code identifies a GDS subscriber/agency and is not geographic despite the name.","explanation_ko":"도시 코드는 IATA의 지리적 대도시권 코드인 반면, 의사 도시 코드(PCC)는 GDS 가입자/여행사를 식별하며 명칭과 달리 지리적 의미가 없다.","targetId":"city-code"}],"sources":[{"name":"Pseudo city code","org":"Wikipedia","version":"","section":"","url":"https://en.wikipedia.org/wiki/Pseudo_city_code"}],"lastReviewed":"2026-06-15"},{"id":"queue","term":"Queue","abbreviation":"","aliases":["GDS Queue","PNR Queue","Work Queue"],"category":"air-ops","conceptType":"business-term","status":"active","definition":"A queue is an electronic work list within a CRS/GDS or airline host into which PNRs (or messages) are automatically or manually placed so that they can be reviewed and acted upon, for example after a schedule change, ticketing time limit, or waitlist clearance. Each queue is identified by a number/category and routes work to the appropriate agent or office.","definition_ko":"queue(큐, 작업 대기열)는 CRS/GDS 또는 항공사 호스트 내의 전자 작업 목록으로, 스케줄 변경, 발권 시한, 대기자 확약 등의 이후에 PNR(또는 메시지)이 자동 또는 수동으로 배치되어 검토 및 처리될 수 있도록 한다. 각 queue는 번호/카테고리로 식별되며 작업을 적절한 에이전트나 사무소로 라우팅한다.","term_ko":"작업 대기열(Queue)","longDef":"Queues are the workflow backbone of reservation systems: the host places a PNR on a designated queue when an event requires human follow-up (schedule changes, time-limit warnings, confirmations from waitlist, special service replies). Agents 'work the queue' by retrieving PNRs one by one, taking action, and removing or re-queuing them. Numbering and category conventions differ by GDS (for example, schedule-change and ticketing queues), but the concept of an event-driven work list is common across systems.","longDef_ko":"queue는 예약 시스템 워크플로의 근간이다. 호스트는 사람이 후속 처리해야 하는 이벤트(스케줄 변경, 시한 경고, 대기자 확약, 특별 서비스 응답)가 발생하면 지정된 queue에 PNR을 배치한다. 에이전트는 PNR을 하나씩 조회하여 조치를 취하고 이를 제거하거나 다시 큐에 넣는 방식으로 'queue를 처리'한다. 번호 및 카테고리 규칙은 GDS마다 다르지만(예: 스케줄 변경 및 발권 queue), 이벤트 기반 작업 목록이라는 개념은 시스템 전반에 공통적이다.","standardBody":"","providerTerms":[{"provider":"Amadeus","term":"Queue","context":"Amadeus organizes PNR follow-up work into numbered queues and categories","context_ko":"Amadeus는 PNR 후속 처리 작업을 번호가 매겨진 queue와 카테고리로 구성한다","relationship":"same"},{"provider":"Sabre","term":"Queue","context":"Sabre routes PNRs needing action to numbered queues for agents to work","context_ko":"Sabre는 조치가 필요한 PNR을 에이전트가 처리하도록 번호가 매겨진 queue로 라우팅한다","relationship":"same"},{"provider":"Travelport","term":"Queue","context":"Galileo/Apollo and Worldspan use queues to manage PNR follow-up","context_ko":"Galileo/Apollo와 Worldspan은 PNR 후속 처리를 관리하기 위해 queue를 사용한다","relationship":"same"}],"relationships":[{"type":"related","targetTerm":"PNR","targetId":"pnr"},{"type":"related","targetTerm":"Schedule Change","targetId":"schedule-change"},{"type":"related","targetTerm":"Ticketing Time Limit","targetId":"ticketing-time-limit"},{"type":"related","targetTerm":"IROPS","targetId":"irops"}],"distinctions":[],"sources":[{"name":"Amadeus Functional Documentation — Queues","org":"Amadeus","version":"","section":"","url":""},{"name":"Sabre Format Finder — Queues","org":"Sabre","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"rate-parity","term":"Rate Parity","term_ko":"요금 동등성(Rate Parity)","abbreviation":"","aliases":["Price Parity","Rate Parit
