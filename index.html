licy","targetId":"cancellation-policy"},{"type":"related","targetTerm":"Net Rate","targetId":"net-rate"},{"type":"related","targetTerm":"Commissionable Rate","targetId":"commissionable-rate"},{"type":"related","targetTerm":"ARI","targetId":"ari"},{"type":"related","targetTerm":"Length of Stay","targetId":"length-of-stay"}],"distinctions":[{"targetTerm":"Room Type","explanation":"A rate plan is the price/conditions; a room type is the physical product being priced — the same room type is sold under many rate plans.","explanation_ko":"요금제는 가격·조건을 의미하고, 객실 유형은 가격이 매겨지는 실제 상품을 의미한다. 동일한 객실 유형이 여러 요금제 아래 판매된다.","targetId":"room-type"},{"targetTerm":"BAR","explanation":"BAR is one specific kind of rate plan (the best unrestricted publicly available one), whereas Rate Plan is the general concept covering all offer types.","explanation_ko":"BAR은 요금제의 한 특정 유형(제약 없이 일반에 공개되는 최저 요금)인 반면, 요금제는 모든 상품 유형을 아우르는 일반 개념이다.","targetId":"bar"}],"sources":[{"name":"OpenTravel Specification (Hotel messages, RatePlan)","org":"OpenTravel Alliance","version":"","section":"","url":""},{"name":"HTNG distribution and messaging specifications","org":"HTNG","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"10\" y=\"6\" width=\"28\" height=\"36\" rx=\"3\"/>\u003cline x1=\"16\" y1=\"15\" x2=\"32\" y2=\"15\"/>\u003cline x1=\"16\" y1=\"22\" x2=\"28\" y2=\"22\"/>\u003cpath d=\"M19 31h7a3 3 0 0 1 0 6h-5l3 3\"/>\u003cline x1=\"22\" y1=\"28\" x2=\"22\" y2=\"40\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"rate-shopping","term":"Rate Shopping","abbreviation":"","aliases":["Rate Intelligence","Competitive Rate Shopping","Rate Shopper"],"category":"hotel-dist","conceptType":"process","status":"active","definition":"Rate shopping is the practice of systematically collecting and comparing room rates and availability — for a hotel's own property, its competitive set, and across channels — to inform pricing and revenue decisions and to monitor distribution. A rate shopper is the software that automates this collection from OTAs, metasearch, brand.com, and GDS for given dates, room types, and lengths of stay.","longDef":"Rate shopping supports two related goals. First, competitive intelligence: tracking the rates of a defined comp set so revenue managers can position price relative to demand, events, and booking pace, feeding decisions on BAR and ADR. Second, distribution control: comparing a hotel's own rate across all selling channels to detect rate-parity breaches, undercutting by wholesalers, or unauthorized rate leakage. Modern rate shoppers poll many sources at high frequency and normalize results by occupancy, board basis, cancellation terms, and length-of-stay restrictions so that compared rates are genuinely like-for-like. Outputs feed revenue management systems and parity-monitoring dashboards.","standardBody":"","term_ko":"요금 쇼핑 (Rate Shopping)","definition_ko":"요금 쇼핑은 자사 호텔, 경쟁 호텔군(comp set), 그리고 채널 전반의 객실 요금과 가용성을 체계적으로 수집·비교하여 가격·수익 의사결정에 활용하고 유통을 모니터링하는 활동이다. rate shopper는 주어진 날짜·객실 유형·투숙 기간에 대해 OTA, 메타서치, brand.com, GDS에서 이 수집을 자동화하는 소프트웨어다.","longDef_ko":"요금 쇼핑은 두 가지 연관된 목적을 지원한다. 첫째, 경쟁 인텔리전스: 정의된 comp set의 요금을 추적하여 수익 관리자가 수요·이벤트·예약 페이스에 맞춰 가격을 포지셔닝하고 BAR와 ADR 결정을 돕는다. 둘째, 유통 통제: 모든 판매 채널에 걸친 자사 요금을 비교해 rate parity 위반, 도매업체의 가격 인하, 무단 요금 누출(rate leakage)을 탐지한다. 최신 rate shopper는 다수 소스를 고빈도로 폴링하고 occupancy, board basis, 취소 조건, 투숙 기간 제한별로 결과를 정규화하여 비교가 동등 조건으로 이뤄지게 한다. 산출물은 수익 관리 시스템과 parity 모니터링 대시보드에 입력된다.","providerTerms":[{"provider":"Lighthouse (formerly OTA Insight)","term":"Rate Insight","context":"Rate shopping/intelligence tool monitoring competitor and channel rates for revenue management.","context_ko":"수익 관리를 위해 경쟁사 및 채널 요금을 모니터링하는 요금 쇼핑/인텔리전스 도구.","relationship":"narrower"}],"relationships":[{"type":"related","targetTerm":"Rate Parity","targetId":"rate-parity"},{"type":"related","targetTerm":"BAR","targetId":"bar"},{"type":"related","targetTerm":"ADR","targetId":"adr"},{"type":"related","targetTerm":"RevPAR","targetId":"revpar"},{"type":"related","targetTerm":"Metasearch","targetId":"metasearch"},{"type":"related","targetTerm":"Rate Plan","targetId":"rate-plan"}],"distinctions":[{"targetTerm":"Rate Parity","explanation":"Rate parity is the policy of keeping a hotel's rate consistent across channels; rate shopping is the monitoring activity that detects whether parity is actually being maintained.","explanation_ko":"Rate parity는 채널 전반에 호텔 요금을 일관되게 유지하려는 정책이고, 요금 쇼핑은 parity가 실제로 유지되는지를 탐지하는 모니터링 활동이다.","targetId":"rate-parity"},{"targetTerm":"BAR","explanation":"BAR is the best available rate a hotel publishes; rate shopping is the process of observing BAR (and other rates) across the comp set and channels to inform how BAR should be set.","explanation_ko":"BAR는 호텔이 게시하는 최적 가용 요금이고, 요금 쇼핑은 comp set과 채널 전반에서 BAR(및 기타 요금)를 관측하여 BAR를 어떻게 설정할지 판단하는 과정이다.","targetId":"bar"}],"sources":[{"org":"AltexSoft","name":"Hotel Rate Shopping and Rate Intelligence for Revenue Management","version":"","section":"","url":"https://www.altexsoft.com/blog/hotel-rate-shopping/"},{"org":"Cloudbeds","name":"What is a hotel rate shopper and why do hotels need one?","version":"","section":"","url":"https://www.cloudbeds.com/articles/hotel-rate-shopper/"}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003ccircle cx=\"21\" cy=\"21\" r=\"12\"/>\u003cline x1=\"30\" y1=\"30\" x2=\"40\" y2=\"40\"/>\u003cline x1=\"16\" y1=\"24\" x2=\"16\" y2=\"18\"/>\u003cline x1=\"21\" y1=\"24\" x2=\"21\" y2=\"15\"/>\u003cline x1=\"26\" y1=\"24\" x2=\"26\" y2=\"20\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"rbd","term":"RBD","term_ko":"예약 등급 지정자 (RBD)","abbreviation":"RBD","aliases":["Reservation Booking Designator","Booking Class","Booking Code","Class of Service"],"category":"air-shop","conceptType":"code","status":"active","definition":"An RBD (Reservation Booking Designator) is a single-letter code that identifies the booking class in which a seat is sold and inventory is controlled on a flight. Each RBD maps to a fare and a level of inventory, distinct from the physical cabin (First, Business, Economy).","definition_ko":"RBD(Reservation Booking Designator, 예약 등급 지정자)는 항공편에서 좌석이 판매되고 재고가 관리되는 예약 등급을 식별하는 한 글자 코드이다. 각 RBD는 운임 및 재고 수준에 매핑되며, 물리적 객실 등급(First, Business, Economy)과는 구별된다.","longDef":"RBDs are single alphabetic characters (for example F, J, Y, B, M, Q) that airlines use to segment a cabin into multiple priced inventory buckets for revenue management. The fare basis code references an RBD as its prime/booking code, and availability is published per RBD. Several different RBDs typically exist within one physical cabin, allowing the carrier to sell the same cabin at different fare levels and to control how many seats are released to each price point.","longDef_ko":"RBD는 한 글자의 알파벳 문자(예: F, J, Y, B, M, Q)로, 항공사가 수익 관리를 위해 하나의 객실 등급을 여러 가격대의 재고 버킷으로 세분화하는 데 사용한다. 운임 기준 코드(fare basis code)는 RBD를 주요/예약 코드로 참조하며, 가용성은 RBD별로 공시된다. 일반적으로 하나의 물리적 객실 등급 안에 여러 RBD가 존재하여, 항공사는 동일한 객실을 서로 다른 운임 수준으로 판매하고 각 가격대에 배정되는 좌석 수를 제어할 수 있다.","standardBody":"IATA","providerTerms":[{"provider":"Sabre","term":"Class of Service / Booking Class","context":"Sabre refers to the single-letter inventory code as the class of service.","context_ko":"Sabre는 한 글자 재고 코드를 class of service(서비스 등급)로 지칭한다.","relationship":"same"},{"provider":"Amadeus","term":"Booking Class","context":"Amadeus uses booking class for the RBD letter controlling inventory.","context_ko":"Amadeus는 재고를 제어하는 RBD 문자를 booking class(예약 등급)로 칭한다.","relationship":"same"}],"relationships":[{"type":"related","targetTerm":"Availability","targetId":"availability"},{"type":"related","targetTerm":"Fare Basis Code","targetId":"fare-basis-code"},{"type":"related","targetTerm":"Fare Family","targetId":"fare-family"},{"type":"related","targetTerm":"Passenger Type Code","targetId":"passenger-type-code"}],"distinctions":[{"targetTerm":"Fare Basis Code","explanation":"The RBD is the single booking-class letter; the fare basis code is the longer alphanumeric string identifying the full fare, usually starting with the RBD.","explanation_ko":"RBD는 한 글자의 예약 등급 문자이고, 운임 기준 코드는 전체 운임을 식별하는 더 긴 영숫자 문자열로 보통 해당 RBD로 시작한다.","targetId":"fare-basis-code"},{"targetTerm":"Availability","explanation":"RBD is the class identifier; availability is the seat count sellable in that RBD.","explanation_ko":"RBD는 등급 식별자이고, 가용성은 해당 RBD에서 판매 가능한 좌석 수이다.","targetId":"availability"}],"sources":[{"name":"AIRIMP (ATA/IATA Reservations Interline Message Procedures)","org":"IATA","version":"","section":"","url":""},{"name":"ATPCO Fares data documentation","org":"ATPCO","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M14 30V18a3 3 0 016 0v9h8a3 3 0 013 3v6\"/>\u003cpath d=\"M14 33h17\"/>\u003cpath d=\"M14 30h-2a2 2 0 00-2 2v6\"/>\u003ccircle cx=\"34\" cy=\"15\" r=\"7\"/>\u003cpath d=\"M32 18v-6h2.5a1.5 1.5 0 010 3H32m2 0l2.5 3\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"re-accommodation","term":"Re-accommodation","term_ko":"재수용(리어커머데이션)","abbreviation":"","aliases":["Reaccommodation","Re-accom","Rebooking","Reprotection","Protection"],"category":"air-partner","conceptType":"process","status":"active","definition":"The process of rebooking passengers from a disrupted or changed flight onto alternative transportation to get them to their destination, using the disrupting carrier's own flights or, under interline and codeshare agreements, a partner carrier's flights. Re-accommodation is the core passenger-handling response to irregular operations (IROPS) and significant schedule changes.","definition_ko":"중단되거나 변경된 항공편의 승객을 목적지까지 가도록 대체 교통편으로 재예약하는 과정으로, 중단을 겪은 항공사 자체 항공편을 이용하거나 인터라인 및 공동운항 협정에 따라 파트너 항공사의 항공편을 이용한다. 재수용은 비정상 운항(IROPS) 및 중대한 스케줄 변경에 대한 핵심 승객 처리 대응이다.","longDef":"Re-accommodation (also called reprotection or protection) covers identifying affected passengers, finding alternative flights within minimum connecting times, and reissuing tickets, often as involuntary reissues at no additional fare. When a passenger is protected onto another airline, interline reservation and reaccommodation procedures (IATA Resolution 766) and agreed interline billing/settlement values govern how the second carrier is booked and compensated. Affected PNRs typically land on queues for agent or automated handling, and depending on fare rules and regulations passengers may alternatively be entitled to a refund.","longDef_ko":"재수용(reprotection 또는 protection이라고도 함)은 영향을 받은 승객 식별, 최소 연결 시간 이내의 대체 항공편 탐색, 항공권 재발행(흔히 추가 운임 없는 비자발적 재발권)을 포함한다. 승객이 다른 항공사로 보호(protect)될 때, 인터라인 예약 및 재수용 절차(IATA Resolution 766)와 합의된 인터라인 청구/정산 값이 두 번째 항공사가 어떻게 예약되고 보상받는지를 규율한다. 영향을 받은 PNR은 일반적으로 상담원 또는 자동 처리를 위해 큐(queue)에 올라오며, 운임 규정과 규제에 따라 승객은 대신 환불을 받을 권리가 있을 수 있다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"IROPS","targetId":"irops"},{"type":"related","targetTerm":"Schedule Change","targetId":"schedule-change"},{"type":"related","targetTerm":"Involuntary Reissue","targetId":"involuntary-reissue"},{"type":"related","targetTerm":"Interline","targetId":"interline"},{"type":"related","targetTerm":"Queue","targetId":"queue"},{"type":"related","targetTerm":"Refund","targetId":"refund"},{"type":"related","targetTerm":"MCT","targetId":"mct"}],"distinctions":[{"targetTerm":"IROPS","explanation":"IROPS is the disruption scenario (delays, cancellations, diversions); re-accommodation is the specific passenger-rebooking process used to recover travelers during IROPS or after a schedule change.","explanation_ko":"IROPS는 중단 상황(지연, 취소, 회항)이고, 재수용은 IROPS 동안 또는 스케줄 변경 이후 여행객을 복구하기 위해 사용되는 구체적인 승객 재예약 과정이다.","targetId":"irops"},{"targetTerm":"Involuntary Reissue","explanation":"Re-accommodation is the end-to-end rebooking process; involuntary reissue is the ticketing transaction that documents the new itinerary at no additional collection.","explanation_ko":"재수용은 처음부터 끝까지의 재예약 과정이고, 비자발적 재발권은 추가 징수 없이 새 여정을 문서화하는 발권 거래다.","targetId":"involuntary-reissue"}],"sources":[{"name":"Interline Considerations on Irregular Operations (IROPs) — guidance document","org":"IATA","version":"2020","section":"","url":""},{"name":"Passenger Services Conference Resolutions Manual (PSCRM), Resolution 766 (Interline Passenger Reservation Procedures)","org":"IATA","version":"","section":"Resolution 766","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M14 16 a14 14 0 1 1 -3 12\"/>\u003cpolyline points=\"14 8 14 16 22 16\"/>\u003ccircle cx=\"24\" cy=\"24\" r=\"3\" fill=\"currentColor\" stroke=\"none\"/>\u003cline x1=\"24\" y1=\"24\" x2=\"33\" y2=\"19\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"record-locator","term":"Record Locator","abbreviation":"","aliases":["PNR Locator","Booking Reference","Reservation Code","Confirmation Code","RLOC"],"category":"air-ops","conceptType":"code","status":"active","definition":"A Record Locator is the short alphanumeric identifier — conventionally six characters — assigned by an airline host or GDS to uniquely retrieve a Passenger Name Record (PNR). It is the code passengers receive to access their booking; the PNR is the underlying data record while the locator is its key.","longDef":"Each reservation system that holds a copy of a booking generates its own Record Locator, so a single trip can carry multiple locators: the GDS/agency locator, the validating or operating carrier's host locator, and codeshare partners' locators, often cross-referenced in the PNR. The six-character format is a long-standing industry convention (letters and digits, frequently excluding ambiguous characters); it is not globally unique across all systems, which is why retrieval also depends on the issuing office or system context. Locators appear in different positions across GDSs (e.g., on the Amadeus RP/ header line, at the top of a Sabre or Worldspan record, and after the RLOC tag in Galileo).","standardBody":"","term_ko":"Record Locator (예약 조회 번호 / 예약 번호)","definition_ko":"Record Locator는 항공사 호스트나 GDS가 PNR(Passenger Name Record)을 고유하게 조회하기 위해 부여하는 짧은 영숫자 식별자로, 관례적으로 6자리다. 승객이 예약을 조회할 때 받는 코드가 Record Locator이며, PNR이 실제 데이터 레코드라면 Record Locator는 그 레코드를 가리키는 key에 해당한다.","longDef_ko":"한 여정이라도 예약 사본을 보유한 시스템마다 별도의 Record Locator를 생성하므로, GDS/여행사 locator, 발권/운항 항공사 호스트 locator, codeshare 파트너 locator 등 여러 개가 존재할 수 있고 이들은 보통 PNR 안에서 상호 참조된다. 6자리 형식(영문자+숫자, 혼동되는 문자는 흔히 제외)은 오래된 업계 관례이며 모든 시스템에 걸쳐 전역 고유한 것은 아니어서, 조회 시 발권 office나 시스템 context가 함께 필요하다. GDS마다 표시 위치가 달라 Amadeus는 RP/ 헤더 줄, Sabre·Worldspan은 레코드 최상단, Galileo는 RLOC 태그 뒤에 나타난다.","providerTerms":[{"provider":"Amadeus","term":"Record Locator (RLOC)","context":"Six-character reservation reference shown on the RP/ header line of a PNR.","context_ko":"PNR의 RP/ 헤더 줄에 표시되는 6자리 예약 참조번호.","relationship":"same"},{"provider":"Sabre","term":"Record Locator","context":"Alphanumeric code retrieving a Sabre PNR, displayed at the top of the record.","context_ko":"Sabre PNR을 조회하는 영숫자 코드로 레코드 최상단에 표시.","relationship":"same"},{"provider":"Travelport","term":"Record Locator / RLOC","context":"Galileo/Apollo/Worldspan booking reference used to access the reservation.","context_ko":"예약 접근에 사용되는 Galileo/Apollo/Worldspan 예약 참조번호.","relationship":"same"}],"relationships":[{"type":"related","targetTerm":"PNR","targetId":"pnr"},{"type":"related","targetTerm":"GDS","targetId":"gds"},{"type":"related","targetTerm":"E-ticket","targetId":"e-ticket"}],"distinctions":[{"targetTerm":"PNR","explanation":"The PNR is the full reservation data record (names, segments, contacts, SSRs); the Record Locator is merely the short key used to retrieve that record. One trip can have several locators pointing to copies of essentially the same PNR data.","explanation_ko":"PNR은 이름, segment, 연락처, SSR 등 예약 데이터 전체 레코드이고, Record Locator는 그 레코드를 조회하는 짧은 key일 뿐이다. 한 여정에 여러 locator가 사실상 같은 PNR 데이터 사본을 가리킬 수 있다.","targetId":"pnr"}],"sources":[{"org":"IATA","name":"Passenger Services Conference Resolutions Manual (PSCRM)","version":"","section":"","url":""},{"org":"Travelport","name":"Travelport+ (Galileo) Format Guide","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"7\" y=\"14\" width=\"34\" height=\"20\" rx=\"3\"/>\u003cpath d=\"M14 22h6M14 28h12M28 22h6\"/>\u003ccircle cx=\"33\" cy=\"28\" r=\"3.5\"/>\u003cpath d=\"M35.5 30.5 39 34\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"redress-number","term":"Redress Number","abbreviation":"","aliases":["DHS TRIP Redress Control Number","Redress Control Number"],"category":"customer","conceptType":"code","status":"active","definition":"A Redress Number is a unique identifier issued by the U.S. Department of Homeland Security through the DHS Traveler Redress Inquiry Program (DHS TRIP) to travelers who have repeatedly experienced screening difficulties, such as being misidentified as a person on a watch list. When entered into a reservation, it helps Secure Flight differentiate the traveler from similarly named individuals and reduce false matches.","longDef":"Travelers apply through DHS TRIP after recurring problems such as denied or delayed boarding, repeated additional screening, or being told their name resembles one on a government watch list. The resulting Redress Control Number is added to the airline reservation (and may be stored in a customer profile) and is transmitted to TSA via Secure Flight to improve identity resolution. The Redress program is administratively separate from trusted-traveler programs; a Redress Number does not confer expedited screening and is unrelated to a Known Traveler Number.","standardBody":"U.S. Department of Homeland Security (DHS TRIP)","term_ko":"Redress Number(DHS TRIP 구제번호)","definition_ko":"Redress Number는 감시목록 인물로 오인되는 등 보안검색에서 반복적으로 어려움을 겪은 여행자에게 미국 국토안보부(DHS)가 DHS TRIP(여행자 구제 문의 프로그램)을 통해 발급하는 고유 식별번호다. 예약에 입력하면 Secure Flight가 동명이인과 해당 여행자를 구분해 오인 매칭을 줄이는 데 도움이 된다.","longDef_ko":"여행자는 탑승 거부·지연, 반복적인 추가 검색, 또는 자신의 이름이 정부 감시목록의 이름과 유사하다는 통보 같은 문제가 반복될 때 DHS TRIP에 신청한다. 발급된 Redress Control Number는 항공 예약에 입력되고(고객 프로필에도 저장될 수 있음) Secure Flight를 통해 TSA로 전송되어 신원 식별 정확도를 높인다. 구제 프로그램은 신뢰여행자 프로그램과 행정적으로 별개이며, Redress Number는 신속 검색 자격을 주지 않고 KTN과도 무관하다.","providerTerms":[{"provider":"DHS","term":"DHS TRIP","context":"The Traveler Redress Inquiry Program that issues Redress Numbers.","context_ko":"Redress Number를 발급하는 여행자 구제 문의 프로그램.","relationship":"broader"}],"relationships":[{"type":"related","targetTerm":"Secure Flight","targetId":"secure-flight"},{"type":"related","targetTerm":"Customer Profile","targetId":"customer-profile"},{"type":"related","targetTerm":"PNR","targetId":"pnr"},{"type":"contrasts","targetTerm":"Known Traveler Number","targetId":"known-traveler-number"}],"distinctions":[{"targetTerm":"Known Traveler Number","explanation":"A Redress Number resolves recurring misidentification and does not provide any screening benefit, whereas a Known Traveler Number grants access to expedited screening; they are separate, unrelated identifiers.","explanation_ko":"Redress Number는 반복되는 오인 식별을 해소하기 위한 번호로 검색 혜택을 주지 않는 반면, KTN은 신속 검색 자격을 부여한다. 둘은 서로 별개이며 무관한 식별번호다.","targetId":"known-traveler-number"}],"sources":[{"org":"U.S. Department of Homeland Security","name":"DHS TRIP - Frequently Asked Questions","version":"","section":"","url":"https://trip.dhs.gov/s/faq-page"},{"org":"TSA","name":"Secure Flight Program","version":"","section":"","url":"https://www.tsa.gov/travel/security-screening/secure-flight"}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003ccircle cx=\"16\" cy=\"16\" r=\"6\"/>\u003cpath d=\"M8 36c0-5 4-8 8-8s8 3 8 8\"/>\u003cpath d=\"M30 18l12 12\"/>\u003cpath d=\"M42 18L30 30\"/>\u003cpath d=\"M28 8h12\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"refund","term":"Refund","term_ko":"환불 (Refund)","abbreviation":"","aliases":["Ticket Refund","Refund Application"],"category":"air-ticket","conceptType":"process","status":"active","definition":"The return of all or part of a ticket's or EMD's value to the passenger or form of payment for unused or partially used coupons. Refund eligibility and any penalties are determined by the applicable fare rules (voluntary) or by involuntary refund provisions when the carrier fails to provide carriage.","definition_ko":"미사용 또는 부분 사용된 쿠폰에 대해 항공권 또는 EMD 가치의 전부 또는 일부를 승객 또는 지불 수단으로 반환하는 것이다. 환불 자격 여부와 위약금은 해당 운임 규정(자발적인 경우)에 의해, 또는 항공사가 운송을 제공하지 못한 경우 비자발적 환불 규정에 의해 결정된다.","longDef":"Refunds are categorized as voluntary (passenger-initiated, subject to refundability and cancellation penalties in the fare rule) or involuntary (carrier-caused cancellation/schedule failure, generally full and penalty-free). Refunded coupons are set to status REFUNDED so value cannot be reused, and unused taxes/fees may be refundable even on non-refundable fares depending on jurisdiction. For BSP/ARC sales, refunds are processed through the settlement system and netted against the agent's billing.","longDef_ko":"환불은 자발적 환불(승객 주도이며 운임 규정상의 환불 가능 여부 및 취소 위약금 적용)과 비자발적 환불(항공사 사유에 의한 결항/운항 실패로, 일반적으로 전액이며 위약금 없음)로 구분된다. 환불된 쿠폰은 가치가 재사용되지 못하도록 REFUNDED 상태로 설정되며, 미사용 세금/수수료는 관할 지역에 따라 환불 불가 운임에서도 환불될 수 있다. BSP/ARC 판매의 경우 환불은 정산 시스템을 통해 처리되어 대리점 청구액과 상계된다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"E-ticket","targetId":"e-ticket"},{"type":"related","targetTerm":"EMD","targetId":"emd"},{"type":"related","targetTerm":"Flight Coupon","targetId":"flight-coupon"},{"type":"contrasts","targetTerm":"Void","targetId":"void"},{"type":"contrasts","targetTerm":"Reissue","targetId":"reissue"},{"type":"related","targetTerm":"BSP","targetId":"bsp"},{"type":"related","targetTerm":"ARC","targetId":"arc"}],"distinctions":[{"targetTerm":"Void","explanation":"Void cancels an issuance within the same sales period at zero cost; a refund returns value after the sales/void window, typically with applicable penalties.","explanation_ko":"Void는 동일한 판매 기간 내에 무비용으로 발권을 취소하며, 환불은 판매/Void 기한 이후에 가치를 반환하되 통상 적용 가능한 위약금이 따른다.","targetId":"void"},{"targetTerm":"Reissue","explanation":"Refund returns value to the customer; reissue exchanges the ticket for new transportation.","explanation_ko":"환불은 고객에게 가치를 반환하며, 재발행은 항공권을 새로운 운송으로 교환한다.","targetId":"reissue"},{"targetTerm":"Chargeback","explanation":"A refund is a merchant-initiated return of funds; a chargeback is a cardholder-initiated dispute forced through the card network.","explanation_ko":"환불은 가맹점이 주도하는 자금 반환이며, 지불 거절(chargeback)은 카드 소지자가 주도하여 카드 네트워크를 통해 강제되는 분쟁이다.","targetId":"chargeback"}],"sources":[{"name":"Passenger Services Conference Resolutions Manual (PSCRM)","org":"IATA","version":"","section":"","url":""},{"name":"BSP Refund procedures","org":"IATA","version":"","section":"","url":""}],"lastReviewed":"2026-06-15","icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"6\" y=\"16\" width=\"30\" height=\"20\" rx=\"3\"/>\u003cpath d=\"M6 22h30\"/>\u003cpath d=\"M40 14a10 10 0 11-3 14\"/>\u003cpath d=\"M37 28v-5h5\"/>\u003c/svg>"},{"id":"reissue","term":"Reissue","term_ko":"재발행 (Reissue)","abbreviation":"","aliases":["Exchange","Ticket Exchange","Reissuance"],"category":"air-ticket","conceptType":"process","status":"active","definition":"The process of exchanging an existing ticket for a new one to reflect a change in itinerary, fare, or travel dates, computing any additional collection (ADC) or residual value. The original coupons are marked EXCHANGED and a new ticket with new coupons is issued.","definition_ko":"여정, 운임 또는 여행 날짜의 변경을 반영하기 위해 기존 항공권을 새 항공권으로 교환하는 절차로, 추가 징수액(ADC) 또는 잔여 가치를 계산한다. 원래의 쿠폰은 EXCHANGED로 표시되고 새로운 쿠폰을 가진 새 항공권이 발행된다.","longDef":"A voluntary reissue is initiated at the passenger's request (e.g., a date or routing change) and is governed by the fare rules of the applicable fare, which determine change penalties, fare difference recalculation, and whether residual value can be retained (often via an EMD). The reissue records the original ticket number in the new document's origin/issue data and shows fare/tax recalculation and any add-collect amount. Reissue contrasts with refund (returning value to the customer) and void (same-day cancellation of an unused issuance).","longDef_ko":"자발적 재발행은 승객의 요청(예: 날짜 또는 노선 변경)에 의해 시작되며, 변경 위약금, 운임 차액 재계산, 그리고 잔여 가치를 (흔히 EMD를 통해) 보존할 수 있는지 여부를 결정하는 해당 운임의 운임 규정(fare rule)에 따른다. 재발행은 새 서류의 origin/issue 데이터에 원래 항공권 번호를 기록하고 운임/세금 재계산과 추가 징수액(add-collect)을 표시한다. 재발행은 환불(고객에게 가치를 반환)이나 Void(미사용 발권의 당일 취소)와 구별된다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"E-ticket","targetId":"e-ticket"},{"type":"related","targetTerm":"Flight Coupon","targetId":"flight-coupon"},{"type":"related","targetTerm":"Refund","targetId":"refund"},{"type":"related","targetTerm":"Void","targetId":"void"},{"type":"contrasts","targetTerm":"Involuntary Reissue","targetId":"involuntary-reissue"},{"type":"related","targetTerm":"Fare Basis Code","targetId":"fare-basis-code"}],"distinctions":[{"targetTerm":"Involuntary Reissue","explanation":"Voluntary reissue is passenger-requested and subject to fare-rule penalties; involuntary reissue results from airline-caused changes and typically waives penalties.","explanation_ko":"자발적 재발행은 승객 요청에 의한 것으로 운임 규정상의 위약금이 적용되며, 비자발적 재발행은 항공사 사유에 의한 변경에서 비롯되어 일반적으로 위약금이 면제된다.","targetId":"involuntary-reissue"},{"targetTerm":"Refund","explanation":"Reissue exchanges the ticket for new travel; refund returns the ticket's value rather than re-issuing transportation.","explanation_ko":"재발행은 항공권을 새로운 여행으로 교환하며, 환불은 운송을 재발행하는 대신 항공권의 가치를 반환한다.","targetId":"refund"},{"targetTerm":"Void","explanation":"Void cancels an issuance within the same sales period leaving no reportable sale; reissue creates a new document and marks the old coupons as exchanged.","explanation_ko":"Void는 동일한 판매 기간 내에 발권을 취소하여 보고할 판매 내역을 남기지 않으며, 재발행은 새 서류를 생성하고 기존 쿠폰을 교환됨(exchanged)으로 표시한다.","targetId":"void"}],"sources":[{"name":"Passenger Services Conference Resolutions Manual (PSCRM)","org":"IATA","version":"","section":"","url":""}],"lastReviewed":"2026-06-15","icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"10\" y=\"12\" width=\"28\" height=\"18\" rx=\"3\"/>\u003cpath d=\"M16 18h10M16 23h6\"/>\u003cpath d=\"M38 38a14 14 0 01-22-3\"/>\u003cpath d=\"M16 41v-6h6\"/>\u003cpath d=\"M10 33a14 14 0 0122 3\"/>\u003cpath d=\"M32 30v6h-6\"/>\u003c/svg>"},{"id":"release-period","term":"Release Period","abbreviation":"","aliases":["Release Back","Cut-off Period","Release Days"],"category":"hotel-rate","conceptType":"business-term","status":"active","definition":"A release period is the number of days before arrival at which unsold rooms held in an allotment or group block are automatically returned to the hotel's general inventory for sale. It defines how long contracted inventory is protected for a partner before the associated cut-off date triggers the release.","longDef":"Release period (often configured as a number of release days) governs allotment and group-block inventory: rooms allocated to a tour operator, corporate account or event block are held at the negotiated terms until the cut-off date, after which any unbooked rooms revert to the hotel to resell through other channels. Cut-off dates are commonly set somewhere from about a week to a month before arrival, giving the property time to recover and resell. The release period is therefore the lead-time parameter behind the cut-off, and it interacts with attrition clauses that may impose penalties if too few of the blocked rooms are actually taken up.","standardBody":"","term_ko":"Release Period (해제 기간)","definition_ko":"Release Period(해제 기간)는 allotment나 group block에 잡혀 있던 미판매 객실이 자동으로 호텔의 일반 재고로 반환되어 판매에 풀리는, 도착 전 일수다. 연계된 cut-off date가 해제를 발동시키기 전까지 계약 재고가 파트너를 위해 얼마나 오래 보호되는지를 정의한다.","longDef_ko":"Release Period(흔히 release days 수로 설정)는 allotment·group block 재고를 통제한다. 투어 오퍼레이터·기업 계정·행사 블록에 할당된 객실은 cut-off date까지 협정 조건으로 보류되며, 그 이후 미예약 객실은 호텔로 반환되어 다른 채널을 통해 재판매된다. cut-off date는 보통 도착 약 1주에서 1개월 전 사이로 설정되어 호텔이 회수·재판매할 시간을 확보한다. 따라서 release period는 cut-off 뒤에 있는 리드타임 파라미터이며, 블록 객실의 실제 소진이 너무 적을 경우 위약금을 부과하는 attrition 조항과 상호작용한다.","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Allotment","targetId":"allotment"},{"type":"related","targetTerm":"Availability","targetId":"availability"},{"type":"related","targetTerm":"Cancellation Policy","targetId":"cancellation-policy"},{"type":"related","targetTerm":"Free Sale","targetId":"free-sale"}],"distinctions":[{"targetTerm":"Allotment","explanation":"An Allotment is the block of rooms held for a partner; the Release Period is the rule defining how many days before arrival the unsold portion of that allotment is given back to the hotel.","explanation_ko":"Allotment는 파트너를 위해 보류된 객실 블록 자체이고, Release Period는 그 allotment 중 미판매분을 도착 며칠 전에 호텔로 반환할지를 정하는 규칙이다.","targetId":"allotment"}],"sources":[{"org":"Xotels","name":"Revenue Management Glossary — Cut-Off","version":"","section":"","url":"https://www.xotels.com/en/glossary/cut-off"},{"org":"HelloShift","name":"Hotel Term — Allotment (Room Block)","version":"","section":"","url":"https://www.helloshift.com/hotel-term/allotment"}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"7\" y=\"10\" width=\"34\" height=\"30\" rx=\"3\"/>\u003cpath d=\"M7 18h34M16 7v6M32 7v6\"/>\u003cpath d=\"M19 30l5 5 9-11\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"remittance","term":"Remittance","abbreviation":"","aliases":["agent remittance"],"category":"pay","conceptType":"process","status":"active","definition":"In airline distribution settlement, remittance is the transfer of funds collected by a travel agent for ticket sales to the airlines, made through a clearing system such as BSP or ARC after deduction of agreed commissions. Remittance occurs on a defined billing and settlement schedule by remittance period.","longDef":"Under the agency model, an accredited travel agent sells tickets on behalf of airlines, collects payment from passengers, retains any commission, and remits the net proceeds to the carriers through the local BSP (IATA Billing and Settlement Plan) or, in the United States, through ARC. The reporting and settlement calendar defines remittance periods and a remittance date by which the agent's bank account is debited (or the agent must have paid) for the amounts billed. Cash and certain customer-card sales flow through this remittance process, while credit-card sales using the airline's own merchant facility are typically settled directly with the card acquirer rather than remitted by the agent. IATA EasyPay and similar facilities change the cash-flow timing by funding sales on a transaction basis. Failure to remit on time can trigger default action and withdrawal of ticketing authority.","standardBody":"IATA","term_ko":"송금/정산납입 (Remittance)","definition_ko":"항공 유통 정산에서 remittance(송금/정산납입)는 여행사가 항공권 판매로 수금한 자금을 합의된 수수료를 공제한 뒤 BSP나 ARC 같은 청산 시스템을 통해 항공사에 이전하는 것을 말한다. 송금은 정해진 청구·정산 일정에 따라 송금 기간(remittance period)별로 이루어진다.","longDef_ko":"여행사 모델(Agency Model)에서 인가받은 여행사는 항공사를 대신해 항공권을 판매하고 승객으로부터 대금을 수금한 뒤, 수수료를 보유하고 순수익을 현지 BSP(IATA Billing and Settlement Plan) 또는 미국의 경우 ARC를 통해 항공사에 송금한다. 보고·정산 달력은 송금 기간과, 청구된 금액에 대해 여행사 은행 계좌가 출금되는(또는 여행사가 납입을 완료해야 하는) 송금일(remittance date)을 정의한다. 현금 및 일부 고객카드 판매는 이 송금 절차를 거치지만, 항공사 자체 가맹 설비를 사용하는 카드 판매는 보통 여행사 송금이 아니라 카드 매입사(Acquirer)와 직접 정산된다. IATA EasyPay 등은 거래 단위로 판매를 자금화해 현금 흐름 시점을 바꾼다. 기한 내 송금하지 않으면 디폴트 조치와 발권 권한 박탈로 이어질 수 있다.","providerTerms":[],"relationships":[{"type":"related","targetTerm":"BSP","targetId":"bsp"},{"type":"related","targetTerm":"ARC","targetId":"arc"},{"type":"related","targetTerm":"Agency Model","targetId":"agency-model"},{"type":"related","targetTerm":"Settlement Cycle","targetId":"settlement-cycle"},{"type":"related","targetTerm":"IATA EasyPay","targetId":"iata-easypay"}],"distinctions":[{"targetTerm":"BSP","explanation":"BSP is the clearing system and accounting infrastructure that handles agent-airline billing; remittance is the actual transfer of collected funds processed through that system.","explanation_ko":"BSP는 여행사-항공사 청구를 처리하는 청산 시스템·회계 인프라이고, remittance는 그 시스템을 통해 처리되는, 수금한 자금의 실제 이전 행위다.","targetId":"bsp"},{"targetTerm":"Settlement Cycle","explanation":"The settlement cycle defines the timing and periodicity; remittance is the funding act that the agent performs within that cycle.","explanation_ko":"정산 주기(Settlement Cycle)는 시점과 주기를 정의하고, remittance는 그 주기 안에서 여행사가 수행하는 자금 납입 행위다.","targetId":"settlement-cycle"}],"sources":[{"org":"IATA","name":"Passenger Agency Conference Resolutions (BSP / Billing and Settlement Plan)","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003ccircle cx=\"11\" cy=\"24\" r=\"6\"/>\u003ccircle cx=\"37\" cy=\"24\" r=\"6\"/>\u003cpath d=\"M18 21h12\"/>\u003cpath d=\"M27 18l3 3-3 3\"/>\u003cpath d=\"M30 30H18\"/>\u003cpath d=\"M21 33l-3-3 3-3\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"residual-value","term":"Residual Value","abbreviation":"","aliases":["Residual Amount","Leftover Value"],"category":"air-ticket","conceptType":"business-term","status":"active","definition":"Residual value is the amount left over when a ticket (or EMD) is exchanged for a new document of lower total value, after deducting any applicable penalties and fare differences. Depending on the fare rules and document type, the residual may be refunded, retained as a credit on a standalone EMD/MCO, or forfeited.","longDef":"Residual value arises in exchange transactions: when the value of the surrendered document exceeds the price of the new ticket plus penalties and taxes, the surplus is the residual. For refundable fares the residual is typically returned to the form of payment, while for non-refundable fares it is often forfeited or held as a non-refundable credit. When the residual must be preserved rather than refunded, it is commonly issued on a standalone EMD (EMD-S) or, historically, an MCO, which records the leftover value for future use within the original ticket's validity and rules. GDS pricing must match the residual value against the reissue pricing record for the exchange to complete.","standardBody":"IATA","term_ko":"Residual Value (잔여 가치)","definition_ko":"Residual Value(잔여 가치)는 항공권(또는 EMD)을 총 가치가 더 낮은 새 서류로 교환할 때, 해당 위약금과 운임 차액을 공제하고 남는 금액이다. 운임 규정과 서류 종류에 따라 잔여 가치는 환불되거나, 독립형 EMD/MCO에 크레딧으로 보존되거나, 소멸될 수 있다.","longDef_ko":"Residual value는 교환 거래에서 발생한다. 반납한 서류의 가치가 새 항공권 가격에 위약금·세금을 더한 금액을 초과하면 그 잉여분이 잔여 가치이다. 환불 가능 운임의 경우 잔여 가치는 보통 결제 수단으로 반환되지만, 비환불 운임의 경우 흔히 소멸되거나 비환불 크레딧으로 보존된다. 잔여 가치를 환불하지 않고 보존해야 할 때는 일반적으로 독립형 EMD(EMD-S) 또는 과거에는 MCO에 발행하여, 원본 항공권의 유효기간과 규정 범위 내에서 향후 사용을 위해 남은 가치를 기록한다. 교환을 완료하려면 GDS 가격 산출 시 잔여 가치가 재발행 가격 산출 레코드와 일치해야 한다.","providerTerms":[{"provider":"Amadeus","term":"Residual value EMD","context":"Amadeus describes a standalone EMD issued for residual value resulting from the exchange of a non-refundable old document of higher value than the new document.","context_ko":"Amadeus는 새 서류보다 가치가 높은 비환불 원본 서류를 교환할 때 발생하는 잔여 가치에 대해 독립형 EMD를 발행하는 것으로 설명한다.","relationship":"narrower"}],"relationships":[{"type":"related","targetTerm":"Exchange","targetId":"exchange"},{"type":"related","targetTerm":"Reissue","targetId":"reissue"},{"type":"related","targetTerm":"EMD","targetId":"emd"},{"type":"related","targetTerm":"MCO (Miscellaneous Charges Order)","targetId":"mco-miscellaneous-charges-order"},{"type":"related","targetTerm":"Refund","targetId":"refund"},{"type":"related","targetTerm":"Penalty Fee","targetId":"penalty-fee"}],"distinctions":[{"targetTerm":"Refund","explanation":"A refund is the return of value to the passenger; residual value is the leftover surplus from an exchange that may or may not be refundable — it can instead be forfeited or carried on an EMD/MCO.","explanation_ko":"Refund는 승객에게 가치를 반환하는 것이고, residual value는 교환에서 남은 잉여분으로 환불될 수도 아닐 수도 있다. 환불 대신 소멸되거나 EMD/MCO에 보존될 수 있다.","targetId":"refund"}],"sources":[{"org":"Amadeus","name":"EMD: Frequently Asked Questions","version":"","section":"","url":"https://servicehub.amadeus.com/c/portal/view-solution/837116/en_US/emd-frequently-asked-questions"},{"org":"IATA","name":"Ticketing Handbook","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003ccircle cx=\"24\" cy=\"24\" r=\"15\"/>\u003cpath d=\"M24 9a15 15 0 0 1 13 7.5L24 24z\" fill=\"currentColor\" stroke=\"none\"/>\u003cpath d=\"M19 26h10\"/>\u003cpath d=\"M24 21v3\"/>\u003cpath d=\"M21 30h6\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"rest-api","term":"REST API","term_ko":"REST API(REST 방식 API)","abbreviation":"API","aliases":["RESTful API","Representational State Transfer API","JSON API"],"category":"standards","conceptType":"standard-term","status":"active","definition":"A REST API is a web-service interface built on the Representational State Transfer architectural style, using standard HTTP methods and verbs against resource URLs, typically with JSON payloads. In travel distribution it is the modern integration style used by airline, hotel, and aggregator APIs, increasingly including IATA NDC delivered as JSON/REST.","definition_ko":"REST API는 Representational State Transfer 아키텍처 스타일을 기반으로 한 웹 서비스 인터페이스로, 리소스 URL에 대해 표준 HTTP 메서드와 동사를 사용하며 보통 JSON 페이로드를 주고받는다. 여행 유통에서는 항공사·호텔·애그리게이터 API가 사용하는 현대적 연동 방식이며, JSON/REST로 제공되는 IATA NDC도 점차 이에 포함된다.","longDef":"REST contrasts with older SOAP/XML web services and with batch EDI such as EDIFACT. Travel REST APIs are commonly described with OpenAPI (Swagger) specifications, enabling auto-generated client libraries and easier developer onboarding. Major GDSs and airlines now expose REST/JSON Offer and Order APIs alongside legacy SOAP and EDIFACT channels, reflecting the industry's broader shift toward lightweight, web-native integration.","longDef_ko":"REST는 더 오래된 SOAP/XML 웹 서비스 및 EDIFACT 같은 배치 EDI와 대비된다. 여행 REST API는 흔히 OpenAPI(Swagger) 명세로 기술되어 클라이언트 라이브러리 자동 생성과 개발자 온보딩을 쉽게 한다. 주요 GDS와 항공사는 이제 레거시 SOAP·EDIFACT 채널과 함께 REST/JSON 기반 Offer 및 Order API를 제공하며, 이는 가볍고 웹 친화적인 연동으로 향하는 산업 전반의 전환을 반영한다.","standardBody":"","providerTerms":[{"provider":"IATA","term":"NDC JSON/REST APIs","context":"IATA's NDC standard is increasingly delivered via REST/JSON in addition to SOAP/XML","context_ko":"IATA의 NDC 표준이 SOAP/XML에 더해 점차 REST/JSON으로 제공됨","relationship":"related"}],"relationships":[{"type":"contrasts","targetTerm":"EDIFACT","targetId":"edifact"},{"type":"related","targetTerm":"NDC","targetId":"ndc"},{"type":"related","targetTerm":"Shopping API","targetId":"shopping-api"},{"type":"related","targetTerm":"Direct Connect","targetId":"direct-connect"},{"type":"related","targetTerm":"Aggregator","targetId":"aggregator"}],"distinctions":[{"targetTerm":"EDIFACT","explanation":"A REST API is a modern HTTP/JSON web-service style; EDIFACT is a legacy compact-text EDI syntax used in classic GDS/PSS messaging.","explanation_ko":"REST API는 현대적 HTTP/JSON 웹 서비스 방식이고, EDIFACT는 기존 GDS/PSS 메시징에 쓰이는 레거시 압축 텍스트 EDI 구문이다.","targetId":"edifact"},{"targetTerm":"NDC","explanation":"REST is a transport/architectural style; NDC is a domain data standard whose messages may be carried over SOAP/XML or REST/JSON.","explanation_ko":"REST는 전송/아키텍처 스타일이고, NDC는 그 메시지를 SOAP/XML 또는 REST/JSON으로 실어 나를 수 있는 도메인 데이터 표준이다.","targetId":"ndc"}],"sources":[{"org":"IETF / W3C","name":"REST architectural style (HTTP)","version":"","section":"","url":""},{"org":"OpenAPI Initiative","name":"OpenAPI Specification","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003ccircle cx=\"10\" cy=\"24\" r=\"5\"/>\u003ccircle cx=\"38\" cy=\"14\" r=\"5\"/>\u003ccircle cx=\"38\" cy=\"34\" r=\"5\"/>\u003cline x1=\"15\" y1=\"24\" x2=\"33\" y2=\"16\"/>\u003cline x1=\"15\" y1=\"24\" x2=\"33\" y2=\"32\"/>\u003cpath d=\"M22 6l3 3-3 3\"/>\u003cpath d=\"M19 9h6\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"revenue-management","term":"Revenue Management","abbreviation":"RM","aliases":["Yield Management","Inventory Management"],"category":"air-shop","conceptType":"process","status":"active","definition":"Revenue Management is the airline discipline of dynamically controlling seat availability and pricing across booking classes to maximize total revenue for each flight. It forecasts demand by class and applies seat-allocation controls (e.g., booking limits, nesting, bid prices) so that higher-yield demand is not displaced by early low-fare bookings.","longDef":"Revenue Management (historically called Yield Management) emerged after US deregulation as carriers learned to segment perishable seat inventory by willingness to pay. An RM system forecasts demand for each Reservation Booking Designator (RBD) on a flight or origin-and-destination (O&D) market, then sets availability controls that open or close classes over time. Leg-based and O&D (network) RM approaches use techniques such as Expected Marginal Seat Revenue (EMSR), virtual nesting, and bid-price thresholds. RM is tightly coupled with pricing (which sets the fare ladder) and overbooking (which compensates for no-shows), and increasingly with dynamic and continuous pricing that blur the line between fixed fare buckets and demand-driven prices.","standardBody":"","term_ko":"수익 관리 (Revenue Management)","definition_ko":"Revenue Management는 항공편별 총수익을 극대화하기 위해 booking class 전반의 좌석 가용성과 가격을 동적으로 통제하는 항공사 업무 영역이다. 클래스별 수요를 예측하고 좌석 배분 통제(예약 한도, 네스팅, bid price 등)를 적용하여, 수익성 높은 수요가 조기 저가 예약에 밀려나지 않도록 한다.","longDef_ko":"Revenue Management(과거 Yield Management로 불림)는 미국 규제 완화 이후 항공사가 지불 의향에 따라 소멸성 좌석 인벤토리를 세분화하는 법을 익히면서 등장했다. RM 시스템은 항공편 또는 O&D(출발지·목적지) 시장에서 각 RBD에 대한 수요를 예측한 뒤, 시간에 따라 클래스를 열고 닫는 가용성 통제를 설정한다. 구간(leg) 기반과 O&D(네트워크) 기반 RM 방식은 EMSR(Expected Marginal Seat Revenue), 가상 네스팅, bid-price 임계값 같은 기법을 사용한다. RM은 운임 사다리를 설정하는 pricing 및 no-show를 보완하는 overbooking과 긴밀히 연결되며, 고정 운임 버킷과 수요 기반 가격의 경계를 흐리는 dynamic/continuous pricing과도 점점 더 결합된다.","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Availability","targetId":"availability"},{"type":"related","targetTerm":"RBD","targetId":"rbd"},{"type":"related","targetTerm":"Overbooking","targetId":"overbooking"},{"type":"related","targetTerm":"Origin & Destination","targetId":"origin-destination"},{"type":"related","targetTerm":"Continuous Pricing","targetId":"continuous-pricing"}],"distinctions":[{"targetTerm":"Continuous Pricing","explanation":"Revenue Management is the broader discipline of demand forecasting and inventory control; Continuous Pricing is one modern pricing technique that lets RM offer prices across a continuous range rather than fixed fare buckets.","explanation_ko":"Revenue Management는 수요 예측과 인벤토리 통제를 아우르는 더 넓은 영역이며, Continuous Pricing은 RM이 고정 운임 버킷 대신 연속적 범위로 가격을 제시할 수 있게 하는 현대적 가격 책정 기법 중 하나다.","targetId":"continuous-pricing"}],"sources":[{"org":"OAG","name":"The Story of Airline Pricing Strategies","version":"","section":"Revenue/yield management","url":"https://www.oag.com/blog/the-story-of-airline-pricing-strategies"},{"org":"ATPCO","name":"What are dynamic offers?","version":"","section":"Revenue management and pricing","url":"https://atpco.net/single-blog/what-are-dynamic-offers/"}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M8 38h32\"/>\u003cpath d=\"M8 38V10\"/>\u003crect x=\"13\" y=\"26\" width=\"5\" height=\"12\"/>\u003crect x=\"22\" y=\"18\" width=\"5\" height=\"20\"/>\u003crect x=\"31\" y=\"12\" width=\"5\" height=\"26\"/>\u003cpath d=\"M12 20l6-6 5 4 9-9\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"revpar","term":"RevPAR","term_ko":"가용 객실당 매출(RevPAR, Revenue Per Available Room)","abbreviation":"RevPAR","aliases":["Revenue Per Available Room"],"category":"hotel-rate","conceptType":"metric","status":"active","definition":"Revenue Per Available Room is a lodging performance metric equal to total room revenue divided by the number of available rooms over a period, equivalently ADR multiplied by occupancy rate. It combines pricing and occupancy into a single measure of how effectively a property monetizes its room inventory.","definition_ko":"RevPAR(Revenue Per Available Room)은 일정 기간의 총 객실 매출을 가용 객실 수로 나눈 값과 같은 숙박 성과 지표로, ADR에 객실 점유율을 곱한 값과 동일하다. 가격과 점유율을 하나의 지표로 결합해 숙소가 객실 재고를 얼마나 효과적으로 수익화하는지를 측정한다.","longDef":"RevPAR = Room Revenue / Rooms Available = ADR x Occupancy Rate. Because it uses available rooms (not just sold rooms) as the denominator, RevPAR reflects both rate achievement and how full the hotel is, making it the headline metric for comparing properties and tracking revenue management performance. A related metric, TRevPAR (Total Revenue Per Available Room), extends the numerator to all revenue (F&B, spa, etc.), and GOPPAR measures gross operating profit per available room.","longDef_ko":"RevPAR = 객실 매출 / 가용 객실 수 = ADR x 객실 점유율. 분모로 판매 객실이 아닌 가용 객실을 사용하므로, RevPAR은 요금 달성도와 호텔이 얼마나 찼는지를 모두 반영하여 숙소 비교와 수익 관리 성과 추적의 대표 지표가 된다. 관련 지표로 TRevPAR(Total Revenue Per Available Room)은 분자를 모든 매출(F&B, 스파 등)로 확장하며, GOPPAR은 가용 객실당 총영업이익을 측정한다.","standardBody":"","providerTerms":[],"relationships":[{"type":"related","targetTerm":"ADR","targetId":"adr"},{"type":"related","targetTerm":"Occupancy","targetId":"occupancy"}],"distinctions":[{"targetTerm":"ADR","explanation":"RevPAR uses available rooms as the denominator and blends in occupancy; ADR uses only sold rooms and isolates price.","explanation_ko":"RevPAR은 가용 객실을 분모로 사용해 점유율을 함께 반영하고, ADR은 판매 객실만 사용해 가격만 분리해 본다.","targetId":"adr"},{"targetTerm":"Occupancy","explanation":"Occupancy rate is one of the two inputs to RevPAR (RevPAR = ADR x occupancy rate); on its own it ignores the rate achieved.","explanation_ko":"객실 점유율은 RevPAR의 두 입력값 중 하나이며(RevPAR = ADR x 객실 점유율), 그 자체만으로는 달성된 요금을 반영하지 못한다.","targetId":"occupancy"}],"sources":[{"name":"STR lodging performance metric definitions","org":"STR (CoStar)","version":"","section":"","url":""},{"name":"Uniform System of Accounts for the Lodging Industry (USALI)","org":"AHLA / HFTP","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M6 40V8\"/>\u003cpath d=\"M6 40h36\"/>\u003crect x=\"12\" y=\"28\" width=\"6\" height=\"10\"/>\u003crect x=\"21\" y=\"20\" width=\"6\" height=\"18\"/>\u003crect x=\"30\" y=\"12\" width=\"6\" height=\"26\"/>\u003cpath d=\"M12 22l9-8 6 4 9-10\"/>\u003cpath d=\"M30 8h6v6\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"room-type","term":"Room Type","term_ko":"객실 유형(Room Type)","abbreviation":"","aliases":["Room Category","Accommodation Type","Room Class"],"category":"hotel-rate","conceptType":"business-term","status":"active","definition":"A category of bookable accommodation defined by its physical and product attributes — such as bed configuration, size, view, floor, and amenities — that groups individual rooms a hotel sells as interchangeable inventory. Examples include Standard Double, Deluxe King, and Junior Suite.","definition_ko":"침대 구성, 면적, 전망, 층, 편의시설 등 물리적·상품적 속성으로 정의되는 예약 가능한 숙박 범주로, 호텔이 상호 교환 가능한 재고로 판매하는 개별 객실들을 묶은 것이다. 스탠다드 더블, 디럭스 킹, 주니어 스위트 등이 그 예이다.","longDef":"Room types are the inventory unit hoteliers count and sell; availability and allotments are tracked per room type and date. Each room type is identified by a room type code in the CRS/PMS and is combined with one or more rate plans to produce sellable offers. The room-type-and-rate-plan combination is what is ultimately distributed as a sellable product.","longDef_ko":"객실 유형은 호텔이 집계하고 판매하는 재고 단위로, 가용 객실과 allotment는 객실 유형 및 날짜별로 관리된다. 각 객실 유형은 CRS/PMS에서 room type code로 식별되며, 하나 이상의 요금제와 결합되어 판매 가능한 상품을 만든다. 궁극적으로 유통되는 판매 상품은 이 객실 유형과 요금제의 조합이다.","standardBody":"OpenTravel Alliance","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Rate Plan","targetId":"rate-plan"},{"type":"related","targetTerm":"Occupancy","targetId":"occupancy"},{"type":"related","targetTerm":"Allotment","targetId":"allotment"},{"type":"related","targetTerm":"ARI","targetId":"ari"}],"distinctions":[{"targetTerm":"Rate Plan","explanation":"Room type is the physical product (the room); rate plan is the price and conditions under which that room is sold.","explanation_ko":"객실 유형은 실제 상품(객실)을 의미하고, 요금제는 그 객실이 판매되는 가격과 조건을 의미한다.","targetId":"rate-plan"},{"targetTerm":"Occupancy","explanation":"Room type describes the room's attributes; occupancy describes how many guests stay in it, which can affect the applicable price.","explanation_ko":"객실 유형은 객실의 속성을 설명하고, 투숙 인원(occupancy)은 몇 명의 투숙객이 머무는지를 설명하며 이는 적용 가격에 영향을 줄 수 있다.","targetId":"occupancy"}],"sources":[{"name":"OpenTravel Specification (Hotel messages, RoomType / RoomStay)","org":"OpenTravel Alliance","version":"","section":"","url":""},{"name":"HTNG messaging specifications","org":"HTNG","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M6 18v18\"/>\u003cpath d=\"M6 24h36v12\"/>\u003cpath d=\"M42 30v6\"/>\u003cpath d=\"M6 24v-6h22a8 8 0 0 1 8 8\"/>\u003cpath d=\"M12 22a3 3 0 0 1 3-3h6a3 3 0 0 1 3 3\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"run-of-house-roh","term":"Run of House (ROH)","abbreviation":"ROH","aliases":["Run of the House","Run-of-House Rate"],"category":"hotel-rate","conceptType":"business-term","status":"active","definition":"Run of House (ROH) is a booking and rate basis in which the guest is sold a stay without a guaranteed specific room type; the hotel assigns any available room, usually its standard category, at check-in. It is typically offered at a flat, often discounted rate in exchange for the guest accepting whatever room is available.","longDef":"Under ROH the booking is made against the property generally rather than a named room type, so the hotel retains flexibility to allocate inventory wherever it best fits demand, which helps fill rooms during uneven occupancy. The room ultimately assigned is normally the standard category with basic amenities, and the guest has no guaranteed say over bed configuration or view, although upgrades may occur at the hotel's discretion. ROH is common in group, wholesale and contracted business and contrasts with bookings tied to a defined Room Type. Because it abstracts away the specific product, ROH is best understood as a rate/inventory basis layered on top of, but distinct from, individual room-type pricing.","standardBody":"","term_ko":"Run of House (ROH, 객실 임의배정)","definition_ko":"Run of House(ROH, 객실 임의배정)는 특정 객실 타입을 보장하지 않고 투숙을 판매하는 예약·요금 방식으로, 호텔이 체크인 시 가용한 객실(보통 스탠다드 등급)을 임의로 배정한다. 어떤 객실이든 받아들이는 대가로 통상 단일·할인 요금으로 제공된다.","longDef_ko":"ROH에서는 특정 객실 타입이 아니라 호텔 전반을 대상으로 예약이 이루어지므로, 호텔은 수요에 가장 잘 맞는 곳에 재고를 배정할 유연성을 유지하며 이는 불균등한 점유 상황에서 객실을 채우는 데 도움이 된다. 최종 배정 객실은 보통 기본 편의시설을 갖춘 스탠다드 등급이고, 침대 구성·전망에 대한 고객의 선택권은 보장되지 않으나 호텔 재량으로 업그레이드가 일어날 수 있다. ROH는 그룹·홀세일·계약 비즈니스에서 흔하며, 특정 Room Type에 묶인 예약과 대비된다. 구체적 상품을 추상화하므로 ROH는 개별 객실 타입 가격 위에 얹히되 그와 구별되는 요금·재고 방식으로 이해하는 것이 적절하다.","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Room Type","targetId":"room-type"},{"type":"related","targetTerm":"Rate Plan","targetId":"rate-plan"},{"type":"related","targetTerm":"Allotment","targetId":"allotment"},{"type":"contrasts","targetTerm":"Room Type","targetId":"room-type"}],"distinctions":[{"targetTerm":"Room Type","explanation":"A Room Type booking guarantees a specific product category and its attributes; an ROH booking guarantees only a room within the property, with the actual type assigned by the hotel at check-in based on availability.","explanation_ko":"Room Type 예약은 특정 상품 등급과 속성을 보장하지만, ROH 예약은 호텔 내 객실만을 보장하며 실제 타입은 가용성에 따라 체크인 시 호텔이 배정한다.","targetId":"room-type"}],"sources":[{"org":"BCD Travel","name":"Travel Glossary — Run-of-the-house (ROH)","version":"","section":"","url":"https://www.bcdtravel.com/glossary/run-of-the-house-roh/"},{"org":"AltexSoft","name":"Travel Glossary — Run of the house (ROH)","version":"","section":"","url":"https://www.altexsoft.com/glossary/run-of-the-house-roh/"}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M6 22L24 8l18 14\"/>\u003cpath d=\"M10 20v18h28V20\"/>\u003cpath d=\"M19 38v-9h10v9\"/>\u003cpath d=\"M22 26h.01\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"schedule-change","term":"Schedule Change","term_ko":"스케줄 변경(운항 일정 변경)","abbreviation":"","aliases":["Schedule Adjustment","Schedule Change Notification","Time Change"],"category":"air-partner","conceptType":"process","status":"active","definition":"A change made by an airline to a previously published flight schedule, such as a revised departure or arrival time, equipment change, flight number change, or flight cancellation, that affects already-booked passengers. Schedule changes are distributed to selling systems and require reaccommodation or notification of affected bookings.","definition_ko":"항공사가 이미 예약한 승객에게 영향을 미치는, 이전에 게시된 항공편 스케줄에 가하는 변경으로, 출발 또는 도착 시간 변경, 기재(equipment) 변경, 편명 변경, 항공편 취소 등이 이에 해당한다. 스케줄 변경은 판매 시스템에 배포되며, 영향을 받는 예약에 대해 재수용(reaccommodation)이나 통지가 필요하다.","longDef":"Schedule changes are communicated via standardized schedule messaging (for example SSIM-based SSM and ASM formats) and propagate to GDSs and airline reservation systems, often landing affected PNRs on queues for agent or automated action. Depending on the magnitude of the change and fare conditions, passengers may be entitled to rebooking, involuntary reissue, or refund. Schedule changes differ from same-day operational disruptions, which fall under irregular operations (IROPS).","longDef_ko":"스케줄 변경은 표준화된 스케줄 메시지(예: SSIM 기반 SSM 및 ASM 포맷)를 통해 전달되며, GDS와 항공사 예약 시스템으로 전파되어 영향을 받는 PNR이 상담원 또는 자동 처리를 위해 큐(queue)에 올라오는 경우가 많다. 변경의 정도와 운임 조건에 따라 승객은 재예약, 비자발적 재발권(involuntary reissue) 또는 환불을 받을 권리가 있을 수 있다. 스케줄 변경은 당일 운영 중단과는 다르며, 당일 중단은 비정상 운항(IROPS)에 해당한다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"IROPS","targetId":"irops"},{"type":"related","targetTerm":"Queue","targetId":"queue"},{"type":"related","targetTerm":"Involuntary Reissue","targetId":"involuntary-reissue"},{"type":"related","targetTerm":"Refund","targetId":"refund"},{"type":"related","targetTerm":"PNR","targetId":"pnr"},{"type":"related","targetTerm":"Slot","targetId":"slot"}],"distinctions":[{"targetTerm":"IROPS","explanation":"Schedule change is a planned amendment to the published schedule communicated in advance; IROPS is unplanned day-of-operations disruption (delays, cancellations, diversions).","explanation_ko":"스케줄 변경은 사전에 통지되는, 게시된 스케줄에 대한 계획된 수정이고, IROPS는 계획되지 않은 당일 운영 중단(지연, 취소, 회항)이다.","targetId":"irops"},{"targetTerm":"Involuntary Reissue","explanation":"Schedule change is the triggering event; involuntary reissue is the resulting ticket action to reaccommodate the passenger at no additional fare.","explanation_ko":"스케줄 변경은 촉발 사건이고, 비자발적 재발권은 추가 운임 없이 승객을 재수용하기 위해 그 결과로 이루어지는 항공권 처리다.","targetId":"involuntary-reissue"}],"sources":[{"name":"Standard Schedules Information Manual (SSIM)","org":"IATA","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"8\" y=\"10\" width=\"26\" height=\"26\" rx=\"2\"/>\u003cpath d=\"M8 17h26M14 7v6M28 7v6\"/>\u003ccircle cx=\"36\" cy=\"34\" r=\"8\"/>\u003cpath d=\"M36 30v4l3 2\"/>\u003cpath d=\"M30 30l-2-2v3h3\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"seat-map","term":"Seat Map","abbreviation":"","aliases":["Seatmap","Seating Chart","Seat Availability Map","Aircraft Seat Map"],"category":"air-ops","conceptType":"standard-term","status":"active","definition":"A Seat Map is the graphical or structured representation of an aircraft cabin layout for a specific flight and cabin, showing each seat's position, type and current availability so passengers can select a seat. It is requested and returned per flight segment, reflecting the seating configuration and any chargeable seat attributes.","longDef":"Seat maps are exchanged via standardized messages: the OpenTravel OTA_AirSeatMapRQ/RS pair and, in NDC, a SeatAvailability message that returns free and paid seats (the latter as priced offers/CatalogOfferings). A seat map encodes rows and columns, seat characteristics (window/aisle, exit row, bassinet, extra legroom, blocked), occupancy/availability, and price where the seat is an Ancillary Service / EMD-paid item. Carrier configurations vary by aircraft type and version, and the map reflects pre-blocked or already-assigned seats; seat selection results are stored against the PNR segment.","standardBody":"OpenTravel Alliance","term_ko":"Seat Map (좌석 배치도 / 좌석맵)","definition_ko":"Seat Map은 특정 항공편과 cabin의 항공기 객실 배치를 그래픽 또는 구조화된 형태로 표현한 것으로, 각 좌석의 위치·유형·현재 가용 여부를 보여 승객이 좌석을 선택할 수 있게 한다. flight segment별로 요청·반환되며 좌석 구성과 유료 좌석 속성을 반영한다.","longDef_ko":"Seat Map은 표준 메시지로 교환된다. OpenTravel의 OTA_AirSeatMapRQ/RS 쌍, NDC에서는 무료·유료 좌석(유료는 priced offer/CatalogOffering)을 반환하는 SeatAvailability 메시지가 사용된다. seat map은 행·열, 좌석 특성(창측/통로측, 비상구열, bassinet, 추가 legroom, 사용불가), 점유/가용 여부, 그리고 좌석이 Ancillary Service / EMD로 결제되는 경우의 가격을 담는다. 항공기 type·version에 따라 구성이 달라지고 사전 block되거나 이미 배정된 좌석을 반영하며, 좌석 선택 결과는 PNR segment에 저장된다.","providerTerms":[{"provider":"OpenTravel Alliance","term":"OTA_AirSeatMapRQ / OTA_AirSeatMapRS","context":"XML request/response messages carrying cabin seat layout and availability per segment.","context_ko":"segment별 cabin 좌석 배치와 가용 여부를 담는 XML 요청/응답 메시지.","relationship":"same"},{"provider":"Travelport","term":"Seat Map API","context":"Universal API/JSON service returning aircraft seat maps for booking and seat assignment.","context_ko":"예약 및 좌석 배정을 위해 항공기 seat map을 반환하는 Universal API/JSON 서비스.","relationship":"related"}],"relationships":[{"type":"related","targetTerm":"Segment","targetId":"segment"},{"type":"related","targetTerm":"Ancillary Service","targetId":"ancillary-service"},{"type":"related","targetTerm":"EMD","targetId":"emd"},{"type":"related","targetTerm":"NDC","targetId":"ndc"},{"type":"related","targetTerm":"OpenTravel Alliance","targetId":"opentravel-alliance"}],"distinctions":[{"targetTerm":"Availability","explanation":"Availability tells whether seats can be sold in a given booking class (RBD) at the flight/cabin level; a Seat Map shows the physical layout and which individual seats are open for assignment. Availability drives selling; seat map drives seat selection.","explanation_ko":"Availability는 특정 예약 클래스(RBD)에서 항공편/cabin 단위로 좌석 판매 가능 여부를 알려주고, Seat Map은 물리적 배치와 어떤 개별 좌석을 배정할 수 있는지를 보여준다. availability는 판매를, seat map은 좌석 선택을 좌우한다.","targetId":"availability"}],"sources":[{"org":"OpenTravel Alliance","name":"OpenTravel Specifications — OTA_AirSeatMapRQ/RS","version":"","section":"","url":""},{"org":"IATA","name":"NDC Implementation Guide — SeatAvailability","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M16 11c-3 5-3 26 0 30M32 11c3 5 3 26 0 30\"/>\u003crect x=\"19\" y=\"15\" width=\"4\" height=\"4\" rx=\"1\"/>\u003crect x=\"25\" y=\"15\" width=\"4\" height=\"4\" rx=\"1\"/>\u003crect x=\"19\" y=\"22\" width=\"4\" height=\"4\" rx=\"1\"/>\u003crect x=\"25\" y=\"22\" width=\"4\" height=\"4\" rx=\"1\"/>\u003crect x=\"19\" y=\"29\" width=\"4\" height=\"4\" rx=\"1\"/>\u003crect x=\"25\" y=\"29\" width=\"4\" height=\"4\" rx=\"1\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"secure-flight","term":"Secure Flight","term_ko":"Secure Flight (미국 TSA 사전 심사)","abbreviation":"SFPD","aliases":["Secure Flight Passenger Data","SFPD","Secure Flight Program"],"category":"customer","conceptType":"process","status":"active","definition":"A US Transportation Security Administration (TSA) program that prescreens passengers on covered flights against government watch lists. Carriers must collect Secure Flight Passenger Data (SFPD) — full name as on government ID, date of birth and gender, plus optional Redress Number or Known Traveler Number — and submit it to TSA before travel.","definition_ko":"대상 항공편의 승객을 정부 감시 명단과 대조하여 사전 심사하는 미국 교통안전청(TSA)의 프로그램이다. 항공사는 Secure Flight Passenger Data(SFPD), 즉 정부 발급 신분증상의 전체 성명, 생년월일, 성별과 선택 항목인 Redress Number 또는 Known Traveler Number를 수집하여 여행 전 TSA에 제출해야 한다.","longDef":"Secure Flight transfers watch-list matching from individual carriers to the TSA to reduce misidentifications and improve security on flights to, from, over or within the United States. SFPD must be provided at or before ticketing; the Known Traveler Number supports TSA PreCheck expedited screening, while a Redress Number (from the DHS TRIP program) helps travelers previously misidentified. The data is carried in reservations via the DOCS/Secure Flight SSR elements. It is a regulatory security program, not a marketing or identity-convenience framework.","longDef_ko":"Secure Flight는 미국으로/미국에서/미국 상공을 지나거나 미국 내를 운항하는 항공편의 오인 식별을 줄이고 보안을 강화하기 위해 감시 명단 대조 업무를 개별 항공사에서 TSA로 이관한다. SFPD는 발권 시 또는 그 이전에 제공되어야 하며, Known Traveler Number는 TSA PreCheck 신속 심사를 지원하고, (DHS TRIP 프로그램에서 발급하는) Redress Number는 과거에 잘못 식별되었던 여행자를 돕는다. 해당 데이터는 DOCS/Secure Flight SSR 요소를 통해 예약에 담긴다. 이는 마케팅이나 신원 편의 프레임워크가 아니라 규제상의 보안 프로그램이다.","standardBody":"","providerTerms":[],"relationships":[{"type":"related","targetTerm":"SSR","targetId":"ssr"},{"type":"related","targetTerm":"Customer Profile","targetId":"customer-profile"},{"type":"related","targetTerm":"Name Change","targetId":"name-change"}],"distinctions":[{"targetTerm":"IATA One ID","explanation":"Secure Flight is a mandatory US government watch-list prescreening program; One ID is a voluntary industry digital-identity/biometric framework for seamless travel.","explanation_ko":"Secure Flight는 의무적인 미국 정부의 감시 명단 사전 심사 프로그램이고, One ID는 매끄러운 여행을 위한 자발적인 업계의 디지털 신원·생체 인식 프레임워크이다.","targetId":"iata-one-id"},{"targetTerm":"Name Change","explanation":"Secure Flight requires the booked name to match the government ID, which is the common driver of permitted name corrections.","explanation_ko":"Secure Flight는 예약된 이름이 정부 발급 신분증과 일치하도록 요구하며, 이것이 허용되는 이름 정정의 흔한 유발 요인이다.","targetId":"name-change"}],"sources":[{"name":"49 CFR Part 1560 — Secure Flight Program","org":"TSA","version":"","section":"","url":"https://www.ecfr.gov/current/title-49/subtitle-B/chapter-XII/subchapter-C/part-1560"},{"name":"Secure Flight Program (Federal Register)","org":"TSA","version":"","section":"","url":"https://www.federalregister.gov/documents/2008/10/28/E8-25432/secure-flight-program"}],"lastReviewed":"2026-06-15","icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M24 5l15 5v10c0 11-7 18-15 23-8-5-15-12-15-23V10z\"/>\u003cpath d=\"M24 14l9 3v6c0 6.5-4 11-9 14-5-3-9-7.5-9-14v-6z\" stroke-width=\"0\"/>\u003cpath d=\"M28 19l-9 9-4.5-4.5\" stroke-width=\"2.5\"/>\u003c/svg>"},{"id":"segment","term":"Segment","abbreviation":"","aliases":["Booking Segment","Flight Segment","Air Segment"],"category":"air-ops","conceptType":"business-term","status":"active","definition":"A segment is a single bookable air transportation unit between a board point and an off point as marketed and sold under one flight number, regardless of how many physical takeoffs and landings (legs) it contains. It is the unit of inventory that is sold, ticketed, and stored as an itinerary element in a PNR.","definition_ko":"segment(구간)은 하나의 편명으로 마케팅되고 판매되는, 탑승지(board point)와 하기지(off point) 사이의 단일 예약 가능 항공 운송 단위로, 물리적인 이착륙(leg)이 몇 번이든 관계없이 하나의 단위로 본다. 이는 판매·발권되고 PNR에 여정 요소로 저장되는 좌석 재고(inventory) 단위다.","term_ko":"구간(Segment)","longDef":"A segment corresponds to a flight number and a booking class (RBD) from origin to destination as offered for sale. A direct flight that makes an intermediate stop without a change of flight number is one segment but two legs. Segments are the basis for availability requests, fare component construction, and flight coupons; each ticketed segment normally maps to one flight coupon.","longDef_ko":"segment는 판매를 위해 제공되는 출발지에서 도착지까지의 편명과 예약 등급(RBD)에 대응한다. 편명 변경 없이 중간 기착하는 직항편은 하나의 segment이지만 두 개의 leg이다. segment는 좌석 가용성 조회, 운임 구성 요소(fare component) 구성, 항공권 쿠폰의 기준이 되며, 발권된 각 segment는 일반적으로 하나의 flight coupon에 대응한다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"parent","targetTerm":"Leg","targetId":"leg"},{"type":"child","targetTerm":"PNR","targetId":"pnr"},{"type":"related","targetTerm":"Married Segment","targetId":"married-segment"},{"type":"related","targetTerm":"Passive Segment","targetId":"passive-segment"},{"type":"related","targetTerm":"RBD","targetId":"rbd"},{"type":"related","targetTerm":"Flight Coupon","targetId":"flight-coupon"},{"type":"related","targetTerm":"Fare Component","targetId":"fare-component"}],"distinctions":[{"targetTerm":"Leg","explanation":"A segment is the marketed origin-to-destination flight under one flight number; a leg is a single physical takeoff-to-landing hop, so one segment can contain multiple legs.","explanation_ko":"segment는 하나의 편명으로 마케팅되는 출발지에서 도착지까지의 항공편이며, leg은 단일 물리적 이착륙 구간이므로 하나의 segment가 여러 개의 leg을 포함할 수 있다.","targetId":"leg"}],"sources":[{"name":"Passenger Services Conference Resolutions Manual (PSCRM)","org":"IATA","version":"","section":"","url":""},{"name":"Standard Schedules Information Manual (SSIM)","org":"IATA","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003ccircle cx=\"10\" cy=\"34\" r=\"3.5\"/>\u003ccircle cx=\"38\" cy=\"14\" r=\"3.5\"/>\u003cline x1=\"12.6\" y1=\"31.4\" x2=\"35.4\" y2=\"16.6\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"settlement-cycle","term":"Settlement Cycle","abbreviation":"","aliases":["settlement period","billing and settlement cycle"],"category":"pay","conceptType":"process","status":"active","definition":"A settlement cycle is the defined recurring period over which transactions are accumulated, billed, netted, and the resulting funds transferred between parties. In airline distribution it governs how sales reported through BSP or ARC are billed to agents and paid to airlines on a fixed calendar.","longDef":"In agency settlement, the BSP and ARC publish a reporting and remittance calendar that divides each month into settlement (billing) periods; sales and refunds in a period are netted, billed to agents, and the net amount is settled by direct debit on the remittance date, with funds then disbursed to the participating airlines. In card payments, the settlement cycle is the schedule on which the acquirer batches authorized transactions, the networks clear and net them between acquirers and issuers, and funds reach the merchant (often T+1 to T+3 business days depending on the acquirer and card type). The IATA Clearing House operates its own settlement calendar for interline and other inter-airline obligations. Settlement frequency and timing directly affect a travel business's working capital and exposure to counterparty default.","standardBody":"IATA","term_ko":"정산 주기 (Settlement Cycle)","definition_ko":"Settlement Cycle(정산 주기)는 거래가 누적·청구·상계되고 그 결과 자금이 당사자 간에 이전되는, 정해진 반복 기간이다. 항공 유통에서는 BSP나 ARC를 통해 보고된 판매가 고정된 달력에 따라 여행사에 청구되고 항공사에 지급되는 방식을 규율한다.","longDef_ko":"여행사 정산에서 BSP와 ARC는 매월을 여러 정산(청구) 기간으로 나누는 보고·송금 달력을 공표한다. 한 기간의 판매와 환불은 상계되어 여행사에 청구되고, 순액은 송금일(remittance date)에 자동이체로 정산되며, 이후 자금이 참여 항공사에 배분된다. 카드 결제에서 정산 주기는 매입사(Acquirer)가 승인 거래를 배치 처리하고, 네트워크가 매입사와 발급사 간에 청산·상계하며, 자금이 가맹점에 도달하는 일정으로, 매입사와 카드 유형에 따라 보통 영업일 기준 T+1~T+3이다. IATA Clearing House는 Interline 등 항공사 간 채무에 대해 자체 정산 달력을 운영한다. 정산 빈도와 시점은 여행 사업자의 운전자본과 거래상대방 부도 노출에 직접적인 영향을 준다.","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Remittance","targetId":"remittance"},{"type":"related","targetTerm":"BSP","targetId":"bsp"},{"type":"related","targetTerm":"ARC","targetId":"arc"},{"type":"related","targetTerm":"IATA Clearing House","targetId":"iata-clearing-house"},{"type":"related","targetTerm":"Acquirer","targetId":"acquirer"}],"distinctions":[{"targetTerm":"Remittance","explanation":"The settlement cycle is the calendar and periodicity that determines when funds move; remittance is the specific funding event (agent paying the net amount) that takes place within that cycle.","explanation_ko":"Settlement Cycle은 자금이 언제 이동하는지를 정하는 달력·주기이고, Remittance는 그 주기 안에서 일어나는 구체적 자금 납입 사건(여행사가 순액을 납부하는 것)이다.","targetId":"remittance"},{"targetTerm":"IATA Clearing House","explanation":"The IATA Clearing House is an institution that nets and settles inter-airline accounts; a settlement cycle is the timing structure on which it and other settlement systems operate.","explanation_ko":"IATA Clearing House는 항공사 간 계정을 상계·정산하는 기관이고, Settlement Cycle은 그 기관과 다른 정산 시스템이 작동하는 시점 구조다.","targetId":"iata-clearing-house"}],"sources":[{"org":"IATA","name":"BSP Reporting and Remittance Calendar / Passenger Agency Conference Resolutions","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M38 16a16 16 0 1 0 4 14\"/>\u003cpath d=\"M38 8v8h-8\"/>\u003ccircle cx=\"24\" cy=\"24\" r=\"3.5\"/>\u003cpath d=\"M24 16v3M24 29v3\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"shopping-api","term":"Shopping API","term_ko":"쇼핑 API(조회 API)","abbreviation":"","aliases":["Air Shopping API","AirShopping","Search API","Shopping Service"],"category":"standards","conceptType":"standard-term","status":"active","definition":"A Shopping API is the distribution interface a travel seller calls to search a supplier's products and receive priced offers in response to trip criteria such as origin, destination, dates, and passengers. In IATA NDC the canonical example is the AirShopping message (IATA_AirShoppingRQ/RS), which returns flight offers with fares, branded options, and ancillaries.","definition_ko":"쇼핑 API(Shopping API)는 여행 판매자가 출발지·도착지·날짜·승객 등 여정 조건에 대해 공급사의 상품을 검색하고 가격이 매겨진 오퍼를 응답으로 받기 위해 호출하는 유통 인터페이스이다. IATA NDC에서 대표적인 예는 AirShopping 메시지(IATA_AirShoppingRQ/RS)로, 운임·브랜디드 옵션·부가 서비스를 포함한 항공 오퍼를 반환한다.","longDef":"The shopping step is the entry point of the Offer and Order flow: a seller submits a request (e.g. IATA_AirShoppingRQ) and the supplier's Offer engine returns a response (IATA_AirShoppingRS) of priced availability offers, often supporting anonymous or personalized, attribute, affinity, and calendar/date-range shopping with media at offer level. Selected offers are then re-priced (e.g. OfferPrice) and committed via OrderCreate. Shopping APIs are exposed over SOAP/XML and increasingly REST/JSON, and also exist outside NDC for hotels and other content.","longDef_ko":"조회(shopping) 단계는 Offer and Order 흐름의 진입점이다. 판매자가 요청(예: IATA_AirShoppingRQ)을 보내면 공급사의 오퍼 엔진이 가격이 매겨진 가용성 오퍼들의 응답(IATA_AirShoppingRS)을 반환하며, 익명 또는 개인화된 조회, 속성(attribute)·친화도(affinity)·달력/기간 조회, 오퍼 단위 미디어 등을 지원하는 경우가 많다. 선택된 오퍼는 이후 재가격책정(예: OfferPrice)되고 OrderCreate로 확정된다. 쇼핑 API는 SOAP/XML 및 점차 REST/JSON으로 제공되며, NDC 밖에서도 호텔 등 다른 콘텐츠를 위해 존재한다.","standardBody":"IATA (NDC AirShopping)","providerTerms":[{"provider":"IATA","term":"AirShopping (IATA_AirShoppingRQ / IATA_AirShoppingRS)","context":"The NDC shopping message pair that returns priced flight offers","context_ko":"가격이 매겨진 항공 오퍼를 반환하는 NDC 조회 메시지 쌍","relationship":"narrower"}],"relationships":[{"type":"related","targetTerm":"NDC","targetId":"ndc"},{"type":"related","targetTerm":"Offer","targetId":"offer"},{"type":"related","targetTerm":"Offer Management System","targetId":"offer-management-system"},{"type":"related","targetTerm":"Availability","targetId":"availability"},{"type":"related","targetTerm":"REST API","targetId":"rest-api"}],"distinctions":[{"targetTerm":"Availability","explanation":"Availability indicates whether seats/classes are sellable; a Shopping API returns constructed, priced Offers built on top of that availability.","explanation_ko":"가용성(Availability)은 좌석/등급의 판매 가능 여부를 나타내고, 쇼핑 API는 그 가용성을 토대로 구성하여 가격을 매긴 오퍼를 반환한다.","targetId":"availability"},{"targetTerm":"Offer","explanation":"An Offer is the priced proposal object; the Shopping API is the request/response interface used to obtain Offers during search.","explanation_ko":"Offer는 가격이 매겨진 제안 객체이고, 쇼핑 API는 검색 중 오퍼를 얻기 위해 사용하는 요청/응답 인터페이스이다.","targetId":"offer"}],"sources":[{"org":"IATA","name":"NDC Standards (AirShopping message)","version":"","section":"","url":""},{"org":"ATPCO","name":"NDC Solutions - AirShopping API","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003ccircle cx=\"21\" cy=\"21\" r=\"12\"/>\u003cline x1=\"30\" y1=\"30\" x2=\"40\" y2=\"40\"/>\u003cpath d=\"M15 21h12\"/>\u003cpath d=\"M27 21l-4-4\"/>\u003cpath d=\"M27 21l-4 4\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"slot","term":"Slot","term_ko":"슬롯(공항 운항 시간대)","abbreviation":"","aliases":["Airport Slot","Takeoff/Landing Slot","Coordination Slot"],"category":"air-partner","conceptType":"business-term","status":"active","definition":"A permission allocated to an airline to operate an aircraft arrival or departure at a specific date and time at a capacity-constrained (coordinated) airport. Slots are required to schedule flights at congested airports and are administered under coordination rules such as the Worldwide Airport Slot Guidelines (WASG).","definition_ko":"수용 능력이 제한된(조정 대상) 공항에서 특정 날짜와 시간에 항공기의 도착 또는 출발을 운항할 수 있도록 항공사에 배정되는 허가. 슬롯은 혼잡 공항에서 항공편 스케줄을 편성하는 데 필요하며, WASG(Worldwide Airport Slot Guidelines)와 같은 조정 규칙에 따라 운영된다.","longDef":"At Level 3 (fully coordinated) airports, a slot coordinator allocates slots based on rules covering historic precedence (\"grandfather rights\"), the 80/20 use-it-or-lose-it utilization requirement, new-entrant priorities, and slot pools. Slots are distinct from the flight schedule itself: a carrier must hold the necessary slots before it can publish and operate a schedule. Slots may be exchanged or transferred under applicable rules and are commercially valuable at the most congested airports.","longDef_ko":"레벨 3(완전 조정 대상) 공항에서는 슬롯 조정관이 과거 운항 실적에 따른 우선권(\"grandfather rights\"), 80/20 사용하지 않으면 상실(use-it-or-lose-it) 활용 요건, 신규 진입자 우선권, 슬롯 풀을 다루는 규칙에 따라 슬롯을 배정한다. 슬롯은 항공편 스케줄 자체와는 구별되며, 항공사는 스케줄을 게시하고 운항하기 전에 필요한 슬롯을 보유해야 한다. 슬롯은 해당 규칙에 따라 교환되거나 양도될 수 있으며, 가장 혼잡한 공항에서는 상업적으로 가치가 높다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Schedule Change","targetId":"schedule-change"},{"type":"related","targetTerm":"Airport Code","targetId":"airport-code"}],"distinctions":[{"targetTerm":"Schedule Change","explanation":"A slot is the right to use the airport at a given time; a schedule change is an alteration to a published flight's timing or routing, which may require obtaining or returning slots.","explanation_ko":"슬롯은 특정 시간에 공항을 사용할 권리이고, 스케줄 변경은 게시된 항공편의 시간이나 노선을 변경하는 것으로, 슬롯의 취득이나 반납이 필요할 수 있다.","targetId":"schedule-change"}],"sources":[{"name":"Worldwide Airport Slot Guidelines (WASG)","org":"IATA / ACI / WWACG","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003ccircle cx=\"24\" cy=\"24\" r=\"16\"/>\u003cpath d=\"M24 14v10l7 4\"/>\u003cpath d=\"M24 8v3M24 37v3M8 24h3M37 24h3\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"spa-special-prorate-agreement","term":"SPA (Special Prorate Agreement)","term_ko":"SPA(특별 운임 배분 협정)","abbreviation":"SPA","aliases":["Special Prorate Agreement","Special Pro-rate Agreement"],"category":"air-partner","conceptType":"document","status":"active","definition":"A bilateral agreement between two airlines that establishes special, negotiated proration values (the share of fare each carrier receives) for interline traffic carried on agreed routes, overriding the standard multilateral prorate values. SPAs enable carriers to offer competitive through-fares on multi-carrier itineraries.","definition_ko":"두 항공사 간에 합의된 노선에서 운송되는 인터라인 운송에 대해 표준 다자간 프로레이트 값을 대체하는 특별하고 협상된 프로레이션 값(각 항공사가 받는 운임 배분 몫)을 설정하는 양자 간 협정. SPA를 통해 항공사는 여러 항공사가 관여하는 여정에서 경쟁력 있는 일관 운임(through-fare)을 제공할 수 있다.","longDef":"Where the default multilateral proration would not yield commercially attractive revenue splits, carriers sign SPAs specifying fixed amounts, percentages, or special prorate factors for defined origin-destination pairs and fare types. SPAs are central to alliance and partner pricing, allowing the construction of competitive interline and codeshare through-fares. Settlement of the resulting amounts typically flows through the IATA Clearing House.","longDef_ko":"기본 다자간 프로레이션으로는 상업적으로 매력적인 수익 배분이 나오지 않는 경우, 항공사는 특정 출발지-목적지 쌍과 운임 유형에 대해 고정 금액, 비율 또는 특별 프로레이트 계수를 명시한 SPA를 체결한다. SPA는 동맹 및 파트너 운임 책정의 핵심으로, 경쟁력 있는 인터라인 및 공동운항 일관 운임을 구성할 수 있게 한다. 그 결과로 발생하는 금액의 정산은 일반적으로 IATA Clearing House를 통해 이루어진다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Proration","targetId":"proration"},{"type":"related","targetTerm":"Interline","targetId":"interline"},{"type":"related","targetTerm":"MITA","targetId":"mita"},{"type":"related","targetTerm":"IATA Clearing House","targetId":"iata-clearing-house"},{"type":"related","targetTerm":"Fare Component","targetId":"fare-component"}],"distinctions":[{"targetTerm":"Proration","explanation":"Proration is the general process of splitting a fare among carriers; an SPA is a specific bilateral agreement that sets special values used in that process.","explanation_ko":"프로레이션은 운임을 항공사 간에 분배하는 일반적인 과정이고, SPA는 그 과정에서 사용되는 특별 값을 설정하는 구체적인 양자 간 협정이다.","targetId":"proration"},{"targetTerm":"MITA","explanation":"MITA provides the standard multilateral interline/prorate framework, whereas an SPA is a bilateral override with negotiated values between two carriers.","explanation_ko":"MITA는 표준 다자간 인터라인/프로레이트 체계를 제공하는 반면, SPA는 두 항공사 간에 협상된 값으로 이를 대체하는 양자 간 협정이다.","targetId":"mita"}],"sources":[{"name":"Prorate Manual — Passenger (PMP)","org":"IATA","version":"","section":"","url":""},{"name":"Revenue Accounting Manual (RAM)","org":"IATA","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"9\" y=\"8\" width=\"22\" height=\"30\" rx=\"2\"/>\u003cpath d=\"M14 16h12M14 21h12M14 26h7\"/>\u003cpath d=\"M28 32l5 5 10
