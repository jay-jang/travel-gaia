y Agreement","Most Favoured Nation (rate clause)"],"category":"hotel-rate","conceptType":"business-term","status":"active","definition":"Rate parity is the practice or contractual commitment of maintaining consistent rates (and often availability/conditions) for the same room type and dates across distribution channels, so that, for example, an OTA does not show a different public rate than the hotel's own website. It is frequently enforced through parity clauses in distribution contracts.","definition_ko":"Rate parity는 동일한 객실 유형과 날짜에 대해 유통 채널 전반에서 일관된 요금(그리고 흔히 가용 여부·조건)을 유지하는 관행 또는 계약상 약정으로, 예를 들어 OTA가 호텔 자체 웹사이트와 다른 공개 요금을 표시하지 않도록 한다. 유통 계약의 parity 조항을 통해 시행되는 경우가 많다.","longDef":"Rate parity typically applies to public/BAR-type rates and aims to prevent channel undercutting. Clauses range from 'wide parity' (parity required across all channels including direct) to 'narrow parity' (parity only relative to the hotel's own direct channels). Such clauses have faced regulatory and competition-law scrutiny in several jurisdictions, leading to restrictions or bans on wide parity, so the term's applicability varies by market.","longDef_ko":"Rate parity는 일반적으로 공개 요금/BAR 유형 요금에 적용되며 채널 간 가격 후려치기를 방지하는 것을 목표로 한다. 조항은 '광의 parity'(직판을 포함한 모든 채널에서 동등성 요구)부터 '협의 parity'(호텔 자체 직판 채널에 대해서만 동등성 요구)까지 다양하다. 이러한 조항은 여러 관할권에서 규제 및 경쟁법상 검토를 받아 광의 parity에 대한 제한이나 금지로 이어졌으므로, 이 용어의 적용 가능성은 시장마다 다르다.","standardBody":"","providerTerms":[],"relationships":[{"type":"related","targetTerm":"BAR","targetId":"bar"},{"type":"related","targetTerm":"OTA (Online Travel Agency)","targetId":"ota-online-travel-agency"},{"type":"related","targetTerm":"Rate Plan","targetId":"rate-plan"},{"type":"related","targetTerm":"Channel Manager","targetId":"channel-manager"}],"distinctions":[{"targetTerm":"BAR","explanation":"BAR is the actual best public rate; rate parity is the policy that this rate stays consistent across channels.","explanation_ko":"BAR은 실제 최저 공개 요금이고, rate parity는 이 요금이 채널 전반에서 일관되게 유지되도록 하는 정책이다.","targetId":"bar"}],"sources":[{"name":"Industry distribution and competition-law commentary on hotel rate parity","org":"","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"rate-plan","term":"Rate Plan","term_ko":"요금제(Rate Plan)","abbreviation":"","aliases":["Rate Code","Rate Type","Tariff"],"category":"hotel-rate","conceptType":"business-term","status":"active","definition":"A named, sellable pricing offer attached to one or more room types that defines the price and the commercial conditions under which a room is sold, such as inclusions, cancellation rules, payment terms, and eligibility. Examples include a Best Available Rate, an advance-purchase non-refundable rate, or a corporate negotiated rate.","definition_ko":"하나 이상의 객실 유형에 연결되어 객실이 판매되는 가격과 상업적 조건(포함 항목, 취소 규정, 결제 조건, 적용 대상 등)을 정의하는 명명된 판매용 가격 상품이다. BAR(Best Available Rate), 사전 구매형 환불 불가 요금, 기업 협상 요금 등이 그 예이다.","longDef":"A rate plan bundles a price (or pricing logic) together with rules and restrictions: board basis, cancellation/guarantee policy, minimum/maximum length of stay, advance booking and stay-date windows, market segment or qualification (e.g. corporate, member, opaque), and whether the rate is commissionable or net. In a CRS/PMS a rate plan is identified by a rate code and mapped to room types and date ranges; the same physical room can be sold under many rate plans at different prices and conditions.","longDef_ko":"요금제는 가격(또는 가격 산정 로직)을 식사 조건, 취소/보증 정책, 최소/최대 숙박일수, 사전 예약 및 투숙일 기간, 시장 세그먼트나 자격 조건(예: 기업, 회원, 비공개), 수수료 지급 여부 또는 net 여부 등의 규칙·제약과 함께 묶은 것이다. CRS/PMS에서 요금제는 rate code로 식별되며 객실 유형과 날짜 범위에 매핑된다. 동일한 실제 객실이라도 여러 요금제 아래 서로 다른 가격과 조건으로 판매될 수 있다.","standardBody":"OpenTravel Alliance","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Room Type","targetId":"room-type"},{"type":"related","targetTerm":"Board Basis","targetId":"board-basis"},{"type":"narrower","targetTerm":"BAR","targetId":"bar"},{"type":"related","targetTerm":"Cancellation Policy","targetId":"cancellation-policy"},{"type":"related","targetTerm":"Net Rate","targetId":"net-rate"},{"type":"related","targetTerm":"Commissionable Rate","targetId":"commissionable-rate"},{"type":"related","targetTerm":"ARI","targetId":"ari"},{"type":"related","targetTerm":"Length of Stay","targetId":"length-of-stay"}],"distinctions":[{"targetTerm":"Room Type","explanation":"A rate plan is the price/conditions; a room type is the physical product being priced — the same room type is sold under many rate plans.","explanation_ko":"요금제는 가격·조건을 의미하고, 객실 유형은 가격이 매겨지는 실제 상품을 의미한다. 동일한 객실 유형이 여러 요금제 아래 판매된다.","targetId":"room-type"},{"targetTerm":"BAR","explanation":"BAR is one specific kind of rate plan (the best unrestricted publicly available one), whereas Rate Plan is the general concept covering all offer types.","explanation_ko":"BAR은 요금제의 한 특정 유형(제약 없이 일반에 공개되는 최저 요금)인 반면, 요금제는 모든 상품 유형을 아우르는 일반 개념이다.","targetId":"bar"}],"sources":[{"name":"OpenTravel Specification (Hotel messages, RatePlan)","org":"OpenTravel Alliance","version":"","section":"","url":""},{"name":"HTNG distribution and messaging specifications","org":"HTNG","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"rbd","term":"RBD","term_ko":"예약 등급 지정자 (RBD)","abbreviation":"RBD","aliases":["Reservation Booking Designator","Booking Class","Booking Code","Class of Service"],"category":"air-shop","conceptType":"code","status":"active","definition":"An RBD (Reservation Booking Designator) is a single-letter code that identifies the booking class in which a seat is sold and inventory is controlled on a flight. Each RBD maps to a fare and a level of inventory, distinct from the physical cabin (First, Business, Economy).","definition_ko":"RBD(Reservation Booking Designator, 예약 등급 지정자)는 항공편에서 좌석이 판매되고 재고가 관리되는 예약 등급을 식별하는 한 글자 코드이다. 각 RBD는 운임 및 재고 수준에 매핑되며, 물리적 객실 등급(First, Business, Economy)과는 구별된다.","longDef":"RBDs are single alphabetic characters (for example F, J, Y, B, M, Q) that airlines use to segment a cabin into multiple priced inventory buckets for revenue management. The fare basis code references an RBD as its prime/booking code, and availability is published per RBD. Several different RBDs typically exist within one physical cabin, allowing the carrier to sell the same cabin at different fare levels and to control how many seats are released to each price point.","longDef_ko":"RBD는 한 글자의 알파벳 문자(예: F, J, Y, B, M, Q)로, 항공사가 수익 관리를 위해 하나의 객실 등급을 여러 가격대의 재고 버킷으로 세분화하는 데 사용한다. 운임 기준 코드(fare basis code)는 RBD를 주요/예약 코드로 참조하며, 가용성은 RBD별로 공시된다. 일반적으로 하나의 물리적 객실 등급 안에 여러 RBD가 존재하여, 항공사는 동일한 객실을 서로 다른 운임 수준으로 판매하고 각 가격대에 배정되는 좌석 수를 제어할 수 있다.","standardBody":"IATA","providerTerms":[{"provider":"Sabre","term":"Class of Service / Booking Class","context":"Sabre refers to the single-letter inventory code as the class of service.","context_ko":"Sabre는 한 글자 재고 코드를 class of service(서비스 등급)로 지칭한다.","relationship":"same"},{"provider":"Amadeus","term":"Booking Class","context":"Amadeus uses booking class for the RBD letter controlling inventory.","context_ko":"Amadeus는 재고를 제어하는 RBD 문자를 booking class(예약 등급)로 칭한다.","relationship":"same"}],"relationships":[{"type":"related","targetTerm":"Availability","targetId":"availability"},{"type":"related","targetTerm":"Fare Basis Code","targetId":"fare-basis-code"},{"type":"related","targetTerm":"Fare Family","targetId":"fare-family"},{"type":"related","targetTerm":"Passenger Type Code","targetId":"passenger-type-code"}],"distinctions":[{"targetTerm":"Fare Basis Code","explanation":"The RBD is the single booking-class letter; the fare basis code is the longer alphanumeric string identifying the full fare, usually starting with the RBD.","explanation_ko":"RBD는 한 글자의 예약 등급 문자이고, 운임 기준 코드는 전체 운임을 식별하는 더 긴 영숫자 문자열로 보통 해당 RBD로 시작한다.","targetId":"fare-basis-code"},{"targetTerm":"Availability","explanation":"RBD is the class identifier; availability is the seat count sellable in that RBD.","explanation_ko":"RBD는 등급 식별자이고, 가용성은 해당 RBD에서 판매 가능한 좌석 수이다.","targetId":"availability"}],"sources":[{"name":"AIRIMP (ATA/IATA Reservations Interline Message Procedures)","org":"IATA","version":"","section":"","url":""},{"name":"ATPCO Fares data documentation","org":"ATPCO","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"refund","term":"Refund","term_ko":"환불 (Refund)","abbreviation":"","aliases":["Ticket Refund","Refund Application"],"category":"air-ticket","conceptType":"process","status":"active","definition":"The return of all or part of a ticket's or EMD's value to the passenger or form of payment for unused or partially used coupons. Refund eligibility and any penalties are determined by the applicable fare rules (voluntary) or by involuntary refund provisions when the carrier fails to provide carriage.","definition_ko":"미사용 또는 부분 사용된 쿠폰에 대해 항공권 또는 EMD 가치의 전부 또는 일부를 승객 또는 지불 수단으로 반환하는 것이다. 환불 자격 여부와 위약금은 해당 운임 규정(자발적인 경우)에 의해, 또는 항공사가 운송을 제공하지 못한 경우 비자발적 환불 규정에 의해 결정된다.","longDef":"Refunds are categorized as voluntary (passenger-initiated, subject to refundability and cancellation penalties in the fare rule) or involuntary (carrier-caused cancellation/schedule failure, generally full and penalty-free). Refunded coupons are set to status REFUNDED so value cannot be reused, and unused taxes/fees may be refundable even on non-refundable fares depending on jurisdiction. For BSP/ARC sales, refunds are processed through the settlement system and netted against the agent's billing.","longDef_ko":"환불은 자발적 환불(승객 주도이며 운임 규정상의 환불 가능 여부 및 취소 위약금 적용)과 비자발적 환불(항공사 사유에 의한 결항/운항 실패로, 일반적으로 전액이며 위약금 없음)로 구분된다. 환불된 쿠폰은 가치가 재사용되지 못하도록 REFUNDED 상태로 설정되며, 미사용 세금/수수료는 관할 지역에 따라 환불 불가 운임에서도 환불될 수 있다. BSP/ARC 판매의 경우 환불은 정산 시스템을 통해 처리되어 대리점 청구액과 상계된다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"E-ticket","targetId":"e-ticket"},{"type":"related","targetTerm":"EMD","targetId":"emd"},{"type":"related","targetTerm":"Flight Coupon","targetId":"flight-coupon"},{"type":"contrasts","targetTerm":"Void","targetId":"void"},{"type":"contrasts","targetTerm":"Reissue","targetId":"reissue"},{"type":"related","targetTerm":"BSP","targetId":"bsp"},{"type":"related","targetTerm":"ARC","targetId":"arc"}],"distinctions":[{"targetTerm":"Void","explanation":"Void cancels an issuance within the same sales period at zero cost; a refund returns value after the sales/void window, typically with applicable penalties.","explanation_ko":"Void는 동일한 판매 기간 내에 무비용으로 발권을 취소하며, 환불은 판매/Void 기한 이후에 가치를 반환하되 통상 적용 가능한 위약금이 따른다.","targetId":"void"},{"targetTerm":"Reissue","explanation":"Refund returns value to the customer; reissue exchanges the ticket for new transportation.","explanation_ko":"환불은 고객에게 가치를 반환하며, 재발행은 항공권을 새로운 운송으로 교환한다.","targetId":"reissue"},{"targetTerm":"Chargeback","explanation":"A refund is a merchant-initiated return of funds; a chargeback is a cardholder-initiated dispute forced through the card network.","explanation_ko":"환불은 가맹점이 주도하는 자금 반환이며, 지불 거절(chargeback)은 카드 소지자가 주도하여 카드 네트워크를 통해 강제되는 분쟁이다.","targetId":"chargeback"}],"sources":[{"name":"Passenger Services Conference Resolutions Manual (PSCRM)","org":"IATA","version":"","section":"","url":""},{"name":"BSP Refund procedures","org":"IATA","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"reissue","term":"Reissue","term_ko":"재발행 (Reissue)","abbreviation":"","aliases":["Exchange","Ticket Exchange","Reissuance"],"category":"air-ticket","conceptType":"process","status":"active","definition":"The process of exchanging an existing ticket for a new one to reflect a change in itinerary, fare, or travel dates, computing any additional collection (ADC) or residual value. The original coupons are marked EXCHANGED and a new ticket with new coupons is issued.","definition_ko":"여정, 운임 또는 여행 날짜의 변경을 반영하기 위해 기존 항공권을 새 항공권으로 교환하는 절차로, 추가 징수액(ADC) 또는 잔여 가치를 계산한다. 원래의 쿠폰은 EXCHANGED로 표시되고 새로운 쿠폰을 가진 새 항공권이 발행된다.","longDef":"A voluntary reissue is initiated at the passenger's request (e.g., a date or routing change) and is governed by the fare rules of the applicable fare, which determine change penalties, fare difference recalculation, and whether residual value can be retained (often via an EMD). The reissue records the original ticket number in the new document's origin/issue data and shows fare/tax recalculation and any add-collect amount. Reissue contrasts with refund (returning value to the customer) and void (same-day cancellation of an unused issuance).","longDef_ko":"자발적 재발행은 승객의 요청(예: 날짜 또는 노선 변경)에 의해 시작되며, 변경 위약금, 운임 차액 재계산, 그리고 잔여 가치를 (흔히 EMD를 통해) 보존할 수 있는지 여부를 결정하는 해당 운임의 운임 규정(fare rule)에 따른다. 재발행은 새 서류의 origin/issue 데이터에 원래 항공권 번호를 기록하고 운임/세금 재계산과 추가 징수액(add-collect)을 표시한다. 재발행은 환불(고객에게 가치를 반환)이나 Void(미사용 발권의 당일 취소)와 구별된다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"E-ticket","targetId":"e-ticket"},{"type":"related","targetTerm":"Flight Coupon","targetId":"flight-coupon"},{"type":"related","targetTerm":"Refund","targetId":"refund"},{"type":"related","targetTerm":"Void","targetId":"void"},{"type":"contrasts","targetTerm":"Involuntary Reissue","targetId":"involuntary-reissue"},{"type":"related","targetTerm":"Fare Basis Code","targetId":"fare-basis-code"}],"distinctions":[{"targetTerm":"Involuntary Reissue","explanation":"Voluntary reissue is passenger-requested and subject to fare-rule penalties; involuntary reissue results from airline-caused changes and typically waives penalties.","explanation_ko":"자발적 재발행은 승객 요청에 의한 것으로 운임 규정상의 위약금이 적용되며, 비자발적 재발행은 항공사 사유에 의한 변경에서 비롯되어 일반적으로 위약금이 면제된다.","targetId":"involuntary-reissue"},{"targetTerm":"Refund","explanation":"Reissue exchanges the ticket for new travel; refund returns the ticket's value rather than re-issuing transportation.","explanation_ko":"재발행은 항공권을 새로운 여행으로 교환하며, 환불은 운송을 재발행하는 대신 항공권의 가치를 반환한다.","targetId":"refund"},{"targetTerm":"Void","explanation":"Void cancels an issuance within the same sales period leaving no reportable sale; reissue creates a new document and marks the old coupons as exchanged.","explanation_ko":"Void는 동일한 판매 기간 내에 발권을 취소하여 보고할 판매 내역을 남기지 않으며, 재발행은 새 서류를 생성하고 기존 쿠폰을 교환됨(exchanged)으로 표시한다.","targetId":"void"}],"sources":[{"name":"Passenger Services Conference Resolutions Manual (PSCRM)","org":"IATA","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"revpar","term":"RevPAR","term_ko":"가용 객실당 매출(RevPAR, Revenue Per Available Room)","abbreviation":"RevPAR","aliases":["Revenue Per Available Room"],"category":"hotel-rate","conceptType":"metric","status":"active","definition":"Revenue Per Available Room is a lodging performance metric equal to total room revenue divided by the number of available rooms over a period, equivalently ADR multiplied by occupancy rate. It combines pricing and occupancy into a single measure of how effectively a property monetizes its room inventory.","definition_ko":"RevPAR(Revenue Per Available Room)은 일정 기간의 총 객실 매출을 가용 객실 수로 나눈 값과 같은 숙박 성과 지표로, ADR에 객실 점유율을 곱한 값과 동일하다. 가격과 점유율을 하나의 지표로 결합해 숙소가 객실 재고를 얼마나 효과적으로 수익화하는지를 측정한다.","longDef":"RevPAR = Room Revenue / Rooms Available = ADR x Occupancy Rate. Because it uses available rooms (not just sold rooms) as the denominator, RevPAR reflects both rate achievement and how full the hotel is, making it the headline metric for comparing properties and tracking revenue management performance. A related metric, TRevPAR (Total Revenue Per Available Room), extends the numerator to all revenue (F&B, spa, etc.), and GOPPAR measures gross operating profit per available room.","longDef_ko":"RevPAR = 객실 매출 / 가용 객실 수 = ADR x 객실 점유율. 분모로 판매 객실이 아닌 가용 객실을 사용하므로, RevPAR은 요금 달성도와 호텔이 얼마나 찼는지를 모두 반영하여 숙소 비교와 수익 관리 성과 추적의 대표 지표가 된다. 관련 지표로 TRevPAR(Total Revenue Per Available Room)은 분자를 모든 매출(F&B, 스파 등)로 확장하며, GOPPAR은 가용 객실당 총영업이익을 측정한다.","standardBody":"","providerTerms":[],"relationships":[{"type":"related","targetTerm":"ADR","targetId":"adr"},{"type":"related","targetTerm":"Occupancy","targetId":"occupancy"}],"distinctions":[{"targetTerm":"ADR","explanation":"RevPAR uses available rooms as the denominator and blends in occupancy; ADR uses only sold rooms and isolates price.","explanation_ko":"RevPAR은 가용 객실을 분모로 사용해 점유율을 함께 반영하고, ADR은 판매 객실만 사용해 가격만 분리해 본다.","targetId":"adr"},{"targetTerm":"Occupancy","explanation":"Occupancy rate is one of the two inputs to RevPAR (RevPAR = ADR x occupancy rate); on its own it ignores the rate achieved.","explanation_ko":"객실 점유율은 RevPAR의 두 입력값 중 하나이며(RevPAR = ADR x 객실 점유율), 그 자체만으로는 달성된 요금을 반영하지 못한다.","targetId":"occupancy"}],"sources":[{"name":"STR lodging performance metric definitions","org":"STR (CoStar)","version":"","section":"","url":""},{"name":"Uniform System of Accounts for the Lodging Industry (USALI)","org":"AHLA / HFTP","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"room-type","term":"Room Type","term_ko":"객실 유형(Room Type)","abbreviation":"","aliases":["Room Category","Accommodation Type","Room Class"],"category":"hotel-rate","conceptType":"business-term","status":"active","definition":"A category of bookable accommodation defined by its physical and product attributes — such as bed configuration, size, view, floor, and amenities — that groups individual rooms a hotel sells as interchangeable inventory. Examples include Standard Double, Deluxe King, and Junior Suite.","definition_ko":"침대 구성, 면적, 전망, 층, 편의시설 등 물리적·상품적 속성으로 정의되는 예약 가능한 숙박 범주로, 호텔이 상호 교환 가능한 재고로 판매하는 개별 객실들을 묶은 것이다. 스탠다드 더블, 디럭스 킹, 주니어 스위트 등이 그 예이다.","longDef":"Room types are the inventory unit hoteliers count and sell; availability and allotments are tracked per room type and date. Each room type is identified by a room type code in the CRS/PMS and is combined with one or more rate plans to produce sellable offers. The room-type-and-rate-plan combination is what is ultimately distributed as a sellable product.","longDef_ko":"객실 유형은 호텔이 집계하고 판매하는 재고 단위로, 가용 객실과 allotment는 객실 유형 및 날짜별로 관리된다. 각 객실 유형은 CRS/PMS에서 room type code로 식별되며, 하나 이상의 요금제와 결합되어 판매 가능한 상품을 만든다. 궁극적으로 유통되는 판매 상품은 이 객실 유형과 요금제의 조합이다.","standardBody":"OpenTravel Alliance","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Rate Plan","targetId":"rate-plan"},{"type":"related","targetTerm":"Occupancy","targetId":"occupancy"},{"type":"related","targetTerm":"Allotment","targetId":"allotment"},{"type":"related","targetTerm":"ARI","targetId":"ari"}],"distinctions":[{"targetTerm":"Rate Plan","explanation":"Room type is the physical product (the room); rate plan is the price and conditions under which that room is sold.","explanation_ko":"객실 유형은 실제 상품(객실)을 의미하고, 요금제는 그 객실이 판매되는 가격과 조건을 의미한다.","targetId":"rate-plan"},{"targetTerm":"Occupancy","explanation":"Room type describes the room's attributes; occupancy describes how many guests stay in it, which can affect the applicable price.","explanation_ko":"객실 유형은 객실의 속성을 설명하고, 투숙 인원(occupancy)은 몇 명의 투숙객이 머무는지를 설명하며 이는 적용 가격에 영향을 줄 수 있다.","targetId":"occupancy"}],"sources":[{"name":"OpenTravel Specification (Hotel messages, RoomType / RoomStay)","org":"OpenTravel Alliance","version":"","section":"","url":""},{"name":"HTNG messaging specifications","org":"HTNG","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"schedule-change","term":"Schedule Change","term_ko":"스케줄 변경(운항 일정 변경)","abbreviation":"","aliases":["Schedule Adjustment","Schedule Change Notification","Time Change"],"category":"air-partner","conceptType":"process","status":"active","definition":"A change made by an airline to a previously published flight schedule, such as a revised departure or arrival time, equipment change, flight number change, or flight cancellation, that affects already-booked passengers. Schedule changes are distributed to selling systems and require reaccommodation or notification of affected bookings.","definition_ko":"항공사가 이미 예약한 승객에게 영향을 미치는, 이전에 게시된 항공편 스케줄에 가하는 변경으로, 출발 또는 도착 시간 변경, 기재(equipment) 변경, 편명 변경, 항공편 취소 등이 이에 해당한다. 스케줄 변경은 판매 시스템에 배포되며, 영향을 받는 예약에 대해 재수용(reaccommodation)이나 통지가 필요하다.","longDef":"Schedule changes are communicated via standardized schedule messaging (for example SSIM-based SSM and ASM formats) and propagate to GDSs and airline reservation systems, often landing affected PNRs on queues for agent or automated action. Depending on the magnitude of the change and fare conditions, passengers may be entitled to rebooking, involuntary reissue, or refund. Schedule changes differ from same-day operational disruptions, which fall under irregular operations (IROPS).","longDef_ko":"스케줄 변경은 표준화된 스케줄 메시지(예: SSIM 기반 SSM 및 ASM 포맷)를 통해 전달되며, GDS와 항공사 예약 시스템으로 전파되어 영향을 받는 PNR이 상담원 또는 자동 처리를 위해 큐(queue)에 올라오는 경우가 많다. 변경의 정도와 운임 조건에 따라 승객은 재예약, 비자발적 재발권(involuntary reissue) 또는 환불을 받을 권리가 있을 수 있다. 스케줄 변경은 당일 운영 중단과는 다르며, 당일 중단은 비정상 운항(IROPS)에 해당한다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"IROPS","targetId":"irops"},{"type":"related","targetTerm":"Queue","targetId":"queue"},{"type":"related","targetTerm":"Involuntary Reissue","targetId":"involuntary-reissue"},{"type":"related","targetTerm":"Refund","targetId":"refund"},{"type":"related","targetTerm":"PNR","targetId":"pnr"},{"type":"related","targetTerm":"Slot","targetId":"slot"}],"distinctions":[{"targetTerm":"IROPS","explanation":"Schedule change is a planned amendment to the published schedule communicated in advance; IROPS is unplanned day-of-operations disruption (delays, cancellations, diversions).","explanation_ko":"스케줄 변경은 사전에 통지되는, 게시된 스케줄에 대한 계획된 수정이고, IROPS는 계획되지 않은 당일 운영 중단(지연, 취소, 회항)이다.","targetId":"irops"},{"targetTerm":"Involuntary Reissue","explanation":"Schedule change is the triggering event; involuntary reissue is the resulting ticket action to reaccommodate the passenger at no additional fare.","explanation_ko":"스케줄 변경은 촉발 사건이고, 비자발적 재발권은 추가 운임 없이 승객을 재수용하기 위해 그 결과로 이루어지는 항공권 처리다.","targetId":"involuntary-reissue"}],"sources":[{"name":"Standard Schedules Information Manual (SSIM)","org":"IATA","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"secure-flight","term":"Secure Flight","term_ko":"Secure Flight (미국 TSA 사전 심사)","abbreviation":"SFPD","aliases":["Secure Flight Passenger Data","SFPD","Secure Flight Program"],"category":"customer","conceptType":"process","status":"active","definition":"A US Transportation Security Administration (TSA) program that prescreens passengers on covered flights against government watch lists. Carriers must collect Secure Flight Passenger Data (SFPD) — full name as on government ID, date of birth and gender, plus optional Redress Number or Known Traveler Number — and submit it to TSA before travel.","definition_ko":"대상 항공편의 승객을 정부 감시 명단과 대조하여 사전 심사하는 미국 교통안전청(TSA)의 프로그램이다. 항공사는 Secure Flight Passenger Data(SFPD), 즉 정부 발급 신분증상의 전체 성명, 생년월일, 성별과 선택 항목인 Redress Number 또는 Known Traveler Number를 수집하여 여행 전 TSA에 제출해야 한다.","longDef":"Secure Flight transfers watch-list matching from individual carriers to the TSA to reduce misidentifications and improve security on flights to, from, over or within the United States. SFPD must be provided at or before ticketing; the Known Traveler Number supports TSA PreCheck expedited screening, while a Redress Number (from the DHS TRIP program) helps travelers previously misidentified. The data is carried in reservations via the DOCS/Secure Flight SSR elements. It is a regulatory security program, not a marketing or identity-convenience framework.","longDef_ko":"Secure Flight는 미국으로/미국에서/미국 상공을 지나거나 미국 내를 운항하는 항공편의 오인 식별을 줄이고 보안을 강화하기 위해 감시 명단 대조 업무를 개별 항공사에서 TSA로 이관한다. SFPD는 발권 시 또는 그 이전에 제공되어야 하며, Known Traveler Number는 TSA PreCheck 신속 심사를 지원하고, (DHS TRIP 프로그램에서 발급하는) Redress Number는 과거에 잘못 식별되었던 여행자를 돕는다. 해당 데이터는 DOCS/Secure Flight SSR 요소를 통해 예약에 담긴다. 이는 마케팅이나 신원 편의 프레임워크가 아니라 규제상의 보안 프로그램이다.","standardBody":"","providerTerms":[],"relationships":[{"type":"related","targetTerm":"SSR","targetId":"ssr"},{"type":"related","targetTerm":"Customer Profile","targetId":"customer-profile"},{"type":"related","targetTerm":"Name Change","targetId":"name-change"}],"distinctions":[{"targetTerm":"IATA One ID","explanation":"Secure Flight is a mandatory US government watch-list prescreening program; One ID is a voluntary industry digital-identity/biometric framework for seamless travel.","explanation_ko":"Secure Flight는 의무적인 미국 정부의 감시 명단 사전 심사 프로그램이고, One ID는 매끄러운 여행을 위한 자발적인 업계의 디지털 신원·생체 인식 프레임워크이다.","targetId":"iata-one-id"},{"targetTerm":"Name Change","explanation":"Secure Flight requires the booked name to match the government ID, which is the common driver of permitted name corrections.","explanation_ko":"Secure Flight는 예약된 이름이 정부 발급 신분증과 일치하도록 요구하며, 이것이 허용되는 이름 정정의 흔한 유발 요인이다.","targetId":"name-change"}],"sources":[{"name":"49 CFR Part 1560 — Secure Flight Program","org":"TSA","version":"","section":"","url":"https://www.ecfr.gov/current/title-49/subtitle-B/chapter-XII/subchapter-C/part-1560"},{"name":"Secure Flight Program (Federal Register)","org":"TSA","version":"","section":"","url":"https://www.federalregister.gov/documents/2008/10/28/E8-25432/secure-flight-program"}],"lastReviewed":"2026-06-15"},{"id":"segment","term":"Segment","abbreviation":"","aliases":["Booking Segment","Flight Segment","Air Segment"],"category":"air-ops","conceptType":"business-term","status":"active","definition":"A segment is a single bookable air transportation unit between a board point and an off point as marketed and sold under one flight number, regardless of how many physical takeoffs and landings (legs) it contains. It is the unit of inventory that is sold, ticketed, and stored as an itinerary element in a PNR.","definition_ko":"segment(구간)은 하나의 편명으로 마케팅되고 판매되는, 탑승지(board point)와 하기지(off point) 사이의 단일 예약 가능 항공 운송 단위로, 물리적인 이착륙(leg)이 몇 번이든 관계없이 하나의 단위로 본다. 이는 판매·발권되고 PNR에 여정 요소로 저장되는 좌석 재고(inventory) 단위다.","term_ko":"구간(Segment)","longDef":"A segment corresponds to a flight number and a booking class (RBD) from origin to destination as offered for sale. A direct flight that makes an intermediate stop without a change of flight number is one segment but two legs. Segments are the basis for availability requests, fare component construction, and flight coupons; each ticketed segment normally maps to one flight coupon.","longDef_ko":"segment는 판매를 위해 제공되는 출발지에서 도착지까지의 편명과 예약 등급(RBD)에 대응한다. 편명 변경 없이 중간 기착하는 직항편은 하나의 segment이지만 두 개의 leg이다. segment는 좌석 가용성 조회, 운임 구성 요소(fare component) 구성, 항공권 쿠폰의 기준이 되며, 발권된 각 segment는 일반적으로 하나의 flight coupon에 대응한다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"parent","targetTerm":"Leg","targetId":"leg"},{"type":"child","targetTerm":"PNR","targetId":"pnr"},{"type":"related","targetTerm":"Married Segment","targetId":"married-segment"},{"type":"related","targetTerm":"Passive Segment","targetId":"passive-segment"},{"type":"related","targetTerm":"RBD","targetId":"rbd"},{"type":"related","targetTerm":"Flight Coupon","targetId":"flight-coupon"},{"type":"related","targetTerm":"Fare Component","targetId":"fare-component"}],"distinctions":[{"targetTerm":"Leg","explanation":"A segment is the marketed origin-to-destination flight under one flight number; a leg is a single physical takeoff-to-landing hop, so one segment can contain multiple legs.","explanation_ko":"segment는 하나의 편명으로 마케팅되는 출발지에서 도착지까지의 항공편이며, leg은 단일 물리적 이착륙 구간이므로 하나의 segment가 여러 개의 leg을 포함할 수 있다.","targetId":"leg"}],"sources":[{"name":"Passenger Services Conference Resolutions Manual (PSCRM)","org":"IATA","version":"","section":"","url":""},{"name":"Standard Schedules Information Manual (SSIM)","org":"IATA","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"slot","term":"Slot","term_ko":"슬롯(공항 운항 시간대)","abbreviation":"","aliases":["Airport Slot","Takeoff/Landing Slot","Coordination Slot"],"category":"air-partner","conceptType":"business-term","status":"active","definition":"A permission allocated to an airline to operate an aircraft arrival or departure at a specific date and time at a capacity-constrained (coordinated) airport. Slots are required to schedule flights at congested airports and are administered under coordination rules such as the Worldwide Airport Slot Guidelines (WASG).","definition_ko":"수용 능력이 제한된(조정 대상) 공항에서 특정 날짜와 시간에 항공기의 도착 또는 출발을 운항할 수 있도록 항공사에 배정되는 허가. 슬롯은 혼잡 공항에서 항공편 스케줄을 편성하는 데 필요하며, WASG(Worldwide Airport Slot Guidelines)와 같은 조정 규칙에 따라 운영된다.","longDef":"At Level 3 (fully coordinated) airports, a slot coordinator allocates slots based on rules covering historic precedence (\"grandfather rights\"), the 80/20 use-it-or-lose-it utilization requirement, new-entrant priorities, and slot pools. Slots are distinct from the flight schedule itself: a carrier must hold the necessary slots before it can publish and operate a schedule. Slots may be exchanged or transferred under applicable rules and are commercially valuable at the most congested airports.","longDef_ko":"레벨 3(완전 조정 대상) 공항에서는 슬롯 조정관이 과거 운항 실적에 따른 우선권(\"grandfather rights\"), 80/20 사용하지 않으면 상실(use-it-or-lose-it) 활용 요건, 신규 진입자 우선권, 슬롯 풀을 다루는 규칙에 따라 슬롯을 배정한다. 슬롯은 항공편 스케줄 자체와는 구별되며, 항공사는 스케줄을 게시하고 운항하기 전에 필요한 슬롯을 보유해야 한다. 슬롯은 해당 규칙에 따라 교환되거나 양도될 수 있으며, 가장 혼잡한 공항에서는 상업적으로 가치가 높다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Schedule Change","targetId":"schedule-change"},{"type":"related","targetTerm":"Airport Code","targetId":"airport-code"}],"distinctions":[{"targetTerm":"Schedule Change","explanation":"A slot is the right to use the airport at a given time; a schedule change is an alteration to a published flight's timing or routing, which may require obtaining or returning slots.","explanation_ko":"슬롯은 특정 시간에 공항을 사용할 권리이고, 스케줄 변경은 게시된 항공편의 시간이나 노선을 변경하는 것으로, 슬롯의 취득이나 반납이 필요할 수 있다.","targetId":"schedule-change"}],"sources":[{"name":"Worldwide Airport Slot Guidelines (WASG)","org":"IATA / ACI / WWACG","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"spa-special-prorate-agreement","term":"SPA (Special Prorate Agreement)","term_ko":"SPA(특별 운임 배분 협정)","abbreviation":"SPA","aliases":["Special Prorate Agreement","Special Pro-rate Agreement"],"category":"air-partner","conceptType":"document","status":"active","definition":"A bilateral agreement between two airlines that establishes special, negotiated proration values (the share of fare each carrier receives) for interline traffic carried on agreed routes, overriding the standard multilateral prorate values. SPAs enable carriers to offer competitive through-fares on multi-carrier itineraries.","definition_ko":"두 항공사 간에 합의된 노선에서 운송되는 인터라인 운송에 대해 표준 다자간 프로레이트 값을 대체하는 특별하고 협상된 프로레이션 값(각 항공사가 받는 운임 배분 몫)을 설정하는 양자 간 협정. SPA를 통해 항공사는 여러 항공사가 관여하는 여정에서 경쟁력 있는 일관 운임(through-fare)을 제공할 수 있다.","longDef":"Where the default multilateral proration would not yield commercially attractive revenue splits, carriers sign SPAs specifying fixed amounts, percentages, or special prorate factors for defined origin-destination pairs and fare types. SPAs are central to alliance and partner pricing, allowing the construction of competitive interline and codeshare through-fares. Settlement of the resulting amounts typically flows through the IATA Clearing House.","longDef_ko":"기본 다자간 프로레이션으로는 상업적으로 매력적인 수익 배분이 나오지 않는 경우, 항공사는 특정 출발지-목적지 쌍과 운임 유형에 대해 고정 금액, 비율 또는 특별 프로레이트 계수를 명시한 SPA를 체결한다. SPA는 동맹 및 파트너 운임 책정의 핵심으로, 경쟁력 있는 인터라인 및 공동운항 일관 운임을 구성할 수 있게 한다. 그 결과로 발생하는 금액의 정산은 일반적으로 IATA Clearing House를 통해 이루어진다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Proration","targetId":"proration"},{"type":"related","targetTerm":"Interline","targetId":"interline"},{"type":"related","targetTerm":"MITA","targetId":"mita"},{"type":"related","targetTerm":"IATA Clearing House","targetId":"iata-clearing-house"},{"type":"related","targetTerm":"Fare Component","targetId":"fare-component"}],"distinctions":[{"targetTerm":"Proration","explanation":"Proration is the general process of splitting a fare among carriers; an SPA is a specific bilateral agreement that sets special values used in that process.","explanation_ko":"프로레이션은 운임을 항공사 간에 분배하는 일반적인 과정이고, SPA는 그 과정에서 사용되는 특별 값을 설정하는 구체적인 양자 간 협정이다.","targetId":"proration"},{"targetTerm":"MITA","explanation":"MITA provides the standard multilateral interline/prorate framework, whereas an SPA is a bilateral override with negotiated values between two carriers.","explanation_ko":"MITA는 표준 다자간 인터라인/프로레이트 체계를 제공하는 반면, SPA는 두 항공사 간에 협상된 값으로 이를 대체하는 양자 간 협정이다.","targetId":"mita"}],"sources":[{"name":"Prorate Manual — Passenger (PMP)","org":"IATA","version":"","section":"","url":""},{"name":"Revenue Accounting Manual (RAM)","org":"IATA","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"ssr","term":"SSR","abbreviation":"SSR","aliases":["Special Service Request","Special Service Requirement"],"category":"air-ops","conceptType":"standard-term","status":"active","definition":"A Special Service Request (SSR) is a standardized, coded message element in a PNR used to request or notify an action-required special service from a carrier, such as a wheelchair, special meal, unaccompanied minor, or to convey data like Secure Flight passenger details. Each SSR uses a four-letter IATA code and typically receives a status reply (action/advice code) from the carrier.","definition_ko":"SSR(Special Service Request, 특별 서비스 요청)은 휠체어, 특별 기내식, 비동반 소아 등 항공사로부터 조치가 필요한 특별 서비스를 요청하거나 통보하기 위해, 또는 Secure Flight 승객 정보와 같은 데이터를 전달하기 위해 PNR에 사용되는 표준화된 코드 메시지 요소다. 각 SSR은 4자리 IATA 코드를 사용하며 일반적으로 항공사로부터 상태 응답(action/advice 코드)을 받는다.","term_ko":"특별 서비스 요청(SSR)","longDef":"SSRs follow the IATA PADIS/PSCRM standard format and four-letter code set (e.g., WCHR wheelchair, VGML vegetarian meal, UMNR unaccompanied minor, DOCS for passport/Secure Flight data). Because an SSR is action-oriented, it is transmitted to and acknowledged by each affected carrier, distinguishing it from purely informational messaging. SSRs are central to accessibility (PRM) handling, regulatory data transmission, and ancillary service requests.","longDef_ko":"SSR은 IATA PADIS/PSCRM 표준 형식과 4자리 코드 체계(예: WCHR 휠체어, VGML 채식 기내식, UMNR 비동반 소아, DOCS 여권/Secure Flight 데이터)를 따른다. SSR은 조치 지향적이므로 영향을 받는 각 항공사에 전송되어 확인되며, 이는 순수 정보성 메시지와 구별되는 점이다. SSR은 접근성(PRM) 처리, 규제 데이터 전송, 부가 서비스 요청에 핵심적이다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"OSI","targetId":"osi"},{"type":"related","targetTerm":"PNR","targetId":"pnr"},{"type":"related","targetTerm":"PRM","targetId":"prm"},{"type":"related","targetTerm":"Secure Flight","targetId":"secure-flight"},{"type":"related","targetTerm":"Ancillary Service","targetId":"ancillary-service"}],"distinctions":[{"targetTerm":"OSI","explanation":"An SSR is an action-required, coded request to a carrier that expects a status reply, whereas an OSI is purely informational and requires no carrier action or response.","explanation_ko":"SSR은 항공사에 보내는 조치가 필요한 코드 요청으로 상태 응답을 기대하는 반면, OSI는 순수 정보성으로 항공사의 조치나 응답을 요구하지 않는다.","targetId":"osi"}],"sources":[{"name":"Passenger Services Conference Resolutions Manual (PSCRM)","org":"IATA","version":"","section":"","url":""},{"name":"PADIS EDIFACT/XML Message Standards","org":"IATA","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"ticketing-time-limit","term":"Ticketing Time Limit","term_ko":"발권 시한 (TTL)","abbreviation":"TTL","aliases":["Time Limit","Time to Ticket","Last Ticketing Date","TTL"],"category":"air-ticket","conceptType":"business-term","status":"active","definition":"The deadline by which a booked reservation must be ticketed (paid and issued) or the airline may automatically cancel the held space. It may be set by the airline/GDS or imposed by the applicable fare rule (advance reservation/ticketing requirement).","definition_ko":"예약된 건이 발권(지불 및 발행)되어야 하는 기한으로, 이를 넘기면 항공사가 확보된 좌석을 자동으로 취소할 수 있다. 이 기한은 항공사/GDS에 의해 설정되거나 해당 운임 규정(사전 예약/발권 요건)에 의해 부과될 수 있다.","longDef":"Ticketing time limits arise from two main sources: carrier/GDS-imposed limits managed via queues and option/timer elements in the PNR, and fare-rule-driven limits (ATPCO Category 5, Advance Reservations/Ticketing, which can require ticketing within a number of days of booking or by a fixed date before departure). Failure to ticket by the TTL typically results in auto-cancellation of the segments and may forfeit the booked fare. TTL handling is a core part of agency and airline ticketing workflows, often monitored through GDS queues.","longDef_ko":"발권 시한은 두 가지 주요 출처에서 발생한다. 하나는 PNR의 큐(queue) 및 옵션/타이머 요소를 통해 관리되는 항공사/GDS 부과 시한이고, 다른 하나는 운임 규정에 의한 시한(ATPCO Category 5, 사전 예약/발권으로, 예약 후 일정 일수 이내 또는 출발 전 특정 날짜까지 발권을 요구할 수 있음)이다. TTL까지 발권하지 못하면 일반적으로 해당 구간이 자동 취소되며 예약된 운임이 소멸될 수 있다. TTL 처리는 대리점 및 항공사 발권 업무의 핵심 요소로, 흔히 GDS 큐를 통해 모니터링된다.","standardBody":"ATPCO","providerTerms":[],"relationships":[{"type":"related","targetTerm":"PNR","targetId":"pnr"},{"type":"related","targetTerm":"E-ticket","targetId":"e-ticket"},{"type":"related","targetTerm":"Queue","targetId":"queue"},{"type":"related","targetTerm":"Fare Basis Code","targetId":"fare-basis-code"},{"type":"related","targetTerm":"ATPCO","targetId":"atpco"}],"distinctions":[{"targetTerm":"Queue","explanation":"A queue is the GDS workflow bucket where pending-ticketing PNRs are placed; the ticketing time limit is the deadline itself.","explanation_ko":"큐(queue)는 발권 대기 중인 PNR이 배치되는 GDS 업무 처리 버킷이며, 발권 시한은 기한 그 자체이다.","targetId":"queue"}],"sources":[{"name":"ATPCO Fare Rules — Category 5 (Advance Reservations/Ticketing)","org":"ATPCO","version":"","section":"","url":""},{"name":"Passenger Services Conference Resolutions Manual (PSCRM)","org":"IATA","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"un-locode","term":"UN/LOCODE","term_ko":"UN/LOCODE (유엔 무역·운송 위치 코드)","abbreviation":"UN/LOCODE","aliases":["United Nations Code for Trade and Transport Locations","UN Location Code","LOCODE"],"category":"codes","conceptType":"code","status":"active","definition":"The United Nations Code for Trade and Transport Locations: a 5-character code identifying locations (ports, airports, inland terminals, and other places of relevance to trade and transport) used in international logistics. The first two letters are the ISO 3166 country code and the remaining three identify the location within that country.","definition_ko":"유엔 무역·운송 위치 코드(United Nations Code for Trade and Transport Locations). 국제 물류에서 사용되는 5자리 코드로, 무역과 운송에 관련된 위치(항만, 공항, 내륙 터미널 및 기타 장소)를 식별한다. 앞 두 글자는 ISO 3166 국가 코드이고, 나머지 세 글자는 해당 국가 내의 위치를 식별한다.","longDef":"UN/LOCODE is maintained by UNECE and covers seaports, road and rail terminals, airports, postal exchange offices, and other transport-relevant locations. The structure CC + LLL (e.g., USNYC for New York, USA; DEHAM for Hamburg, Germany) reuses ISO 3166-1 alpha-2 for the country segment. It is heavily used in maritime, freight, and supply-chain systems and is broader in scope than aviation-only codes.","longDef_ko":"UN/LOCODE는 UNECE가 관리하며 해항, 도로·철도 터미널, 공항, 우편 교환소 및 기타 운송 관련 위치를 포괄한다. CC + LLL 구조(예: 미국 뉴욕은 USNYC, 독일 함부르크는 DEHAM)로 국가 부분에는 ISO 3166-1 alpha-2를 재사용한다. 해운, 화물, 공급망 시스템에서 폭넓게 사용되며, 항공 전용 코드보다 적용 범위가 넓다.","standardBody":"UNECE","providerTerms":[],"relationships":[{"type":"related","targetTerm":"ISO 3166 Country Code","targetId":"iso-3166-country-code"},{"type":"related","targetTerm":"Airport Code","targetId":"airport-code"},{"type":"related","targetTerm":"City Code","targetId":"city-code"}],"distinctions":[{"targetTerm":"Airport Code","explanation":"UN/LOCODE is a 5-character trade/transport location code (CC+LLL) covering ports, terminals and airports; an airport code is an aviation-specific IATA/ICAO identifier.","explanation_ko":"UN/LOCODE는 항만, 터미널, 공항을 포괄하는 5자리 무역/운송 위치 코드(CC+LLL)인 반면, 공항 코드는 항공 전용 IATA/ICAO 식별자이다.","targetId":"airport-code"}],"sources":[{"name":"UN/LOCODE Code List by Country and Territory","org":"UNECE","version":"","section":"","url":"https://unece.org/trade/cefact/unlocode-code-list-country-and-territory"}],"lastReviewed":"2026-06-15"},{"id":"validating-carrier","term":"Validating Carrier","term_ko":"발권 항공사 (Validating Carrier)","abbreviation":"","aliases":["Plating Carrier","Ticketing Carrier","Issuing Carrier"],"category":"air-ticket","conceptType":"role","status":"active","definition":"The airline whose accounting code (the first three digits of the ticket number) appears on the ticket and which is responsible for the financial settlement of the document, collecting the fare and distributing proceeds to the transporting carriers. Eligibility to validate is governed by interline/ticketing agreements.","definition_ko":"항공권에 자사의 회계 코드(항공권 번호의 첫 세 자리)가 표시되며 해당 서류의 재무 정산을 책임지는 항공사로, 운임을 징수하고 수익을 운송 항공사들에게 배분한다. 발권 자격은 인터라인/발권 협정에 의해 규율된다.","longDef":"The validating (or plating) carrier need not operate any of the flights on the ticket; it is the carrier that takes financial ownership of the sale and settles funds through BSP/ARC, then prorates and pays the participating carriers via interline/SPA agreements. IATA ticketing-authority rules determine which carrier may be plated based on the itinerary and the agreements in place. The choice of validating carrier affects which fares, e-ticketing capability, and interline reach are available.","longDef_ko":"발권(plating) 항공사는 항공권상의 어떤 항공편도 직접 운항할 필요가 없다. 이 항공사는 판매에 대한 재무적 소유권을 가지며 BSP/ARC를 통해 자금을 정산한 다음, 인터라인/SPA 협정에 따라 참여 항공사들에게 비율 배분(prorate)하여 지급한다. IATA 발권 권한 규정은 여정과 체결된 협정에 따라 어느 항공사가 발권(plating)될 수 있는지를 결정한다. 발권 항공사의 선택은 이용 가능한 운임, 전자 발권 가능 여부 및 인터라인 적용 범위에 영향을 미친다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"E-ticket","targetId":"e-ticket"},{"type":"related","targetTerm":"Interline","targetId":"interline"},{"type":"related","targetTerm":"Proration","targetId":"proration"},{"type":"related","targetTerm":"BSP","targetId":"bsp"},{"type":"related","targetTerm":"Airline Designator","targetId":"airline-designator"}],"distinctions":[{"targetTerm":"Marketing Carrier","explanation":"The validating carrier owns the ticket's financial settlement; the marketing carrier is the airline selling the flight under its own code.","explanation_ko":"발권 항공사는 항공권의 재무 정산을 소유하며, 마케팅 항공사(Marketing Carrier)는 자사 코드로 해당 항공편을 판매하는 항공사이다.","targetId":"marketing-carrier"},{"targetTerm":"Operating Carrier","explanation":"The validating carrier plates and settles the ticket and may not fly any segment; the operating carrier physically performs the flight.","explanation_ko":"발권 항공사는 항공권을 발권(plate)하고 정산하며 어떤 구간도 운항하지 않을 수 있고, 운항 항공사(Operating Carrier)는 실제로 항공편을 수행한다.","targetId":"operating-carrier"}],"sources":[{"name":"Passenger Services Conference Resolutions Manual (PSCRM)","org":"IATA","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"},{"id":"vcc","term":"VCC","abbreviation":"VCC","aliases":["Virtual Credit Card","Virtual Card","Virtual Card Number"],"category":"pay","conceptType":"business-term","status":"active","definition":"A Virtual Credit Card is a digitally generated card number (with expiry and CVC) issued for payment without a physical card, widely used in travel for B2B payments from agencies and OTAs to suppliers. VCCs are typically single-use or restricted in amount, currency, and validity window, which simplifies reconciliation and limits fraud exposure.","term_ko":"가상 신용카드(VCC)","definition_ko":"가상 신용카드(VCC)는 실물 카드 없이 결제를 위해 디지털로 생성되는 카드 번호(유효기간 및 CVC 포함)로, 여행 업계에서 여행사 및 OTA가 공급업체에 지급하는 B2B 결제에 널리 사용된다. VCC는 일반적으로 일회용이거나 금액, 통화, 유효 기간이 제한되어 있어 정산을 간소화하고 사기 노출을 줄인다.","longDef":"In travel, an agency, OTA, or bedbank funds a VCC and supplies its number to a supplier (hotel, airline, tour operator) to settle a specific booking. Single-use VCCs are generated per transaction, while lodged cards can be reused over time. Card brand and BIN selection can be optimized for acceptance and interchange. Because VCCs run over standard card rails, they are exposed to chargeback and 3-D Secure rules.","longDef_ko":"여행 업계에서는 여행사, OTA 또는 베드뱅크가 VCC에 자금을 충전하고 그 번호를 공급업체(호텔, 항공사, 투어 오퍼레이터)에 제공하여 특정 예약을 결제한다. 일회용 VCC는 거래마다 생성되는 반면, 등록형(lodged) 카드는 일정 기간 반복 사용할 수 있다. 카드 브랜드와 BIN 선택은 승인율과 인터체인지를 최적화하도록 조정할 수 있다. VCC는 표준 카드 결제망을 통해 처리되므로 차지백(chargeback) 및 3-D Secure 규칙의 적용을 받는다.","standardBody":"","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Merchant Model","targetId":"merchant-model"},{"type":"related","targetTerm":"Bedbank","targetId":"bedbank"},{"type":"related","targetTerm":"Net Rate","targetId":"net-rate"},{"type":"related","targetTerm":"Chargeback","targetId":"chargeback"},{"type":"related","targetTerm":"OTA (Online Travel Agency)","targetId":"ota-online-travel-agency"}],"distinctions":[{"targetTerm":"IATA EasyPay","explanation":"IATA EasyPay is an IATA e-wallet exclusive to BSP ticket issuance, whereas a VCC is a general card-rail instrument used for many supplier payments.","explanation_ko":"IATA EasyPay는 BSP 항공권 발권 전용 IATA 전자지갑인 반면, VCC는 다양한 공급업체 결제에 사용되는 범용 카드 결제망 수단이다.","targetId":"iata-easypay"}],"sources":[{"name":"Virtual Credit Cards in Travel: How to Secure B2B Payments","org":"AltexSoft","version":"","section":"","url":"https://www.altexsoft.com/blog/virtual-credit-cards-travel/"},{"name":"Using Virtual Credit Cards for Travel Agency Payments","org":"J.P. Morgan","version":"","section":"","url":"https://www.jpmorgan.com/insights/treasury/cards-expense-management/using-virtual-credit-cards-for-travel-agency-payments"}],"lastReviewed":"2026-06-15"},{"id":"void","term":"Void","term_ko":"보이드/발권 취소 (Void)","abbreviation":"","aliases":["Voiding","Same-Day Void","Ticket Void"],"category":"air-ticket","conceptType":"process","status":"active","definition":"The cancellation of a newly issued ticket or EMD within the permitted void window (typically the same sales day, before the BSP/ARC sales reporting cutoff) so that no sale is reported and no value is collected. A voided document's coupons are set to status VOID and cannot be used.","definition_ko":"허용된 Void 기한(일반적으로 BSP/ARC 판매 보고 마감 이전의 당일 판매일) 내에 새로 발행된 항공권 또는 EMD를 취소하여 판매가 보고되지 않고 가치가 징수되지 않도록 하는 것이다. Void 처리된 서류의 쿠폰은 VOID 상태로 설정되어 사용할 수 없다.","longDef":"Voiding removes the transaction from the agent's sales report before it is billed through BSP/ARC, making it the cleanest way to reverse an erroneous or unwanted issuance without incurring a refund transaction or penalties. The void window is constrained by the local BSP/ARC sales reporting period (commonly the day of issue, subject to the reporting period close); once the window passes, reversal must be handled as a refund instead. Void applies only to documents that have not been used.","longDef_ko":"Void 처리는 BSP/ARC를 통해 청구되기 전에 대리점의 판매 보고서에서 거래를 제거하므로, 환불 거래나 위약금 없이 잘못되었거나 원치 않는 발권을 되돌리는 가장 깔끔한 방법이다. Void 기한은 현지 BSP/ARC 판매 보고 기간(일반적으로 발행 당일이며 보고 기간 마감에 따름)에 의해 제한된다. 기한이 지나면 되돌리기는 대신 환불로 처리해야 한다. Void는 사용되지 않은 서류에만 적용된다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"E-ticket","targetId":"e-ticket"},{"type":"related","targetTerm":"EMD","targetId":"emd"},{"type":"contrasts","targetTerm":"Refund","targetId":"refund"},{"type":"related","targetTerm":"BSP","targetId":"bsp"},{"type":"related","targetTerm":"ARC","targetId":"arc"}],"distinctions":[{"targetTerm":"Refund","explanation":"Void reverses an issuance within the same sales period so it is never billed; refund returns value after the document has been reported/settled.","explanation_ko":"Void는 동일한 판매 기간 내에 발권을 되돌려 청구되지 않게 하며, 환불은 서류가 보고/정산된 이후에 가치를 반환한다.","targetId":"refund"},{"targetTerm":"Reissue","explanation":"Void nullifies the document entirely; reissue keeps the value and exchanges it for a new document.","explanation_ko":"Void는 서류를 완전히 무효화하며, 재발행은 가치를 유지하면서 새 서류로 교환한다.","targetId":"reissue"}],"sources":[{"name":"BSP / ARC sales reporting and void procedures","org":"IATA","version":"","section":"","url":""}],"lastReviewed":"2026-06-15"}]}</script>
<script>
"use strict";
(function(){
  const RAW = JSON.parse(document.getElementById('glossary-data').textContent);
  const META = RAW.meta||{}, CATS = RAW.categories||[], ENTRIES = RAW.entries||[];
  const byId = new Map(ENTRIES.map(e=>[e.id,e]));
  const catById = new Map(CATS.map(c=>[c.id,c]));
  const entriesByCat = new Map(CATS.map(c=>[c.id,[]]));
  ENTRIES.forEach(e=>{ (entriesByCat.get(e.category)||entriesByCat.set(e.category,[]).get(e.category)).push(e); });
  entriesByCat.forEach(arr=>arr.sort((a,b)=>a.term.localeCompare(b.term)));

  const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const $ = sel => document.querySelector(sel);
  const main = $('#main');

  /* ---------- i18n ---------- */
  let LANG = 'ko';
  try{ const s=localStorage.getItem('tg-lang'); if(s==='ko'||s==='en') LANG=s; }catch(_){}
  const T = {
    ko:{ sub:'여행 산업 용어 백과사전', searchPh:'용어 검색 (예: PNR, RBD, codeshare, 운임)…',
      enc:'백과사전', home:'🏠 홈', cats:'카테고리', graph:'🕸 관계 그래프',
      heroT:'여행 산업 용어, 하나의 사전으로',
      heroB:'항공·호텔·유통·정산·표준에 흩어진 용어를 <b>공급자/표준 간 통일</b>해 정리한 백과사전입니다. 같은 개념의 서로 다른 이름(예: Amadeus vs Sabre)을 한자리에서 비교하세요.',
      sTerms:'표제어', sCats:'카테고리', sProv:'공급자/표준', sSrc:'출처 인용',
      confT:'⚠️ 헷갈리기 쉬운 용어 (용어 통일 포인트)', secCats:'카테고리', openGraph:'용어 관계 그래프 열기 →',
      terms:n=>`${n}개 표제어`, home2:'홈', search:'검색',
      fAlias:'다른 표기 · 동의어', fProv:'공급자/표준별 대응어', fRel:'관련 용어', fDist:'혼동 주의 (구분)', fNotes:'편집 노트', fSrc:'출처',
      thProv:'공급자·표준', thTerm:'용어', thRel:'관계', thCtx:'설명',
      mId:'ID', mCat:'카테고리', mRev:'검토일',
      results:(q,n)=>`"<b>${esc(q)}</b>" 검색 결과 <b>${n}</b>건`, noRes:'결과가 없습니다. 다른 키워드(약어/영문/한글)를 시도해 보세요.',
      notFound:'표제어를 찾을 수 없습니다', toHome:'홈으로',
      disc:`정의는 공개 산업 표준(IATA·ATPCO·OpenTravel·HTNG·ISO 등) 및 공급자 문서를 근거로 한 편집 요약이며, 중요한 의사결정 전 1차 출처로 검증하시기 바랍니다. 마지막 갱신: ${esc(META.generatedAt||'')}.`,
      gTitle:'용어 관계 그래프', gNodes:'노드', gEdges:'관계',
      gHint:'노드를 드래그해 정리하고, 클릭하면 해당 용어로 이동합니다. 아래 카테고리 범례를 눌러 필터링하세요. <b>실선</b>=관련 용어, <span style="color:var(--warn)">점선</span>=혼동 주의.',
      RLAB:{sameAs:'같음',broader:'상위 개념',narrower:'하위 개념',parent:'부모',child:'자식',related:'관련',conflicts:'충돌',replaces:'대체',contrasts:'대비'},
      ST:{active:'활성',deprecated:'폐지/레거시',ambiguous:'중의적'},
      CT:{acronym:'약어',"standard-term":'표준 용어',standard:'표준',"business-term":'업무 용어',"provider-term":'공급자 용어',code:'코드',metric:'지표',process:'프로세스',role:'역할',document:'문서'},
      PR:{same:'같음',narrower:'하위',broader:'상위',related:'관련',conflicting:'충돌'} },
    en:{ sub:'Travel-Industry Terminology', searchPh:'Search terms (e.g., PNR, RBD, codeshare, fare)…',
      enc:'Encyclopedia', home:'🏠 Home', cats:'Categories', graph:'🕸 Knowledge Graph',
      heroT:'Travel-industry terms, unified in one reference',
      heroB:'An encyclopedia that <b>unifies terminology across providers and standards</b> spread over air, hotel, distribution, settlement and specs. Compare the different names for one concept (e.g. Amadeus vs Sabre) in one place.',
      sTerms:'Terms', sCats:'Categories', sProv:'Providers/Standards', sSrc:'Source citations',
      confT:'⚠️ Easily-confused terms (term-unification points)', secCats:'Categories', openGraph:'Open the term knowledge graph →',
      terms:n=>`${n} terms`, home2:'Home', search:'Search',
      fAlias:'Aliases & variants', fProv:'Provider / standard equivalents', fRel:'Related terms', fDist:'Distinctions (do not confuse)', fNotes:"Editor's note", fSrc:'Sources',
      thProv:'Provider · Standard', thTerm:'Term', thRel:'Relation', thCtx:'Note',
      mId:'ID', mCat:'Category', mRev:'Reviewed',
      results:(q,n)=>`<b>${n}</b> result(s) for "<b>${esc(q)}</b>"`, noRes:'No results. Try another keyword (abbreviation / English / Korean).',
      notFound:'Term not found', toHome:'Back to home',
      disc:`Definitions are editorial summaries grounded in public industry standards (IATA, ATPCO, OpenTravel, HTNG, ISO, etc.) and provider docs; verify against primary sources before critical decisions. Last updated: ${esc(META.generatedAt||'')}.`,
      gTitle:'Term Knowledge Graph', gNodes:'nodes', gEdges:'links',
      gHint:'Drag nodes to arrange; click a node to open that term. Toggle a category in the legend below to filter. <b>Solid</b> = related, <span style="color:var(--warn)">dashed</span> = distinction.',
      RLAB:{sameAs:'Same as',broader:'Broader',narrower:'Narrower',parent:'Parent',child:'Child',related:'Related',conflicts:'Conflicts',replaces:'Replaces',contrasts:'Contrasts'},
      ST:{active:'Active',deprecated:'Deprecated',ambiguous:'Ambiguous'},
      CT:{acronym:'Acronym',"standard-term":'Standard term',standard:'Standard',"business-term":'Business term',"provider-term":'Provider term',code:'Code',metric:'Metric',process:'Process',role:'Role',document:'Document'},
      PR:{same:'Same',narrower:'Narrower',broader:'Broader',related:'Related',conflicting:'Conflicting'} },
  };
  const t = k => (T[LANG] && T[LANG][k]!==undefined) ? T[LANG][k] : T.en[k];
  // localized entry field: prefer _ko in ko mode, fallback to base
  const Lf = (e,f) => { if(LANG==='ko'){ const v=e[f+'_ko']; if(v&&String(v).trim()) return v; } return e[f]||''; };
  const catName = c => LANG==='ko' ? (c.short||c.title) : c.title;
  const catDesc = c => LANG==='ko' ? (c.desc||'') : (c.desc_en||c.desc||'');

  /* ---------- search index ---------- */
  const FIELDW = {term:10, abbr:9, alias:6, prov:5, cat:2, def:1};
  const idx = ENTRIES.map(e=>{
    const fields=[]; const push=(t,w)=>{ if(t) fields.push({t:String(t).toLowerCase(),w}); };
    push(e.term,FIELDW.term); push(e.term_ko,FIELDW.term); push(e.abbreviation,FIELDW.abbr);
    (e.aliases||[]).forEach(a=>push(a,FIELDW.alias));
    (e.providerTerms||[]).forEach(p=>push(p.term,FIELDW.prov));
    const c=catById.get(e.category)||{}; push(c.title,FIELDW.cat); push(c.short,FIELDW.cat);
    push(e.definition,FIELDW.def); push(e.definition_ko,FIELDW.def);
    return {e, fields, term:e.term.toLowerCase(), abbr:(e.abbreviation||'').toLowerCase()};
  });
  function search(qraw){
    const q=qraw.trim().toLowerCase(); if(!q) return [];
    const toks=q.split(/[^a-z0-9가-힣]+/i).filter(Boolean); const out=[];
    for(const row of idx){
      let score=0;
      if(row.term===q) score+=100; if(row.abbr&&row.abbr===q) score+=90; if(row.term.startsWith(q)) score+=40;
      for(const tok of toks){ let best=0;
        for(const f of row.fields){ if(f.t===tok) best=Math.max(best,f.w*3);
          else if(f.t.startsWith(tok)) best=Math.max(best,f.w*2); else if(f.t.includes(tok)) best=Math.max(best,f.w); }
        if(best===0){ score=-1; break; } score+=best; }
      if(score>0) out.push({e:row.e,score});
    }
    out.sort((a,b)=> b.score-a.score || a.e.term.localeCompare(b.e.term));
    return out.slice(0,40);
  }
  const hl=(text,q)=>{ if(!q) return esc(text);
    const toks=q.trim().toLowerCase().split(/[^a-z0-9가-힣]+/i).filter(Boolean); let s=esc(text);
    toks.forEach(tk=>{ if(tk.length<2) return; s=s.replace(new RegExp('('+tk.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig'),'<mark>$1</mark>'); });
    return s; };

  /* ---------- sidebar ---------- */
  function renderSidebar(activeCat){
    const dot=c=>`<span class="dot" style="background:${c.color||'var(--accent)'}"></span>`;
    const hash=location.hash;
    let h=`<div class="nav-title">${esc(t('enc'))}</div>
      <a class="cat-link${(hash==='#/'||!hash)?' active':''}" href="#/">${t('home')}</a>
      <a class="cat-link${hash.startsWith('#/graph')?' active':''}" href="#/graph">${t('graph')}</a>
      <div class="nav-title">${esc(t('cats'))} (${CATS.length})</div>`;
    CATS.forEach(c=>{ const n=(entriesByCat.get(c.id)||[]).length;
      h+=`<a class="cat-link${c.id===activeCat?' active':''}" href="#/category/${c.id}">
        <span>${dot(c)} ${esc(catName(c))}</span><span class="cnt">${n}</span></a>`; });
    $('#sidebar').innerHTML=h;
  }

  /* ---------- renderers ---------- */
  function statusBadge(s){ if(!s) return ''; return `<span class="badge st-${s}">● ${esc((t('ST')[s])||s)}</span>`; }

  function renderHome(){
    const provSet=new Set(); ENTRIES.forEach(e=>(e.providerTerms||[]).forEach(p=>p.provider&&provSet.add(p.provider)));
    const srcCount=ENTRIES.reduce((a,e)=>a+((e.sources||[]).length),0);
    const conflicts=ENTRIES.filter(e=> e.status==='ambiguous' || (e.distinctions&&e.distinctions.length))
      .sort((a,b)=>(b.distinctions?b.distinctions.length:0)-(a.distinctions?a.distinctions.length:0)).slice(0,4);
    let h=`<section class="hero">
      <h1>${esc(t('heroT'))}</h1><p>${t('heroB')}</p>
      <div class="stats">
        <div class="stat"><b>${ENTRIES.length}</b><span>${esc(t('sTerms'))}</span></div>
        <div class="stat"><b>${CATS.length}</b><span>${esc(t('sCats'))}</span></div>
        <div class="stat"><b>${provSet.size}</b><span>${esc(t('sProv'))}</span></div>
        <div class="stat"><b>${srcCount}</b><span>${esc(t('sSrc'))}</span></div>
      </div>
      <a class="cta-graph" href="#/graph">🕸 ${esc(t('openGraph'))}</a></section>`;
    if(conflicts.length){ h+=`<div class="sec-title">${esc(t('confT'))}</div>`;
      conflicts.forEach(e=>{ const d=(e.distinctions&&e.distinctions[0]);
        h+=`<a class="conflict" href="#/term/${e.id}" style="display:block">
          <b>${esc(e.term)}</b> — ${esc(Lf(e,'definition')).slice(0,120)}…
          ${d?`<div style="margin-top:5px;color:var(--muted)">vs <b>${esc(d.targetTerm)}</b>: ${esc((LANG==='ko'&&d.explanation_ko)||d.explanation)}</div>`:''}</a>`; }); }
    h+=`<div class="sec-title">${esc(t('secCats'))}</div><div class="cards">`;
    CATS.forEach(c=>{ const n=(entriesByCat.get(c.id)||[]).length;
      h+=`<a class="card" href="#/category/${c.id}">
        <div class="ct"><span class="dot" style="background:${c.color||'var(--accent)'};width:10px;height:10px;border-radius:50%;display:inline-block"></span> ${esc(catName(c))}</div>
        <div class="cd">${esc(catDesc(c))}</div><div class="cn">${esc(t('terms')(n))}</div></a>`; });
    h+=`</div><p class="disclaimer">${t('disc')}</p>`;
    main.innerHTML=h; renderSidebar(null);
  }

  function renderCategory(id){
    const c=catById.get(id); if(!c) return renderHome();
    const list=entriesByCat.get(id)||[];
    let h=`<div class="crumbs"><a href="#/">${esc(t('home2'))}</a> › ${esc(catName(c))}</div>
      <div class="sec-title" style="margin-top:0">${esc(catName(c))} <span style="color:var(--faint);font-weight:400">(${list.length})</span></div>
      <p style="color:var(--muted);margin-top:-4px">${esc(catDesc(c))}</p><div class="termlist">`;
    list.forEach(e=>{ const sub=LANG==='ko'&&e.term_ko&&e.term_ko!==e.term?` <span class="abbr">· ${esc(e.term_ko)}</span>`:'';
      h+=`<a class="tl-item" href="#/term/${e.id}"><div class="h">${esc(e.term)}${sub}</div>
        <div class="d">${esc(Lf(e,'definition'))}</div></a>`; });
    h+=`</div>`; main.innerHTML=h; renderSidebar(id); main.focus();
  }

  function linkTerm(targetId,label){
    if(targetId&&byId.has(targetId)){ const e=byId.get(targetId);
      const lab=label||(LANG==='ko'&&e.term_ko?e.term:e.term); return `<a class="rel-link" href="#/term/${targetId}">${esc(lab)}</a>`; }
    return `<span class="rel-dead">${esc(label)}</span>`;
  }

  function renderTerm(id){
    const e=byId.get(id); if(!e) return renderNotFound(id);
    const c=catById.get(e.category)||{title:e.category};
    const sub=LANG==='ko'&&e.term_ko&&e.term_ko!==e.term?`<div class="term-sub">${esc(e.term_ko)}</div>`:'';
    let h=`<div class="crumbs"><a href="#/">${esc(t('home2'))}</a> › <a href="#/category/${e.category}">${esc(catName(c))}</a></div>`;
    h+=`<article><h1>${esc(e.term)}</h1>${sub}
      <div class="badges">
        <span class="badge cat" onclick="location.hash='#/category/${e.category}'">${esc(catName(c))}</span>
        ${e.conceptType?`<span class="badge">${esc((t('CT')[e.conceptType])||e.conceptType)}</span>`:''}
        ${statusBadge(e.status)}
        ${e.standardBody?`<span class="badge">📐 ${esc(e.standardBody)}</span>`:''}
      </div>
      <p class="lead">${esc(Lf(e,'definition'))}</p>`;
    if(Lf(e,'longDef')) h+=`<p>${esc(Lf(e,'longDef'))}</p>`;
    if(e.aliases&&e.aliases.length)
      h+=`<div class="field"><h3>${esc(t('fAlias'))}</h3><div class="chips">${e.aliases.map(a=>`<span class="chip">${esc(a)}</span>`).join('')}</div></div>`;
    if(e.providerTerms&&e.providerTerms.length){
      h+=`<div class="field"><h3>${esc(t('fProv'))}</h3><table class="pt"><thead><tr><th>${esc(t('thProv'))}</th><th>${esc(t('thTerm'))}</th><th>${esc(t('thRel'))}</th><th>${esc(t('thCtx'))}</th></tr></thead><tbody>`;
      e.providerTerms.forEach(p=>{ const ctx=(LANG==='ko'&&p.context_ko)||p.context||'';
        h+=`<tr><td class="prov">${esc(p.provider)}</td><td><code>${esc(p.term)}</code></td><td>${esc((t('PR')[p.relationship])||p.relationship||'')}</td><td>${esc(ctx)}</td></tr>`; });
      h+=`</tbody></table></div>`;
    }
    if(e.relationships&&e.relationships.length){
      const RLAB=t('RLAB'); const groups={};
      e.relationships.forEach(r=>{ (groups[r.type]=groups[r.type]||[]).push(r); });
      h+=`<div class="field"><h3>${esc(t('fRel'))}</h3>`;
      Object.keys(groups).forEach(ty=>{ h+=`<div class="rel-group"><span class="rl">${esc(RLAB[ty]||ty)}</span>`;
        groups[ty].forEach(r=> h+=linkTerm(r.targetId,r.targetTerm)); h+=`</div>`; });
      h+=`</div>`;
    }
    if(e.distinctions&&e.distinctions.length){
      h+=`<div class="field"><h3>${esc(t('fDist'))}</h3>`;
      e.distinctions.forEach(d=>{ const ex=(LANG==='ko'&&d.explanation_ko)||d.explanation;
        h+=`<div class="dist"><b>${esc(e.term)}</b> vs <b>${linkTerm(d.targetId,d.targetTerm)}</b> — ${esc(ex)}</div>`; });
      h+=`</div>`;
    }
    if(Lf(e,'notes')) h+=`<div class="field"><h3>${esc(t('fNotes'))}</h3><div class="notes">${esc(Lf(e,'notes'))}</div></div>`;
    if(e.sources&&e.sources.length){
      h+=`<div class="field"><h3>${esc(t('fSrc'))}</h3><ul class="src">`;
      e.sources.forEach(s=>{ const bits=[s.org,s.name,s.version,s.section].filter(Boolean).map(esc).join(' · ');
        h+=`<li>${s.url?`<a href="${esc(s.url)}" target="_blank" rel="noopener">${bits}</a>`:bits}</li>`; });
      h+=`</ul></div>`;
    }
    h+=`<div class="rel-meta">${esc(t('mId'))} <code>${esc(e.id)}</code> · ${esc(t('mCat'))} ${esc(catName(c))}${e.lastReviewed?` · ${esc(t('mRev'))} ${esc(e.lastReviewed)}`:''}</div></article>`;
    main.innerHTML=h; renderSidebar(e.category); main.focus(); document.title=`${e.term} — Travel Gaia`;
  }

  function renderNotFound(id){
    main.innerHTML=`<div class="empty"><h2>${esc(t('notFound'))}</h2><p><code>${esc(id)}</code></p><p><a href="#/">${esc(t('toHome'))}</a></p></div>`;
    renderSidebar(null);
  }

  function renderSearch(q){
    const res=search(q);
    let h=`<div class="crumbs"><a href="#/">${esc(t('home2'))}</a> › ${esc(t('search'))}</div>
      <div class="searchmeta">${t('results')(q,res.length)}</div>`;
    if(!res.length){ h+=`<div class="empty">${esc(t('noRes'))}</div>`; }
    else{ h+=`<div class="termlist">`;
      res.forEach(({e})=>{ const c=catById.get(e.category)||{};
        const sub=LANG==='ko'&&e.term_ko&&e.term_ko!==e.term?` <span class="abbr">· ${hl(e.term_ko,q)}</span>`:'';
        h+=`<a class="tl-item" href="#/term/${e.id}"><div class="h">${hl(e.term,q)}${sub}</div>
          <div class="d">${hl(Lf(e,'definition'),q)}</div>
          <div class="cn" style="color:var(--faint);font-size:.74rem;margin-top:6px">${esc(catName(c))}</div></a>`; });
      h+=`</div>`; }
    main.innerHTML=h; renderSidebar(null);
  }

  /* ---------- knowledge graph ---------- */
  let kgRAF=null;
  function stopGraph(){ if(kgRAF){ cancelAnimationFrame(kgRAF); kgRAF=null; } }

  function renderGraph(){
    const catColor=id=>(catById.get(id)||{}).color||'#888';
    const nodes=ENTRIES.map(e=>({id:e.id,e,cat:e.category,x:0,y:0,vx:0,vy:0,deg:0}));
    const nById=new Map(nodes.map(n=>[n.id,n]));
    const seen=new Set(), edges=[];
    const addE=(a,b,kind)=>{ if(!a||!b||a===b) return; const k=[a,b].sort().join('|'); if(seen.has(k)) return; seen.add(k); edges.push({a,b,kind}); };
    ENTRIES.forEach(e=>{
      (e.relationships||[]).forEach(r=>{ if(r.targetId&&nById.has(r.targetId)) addE(e.id,r.targetId,'rel'); });
      (e.distinctions||[]).forEach(d=>{ if(d.targetId&&nById.has(d.targetId)) addE(e.id,d.targetId,'dist'); });
    });
    edges.forEach(ed=>{ nById.get(ed.a).deg++; nById.get(ed.b).deg++; });
    const ci=new Map(CATS.map((c,i)=>[c.id,i]));
    nodes.forEach((n,i)=>{ const ang=(ci.get(n.cat)||0)/CATS.length*2*Math.PI;
      n.x=Math.cos(ang)*200+((i*53)%80-40); n.y=Math.sin(ang)*200+((i*31)%80-40); });

    const legend=CATS.map(c=>`<span class="legend-item" data-cat="${c.id}"><span class="ld" style="background:${c.color}"></span>${esc(catName(c))}</span>`).join('');
    main.innerHTML=`<div class="crumbs"><a href="#/">${esc(t('home2'))}</a> › ${esc(t('gTitle'))}</div>
      <div class="graph-head"><div class="sec-title" style="margin:0">${esc(t('gTitle'))}</div>
        <div style="color:var(--faint);font-size:.82rem">${nodes.length} ${esc(t('gNodes'))} · ${edges.length} ${esc(t('gEdges'))}</div></div>
      <p style="color:var(--muted);font-size:.86rem;margin:0 0 6px">${t('gHint')}</p>
      <div class="kg-legend" id="kgLegend">${legend}</div>
      <div class="graph-wrap"><canvas id="kg"></canvas><div class="kg-tip" id="kgTip"></div></div>`;
    renderSidebar(null);

    const wrap=$('.graph-wrap'), canvas=$('#kg'), ctx=canvas.getContext('2d'), tip=$('#kgTip');
    const active=new Set(CATS.map(c=>c.id));
    let W=0,H=0,dpr=Math.min(window.devicePixelRatio||1,2);
    function resize(){ W=wrap.clientWidth; H=Math.max(420,Math.min(680,Math.round(window.innerHeight*0.66)));
      canvas.style.height=H+'px'; canvas.width=W*dpr; canvas.height=H*dpr; ctx.setTransform(dpr,0,0,dpr,0,0); }
    resize();
    const cx=()=>W/2, cy=()=>H/2;
    let hover=null, drag=null, dragMoved=false, downXY=null;

    function isActive(n){ return active.has(n.cat); }
    function nodeR(n){ return 4+Math.sqrt(n.deg)*1.7; }
    function step(){
      const A=nodes.filter(isActive);
      for(let i=0;i<A.length;i++){ const a=A[i];
        for(let j=i+1;j<A.length;j++){ const b=A[j];
          let dx=a.x-b.x, dy=a.y-b.y, d2=dx*dx+dy*dy+0.01; const f=1400/d2;
          const d=Math.sqrt(d2); dx/=d; dy/=d; a.vx+=dx*f; a.vy+=dy*f; b.vx-=dx*f; b.vy-=dy*f; } }
      edges.forEach(ed=>{ const a=nById.get(ed.a), b=nById.get(ed.b); if(!isActive(a)||!isActive(b)) return;
        let dx=b.x-a.x, dy=b.y-a.y, d=Math.sqrt(dx*dx+dy*dy)+0.01; const f=(d-78)*0.012; dx/=d; dy/=d;
        a.vx+=dx*f; a.vy+=dy*f; b.vx-=dx*f; b.vy-=dy*f; });
      A.forEach(n=>{ n.vx+=-n.x*0.0025; n.vy+=-n.y*0.0025;
        if(n===drag) return; n.vx*=0.86; n.vy*=0.86; n.x+=n.vx; n.y+=n.vy;
        const m=24, rx=W/2-m, ry=H/2-m; if(n.x<-rx){n.x=-rx;n.vx*=-.4} if(n.x>rx){n.x=rx;n.vx*=-.4}
        if(n.y<-ry){n.y=-ry;n.vy*=-.4} if(n.y>ry){n.y=ry;n.vy*=-.4} });
    }
    const nbr=new Map(); edges.forEach(ed=>{ (nbr.get(ed.a)||nbr.set(ed.a,new Set()).get(ed.a)).add(ed.b);
      (nbr.get(ed.b)||nbr.set(ed.b,new Set()).get(ed.b)).add(ed.a); });
    function draw(){
      ctx.clearRect(0,0,W,H); const ox=cx(), oy=cy();
      const dark=document.documentElement.dataset.theme==='dark';
      edges.forEach(ed=>{ const a=nById.get(ed.a), b=nById.get(ed.b); if(!isActive(a)||!isActive(b)) return;
        const hot=hover&&(ed.a===hover.id||ed.b===hover.id);
        ctx.beginPath(); ctx.moveTo(a.x+ox,a.y+oy); ctx.lineTo(b.x+ox,b.y+oy);
        if(ed.kind==='dist'){ ctx.setLineDash([4,4]); ctx.strokeStyle=hot?'#d97706':(dark?'rgba(224,160,96,.5)':'rgba(181,86,15,.42)'); }
        else { ctx.setLineDash([]); ctx.strokeStyle=hot?(dark?'rgba(120,170,255,.9)':'rgba(31,111,235,.75)'):(dark?'rgba(120,140,170,.18)':'rgba(60,80,120,.16)'); }
        ctx.lineWidth=hot?1.6:1; ctx.stroke(); });
      ctx.setLineDash([]);
      nodes.forEach(n=>{ if(!isActive(n)) return;
        const dim=hover&&n!==hover&&!(nbr.get(hover.id)&&nbr.get(hover.id).has(n.id));
        ctx.globalAlpha=dim?0.22:1; ctx.beginPath(); ctx.arc(n.x+ox,n.y+oy,nodeR(n),0,7); ctx.fillStyle=catColor(n.cat);
        ctx.fill(); if(n===hover){ ctx.lineWidth=2; ctx.strokeStyle=dark?'#fff':'#1c2230'; ctx.stroke(); }
        ctx.globalAlpha=1; });
      // labels: hovered + neighbors, plus high-degree
      ctx.font='11px '+getComputedStyle(document.body).fontFamily; ctx.textAlign='center';
      const showLabel=n=> (hover&&(n===hover||(nbr.get(hover.id)&&nbr.get(hover.id).has(n.id)))) || (!hover&&n.deg>=5);
      nodes.forEach(n=>{ if(!isActive(n)||!showLabel(n)) return;
        const lab=n.e.term;
        const x=n.x+ox, y=n.y+oy-nodeR(n)-4; ctx.fillStyle=dark?'rgba(22,27,34,.85)':'rgba(255,255,255,.85)';
        const w=ctx.measureText(lab).width+8; ctx.fillRect(x-w/2,y-12,w,14);
        ctx.fillStyle=dark?'#e6edf3':'#1c2230'; ctx.fillText(lab,x,y); });
    }
    function loop(){ step(); draw(); kgRAF=requestAnimationFrame(loop); }
    loop();

    function pick(mx,my){ const ox=cx(),oy=cy(); let best=null,bd=1e9;
      nodes.forEach(n=>{ if(!isActive(n)) return; const dx=mx-(n.x+ox),dy=my-(n.y+oy),d=dx*dx+dy*dy;
        const r=nodeR(n)+6; if(d<r*r&&d<bd){bd=d;best=n;} }); return best; }
    function relPos(ev){ const r=canvas.getBoundingClientRect(); const cl=ev.touches?ev.touches[0]:ev;
      return {x:cl.clientX-r.left, y:cl.clientY-r.top}; }
    function onMove(ev){ const p=relPos(ev);
      if(drag){ drag.x=p.x-cx(); drag.y=p.y-cy(); drag.vx=drag.vy=0; dragMoved=true; ev.preventDefault?.(); return; }
      const n=pick(p.x,p.y); hover=n; if(n){ const nm=LANG==='ko'&&n.e.term_ko&&n.e.term_ko!==n.e.term?`${n.e.term} · ${n.e.term_ko}`:n.e.term;
        tip.innerHTML=`${esc(nm)} <span style="opacity:.7">— ${esc(catName(catById.get(n.cat)||{}))}</span>`;
        tip.style.left=(n.x+cx())+'px'; tip.style.top=(n.y+cy())+'px'; tip.style.opacity=1; canvas.style.cursor='pointer'; }
      else { tip.style.opacity=0; canvas.style.cursor='grab'; } }
    function onDown(ev){ const p=relPos(ev); const n=pick(p.x,p.y); downXY=p; dragMoved=false; if(n){ drag=n; } }
    function onUp(ev){ if(drag&&!dragMoved){ location.hash='#/term/'+drag.id; } drag=null; }
    canvas.addEventListener('mousemove',onMove); canvas.addEventListener('mousedown',onDown);
    window.addEventListener('mouseup',onUp);
    canvas.addEventListener('touchstart',onDown,{passive:true}); canvas.addEventListener('touchmove',onMove,{passive:false}); canvas.addEventListener('touchend',onUp);
    $('#kgLegend').addEventListener('click',e=>{ const el=e.target.closest('.legend-item'); if(!el) return;
      const id=el.dataset.cat; if(active.has(id)){active.delete(id);el.classList.add('off');} else {active.add(id);el.classList.remove('off');} });
    const onResize=()=>resize(); window.addEventListener('resize',onResize);
  }

  /* ---------- router ---------- */
  function route(){
    stopGraph(); const hash=location.hash||'#/'; closeNav();
    if(hash==='#/graph'){ document.title='Knowledge Graph — Travel Gaia'; if($('#q'))$('#q').value=''; return renderGraph(); }
    const m=hash.match(/^#\/(term|category|q)\/(.+)$/);
    if(!m||hash==='#/'){ document.title='Travel Gaia — 여행 산업 용어 백과사전'; if($('#q'))$('#q').value=''; return renderHome(); }
    const kind=m[1], dec=decodeURIComponent(m[2]);
    if(kind==='term') return renderTerm(dec);
    if(kind==='category') return renderCategory(dec);
    if(kind==='q'){ if($('#q'))$('#q').value=dec; return renderSearch(dec); }
    renderHome();
  }
  window.addEventListener('hashchange',route);

  /* ---------- search box ---------- */
  let tmr=null;
  $('#q').addEventListener('input',e=>{ clearTimeout(tmr); const v=e.target.value;
    tmr=setTimeout(()=>{ if(v.trim()) location.hash='#/q/'+encodeURIComponent(v.trim());
      else if(location.hash.startsWith('#/q/')) location.hash='#/'; },180); });
  document.addEventListener('keydown',e=>{ if(e.key==='/'&&document.activeElement!==$('#q')){ e.preventDefault(); $('#q').focus(); }
    if(e.key==='Escape'&&document.activeElement===$('#q')){ $('#q').blur(); } });

  /* ---------- language ---------- */
  function applyStaticI18n(){ document.documentElement.lang=LANG; $('#brandSub').textContent=t('sub');
    $('#q').placeholder=t('searchPh'); $('#langBtn').textContent=LANG==='ko'?'EN':'KO'; }
  $('#langBtn').addEventListener('click',()=>{ LANG=LANG==='ko'?'en':'ko'; try{localStorage.setItem('tg-lang',LANG);}catch(_){}
    applyStaticI18n(); route(); });

  /* ---------- theme & nav ---------- */
  const themeBtn=$('#themeBtn');
  function applyTheme(th){ document.documentElement.dataset.theme=th; try{localStorage.setItem('tg-theme',th);}catch(_){} }
  themeBtn.addEventListener('click',()=>applyTheme(document.documentElement.dataset.theme==='dark'?'light':'dark'));
  try{ const saved=localStorage.getItem('tg-theme'); applyTheme(saved||(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light')); }catch(_){ applyTheme('light'); }
  function openNav(){ document.body.classList.add('nav-open'); }
  function closeNav(){ document.body.classList.remove('nav-open'); }
  $('#menuBtn').addEventListener('click',openNav); $('#scrim').addEventListener('click',closeNav);

  applyStaticI18n();
  route();
})();
</script>
</body>
</html>
