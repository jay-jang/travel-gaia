-10\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"split-pnr","term":"Split PNR","abbreviation":"","aliases":["Divide PNR","Divided Booking","PNR Split","Associate PNR"],"category":"air-ops","conceptType":"process","status":"active","definition":"Splitting a PNR is the reservation process of dividing one Passenger Name Record into two so that one or more passengers can be handled separately from the rest of the party. The divided passengers are moved into a new PNR with its own Record Locator, while the original PNR retains the remaining passengers.","longDef":"Agents split a PNR when part of a group needs a different itinerary, cancellation, reissue, or special handling that should not affect the others — for example one traveller of two changing a return flight. After a successful split the systems cross-reference the two records (commonly tagged as PARENT/ASSOCIATE PNRs and noted in PNR history). Splitting is also required operationally before partial cancellation or reissue so each passenger's ticketing remains consistent. Cryptic commands differ by GDS (e.g., Amadeus SP, Sabre D / divide-party flows).","standardBody":"","term_ko":"Split PNR (PNR 분리 / Divide)","definition_ko":"Split PNR은 하나의 PNR(Passenger Name Record)을 둘로 나누어 일부 승객을 나머지 일행과 분리해 처리하는 예약 작업이다. 분리된 승객은 자체 Record Locator를 가진 새 PNR로 옮겨지고, 원본 PNR에는 나머지 승객이 남는다.","longDef_ko":"일행 중 일부만 다른 여정·취소·재발행·특별 처리가 필요하고 나머지에 영향을 주면 안 될 때(예: 2인 중 1인만 귀국편 변경) PNR을 split한다. 분리가 성공하면 두 레코드는 보통 PARENT/ASSOCIATE PNR로 태깅되고 PNR history에 기록되며 상호 참조된다. 부분 취소나 재발행 전에 각 승객의 발권 일관성을 유지하기 위해서도 split이 운영상 필요하다. cryptic 명령은 GDS마다 달라 Amadeus는 SP, Sabre는 divide-party(D) 흐름을 쓴다.","providerTerms":[{"provider":"Amadeus","term":"Split (SP)","context":"Splits selected passengers into an associate PNR with a separate record locator.","context_ko":"선택한 승객을 별도 record locator를 가진 associate PNR로 분리.","relationship":"same"},{"provider":"Sabre","term":"Divide (D)","context":"Divide-the-booking function that separates one or more name elements into a new PNR.","context_ko":"하나 이상의 이름 요소를 새 PNR로 분리하는 divide-the-booking 기능.","relationship":"same"}],"relationships":[{"type":"related","targetTerm":"PNR","targetId":"pnr"},{"type":"related","targetTerm":"Group PNR","targetId":"group-pnr"},{"type":"related","targetTerm":"Record Locator","targetId":"record-locator"},{"type":"related","targetTerm":"Reissue","targetId":"reissue"}],"distinctions":[{"targetTerm":"Group PNR","explanation":"Splitting a PNR creates a new separate record for some passengers; a Group PNR is a single record holding many passengers under shared inventory. Splitting is often the action applied to part of a group, not the group structure itself.","explanation_ko":"Split PNR은 일부 승객을 위한 새 분리 레코드를 만드는 작업이고, Group PNR은 공유 inventory 아래 다수 승객을 담는 하나의 레코드다. split은 흔히 group의 일부에 적용하는 동작이지 group 구조 자체가 아니다.","targetId":"group-pnr"}],"sources":[{"org":"Amadeus","name":"Amadeus Service Hub — How to split a PNR (Cryptic)","version":"","section":"","url":""},{"org":"IATA","name":"Passenger Services Conference Resolutions Manual (PSCRM)","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M10 24h8\"/>\u003cpath d=\"M18 24 28 14h10\"/>\u003cpath d=\"M18 24 28 34h10\"/>\u003ccircle cx=\"10\" cy=\"24\" r=\"3\"/>\u003ccircle cx=\"40\" cy=\"14\" r=\"3\"/>\u003ccircle cx=\"40\" cy=\"34\" r=\"3\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"ssr","term":"SSR","abbreviation":"SSR","aliases":["Special Service Request","Special Service Requirement"],"category":"air-ops","conceptType":"standard-term","status":"active","definition":"A Special Service Request (SSR) is a standardized, coded message element in a PNR used to request or notify an action-required special service from a carrier, such as a wheelchair, special meal, unaccompanied minor, or to convey data like Secure Flight passenger details. Each SSR uses a four-letter IATA code and typically receives a status reply (action/advice code) from the carrier.","definition_ko":"SSR(Special Service Request, 특별 서비스 요청)은 휠체어, 특별 기내식, 비동반 소아 등 항공사로부터 조치가 필요한 특별 서비스를 요청하거나 통보하기 위해, 또는 Secure Flight 승객 정보와 같은 데이터를 전달하기 위해 PNR에 사용되는 표준화된 코드 메시지 요소다. 각 SSR은 4자리 IATA 코드를 사용하며 일반적으로 항공사로부터 상태 응답(action/advice 코드)을 받는다.","term_ko":"특별 서비스 요청(SSR)","longDef":"SSRs follow the IATA PADIS/PSCRM standard format and four-letter code set (e.g., WCHR wheelchair, VGML vegetarian meal, UMNR unaccompanied minor, DOCS for passport/Secure Flight data). Because an SSR is action-oriented, it is transmitted to and acknowledged by each affected carrier, distinguishing it from purely informational messaging. SSRs are central to accessibility (PRM) handling, regulatory data transmission, and ancillary service requests.","longDef_ko":"SSR은 IATA PADIS/PSCRM 표준 형식과 4자리 코드 체계(예: WCHR 휠체어, VGML 채식 기내식, UMNR 비동반 소아, DOCS 여권/Secure Flight 데이터)를 따른다. SSR은 조치 지향적이므로 영향을 받는 각 항공사에 전송되어 확인되며, 이는 순수 정보성 메시지와 구별되는 점이다. SSR은 접근성(PRM) 처리, 규제 데이터 전송, 부가 서비스 요청에 핵심적이다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"OSI","targetId":"osi"},{"type":"related","targetTerm":"PNR","targetId":"pnr"},{"type":"related","targetTerm":"PRM","targetId":"prm"},{"type":"related","targetTerm":"Secure Flight","targetId":"secure-flight"},{"type":"related","targetTerm":"Ancillary Service","targetId":"ancillary-service"}],"distinctions":[{"targetTerm":"OSI","explanation":"An SSR is an action-required, coded request to a carrier that expects a status reply, whereas an OSI is purely informational and requires no carrier action or response.","explanation_ko":"SSR은 항공사에 보내는 조치가 필요한 코드 요청으로 상태 응답을 기대하는 반면, OSI는 순수 정보성으로 항공사의 조치나 응답을 요구하지 않는다.","targetId":"osi"}],"sources":[{"name":"Passenger Services Conference Resolutions Manual (PSCRM)","org":"IATA","version":"","section":"","url":""},{"name":"PADIS EDIFACT/XML Message Standards","org":"IATA","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M24 7 L29 18 L41 19.5 L32 28 L34.5 40 L24 34 L13.5 40 L16 28 L7 19.5 L19 18 Z\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"station-code","term":"Station Code","term_ko":"스테이션 코드(공항/지점 코드)","abbreviation":"","aliases":["Station","Airport Station Code","Outstation Code"],"category":"codes","conceptType":"code","status":"ambiguous","definition":"An operational term for the 3-letter IATA location code used to identify the airport or city where an airline maintains a presence (a 'station'), as used in ground handling, schedules, and operational communications (e.g., 'the JFK station'). In practice it is the IATA airport/city code applied in an operational context.","definition_ko":"항공사가 거점(스테이션)을 두고 있는 공항이나 도시를 식별하는 3자리 IATA 위치 코드를 가리키는 운영상의 용어로, 지상 조업, 스케줄, 운항 통신 등에서 사용된다(예: 'JFK 스테이션'). 실제로는 운영 맥락에서 적용되는 IATA 공항/도시 코드이다.","longDef":"'Station' is airline operations vocabulary for a location an airline serves and where it has staff or handling; the station code is therefore the IATA 3-letter location code (airport or city) used to address that location in rosters, ground operations, baggage routing, and crew/aircraft scheduling. Because it is not a separate coding scheme but a usage of the IATA location code, the term is ambiguous: depending on context it may mean a specific airport (airport code) or a metropolitan area (city code), and intermodal stations (rail/bus terminals) may also carry IATA location codes.","longDef_ko":"'스테이션(station)'은 항공사가 취항하며 직원이나 조업 체계를 둔 위치를 가리키는 항공 운영 용어이다. 따라서 스테이션 코드는 근무표, 지상 조업, 수하물 라우팅, 승무원·항공기 스케줄링에서 해당 위치를 지칭하는 데 쓰이는 IATA 3자리 위치 코드(공항 또는 도시)이다. 별도의 코드 체계가 아니라 IATA 위치 코드의 한 용법이므로 이 용어는 모호하다. 맥락에 따라 특정 공항(공항 코드) 또는 대도시권(도시 코드)을 의미할 수 있으며, 복합운송 스테이션(철도·버스 터미널)도 IATA 위치 코드를 가질 수 있다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Airport Code","targetId":"airport-code"},{"type":"related","targetTerm":"City Code","targetId":"city-code"},{"type":"related","targetTerm":"IATA Code","targetId":"iata-code"},{"type":"related","targetTerm":"IROPS","targetId":"irops"}],"distinctions":[{"targetTerm":"Airport Code","explanation":"A station code is the same IATA location code used operationally to mean an airline's location/presence; 'airport code' names the code itself as the identifier of an airport regardless of operational use.","explanation_ko":"스테이션 코드는 항공사의 위치·거점을 뜻하는 운영상 용법으로 사용되는 동일한 IATA 위치 코드이고, '공항 코드'는 운영 용도와 무관하게 공항을 식별하는 코드 자체를 가리킨다.","targetId":"airport-code"},{"targetTerm":"City Code","explanation":"A station code may resolve to a single airport or, loosely, a metro area; a city code specifically denotes the metropolitan area aggregating multiple airports.","explanation_ko":"스테이션 코드는 단일 공항으로 해석되거나 느슨하게 대도시권을 가리킬 수 있고, 도시 코드는 여러 공항을 묶는 대도시권을 명확히 지칭한다.","targetId":"city-code"}],"sources":[{"org":"IATA","name":"IATA Location Codes (fact sheet)","version":"","section":"","url":"https://www.iata.org/en/iata-repository/pressroom/fact-sheets/fact-sheet-iata-location-codes/"}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M24 43c8-9 13-16 13-23a13 13 0 10-26 0c0 7 5 14 13 23z\"/>\u003cpath d=\"M19 22l4-7 4 7M20.5 19.5h5\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"stop-sell","term":"Stop Sell","abbreviation":"","aliases":["Stop Sale","Close Out","Closed for Sale","CFS"],"category":"hotel-rate","conceptType":"standard-term","status":"active","definition":"A stop sell is a hard close that prevents a hotel from selling a given room type and/or rate plan for specified dates across one or more channels, regardless of remaining physical inventory. It is a yield and overbooking control applied through the channel manager or CRS and distributed as an availability restriction.","longDef":"Stop sell is one of the core availability restrictions exchanged via OpenTravel ARI messages: in OTA_HotelAvailNotifRQ it is expressed with a RestrictionStatus element carrying Status=\"Close\" (sometimes called close-for-sale), and it operates independently of the length-of-stay and arrival/departure restrictions (MinLOS, ClosedToArrival, ClosedToDeparture). Because it overrides available inventory, stop sell is typically managed centrally through the channel manager so that the close is mirrored on every connected channel; changes made directly in a downstream system risk being overwritten on the next ARI push. Hotels use stop sells to protect against overselling, to hold inventory for higher-yielding demand, or to suspend a specific rate plan while leaving others open.","standardBody":"OpenTravel Alliance","term_ko":"Stop Sell (판매 중지)","definition_ko":"Stop Sell(판매 중지)은 잔여 실물 재고와 무관하게 특정 객실 타입 및/또는 요금제를 지정한 날짜에 하나 이상의 채널에서 판매하지 못하도록 막는 하드 클로즈(hard close)다. 채널 매니저나 CRS를 통해 적용하는 수익·오버부킹 통제 수단이며, availability 제약으로 유통된다.","longDef_ko":"Stop Sell은 OpenTravel ARI 메시지로 교환되는 핵심 availability 제약 중 하나다. OTA_HotelAvailNotifRQ에서는 Status=\"Close\"를 담은 RestrictionStatus 요소로 표현되며(close-for-sale로도 불림), 투숙기간·도착/출발 제약(MinLOS, ClosedToArrival, ClosedToDeparture)과 독립적으로 작동한다. 가용 재고를 무시하고 우선하므로 통상 채널 매니저에서 중앙 관리하여 연결된 모든 채널에 동일하게 반영하며, 하위 시스템에서 직접 변경하면 다음 ARI 푸시 때 덮어쓰일 수 있다. 호텔은 오버셀 방지, 고수익 수요를 위한 재고 보존, 또는 특정 요금제만 일시 중단(다른 요금제는 유지)하기 위해 stop sell을 사용한다.","providerTerms":[{"provider":"OpenTravel Alliance","term":"RestrictionStatus Status=\"Close\"","context":"In OTA_HotelAvailNotifRQ a stop sell is sent as RestrictionStatus with Status=\"Close\", independent of MinLOS/CTA/CTD restrictions.","context_ko":"OTA_HotelAvailNotifRQ에서 stop sell은 Status=\"Close\"인 RestrictionStatus로 전송되며 MinLOS/CTA/CTD 제약과 독립적이다.","relationship":"same"}],"relationships":[{"type":"related","targetTerm":"Availability","targetId":"availability"},{"type":"related","targetTerm":"ARI","targetId":"ari"},{"type":"related","targetTerm":"Channel Manager","targetId":"channel-manager"},{"type":"related","targetTerm":"Overbooking","targetId":"overbooking"},{"type":"related","targetTerm":"Minimum Length of Stay (MLOS)","targetId":"minimum-length-of-stay-mlos"},{"type":"contrasts","targetTerm":"Free Sale","targetId":"free-sale"}],"distinctions":[{"targetTerm":"Free Sale","explanation":"Free Sale lets a channel keep selling a product without confirming real-time inventory; Stop Sell is the opposite action, forcibly closing sales for the dates and products it covers regardless of inventory.","explanation_ko":"Free Sale는 실시간 재고 확인 없이 채널이 상품을 계속 판매하도록 허용하지만, Stop Sell은 그 반대로 해당 날짜·상품의 판매를 재고와 무관하게 강제로 마감한다.","targetId":"free-sale"},{"targetTerm":"Minimum Length of Stay (MLOS)","explanation":"MLOS conditionally blocks only stays shorter than a threshold; Stop Sell unconditionally blocks all new bookings for the affected dates and products.","explanation_ko":"MLOS는 기준 미만 투숙만 조건부로 차단하지만, Stop Sell은 해당 날짜·상품의 모든 신규 예약을 무조건 차단한다.","targetId":"minimum-length-of-stay-mlos"}],"sources":[{"org":"OpenTravel Alliance","name":"OTA_HotelAvailNotifRQ (RestrictionStatus / Status=Close)","version":"","section":"","url":""},{"org":"SiteMinder","name":"pmsXchange — Availability and Restrictions","version":"","section":"","url":"https://developer.siteminder.com/siteminder-apis/pms-rms/introduction/pmsxchange/api-reference/availability-and-restrictions"}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003ccircle cx=\"24\" cy=\"24\" r=\"16\"/>\u003cpath d=\"M13 13l22 22\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"strong-customer-authentication","term":"Strong Customer Authentication","abbreviation":"SCA","aliases":["SCA","Strong Customer Authentication (PSD2)"],"category":"pay","conceptType":"standard-term","status":"active","definition":"Strong Customer Authentication is a regulatory requirement under the EU Revised Payment Services Directive (PSD2) that electronic payments be authenticated using at least two independent factors drawn from knowledge, possession, and inherence. It is intended to reduce fraud in card-not-present and online banking transactions.","longDef":"SCA is mandated by PSD2 and detailed in the European Banking Authority's Regulatory Technical Standards (RTS) on strong customer authentication and common and secure communication. The two factors must come from at least two of three independent categories: something the customer knows (e.g., a password or PIN), something the customer has (e.g., a phone or token), and something the customer is (e.g., a biometric). For online card payments, SCA is most commonly delivered through the 3-D Secure protocol. The RTS defines exemptions where SCA need not be applied, including low-value transactions, transaction risk analysis (TRA) by the acquirer or issuer, recurring payments of a fixed amount, merchant-initiated transactions, and trusted-beneficiary whitelisting. SCA applies where both the payer's and the payee's payment service providers are within the European Economic Area, which affects how cross-border travel bookings are processed.","standardBody":"European Banking Authority (EBA) / European Union (PSD2)","term_ko":"강력한 고객 인증 (Strong Customer Authentication, SCA)","definition_ko":"SCA는 EU 개정 지급결제서비스지침(PSD2)에 따른 규제 요건으로, 전자 결제를 지식·소유·고유성 요소 중 서로 독립적인 두 가지 이상의 요소로 인증하도록 요구한다. 카드 비대면(CNP) 및 온라인 뱅킹 거래의 사기를 줄이는 것을 목적으로 한다.","longDef_ko":"SCA는 PSD2에 의해 의무화되며, 유럽은행감독청(EBA)의 강력한 고객 인증 및 안전한 통신에 관한 기술표준(RTS)에 상세히 규정된다. 두 인증 요소는 고객이 아는 것(비밀번호·PIN), 가진 것(휴대폰·토큰), 본인 자체인 것(생체정보)이라는 세 독립 범주 중 둘 이상에서 와야 한다. 온라인 카드 결제에서는 주로 3-D Secure 프로토콜로 구현된다. RTS는 SCA 면제(exemption) 사례도 정의하는데, 소액 거래, 매입사·발급사의 거래 위험 분석(TRA), 정액 정기 결제, 가맹점 개시 거래(MIT), 신뢰 수취인 화이트리스트 등이 있다. SCA는 지급인과 수취인의 결제서비스 제공자가 모두 유럽경제지역(EEA) 내에 있을 때 적용되어 국경 간 여행 예약 처리 방식에 영향을 준다.","providerTerms":[],"relationships":[{"type":"related","targetTerm":"3-D Secure","targetId":"3-d-secure"},{"type":"related","targetTerm":"Chargeback","targetId":"chargeback"},{"type":"related","targetTerm":"PCI DSS","targetId":"pci-dss"}],"distinctions":[{"targetTerm":"3-D Secure","explanation":"SCA is the regulatory requirement (the 'what' and 'why'); 3-D Secure is a technical authentication protocol commonly used to satisfy SCA for online card payments (the 'how').","explanation_ko":"SCA는 규제 요건(무엇을·왜)이고, 3-D Secure는 온라인 카드 결제에서 SCA를 충족하기 위해 흔히 쓰이는 기술적 인증 프로토콜(어떻게)이다.","targetId":"3-d-secure"}],"sources":[{"org":"European Banking Authority","name":"Regulatory Technical Standards on strong customer authentication and common and secure communication under PSD2","version":"","section":"","url":""},{"org":"European Union","name":"Revised Payment Services Directive (PSD2)","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"9\" y=\"20\" width=\"30\" height=\"20\" rx=\"2.5\"/>\u003cpath d=\"M16 20v-5a8 8 0 0 1 16 0v5\"/>\u003ccircle cx=\"24\" cy=\"29\" r=\"2.5\"/>\u003cpath d=\"M24 31.5V35\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"surcharge","term":"Surcharge","abbreviation":"","aliases":["Fare Surcharge","Q Surcharge"],"category":"air-shop","conceptType":"standard-term","status":"active","definition":"A Surcharge is an additional amount added to the base fare during fare construction under specific rule conditions, such as a mileage surcharge for exceeding Maximum Permitted Mileage, a peak/seasonal or day-of-week surcharge, or a fare-rule-filed Q surcharge. It increases the fare component amount and is expressed in the same construction units (NUC) as the fare.","longDef":"Surcharges in airline fare construction are governed by fare rules and the mileage system. A mileage surcharge (e.g., 5M, 10M, 15M, 20M, 25M) is applied as a percentage uplift when an itinerary's Ticketed Point Mileage exceeds the Maximum Permitted Mileage within published tolerances. Rule-based surcharges (often filed under ATPCO Category 12, Surcharges, and historically labeled with a 'Q' such as Q-surcharges) add fixed or percentage amounts for conditions like specific flights, dates, or directions of travel. Unlike YQ/YR carrier-imposed amounts that sit in the tax box, fare-construction surcharges are part of the fare itself and therefore affect commissions, proration, and minimum-fare checks.","standardBody":"ATPCO","term_ko":"할증료 (Surcharge)","definition_ko":"Surcharge는 특정 규정 조건에 따라 fare construction 과정에서 기본 운임에 더해지는 추가 금액으로, Maximum Permitted Mileage 초과에 대한 마일리지 할증, 성수기/시즌/요일 할증, 또는 fare rule에 파일링된 Q surcharge 등이 있다. fare component 금액을 증가시키며 운임과 동일한 산출 단위(NUC)로 표시된다.","longDef_ko":"항공 운임 산출에서 surcharge는 fare rule과 마일리지 시스템에 의해 규율된다. 마일리지 할증(예: 5M, 10M, 15M, 20M, 25M)은 여정의 Ticketed Point Mileage가 공시된 허용 범위 내에서 Maximum Permitted Mileage를 초과할 때 백분율 가산으로 적용된다. 규정 기반 할증(흔히 ATPCO Category 12 Surcharges로 파일링되며, 역사적으로 'Q'를 붙인 Q-surcharge로 표기됨)은 특정 항공편, 날짜, 여행 방향 같은 조건에 대해 정액 또는 정률 금액을 더한다. 세금란에 위치하는 YQ/YR carrier-imposed 금액과 달리, fare-construction surcharge는 운임 자체의 일부이므로 커미션, proration, 최저운임 점검에 영향을 미친다.","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Fare Construction","targetId":"fare-construction"},{"type":"related","targetTerm":"Fare Component","targetId":"fare-component"},{"type":"related","targetTerm":"Fare Rule","targetId":"fare-rule"},{"type":"related","targetTerm":"NUC","targetId":"nuc"}],"distinctions":[{"targetTerm":"Tax (YQ/YR)","explanation":"YQ/YR are carrier-imposed amounts carried in the ticket's tax box, separate from the fare; a fare-construction Surcharge is added into the fare amount itself and is treated as fare for commission and proration.","explanation_ko":"YQ/YR은 운임과 분리되어 항공권 세금란에 기재되는 carrier-imposed 금액이고, fare-construction Surcharge는 운임 금액 자체에 가산되어 커미션과 proration에서 운임으로 취급된다.","targetId":"tax-yq-yr"}],"sources":[{"org":"ATPCO","name":"ATPCO Fare Rules Categories","version":"","section":"Category 12 Surcharges","url":"https://atpco.net/single-blog/what-are-atpco-fare-rules-categories/"},{"org":"IATA","name":"Fundamental Skills in Journey Pricing and Ticketing","version":"","section":"Mileage surcharges","url":"https://www.iata.org/en/training/courses/journey-pricing-ticketing/tttg14/en/"}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cline x1=\"24\" y1=\"10\" x2=\"24\" y2=\"38\"/>\u003cline x1=\"14\" y1=\"24\" x2=\"34\" y2=\"24\"/>\u003ccircle cx=\"24\" cy=\"24\" r=\"16\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"tax-yq-yr","term":"Tax (YQ/YR)","abbreviation":"YQ/YR","aliases":["Carrier-Imposed Surcharge","Carrier-Imposed Fee","YQ","YR","Fuel Surcharge"],"category":"air-shop","conceptType":"code","status":"active","definition":"YQ and YR are tax/fee codes carried in the tax box of a ticket that represent carrier-imposed surcharges (commonly described historically as fuel or insurance surcharges) rather than government or airport taxes. They are set by the airline, filed and collected like taxes through ATPCO/IATA tax data, but are airline revenue.","longDef":"Although they occupy tax fields and use ISO-style two-letter tax codes, YQ and YR are commercial charges levied by the marketing or operating carrier, not statutory taxes imposed by a government or airport authority. The split between YQ and YR is largely conventional and carrier-specific; both function identically as carrier-imposed surcharges. Originally introduced to recover volatile jet-fuel costs, many carriers later relabeled them simply as carrier-imposed international surcharges decoupled from actual fuel prices. Because they are technically taxes/fees rather than fare, YQ/YR amounts are often what makes 'free' award redemptions still cost cash, and they are handled separately from the base fare in fare construction and refunds.","standardBody":"IATA","term_ko":"YQ/YR 세금·요금 (Tax/Surcharge)","definition_ko":"YQ와 YR은 항공권 세금란에 기재되는 세금/요금 코드로, 정부나 공항이 부과하는 세금이 아니라 항공사가 부과하는 carrier-imposed surcharge(역사적으로 흔히 유류 또는 보험 할증료로 표현됨)를 나타낸다. 항공사가 금액을 정하고 ATPCO/IATA tax 데이터를 통해 세금처럼 파일링·징수하지만, 실제로는 항공사 수입이다.","longDef_ko":"세금 필드를 차지하고 ISO식 두 글자 tax code를 사용하지만, YQ와 YR은 정부나 공항 당국이 부과하는 법정 세금이 아니라 marketing 또는 operating carrier가 부과하는 상업적 요금이다. YQ와 YR의 구분은 대체로 관행적이고 항공사별로 다르며, 둘 다 carrier-imposed surcharge로서 동일하게 기능한다. 본래 변동성이 큰 항공유 비용을 회수하기 위해 도입되었으나, 이후 많은 항공사가 실제 유가와 무관하게 단순히 carrier-imposed international surcharge로 명칭을 바꾸었다. 기술적으로 운임이 아닌 세금/요금이므로, YQ/YR 금액은 '무료' 마일리지 보상 발권에서도 현금 비용이 발생하는 주된 이유가 되며, fare construction과 환불에서 기본 운임과 별도로 처리된다.","providerTerms":[{"provider":"Travelport","term":"YQ-YR","context":"Travelport documents YQ/YR as carrier-imposed surcharges shown in the tax portion of a fare.","context_ko":"Travelport는 YQ/YR을 운임의 세금 부분에 표시되는 carrier-imposed surcharge로 문서화한다.","relationship":"same"}],"relationships":[{"type":"related","targetTerm":"Surcharge","targetId":"surcharge"},{"type":"related","targetTerm":"Fare Construction","targetId":"fare-construction"},{"type":"related","targetTerm":"Fare Component","targetId":"fare-component"},{"type":"related","targetTerm":"Refund","targetId":"refund"}],"distinctions":[{"targetTerm":"Surcharge","explanation":"A Surcharge in fare construction (e.g., a mileage or peak-day surcharge) increases the fare amount itself; YQ/YR are carrier-imposed amounts carried in the tax box separate from the base fare, even though both are airline-set add-ons.","explanation_ko":"Fare construction의 Surcharge(예: 마일리지·성수기 할증)는 운임 금액 자체를 증가시키는 반면, YQ/YR은 기본 운임과 분리되어 세금란에 기재되는 carrier-imposed 금액이다. 둘 다 항공사가 정하는 추가 금액이라는 점은 같다.","targetId":"surcharge"}],"sources":[{"org":"Travelport","name":"YQ-YR Support article","version":"","section":"Carrier-imposed surcharges","url":"https://support.travelport.com/webhelp/FaresAndPricing/Content/YQ-YR.htm"},{"org":"IATA","name":"Passenger Fares and Ticketing","version":"","section":"Taxes, fees and charges","url":"https://www.iata.org/en/training/subject-areas/fares-ticketing-courses/"}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M24 6l16 8v6c0 11-7 18-16 22C15 38 8 31 8 20v-6z\"/>\u003cpath d=\"M20 23l3 3 6-7\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"through-fare","term":"Through Fare","term_ko":"일관 운임(스루 페어)","abbreviation":"","aliases":["Through-Fare","Thru Fare"],"category":"air-partner","conceptType":"business-term","status":"active","definition":"A single published fare covering carriage between an origin and a final destination over the whole journey, including any intermediate connecting points, rather than the sum of separate local fares for each segment. Through fares are filed and priced as one product and are commonly lower than adding up point-to-point fares.","definition_ko":"각 구간별 개별 로컬 운임의 합이 아니라, 중간 연결 지점을 포함한 여정 전체에 대해 출발지와 최종 목적지 간 운송을 포괄하는 단일 공시 운임. 일관 운임은 하나의 상품으로 신고·책정되며, 흔히 구간별(point-to-point) 운임을 합산한 것보다 저렴하다.","longDef":"Through fares are central to multi-segment and multi-carrier pricing: a fare component is priced from origin to destination as a through fare, and on interline or codeshare itineraries the through fare's value is then divided among carriers via proration, often using Special Prorate Agreements. Through fares enable the hub-and-spoke and connecting models by giving travelers one competitive price for the entire trip rather than penalizing connections. They are filed through fare-distribution systems such as ATPCO and applied by pricing engines according to the relevant fare rules.","longDef_ko":"일관 운임은 다구간·다중 항공사 운임 책정의 핵심이다. 운임 구성요소(fare component)는 출발지에서 목적지까지 일관 운임으로 책정되며, 인터라인 또는 공동운항 여정에서는 그 일관 운임 값이 흔히 SPA(Special Prorate Agreement)를 사용한 프로레이션을 통해 항공사 간에 분배된다. 일관 운임은 여행객에게 여정 전체에 대한 하나의 경쟁력 있는 가격을 제공하여 연결을 불리하게 하지 않음으로써 허브 앤 스포크 및 연결 모델을 가능하게 한다. 이는 ATPCO와 같은 운임 배포 시스템을 통해 신고되며, 관련 운임 규정에 따라 운임 계산 엔진이 적용한다.","standardBody":"","providerTerms":[{"provider":"ATPCO","term":"Through fare","context":"Through fares are filed in ATPCO's fare database and applied under ATPCO fare rules categories.","context_ko":"일관 운임은 ATPCO 운임 데이터베이스에 신고되어 ATPCO 운임 규정 카테고리에 따라 적용된다.","relationship":"related"}],"relationships":[{"type":"related","targetTerm":"Fare Component","targetId":"fare-component"},{"type":"related","targetTerm":"Proration","targetId":"proration"},{"type":"related","targetTerm":"Origin & Destination","targetId":"origin-destination"},{"type":"related","targetTerm":"ATPCO","targetId":"atpco"},{"type":"related","targetTerm":"Connection","targetId":"connection"},{"type":"related","targetTerm":"Interline","targetId":"interline"}],"distinctions":[{"targetTerm":"Proration","explanation":"A through fare is the single end-to-end price charged to the passenger; proration is the back-office process of splitting that fare's revenue among the carriers that operated the journey.","explanation_ko":"일관 운임은 승객에게 부과되는 출발지-목적지 단일 가격이고, 프로레이션은 그 운임 수익을 여정을 운송한 항공사들 간에 나누는 후방(back-office) 처리다.","targetId":"proration"},{"targetTerm":"Fare Component","explanation":"A fare component is the priced portion of an itinerary to which a fare applies; a through fare is a fare type that prices an origin-to-destination component as one continuous fare across intermediate points.","explanation_ko":"운임 구성요소는 운임이 적용되는 여정의 일부 구간이고, 일관 운임은 중간 지점들을 가로질러 출발지-목적지 구성요소를 하나의 연속 운임으로 책정하는 운임 유형이다.","targetId":"fare-component"}],"sources":[{"name":"Airline industry glossary — Through fare","org":"ATPCO","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003ccircle cx=\"8\" cy=\"34\" r=\"3\"/>\u003ccircle cx=\"24\" cy=\"34\" r=\"3\"/>\u003ccircle cx=\"40\" cy=\"34\" r=\"3\"/>\u003cline x1=\"11\" y1=\"34\" x2=\"21\" y2=\"34\"/>\u003cline x1=\"27\" y1=\"34\" x2=\"37\" y2=\"34\"/>\u003cpath d=\"M8 22 q16 -16 32 0\"/>\u003cline x1=\"8\" y1=\"22\" x2=\"8\" y2=\"18\"/>\u003cline x1=\"40\" y1=\"22\" x2=\"40\" y2=\"18\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"ticket-number","term":"Ticket Number","term_ko":"항공권 번호(전자항공권 번호)","abbreviation":"","aliases":["E-Ticket Number","Document Number","Airline Ticket Number","Electronic Ticket Number"],"category":"codes","conceptType":"code","status":"active","definition":"The 13-digit number that uniquely identifies an airline ticket/transport document. It is structured as a 3-digit airline (accounting) code, a 4-digit form code, a 6-digit serial number, and a final check digit (e.g., 001-2345678901).","definition_ko":"항공권/운송 서류를 고유하게 식별하는 13자리 번호. 3자리 항공사(정산) 코드, 4자리 form code, 6자리 일련번호, 마지막 검증 숫자(check digit)로 구성된다(예: 001-2345678901).","longDef":"Each flight coupon of an e-ticket is addressed by the document number plus a coupon number (1-4). When an itinerary needs more coupons than one document allows, conjunction tickets share a continuous serial range. Unlike a PNR locator (which references the whole reservation) or a flight number (which references a route/date), the ticket number references one passenger's purchased document and is used for refunds, reissues, voids, exchanges, and BSP/ARC settlement. The leading three digits are the airline's accounting code identifying the validating carrier.","longDef_ko":"전자항공권의 각 비행 쿠폰(flight coupon)은 서류 번호에 쿠폰 번호(1~4)를 더해 지정된다. 여정에 한 서류가 허용하는 쿠폰보다 많은 쿠폰이 필요하면, 연결권(conjunction ticket)이 연속된 일련번호 범위를 공유한다. 예약 전체를 가리키는 PNR 예약번호나 노선·날짜를 가리키는 편명과 달리, 항공권 번호는 한 승객이 구매한 서류 하나를 가리키며 환불·재발행·취소(void)·교환과 BSP/ARC 정산에 사용된다. 앞 세 자리는 검증 항공사(validating carrier)를 식별하는 항공사 정산 코드이다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"E-ticket","targetId":"e-ticket"},{"type":"related","targetTerm":"Flight Coupon","targetId":"flight-coupon"},{"type":"related","targetTerm":"Airline Accounting Code","targetId":"airline-accounting-code"},{"type":"related","targetTerm":"PNR","targetId":"pnr"},{"type":"related","targetTerm":"Reissue","targetId":"reissue"},{"type":"related","targetTerm":"Refund","targetId":"refund"},{"type":"related","targetTerm":"Validating Carrier","targetId":"validating-carrier"}],"distinctions":[{"targetTerm":"PNR","explanation":"A PNR locator references the whole reservation (which may hold several passengers and tickets); a ticket number references a single passenger's transport document of 13 digits.","explanation_ko":"PNR 예약번호는 (여러 승객·여러 항공권을 포함할 수 있는) 예약 전체를 가리키고, 항공권 번호는 한 승객의 13자리 운송 서류 하나를 가리킨다.","targetId":"pnr"},{"targetTerm":"Airline Accounting Code","explanation":"The accounting code is only the first 3 digits identifying the airline; the ticket number is the full 13-digit document number that contains it.","explanation_ko":"정산 코드는 항공사를 식별하는 앞 3자리에 불과하고, 항공권 번호는 그것을 포함하는 13자리 전체 서류 번호이다.","targetId":"airline-accounting-code"}],"sources":[{"org":"IATA","name":"Passenger Services Conference Resolutions Manual (PSCRM) — electronic ticket / document numbering","version":"","section":"","url":""},{"org":"AltexSoft","name":"IATA Numbers and Codes Explained","version":"","section":"","url":"https://www.altexsoft.com/blog/iata-numbers-codes/"}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M6 14h36v8a3 3 0 000 6v6H6v-6a3 3 0 000-6z\"/>\u003cpath d=\"M24 14v26\" stroke-dasharray=\"2 3\"/>\u003cpath d=\"M11 22h7M11 27h5\"/>\u003cpath d=\"M30 22h7M30 27h7M30 32h4\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"ticketing-time-limit","term":"Ticketing Time Limit","term_ko":"발권 시한 (TTL)","abbreviation":"TTL","aliases":["Time Limit","Time to Ticket","Last Ticketing Date","TTL"],"category":"air-ticket","conceptType":"business-term","status":"active","definition":"The deadline by which a booked reservation must be ticketed (paid and issued) or the airline may automatically cancel the held space. It may be set by the airline/GDS or imposed by the applicable fare rule (advance reservation/ticketing requirement).","definition_ko":"예약된 건이 발권(지불 및 발행)되어야 하는 기한으로, 이를 넘기면 항공사가 확보된 좌석을 자동으로 취소할 수 있다. 이 기한은 항공사/GDS에 의해 설정되거나 해당 운임 규정(사전 예약/발권 요건)에 의해 부과될 수 있다.","longDef":"Ticketing time limits arise from two main sources: carrier/GDS-imposed limits managed via queues and option/timer elements in the PNR, and fare-rule-driven limits (ATPCO Category 5, Advance Reservations/Ticketing, which can require ticketing within a number of days of booking or by a fixed date before departure). Failure to ticket by the TTL typically results in auto-cancellation of the segments and may forfeit the booked fare. TTL handling is a core part of agency and airline ticketing workflows, often monitored through GDS queues.","longDef_ko":"발권 시한은 두 가지 주요 출처에서 발생한다. 하나는 PNR의 큐(queue) 및 옵션/타이머 요소를 통해 관리되는 항공사/GDS 부과 시한이고, 다른 하나는 운임 규정에 의한 시한(ATPCO Category 5, 사전 예약/발권으로, 예약 후 일정 일수 이내 또는 출발 전 특정 날짜까지 발권을 요구할 수 있음)이다. TTL까지 발권하지 못하면 일반적으로 해당 구간이 자동 취소되며 예약된 운임이 소멸될 수 있다. TTL 처리는 대리점 및 항공사 발권 업무의 핵심 요소로, 흔히 GDS 큐를 통해 모니터링된다.","standardBody":"ATPCO","providerTerms":[],"relationships":[{"type":"related","targetTerm":"PNR","targetId":"pnr"},{"type":"related","targetTerm":"E-ticket","targetId":"e-ticket"},{"type":"related","targetTerm":"Queue","targetId":"queue"},{"type":"related","targetTerm":"Fare Basis Code","targetId":"fare-basis-code"},{"type":"related","targetTerm":"ATPCO","targetId":"atpco"}],"distinctions":[{"targetTerm":"Queue","explanation":"A queue is the GDS workflow bucket where pending-ticketing PNRs are placed; the ticketing time limit is the deadline itself.","explanation_ko":"큐(queue)는 발권 대기 중인 PNR이 배치되는 GDS 업무 처리 버킷이며, 발권 시한은 기한 그 자체이다.","targetId":"queue"}],"sources":[{"name":"ATPCO Fare Rules — Category 5 (Advance Reservations/Ticketing)","org":"ATPCO","version":"","section":"","url":""},{"name":"Passenger Services Conference Resolutions Manual (PSCRM)","org":"IATA","version":"","section":"","url":""}],"lastReviewed":"2026-06-15","icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"6\" y=\"12\" width=\"24\" height=\"16\" rx=\"3\"/>\u003cpath d=\"M11 18h8M11 22h5\"/>\u003ccircle cx=\"34\" cy=\"32\" r=\"9\"/>\u003cpath d=\"M34 27v5l3 3\"/>\u003c/svg>"},{"id":"tokenization","term":"Tokenization","abbreviation":"","aliases":["payment tokenization","EMV payment tokenisation","network tokenization"],"category":"pay","conceptType":"standard-term","status":"active","definition":"Tokenization is the replacement of a sensitive card Primary Account Number (PAN) with a non-sensitive surrogate value, the token, that can be used in place of the PAN within a defined domain. Payment tokens are issued and mapped back to the PAN by a Token Service Provider, reducing the exposure and PCI scope of merchants that store card-on-file credentials.","longDef":"Payment tokenization is standardized by EMVCo through the EMV Payment Tokenisation Specification, which defines roles including the Token Service Provider (TSP), which generates and de-tokenizes payment tokens, and the Token Requestor (such as a merchant, wallet provider, or issuer) that requests tokens. Tokens can carry usage restrictions (domain controls) limiting them to a specific merchant, channel, or device, so a stolen token is far less useful than a raw PAN. Network tokenization, offered by the card schemes, keeps card-on-file credentials current as cards are reissued, improving authorization rates for recurring travel charges. Tokenization is distinct from end-to-end encryption: the token is a different value substituted for the PAN, whereas encryption transforms the PAN reversibly with a key. In travel, OTAs, airlines, and hotels use tokenization to store guest and traveler card credentials securely and to pass payment data to a Merchant of Record or acquirer without exposing the underlying PAN.","standardBody":"EMVCo","term_ko":"토큰화 (Tokenization)","definition_ko":"Tokenization(토큰화)은 민감한 카드 기본계좌번호(PAN)를, 정의된 도메인 안에서 PAN 대신 사용할 수 있는 비민감 대체값인 토큰(token)으로 교체하는 것이다. 결제 토큰은 Token Service Provider가 발급하고 PAN으로 다시 매핑하며, 카드 정보를 보관하는(card-on-file) 가맹점의 노출과 PCI 적용 범위를 줄여준다.","longDef_ko":"결제 토큰화는 EMVCo의 EMV Payment Tokenisation Specification으로 표준화되어 있으며, 결제 토큰을 생성·역토큰화하는 Token Service Provider(TSP)와 토큰을 요청하는 Token Requestor(가맹점·지갑 제공자·발급사 등)의 역할을 정의한다. 토큰에는 특정 가맹점·채널·기기로 사용을 제한하는 도메인 통제(domain controls)를 부여할 수 있어, 탈취되어도 원본 PAN보다 훨씬 쓸모가 적다. 카드 네트워크가 제공하는 네트워크 토큰화는 카드가 재발급되어도 card-on-file 자격증명을 최신으로 유지해, 정기적 여행 청구의 승인율을 높인다. 토큰화는 종단간 암호화와 다른데, 토큰은 PAN을 대체한 별개의 값인 반면 암호화는 키로 PAN을 가역적으로 변환한 것이다. 여행 분야에서 OTA·항공사·호텔은 토큰화로 투숙객·여행자 카드 정보를 안전하게 보관하고, 원본 PAN을 노출하지 않은 채 Merchant of Record나 Acquirer에 결제 데이터를 전달한다.","providerTerms":[{"provider":"Visa / Mastercard","term":"Network Token","context":"Scheme-level tokenization that replaces a card-on-file PAN with a network-issued token kept current across reissuance.","context_ko":"card-on-file PAN을 네트워크 발급 토큰으로 대체하고 카드 재발급 시에도 최신으로 유지하는 카드 네트워크 차원의 토큰화.","relationship":"narrower"}],"relationships":[{"type":"related","targetTerm":"PCI DSS","targetId":"pci-dss"},{"type":"related","targetTerm":"VCC","targetId":"vcc"},{"type":"related","targetTerm":"Merchant of Record","targetId":"merchant-of-record"},{"type":"related","targetTerm":"Acquirer","targetId":"acquirer"}],"distinctions":[{"targetTerm":"VCC","explanation":"A VCC is a real, spendable virtual card number generated for a specific payment (often B2B supplier settlement), while a token is a non-spendable surrogate that maps back to an existing underlying card PAN.","explanation_ko":"VCC는 특정 결제(흔히 B2B 공급사 정산)를 위해 생성된 실제 사용 가능한 가상 카드 번호인 반면, 토큰은 기존 기초 카드 PAN으로 다시 매핑되는 사용 불가한 대체값이다.","targetId":"vcc"},{"targetTerm":"PCI DSS","explanation":"Tokenization is a technique; PCI DSS is the compliance standard whose scope tokenization helps reduce by removing PANs from merchant systems.","explanation_ko":"토큰화는 기법이고, PCI DSS는 준수 표준이며, 토큰화는 가맹점 시스템에서 PAN을 제거해 그 적용 범위를 줄이는 데 기여한다.","targetId":"pci-dss"}],"sources":[{"org":"EMVCo","name":"EMV Payment Tokenisation Specification – Technical Framework","version":"","section":"","url":"https://www.emvco.com/emv-technologies/payment-tokenisation/"}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"6\" y=\"15\" width=\"16\" height=\"11\" rx=\"2\"/>\u003cpath d=\"M9 22h7\"/>\u003cpath d=\"M24 23h6\"/>\u003cpath d=\"M27 20l3 3-3 3\"/>\u003crect x=\"30\" y=\"15\" width=\"12\" height=\"11\" rx=\"2\"/>\u003ccircle cx=\"36\" cy=\"20.5\" r=\"2\"/>\u003cpath d=\"M14 33v3M24 33v3M34 33v3\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"traveler-preference","term":"Traveler Preference","abbreviation":"","aliases":["Travel Preference","Guest Preference","Passenger Preference"],"category":"customer","conceptType":"business-term","status":"active","definition":"A traveler preference is a stored, non-mandatory attribute describing how a traveler prefers to be served, such as seat choice (aisle/window), special meal, room type, bedding, cabin, language, or preferred suppliers. Preferences are held in a customer or guest profile and applied to bookings to personalize the experience, distinct from regulatory or safety requirements.","longDef":"Preferences are captured in customer profiles in a GDS, airline CRS, or hotel PMS/CRM and may be transmitted into bookings, for instance an aisle-seat preference, a vegetarian meal, or a high-floor non-smoking room. In airline distribution, comfort or service preferences such as seating and meals are often realized through Special Service Requests (SSR) or seat requests, while non-actionable information may be carried as OSI. The OpenTravel Alliance and HTNG define profile and preference data structures that allow preferences to be exchanged between systems. Preferences are advisory and subject to availability, in contrast to a PRM assistance need or a Secure Flight data requirement, which are obligations rather than wishes.","standardBody":"OpenTravel Alliance","term_ko":"여행자 선호(Traveler Preference)","definition_ko":"Traveler Preference(여행자 선호)는 좌석 선택(통로/창측), 특별식, 객실 유형, 침구, 좌석 등급, 언어, 선호 공급사 등 여행자가 어떻게 서비스받기를 원하는지를 기술하는, 저장된 비필수 속성이다. 선호는 고객 또는 게스트 프로필에 보관되며 예약에 반영되어 경험을 개인화하는데, 규제나 안전상의 요구사항과는 구별된다.","longDef_ko":"선호는 GDS, 항공사 CRS, 호텔 PMS/CRM의 고객 프로필에 수집되어 예약으로 전달될 수 있다(예: 통로 좌석 선호, 채식, 고층·금연 객실). 항공 유통에서 좌석·기내식 같은 편의/서비스 선호는 흔히 SSR(특별서비스요청)이나 좌석 요청으로 구현되며, 조치가 필요 없는 정보는 OSI로 전달될 수 있다. OpenTravel Alliance와 HTNG는 시스템 간 선호를 교환할 수 있도록 프로필·선호 데이터 구조를 정의한다. 선호는 권고적이며 가용성에 따라 달라진다는 점에서, 의무에 해당하는 PRM 지원 필요나 Secure Flight 데이터 요구와 대비된다.","providerTerms":[],"relationships":[{"type":"child","targetTerm":"Customer Profile","targetId":"customer-profile"},{"type":"related","targetTerm":"SSR","targetId":"ssr"},{"type":"related","targetTerm":"OSI","targetId":"osi"},{"type":"related","targetTerm":"OpenTravel Alliance","targetId":"opentravel-alliance"},{"type":"related","targetTerm":"Room Type","targetId":"room-type"}],"distinctions":[{"targetTerm":"SSR","explanation":"A traveler preference is stored profile data describing a wish, while an SSR is the actionable message that conveys a specific request to a carrier within a booking; preferences are often the source that drives creation of SSRs but are not themselves a transmitted request until applied.","explanation_ko":"Traveler preference는 바람을 기술한 저장 프로필 데이터이고, SSR은 예약 내에서 특정 요청을 항공사에 전달하는 실행 가능한 메시지다. 선호는 흔히 SSR 생성을 유발하는 원천이지만, 적용되기 전까지는 그 자체가 전송된 요청은 아니다.","targetId":"ssr"},{"targetTerm":"PRM","explanation":"A traveler preference is advisory and best-effort (e.g., a window seat), whereas a PRM assistance need is a service obligation the carrier must fulfill; they are governed by different rules and priorities.","explanation_ko":"Traveler preference는 권고적이고 최선노력 대상(예: 창측 좌석)인 반면, PRM 지원 필요는 항공사가 반드시 이행해야 하는 서비스 의무다. 둘은 적용 규칙과 우선순위가 다르다.","targetId":"prm"}],"sources":[{"org":"OpenTravel Alliance","name":"OpenTravel Specifications (Profile / Preferences messages)","version":"","section":"","url":"https://opentravel.org/"},{"org":"HTNG (Hospitality Technology Next Generation)","name":"HTNG Customer Profile / Preferences specifications","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003ccircle cx=\"24\" cy=\"15\" r=\"6\"/>\u003cpath d=\"M12 38c0-7 5-12 12-12s12 5 12 12\"/>\u003cpath d=\"M33 9l1.4 2.9 3.1.4-2.3 2.1.6 3.1-2.8-1.5-2.8 1.5.6-3.1-2.3-2.1 3.1-.4z\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"two-way-xml","term":"Two-Way XML","abbreviation":"2-Way XML","aliases":["Two-Way Connectivity","2-Way Connection","Bidirectional XML"],"category":"hotel-dist","conceptType":"standard-term","status":"active","definition":"Two-way XML is a bidirectional connectivity model in which a hotel system and a distribution channel exchange ARI updates outbound and receive reservation, modification, and cancellation messages inbound over the same XML interface — typically using OpenTravel/HTNG message schemas. The 'two-way' contrast is with one-way connections that only push availability and rates without automatically pulling bookings back.","longDef":"In hotel distribution, connectivity is described by directionality. A one-way connection sends rates and inventory out to a channel but requires bookings to be retrieved manually or via a separate process. A two-way XML connection automates both directions: ARI updates flow from the CRS/PMS/channel manager to the channel, and the channel returns booking, amendment, and cancellation notifications that are written straight back into the hotel system — reducing manual re-keying, overbookings, and rate errors. The XML payloads are commonly based on OpenTravel Alliance specifications (e.g. the OTA_Hotel* messages) and HTNG implementation profiles, which standardize the request/response structures used across switches, channel managers, OTAs, and GDSs.","standardBody":"OpenTravel Alliance","term_ko":"양방향 XML (Two-Way XML)","definition_ko":"양방향 XML은 호텔 시스템과 유통 채널이 동일한 XML 인터페이스를 통해 ARI 업데이트를 외부로 보내고 예약·변경·취소 메시지를 내부로 받는 양방향 연동 모델로, 보통 OpenTravel/HTNG 메시지 스키마를 사용한다. '양방향'이라는 표현은 가용성·요금만 push하고 예약을 자동으로 가져오지 않는 단방향(one-way) 연결과 대비된다.","longDef_ko":"호텔 유통에서 연동은 방향성으로 설명된다. 단방향 연결은 요금·재고를 채널로 내보내지만 예약은 수작업이나 별도 프로세스로 가져와야 한다. 양방향 XML 연결은 두 방향을 모두 자동화한다. ARI 업데이트가 CRS/PMS/채널 매니저에서 채널로 흐르고, 채널은 예약·수정·취소 알림을 호텔 시스템에 바로 기록되도록 반환한다. 이로써 수기 재입력, 오버부킹, 요금 오류가 줄어든다. XML 페이로드는 흔히 OpenTravel Alliance 사양(예: OTA_Hotel* 메시지)과 HTNG 구현 프로파일에 기반하며, 이는 스위치·채널 매니저·OTA·GDS 전반에서 사용되는 요청/응답 구조를 표준화한다.","providerTerms":[],"relationships":[{"type":"related","targetTerm":"ARI","targetId":"ari"},{"type":"related","targetTerm":"Channel Manager","targetId":"channel-manager"},{"type":"related","targetTerm":"Hotel Switch","targetId":"hotel-switch"},{"type":"related","targetTerm":"OpenTravel Alliance","targetId":"opentravel-alliance"},{"type":"related","targetTerm":"HTNG","targetId":"htng"},{"type":"contrasts","targetTerm":"Free Sale","targetId":"free-sale"}],"distinctions":[{"targetTerm":"ARI","explanation":"ARI is the availability/rate/inventory content being exchanged; two-way XML is the bidirectional transport/protocol model over which ARI flows out and reservations flow back.","explanation_ko":"ARI는 교환되는 가용성·요금·재고 콘텐츠이고, 양방향 XML은 그 ARI가 나가고 예약이 돌아오는 양방향 전송/프로토콜 모델이다.","targetId":"ari"},{"targetTerm":"Free Sale","explanation":"Free sale lets a channel sell rooms without checking live availability per request (sell-and-report), whereas two-way XML emphasizes real-time bidirectional confirmation of availability and bookings.","explanation_ko":"Free sale는 채널이 요청마다 실시간 가용성을 확인하지 않고 객실을 판매하게 하는 방식(sell-and-report)인 반면, 양방향 XML은 가용성과 예약의 실시간 양방향 확인을 강조한다.","targetId":"free-sale"}],"sources":[{"org":"OpenTravel Alliance","name":"OpenTravel Hotel Messaging Specifications","version":"","section":"","url":"https://opentravel.org/"},{"org":"AltexSoft","name":"Hotel Tech Specifications by HTNG, OpenTravel, and HEDNA","version":"","section":"","url":"https://www.altexsoft.com/blog/hotel-tech-specifications-htng-opentravel/"}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M8 18h28\"/>\u003cpath d=\"M31 13l5 5-5 5\"/>\u003cpath d=\"M40 30H12\"/>\u003cpath d=\"M17 25l-5 5 5 5\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"un-locode","term":"UN/LOCODE","term_ko":"UN/LOCODE (유엔 무역·운송 위치 코드)","abbreviation":"UN/LOCODE","aliases":["United Nations Code for Trade and Transport Locations","UN Location Code","LOCODE"],"category":"codes","conceptType":"code","status":"active","definition":"The United Nations Code for Trade and Transport Locations: a 5-character code identifying locations (ports, airports, inland terminals, and other places of relevance to trade and transport) used in international logistics. The first two letters are the ISO 3166 country code and the remaining three identify the location within that country.","definition_ko":"유엔 무역·운송 위치 코드(United Nations Code for Trade and Transport Locations). 국제 물류에서 사용되는 5자리 코드로, 무역과 운송에 관련된 위치(항만, 공항, 내륙 터미널 및 기타 장소)를 식별한다. 앞 두 글자는 ISO 3166 국가 코드이고, 나머지 세 글자는 해당 국가 내의 위치를 식별한다.","longDef":"UN/LOCODE is maintained by UNECE and covers seaports, road and rail terminals, airports, postal exchange offices, and other transport-relevant locations. The structure CC + LLL (e.g., USNYC for New York, USA; DEHAM for Hamburg, Germany) reuses ISO 3166-1 alpha-2 for the country segment. It is heavily used in maritime, freight, and supply-chain systems and is broader in scope than aviation-only codes.","longDef_ko":"UN/LOCODE는 UNECE가 관리하며 해항, 도로·철도 터미널, 공항, 우편 교환소 및 기타 운송 관련 위치를 포괄한다. CC + LLL 구조(예: 미국 뉴욕은 USNYC, 독일 함부르크는 DEHAM)로 국가 부분에는 ISO 3166-1 alpha-2를 재사용한다. 해운, 화물, 공급망 시스템에서 폭넓게 사용되며, 항공 전용 코드보다 적용 범위가 넓다.","standardBody":"UNECE","providerTerms":[],"relationships":[{"type":"related","targetTerm":"ISO 3166 Country Code","targetId":"iso-3166-country-code"},{"type":"related","targetTerm":"Airport Code","targetId":"airport-code"},{"type":"related","targetTerm":"City Code","targetId":"city-code"}],"distinctions":[{"targetTerm":"Airport Code","explanation":"UN/LOCODE is a 5-character trade/transport location code (CC+LLL) covering ports, terminals and airports; an airport code is an aviation-specific IATA/ICAO identifier.","explanation_ko":"UN/LOCODE는 항만, 터미널, 공항을 포괄하는 5자리 무역/운송 위치 코드(CC+LLL)인 반면, 공항 코드는 항공 전용 IATA/ICAO 식별자이다.","targetId":"airport-code"}],"sources":[{"name":"UN/LOCODE Code List by Country and Territory","org":"UNECE","version":"","section":"","url":"https://unece.org/trade/cefact/unlocode-code-list-country-and-territory"}],"lastReviewed":"2026-06-15","icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003ccircle cx=\"24\" cy=\"18\" r=\"12\"/>\u003cpath d=\"M12 18h24M24 6c4 3 4 21 0 24M24 6c-4 3-4 21 0 24\"/>\u003cpath d=\"M24 30v8\"/>\u003cpath d=\"M18 38c0 3 4 5 6 5s6-2 6-5\"/>\u003c/svg>"},{"id":"unaccompanied-minor","term":"Unaccompanied Minor","abbreviation":"UMNR","aliases":["UMNR","UM","Unaccompanied Minor Service"],"category":"customer","conceptType":"code","status":"active","definition":"An Unaccompanied Minor (UMNR) is a child travelling by air without an accompanying parent, legal guardian, or responsible adult aged 18 or over, for whom the carrier provides a supervised escort service from departure check-in through to handover to an authorized adult at the destination. UMNR is also the IATA Special Service Request (SSR) code used to advise carriers that a passenger is an unaccompanied minor.","longDef":"Eligible age ranges and whether the service is mandatory or optional vary by airline, but commonly fall between 5 and 17 years, often with sub-brackets (e.g., 5-7, 8-11, 12-17) that determine fees and service levels. In the reservation, the requirement is conveyed via the UMNR SSR, typically with a free-text element indicating the child's age (for example UM08 for an eight-year-old); the related PADIS-defined code PDUM denotes the chargeable/paid unaccompanied-minor service. Carriers usually also collect the names and contact details of the adults dropping off and collecting the child, sometimes via OSI or contact-detail elements. The service requires a documented handover and is closely tied to a Passenger Type Code identifying the traveler as a child.","standardBody":"IATA (Passenger Services Conference Resolutions / PADIS)","term_ko":"비동반 소아(Unaccompanied Minor, UMNR)","definition_ko":"Unaccompanied Minor(UMNR)는 부모, 법적 보호자 또는 만 18세 이상 책임 동반자 없이 혼자 항공 여행하는 어린이로, 항공사가 출발 체크인부터 도착지에서 지정된 성인에게 인계할 때까지 직원이 동반·감독하는 서비스를 제공하는 대상이다. UMNR은 승객이 비동반 소아임을 항공사에 알리는 IATA SSR(특별서비스요청) 코드이기도 하다.","longDef_ko":"대상 연령과 서비스의 의무/선택 여부는 항공사마다 다르지만 보통 5~17세 범위이며, 흔히 5-7세, 8-11세, 12-17세 같은 세부 구간으로 나뉘어 요금과 서비스 수준이 정해진다. 예약에서는 UMNR SSR로 요구사항을 전달하며 보통 어린이 나이를 나타내는 자유텍스트(예: 8세는 UM08)를 함께 입력한다. PADIS에 정의된 관련 코드 PDUM은 유료 비동반 소아 서비스를 의미한다. 항공사는 보통 아이를 배웅·인수하는 성인의 이름과 연락처도 함께 수집하며(OSI나 연락처 항목 사용), 서비스에는 문서화된 인계 절차가 따른다. 이 서비스는 승객을 어린이로 식별하는 Passenger Type Code와 밀접하게 연결된다.","providerTerms":[],"relationships":[{"type":"related","targetTerm":"SSR","targetId":"ssr"},{"type":"related","targetTerm":"OSI","targetId":"osi"},{"type":"related","targetTerm":"Passenger Type Code","targetId":"passenger-type-code"},{"type":"related","targetTerm":"PRM","targetId":"prm"}],"distinctions":[{"targetTerm":"PRM","explanation":"An Unaccompanied Minor is a child needing supervised escort due to age, signalled by the UMNR SSR, whereas PRM (Passenger with Reduced Mobility) covers assistance needs arising from disability or mobility limitation, signalled by codes such as WCHR; a passenger could in principle require both.","explanation_ko":"Unaccompanied Minor는 연령 때문에 동반 감독이 필요한 어린이로 UMNR SSR로 표시되는 반면, PRM(거동 불편 승객)은 장애나 이동 제약으로 인한 지원 필요를 WCHR 등의 코드로 표시한다. 한 승객이 원칙적으로 둘 다 필요할 수 있다.","targetId":"prm"},{"targetTerm":"Passenger Type Code","explanation":"A Passenger Type Code (e.g., CHD) classifies the traveler for pricing/fare purposes, while UMNR is a service request that the child must be escorted; the two are complementary and often both present in a booking.","explanation_ko":"Passenger Type Code(예: CHD)는 운임·가격 목적의 승객 분류이고, UMNR은 그 어린이를 동반 감독해야 한다는 서비스 요청이다. 둘은 상호 보완적이며 한 예약에 함께 존재하는 경우가 많다.","targetId":"passenger-type-code"}],"sources":[{"org":"IATA","name":"IATA Codeset Directory / Passenger Services Conference Resolutions Manual (SSR codes)","version":"","section":"","url":""},{"org":"Wikipedia","name":"Unaccompanied minor (passenger)","version":"","section":"","url":"https://en.wikipedia.org/wiki/Unaccompanied_minor_(passenger)"}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003ccircle cx=\"20\" cy=\"13\" r=\"5\"/>\u003cpath d=\"M20 18v14\"/>\u003cpath d=\"M12 24h16\"/>\u003cpath d=\"M20 32l-5 8\"/>\u003cpath d=\"M20 32l5 8\"/>\u003cpath d=\"M30 10h12\"/>\u003cpath d=\"M36 6l6 4-6 4\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"validating-carrier","term":"Validating Carrier","term_ko":"발권 항공사 (Validating Carrier)","abbreviation":"","aliases":["Plating Carrier","Ticketing Carrier","Issuing Carrier"],"category":"air-ticket","conceptType":"role","status":"active","definition":"The airline whose accounting code (the first three digits of the ticket number) appears on the ticket and which is responsible for the financial settlement of the document, collecting the fare and distributing proceeds to the transporting carriers. Eligibility to validate is governed by interline/ticketing agreements.","definition_ko":"항공권에 자사의 회계 코드(항공권 번호의 첫 세 자리)가 표시되며 해당 서류의 재무 정산을 책임지는 항공사로, 운임을 징수하고 수익을 운송 항공사들에게 배분한다. 발권 자격은 인터라인/발권 협정에 의해 규율된다.","longDef":"The validating (or plating) carrier need not operate any of the flights on the ticket; it is the carrier that takes financial ownership of the sale and settles funds through BSP/ARC, then prorates and pays the participating carriers via interline/SPA agreements. IATA ticketing-authority rules determine which carrier may be plated based on the itinerary and the agreements in place. The choice of validating carrier affects which fares, e-ticketing capability, and interline reach are available.","longDef_ko":"발권(plating) 항공사는 항공권상의 어떤 항공편도 직접 운항할 필요가 없다. 이 항공사는 판매에 대한 재무적 소유권을 가지며 BSP/ARC를 통해 자금을 정산한 다음, 인터라인/SPA 협정에 따라 참여 항공사들에게 비율 배분(prorate)하여 지급한다. IATA 발권 권한 규정은 여정과 체결된 협정에 따라 어느 항공사가 발권(plating)될 수 있는지를 결정한다. 발권 항공사의 선택은 이용 가능한 운임, 전자 발권 가능 여부 및 인터라인 적용 범위에 영향을 미친다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"E-ticket","targetId":"e-ticket"},{"type":"related","targetTerm":"Interline","targetId":"interline"},{"type":"related","targetTerm":"Proration","targetId":"proration"},{"type":"related","targetTerm":"BSP","targetId":"bsp"},{"type":"related","targetTerm":"Airline Designator","targetId":"airline-designator"}],"distinctions":[{"targetTerm":"Marketing Carrier","explanation":"The validating carrier owns the ticket's financial settlement; the marketing carrier is the airline selling the flight under its own code.","explanation_ko":"발권 항공사는 항공권의 재무 정산을 소유하며, 마케팅 항공사(Marketing Carrier)는 자사 코드로 해당 항공편을 판매하는 항공사이다.","targetId":"marketing-carrier"},{"targetTerm":"Operating Carrier","explanation":"The validating carrier plates and settles the ticket and may not fly any segment; the operating carrier physically performs the flight.","explanation_ko":"발권 항공사는 항공권을 발권(plate)하고 정산하며 어떤 구간도 운항하지 않을 수 있고, 운항 항공사(Operating Carrier)는 실제로 항공편을 수행한다.","targetId":"operating-carrier"}],"sources":[{"name":"Passenger Services Conference Resolutions Manual (PSCRM)","org":"IATA","version":"","section":"","url":""}],"lastReviewed":"2026-06-15","icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M23 6l13 5v8c0 8-5 13-13 16-8-3-13-8-13-16v-8z\"/>\u003cpath d=\"M17 19l4 4 9-9\"/>\u003c/svg>"},{"id":"vcc","term":"VCC","abbreviation":"VCC","aliases":["Virtual Credit Card","Virtual Card","Virtual Card Number"],"category":"pay","conceptType":"business-term","status":"active","definition":"A Virtual Credit Card is a digitally generated card number (with expiry and CVC) issued for payment without a physical card, widely used in travel for B2B payments from agencies and OTAs to suppliers. VCCs are typically single-use or restricted in amount, currency, and validity window, which simplifies reconciliation and limits fraud exposure.","term_ko":"가상 신용카드(VCC)","definition_ko":"가상 신용카드(VCC)는 실물 카드 없이 결제를 위해 디지털로 생성되는 카드 번호(유효기간 및 CVC 포함)로, 여행 업계에서 여행사 및 OTA가 공급업체에 지급하는 B2B 결제에 널리 사용된다. VCC는 일반적으로 일회용이거나 금액, 통화, 유효 기간이 제한되어 있어 정산을 간소화하고 사기 노출을 줄인다.","longDef":"In travel, an agency, OTA, or bedbank funds a VCC and supplies its number to a supplier (hotel, airline, tour operator) to settle a specific booking. Single-use VCCs are generated per transaction, while lodged cards can be reused over time. Card brand and BIN selection can be optimized for acceptance and interchange. Because VCCs run over standard card rails, they are exposed to chargeback and 3-D Secure rules.","longDef_ko":"여행 업계에서는 여행사, OTA 또는 베드뱅크가 VCC에 자금을 충전하고 그 번호를 공급업체(호텔, 항공사, 투어 오퍼레이터)에 제공하여 특정 예약을 결제한다. 일회용 VCC는 거래마다 생성되는 반면, 등록형(lodged) 카드는 일정 기간 반복 사용할 수 있다. 카드 브랜드와 BIN 선택은 승인율과 인터체인지를 최적화하도록 조정할 수 있다. VCC는 표준 카드 결제망을 통해 처리되므로 차지백(chargeback) 및 3-D Secure 규칙의 적용을 받는다.","standardBody":"","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Merchant Model","targetId":"merchant-model"},{"type":"related","targetTerm":"Bedbank","targetId":"bedbank"},{"type":"related","targetTerm":"Net Rate","targetId":"net-rate"},{"type":"related","targetTerm":"Chargeback","targetId":"chargeback"},{"type":"related","targetTerm":"OTA (Online Travel Agency)","targetId":"ota-online-travel-agency"}],"distinctions":[{"targetTerm":"IATA EasyPay","explanation":"IATA EasyPay is an IATA e-wallet exclusive to BSP ticket issuance, whereas a VCC is a general card-rail instrument used for many supplier payments.","explanation_ko":"IATA EasyPay는 BSP 항공권 발권 전용 IATA 전자지갑인 반면, VCC는 다양한 공급업체 결제에 사용되는 범용 카드 결제망 수단이다.","targetId":"iata-easypay"}],"sources":[{"name":"Virtual Credit Cards in Travel: How to Secure B2B Payments","org":"AltexSoft","version":"","section":"","url":"https://www.altexsoft.com/blog/virtual-credit-cards-travel/"},{"name":"Using Virtual Credit Cards for Travel Agency Payments","org":"J.P. Morgan","version":"","section":"","url":"https://www.jpmorgan.com/insights/treasury/cards-expense-management/using-virtual-credit-cards-for-travel-agency-payments"}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"6\" y=\"13\" width=\"30\" height=\"22\" rx=\"3\"/>\u003cline x1=\"6\" y1=\"21\" x2=\"36\" y2=\"21\"/>\u003cline x1=\"11\" y1=\"28\" x2=\"18\" y2=\"28\"/>\u003cpath d=\"M40 18a6 6 0 0 1 0 12\"/>\u003cpath d=\"M40 23a2 2 0 0 1 0 2\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"void","term":"Void","term_ko":"보이드/발권 취소 (Void)","abbreviation":"","aliases":["Voiding","Same-Day Void","Ticket Void"],"category":"air-ticket","conceptType":"process","status":"active","definition":"The cancellation of a newly issued ticket or EMD within the permitted void window (typically the same sales day, before the BSP/ARC sales reporting cutoff) so that no sale is reported and no value is collected. A voided document's coupons are set to status VOID and cannot be used.","definition_ko":"허용된 Void 기한(일반적으로 BSP/ARC 판매 보고 마감 이전의 당일 판매일) 내에 새로 발행된 항공권 또는 EMD를 취소하여 판매가 보고되지 않고 가치가 징수되지 않도록 하는 것이다. Void 처리된 서류의 쿠폰은 VOID 상태로 설정되어 사용할 수 없다.","longDef":"Voiding removes the transaction from the agent's sales report before it is billed through BSP/ARC, making it the cleanest way to reverse an erroneous or unwanted issuance without incurring a refund transaction or penalties. The void window is constrained by the local BSP/ARC sales reporting period (commonly the day of issue, subject to the reporting period close); once the window passes, reversal must be handled as a refund instead. Void applies only to documents that have not been used.","longDef_ko":"Void 처리는 BSP/ARC를 통해 청구되기 전에 대리점의 판매 보고서에서 거래를 제거하므로, 환불 거래나 위약금 없이 잘못되었거나 원치 않는 발권을 되돌리는 가장 깔끔한 방법이다. Void 기한은 현지 BSP/ARC 판매 보고 기간(일반적으로 발행 당일이며 보고 기간 마감에 따름)에 의해 제한된다. 기한이 지나면 되돌리기는 대신 환불로 처리해야 한다. Void는 사용되지 않은 서류에만 적용된다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"E-ticket","targetId":"e-ticket"},{"type":"related","targetTerm":"EMD","targetId":"emd"},{"type":"contrasts","targetTerm":"Refund","targetId":"refund"},{"type":"related","targetTerm":"BSP","targetId":"bsp"},{"type":"related","targetTerm":"ARC","targetId":"arc"}],"distinctions":[{"targetTerm":"Refund","explanation":"Void reverses an issuance within the same sales period so it is never billed; refund returns value after the document has been reported/settled.","explanation_ko":"Void는 동일한 판매 기간 내에 발권을 되돌려 청구되지 않게 하며, 환불은 서류가 보고/정산된 이후에 가치를 반환한다.","targetId":"refund"},{"targetTerm":"Reissue","explanation":"Void nullifies the document entirely; reissue keeps the value and exchanges it for a new document.","explanation_ko":"Void는 서류를 완전히 무효화하며, 재발행은 가치를 유지하면서 새 서류로 교환한다.","targetId":"reissue"}],"sources":[{"name":"BSP / ARC sales reporting and void procedures","org":"IATA","version":"","section":"","url":""}],"lastReviewed":"2026-06-15","icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"9\" y=\"10\" width=\"26\" height=\"22\" rx=\"3\"/>\u003cpath d=\"M15 17h14M15 22h10\"/>\u003ccircle cx=\"31\" cy=\"32\" r=\"9\"/>\u003cpath d=\"M25 26l12 12\"/>\u003c/svg>"},{"id":"waitlist","term":"Waitlist","abbreviation":"","aliases":["Wait List","Waitlisting","Waitlisted"],"category":"air-ops","conceptType":"process","status":"active","definition":"A Waitlist is a holding list for a flight and booking class that has no immediate confirmed Availability, on which a passenger's request is queued pending seats opening up. The segment is held in a waitlist status (e.g., HL) and is cleared to confirmed (HK) automatically or manually if and when space becomes available.","longDef":"Waitlisting lets agents request a sell on a closed or full class; the host returns or sets a waitlist advice/status code such as HL ('have waitlisted'). Clearance can be triggered at the segment level or at the Origin & Destination level by revenue-management and inventory logic, and is communicated by a status change and PNR/Queue notification. Waitlist priority and limits are carrier-controlled, and unconfirmed waitlisted segments generally cannot be ticketed; they may be auto-cancelled if not cleared by a deadline.","standardBody":"","term_ko":"Waitlist (대기 예약 / 웨이팅)","definition_ko":"Waitlist는 즉시 확약 Availability가 없는 항공편·예약 클래스에 대해 승객 요청을 대기열에 올려 두는 목록으로, 좌석이 생기기를 기다린다. 해당 segment는 대기 status(예: HL)로 유지되며, 좌석이 확보되면 자동 또는 수동으로 확약(HK)으로 clear된다.","longDef_ko":"Waitlist는 마감되거나 만석인 클래스에 sell을 요청할 수 있게 하며, 호스트는 HL('have waitlisted') 같은 대기 advice/status 코드를 설정·반환한다. clear는 segment 단위 또는 Origin & Destination 단위로 수익관리·inventory 로직에 의해 트리거되며 status 변경과 PNR/Queue 알림으로 전달된다. 대기 우선순위와 한도는 항공사가 통제하고, 확약되지 않은 waitlist segment는 일반적으로 발권할 수 없으며 마감 시한까지 clear되지 않으면 자동 취소될 수 있다.","providerTerms":[{"provider":"GDS (industry)","term":"HL","context":"Segment status code meaning 'have waitlisted' — held on the waiting list.","context_ko":"'have waitlisted'를 의미하는 segment status 코드로 대기 목록에 보류된 상태.","relationship":"related"}],"relationships":[{"type":"related","targetTerm":"Availability","targetId":"availability"},{"type":"related","targetTerm":"RBD","targetId":"rbd"},{"type":"related","targetTerm":"Booking Status Code","targetId":"booking-status-code"},{"type":"related","targetTerm":"Segment","targetId":"segment"},{"type":"related","targetTerm":"Overbooking","targetId":"overbooking"}],"distinctions":[{"targetTerm":"Overbooking","explanation":"Overbooking is the carrier deliberately confirming more bookings than seats to offset no-shows; a Waitlist holds unconfirmed requests awaiting space. Waitlisted passengers are not confirmed, whereas overbooked passengers hold confirmed status that may exceed capacity.","explanation_ko":"Overbooking은 no-show를 상쇄하려 좌석보다 많은 예약을 의도적으로 확약하는 것이고, Waitlist는 좌석을 기다리는 미확약 요청을 보유하는 것이다. waitlist 승객은 미확약 상태인 반면 overbooking 승객은 정원을 초과할 수 있는 확약 상태를 보유한다.","targetId":"overbooking"}],"sources":[{"org":"IATA","name":"Passenger Services Conference Resolutions Manual (PSCRM)","version":"","section":"","url":""},{"org":"Travelport","name":"Smartpoint Cloud Help — Waitlist flights","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M16 8h16M16 40h16\"/>\u003cpath d=\"M18 8c0 8 12 10 12 16s-12 8-12 16\"/>\u003cpath d=\"M30 8c0 8-12 10-12 16s12 8 12 16\"/>\u003cpath d=\"M21 36h6\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"wet-lease","term":"Wet Lease","term_ko":"웻 리스(승무원 포함 임차)","abbreviation":"","aliases":["ACMI Lease","ACMI","Wet Leasing"],"category":"air-partner","conceptType":"business-term","status":"active","definition":"An aircraft lease in which the lessor provides the aircraft together with crew, maintenance, and insurance (ACMI) and operates it under the lessor's own Air Operator's Certificate (AOC). The lessee pays typically per block hour and uses the capacity for its own flights, but the lessor remains the operating carrier with operational control.","definition_ko":"임대인(lessor)이 항공기와 함께 승무원, 정비, 보험(ACMI)을 제공하고 임대인 자신의 운항증명(AOC) 하에 이를 운항하는 항공기 임차. 임차인(lessee)은 일반적으로 블록 아워(block hour)당 비용을 지불하고 그 공급력을 자사 항공편에 사용하지만, 임대인이 운항 통제권을 가진 운항 항공사로 남는다.","longDef":"Wet lease is also known as ACMI for the four elements the lessor supplies: Aircraft, Crew, Maintenance, and Insurance. Because the lessor holds the AOC and operational control, in passenger terms it is the operating carrier, while the lessee acts as the marketing carrier whose code the flight is sold under. Wet leases are used to add temporary capacity, cover seasonal peaks, replace grounded aircraft, or start routes quickly. This contrasts with a dry lease, where the lessor provides only the aircraft and the lessee supplies its own crew, maintenance, and insurance and operates under its own AOC.","longDef_ko":"웻 리스는 임대인이 공급하는 네 가지 요소, 즉 항공기(Aircraft), 승무원(Crew), 정비(Maintenance), 보험(Insurance)을 따서 ACMI라고도 한다. 임대인이 AOC와 운항 통제권을 보유하므로 여객 관점에서는 임대인이 운항 항공사이며, 임차인은 해당 항공편이 그 코드로 판매되는 판매 항공사 역할을 한다. 웻 리스는 임시 공급력 추가, 계절 성수기 대응, 운항 정지된 항공기 대체, 노선의 신속한 개설 등에 사용된다. 이는 임대인이 항공기만 제공하고 임차인이 자체 승무원·정비·보험을 갖추어 자사 AOC 하에 운항하는 드라이 리스(dry lease)와 대비된다.","standardBody":"ICAO","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Operating Carrier","targetId":"operating-carrier"},{"type":"related","targetTerm":"Marketing Carrier","targetId":"marketing-carrier"},{"type":"related","targetTerm":"Codeshare","targetId":"codeshare"},{"type":"related","targetTerm":"IROPS","targetId":"irops"}],"distinctions":[{"targetTerm":"Codeshare","explanation":"In a wet lease one airline's aircraft and crew physically operate the flight under the lessee's flight number, with the lessor holding the AOC; a codeshare shares flight codes between two carriers that each operate under their own AOC.","explanation_ko":"웻 리스에서는 한 항공사의 항공기와 승무원이 임차인의 편명으로 실제 운항하며 AOC는 임대인이 보유하고, 공동운항은 각자 자사 AOC 하에 운항하는 두 항공사 간에 편명을 공유한다.","targetId":"codeshare"},{"targetTerm":"Operating Carrier","explanation":"A wet lease is the contractual arrangement; in it the lessor is the operating carrier (holding the AOC and operational control) while the lessee markets the flight.","explanation_ko":"웻 리스는 계약상의 협정이며, 그 안에서 임대인이 (AOC와 운항 통제권을 보유한) 운항 항공사이고 임차인이 항공편을 판매한다.","targetId":"operating-carrier"}],"sources":[{"name":"Convention on International Civil Aviation (Chicago Convention), Article 83 bis on lease/charter/interchange of aircraft","org":"ICAO","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M6 24 L26 20 L40 8 L34 24 L40 40 L26 28 Z\"/>\u003cpath d=\"M4 34 q6 4 12 0 q6 -4 12 0 q6 4 12 0\"/>\u003c/svg>","lastReviewed":"2026-06-15"}]}</script>
<script>
"use strict";
(function(){
  const RAW = JSON.parse(document.getElementById('glossary-data').textContent);
  window.GLOSSARY_DATA = RAW;
  const META = RAW.meta||{}, CATS = RAW.categories||[], ENTRIES = RAW.entries||[];
  const byId = new Map(ENTRIES.map(e=>[e.id,e]));
  const catById = new Map(CATS.map(c=>[c.id,c]));
  const entriesByCat = new Map(CATS.map(c=>[c.id,[]]));
  ENTRIES.forEach(e=>{ (entriesByCat.get(e.category)||entriesByCat.set(e.category,[]).get(e.category)).push(e); });
  entriesByCat.forEach(arr=>arr.sort((a,b)=>a.term.localeCompare(b.term)));

  const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const $ = sel => document.querySelector(sel);

    en:{ sub:'Travel-Industry Terminology', searchPh:'Search terms (e.g., PNR, RBD, codeshare, fare)…',
      enc:'Encyclopedia', home:'🏠 Home', cats:'Categories', graph:'🕸 Knowledge Graph', index:'📇 Full Index',
      heroT:'Travel-industry terms, unified in one reference', heroB:'An encyclopedia that <b>unifies terminology across providers and standards</b> spread over air, hotel, distribution, settlement and specs. Compare names for one concept, and explore with per-term illustrations, a knowledge graph, and a full index.',
      sTerms:'Terms', sCats:'Categories', sProv:'Providers/Standards', sSrc:'Source citations',
      confT:'⚠️ Easily-confused terms', secCats:'Categories', openGraph:'Knowledge Graph', openIndex:'Full Index',
      terms:n=>`${n} terms`, home2:'Home', search:'Search',

      thProv:'Provider · Standard', thTerm:'Term', thRel:'Relation', thCtx:'Note',

      results:(q,n)=>`<b>${n}</b> result(s) for "<b>${esc(q)}</b>"`, noRes:'No results. Try another keyword.',

      disc:`Definitions are editorial summaries grounded in public industry standards (IATA, ATPCO, OpenTravel, HTNG, ISO, etc.) and provider docs; verify against primary sources before critical decisions. Last updated: ${esc(META.generatedAt||'')}.`,
      gTitle:'Term Knowledge Graph', gNodes:'nodes', gEdges:'links',
      gHint:'Click a node to expand its relationships. Click it again when expanded to view details. Dashed outer ring = has hidden neighbors.',
      idxTitle:'Full Index', idxAZ:'A–Z', idxByCat:'By category', idxAll:n=>`${n} terms total`,
      RLAB:{sameAs:'Same as',broader:'Broader',narrower:'Narrower',parent:'Parent',child:'Child',related:'Related',conflicts:'Conflicts',replaces:'Replaces',contrasts:'Contrasts'},

  };
  const t = k => (T[LANG] && T[LANG][k]!==undefined) ? T[LANG][k] : T.en[k];
  const Lf = (e,f) => { if(LANG==='ko'){ const v=e[f+'_ko']; if(v&&String(v).trim()) return v; } return e[f]||''; };
  const catName = c => LANG==='ko' ? (c.short||c.title) : c.title;
  const catDesc = c => LANG==='ko' ? (c.desc||'') : (c.desc_en||c.desc||'');

  /* icons */
  const safeSvg = s => (s && /<svg/i.test(s) && !/<script|javascript:|on\w+\s*=/i.test(s)) ? s : '';
  function iconHTML(e, cls){ const c=catById.get(e.category)||{}; const s=safeSvg(e.icon);
    const inner = s || `<svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2"><circle cx="24" cy="24" r="15"/><path d="M9 24h30M24 9v30"/></svg>`;
    return `<span class="icon ${cls||''}" style="color:${c.color||'var(--accent)'}">${inner}</span>`; }

  /* search index */
  const FIELDW={term:10,abbr:9,alias:6,prov:5,cat:2,def:1};
  const idx = ENTRIES.map(e=>{ const fields=[]; const push=(t,w)=>{ if(t) fields.push({t:String(t).toLowerCase(),w}); };
    push(e.term,FIELDW.term); push(e.term_ko,FIELDW.term); push(e.abbreviation,FIELDW.abbr);
    (e.aliases||[]).forEach(a=>push(a,FIELDW.alias)); (e.providerTerms||[]).forEach(p=>push(p.term,FIELDW.prov));
    const c=catById.get(e.category)||{}; push(c.title,FIELDW.cat); push(c.short,FIELDW.cat);
    push(e.definition,FIELDW.def); push(e.definition_ko,FIELDW.def);
    return {e,fields,term:e.term.toLowerCase(),abbr:(e.abbreviation||'').toLowerCase()}; });
  function search(qraw){ const q=qraw.trim().toLowerCase(); if(!q) return [];
    const toks=q.split(/[^a-z0-9가-힣]+/i).filter(Boolean); const out=[];
    for(const row of idx){ let score=0;
      if(row.term===q) score+=100; if(row.abbr&&row.abbr===q) score+=90; if(row.term.startsWith(q)) score+=40;
      for(const tok of toks){ let best=0; for(const f of row.fields){ if(f.t===tok) best=Math.max(best,f.w*3);
        else if(f.t.startsWith(tok)) best=Math.max(best,f.w*2); else if(f.t.includes(tok)) best=Math.max(best,f.w); }
        if(best===0){ score=-1; break; } score+=best; }
      if(score>0) out.push({e:row.e,score}); }
    out.sort((a,b)=> b.score-a.score || a.e.term.localeCompare(b.e.term)); return out.slice(0,60); }
  const hl=(text,q)=>{ if(!q) return esc(text); const toks=q.trim().toLowerCase().split(/[^a-z0-9가-힣]+/i).filter(Boolean); let s=esc(text);
    toks.forEach(tk=>{ if(tk.length<2) return; s=s.replace(new RegExp('('+tk.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig'),'<mark>$1</mark>'); }); return s; };

  /* sidebar */
  function renderSidebar(activeCat){ const dot=c=>`<span class="dot" style="background:${c.color||'var(--accent)'}"></span>`; const h2=location.hash;

      <a class="cat-link${h2.startsWith('#/index')?' active':''}" href="#/index">${t('index')}</a>
      <a class="cat-link${h2.startsWith('#/graph')?' active':''}" href="#/graph">${t('graph')}</a>

      <div class="nav-title">${esc(t('cats'))} (${CATS.length})</div>`;

  function statusBadge(s){ if(!s) return ''; return `<span class="badge st-${s}">● ${esc((t('ST')[s])||s)}</span>`; }
  const animateCounts=()=>{ document.querySelectorAll('.stat b[data-count]').forEach(el=>{ const tg=+el.dataset.count||0,d=720,t0=performance.now();
    (function tick(t){ const p=Math.min(1,(t-t0)/d); el.textContent=Math.round(tg*(1-Math.pow(1-p,3))); if(p<1)requestAnimationFrame(tick); })(performance.now()); }); };

  function renderHome(){
    const provSet=new Set(); ENTRIES.forEach(e=>(e.providerTerms||[]).forEach(p=>p.provider&&provSet.add(p.provider)));
    const srcCount=ENTRIES.reduce((a,e)=>a+((e.sources||[]).length),0);
    const conflicts=ENTRIES.filter(e=> e.status==='ambiguous' || (e.distinctions&&e.distinctions.length))

  function renderCategory(id){ const c=catById.get(id); if(!c) return renderHome(); const list=entriesByCat.get(id)||[];

  function linkTerm(targetId,label){ if(targetId&&byId.has(targetId)) return `<a class="rel-link" href="#/term/${targetId}">${esc(label||byId.get(targetId).term)}</a>`;
    return `<span class="rel-dead">${esc(label)}</span>`; }

  function renderTerm(id){ const e=byId.get(id); if(!e) return renderNotFound(id);
    const c=catById.get(e.category)||{title:e.category};
    const sub=LANG==='ko'&&e.term_ko&&e.term_ko!==e.term?`<div class="term-sub">${esc(e.term_ko)}</div>`:'';

    h+=`<article><div class="term-hero">${iconHTML(e,'term-icon')}<div><h1>${esc(e.term)}</h1>${sub}</div></div>

    if(e.providerTerms&&e.providerTerms.length){ h+=`<div class="field"><h3>${esc(t('fProv'))}</h3><table class="pt"><thead><tr><th>${esc(t('thProv'))}</th><th>${esc(t('thTerm'))}</th><th>${esc(t('thRel'))}</th><th>${esc(t('thCtx'))}</th></tr></thead><tbody>`;
      e.providerTerms.forEach(p=>{ const ctx=(LANG==='ko'&&p.context_ko)||p.context||'';
        h+=`<tr><td class="prov">${esc(p.provider)}</td><td><code>${esc(p.term)}</code></td><td>${esc((t('PR')[p.relationship])||p.relationship||'')}</td><td>${esc(ctx)}</td></tr>`; }); h+=`</tbody></table></div>`; }
    if(e.relationships&&e.relationships.length){ const RLAB=t('RLAB'); const groups={}; e.relationships.forEach(r=>{ (groups[r.type]=groups[r.type]||[]).push(r); });
      h+=`<div class="field"><h3>${esc(t('fRel'))}</h3>`; Object.keys(groups).forEach(ty=>{ h+=`<div class="rel-group"><span class="rl">${esc(RLAB[ty]||ty)}</span>`; groups[ty].forEach(r=> h+=linkTerm(r.targetId,r.targetTerm)); h+=`</div>`; }); h+=`</div>`; }
    if(e.distinctions&&e.distinctions.length){ h+=`<div class="field"><h3>${esc(t('fDist'))}</h3>`;
      e.distinctions.forEach(d=>{ const ex=(LANG==='ko'&&d.explanation_ko)||d.explanation; h+=`<div class="dist"><b>${esc(e.term)}</b> vs <b>${linkTerm(d.targetId,d.targetTerm)}</b> — ${esc(ex)}</div>`; }); h+=`</div>`; }
    if(Lf(e,'notes')) h+=`<div class="field"><h3>${esc(t('fNotes'))}</h3><div class="notes">${esc(Lf(e,'notes'))}</div></div>`;

  /* full index */
  let IDXMODE='az';
  function idxRow(e){ const c=catById.get(e.category)||{}; const ko=LANG==='ko'&&e.term_ko&&e.term_ko!==e.term?` <span class="ir-ko">· ${esc(e.term_ko)}</span>`:'';

  function renderIndex(){
    const sorted=[...ENTRIES].sort((a,b)=>a.term.localeCompare(b.term,'en',{sensitivity:'base'}));
    let body='';
    if(IDXMODE==='az'){
      const groups={}; sorted.forEach(e=>{ const L=(e.term[0]||'#').toUpperCase(); const k=/[A-Z]/.test(L)?L:'#'; (groups[k]=groups[k]||[]).push(e); });
      const letters=Object.keys(groups).sort();
      body=`<div class="idx-bar">`+letters.map(l=>`<button onclick="document.getElementById('L-${l}').scrollIntoView({behavior:'smooth',block:'start'})">${l}</button>`).join('')+`</div>`;
      letters.forEach(l=>{ body+=`<div class="idx-group" id="L-${l}"><div class="idx-gh">${l}</div><div class="idx-grid">${groups[l].map(idxRow).join('')}</div></div>`; });
    } else {
      CATS.forEach(c=>{ const list=(entriesByCat.get(c.id)||[]); if(!list.length) return;
        body+=`<div class="idx-group" id="C-${c.id}"><div class="idx-gh"><span class="gc" style="background:${c.color}"></span>${esc(catName(c))} <span style="color:var(--faint);font-weight:400;font-size:.8rem">(${list.length})</span></div><div class="idx-grid">${list.map(idxRow).join('')}</div></div>`; });

  }

  /* educational classroom */
  let classroomClassId = 'class101';

          classroomFinished = true;

        }
      }
