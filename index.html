old. Corporate rates are a sibling of other negotiated/confidential rates such as consortia rates and relate closely to Allotment when a room block is also contracted.","standardBody":"","term_ko":"Corporate Rate (기업 협정요금)","definition_ko":"Corporate Rate(기업 협정요금)는 비즈니스 출장을 위해 호텔(또는 체인)과 기업·여행관리회사(TMC) 간에 합의된 할인 협정 객실 요금이다. 통상 협정요금 접근 코드(rate access code)를 통해 인가된 예약자만 접근할 수 있으며, 계약에는 흔히 Last Room Availability(LRA) 적용 여부가 명시된다.","longDef_ko":"Corporate Rate는 보통 연례 RFP 절차에서 설정되며, 계약 기업의 여행사·출장자만 조회·예약할 수 있는 기밀(confidential)·채널 제한 요금으로 적재된다. GDS 유통에서는 보안 요금에 접근할 수 있는 여행사를 통제하는 rate access code(보통 3자리 식별자)로 보호되며, 이는 BAR·정부 요금 같은 공개 요금과 구별된다. 핵심 계약 변수는 LRA로, LRA가 적용되는 corporate rate는 판매 가능한 객실이 한 개라도 남아 있는 한 협정가가 보장되어야 하지만, 비LRA 요금은 수익 임계치 도달 시 마감될 수 있다. Corporate Rate는 컨소시아 요금 등 다른 협정·기밀 요금과 형제 관계이며, 객실 블록이 함께 계약될 때 Allotment와 밀접하게 관련된다.","providerTerms":[],"relationships":[{"type":"child","targetTerm":"Rate Plan","targetId":"rate-plan"},{"type":"related","targetTerm":"BAR","targetId":"bar"},{"type":"related","targetTerm":"Net Rate","targetId":"net-rate"},{"type":"related","targetTerm":"Allotment","targetId":"allotment"},{"type":"related","targetTerm":"GDS","targetId":"gds"},{"type":"related","targetTerm":"Rate Parity","targetId":"rate-parity"}],"distinctions":[{"targetTerm":"BAR","explanation":"BAR (Best Available Rate) is a public, openly bookable rate that fluctuates with demand; a Corporate Rate is a confidential negotiated rate restricted to a contracted company and typically static for the contract term, often guaranteed under LRA.","explanation_ko":"BAR(Best Available Rate)는 수요에 따라 변동하는 공개·자유예약 요금이지만, Corporate Rate는 계약 기업에 한정된 기밀 협정 요금으로 계약 기간 동안 통상 고정이며 흔히 LRA로 보장된다.","targetId":"bar"}],"sources":[{"org":"American Express Global Business Travel","name":"Hotel Lingo 101 (corporate / LRA)","version":"","section":"","url":"https://www.amexglobalbusinesstravel.com/the-atlas/hotel-lingo-101/"},{"org":"SaaS4H","name":"GDS — Negotiated Rate Loading Map & Rate Access Codes","version":"","section":"","url":"https://www.saas4h.com/global-distribution-system-gds/negotiated-rate-loading-map-rate-access-codes"}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"8\" y=\"10\" width=\"22\" height=\"30\" rx=\"2\"/>\u003cpath d=\"M30 18h10v22H30\"/>\u003cpath d=\"M14 16h6M14 22h6M14 28h6M35 24h2M35 30h2\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"coupon-status","term":"Coupon Status","abbreviation":"","aliases":["Coupon Status Code","E-ticket Coupon Status","Flight Coupon Status"],"category":"air-ticket","conceptType":"code","status":"active","definition":"Coupon status is the lifecycle state of an individual electronic ticket flight coupon, indicating where it is in the issue-to-use process — for example Open for Use, Airport Control, Checked In, Boarded/Lifted, Flown/Used, Exchanged/Reissued, Refunded, Void, or Suspended. The status governs what actions (use, exchange, refund, void, revalidation) are permitted on that coupon.","longDef":"Each flight coupon on an e-ticket carries a status that changes as the coupon moves through its lifecycle, kept in sync between the validating/operating carrier's e-ticket database and the GDS/agent record. Common statuses include Open for Use (O — valid and unused), Airport Control (the coupon is under departure-control), Checked In, Boarded/Lifted, Flown/Used (F — travel completed), Exchanged/Reissued (E — value moved to a new document), Refunded, Void, Suspended, and Printed. The current status determines permissible processing: only coupons in eligible states (e.g. Open for Use) can be voided, exchanged, revalidated, or refunded, while statuses such as Exchanged, Refunded, Flown, or Void preclude reuse. Carriers and GDSs implement these codes per the relevant IATA e-ticketing resolutions, though display mnemonics vary by system.","standardBody":"IATA","term_ko":"Coupon Status (쿠폰 상태)","definition_ko":"Coupon Status(쿠폰 상태)는 개별 전자 항공권 항공편 쿠폰의 생애주기 상태로, 발행에서 사용까지의 과정 중 쿠폰이 어디에 있는지를 나타낸다(예: Open for Use, Airport Control, Checked In, Boarded/Lifted, Flown/Used, Exchanged/Reissued, Refunded, Void, Suspended). 이 상태에 따라 해당 쿠폰에 허용되는 행위(사용, 교환, 환불, 보이드, revalidation)가 결정된다.","longDef_ko":"전자 항공권의 각 항공편 쿠폰은 생애주기를 거치며 변하는 상태를 가지며, 이는 validating/operating 항공사의 전자 항공권 데이터베이스와 GDS/대리점 기록 간에 동기화된다. 흔한 상태로는 Open for Use(O — 유효하며 미사용), Airport Control(출발 통제 하에 있음), Checked In, Boarded/Lifted, Flown/Used(F — 여행 완료), Exchanged/Reissued(E — 가치가 새 서류로 이동), Refunded, Void, Suspended, Printed 등이 있다. 현재 상태는 허용되는 처리를 결정한다. Open for Use 등 적격 상태의 쿠폰만 보이드·교환·revalidation·환불이 가능하며, Exchanged·Refunded·Flown·Void 같은 상태는 재사용을 불가능하게 한다. 항공사와 GDS는 관련 IATA 전자 발권 규정에 따라 이 코드를 구현하지만, 표시 약어(mnemonic)는 시스템마다 다르다.","providerTerms":[{"provider":"Amadeus","term":"E-ticket coupon status codes","context":"Amadeus publishes cryptic coupon status codes such as O (Open for use), F (Flown/used), and E (Exchanged) in the e-ticket record.","context_ko":"Amadeus는 전자 항공권 기록에 O(Open for use), F(Flown/used), E(Exchanged) 등의 크립틱 쿠폰 상태 코드를 게시한다.","relationship":"same"}],"relationships":[{"type":"related","targetTerm":"Flight Coupon","targetId":"flight-coupon"},{"type":"related","targetTerm":"E-ticket","targetId":"e-ticket"},{"type":"related","targetTerm":"Void","targetId":"void"},{"type":"related","targetTerm":"Reissue","targetId":"reissue"},{"type":"related","targetTerm":"Refund","targetId":"refund"},{"type":"related","targetTerm":"Open Ticket","targetId":"open-ticket"}],"distinctions":[{"targetTerm":"Flight Coupon","explanation":"The flight coupon is the segment-level portion of a ticket; coupon status is the state attribute attached to that coupon describing its position in the lifecycle.","explanation_ko":"Flight coupon은 항공권의 구간 단위 부분이고, coupon status는 그 쿠폰에 부여되어 생애주기상 위치를 기술하는 상태 속성이다.","targetId":"flight-coupon"},{"targetTerm":"Void","explanation":"Void is one specific coupon/ticket status (cancellation of issuance, typically same-day); coupon status is the broader set of all possible lifecycle states a coupon can hold.","explanation_ko":"Void는 특정한 하나의 쿠폰/항공권 상태(발행 취소, 보통 당일)이고, coupon status는 쿠폰이 가질 수 있는 모든 생애주기 상태의 더 넓은 집합이다.","targetId":"void"}],"sources":[{"org":"Amadeus","name":"How to understand e-ticket coupon status codes (Cryptic)","version":"","section":"","url":"https://servicehub.amadeus.com/c/portal/view-solution/879101/how-to-understand-e-ticket-coupon-status-codes-cryptic-"},{"org":"IATA","name":"Ticketing Handbook","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"8\" y=\"12\" width=\"32\" height=\"24\" rx=\"3\"/>\u003cpath d=\"M14 24l4 4 8-8\"/>\u003ccircle cx=\"32\" cy=\"24\" r=\"3\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"crs","term":"CRS","term_ko":"중앙 예약 시스템(CRS)","abbreviation":"CRS","aliases":["Central Reservation System","Central Reservations System","Hotel CRS"],"category":"hotel-dist","conceptType":"acronym","status":"active","definition":"A Central Reservation System is the hotel-side system that stores and distributes room inventory, rates, and availability across multiple channels and that captures and manages reservations centrally. It acts as the single source of truth for sellable inventory and rate plans pushed out to the brand website, GDS, OTAs, and other channels.","definition_ko":"중앙 예약 시스템(CRS)은 객실 인벤토리, 요금, 가용성을 여러 채널에 걸쳐 저장·분배하고 예약을 중앙에서 수집·관리하는 호텔 측 시스템이다. 브랜드 웹사이트, GDS, OTA 및 기타 채널로 송출되는 판매 가능 인벤토리와 요금제의 단일 진실 공급원(single source of truth) 역할을 한다.","longDef":"A hotel CRS centralizes ARI (availability, rates, inventory) for one or many properties and connects upstream to demand channels (brand.com booking engine, GDS, OTAs, metasearch) and downstream to property systems. It differs from a PMS, which runs the on-property operations; bookings typically flow CRS -> PMS for fulfillment. Distribution to many online channels is often handled together with or via a Channel Manager.","longDef_ko":"호텔 CRS는 하나 또는 여러 객실의 ARI(가용성, 요금, 인벤토리)를 중앙화하며, 상류로는 수요 채널(브랜드 닷컴 예약 엔진, GDS, OTA, 메타서치)과, 하류로는 자산 운영 시스템과 연결된다. 이는 현장 운영을 담당하는 PMS와 구별되며, 예약은 일반적으로 CRS에서 PMS로 흘러 이행(fulfillment)된다. 다수의 온라인 채널로의 분배는 흔히 채널 매니저(Channel Manager)와 함께 또는 이를 통해 처리된다.","standardBody":"","providerTerms":[],"relationships":[{"type":"related","targetTerm":"PMS","targetId":"pms"},{"type":"related","targetTerm":"Channel Manager","targetId":"channel-manager"},{"type":"related","targetTerm":"ARI","targetId":"ari"},{"type":"related","targetTerm":"GDS","targetId":"gds"},{"type":"related","targetTerm":"Rate Plan","targetId":"rate-plan"},{"type":"related","targetTerm":"Allotment","targetId":"allotment"}],"distinctions":[{"targetTerm":"PMS","explanation":"CRS manages distribution and central reservations; PMS manages on-property operations like check-in, folios, and housekeeping.","explanation_ko":"CRS는 분배와 중앙 예약을 관리하고, PMS는 체크인, 폴리오(folio), 하우스키핑 같은 현장 운영을 관리한다.","targetId":"pms"},{"targetTerm":"Channel Manager","explanation":"CRS is the central inventory/reservation hub; a Channel Manager is the connectivity layer that syncs ARI to many online channels (sometimes a CRS feature, sometimes a separate product).","explanation_ko":"CRS는 중앙 인벤토리/예약 허브이고, 채널 매니저는 ARI를 다수의 온라인 채널로 동기화하는 연결 계층이다(CRS의 기능일 때도 있고 별도 제품일 때도 있다).","targetId":"channel-manager"}],"sources":[{"name":"HTNG interface specifications","org":"HTNG","version":"","section":"","url":""},{"name":"OpenTravel Specification","org":"OpenTravel Alliance","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003ccircle cx=\"24\" cy=\"24\" r=\"6\"/>\u003ccircle cx=\"24\" cy=\"8\" r=\"3\"/>\u003ccircle cx=\"24\" cy=\"40\" r=\"3\"/>\u003ccircle cx=\"8\" cy=\"16\" r=\"3\"/>\u003ccircle cx=\"40\" cy=\"16\" r=\"3\"/>\u003ccircle cx=\"8\" cy=\"32\" r=\"3\"/>\u003ccircle cx=\"40\" cy=\"32\" r=\"3\"/>\u003cpath d=\"M24 11v7M24 30v7M11 17l8 4M37 17l-8 4M11 31l8-4M37 31l-8-4\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"customer-profile","term":"Customer Profile","term_ko":"고객 프로필","abbreviation":"","aliases":["Traveler Profile","Passenger Profile","Guest Profile","Profile"],"category":"customer","conceptType":"business-term","status":"active","definition":"A stored, reusable record of a traveler's identity data, contact details, documents, preferences and loyalty memberships maintained in a reservation, CRM or property management system. Profiles speed up booking and check-in by pre-populating data into a PNR or hotel reservation.","definition_ko":"예약, CRM 또는 PMS에 보관되는, 여행자의 신원 정보, 연락처, 서류, 선호도, 로열티 회원 정보를 담은 저장형 재사용 레코드이다. 프로필은 데이터를 PNR이나 호텔 예약에 미리 채워 넣어 예약과 체크인 속도를 높여 준다.","longDef":"Customer Profiles aggregate attributes such as name, date of birth, contact information, travel document and APIS/Secure Flight data, seat and meal preferences, frequent flyer numbers, payment instruments and corporate/agency associations. In airline systems they may be personal or corporate profiles; in hotels the equivalent is a guest profile in the PMS/CRS. Profiles are subject to data-protection obligations such as GDPR Consent and are increasingly linked to a verified digital identity (IATA One ID).","longDef_ko":"Customer Profile은 이름, 생년월일, 연락처, 여행 서류 및 APIS/Secure Flight 데이터, 좌석 및 기내식 선호도, 상용 고객 번호, 결제 수단, 법인/대행사 연계 정보 같은 속성을 통합한다. 항공사 시스템에서는 개인 프로필 또는 법인 프로필일 수 있으며, 호텔에서는 PMS/CRS의 게스트 프로필이 이에 해당한다. 프로필은 GDPR Consent 같은 데이터 보호 의무의 적용을 받으며, 점차 검증된 디지털 신원(IATA One ID)에 연결되고 있다.","standardBody":"","providerTerms":[],"relationships":[{"type":"related","targetTerm":"PNR","targetId":"pnr"},{"type":"related","targetTerm":"Frequent Flyer Number","targetId":"frequent-flyer-number"},{"type":"related","targetTerm":"GDPR Consent","targetId":"gdpr-consent"},{"type":"related","targetTerm":"IATA One ID","targetId":"iata-one-id"},{"type":"related","targetTerm":"PMS","targetId":"pms"}],"distinctions":[{"targetTerm":"PNR","explanation":"A Customer Profile is persistent traveler master data; a PNR is a single trip's reservation record that may be populated from a profile.","explanation_ko":"Customer Profile은 지속적으로 유지되는 여행자 마스터 데이터이고, PNR은 프로필로부터 채워질 수 있는 단일 여정의 예약 레코드이다.","targetId":"pnr"},{"targetTerm":"IATA One ID","explanation":"A Customer Profile is stored, self-asserted account data; One ID is a verified biometric digital identity used for authentication.","explanation_ko":"Customer Profile은 본인이 입력해 저장한 계정 데이터이고, One ID는 인증에 사용되는 검증된 생체 디지털 신원이다.","targetId":"iata-one-id"}],"sources":[{"name":"OpenTravel Specification (Profile messages)","org":"OpenTravel Alliance","version":"","section":"","url":""}],"lastReviewed":"2026-06-15","icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003ccircle cx=\"24\" cy=\"24\" r=\"18\"/>\u003ccircle cx=\"24\" cy=\"19\" r=\"6\"/>\u003cpath d=\"M13 38c0-6 5-10 11-10s11 4 11 10\"/>\u003c/svg>"},{"id":"direct-booking","term":"Direct Booking","abbreviation":"","aliases":["Direct Channel","Brand.com Booking","Direct Reservation"],"category":"hotel-dist","conceptType":"business-term","status":"active","definition":"A direct booking is a reservation made by the guest through the hotel's own channels — its website and booking engine, brand.com, mobile app, call center, or front desk — rather than through a third-party intermediary such as an OTA, GDS, or wholesaler. Direct bookings let the hotel own the guest relationship and data and typically avoid third-party commission.","longDef":"Direct booking is the counterpart to indirect (third-party) distribution. Its commercial appeal is a lower distribution cost and full ownership of guest data, enabling loyalty, personalization, and repeat marketing; OTA commissions of roughly 15–25% are replaced by direct acquisition costs (payment processing, booking-engine fees, paid marketing, parity monitoring), which can be low when efficient but rise toward OTA levels when fragmented. 'Direct booking strategy' refers to deliberate tactics — member rates, loyalty perks, best-rate guarantees, metasearch and paid-search investment — to shift share from OTAs to the direct channel. The direct channel depends operationally on a booking engine connected to the CRS/PMS for real-time availability and rates.","standardBody":"","term_ko":"다이렉트 부킹 (Direct Booking)","definition_ko":"다이렉트 부킹은 OTA·GDS·도매업체 같은 제3자 중개를 거치지 않고, 호텔 자체 채널(웹사이트와 booking engine, brand.com, 모바일 앱, 콜센터, 프런트 데스크)을 통해 투숙객이 직접 하는 예약이다. 다이렉트 부킹은 호텔이 고객 관계와 데이터를 직접 소유하게 하며 일반적으로 제3자 수수료를 피한다.","longDef_ko":"다이렉트 부킹은 간접(제3자) 유통의 대척점이다. 상업적 매력은 더 낮은 유통 비용과 고객 데이터의 완전한 소유로, 이는 로열티·개인화·재방문 마케팅을 가능하게 한다. 약 15~25%의 OTA 수수료가 직접 획득 비용(결제 처리, booking engine 수수료, 유료 마케팅, parity 모니터링)으로 대체되는데, 효율적으로 운영되면 낮지만 분산되면 OTA 수준까지 올라갈 수 있다. 'direct booking 전략'은 회원 요금, 로열티 혜택, 최저가 보장, 메타서치·유료검색 투자 등 OTA에서 직접 채널로 점유율을 이동시키려는 의도적 전술을 가리킨다. 직접 채널은 운영상 실시간 가용성·요금을 위해 CRS/PMS에 연결된 booking engine에 의존한다.","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Booking Engine","targetId":"booking-engine"},{"type":"related","targetTerm":"Distribution Cost","targetId":"distribution-cost"},{"type":"contrasts","targetTerm":"OTA (Online Travel Agency)","targetId":"ota-online-travel-agency"},{"type":"related","targetTerm":"Metasearch","targetId":"metasearch"},{"type":"related","targetTerm":"Frequent Flyer Program","targetId":"frequent-flyer-program"},{"type":"related","targetTerm":"Rate Parity","targetId":"rate-parity"}],"distinctions":[{"targetTerm":"OTA (Online Travel Agency)","explanation":"An OTA is a third-party intermediary that sells the hotel's rooms for a commission and typically owns the guest relationship; a direct booking is made through the hotel's own channels with no intermediary, keeping the guest data and avoiding commission.","explanation_ko":"OTA는 수수료를 받고 호텔 객실을 판매하며 보통 고객 관계를 소유하는 제3자 중개이고, 다이렉트 부킹은 중개 없이 호텔 자체 채널로 이뤄져 고객 데이터를 유지하고 수수료를 피한다.","targetId":"ota-online-travel-agency"},{"targetTerm":"Booking Engine","explanation":"The booking engine is the software tool that processes a direct online reservation; direct booking is the resulting transaction/channel concept, of which the booking engine is the primary enabler.","explanation_ko":"Booking engine은 온라인 직접 예약을 처리하는 소프트웨어 도구이고, 다이렉트 부킹은 그 결과로 발생하는 거래/채널 개념으로 booking engine이 이를 가능하게 하는 핵심 수단이다.","targetId":"booking-engine"}],"sources":[{"org":"RateGain","name":"Hotel Direct Booking vs OTA: Why the Best Strategy Uses Both","version":"","section":"","url":"https://rategain.com/blog/hotel-direct-booking-vs-ota/"},{"org":"Cloudbeds","name":"A Guide to OTA Commission Rates","version":"","section":"","url":"https://www.cloudbeds.com/online-travel-agencies/commissions/"}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003ccircle cx=\"12\" cy=\"24\" r=\"5\"/>\u003cpath d=\"M6 38c0-4 3-6 6-6s6 2 6 6\"/>\u003crect x=\"28\" y=\"12\" width=\"16\" height=\"24\" rx=\"2\"/>\u003cline x1=\"32\" y1=\"18\" x2=\"40\" y2=\"18\"/>\u003cline x1=\"32\" y1=\"24\" x2=\"40\" y2=\"24\"/>\u003cline x1=\"19\" y1=\"24\" x2=\"28\" y2=\"24\"/>\u003cpath d=\"M25 21l3 3-3 3\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"direct-connect","term":"Direct Connect","term_ko":"다이렉트 커넥트(직접 연결)","abbreviation":"","aliases":["Direct Connection","Airline Direct Connect","Supplier Direct Connect"],"category":"standards","conceptType":"business-term","status":"active","definition":"A Direct Connect is a dedicated API integration linking a buyer's booking platform (OTA, TMC, corporate tool, or agency system) directly to an airline's or other supplier's reservation system, bypassing or supplementing the GDS. It enables real-time access to the supplier's own content, often including NDC offers and ancillaries.","definition_ko":"다이렉트 커넥트(Direct Connect)는 구매자의 예약 플랫폼(OTA, TMC, 기업 출장 도구, 여행사 시스템)을 항공사 등 공급사의 예약 시스템에 직접 연결하는 전용 API 연동으로, GDS를 우회하거나 보완한다. 공급사 자체 콘텐츠(흔히 NDC 오퍼와 부가 서비스 포함)에 실시간으로 접근할 수 있게 한다.","longDef":"Direct Connects can be implemented over NDC-compliant APIs, proprietary supplier APIs, or even legacy ATPCO/EDIFACT interfaces. Airlines use them to reduce GDS distribution costs, control merchandising, and personalize offers, while large corporate accounts and aggregators use them for richer or differentiated content. Maintaining many point-to-point Direct Connects is integration-heavy, which is why aggregators and GDS NDC programs exist to consolidate them.","longDef_ko":"다이렉트 커넥트는 NDC 호환 API, 공급사 자체 API, 또는 레거시 ATPCO/EDIFACT 인터페이스로도 구현될 수 있다. 항공사는 이를 통해 GDS 유통 비용을 줄이고 머천다이징을 통제하며 오퍼를 개인화하고, 대형 기업 계정과 애그리게이터는 더 풍부하거나 차별화된 콘텐츠를 얻기 위해 사용한다. 다수의 일대일 다이렉트 커넥트를 유지하는 것은 연동 부담이 크므로, 이를 통합하기 위해 애그리게이터와 GDS의 NDC 프로그램이 존재한다.","standardBody":"","providerTerms":[],"relationships":[{"type":"related","targetTerm":"NDC","targetId":"ndc"},{"type":"related","targetTerm":"GDS","targetId":"gds"},{"type":"related","targetTerm":"Aggregator","targetId":"aggregator"},{"type":"related","targetTerm":"REST API","targetId":"rest-api"},{"type":"related","targetTerm":"OTA (Online Travel Agency)","targetId":"ota-online-travel-agency"}],"distinctions":[{"targetTerm":"GDS","explanation":"A Direct Connect is a point-to-point link straight to one supplier; a GDS is a shared intermediary aggregating many suppliers for many sellers.","explanation_ko":"다이렉트 커넥트는 한 공급사로 직접 이어지는 일대일 연결이고, GDS는 여러 공급사를 여러 판매자에게 통합해 주는 공용 중개자이다.","targetId":"gds"},{"targetTerm":"Aggregator","explanation":"A Direct Connect is the seller's own integration to a single supplier; an aggregator offers one connection that consolidates many suppliers' direct connects on the seller's behalf.","explanation_ko":"다이렉트 커넥트는 판매자가 단일 공급사와 직접 맺는 연동이고, 애그리게이터는 여러 공급사의 직접 연결을 판매자 대신 하나로 통합해 제공한다.","targetId":"aggregator"},{"targetTerm":"NDC","explanation":"Direct Connect is a distribution arrangement (who connects to whom); NDC is a messaging standard that a Direct Connect may (but need not) use.","explanation_ko":"다이렉트 커넥트는 누가 누구와 연결되는지에 관한 유통 방식이고, NDC는 다이렉트 커넥트가 사용할 수도(반드시는 아님) 있는 메시징 표준이다.","targetId":"ndc"}],"sources":[{"org":"IATA","name":"Airline Distribution / NDC overview","version":"","section":"","url":""},{"org":"Industry usage","name":"Direct connect (travel distribution definition)","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"4\" y=\"18\" width=\"12\" height=\"12\" rx=\"2\"/>\u003crect x=\"32\" y=\"18\" width=\"12\" height=\"12\" rx=\"2\"/>\u003cline x1=\"16\" y1=\"24\" x2=\"32\" y2=\"24\"/>\u003ccircle cx=\"24\" cy=\"24\" r=\"2.5\" fill=\"currentColor\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"distribution-cost","term":"Distribution Cost","abbreviation":"","aliases":["Cost of Distribution","Net Cost of Distribution","Channel Cost","Customer Acquisition Cost"],"category":"hotel-dist","conceptType":"metric","status":"active","definition":"Distribution cost is the total cost a hotel incurs to acquire a booking through a given channel, expressed as an amount or as a percentage of room revenue. It includes OTA/agency commissions, GDS and switch fees, channel-manager and booking-engine fees, payment-processing and merchant fees, and channel marketing, and underpins channel-profitability comparison.","longDef":"Distribution cost reframes channel choice around net contribution rather than headline rate. Indirect channels carry visible commissions — OTA commissions commonly 15–25% — but the 'true' or net cost also includes harder-to-see items: preferred-placement and visibility fees, higher cancellation/no-show rates that reduce realized revenue, and loss of guest data and lifetime value; effective OTA cost can therefore run materially above the stated commission. The direct channel substitutes commission with acquisition costs (payment processing, booking-engine and channel-manager fees, paid search/metasearch, parity monitoring), which can be low when efficient. Comparing distribution cost per channel (and net ADR/RevPAR after distribution cost) drives channel-mix optimization. Related industry metrics include cost of customer acquisition and net revenue per available room after distribution cost.","standardBody":"","term_ko":"유통 비용 (Distribution Cost)","definition_ko":"유통 비용은 특정 채널을 통해 예약을 획득하기 위해 호텔이 부담하는 총비용으로, 금액 또는 객실 매출 대비 비율로 표현한다. OTA/대리점 수수료, GDS·스위치 수수료, 채널 매니저·booking engine 수수료, 결제 처리·머천트 수수료, 채널 마케팅을 포함하며, 채널 수익성 비교의 기반이 된다.","longDef_ko":"유통 비용은 채널 선택을 표면 요금이 아닌 순기여(net contribution) 관점에서 재구성한다. 간접 채널에는 눈에 보이는 수수료(흔히 OTA 수수료 15~25%)가 따르지만, '실질' 또는 net 비용에는 잘 보이지 않는 항목도 포함된다. 우선 노출·가시성 수수료, 실현 매출을 낮추는 더 높은 취소·노쇼율, 고객 데이터와 생애가치(LTV) 상실 등이다. 따라서 OTA의 실효 비용은 명목 수수료를 상당히 웃돌 수 있다. 직접 채널은 수수료를 획득 비용(결제 처리, booking engine·채널 매니저 수수료, 유료검색·메타서치, parity 모니터링)으로 대체하며, 효율적으로 운영되면 낮을 수 있다. 채널별 유통 비용(및 유통 비용 차감 후 net ADR/RevPAR)을 비교하면 채널 믹스 최적화가 가능하다. 관련 산업 지표로 고객 획득 비용과 유통 비용 차감 후 가용 객실당 순매출이 있다.","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Commissionable Rate","targetId":"commissionable-rate"},{"type":"related","targetTerm":"Net Rate","targetId":"net-rate"},{"type":"related","targetTerm":"Direct Booking","targetId":"direct-booking"},{"type":"related","targetTerm":"OTA (Online Travel Agency)","targetId":"ota-online-travel-agency"},{"type":"related","targetTerm":"RevPAR","targetId":"revpar"},{"type":"related","targetTerm":"GDS","targetId":"gds"}],"distinctions":[{"targetTerm":"Commissionable Rate","explanation":"A commissionable rate is the specific rate type on which a fixed agency commission is paid; distribution cost is the broader total-cost metric aggregating commissions plus all other channel fees and indirect costs.","explanation_ko":"Commissionable rate는 고정 대리점 수수료가 지급되는 특정 요금 유형이고, 유통 비용은 수수료에 더해 모든 기타 채널 수수료와 간접 비용까지 합산한 더 넓은 총비용 지표다.","targetId":"commissionable-rate"}],"sources":[{"org":"Cloudbeds","name":"A Guide to OTA Commission Rates","version":"","section":"","url":"https://www.cloudbeds.com/online-travel-agencies/commissions/"},{"org":"Hospitality Net","name":"The independent hotelier's playbook for reducing OTA commission","version":"","section":"","url":"https://www.hospitalitynet.org/explainer/4132193/the-independent-hoteliers-playbook-for-reducing-ota-commission"}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003ccircle cx=\"24\" cy=\"24\" r=\"16\"/>\u003cpath d=\"M28 18c-1.5-2-9-2.5-9 1.5 0 4 9 2.5 9 6.5 0 4-7.5 3.5-9 1.5\"/>\u003cline x1=\"24\" y1=\"13\" x2=\"24\" y2=\"16\"/>\u003cline x1=\"24\" y1=\"32\" x2=\"24\" y2=\"35\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"dynamic-packaging","term":"Dynamic Packaging","term_ko":"다이내믹 패키징(동적 여행 묶음)","abbreviation":"","aliases":["Dynamic Package","Dynamic Bundling","Build-Your-Own-Package"],"category":"standards","conceptType":"business-term","status":"active","definition":"Dynamic packaging is the real-time assembly of individual travel components (such as flights, accommodation, car rental, and activities) into a single customized package at the moment of booking, presented and sold at one combined price. Prices and availability are drawn live from supplier inventory rather than from pre-built tour products.","definition_ko":"다이내믹 패키징(dynamic packaging)은 항공편, 숙박, 렌터카, 액티비티 등 개별 여행 구성요소를 예약 시점에 실시간으로 하나의 맞춤 패키지로 조합하여 하나의 합산 가격으로 제시·판매하는 것이다. 가격과 가용성은 미리 만들어 둔 패키지 상품이 아니라 공급사 재고에서 실시간으로 가져온다.","longDef":"A booking engine calls multiple supplier APIs simultaneously, retrieving live component prices and combining them, often into an opaque single price that hides individual fares; this lets sellers discount bundles without disturbing published rates. Dynamic packaging underpins much modern OTA and tour-operator retailing and depends on aggregated, real-time content from GDSs, bedbanks, and direct/NDC connections. Regulatory regimes (e.g. the EU Package Travel Directive) may treat such combinations as packages with associated consumer protections.","longDef_ko":"예약 엔진은 여러 공급사 API를 동시에 호출하여 실시간 구성요소 가격을 가져와 조합하며, 흔히 개별 운임을 감추는 불투명(opaque) 단일 가격으로 묶는다. 이를 통해 판매자는 공시 요금을 흔들지 않고 묶음 상품을 할인할 수 있다. 다이내믹 패키징은 현대 OTA와 투어 오퍼레이터 리테일링의 상당 부분을 떠받치며, GDS·베드뱅크·직접/NDC 연결에서 오는 통합된 실시간 콘텐츠에 의존한다. 일부 규제(예: EU 패키지여행 지침)는 이러한 조합을 소비자 보호가 따르는 패키지로 취급할 수 있다.","standardBody":"","providerTerms":[],"relationships":[{"type":"related","targetTerm":"OTA (Online Travel Agency)","targetId":"ota-online-travel-agency"},{"type":"related","targetTerm":"Aggregator","targetId":"aggregator"},{"type":"related","targetTerm":"Bedbank","targetId":"bedbank"},{"type":"related","targetTerm":"Availability","targetId":"availability"},{"type":"related","targetTerm":"Net Rate","targetId":"net-rate"}],"distinctions":[{"targetTerm":"Offer","explanation":"Dynamic packaging is a retailing technique of bundling multiple suppliers' components at one price; an NDC Offer is a single airline's standardized priced proposal that may itself include a bundle of that airline's products.","explanation_ko":"다이내믹 패키징은 여러 공급사의 구성요소를 하나의 가격으로 묶는 리테일링 기법이고, NDC 오퍼는 한 항공사의 표준화된 가격 제안으로 그 항공사의 상품 묶음을 포함할 수 있다.","targetId":"offer"},{"targetTerm":"Aggregator","explanation":"An aggregator supplies the consolidated multi-supplier content; dynamic packaging is what a seller does with that content to build and price a combined trip.","explanation_ko":"애그리게이터는 여러 공급사의 통합 콘텐츠를 공급하고, 다이내믹 패키징은 판매자가 그 콘텐츠로 결합된 여정을 구성하고 가격을 매기는 행위이다.","targetId":"aggregator"}],"sources":[{"org":"Industry usage","name":"Dynamic packaging (travel distribution definition)","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"16\" y=\"22\" width=\"16\" height=\"16\" rx=\"2\"/>\u003cpath d=\"M16 27h16\"/>\u003cpath d=\"M24 22v16\"/>\u003cpath d=\"M9 10l5 6\"/>\u003cpath d=\"M39 10l-5 6\"/>\u003ccircle cx=\"7\" cy=\"8\" r=\"2.5\"/>\u003ccircle cx=\"41\" cy=\"8\" r=\"2.5\"/>\u003cpath d=\"M24 4v12\"/>\u003ccircle cx=\"24\" cy=\"4\" r=\"1.5\" fill=\"currentColor\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"e-ticket","term":"E-ticket","term_ko":"전자항공권 (E-ticket)","abbreviation":"ET","aliases":["Electronic Ticket","ETKT","Electronic Ticketing"],"category":"air-ticket","conceptType":"document","status":"active","definition":"An electronic record of a passenger's transportation entitlement held in the issuing/validating carrier's (or BSP) database, identified by a 13-digit ticket number, that replaces the traditional paper ticket. IATA mandated 100% electronic ticketing for BSP-issued air transport documents from 1 June 2008.","definition_ko":"발권/Validating Carrier(또는 BSP)의 데이터베이스에 보관되는 승객의 운송 권리에 대한 전자 기록으로, 13자리 항공권 번호로 식별되며 기존의 종이 항공권을 대체한다. IATA는 2008년 6월 1일부터 BSP 발권 항공운송 서류에 대해 100% 전자 발권을 의무화했다.","longDef":"An e-ticket comprises ticket-level data (passenger name, fare calculation, form of payment, endorsements/restrictions) plus one or more flight coupons, each tied to a flight segment with its own coupon status (e.g., OPEN FOR USE, AIRPORT CONTROL/CHECKED IN, FLOWN/USED, REFUNDED, VOID, EXCHANGED). The 13-digit number consists of a 3-digit airline accounting code (e.g., 006 for Delta), a form/serial portion, and a check digit. The e-ticket is the standard document for carriage of passengers; EMDs are the analogous electronic document for ancillary and non-flight charges.","longDef_ko":"전자항공권은 항공권 단위 데이터(승객명, 운임 계산, 지불 수단, 배서/제한 사항)와 하나 이상의 Flight Coupon으로 구성되며, 각 쿠폰은 특정 비행 구간에 연결되어 고유한 쿠폰 상태(예: OPEN FOR USE, AIRPORT CONTROL/CHECKED IN, FLOWN/USED, REFUNDED, VOID, EXCHANGED)를 가진다. 13자리 번호는 3자리 항공사 회계 코드(예: 델타항공의 경우 006), 폼/일련번호 부분, 그리고 체크 디지트로 구성된다. 전자항공권은 승객 운송을 위한 표준 서류이며, EMD는 부가 서비스 및 비항공 요금에 대응하는 전자 서류이다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"parent","targetTerm":"Flight Coupon","targetId":"flight-coupon"},{"type":"related","targetTerm":"EMD","targetId":"emd"},{"type":"related","targetTerm":"Validating Carrier","targetId":"validating-carrier"},{"type":"related","targetTerm":"BSP","targetId":"bsp"},{"type":"related","targetTerm":"PNR","targetId":"pnr"}],"distinctions":[{"targetTerm":"EMD","explanation":"E-ticket documents flight transportation; EMD documents ancillary services, fees, and non-air charges.","explanation_ko":"전자항공권은 항공 운송을 증빙하고, EMD는 부가 서비스, 수수료 및 비항공 요금을 증빙한다.","targetId":"emd"},{"targetTerm":"PNR","explanation":"PNR is the reservation record; the e-ticket is the issued transport document that fulfills it.","explanation_ko":"PNR은 예약 기록이며, 전자항공권은 이를 이행하기 위해 발권된 운송 서류이다.","targetId":"pnr"},{"targetTerm":"Flight Coupon","explanation":"A flight coupon is one redeemable component within an e-ticket; a single e-ticket may hold up to four coupons.","explanation_ko":"Flight Coupon은 전자항공권 내에서 사용 가능한 하나의 구성 요소이며, 단일 전자항공권은 최대 4개의 쿠폰을 보유할 수 있다.","targetId":"flight-coupon"}],"sources":[{"name":"Electronic Ticketing","org":"IATA","version":"","section":"","url":""},{"name":"Passenger Services Conference Resolutions Manual (PSCRM)","org":"IATA","version":"","section":"","url":""}],"lastReviewed":"2026-06-15","icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"6\" y=\"14\" width=\"36\" height=\"20\" rx=\"3\"/>\u003cpath d=\"M22 14v20\"/>\u003cpath d=\"M22 19v2M22 25v2M22 31v0\"/>\u003cpath d=\"M28 21h8M28 27h6\"/>\u003cpath d=\"M11 24h6\"/>\u003c/svg>"},{"id":"edifact","term":"EDIFACT","term_ko":"EDIFACT(전자 데이터 교환 표준)","abbreviation":"EDIFACT","aliases":["UN/EDIFACT","Electronic Data Interchange for Administration, Commerce and Transport","PADIS EDIFACT"],"category":"standards","conceptType":"standard","status":"active","definition":"EDIFACT (Electronic Data Interchange for Administration, Commerce and Transport) is a United Nations-developed international standard for structured, machine-to-machine electronic data interchange. In air travel its IATA profile (PADIS) is the long-standing messaging format used between airline Passenger Service Systems and GDSs for availability, booking, fares, and ticketing.","definition_ko":"EDIFACT(Electronic Data Interchange for Administration, Commerce and Transport)는 구조화된 기계 대 기계 전자 데이터 교환을 위해 UN이 개발한 국제 표준이다. 항공 여행에서는 그 IATA 프로파일인 PADIS가 항공사 여객 서비스 시스템(PSS)과 GDS 사이에서 가용성, 예약, 운임, 발권 정보를 주고받는 데 오랫동안 쓰여 온 메시징 형식이다.","longDef":"Developed under the UN in the 1980s for an era of expensive, low-bandwidth links, EDIFACT uses a compact, segment- and element-based text syntax. IATA maintains the air-industry application as PADIS (Passenger and Airport Data Interchange Standards), which exists in both EDIFACT and XML syntaxes. Classic GDS distribution and most full-service-carrier PSS integrations still rely heavily on EDIFACT, which IATA's NDC and the broader move to XML/JSON REST APIs increasingly supplement rather than fully replace.","longDef_ko":"EDIFACT는 회선 비용이 비싸고 대역폭이 낮던 시대를 위해 1980년대 UN 주도로 개발되었으며, 세그먼트와 요소 기반의 간결한 텍스트 구문을 사용한다. IATA는 항공 산업용 적용으로 PADIS(Passenger and Airport Data Interchange Standards)를 유지하며, 이는 EDIFACT와 XML 두 구문으로 존재한다. 전통적인 GDS 유통과 대부분의 풀서비스 항공사 PSS 연동은 여전히 EDIFACT에 크게 의존하며, IATA의 NDC와 XML/JSON REST API로의 전반적 전환이 이를 완전히 대체하기보다 점차 보완하고 있다.","standardBody":"UN/CEFACT; IATA (PADIS profile)","providerTerms":[],"relationships":[{"type":"related","targetTerm":"GDS","targetId":"gds"},{"type":"contrasts","targetTerm":"NDC","targetId":"ndc"},{"type":"contrasts","targetTerm":"REST API","targetId":"rest-api"},{"type":"related","targetTerm":"PNR","targetId":"pnr"},{"type":"related","targetTerm":"Availability","targetId":"availability"}],"distinctions":[{"targetTerm":"NDC","explanation":"EDIFACT is the legacy compact-text EDI standard underpinning classic GDS/PSS messaging; NDC is IATA's modern XML (increasingly JSON/REST) standard designed to express rich, personalized offers EDIFACT cannot fully convey.","explanation_ko":"EDIFACT는 기존 GDS/PSS 메시징을 떠받치는 레거시 압축 텍스트 EDI 표준이고, NDC는 EDIFACT로는 충분히 표현할 수 없는 풍부하고 개인화된 오퍼를 담기 위해 설계된 IATA의 현대적 XML(점차 JSON/REST) 표준이다.","targetId":"ndc"},{"targetTerm":"REST API","explanation":"EDIFACT is a batch/message-oriented EDI syntax over legacy transports; a REST API is a modern web-service style using HTTP with JSON/XML payloads.","explanation_ko":"EDIFACT는 레거시 전송 위에서 동작하는 배치/메시지 지향 EDI 구문이고, REST API는 HTTP와 JSON/XML 페이로드를 사용하는 현대적 웹 서비스 방식이다.","targetId":"rest-api"}],"sources":[{"org":"UN/CEFACT","name":"UN/EDIFACT standard","version":"","section":"","url":""},{"org":"IATA","name":"Passenger and Airport Data Interchange Standards (PADIS)","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"4\" y=\"10\" width=\"14\" height=\"28\" rx=\"2\"/>\u003crect x=\"30\" y=\"10\" width=\"14\" height=\"28\" rx=\"2\"/>\u003cline x1=\"18\" y1=\"18\" x2=\"30\" y2=\"18\"/>\u003cline x1=\"18\" y1=\"24\" x2=\"30\" y2=\"24\"/>\u003cline x1=\"18\" y1=\"30\" x2=\"30\" y2=\"30\"/>\u003cpath d=\"M26 21l4 3-4 3\"/>\u003cline x1=\"8\" y1=\"16\" x2=\"14\" y2=\"16\"/>\u003cline x1=\"8\" y1=\"22\" x2=\"14\" y2=\"22\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"emd","term":"EMD","term_ko":"전자 기타 서류 (EMD)","abbreviation":"EMD","aliases":["Electronic Miscellaneous Document","EMD-A","EMD-S"],"category":"air-ticket","conceptType":"document","status":"active","definition":"An IATA-standard electronic document used to issue, account for, and settle ancillary services, fees, and other non-flight charges (e.g., baggage, seats, change/service fees, deposits). It replaced legacy paper documents such as the MCO (Miscellaneous Charges Order) and Excess Baggage Ticket.","definition_ko":"부가 서비스, 수수료 및 기타 비항공 요금(예: 수하물, 좌석, 변경/서비스 수수료, 예치금)을 발행, 회계 처리 및 정산하는 데 사용되는 IATA 표준 전자 서류이다. MCO(Miscellaneous Charges Order, 기타 요금 청구서)와 초과 수하물 항공권 같은 기존 종이 서류를 대체했다.","longDef":"There are two principal types: EMD-A (Associated), which is linked to one or more flight coupons of an e-ticket and typically issued for services tied to a specific flight (e.g., a paid seat or extra bag); and EMD-S (Standalone), which is not tied to a flight coupon and is used for residual value, deposits, or services not bound to a segment. Like e-tickets, EMDs carry a 13-digit document number with the airline's accounting code and have coupon statuses. EMD adoption is a prerequisite for fully automated ancillary service distribution and settlement through BSP/ARC.","longDef_ko":"두 가지 주요 유형이 있다. EMD-A(Associated)는 전자항공권의 하나 이상의 Flight Coupon에 연결되며 일반적으로 특정 항공편에 묶인 서비스(예: 유료 좌석 또는 추가 수하물)에 대해 발행된다. EMD-S(Standalone)는 Flight Coupon에 연결되지 않으며 잔여 가치, 예치금 또는 특정 구간에 묶이지 않은 서비스에 사용된다. 전자항공권과 마찬가지로 EMD는 항공사 회계 코드를 포함한 13자리 서류 번호를 가지며 쿠폰 상태를 보유한다. EMD 도입은 BSP/ARC를 통한 부가 서비스 유통 및 정산의 완전 자동화를 위한 전제 조건이다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"E-ticket","targetId":"e-ticket"},{"type":"related","targetTerm":"Ancillary Service","targetId":"ancillary-service"},{"type":"related","targetTerm":"BSP","targetId":"bsp"},{"type":"related","targetTerm":"Refund","targetId":"refund"}],"distinctions":[{"targetTerm":"E-ticket","explanation":"E-ticket documents flight carriage; EMD documents ancillary/non-flight charges and fees.","explanation_ko":"전자항공권은 항공 운송을 증빙하고, EMD는 부가/비항공 요금 및 수수료를 증빙한다.","targetId":"e-ticket"},{"targetTerm":"Ancillary Service","explanation":"Ancillary Service is the product sold (e.g., a paid bag); the EMD is the document that fulfills and settles it.","explanation_ko":"Ancillary Service는 판매되는 상품(예: 유료 수하물)이며, EMD는 이를 이행하고 정산하는 서류이다.","targetId":"ancillary-service"}],"sources":[{"name":"Electronic Miscellaneous Document (EMD)","org":"IATA","version":"","section":"","url":""},{"name":"Passenger Services Conference Resolutions Manual (PSCRM)","org":"IATA","version":"","section":"","url":""}],"lastReviewed":"2026-06-15","icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"8\" y=\"10\" width=\"32\" height=\"28\" rx=\"3\"/>\u003cpath d=\"M8 18h32\"/>\u003cpath d=\"M14 25h8M14 30h12\"/>\u003ccircle cx=\"31\" cy=\"29\" r=\"4\"/>\u003cpath d=\"M31 27v4M29.5 28.5h3\"/>\u003c/svg>"},{"id":"exchange","term":"Exchange","abbreviation":"","aliases":["Ticket Exchange","Exchange/Reissue"],"category":"air-ticket","conceptType":"process","status":"active","definition":"An exchange is the process of surrendering an existing ticket (or EMD) and applying its value toward a new ticket that reflects a changed itinerary, fare, cabin, or routing, with any fare difference, taxes, and penalties collected or refunded as applicable. In GDS and BSP/ARC workflows the exchange is the financial and document transaction that drives a reissue.","longDef":"An exchange uses the value of one or more original documents as full or partial payment for a newly issued document. It is required when the change goes beyond a simple revalidation (date/flight/time only) — for example a change of routing, origin/destination, cabin, or fare basis — because such changes invoke a new fare calculation. The exchange transaction determines the additional collection (ADC) when the new ticket is more expensive, or produces a residual value (refundable or forfeited per fare rules) when it is cheaper, plus any applicable change penalty and tax differences. In practice 'exchange' and 'reissue' are used together (often 'exchange/reissue'): the exchange is the value-and-payment side of the transaction and the reissue is the production of the replacement document.","standardBody":"IATA","term_ko":"Exchange (항공권 교환)","definition_ko":"Exchange(교환)는 기존 항공권(또는 EMD)을 반납하고 그 가치를 변경된 여정·운임·좌석 등급·여정 경로가 반영된 새 항공권에 적용하는 절차이며, 운임 차액·세금·위약금을 상황에 따라 추가 징수하거나 환불한다. GDS 및 BSP/ARC 흐름에서 교환은 재발행(reissue)을 유발하는 재무·서류 거래이다.","longDef_ko":"Exchange는 하나 이상의 원본 서류의 가치를 새로 발행되는 서류의 전부 또는 일부 결제 수단으로 사용한다. 단순 revalidation(날짜·항공편·시간만 변경)을 넘어서는 변경(여정 경로, 출발·도착지, 좌석 등급, fare basis 변경 등)에서 필요하며, 이러한 변경은 새로운 운임 계산을 유발하기 때문이다. 교환 거래는 새 항공권이 더 비쌀 때의 추가 징수액(ADC, Additional Collection)을 결정하거나, 더 쌀 때는 잔여 가치(residual value, 운임 규정에 따라 환불 또는 소멸)를 산출하며, 적용되는 변경 위약금과 세금 차액도 처리한다. 실무에서 'exchange'와 'reissue'는 흔히 함께('exchange/reissue') 쓰인다. 교환은 거래의 가치·결제 측면이고, 재발행은 대체 서류의 생성 측면이다.","providerTerms":[{"provider":"Travelport","term":"Exchange","context":"Travelport's Exchange, Refund, and Void guide treats exchange as the transaction that applies the value of an existing ticket toward a reissued ticket.","context_ko":"Travelport의 Exchange/Refund/Void 가이드는 교환을 기존 항공권의 가치를 재발행 항공권에 적용하는 거래로 다룬다.","relationship":"same"}],"relationships":[{"type":"related","targetTerm":"Reissue","targetId":"reissue"},{"type":"related","targetTerm":"Residual Value","targetId":"residual-value"},{"type":"related","targetTerm":"Penalty Fee","targetId":"penalty-fee"},{"type":"related","targetTerm":"EMD","targetId":"emd"},{"type":"related","targetTerm":"Refund","targetId":"refund"},{"type":"related","targetTerm":"Fare Component","targetId":"fare-component"}],"distinctions":[{"targetTerm":"Reissue","explanation":"Exchange is the value/payment transaction (surrendering old value, collecting difference or generating residual); reissue is the issuance of the replacement document. They typically occur together, but a reissue can also follow an involuntary change without a passenger-initiated exchange.","explanation_ko":"Exchange는 가치·결제 거래(기존 가치 반납, 차액 징수 또는 잔여 가치 발생)이고, reissue는 대체 서류의 발행이다. 보통 함께 일어나지만, 재발행은 승객이 시작하지 않은 비자발적 변경에 따라 이루어질 수도 있다.","targetId":"reissue"},{"targetTerm":"Refund","explanation":"An exchange applies the document's value to a new document; a refund returns the value (less penalties) as money to the form of payment. An exchange may produce a residual value that is then either refunded or forfeited.","explanation_ko":"Exchange는 서류 가치를 새 서류에 적용하지만, Refund는 가치를(위약금 제외) 결제 수단으로 돌려준다. 교환은 잔여 가치를 발생시킬 수 있으며, 이는 이후 환불되거나 소멸된다.","targetId":"refund"}],"sources":[{"org":"IATA","name":"Ticketing Handbook","version":"","section":"","url":""},{"org":"Travelport","name":"Exchange, Refund, and Void Guide","version":"","section":"","url":"https://support.travelport.com/webhelp/JSONAPIs/Airv11/Content/Air11/General/ExchangeRefundGuide.htm"}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M12 17h20\"/>\u003cpath d=\"M27 12l5 5-5 5\"/>\u003cpath d=\"M36 31H16\"/>\u003cpath d=\"M21 26l-5 5 5 5\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"fare-basis-code","term":"Fare Basis Code","term_ko":"운임 기준 코드","abbreviation":"","aliases":["Fare Basis","FBC"],"category":"air-shop","conceptType":"code","status":"active","definition":"A fare basis code is an alphanumeric string that uniquely identifies a specific fare and its associated rules within a market. It typically begins with the booking class (RBD) letter and may include further characters encoding season, days of the week, fare type, passenger type, and other conditions.","definition_ko":"운임 기준 코드(fare basis code)는 특정 시장 내에서 개별 운임과 그에 연계된 규정을 고유하게 식별하는 영숫자 문자열이다. 일반적으로 예약 등급(RBD) 문자로 시작하며, 시즌, 요일, 운임 유형, 승객 유형 및 기타 조건을 인코딩하는 추가 문자를 포함할 수 있다.","longDef":"The fare basis code is the human-readable key that ties a priced fare to its filed fare and rule record. Its first character is normally the prime booking code (RBD), followed by qualifiers such as fare type letters, ticket designators (after a slash), season indicators, and day/time codes (for example YLXAP, BHE7, QW14). The same RBD can carry many distinct fare basis codes representing different fares and conditions. Fare basis codes are filed by carriers, distributed through ATPCO, and printed on the fare-construction portion of tickets.","longDef_ko":"운임 기준 코드는 산출된 운임을 항공사가 신고한 운임 및 규정 레코드와 연결하는, 사람이 읽을 수 있는 키이다. 첫 글자는 보통 주요 예약 코드(RBD)이며, 그 뒤에 운임 유형 문자, 항공권 지정자(슬래시 이후), 시즌 표시자, 요일/시간 코드 등의 한정자가 따라온다(예: YLXAP, BHE7, QW14). 동일한 RBD라도 서로 다른 운임과 조건을 나타내는 여러 운임 기준 코드를 가질 수 있다. 운임 기준 코드는 항공사가 신고하고 ATPCO를 통해 배포되며, 항공권의 운임 산출(fare construction) 부분에 인쇄된다.","standardBody":"ATPCO","providerTerms":[{"provider":"ATPCO","term":"Fare Class Code / Fare Basis","context":"ATPCO fares records carry the fare class and rules that produce the fare basis.","context_ko":"ATPCO의 운임 레코드는 운임 기준을 생성하는 운임 등급(fare class)과 규정을 담고 있다.","relationship":"same"}],"relationships":[{"type":"related","targetTerm":"RBD","targetId":"rbd"},{"type":"related","targetTerm":"Fare Component","targetId":"fare-component"},{"type":"related","targetTerm":"Fare Family","targetId":"fare-family"},{"type":"related","targetTerm":"ATPCO","targetId":"atpco"},{"type":"related","targetTerm":"Passenger Type Code","targetId":"passenger-type-code"}],"distinctions":[{"targetTerm":"RBD","explanation":"The RBD is a single booking-class letter; the fare basis code is the full alphanumeric fare identifier that usually starts with that letter.","explanation_ko":"RBD는 한 글자의 예약 등급 문자이고, 운임 기준 코드는 보통 그 문자로 시작하는 전체 영숫자 운임 식별자이다.","targetId":"rbd"},{"targetTerm":"Fare Family","explanation":"A fare basis identifies one specific filed fare; a fare family is a marketing bundle that may span multiple fare basis codes.","explanation_ko":"운임 기준은 신고된 하나의 특정 운임을 식별하고, 운임 패밀리(fare family)는 여러 운임 기준 코드에 걸칠 수 있는 마케팅 묶음이다.","targetId":"fare-family"}],"sources":[{"name":"ATPCO Fares and Rules data documentation","org":"ATPCO","version":"","section":"","url":""},{"name":"IATA Ticketing Handbook / fare construction","org":"IATA","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M23 7H10a3 3 0 00-3 3v13a3 3 0 00.9 2.1l15 15a3 3 0 004.2 0l11-11a3 3 0 000-4.2l-15-15A3 3 0 0023 7z\"/>\u003ccircle cx=\"16\" cy=\"16\" r=\"2.5\"/>\u003cline x1=\"21\" y1=\"27\" x2=\"27\" y2=\"33\"/>\u003cline x1=\"26\" y1=\"22\" x2=\"32\" y2=\"28\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"fare-component","term":"Fare Component","term_ko":"운임 컴포넌트","abbreviation":"","aliases":["Pricing Unit Component"],"category":"air-shop","conceptType":"business-term","status":"active","definition":"A fare component is the portion of an itinerary covered by a single fare, running from one fare-break point to the next and governed by one fare basis and its rules. Fare components are the building blocks summed during fare construction to build the total price of a journey.","definition_ko":"운임 컴포넌트(fare component)는 하나의 운임이 적용되는 여정의 구간으로, 한 운임 분기점(fare-break point)에서 다음 분기점까지 이어지며 하나의 운임 기준과 그 규정의 적용을 받는다. 운임 컴포넌트는 운임 산정 과정에서 합산되어 여정 총액을 구성하는 기본 단위이다.","longDef":"In fare construction, an itinerary is divided at fare-break points into fare components, each defined over an O&D and carrying one fare basis code, one set of fare rules, and (for international) one NUC amount. Multiple fare components are grouped into pricing units (such as round-trip or circle-trip pricing units) where rules like minimum stay, combinability, and through-fare checks apply. Each fare component may itself span several flight segments when no fare break occurs between them.","longDef_ko":"운임 산정에서 여정은 운임 분기점을 기준으로 운임 컴포넌트로 분할되며, 각 컴포넌트는 하나의 O&D로 정의되고 하나의 운임 기준 코드, 하나의 운임 규정 집합, 그리고 (국제선의 경우) 하나의 NUC 금액을 갖는다. 여러 운임 컴포넌트는 가격 산정 단위(pricing unit, 예: 왕복 또는 일주 여행 가격 산정 단위)로 묶이며, 여기서 최소 체류 기간, 결합 가능성(combinability), 통과 운임(through-fare) 검증과 같은 규정이 적용된다. 각 운임 컴포넌트는 그 사이에 운임 분기가 발생하지 않는 경우 여러 비행 세그먼트에 걸칠 수 있다.","standardBody":"IATA","providerTerms":[{"provider":"ATPCO","term":"Fare Component (in fare construction)","context":"ATPCO rules apply at the fare-component level during automated pricing.","context_ko":"ATPCO 규정은 자동 운임 산정 과정에서 운임 컴포넌트 단위로 적용된다.","relationship":"same"}],"relationships":[{"type":"related","targetTerm":"Fare Basis Code","targetId":"fare-basis-code"},{"type":"related","targetTerm":"Origin & Destination","targetId":"origin-destination"},{"type":"related","targetTerm":"Journey","targetId":"journey"},{"type":"related","targetTerm":"NUC","targetId":"nuc"},{"type":"related","targetTerm":"ATPCO","targetId":"atpco"}],"distinctions":[{"targetTerm":"Segment","explanation":"A segment is one booked flight portion; a fare component is a priced span bounded by fare breaks and may cover several segments.","explanation_ko":"세그먼트는 예약된 하나의 비행 구간이고, 운임 컴포넌트는 운임 분기로 경계가 정해진 가격 산정 구간으로 여러 세그먼트를 포함할 수 있다.","targetId":"segment"},{"targetTerm":"Origin & Destination","explanation":"An O&D is a market point-pair; a fare component is the priced unit defined over an O&D with one fare and rule set.","explanation_ko":"O&D는 시장의 지점 쌍이고, 운임 컴포넌트는 하나의 운임과 규정 집합을 갖고 O&D 단위로 정의되는 가격 산정 단위이다.","targetId":"origin-destination"}],"sources":[{"name":"IATA fare construction principles / Ticketing Handbook","org":"IATA","version":"","section":"","url":""},{"name":"ATPCO Automated Rules documentation","org":"ATPCO","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003ccircle cx=\"11\" cy=\"24\" r=\"3\"/>\u003ccircle cx=\"37\" cy=\"24\" r=\"3\"/>\u003cline x1=\"14\" y1=\"24\" x2=\"34\" y2=\"24\"/>\u003crect x=\"19\" y=\"30\" width=\"10\" height=\"10\" rx=\"2\"/>\u003cpath d=\"M24 30v-8\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"fare-construction","term":"Fare Construction","abbreviation":"","aliases":["Fare Calculation","Pricing"],"category":"air-shop","conceptType":"process","status":"active","definition":"Fare Construction is the standardized process of calculating the total fare for an itinerary by breaking it into fare components and pricing units, applying published or constructed fares in Neutral Units of Construction (NUC), validating fare rules, and converting the total to the local currency of the country of commencement. It produces the fare calculation line shown on a ticket.","longDef":"Under IATA fare construction principles, a journey is divided into pricing units, each comprising one or more fare components (a fare plus the flights it covers). Fares are published in local currency with an equivalent NUC amount; all construction arithmetic is performed in NUC so that fares in different currencies can be added, then the NUC total is converted to the currency of commencement using the IATA Rate of Exchange (ROE). Construction may use published through-fares, or constructed fares built from add-ons (e.g., a domestic add-on plus an international fare). Mileage-based checks (Maximum Permitted Mileage versus Ticketed Point Mileage, with mileage surcharges) and routing-based validity, together with minimum-fare checks, ensure the constructed amount is valid. Modern pricing engines automate this, but the underlying NUC/ROE framework persists alongside ATPCO-filed fares.","standardBody":"IATA","term_ko":"운임 산출 (Fare Construction)","definition_ko":"Fare Construction은 여정의 총운임을 산출하는 표준화된 과정으로, 여정을 fare component와 pricing unit으로 나누고, 공시 또는 구성(constructed) 운임을 NUC(Neutral Unit of Construction) 단위로 적용하며, fare rule을 검증한 뒤 총액을 여행 개시국 통화로 환산한다. 그 결과로 항공권에 표시되는 운임 계산식(fare calculation line)이 생성된다.","longDef_ko":"IATA 운임 산출 원칙에 따라 여정은 여러 pricing unit으로 나뉘고, 각 pricing unit은 하나 이상의 fare component(운임과 그 운임이 적용되는 비행 구간)로 구성된다. 운임은 현지 통화와 그에 상응하는 NUC 금액으로 공시되며, 서로 다른 통화의 운임을 합산할 수 있도록 모든 산출 연산은 NUC로 수행한 뒤, IATA Rate of Exchange(ROE)를 사용해 NUC 합계를 개시국 통화로 환산한다. 산출에는 공시 through-fare를 쓰거나, add-on으로 조합한 constructed fare(예: 국내 add-on + 국제 운임)를 쓸 수 있다. 마일리지 기반 점검(Maximum Permitted Mileage 대 Ticketed Point Mileage, 마일리지 할증 포함)과 routing 기반 유효성, 그리고 최저운임 점검을 통해 산출 금액의 유효성을 확보한다. 현대 pricing 엔진이 이를 자동화하지만, ATPCO 파일링 운임과 함께 NUC/ROE 체계는 여전히 유지된다.","providerTerms":[],"relationships":[{"type":"child","targetTerm":"Fare Component","targetId":"fare-component"},{"type":"child","targetTerm":"Pricing Unit","targetId":"pricing-unit"},{"type":"related","targetTerm":"NUC","targetId":"nuc"},{"type":"related","targetTerm":"Fare Rule","targetId":"fare-rule"},{"type":"related","targetTerm":"Journey","targetId":"journey"}],"distinctions":[{"targetTerm":"Fare Component","explanation":"A Fare Component is one building block (a single fare and its flights); Fare Construction is the overall process that assembles and validates components and pricing units into a total fare.","explanation_ko":"Fare Component는 하나의 구성 요소(단일 운임과 그 비행 구간)이며, Fare Construction은 component와 pricing unit을 조합·검증하여 총운임을 만드는 전체 과정이다.","targetId":"fare-component"}],"sources":[{"org":"IATA","name":"Fundamental Skills in Journey Pricing and Ticketing","version":"","section":"Fare construction","url":"https://www.iata.org/en/training/courses/journey-pricing-ticketing/tttg14/en/"},{"org":"IATA","name":"IATA Rates of Exchange","version":"","section":"NUC and ROE","url":"https://www.iata.org/en/publications/manuals/iata-rates-of-exchange/"}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"7\" y=\"20\" width=\"10\" height=\"10\" rx=\"1.5\"/>\u003crect x=\"31\" y=\"20\" width=\"10\" height=\"10\" rx=\"1.5\"/>\u003cline x1=\"17\" y1=\"25\" x2=\"22\" y2=\"25\"/>\u003cline x1=\"26\" y1=\"25\" x2=\"31\" y2=\"25\"/>\u003cpath d=\"M22 25l2-2 2 2-2 2z\"/>\u003cline x1=\"12\" y1=\"20\" x2=\"12\" y2=\"14\"/>\u003cline x1=\"36\" y1=\"20\" x2=\"36\" y2=\"14\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"fare-family","term":"Fare Family","term_ko":"운임 패밀리 (브랜드 운임)","abbreviation":"","aliases":["Branded Fare","Fare Brand","Branded Fares"],"category":"air-shop","conceptType":"business-term","status":"active","definition":"A fare family is a marketed bundle of a fare together with a defined set of attributes and ancillaries (such as baggage, seat selection, changes, and refunds) presented under a brand name like Basic, Standard, or Flex. It groups one or more underlying fares so travelers compare branded products rather than raw fare codes.","definition_ko":"운임 패밀리(fare family)는 운임에 정해진 속성과 부가 서비스(예: 수하물, 좌석 지정, 변경, 환불)를 함께 묶어 Basic, Standard, Flex와 같은 브랜드 이름으로 제공하는 마케팅 상품 묶음이다. 하나 이상의 기초 운임을 묶어, 여행자가 원시 운임 코드 대신 브랜드화된 상품을 비교하도록 한다.","longDef":"Fare families, also called branded fares, are the airline retailing construct in which carriers attach inclusions and restrictions to a fare and display them as named tiers. ATPCO's Branded Fares product is the primary industry mechanism for filing brands and their attributes so that GDSs, NDC offers, and airline.com can render them consistently. A fare family is a higher-level grouping that maps down to specific fare basis codes and RBDs, enabling upsell across the booking funnel.","longDef_ko":"브랜드 운임(branded fares)이라고도 불리는 운임 패밀리는 항공사가 운임에 포함 사항과 제약 사항을 부여하여 이름이 붙은 등급(tier)으로 표시하는 항공 리테일링 구조이다. ATPCO의 Branded Fares 상품은 브랜드와 그 속성을 신고하는 핵심 산업 메커니즘으로, GDS, NDC 오퍼, 항공사 자사 웹사이트(airline.com)가 이를 일관되게 표시할 수 있게 한다. 운임 패밀리는 특정 운임 기준 코드와 RBD로 매핑되는 상위 수준의 묶음으로, 예약 퍼널 전반에서 상위 등급 판매(upsell)를 가능하게 한다.","standardBody":"ATPCO","providerTerms":[{"provider":"ATPCO","term":"Branded Fares","context":"ATPCO Branded Fares lets carriers file brand names and attributes for fare families.","context_ko":"ATPCO Branded Fares는 항공사가 운임 패밀리의 브랜드 이름과 속성을 신고할 수 있게 한다.","relationship":"same"},{"provider":"Amadeus","term":"Fare Families / Branded Fares","context":"Amadeus markets the grouping of fares with attributes as Fare Families.","context_ko":"Amadeus는 속성이 결합된 운임 묶음을 Fare Families로 명명해 제공한다.","relationship":"same"}],"relationships":[{"type":"related","targetTerm":"Fare Basis Code","targetId":"fare-basis-code"},{"type":"related","targetTerm":"RBD","targetId":"rbd"},{"type":"related","targetTerm":"Ancillary Service","targetId":"ancillary-service"},{"type":"related","targetTerm":"Offer","targetId":"offer"},{"type":"related","targetTerm":"ATPCO","targetId":"atpco"}],"distinctions":[{"targetTerm":"Fare Basis Code","explanation":"A fare family is a branded bundle spanning fares; a fare basis code identifies one specific underlying fare.","explanation_ko":"운임 패밀리는 여러 운임에 걸친 브랜드 묶음이고, 운임 기준 코드는 하나의 특정 기초 운임을 식별한다.","targetId":"fare-basis-code"},{"targetTerm":"Ancillary Service","explanation":"Ancillaries are individual extras; a fare family bundles selected ancillaries and conditions into a branded tier.","explanation_ko":"부가 서비스는 개별 추가 항목이고, 운임 패밀리는 선택된 부가 서비스와 조건을 하나의 브랜드 등급으로 묶는다.","targetId":"ancillary-service"}],"sources":[{"name":"ATPCO Branded Fares documentation","org":"ATPCO","version":"","section":"","url":""},{"name":"Amadeus Fare Families / Branded Fares documentation","org":"Amadeus","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"8\" y=\"10\" width=\"32\" height=\"7\" rx=\"2\"/>\u003crect x=\"11\" y=\"21\" width=\"26\" height=\"7\" rx=\"2\"/>\u003crect x=\"14\" y=\"32\" width=\"20\" height=\"7\" rx=\"2\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"fare-rule","term":"Fare Rule","abbreviation":"","aliases":["Fare Rules","Tariff Rule","Rule Record"],"category":"air-shop","conceptType":"standard-term","status":"active","definition":"A Fare Rule is the set of conditions and restrictions that govern when and how a published fare may be sold, ticketed, and used. In ATPCO fare filing, these conditions are organized into numbered categories (e.g., advance purchase, minimum/maximum stay, seasonality, penalties) that attach to a fare via Category 0 (Rule Application) and its footnotes.","longDef":"Fare Rules are filed by carriers (typically through ATPCO) alongside the fare amount and are evaluated during pricing to determine fare eligibility for a given itinerary, date, passenger, and point of sale. ATPCO structures rule provisions into discrete categories: well-known examples include Category 1 (Eligibility), Category 3 (Seasonality), Category 4 (Flight Application), Category 5 (Advance Reservation/Ticketing), Category 6 (Minimum Stay), Category 7 (Maximum Stay), Category 8 (Stopovers), Category 9 (Transfers), Category 14 (Travel Dates), Category 15 (Sales Restrictions), Category 16 (Penalties), and Category 25 (Fare By Rule). A pricing engine matches the applicable rule data against each Fare Component before the fare can be applied, so a low fare that fails any rule provision is rejected in favor of a higher qualifying fare.","standardBody":"ATPCO","term_ko":"운임 규정 (Fare Rule)","definition_ko":"Fare Rule은 공시 운임을 언제, 어떻게 판매·발권·사용할 수 있는지를 규정하는 조건과 제약의 집합이다. ATPCO 운임 파일링에서는 이 조건들이 사전구매, 최소/최대 체류, 시즌, 페널티 등 번호가 매겨진 카테고리(Category)로 구조화되어 운임에 연결된다.","longDef_ko":"Fare Rule은 운임 금액과 함께 항공사가 (주로 ATPCO를 통해) 파일링하며, pricing 단계에서 특정 여정·날짜·승객·판매지점에 대한 운임 적용 가능 여부를 판단하는 데 평가된다. ATPCO는 규정 조항을 개별 카테고리로 구조화하는데, 대표적으로 Category 1(Eligibility), 3(Seasonality), 4(Flight Application), 5(Advance Reservation/Ticketing), 6(Minimum Stay), 7(Maximum Stay), 8(Stopovers), 9(Transfers), 14(Travel Dates), 15(Sales Restrictions), 16(Penalties), 25(Fare By Rule) 등이 있다. pricing 엔진은 각 Fare Component에 적용 가능한 규정 데이터를 대조하여 운임 적용 여부를 결정하며, 규정 조항을 하나라도 충족하지 못하는 저렴한 운임은 거절되고 조건을 만족하는 상위 운임이 적용된다.","providerTerms":[{"provider":"ATPCO","term":"Rule Category","context":"ATPCO numbers rule provisions into categories (Cat 1-50) that compose a fare rule.","context_ko":"ATPCO는 운임 규정 조항을 카테고리(Cat 1-50) 번호로 구조화하여 fare rule을 구성한다.","relationship":"narrower"},{"provider":"Travelport","term":"Fare Rules / Record 0","context":"GDS displays ATPCO-filed rule provisions to agents under fare rule retrieval entries.","context_ko":"GDS는 ATPCO에 파일링된 규정 조항을 운임 규정 조회 항목으로 상담원에게 표시한다.","relationship":"same"}],"relationships":[{"type":"related","targetTerm":"Fare Basis Code","targetId":"fare-basis-code"},{"type":"related","targetTerm":"Fare Component","targetId":"fare-component"},{"type":"related","targetTerm":"ATPCO","targetId":"atpco"},{"type":"related","targetTerm":"Fare Family","targetId":"fare-family"}],"distinctions":[{"targetTerm":"Fare Basis Code","explanation":"The Fare Basis Code is the alphanumeric label identifying a specific fare; the Fare Rule is the body of conditions that the fare (and its basis code) must satisfy to be applied.","explanation_ko":"Fare Basis Code는 특정 운임을 식별하는 영숫자 코드이며, Fare Rule은 그 운임(및 basis code)이 적용되기 위해 충족해야 하는 조건의 본문이다.","targetId":"fare-basis-code"}],"sources":[{"org":"ATPCO","name":"What are ATPCO fare rules categories?","version":"","section":"Fare rule categories","url":"https://atpco.net/single-blog/what-are-atpco-fare-rules-categories/"},{"org":"Travelport","name":"Fare Rules Guide","version":"","section":"Fare rule categories","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"10\" y=\"6\" width=\"28\" height=\"36\" rx=\"3\"/>\u003cline x1=\"16\" y1=\"15\" x2=\"32\" y2=\"15\"/>\u003cline x1=\"16\" y1=\"22\" x2=\"32\" y2=\"22\"/>\u003cline x1=\"16\" y1=\"29\" x2=\"26\" y2=\"29\"/>\u003cpath d=\"M28 34l3 3 6-6\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"flight-coupon","term":"Flight Coupon","term_ko":"비행 쿠폰 (Flight Coupon)","abbreviation":"","aliases":["Coupon","Electronic Flight Coupon"],"category":"air-ticket","conceptType":"document","status":"active","definition":"The portion of an e-ticket that corresponds to a single flight segment and represents the passenger's entitlement to be carried on that specific flight. Each coupon carries an independent status indicating where it is in its lifecycle.","definition_ko":"단일 비행 구간에 대응하는 전자항공권의 부분으로, 해당 특정 항공편에 탑승할 수 있는 승객의 권리를 나타낸다. 각 쿠폰은 생애 주기상의 현재 위치를 나타내는 독립적인 상태를 가진다.","longDef":"A single ticket may contain up to four flight coupons; itineraries with more segments require conjunction tickets. Typical coupon statuses include OPEN FOR USE (O), AIRPORT CONTROL/CHECKED IN (A), FLOWN/USED (F), VOID (V), REFUNDED (R), EXCHANGED/REISSUED (E), and SUSPENDED (S). Coupon status is the authoritative control point for boarding, refund, reissue, and revenue recognition; for example, a coupon must be open (or under airport control) to be exchanged in a reissue, and final statuses such as Flown, Void, Exchanged, or Refunded block reuse.","longDef_ko":"단일 항공권은 최대 4개의 Flight Coupon을 포함할 수 있으며, 구간이 더 많은 여정에는 연결 항공권(conjunction ticket)이 필요하다. 일반적인 쿠폰 상태로는 OPEN FOR USE (O), AIRPORT CONTROL/CHECKED IN (A), FLOWN/USED (F), VOID (V), REFUNDED (R), EXCHANGED/REISSUED (E), SUSPENDED (S) 등이 있다. 쿠폰 상태는 탑승, 환불, 재발행 및 수익 인식을 위한 핵심 통제 지점이다. 예를 들어, 재발행 시 쿠폰을 교환하려면 해당 쿠폰이 OPEN 상태(또는 airport control 상태)여야 하며, Flown, Void, Exchanged, Refunded와 같은 최종 상태는 재사용을 차단한다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"child","targetTerm":"E-ticket","targetId":"e-ticket"},{"type":"related","targetTerm":"Segment","targetId":"segment"},{"type":"related","targetTerm":"Reissue","targetId":"reissue"},{"type":"related","targetTerm":"Refund","targetId":"refund"}],"distinctions":[{"targetTerm":"Segment","explanation":"A segment is the reservation/operational unit of travel; a flight coupon is the corresponding revenue/entitlement portion of the ticket.","explanation_ko":"Segment는 여행의 예약/운항 단위이며, Flight Coupon은 이에 대응하는 항공권의 수익/권리 부분이다.","targetId":"segment"},{"targetTerm":"E-ticket","explanation":"The e-ticket is the whole document; a flight coupon is one of its (up to four) usable parts.","explanation_ko":"전자항공권은 서류 전체이며, Flight Coupon은 그 안에서 사용 가능한 (최대 4개의) 부분 중 하나이다.","targetId":"e-ticket"}],"sources":[{"name":"Passenger Services Conference Resolutions Manual (PSCRM)","org":"IATA","version":"","section":"","url":""}],"lastReviewed":"2026-06-15","icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M7 16h34v6a3 3 0 000 6v6H7v-6a3 3 0 000-6z\"/>\u003cpath d=\"M20 16v3M20 24v3M20 29v3\"/>\u003cpath d=\"M27 22l4 4 8-9\"/>\u003c/svg>"},{"id":"flight-number","term":"Flight Number","term_ko":"편명(항공편 번호)","abbreviation":"","aliases":["Flight Designator","Flight Identifier"],"category":"codes","conceptType":"code","status":"active","definition":"The identifier of a scheduled flight, formed by the two-character airline designator plus a numeric suffix of one to four digits (e.g., AA100, LH9). It identifies a marketing flight on a route and date, not a specific aircraft.","definition_ko":"정기 항공편을 식별하는 코드로, 2자리 항공사 지정 코드에 1~4자리 숫자가 결합되어 구성된다(예: AA100, LH9). 특정 항공기가 아니라 노선·날짜상의 마케팅 항공편을 식별한다.","longDef":"The numeric portion is limited to four digits. Many carriers follow conventions where direction influences parity (e.g., eastbound/northbound even, westbound/southbound odd) and high number ranges denote regional or codeshare flights, but these conventions are not standardized across the industry. Under codeshare, the same physical flight carries multiple flight numbers: the marketing carrier's flight number shown to the customer and the operating carrier's flight number. A flight number combined with a date and origin/destination identifies a flight segment in a PNR.","longDef_ko":"숫자 부분은 최대 4자리로 제한된다. 다수 항공사는 방향에 따라 홀짝을 나누거나(예: 동행/북행은 짝수, 서행/남행은 홀수) 높은 번호 대역을 지역 노선·공동운항편에 배정하는 관례를 따르지만, 이러한 관례가 업계 전반에서 표준화되어 있지는 않다. 공동운항(codeshare)에서는 동일한 실제 운항편이 여러 편명을 갖는다. 고객에게 표시되는 마케팅 항공사 편명과 실제 운항 항공사 편명이 그것이다. 편명에 날짜와 출발지/도착지를 결합하면 PNR 내 항공 구간(segment)을 식별할 수 있다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Airline Designator","targetId":"airline-designator"},{"type":"related","targetTerm":"Segment","targetId":"segment"},{"type":"related","targetTerm":"Codeshare","targetId":"codeshare"},{"type":"related","targetTerm":"Marketing Carrier","targetId":"marketing-carrier"},{"type":"related","targetTerm":"Operating Carrier","targetId":"operating-carrier"}],"distinctions":[{"targetTerm":"Segment","explanation":"A flight number identifies a scheduled flight; a segment is the booked flight number plus a specific date and origin/destination held in a PNR.","explanation_ko":"편명은 정기 항공편을 식별하고, 세그먼트(segment)는 PNR에 보관되는 특정 날짜·출발지/도착지가 결합된 예약된 편명이다.","targetId":"segment"},{"targetTerm":"Airline Accounting Code","explanation":"A flight number labels a flight on a route/date; the accounting code is the 3-digit airline identifier on the ticket number and is unrelated to any particular flight.","explanation_ko":"편명은 노선·날짜상의 항공편을 가리키고, 정산 코드는 항공권 번호상의 3자리 항공사 식별자로 특정 항공편과 무관하다.","targetId":"airline-accounting-code"}],"sources":[{"org":"IATA","name":"Standard Schedules Information Manual (SSIM)","version":"","section":"","url":""},{"org":"Wikipedia","name":"Flight number","version":"","section":"","url":"https://en.wikipedia.org/wiki/Flight_number"}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M9 27l30-9c2-.6 4 .4 4 2s-1.7 3-3.5 3.6L13 32l-4 6-3-1 2-7-6-1 2-2 5 1z\"/>\u003cpath d=\"M22 28l4 8\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"form-of-payment","term":"Form of Payment","abbreviation":"FOP","aliases":["FOP","Form of Payment (FOP)"],"category":"pay","conceptType":"standard-term","status":"active","definition":"Form of Payment (FOP) is the method by which a travel transaction is paid, recorded on a ticket, EMD, or order, such as cash, credit card, customer card, or miscellaneous charge order. In airline ticketing the FOP is stored as a coded element and drives how the sale is reported and settled.","longDef":"Form of Payment is a core element of an airline ticket and EMD, identifying how the customer paid so that the transaction can be correctly reported through BSP or ARC and settled with the validating carrier. Common FOP types include cash (CA), credit card (CC) with the card type and masked number, and miscellaneous forms such as IATA EasyPay or government transportation requests. The FOP affects merchant fees, chargeback exposure, and whether funds flow through an agency settlement system versus the airline's own merchant acquiring. In NDC and ONE Order flows, payment details are carried in the order rather than only on a paper or e-ticket coupon, and a single order may combine multiple forms of payment.","standardBody":"IATA","term_ko":"지불수단 (Form of Payment, FOP)","definition_ko":"Form of Payment(FOP)은 항공권, EMD 또는 주문(order)에 기록되는 여행 거래의 결제 방법으로, 현금·신용카드·고객카드·MCO 등이 있다. 항공 발권에서 FOP는 코드화된 요소로 저장되어 판매가 보고·정산되는 방식을 결정한다.","longDef_ko":"Form of Payment은 항공권과 EMD의 핵심 요소로, 고객이 어떻게 결제했는지를 식별해 거래가 BSP 또는 ARC를 통해 올바르게 보고되고 Validating Carrier와 정산되도록 한다. 일반적인 FOP 유형으로는 현금(CA), 카드종류와 마스킹된 번호를 포함한 신용카드(CC), IATA EasyPay나 정부 운송 요청서 같은 기타 형태가 있다. FOP는 가맹점 수수료, Chargeback 위험, 자금이 여행사 정산 시스템을 거치는지 항공사 자체 매입(acquiring)을 거치는지에 영향을 준다. NDC 및 ONE Order 흐름에서는 결제 정보가 종이·e-ticket 쿠폰뿐 아니라 주문 안에 담기며, 하나의 주문에 여러 지불수단이 결합될 수 있다.","providerTerms":[],"relationships":[{"type":"related","targetTerm":"E-ticket","targetId":"e-ticket"},{"type":"related","targetTerm":"EMD","targetId":"emd"},{"type":"related","targetTerm":"BSP","targetId":"bsp"},{"type":"related","targetTerm":"ARC","targetId":"arc"},{"type":"related","targetTerm":"IATA EasyPay","targetId":"iata-easypay"},{"type":"related","targetTerm":"ONE Order","targetId":"one-order"}],"distinctions":[{"targetTerm":"VCC","explanation":"A VCC is one specific instrument that can be used as a form of payment, whereas Form of Payment is the general ticketing element that records whichever instrument or method was used.","explanation_ko":"VCC는 지불수단으로 사용될 수 있는 하나의 특정 결제 수단인 반면, Form of Payment은 어떤 수단·방법이 사용되었든 그것을 기록하는 일반적인 발권 요소다.","targetId":"vcc"}],"sources":[{"org":"IATA","name":"Passenger Services Conference Resolutions Manual (PSCRM)","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"6\" y=\"13\" width=\"28\" height=\"18\" rx=\"2.5\"/>\u003cline x1=\"6\" y1=\"19\" x2=\"34\" y2=\"19\"/>\u003cline x1=\"11\" y1=\"26\" x2=\"18\" y2=\"26\"/>\u003ccircle cx=\"34\" cy=\"32\" r=\"7\"/>\u003cpath d=\"M34 28.5v3.5l2.5 1.5\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"free-sale","term":"Free Sale","term_ko":"프리세일(free sale)","abbreviation":"","aliases":["Freesale","Free Sell","Sell Free","Free Sale Inventory"],"category":"hotel-dist","conceptType":"business-term","status":"active","definition":"Free sale is a distribution arrangement in which a channel may confirm hotel bookings without checking a specific live allotment for each request, typically up to an agreed limit and subject to release/stop-sell conditions. The hotel commits to honor confirmed free-sale bookings, relying on the seller to respect stop-sell signals rather than on real-time allocation checks.","definition_ko":"프리세일(free sale)은 채널이 각 요청마다 특정 실시간 할당량(allotment)을 확인하지 않고도 호텔 예약을 확정할 수 있게 하는 분배 방식으로, 일반적으로 합의된 한도까지 적용되며 해제/판매 중지(stop-sell) 조건의 적용을 받는다. 호텔은 확정된 프리세일 예약을 이행할 것을 약속하며, 실시간 할당 확인이 아니라 판매자가 판매 중지 신호를 준수하는 것에 의존한다.","longDef":"Free sale (or 'sell free') lets a channel sell rooms on the assumption that availability exists, often governed by a free-sale limit and a stop-sell/close-out mechanism the hotel triggers when it wants to stop receiving bookings. It contrasts with allotment-based selling, where the channel can only sell from a finite pre-allocated block, and with fully dynamic two-way (pooled) availability. Free sale increases conversion and reduces missed bookings but carries overbooking risk if stop-sell is not applied promptly.","longDef_ko":"프리세일('sell free')은 채널이 가용성이 존재한다는 가정 하에 객실을 판매하도록 허용하며, 흔히 프리세일 한도와, 호텔이 예약 수신을 중단하고자 할 때 발동하는 판매 중지(stop-sell)/마감(close-out) 메커니즘에 의해 규율된다. 이는 채널이 사전 할당된 유한한 블록에서만 판매할 수 있는 할당량 기반 판매, 그리고 완전 동적 양방향(풀링) 가용성과 대비된다. 프리세일은 전환율을 높이고 놓친 예약을 줄이지만, 판매 중지가 신속히 적용되지 않으면 오버부킹 위험을 수반한다.","standardBody":"OpenTravel","providerTerms":[],"relationships":[{"type":"contrasts","targetTerm":"Allotment","targetId":"allotment"},{"type":"related","targetTerm":"Availability","targetId":"availability"},{"type":"related","targetTerm":"ARI","targetId":"ari"},{"type":"related","targetTerm":"Channel Manager","targetId":"channel-manager"},{"type":"related","targetTerm":"Overbooking","targetId":"overbooking"}],"distinctions":[{"targetTerm":"Allotment","explanation":"Free sale lets a channel confirm bookings without checking a finite block (subject to stop-sell); an allotment is a fixed pre-allocated number of rooms a channel may sell.","explanation_ko":"프리세일은 채널이 유한한 블록을 확인하지 않고도 예약을 확정할 수 있게 하지만(판매 중지의 적용을 받음), 할당량(allotment)은 채널이 판매할 수 있도록 사전에 할당된 고정 객실 수다.","targetId":"allotment"},{"targetTerm":"Overbooking","explanation":"Free sale is a selling mechanism that can lead to overbooking if stop-sell is delayed; overbooking is the resulting state of having sold more rooms than available.","explanation_ko":"프리세일은 판매 중지가 지연되면 오버부킹으로 이어질 수 있는 판매 메커니즘이고, 오버부킹은 가용 객실보다 많은 객실을 판매한 결과 상태다.","targetId":"overbooking"}],"sources":[{"name":"OpenTravel Specification","org":"OpenTravel Alliance","version":"","section":"","url":""}],"icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M5 30v-6a3 3 0 013-3h26a6 6 0 016 6v9\"/>\u003cpath d=\"M5 30h36M5 30v6M41 36v3M5 36v3\"/>\u003cpath d=\"M11 21v-4a2 2 0 012-2h6a2 2 0 012 2v4M23 21v-4a2 2 0 012-2h6a2 2 0 012 2v4\"/>\u003cpath d=\"M33 9l3 3-3 3M36 12h-9\"/>\u003c/svg>","lastReviewed":"2026-06-15"},{"id":"frequent-flyer-number","term":"Frequent Flyer Number","term_ko":"상용 고객 번호 (FFN)","abbreviation":"FFN","aliases":["FFN","FQTV Number","Loyalty Number","Membership Number","Frequent Traveler Number"],"category":"customer","conceptType":"code","status":"active","definition":"The unique account identifier assigned to a member of a Frequent Flyer Program, used to accrue and redeem miles and to attach loyalty benefits to a booking. In reservations it is carried in the FQTV SSR together with the issuing program's airline code.","definition_ko":"FFP 회원에게 부여되는 고유한 계정 식별자로, 마일리지를 적립 및 사용하고 예약에 로열티 혜택을 연결하는 데 사용된다. 예약에서는 발급 프로그램의 항공사 코드와 함께 FQTV SSR에 담겨 전달된다.","longDef":"A Frequent Flyer Number identifies a specific member account within a specific program; the same physical person may hold many such numbers across different airlines. When added to a PNR via the FQTV Special Service Request, the system records the program (airline designator) and the membership number so that mileage accrues correctly and tier benefits (priority, baggage, lounge, upgrades) are applied. Because the number is account-specific, it is meaningless without the associated program identifier.","longDef_ko":"FFN은 특정 프로그램 내의 특정 회원 계정을 식별하며, 동일한 사람이 서로 다른 항공사에 여러 개의 번호를 보유할 수 있다. FQTV Special Service Request를 통해 PNR에 추가되면 시스템은 프로그램(항공사 식별 코드)과 회원 번호를 기록하여 마일리지가 정확히 적립되고 등급 혜택(우선권, 수하물, 라운지, 업그레이드)이 적용되도록 한다. 번호는 계정 고유값이므로 연관된 프로그램 식별자 없이는 의미가 없다.","standardBody":"IATA","providerTerms":[],"relationships":[{"type":"child","targetTerm":"Frequent Flyer Program","targetId":"frequent-flyer-program"},{"type":"related","targetTerm":"SSR","targetId":"ssr"},{"type":"related","targetTerm":"Customer Profile","targetId":"customer-profile"},{"type":"related","targetTerm":"Loyalty Tier Status","targetId":"loyalty-tier-status"}],"distinctions":[{"targetTerm":"Frequent Flyer Program","explanation":"The number is the member's account ID; the program is the scheme that issues and governs that account.","explanation_ko":"번호는 회원의 계정 ID이고, 프로그램은 그 계정을 발급하고 관리하는 제도이다.","targetId":"frequent-flyer-program"},{"targetTerm":"SSR","explanation":"The Frequent Flyer Number is the data value; the FQTV SSR is the message element that carries it into a PNR.","explanation_ko":"FFN은 데이터 값이고, FQTV SSR은 그 값을 PNR에 전달하는 메시지 요소이다.","targetId":"ssr"}],"sources":[{"name":"Airline Industry Reservations Interline Message Procedures — Passenger (AIRIMP), FQTV SSR","org":"IATA","version":"","section":"","url":""}],"lastReviewed":"2026-06-15","icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003crect x=\"6\" y=\"13\" width=\"36\" height=\"22\" rx=\"3\"/>\u003cpath d=\"M6 21h36\"/>\u003cpath d=\"M13 28h6M24 28h4M32 28h4\"/>\u003c/svg>"},{"id":"frequent-flyer-program","term":"Frequent Flyer Program","term_ko":"상용 고객 우대 프로그램 (FFP)","abbreviation":"FFP","aliases":["FFP","Loyalty Program","Mileage Program","Frequent Traveler Program"],"category":"customer","conceptType":"business-term","status":"active","definition":"An airline loyalty program in which members accrue points or miles for flights and partner activity and redeem them for awards, upgrades and benefits, often progressing through status tiers. Each program is operated by an airline (or alliance) and identifies members by a Frequent Flyer Number.","definition_ko":"회원이 탑승과 제휴사 활동을 통해 포인트나 마일리지를 적립하고 이를 보너스 항공권, 업그레이드, 각종 혜택으로 사용하며 흔히 등급 단계를 거쳐 승급하는 항공사 로열티 프로그램이다. 각 프로그램은 항공사(또는 항공 동맹체)가 운영하며 Frequent Flyer Number로 회원을 식별한다.","longDef":"Frequent Flyer Programs are the core customer-retention mechanism in aviation. Members earn currency (miles/points) based on distance flown, fare paid (revenue-based) or other criteria, and earn elite-qualifying activity that determines their Loyalty Tier Status. Programs are linked across partners through interline and alliance agreements, allowing accrual and redemption on multiple carriers. In a reservation, a member's enrollment is recorded via the FQTV SSR carrying their Frequent Flyer Number.","longDef_ko":"FFP는 항공업계의 핵심 고객 유지 수단이다. 회원은 비행 거리, 지불 운임(매출 기반) 또는 기타 기준에 따라 가치(마일리지/포인트)를 적립하고, Loyalty Tier Status를 결정하는 우수 등급 산정 활동을 쌓는다. 프로그램은 인터라인 및 동맹 협정을 통해 제휴사 간에 연결되어 여러 항공사에서 적립과 사용이 가능하다. 예약에서는 회원의 가입 정보가 Frequent Flyer Number를 담은 FQTV SSR을 통해 기록된다.","standardBody":"","providerTerms":[],"relationships":[{"type":"related","targetTerm":"Frequent Flyer Number","targetId":"frequent-flyer-number"},{"type":"related","targetTerm":"Loyalty Tier Status","targetId":"loyalty-tier-status"},{"type":"related","targetTerm":"Customer Profile","targetId":"customer-profile"},{"type":"related","targetTerm":"SSR","targetId":"ssr"}],"distinctions":[{"targetTerm":"Frequent Flyer Number","explanation":"The Frequent Flyer Program is the loyalty scheme itself; the Frequent Flyer Number is the unique member identifier within that program.","explanation_ko":"FFP는 로열티 제도 그 자체이고, Frequent Flyer Number는 해당 프로그램 내 고유한 회원 식별자이다.","targetId":"frequent-flyer-number"},{"targetTerm":"Loyalty Tier Status","explanation":"The program defines the rules and benefits; the tier status is an individual member's earned standing inside the program.","explanation_ko":"프로그램은 규정과 혜택을 정의하고, 등급 상태는 프로그램 안에서 개별 회원이 획득한 위상이다.","targetId":"loyalty-tier-status"}],"sources":[{"name":"Airline Industry Reservations Interline Message Procedures — Passenger (AIRIMP), FQTV SSR","org":"IATA","version":"","section":"","url":""}],"lastReviewed":"2026-06-15","icon":"\u003csvg viewBox=\"0 0 48 48\" stroke=\"currentColor\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003cpath d=\"M24 7l3.5 7.5L35 16l-5.5 5.5L31 29l-7-3.8L17 29l1.5-7.5L13 16l7.5-1.5z\"/>\u003cpath d=\"M38 31c4 4 4 9 0 13M10 31c-4 4-4 9 0 13\"/>\u003c/svg>"},{"id":"gdpr-consent","term":"GDPR Consent","term_ko":"GDPR 동의 (개인정보 처리 동의)","a
