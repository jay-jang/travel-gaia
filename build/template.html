<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Travel Wiki — 여행 산업 용어 백과사전</title>
<meta name="description" content="여행 산업(항공·호텔·유통·정산·표준)의 용어를 공급자/표준 간 통일한 standalone 백과사전. 한/영, 용어별 일러스트, 관계 그래프, 전체 색인.">
<script type="application/ld+json">__JSONLD__</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
/*__FONTS__*/
:root{
  --paper:#f7f4ee; --surface:#fffdf8; --surface-2:#f0ebe0; --border:#dcd5c5; --rule:#dcd5c5;
  --text:#1e1d1a; --muted:#6f6a5f; --faint:#938c7c;
  --accent:#7a2520; --accent-weak:#efe5df;
  --warn:#8a5414; --warn-weak:#f2ead9; --danger:#9c2b2b;
  --mono:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  --sans:'Inter',system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
  --serif:'Source Serif 4',Georgia,"Apple SD Gothic Neo","Nanum Myeongjo",serif;
  --display:var(--serif); --grotesk:var(--sans);
  --side:264px; --maxw:760px; --hh:60px; --r:2px;
}
[data-theme="dark"]{
  --paper:#141310; --surface:#1c1b15; --surface-2:#252318; --border:#36322a; --rule:#36322a;
  --text:#ece7d8; --muted:#a8a08f; --faint:#746e60;
  --accent:#d98b6a; --accent-weak:#2c231d;
  --warn:#d6a05a; --warn-weak:#241d12; --danger:#e0807a;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--paper);color:var(--text);font-family:var(--sans);font-size:16px;line-height:1.62;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
a{color:var(--accent);text-decoration:none;text-underline-offset:2px}
a:hover{text-decoration:underline}
code,kbd{font-family:var(--mono);font-size:.84em;background:var(--surface-2);padding:.1em .4em;border-radius:var(--r);border:1px solid var(--border)}
::selection{background:var(--accent);color:var(--paper)}
@keyframes fade{to{opacity:1}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;scroll-behavior:auto!important}}

/* header / masthead bar */
header.top{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:14px;height:var(--hh);padding:0 22px;background:var(--surface);border-bottom:2px solid var(--text)}
.brand{display:flex;align-items:center;gap:10px;font-family:var(--serif);font-weight:600;font-size:1.24rem;letter-spacing:-.01em;white-space:nowrap;color:var(--text);cursor:pointer}
.brand:hover{text-decoration:none}
.brand .globe{width:30px;height:30px;border-radius:var(--r);display:grid;place-items:center;color:var(--paper);background:var(--accent);box-shadow:none;font-family:var(--serif);font-weight:600;font-size:16px;filter:grayscale(1) contrast(0)}
.brand .globe::before{content:"G";font-style:normal}
.brand .globe>*{display:none}
.brand small{display:block;font-family:var(--sans);font-weight:600;color:var(--faint);font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;margin-top:2px}
.searchwrap{flex:1;max-width:460px;position:relative;margin-left:10px}
#q{width:100%;padding:8px 36px;border:1px solid var(--border);border-radius:var(--r);background:var(--paper);color:var(--text);font-family:var(--sans);font-size:.92rem;font-weight:500;outline:none;transition:border-color .15s}
#q:focus{border-color:var(--accent)}
.searchwrap .mag{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--faint);pointer-events:none;font-size:.86rem}
.searchwrap .hint{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--faint);font-family:var(--mono);font-size:.7rem;border:1px solid var(--border);border-radius:var(--r);padding:0 6px;pointer-events:none}
.tbtn{border:1px solid var(--border);background:var(--surface);color:var(--muted);height:36px;min-width:36px;padding:0 11px;border-radius:var(--r);cursor:pointer;font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:.03em;display:inline-flex;align-items:center;justify-content:center;gap:6px;transition:.15s}
.tbtn:hover{border-color:var(--accent);color:var(--accent)}
.actions{margin-left:auto;display:flex;gap:8px;align-items:center}
.menu-toggle{display:none;border:1px solid var(--border);background:var(--surface);color:var(--text);width:36px;height:36px;border-radius:var(--r);cursor:pointer;font-size:17px}

/* layout */
.shell{display:grid;grid-template-columns:var(--side) 1fr;align-items:start}
aside.nav{position:sticky;top:var(--hh);height:calc(100vh - var(--hh));overflow-y:auto;border-right:1px solid var(--rule);background:var(--surface);padding:18px 12px}
aside .nav-title{font-family:var(--sans);font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--faint);margin:18px 8px 6px;padding-bottom:5px;border-bottom:1px solid var(--rule)}
aside .nav-title:first-of-type{margin-top:0}
.cat-link{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:6px 8px;border-radius:var(--r);color:var(--text);cursor:pointer;font-size:.86rem;font-weight:500;transition:background .12s}
.cat-link:hover{background:var(--surface-2);color:var(--accent);text-decoration:none}
.cat-link.active{background:none;color:var(--accent);font-weight:700;box-shadow:inset 3px 0 0 var(--accent);border-radius:0}
.cat-link .cnt{font-family:var(--mono);font-size:.7rem;font-weight:500;color:var(--faint);background:none;border-radius:0;padding:0;min-width:0;text-align:right}
.cat-link.active .cnt{color:var(--accent)}
.cat-link .dot{width:8px;height:8px;border-radius:0;flex:none}
main{min-width:0;padding:34px clamp(18px,4vw,56px) 110px;max-width:none;margin:0;width:100%}
/* full-bleed mindmap: let the canvas fill the whole content area */
body.mm-full main{padding:0;max-width:none;margin:0;overflow:hidden}
/* full-screen distribution flow: use the entire viewport (hide sidebar, drop max-width) */
body.flow-full .shell{grid-template-columns:1fr}
body.flow-full aside.nav{display:none}
body.flow-full main{padding:18px clamp(16px,3vw,44px) 30px;max-width:none;margin:0;width:100%}
.scrim{display:none}

/* icons (quiet, monochrome wayfinding) */
.icon{display:inline-grid;place-items:center;flex:none;color:var(--muted)}
.icon svg{width:100%;height:100%;display:block}
.term-icon{width:46px;height:46px;border-radius:0;background:none;border:1px solid var(--border);padding:8px;color:var(--text)}
.tl-icon{width:34px;height:34px;border-radius:0;background:none;border:1px solid var(--rule);padding:7px}
.idx-icon{width:26px;height:26px;border-radius:0;background:none;border:1px solid var(--rule);padding:5px}

/* home: masthead + directory */
.hero{position:relative;overflow:visible;background:none;border:0;border-bottom:2px solid var(--text);border-radius:0;padding:0 0 16px;box-shadow:none;margin-bottom:22px}
.hero::before{display:none}
.hero h1{position:relative;font-family:var(--serif);font-weight:600;margin:0 0 .22em;font-size:clamp(1.9rem,4vw,2.7rem);line-height:1.08;letter-spacing:-.012em}
.hero p{position:relative;margin:.18em 0;color:var(--muted);max-width:62ch;font-family:var(--serif);font-size:1.04rem;line-height:1.56}
.stats{position:relative;display:flex;flex-wrap:wrap;gap:0;margin-top:18px;border-top:1px solid var(--rule);padding-top:12px}
.stat{background:none;border:0;border-right:1px solid var(--rule);border-radius:0;padding:2px 22px 2px 0;margin-right:22px;min-width:0}
.stat:last-child{border-right:0}
.stat b{display:block;font-family:var(--mono);font-weight:600;font-size:1.5rem;letter-spacing:0;background:none;-webkit-text-fill-color:currentColor;color:var(--text)}
.stat span{color:var(--muted);font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em}
.sec-title{font-family:var(--sans);font-weight:700;font-size:.7rem;text-transform:uppercase;letter-spacing:.15em;color:var(--muted);margin:34px 0 14px;letter-spacing:.15em;border-bottom:2px solid var(--text);padding-bottom:6px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(252px,1fr));gap:0;border-top:1px solid var(--rule)}
.card{position:relative;background:none;border:0;border-bottom:1px solid var(--rule);border-radius:0;padding:14px 18px 14px 16px;cursor:pointer;box-shadow:none;transition:background .12s;overflow:visible}
.card::after{content:"";position:absolute;left:0;top:13px;bottom:13px;width:3px;background:var(--cc,var(--accent));opacity:1}
.card:hover{transform:none;box-shadow:none;border-color:var(--rule);background:var(--surface-2);text-decoration:none}
.card .ct{display:flex;align-items:center;gap:9px;font-family:var(--serif);font-weight:600;font-size:1.04rem;color:var(--text)}
.card .cd{color:var(--muted);font-size:.84rem;margin-top:5px;line-height:1.48}
.card .cn{color:var(--faint);font-family:var(--mono);font-size:.7rem;font-weight:500;margin-top:9px;text-transform:none;letter-spacing:0}
.cta-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px;position:relative}
.cta-mindmap,.cta-2{display:inline-flex;align-items:center;gap:8px;border-radius:var(--r);padding:9px 16px;font-family:var(--sans);font-weight:600;font-size:.86rem;border:1px solid var(--border)}
.cta-mindmap{background:var(--accent);color:var(--paper);border-color:var(--accent)}
.cta-mindmap:hover{text-decoration:none;background:var(--text);border-color:var(--text)}
.cta-2{background:var(--surface);color:var(--text)}
.cta-2:hover{text-decoration:none;border-color:var(--accent);color:var(--accent)}
.conflict{display:block;background:none;border:0;border-bottom:1px solid var(--rule);border-left:0;border-radius:0;padding:11px 0 11px 16px;margin-bottom:0;position:relative}
.conflict::before{content:"";position:absolute;left:0;top:13px;bottom:13px;width:3px;background:var(--warn)}
.conflict b{color:var(--text);font-family:var(--serif)}
.conflict:hover{text-decoration:none;background:var(--surface-2)}
.disclaimer{max-width:none;margin:30px 0 0;color:var(--faint);font-size:.76rem;line-height:1.55}

/* lists */
.crumbs{font-family:var(--sans);font-size:.78rem;color:var(--muted);margin-bottom:16px;font-weight:500}
.crumbs a{color:var(--muted)}
.termlist{display:grid;gap:0;border-top:1px solid var(--rule)}
.tl-item{display:flex;align-items:flex-start;gap:14px;background:none;border:0;border-bottom:1px solid var(--rule);border-radius:0;padding:13px 8px;cursor:pointer;transition:background .12s}
.tl-item:hover{border-color:var(--rule);transform:none;box-shadow:none;background:var(--surface-2);text-decoration:none}
.tl-item .tl-body{min-width:0;flex:1}
.tl-item .h{font-family:var(--serif);font-weight:600;font-size:1.02rem;color:var(--text)}
.tl-item .d{color:var(--muted);font-size:.86rem;margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tl-item .abbr{color:var(--faint);font-weight:500;font-size:.85em;font-family:var(--sans)}

/* article: term page with Tufte sidenotes */
article{background:none;border:0;border-radius:0;padding:0;box-shadow:none}
.term-grid{display:grid;grid-template-columns:minmax(0,1fr) clamp(260px,22vw,360px);gap:clamp(28px,3vw,52px);align-items:start}
.term-main{min-width:0}
.term-head{border-left:5px solid var(--cc,var(--accent));padding-left:16px;margin-bottom:14px}
.term-hero{display:flex;align-items:center;gap:16px;margin-bottom:0}
article h1{font-family:var(--serif);font-weight:600;margin:0;font-size:clamp(1.7rem,3.4vw,2.3rem);letter-spacing:-.01em;line-height:1.12}
.term-sub{color:var(--muted);font-family:var(--serif);font-size:1.04rem;font-weight:500;margin:2px 0 0}
.badges{display:flex;flex-wrap:wrap;gap:7px;margin:14px 0 4px}
.badge{font-family:var(--mono);font-size:.7rem;font-weight:500;padding:2px 8px;border-radius:var(--r);border:1px solid var(--border);background:none;color:var(--muted)}
.badge.cat{background:none;color:var(--accent);border-color:var(--accent);cursor:pointer;font-family:var(--sans);font-weight:600}
.badge.st-active{color:var(--muted)}.badge.st-deprecated{color:var(--danger);border-color:var(--danger)}.badge.st-ambiguous{color:var(--warn);border-color:var(--warn)}
.lead{font-family:var(--serif);font-size:1.18rem;line-height:1.55;margin:20px 0;color:var(--text)}
.term-main>p{font-family:var(--serif);font-size:1.02rem;line-height:1.62;color:var(--text)}
.lead,.term-main>p,.notes{max-width:80ch}
.field{margin-top:26px}
.field h3{font-family:var(--sans);font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.13em;color:var(--muted);margin:0 0 10px;padding-bottom:6px;border-bottom:1px solid var(--text)}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{font-family:var(--mono);font-size:.78rem;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r);padding:2px 8px;color:var(--muted)}
table.pt{width:100%;border-collapse:collapse;font-size:.88rem}
table.pt th,table.pt td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--rule);vertical-align:top}
table.pt th{font-family:var(--sans);color:var(--muted);font-size:.64rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;border-bottom:2px solid var(--text)}
table.pt td{font-family:var(--serif)}
table.pt td.prov{font-family:var(--sans);font-weight:600;white-space:nowrap}
table.pt code{white-space:nowrap}
/* sidenotes column (Tufte) */
.sidenotes{font-family:var(--sans)}
.note{font-size:.8rem;line-height:1.46;color:var(--muted);border-left:1px solid var(--rule);padding-left:13px;margin-bottom:20px}
.note h4{font-family:var(--sans);font-size:.62rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text);margin:0 0 7px}
.note .relrow{margin:3px 0}
.rel-group{margin-bottom:7px}
.rel-group .rl{font-family:var(--sans);font-size:.6rem;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:2px}
.rel-link{display:inline-block;background:none;color:var(--accent);border-radius:0;padding:1px 0;margin:1px 10px 1px 0;font-family:var(--serif);font-size:.92rem;font-weight:500;border-bottom:1px solid var(--accent-weak)}
.rel-link:hover{text-decoration:none;color:var(--text);border-bottom-color:var(--text)}
.rel-dead{display:inline-block;color:var(--faint);padding:1px 0;margin:1px 10px 1px 0;font-family:var(--serif);font-size:.92rem}
.dist{background:none;border:0;border-top:1px solid var(--rule);border-left:0;border-radius:0;padding:9px 0;margin-bottom:0;font-size:.82rem;color:var(--muted)}
.dist:first-of-type{border-top:0}
.dist b{font-family:var(--serif);color:var(--text)} .dist b a{color:var(--text);border:0}
ul.src{margin:0;padding-left:16px;font-size:.8rem;color:var(--muted);font-family:var(--sans)}
ul.src li{margin:4px 0}
.notes{background:var(--surface-2);border-left:3px solid var(--accent);border-radius:0;padding:11px 14px;font-family:var(--serif);font-size:.96rem;color:var(--muted)}
.rel-meta{margin-top:30px;color:var(--faint);font-family:var(--mono);font-size:.72rem;border-top:1px solid var(--rule);padding-top:13px}
/* local mini-map (inline SVG ego graph) */
.minimap{border:1px solid var(--rule);border-radius:0;background:var(--surface);margin-bottom:22px}
.minimap .cap{font-family:var(--sans);font-size:.6rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);padding:6px 10px;border-bottom:1px solid var(--rule)}
.minimap svg{display:block;width:100%;height:auto}
.minimap text{font-family:var(--sans);font-size:8.5px;fill:var(--text)}
.minimap line{stroke:var(--border)}
.minimap line.distln{stroke:var(--accent);stroke-dasharray:3 3}
.minimap .nd{fill:var(--surface);stroke:var(--muted);cursor:pointer}
.minimap .nd:hover{fill:var(--accent-weak)}
.minimap .center{fill:var(--accent);stroke:var(--accent)}
.minimap a{cursor:pointer}

/* search / empty */
.searchmeta{color:var(--muted);font-size:.88rem;margin-bottom:14px;font-family:var(--sans)}
mark{background:var(--accent-weak);color:var(--accent);padding:0 1px;border-radius:0;font-weight:600}
.empty{color:var(--muted);text-align:center;padding:70px 10px;font-family:var(--serif)}

/* index */
.idx-head{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:12px;margin-bottom:6px}
.idx-toggle{display:inline-flex;background:none;border:1px solid var(--border);border-radius:var(--r);padding:0;gap:0;overflow:hidden}
.idx-toggle button{border:0;background:none;color:var(--muted);font-family:var(--sans);font-weight:600;font-size:.78rem;padding:6px 13px;cursor:pointer}
.idx-toggle button.on{background:var(--text);color:var(--paper)}
.idx-bar{position:sticky;top:var(--hh);z-index:5;display:flex;flex-wrap:wrap;gap:3px;padding:11px 0;margin-bottom:8px;background:linear-gradient(var(--paper),var(--paper) 72%,transparent)}
.idx-bar button{width:28px;height:28px;border:1px solid var(--border);background:var(--surface);color:var(--muted);border-radius:var(--r);font-family:var(--mono);font-weight:500;font-size:.78rem;cursor:pointer}
.idx-bar button:hover{background:var(--text);color:var(--paper);border-color:var(--text)}
.idx-group{margin-bottom:20px}
.idx-gh{font-family:var(--serif);font-weight:600;font-size:1.3rem;color:var(--text);padding:5px 0;border-bottom:2px solid var(--text);margin-bottom:6px;display:flex;align-items:center;gap:10px}
.idx-gh .gc{width:10px;height:10px;border-radius:0}
.idx-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:0}
.idx-row{display:flex;align-items:center;gap:11px;padding:7px 8px;border:0;border-bottom:1px solid var(--rule);border-radius:0;cursor:pointer}
.idx-row:hover{background:var(--surface-2);border-color:var(--rule);box-shadow:none;text-decoration:none}
.idx-row .ir-body{min-width:0}
.idx-row .ir-term{font-family:var(--serif);font-weight:600;color:var(--text);font-size:.94rem}
.idx-row .ir-ko{color:var(--faint);font-weight:500;font-size:.84em;font-family:var(--sans)}
.idx-row .ir-cat{color:var(--faint);font-size:.72rem;margin-top:1px;font-family:var(--sans)}

/* graph: quiet monochrome atlas */
.graph-head{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:8px}
.kg-legend{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0 14px}
.legend-item{display:inline-flex;align-items:center;gap:7px;font-family:var(--sans);font-size:.74rem;font-weight:500;border:1px solid var(--border);background:var(--surface);border-radius:var(--r);padding:3px 10px;cursor:pointer;user-select:none}
.legend-item .ld{width:9px;height:9px;border-radius:0}
.legend-item.off{opacity:.35}
.graph-wrap{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:0;box-shadow:none;overflow:hidden}
#kg{display:block;width:100%;touch-action:none;cursor:grab}
#kg:active{cursor:grabbing}
.kg-tip{position:absolute;pointer-events:none;background:var(--text);color:var(--paper);font-family:var(--sans);font-size:.76rem;font-weight:500;padding:5px 9px;border-radius:var(--r);opacity:0;transform:translate(-50%,-130%);transition:opacity .1s;white-space:nowrap;z-index:5;max-width:260px}

/* concept map: top-down layered atlas */
.map-head{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:flex-end;gap:14px;margin-bottom:12px}
.map-sub{font-family:var(--serif);color:var(--muted);font-size:.92rem;line-height:1.6;margin:4px 0 0;max-width:74ch}
.map-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;max-width:100%;min-width:0}
.map-layers{display:grid;grid-template-columns:repeat(6,minmax(176px,1fr));gap:0;overflow-x:auto;max-width:100%;min-width:0}
.map-layer{min-width:176px;background:var(--surface);padding:14px;border-right:1px solid var(--border);border-top:3px solid var(--lc,var(--accent))}
.map-layer:last-child{border-right:0}
.map-layer-head{margin-bottom:10px}
.map-layer h3{font-family:var(--sans);font-size:.84rem;line-height:1.2;margin:0;font-weight:700;color:var(--text)}
.map-layer small{display:block;font-family:var(--sans);color:var(--faint);font-size:.68rem;font-weight:500;margin-top:2px}
.map-terms{display:grid;gap:5px}
.map-term{display:flex;align-items:center;justify-content:space-between;gap:8px;width:100%;border:1px solid var(--border);background:var(--surface);color:var(--text);border-radius:var(--r);padding:6px 8px;text-align:left;cursor:pointer;font-family:var(--sans);font-size:.78rem;font-weight:500;line-height:1.25;transition:.12s}
.map-term:hover{border-color:var(--accent);color:var(--accent)}

.map-info{padding:18px 20px;min-width:0}

.map-info h2{font-family:var(--serif);font-size:1.5rem;line-height:1.12;margin:0;color:var(--text)}
.map-ko{font-family:var(--sans);color:var(--muted);font-size:.9rem;margin:2px 0 8px}
.map-info p{font-family:var(--serif);margin:8px 0;color:var(--muted);line-height:1.6}
.map-relgrid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-top:14px}
.map-relbox{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r);padding:11px;min-height:84px}
.map-relbox h4{font-family:var(--sans);font-size:.68rem;text-transform:uppercase;letter-spacing:.08em;color:var(--faint);margin:0 0 7px}
.map-relbox a{display:block;font-family:var(--serif);color:var(--text);font-size:.86rem;line-height:1.3;margin:5px 0}
.map-relbox a:hover{color:var(--accent);text-decoration:none}
.map-aside{border-left:1px solid var(--border);background:var(--surface-2);padding:16px 18px}

.map-domain{display:flex;align-items:center;justify-content:space-between;gap:10px;border-bottom:1px solid var(--border);padding:7px 0;font-family:var(--sans);font-size:.8rem}

@media (max-width:980px){.map-detail{grid-template-columns:1fr}.map-aside{border-left:0;border-top:1px solid var(--border)}.map-relgrid{grid-template-columns:1fr}}

/* life-of flows: swimlane sequence journeys */
.lf-head{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:flex-end;gap:14px;margin-bottom:8px}
.lf-toolbar{display:flex;flex-wrap:wrap;gap:8px 12px;align-items:center}
.lf-seg-label{font-family:var(--sans);font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--faint)}
.lf-seg{display:inline-flex;border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.lf-seg button{border:0;border-right:1px solid var(--border);background:var(--surface);color:var(--muted);font-family:var(--sans);font-weight:600;font-size:.8rem;padding:6px 13px;cursor:pointer;transition:.12s}
.lf-seg button:last-child{border-right:0}
.lf-seg button:hover{color:var(--accent)}
.lf-seg button.on{background:var(--accent);color:var(--paper)}
.lf-meta{font-family:var(--serif);color:var(--muted);font-size:.95rem;line-height:1.6;margin:6px 0 8px;max-width:84ch}
.lf-bounds{font-family:var(--mono);font-size:.74rem;color:var(--faint);margin:0 0 6px}
.lf-bounds b{color:var(--muted);font-weight:500}
.lf-legend{display:flex;flex-wrap:wrap;gap:14px;margin:0 0 12px;font-family:var(--sans);font-size:.72rem;color:var(--muted)}
.lf-lg{display:inline-flex;align-items:center;gap:7px}
.lf-lg::before{content:"";width:22px;height:0;border-top:2px solid var(--muted)}
.lf-lg-res::before{border-top-style:dashed}
.lf-lg-asy::before{border-top-style:dotted}
.lf-stage{display:grid;grid-template-columns:minmax(0,1fr) clamp(258px,28%,340px);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;background:var(--surface)}
.lf-diagram{min-width:0;overflow-x:auto;padding:8px 6px;border-right:1px solid var(--border)}
.lf-svg{display:block;width:100%;height:auto;min-width:540px}
.lf-actor{font-family:var(--sans);font-size:11px;font-weight:700;fill:var(--text)}
.lf-life{stroke:var(--border);stroke-width:1;stroke-dasharray:2 4}
.lf-rowbg{fill:transparent;transition:fill .1s}
.lf-hit{fill:transparent;cursor:pointer}
.lf-step:hover .lf-rowbg{fill:color-mix(in srgb,var(--surface-2) 70%,transparent)}
.lf-step.on .lf-rowbg{fill:var(--accent-weak)}
.lf-line{stroke:var(--muted);stroke-width:1.4;fill:none}
.lf-arrow{fill:var(--muted)}
.lf-step.on .lf-line{stroke:var(--accent);stroke-width:2}
.lf-step.on .lf-arrow{fill:var(--accent)}
.lf-num{font-family:var(--mono);font-size:11px;fill:var(--faint)}
.lf-step.on .lf-num{fill:var(--accent);font-weight:700}
.lf-msg{font-family:var(--sans);font-size:10.5px;fill:var(--muted)}
.lf-step.on .lf-msg{fill:var(--text)}
.lf-inspector{padding:16px 18px;background:var(--surface-2);min-width:0}
.lf-insp-n{font-family:var(--mono);font-size:.72rem;color:var(--faint);margin-bottom:4px}
.lf-insp-route{font-family:var(--sans);font-size:.84rem;font-weight:600;color:var(--text);margin-bottom:6px}
.lf-insp-route .lf-request,.lf-insp-route .lf-response,.lf-insp-route .lf-async,.lf-li-ar{color:var(--accent);font-weight:700;padding:0 3px}
.lf-inspector h3{font-family:var(--serif);font-size:1.12rem;margin:0 0 6px;color:var(--text)}
.lf-insp-msg{margin:0 0 8px}
.lf-inspector code,.lf-li-act code{font-family:var(--mono);font-size:.76rem;background:var(--surface);border:1px solid var(--border);border-radius:2px;padding:1px 5px;color:var(--accent)}
.lf-inspector p{font-family:var(--serif);font-size:.92rem;line-height:1.55;color:var(--muted);margin:8px 0}
.lf-insp-note{font-style:italic;color:var(--faint)}
.lf-inspector h4{font-family:var(--sans);font-size:.64rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--faint);margin:14px 0 6px}
.lf-insp-terms a,.lf-insp-rel a,.lf-li-terms a{display:inline-block;font-family:var(--serif);color:var(--accent);font-size:.88rem;margin:1px 12px 1px 0;border-bottom:1px solid var(--accent-weak)}
.lf-insp-terms a:hover,.lf-insp-rel a:hover,.lf-li-terms a:hover{text-decoration:none;color:var(--text);border-bottom-color:var(--text)}
/* mobile message log (hidden on desktop) */
.lf-log{display:none;list-style:none;margin:14px 0 0;padding:0;border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.lf-log li{padding:12px 14px;border-bottom:1px solid var(--rule)}
.lf-log li:last-child{border-bottom:0}
.lf-li-h{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:5px}
.lf-li-n{font-family:var(--mono);font-size:.74rem;color:var(--accent);font-weight:700}
.lf-badge{font-family:var(--sans);font-size:.7rem;font-weight:600;color:var(--text);background:var(--surface-2);border:1px solid var(--border);border-radius:999px;padding:1px 9px}
.lf-li-act{font-family:var(--sans);font-weight:600;font-size:.9rem;color:var(--text)}
.lf-li-desc{font-family:var(--serif);font-size:.86rem;line-height:1.5;color:var(--muted);margin-top:3px}
.lf-li-terms{margin-top:6px}
@media (max-width:860px){
  .lf-stage{display:none}
  .lf-log{display:block}
}

/* distribution flow (classroom overhaul) */
.flow-verticals{display:flex;gap:6px;flex-wrap:wrap;margin:0 0 14px}
.flow-vtab{padding:8px 16px;border:1px solid var(--border);background:var(--surface);color:var(--muted);border-radius:var(--r);cursor:pointer;font-family:var(--sans);font-weight:600;font-size:0.86rem;transition:.15s}
.flow-vtab:hover:not(.active){color:var(--text);border-color:var(--muted)}
.flow-vtab.active{color:var(--paper);border-color:transparent}
.flow-intro{font-family:var(--serif);font-size:0.96rem;line-height:1.65;color:var(--muted);margin:0 0 16px;padding:12px 16px;border-left:3px solid var(--accent);background:var(--surface-2);border-radius:0 var(--r) var(--r) 0}
.flow-page{box-sizing:border-box}
.flow-board{display:flex;gap:0;align-items:flex-start;padding:6px 0 20px}
.flow-stage{flex:1 1 0;min-width:0;display:flex;flex-direction:column;background:var(--surface);border:1px solid var(--border);border-top:3px solid var(--accent);border-radius:var(--r);padding:14px;transition:.18s}
.flow-stage:hover{box-shadow:0 4px 18px rgba(0,0,0,.10);transform:translateY(-2px)}
.flow-stage-head{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.flow-stage-num{font-family:var(--mono);font-size:0.7rem;font-weight:700;color:var(--paper);width:20px;height:20px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;flex:0 0 auto}
.flow-stage-ico{font-size:1.02rem;line-height:1}
.flow-stage-title{font-family:var(--sans);font-weight:700;font-size:0.92rem;color:var(--text);margin:0}
.flow-stage-desc{font-family:var(--serif);font-size:0.82rem;line-height:1.5;color:var(--muted);margin:0 0 10px}
.flow-actors{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.flow-actor{font-family:var(--sans);font-size:0.68rem;font-weight:600;color:var(--text);background:var(--surface-2);border:1px dashed var(--border);border-radius:999px;padding:2px 8px}
.flow-terms{display:flex;flex-direction:column;gap:5px;margin-top:auto}
.flow-term{display:flex;align-items:baseline;gap:7px;padding:6px 8px;border:1px solid var(--border);border-left:3px solid var(--cc,var(--accent));border-radius:var(--r);background:var(--surface);cursor:pointer;text-decoration:none;transition:.13s}
.flow-term:hover{background:var(--surface-2);transform:translateX(2px)}
.flow-term .ft-abbr{font-family:var(--mono);font-size:0.64rem;font-weight:700;color:var(--cc,var(--accent));white-space:nowrap}
.flow-term .ft-name{font-family:var(--sans);font-size:0.75rem;font-weight:500;color:var(--text);line-height:1.25}
.flow-arrow{flex:0 0 52px;align-self:flex-start;margin-top:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);gap:5px;padding:0 3px}
.flow-arrow .fa-line{font-size:1.35rem;line-height:1;color:var(--accent)}
.flow-arrow .fa-lab{font-family:var(--sans);font-size:0.58rem;font-weight:600;text-align:center;color:var(--muted);white-space:normal;word-break:keep-all;line-height:1.3}
.flow-postsale{margin:6px 0 4px;border:1px dashed var(--accent);border-left:3px solid var(--accent);border-radius:var(--r);background:var(--surface-2);padding:12px 16px}
.flow-postsale:empty{display:none}
.flow-ps-head{font-family:var(--sans);font-size:0.84rem;color:var(--text);margin-bottom:9px}
.flow-ps-head strong{font-weight:700}
.flow-ps-head .flow-ps-desc{font-family:var(--serif);font-weight:400;font-size:0.82rem;color:var(--muted)}
.flow-ps-terms{display:flex;flex-wrap:wrap;gap:6px}
.flow-ps-terms .flow-term{flex:0 1 auto}
.flow-foundation{margin:20px 0 28px;border:1px dashed var(--border);border-radius:var(--r);background:var(--surface-2);padding:16px}
.flow-foundation h4{font-family:var(--sans);font-weight:700;font-size:0.9rem;margin:0 0 4px;color:var(--text)}
.flow-foundation .ff-sub{font-family:var(--serif);font-size:0.82rem;color:var(--muted);margin:0 0 14px}
.flow-foundation-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.flow-fcat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;border-top:3px solid var(--cc,var(--accent))}
.flow-fcat-h{font-family:var(--sans);font-weight:700;font-size:0.8rem;color:var(--text);margin:0 0 8px}
.flow-fchips{display:flex;flex-wrap:wrap;gap:5px}
.flow-fchip{font-family:var(--sans);font-size:0.7rem;font-weight:600;color:var(--text);background:var(--surface-2);border:1px solid var(--border);border-radius:999px;padding:2px 9px;cursor:pointer;text-decoration:none;transition:.13s;white-space:nowrap}
.flow-fchip:hover{border-color:var(--cc,var(--accent));color:var(--cc,var(--accent))}
@media (max-width:920px){
  .flow-board{flex-direction:column;flex:0 0 auto;min-height:0}
  .flow-stage{flex:1 1 auto;min-width:0;width:100%}
  .flow-stage-desc{min-height:0}
  .flow-arrow{flex:0 0 auto;flex-direction:row;align-self:auto;margin-top:0;padding:6px 0;gap:6px}
  .flow-arrow .fa-lab{text-align:left;white-space:nowrap}
}

/* tech & APIs reference page */
.tech-intro{font-family:var(--serif);font-size:0.98rem;line-height:1.65;color:var(--muted);margin:0 0 22px;max-width:78ch}
.tech-sec{margin:0 0 30px}
.tech-sec-h{font-family:var(--sans);font-weight:700;font-size:1.0rem;color:var(--text);margin:0 0 4px;display:flex;align-items:center;gap:8px}
.tech-sec-h .ts-dot{width:10px;height:10px;border-radius:0;flex:none}
.tech-sec-sub{font-family:var(--serif);font-size:0.84rem;color:var(--muted);margin:0 0 14px}
.tech-arch{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.tech-arch-card{background:var(--surface);border:1px solid var(--border);border-top:3px solid var(--cc,var(--accent));border-radius:var(--r);padding:15px}

.tech-pipe{display:flex;flex-wrap:wrap;align-items:center;gap:5px}
.tech-pipe a{font-family:var(--mono);font-size:0.68rem;font-weight:600;color:var(--cc,var(--accent));background:var(--surface-2);border:1px solid var(--border);border-radius:999px;padding:2px 9px;text-decoration:none;white-space:nowrap}
.tech-pipe a:hover{border-color:var(--cc,var(--accent))}
.tech-pipe .tp-arr{color:var(--faint);font-size:0.8rem}
.tech-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px}
.tech-card{background:var(--surface);border:1px solid var(--border);border-top:3px solid var(--cc,var(--accent));border-radius:var(--r);padding:14px 15px;display:flex;flex-direction:column}
.tech-card-h{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:6px}
.tech-card-name{font-family:var(--sans);font-weight:700;font-size:0.92rem;color:var(--text)}
.tech-card-name .tc-ko{font-family:var(--sans);font-weight:500;font-size:0.74rem;color:var(--muted);margin-left:5px}
.tech-card-term{font-family:var(--mono);font-size:0.64rem;font-weight:600;color:var(--cc,var(--accent));border:1px solid var(--cc,var(--accent));border-radius:var(--r);padding:1px 6px;text-decoration:none;white-space:nowrap;flex:none}
.tech-card-term:hover{background:var(--cc,var(--accent));color:var(--paper)}
.tech-card-blurb{font-family:var(--serif);font-size:0.83rem;line-height:1.5;color:var(--muted);margin:0 0 11px;flex:1}
.tech-links{display:flex;flex-wrap:wrap;gap:6px;margin-top:auto}
.tech-link{font-family:var(--sans);font-size:0.72rem;font-weight:600;color:var(--text);background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r);padding:3px 9px;text-decoration:none;display:inline-flex;align-items:center;gap:4px}
.tech-link:hover{border-color:var(--accent);color:var(--accent)}
.tech-link .tl-ext{font-size:0.62rem;opacity:.6}
footer{color:var(--faint);font-family:var(--sans);font-size:.76rem;text-align:center;padding:24px;border-top:1px solid var(--rule);margin-top:30px}

@media (max-width:980px){
  .term-grid{grid-template-columns:1fr;gap:0}
  .sidenotes{margin-top:24px;border-top:2px solid var(--text);padding-top:18px}
}
@media (max-width:880px){
  :root{--side:0px}
  .menu-toggle{display:inline-flex;align-items:center;justify-content:center;order:-1}
  aside.nav{position:fixed;left:0;top:var(--hh);width:272px;z-index:35;transform:translateX(-100%);transition:transform .2s;border-right:1px solid var(--border)}
  body.nav-open aside.nav{transform:translateX(0)}
  .shell{grid-template-columns:1fr}
  .searchwrap .hint{display:none}.brand small{display:none}
  .idx-bar{top:var(--hh)}
  .scrim{display:none;position:fixed;inset:var(--hh) 0 0 0;background:rgba(0,0,0,.35);z-index:34}
  body.nav-open .scrim{display:block}
}
/* home directory v2 (sample terms) */
.card{cursor:default;padding-bottom:16px}
.card:hover{background:none}
.card .ct{display:flex;align-items:center;gap:9px;text-decoration:none;font-family:var(--serif);font-weight:600;font-size:1.05rem;color:var(--text)}
.card .ct:hover{color:var(--accent);text-decoration:none}
.card .ct .dot{width:9px;height:9px;border-radius:0;flex:none}
.card .ct .cn{margin-left:auto;margin-top:0;font-family:var(--mono);font-size:.74rem;font-weight:500;color:var(--faint)}
.card .cd{margin-top:6px;font-size:.83rem}
.dir-terms{font-size:.86rem;margin-top:9px;line-height:1.7}
.dir-terms a{color:var(--text)}
.dir-terms a:hover{color:var(--accent)}
.dir-terms .sep{color:var(--faint);margin:0 6px}
.dir-terms .more{color:var(--accent);font-family:var(--mono);font-size:.74rem}

/* Sliding Side Drawer Styles */
.drawer {
  position: fixed;
  top: var(--hh);
  right: 0;
  width: 480px;
  max-width: calc(100vw - var(--side));
  height: calc(100vh - var(--hh));
  background: var(--surface);
  border-left: 1px solid var(--border);
  box-shadow: -4px 0 24px rgba(0, 0, 0, 0.08);
  transform: translateX(100%);
  transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
  z-index: 50;
  display: flex;
  flex-direction: column;
}
.drawer.open {
  transform: translateX(0);
}
.drawer-header {
  padding: 24px;
  border-bottom: 1px solid var(--rule);
  position: relative;
}
.drawer-close {
  position: absolute;
  top: 20px;
  right: 20px;
  background: none;
  border: 0;
  font-size: 28px;
  color: var(--muted);
  cursor: pointer;
  line-height: 1;
}
.drawer-close:hover {
  color: var(--accent);
}
.drawer-title-area h2 {
  font-family: var(--serif);
  font-size: 1.6rem;
  margin: 0 0 4px;
  color: var(--text);
}
.drawer-body {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
}
.drawer-section {
  margin-bottom: 28px;
}
.drawer-section h3 {
  font-family: var(--sans);
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--muted);
  margin: 0 0 10px;
  border-bottom: 1px solid var(--rule);
  padding-bottom: 4px;
}
.def-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 8px;
}
.def-header h3 {
  border-bottom: none;
  padding-bottom: 0;
  margin: 0;
}
.drawer-footer {
  padding: 14px 24px;
  background: var(--surface-2);
  border-top: 1px solid var(--rule);
  font-family: var(--mono);
  font-size: 0.72rem;
  color: var(--faint);
}
/* Ancestor path highlight */
.mmn.ancestor-highlight rect {
  stroke: #ff007f !important;
  stroke-width: 3px !important;
  filter: drop-shadow(0 0 6px rgba(255, 0, 127, 0.6));
}
.mmsvg-link-path.ancestor-highlight {
  stroke: #ff007f !important;
  stroke-width: 3px !important;
  stroke-opacity: 1 !important;
  filter: drop-shadow(0 0 4px rgba(255, 0, 127, 0.5));
}
/* mindmap card styling */
.mmn-card {
  transition: transform 0.2s ease;
  transform-box: fill-box;
  transform-origin: center;
}
g.mmn:hover .mmn-card {
  transform: scale(1.05);
}
g.mmn rect {
  transition: stroke-width 0.2s, stroke 0.2s, fill 0.2s;
}
g.mmn:hover rect,
g.mmn.focused rect {
  stroke: var(--accent) !important;
  stroke-width: 2px !important;
}
</style>

<body>
<header class="top">
  <button class="menu-toggle" id="menuBtn" aria-label="menu">☰</button>
  <a class="brand" href="#/" aria-label="Travel Wiki"><span class="globe"></span><span>Travel Wiki<small id="brandSub">여행 산업 용어 편람</small></span></a>
  <div class="searchwrap" role="search">
    <span class="mag" aria-hidden="true">🔎</span>
    <input id="q" type="search" placeholder="용어 검색…" aria-label="search" autocomplete="off">
    <span class="hint">/</span>
  </div>
  <div class="actions">
    <button class="tbtn" id="langBtn" title="한국어 / English">KO</button>
    <button class="tbtn" id="themeBtn" aria-label="theme" title="light/dark">◐</button>
  </div>
</header>

<div class="shell">
  <aside class="nav" id="sidebar" aria-label="nav"></aside>
  <div class="scrim" id="scrim"></div>
  <main id="main" tabindex="-1"></main>
  
</div>

<!-- Sliding Side Drawer -->
<div id="drawer" class="drawer">
  <div class="drawer-header">
    <button class="drawer-close" id="drawerClose" aria-label="Close drawer">&times;</button>
    <div class="drawer-title-area">
      <div style="display:flex; justify-content:space-between; align-items:flex-start;">
        <h2 id="drawerTitle" style="margin:0;"></h2>
        <button class="tbtn" id="drawerLangBtn" style="margin-left:12px; flex-shrink:0;">KO</button>
      </div>
      <div id="drawerSub" class="term-sub" style="margin-top:4px;"></div>
      <div class="badges" id="drawerBadges" style="margin-top:8px;"></div>
    </div>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
  <div class="drawer-footer" id="drawerFooter"></div>
</div>

<script id="glossary-data" type="application/json">__GLOSSARY_DATA__</script>
<script>
"use strict";
(function(){
  const RAW = JSON.parse(document.getElementById('glossary-data').textContent);
  window.GLOSSARY_DATA = RAW;
  const META = RAW.meta||{}, CATS = RAW.categories||[], ENTRIES = RAW.entries||[];
  const VERTICALS = RAW.verticals||[];
  const vertById = new Map(VERTICALS.map(v=>[v.id,v]));
  const vertName = v => LANG==='ko' ? (v.short||v.title) : (v.title||v.short);
  const catsByVert = new Map(VERTICALS.map(v=>[v.id, CATS.filter(c=>c.vertical===v.id)]));
  const PRIMARY_TIERS = new Set(['regulation','standard-body','regulator-guidance','association','vendor-doc']);
  const byId = new Map(ENTRIES.map(e=>[e.id,e]));
  const catById = new Map(CATS.map(c=>[c.id,c]));
  const entriesByCat = new Map(CATS.map(c=>[c.id,[]]));
  ENTRIES.forEach(e=>{ (entriesByCat.get(e.category)||entriesByCat.set(e.category,[]).get(e.category)).push(e); });
  entriesByCat.forEach(arr=>arr.sort((a,b)=>a.term.localeCompare(b.term)));

  let mmLayoutMode = 'horizontal';
  const mmExpandedNodeIds = new Set();
  window.mmSelectedNode = null;
  window.kgFocusedNodeId = null;
  window.kgHoveredNodeId = null;
  window.kgSearchedNodeIds = null;

  const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const $ = sel => document.querySelector(sel);
  const main = $('#main');

  /* i18n */
  let LANG='ko'; try{ const s=localStorage.getItem('tg-lang'); if(s==='ko'||s==='en') LANG=s; }catch(_){}
  const T = {
    ko:{ sub:'여행 산업 용어 백과사전', searchPh:'용어 검색 (예: PNR, RBD, codeshare, 운임)…',
      enc:'백과사전', home:'🏠 홈', cats:'카테고리', graph:'🕸 관계 그래프', index:'📇 전체 색인',
      heroT:'여행 산업 용어, 하나의 사전으로', heroB:'항공·호텔·유통·정산·표준에 흩어진 용어를 <b>공급자/표준 간 통일</b>해 정리한 백과사전. 같은 개념의 서로 다른 이름을 한자리에서 비교하고, 용어별 일러스트·관계 그래프·전체 색인으로 탐색하세요.',
      sTerms:'표제어', sCats:'카테고리', sProv:'공급자/표준', sSrc:'출처 인용',
      confT:'⚠️ 헷갈리기 쉬운 용어', secCats:'카테고리', openGraph:'관계 그래프', openIndex:'전체 색인',
      terms:n=>`${n}개 표제어`, home2:'홈', search:'검색',
      fAlias:'다른 표기 · 동의어', fProv:'공급자/표준별 대응어', fRel:'관련 용어', fDist:'혼동 주의 (구분)', fNotes:'편집 노트', fSrc:'출처',
      thProv:'공급자·표준', thTerm:'용어', thRel:'관계', thCtx:'설명',
      mId:'ID', mCat:'카테고리', mRev:'검토일',
      results:(q,n)=>`"<b>${esc(q)}</b>" 검색 결과 <b>${n}</b>건`, noRes:'결과가 없습니다. 다른 키워드(약어/영문/한글)를 시도해 보세요.',
      notFound:'표제어를 찾을 수 없습니다', toHome:'홈으로',
      disc:`정의는 공개 산업 표준(IATA·ATPCO·OpenTravel·HTNG·ISO 등) 및 공급자 문서를 근거로 한 편집 요약이며, 중요한 의사결정 전 1차 출처로 검증하시기 바랍니다. 마지막 갱신: ${esc(META.generatedAt||'')}.`,
      gTitle:'용어 관계 그래프', gNodes:'노드', gEdges:'관계',
      gHint:'노드를 클릭하면 주변 관계가 확장되며, 이미 확장된 노드를 다시 클릭하면 용어 상세 페이지로 이동합니다. 외곽 점선 링 = 미확장 이웃 있음.',
      mapTitle:'개념 지도', mapSub:'업무 흐름을 상위 구조로 놓고 핵심 용어를 단계별로 배치합니다. 용어를 선택하면 상위·하위·관련/혼동 관계가 함께 정리됩니다.',
      mapOpen:'상세 보기', mapUp:'상위 · 기반', mapDown:'하위 · 결과', mapNear:'관련 · 혼동', mapDomains:'도메인 분포', mapTerms:n=>`+${n}개 더`,
      flowsTitle:'여정 플로', flowArtifact:'추적 대상', flowStep:'단계', flowRelated:'관련 플로',
      idxTitle:'전체 색인', idxAZ:'가나다·ABC', idxByCat:'카테고리별', idxAll:n=>`전체 ${n}개 표제어`,
      RLAB:{sameAs:'같음',broader:'상위 개념',narrower:'하위 개념',parent:'부모',child:'자식',related:'관련',conflicts:'충돌',replaces:'대체',contrasts:'대비'},
      ST:{active:'활성',deprecated:'폐지/레거시',ambiguous:'중의적'},
      CT:{acronym:'약어',"standard-term":'표준 용어',standard:'표준',"business-term":'업무 용어',"provider-term":'공급자 용어',code:'코드',metric:'지표',process:'프로세스',role:'역할',document:'문서'},
      PR:{same:'같음',narrower:'하위',broader:'상위',related:'관련',conflicting:'충돌'},
      classroom:'🔄 유통 구조', classroomPh:'상품이 공급자에서 여행자에게 이르는 전체 유통·예약·이용 흐름을 버티컬별로 따라가며, 각 단계의 핵심 용어를 사전과 연결해 배치했습니다.',
      flowFoundationH:'공통 기반 레이어 (Cross-industry)', flowFoundationP:'아래 영역은 모든 버티컬의 전 단계를 떠받치는 산업 공통 기반입니다. 결제·정산, 유통 표준, 식별자, 고객, 승객권리·규제, 보험, 지속가능성이 유통 흐름 전반에 함께 작동합니다.',
      btnBack:'이전 단계', btnNext:'다음 단계', btnFinish:'학습 완료', btnRestart:'다시 학습',
      verticalAir:'항공 (Air)',
      verticalHotel:'호텔 (Hotel)',
      verticalCruise:'크루즈 (Cruise)',
      verticalCommon:'공통/규격 (Common)',
      levelBasic:'기본 과정 (Basic)',
      levelAdvanced:'심화 과정 (Advanced)',
      quizCorrect:'정답입니다! 🎉',
      quizIncorrect:'오답입니다. 다시 한 번 생각해보세요.' },
    en:{ sub:'Travel-Industry Terminology', searchPh:'Search terms (e.g., PNR, RBD, codeshare, fare)…',
      enc:'Encyclopedia', home:'🏠 Home', cats:'Categories', graph:'🕸 Knowledge Graph', index:'📇 Full Index',
      heroT:'Travel-industry terms, unified in one reference', heroB:'An encyclopedia that <b>unifies terminology across providers and standards</b> spread over air, hotel, distribution, settlement and specs. Compare names for one concept, and explore with per-term illustrations, a knowledge graph, and a full index.',
      sTerms:'Terms', sCats:'Categories', sProv:'Providers/Standards', sSrc:'Source citations',
      confT:'⚠️ Easily-confused terms', secCats:'Categories', openGraph:'Knowledge Graph', openIndex:'Full Index',
      terms:n=>`${n} terms`, home2:'Home', search:'Search',
      fAlias:'Aliases & variants', fProv:'Provider / standard equivalents', fRel:'Related terms', fDist:'Distinctions (do not confuse)', fNotes:"Editor's note", fSrc:'Sources',
      thProv:'Provider · Standard', thTerm:'Term', thRel:'Relation', thCtx:'Note',
      mId:'ID', mCat:'Category', mRev:'Reviewed',
      results:(q,n)=>`<b>${n}</b> result(s) for "<b>${esc(q)}</b>"`, noRes:'No results. Try another keyword.',
      notFound:'Term not found', toHome:'Back to home',
      disc:`Definitions are editorial summaries grounded in public industry standards (IATA, ATPCO, OpenTravel, HTNG, ISO, etc.) and provider docs; verify against primary sources before critical decisions. Last updated: ${esc(META.generatedAt||'')}.`,
      gTitle:'Term Knowledge Graph', gNodes:'nodes', gEdges:'links',
      gHint:'Click a node to expand its relationships. Click it again when expanded to view details. Dashed outer ring = has hidden neighbors.',
      mapTitle:'Concept Map', mapSub:'Places core terms into a business-flow hierarchy first, then shows upstream, downstream, related and distinction links for the selected term.',
      mapOpen:'Open detail', mapUp:'Upstream / base', mapDown:'Downstream / output', mapNear:'Related / confused', mapDomains:'Domain mix', mapTerms:n=>`+${n} more`,
      flowsTitle:'Journey Flows', flowArtifact:'Artifact traced', flowStep:'Step', flowRelated:'Related flows',
      idxTitle:'Full Index', idxAZ:'A–Z', idxByCat:'By category', idxAll:n=>`${n} terms total`,
      RLAB:{sameAs:'Same as',broader:'Broader',narrower:'Narrower',parent:'Parent',child:'Child',related:'Related',conflicts:'Conflicts',replaces:'Replaces',contrasts:'Contrasts'},
      ST:{active:'Active',deprecated:'Deprecated',ambiguous:'Ambiguous'},
      CT:{acronym:'Acronym',"standard-term":'Standard term',standard:'Standard',"business-term":'Business term',"provider-term":'Provider term',code:'Code',metric:'Metric',process:'Process',role:'Role',document:'Document'},
      PR:{same:'Same',narrower:'Narrower',broader:'Broader',related:'Related',conflicting:'Conflicting'},
      classroom:'🔄 Distribution', classroomPh:'Follow how each travel product flows from supplier to traveler — distribution, booking and fulfillment — with the key terms of every stage linked to the glossary.',
      flowFoundationH:'Cross-industry foundation', flowFoundationP:'These layers underpin every stage of every vertical: payments & settlement, distribution standards, identifiers, customer, passenger-rights & compliance, insurance and sustainability all operate across the entire distribution flow.',
      btnBack:'Back', btnNext:'Next Step', btnFinish:'Finish', btnRestart:'Restart',
      verticalAir:'Air',
      verticalHotel:'Hotel',
      verticalCruise:'Cruise',
      verticalCommon:'Common & Standards',
      levelBasic:'Basic Level',
      levelAdvanced:'Advanced Level',
      quizCorrect:'Correct! 🎉',
      quizIncorrect:'Incorrect. Please try again.' },
  };
  const t = k => (T[LANG] && T[LANG][k]!==undefined) ? T[LANG][k] : T.en[k];
  const Lf = (e,f) => { if(LANG==='ko'){ const v=e[f+'_ko']; if(v&&String(v).trim()) return v; } return e[f]||''; };
  const catName = c => LANG==='ko' ? (c.short||c.title) : c.title;
  const catDesc = c => LANG==='ko' ? (c.desc||'') : (c.desc_en||c.desc||'');

  /* icons */
  const safeSvg = s => (s && /<svg/i.test(s) && !/<script|javascript:|on\w+\s*=/i.test(s)) ? s : '';
  function iconHTML(e, cls){ const c=catById.get(e.category)||{}; const s=safeSvg(e.icon);
    const inner = s || `<svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2"><circle cx="24" cy="24" r="15"/><path d="M9 24h30M24 9v30"/></svg>`;
    return `<span class="icon ${cls||''}" style="color:${c.color||'var(--accent)'}">${inner}</span>`; }

  /* search index */
  const FIELDW={term:10,abbr:9,alias:6,prov:5,cat:2,def:1};
  // Korean phonetic / common-query -> canonical token (no deps). e.g. "피엔알" -> PNR
  const ROMA={'피엔알':'pnr','지디에스':'gds','엔디씨':'ndc','오타':'ota','이엠디':'emd','코드셰어':'codeshare','코드쉐어':'codeshare','인터라인':'interline','오버부킹':'overbooking','초과예약':'overbooking','중복예약':'overbooking','운임':'fare','좌석':'seat','환불':'refund','발권':'ticket','예약':'booking','수하물':'baggage','마일리지':'mileage','제휴':'alliance','크루즈':'cruise','렌터카':'car','철도':'rail','베드뱅크':'bedbank','채널매니저':'channel'};
  // bounded Levenshtein: true iff edit distance <= 1
  const lev1=(a,b)=>{ const la=a.length,lb=b.length; if(Math.abs(la-lb)>1) return false; if(a===b) return true;
    let i=0,j=0,diff=0; while(i<la&&j<lb){ if(a[i]===b[j]){i++;j++;} else { if(++diff>1) return false; if(la>lb)i++; else if(lb>la)j++; else {i++;j++;} } }
    if(i<la||j<lb) diff++; return diff<=1; };
  const idx = ENTRIES.map(e=>{ const fields=[]; const words=new Set(); const push=(t,w)=>{ if(t){ const s=String(t).toLowerCase(); fields.push({t:s,w}); if(w>=FIELDW.alias) s.split(/[^a-z0-9가-힣]+/).forEach(x=>{ if(x.length>=3) words.add(x); }); } };
    push(e.term,FIELDW.term); push(e.term_ko,FIELDW.term); push(e.abbreviation,FIELDW.abbr);
    (e.aliases||[]).forEach(a=>push(a,FIELDW.alias)); (e.providerTerms||[]).forEach(p=>push(p.term,FIELDW.prov));
    const c=catById.get(e.category)||{}; push(c.title,FIELDW.cat); push(c.short,FIELDW.cat);
    push(e.definition,FIELDW.def); push(e.definition_ko,FIELDW.def);
    return {e,fields,words:[...words],term:e.term.toLowerCase(),abbr:(e.abbreviation||'').toLowerCase()}; });
  function search(qraw){ const q=qraw.trim().toLowerCase(); if(!q) return [];
    const toks=q.split(/[^a-z0-9가-힣]+/i).filter(Boolean); if(!toks.length) return []; const out=[];
    for(const row of idx){ let score=0;
      if(row.term===q) score+=100; if(row.abbr&&row.abbr===q) score+=90; if(row.term.startsWith(q)) score+=40;
      let ok=true;
      for(const tok of toks){ const cands=ROMA[tok]?[tok,ROMA[tok]]:[tok]; let best=0;
        for(const ct of cands){ for(const f of row.fields){ if(f.t===ct) best=Math.max(best,f.w*3);
          else if(f.t.startsWith(ct)) best=Math.max(best,f.w*2); else if(f.t.includes(ct)) best=Math.max(best,f.w); } }
        if(best===0 && tok.length>=4){ for(const w of row.words){ if(lev1(tok,w)){ best=FIELDW.alias; break; } } }  // typo-tolerant fallback
        if(best===0){ ok=false; break; } score+=best; }
      if(ok && score>0) out.push({e:row.e,score}); }
    out.sort((a,b)=> b.score-a.score || a.e.term.localeCompare(b.e.term)); return out.slice(0,60); }
  const hl=(text,q)=>{ if(!q) return esc(text); const toks=q.trim().toLowerCase().split(/[^a-z0-9가-힣]+/i).filter(Boolean); let s=esc(text);
    toks.forEach(tk=>{ if(tk.length<2) return; s=s.replace(new RegExp('('+tk.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig'),'<mark>$1</mark>'); }); return s; };

  /* sidebar */
  function renderSidebar(activeCat){ const dot=c=>`<span class="dot" style="background:${c.color||'var(--accent)'}"></span>`; const h2=location.hash;
    let h=`<div class="nav-title">${esc(t('enc'))}</div>
      <a class="cat-link${(h2==='#/'||!h2)?' active':''}" href="#/">${t('home')}</a>
      <a class="cat-link${h2.startsWith('#/index')?' active':''}" href="#/index">${t('index')}</a>
      <a class="cat-link${h2.startsWith('#/mindmap')?' active':''}" href="#/mindmap">${LANG==='ko'?'🧠 마인드맵':'🧠 Mindmap'}</a>
      <a class="cat-link${h2.startsWith('#/map')?' active':''}" href="#/map">${LANG==='ko'?'🗺 개념 지도':'🗺 Concept map'}</a>
      <a class="cat-link${h2.startsWith('#/flows')?' active':''}" href="#/flows">${LANG==='ko'?'🛤 여정 플로':'🛤 Journey flows'}</a>
      <a class="cat-link${h2.startsWith('#/classroom')?' active':''}" href="#/classroom">${t('classroom')}</a>
      <a class="cat-link${h2.startsWith('#/tech')?' active':''}" href="#/tech">${LANG==='ko'?'🛠 기술 레퍼런스':'🛠 Tech & APIs'}</a>
      <a class="cat-link${h2.startsWith('#/confusables')?' active':''}" href="#/confusables">${LANG==='ko'?'⚖ 혼동 용어':'⚖ Confusables'}</a>
      <a class="cat-link${h2.startsWith('#/matrix')?' active':''}" href="#/matrix">${LANG==='ko'?'▦ 공급자 매트릭스':'▦ Provider matrix'}</a>
      <div class="nav-title">${LANG==='ko'?'버티컬':'Verticals'} (${VERTICALS.length})</div>`;
    if(VERTICALS.length){
      VERTICALS.forEach(v=>{ const vcats=catsByVert.get(v.id)||[]; if(!vcats.length) return;
        const vn=vcats.reduce((a,c)=>a+(entriesByCat.get(c.id)||[]).length,0);
        h+=`<a class="cat-link${h2==='#/vertical/'+v.id?' active':''}" href="#/vertical/${v.id}" style="font-weight:700"><span><span class="dot" style="background:${v.color||'var(--accent)'}"></span> ${esc(vertName(v))}</span><span class="cnt">${vn}</span></a>`;
        vcats.forEach(c=>{ const n=(entriesByCat.get(c.id)||[]).length;
          h+=`<a class="cat-link${c.id===activeCat?' active':''}" href="#/category/${c.id}" style="padding-left:24px;font-size:.82rem"><span>${esc(catName(c))}</span><span class="cnt">${n}</span></a>`; });
      });
    } else {
      CATS.forEach(c=>{ const n=(entriesByCat.get(c.id)||[]).length;
        h+=`<a class="cat-link${c.id===activeCat?' active':''}" href="#/category/${c.id}"><span>${dot(c)} ${esc(catName(c))}</span><span class="cnt">${n}</span></a>`; });
    }
    $('#sidebar').innerHTML=h; }

  function statusBadge(s){ if(!s) return ''; return `<span class="badge st-${s}">● ${esc((t('ST')[s])||s)}</span>`; }
  const animateCounts=()=>{ document.querySelectorAll('.stat b[data-count]').forEach(el=>{ const tg=+el.dataset.count||0,d=720,t0=performance.now();
    (function tick(t){ const p=Math.min(1,(t-t0)/d); el.textContent=Math.round(tg*(1-Math.pow(1-p,3))); if(p<1)requestAnimationFrame(tick); })(performance.now()); }); };

  function renderHome(){
    const provSet=new Set(); ENTRIES.forEach(e=>(e.providerTerms||[]).forEach(p=>p.provider&&provSet.add(p.provider)));
    const srcCount=ENTRIES.reduce((a,e)=>a+((e.sources||[]).length),0);
    const conflicts=ENTRIES.filter(e=> e.status==='ambiguous' || (e.distinctions&&e.distinctions.length))
      .sort((a,b)=>(b.distinctions?b.distinctions.length:0)-(a.distinctions?a.distinctions.length:0)).slice(0,4);
    const st=(n,l)=>`<div class="stat"><b>${n}</b><span>${esc(l)}</span></div>`;
    let h=`<section class="hero"><h1>${esc(t('heroT'))}</h1><p>${t('heroB')}</p>
      <div class="stats">${st(ENTRIES.length,t('sTerms'))}${st(CATS.length,t('sCats'))}${st(provSet.size,t('sProv'))}${st(srcCount,t('sSrc'))}</div>
      <div class="cta-row"><a class="cta-graph" href="#/mindmap">🧠 ${LANG==='ko'?'마인드맵 탐색':'Explore Mindmap'}</a><a class="cta-2" href="#/map">🗺 ${LANG==='ko'?'개념 지도':'Concept map'}</a><a class="cta-2" href="#/flows">🛤 ${LANG==='ko'?'여정 플로':'Journey flows'}</a><a class="cta-2" href="#/index">📇 ${esc(t('openIndex'))}</a></div></section>`;
    if(conflicts.length){ h+=`<div class="sec-title">${esc(t('confT'))}</div>`;
      conflicts.forEach(e=>{ const d=(e.distinctions&&e.distinctions[0]);

  function linkTerm(targetId,label){ if(targetId&&byId.has(targetId)) return `<a class="rel-link" href="#/term/${targetId}">${esc(label||byId.get(targetId).term)}</a>`;
    return `<span class="rel-dead">${esc(label)}</span>`; }

  function miniMap(e){
    const seen=new Set(); const nb=[];
    (e.relationships||[]).forEach(r=>{ if(r.targetId&&byId.has(r.targetId)&&!seen.has(r.targetId)){ seen.add(r.targetId); nb.push({id:r.targetId,term:byId.get(r.targetId).term,dist:false}); } });
    (e.distinctions||[]).forEach(d=>{ if(d.targetId&&byId.has(d.targetId)&&!seen.has(d.targetId)){ seen.add(d.targetId); nb.push({id:d.targetId,term:byId.get(d.targetId).term,dist:true}); } });
    if(!nb.length) return '';
    const N=Math.min(nb.length,7), use=nb.slice(0,N);
    const W=240,H=Math.max(150,96+N*7),cx=W/2,cy=H/2,R=Math.min(cx,cy)-30;
    const short=s=>{ s=String(s||''); return s.length>14?s.slice(0,13)+'…':s; };
    let lines='',nodes='';
    use.forEach((n,i)=>{ const a=(-Math.PI/2)+(i*2*Math.PI/N), x=cx+R*Math.cos(a), y=cy+R*Math.sin(a), ty=y<cy-2?y-9:y+15;
      lines+=`<line class="${n.dist?'distln':''}" x1="${cx}" y1="${cy}" x2="${x.toFixed(1)}" y2="${y.toFixed(1)}"></line>`;
      nodes+=`<a href="#/term/${n.id}"><circle class="nd" cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="5"><title>${esc(n.term)}</title></circle><text x="${x.toFixed(1)}" y="${ty.toFixed(1)}" text-anchor="middle">${esc(short(n.term))}</text></a>`; });
    const ctr=short(e.abbreviation||e.term), cap=LANG==='ko'?'인접 관계 지도':'Local map · 1-hop';
    return `<div class="minimap"><div class="cap">${cap}</div><svg viewBox="0 0 ${W} ${H}" role="img" aria-label="local relationship map">${lines}<circle class="center" cx="${cx}" cy="${cy}" r="7"></circle><text x="${cx}" y="${(cy-11)}" text-anchor="middle" style="font-weight:700">${esc(ctr)}</text>${nodes}</svg></div>`;
  }

  // cross-industry layers that underpin every stage of every vertical
  // ordered by operational foundationality: payments/standards/identifiers first, sustainability last
  const FLOW_FOUNDATION = [
    { cat:'pay',            terms:['form-of-payment','merchant-of-record','3-d-secure','chargeback','tokenization'] },
    { cat:'standards',      terms:['gds','ndc','one-order','order-management-system-oms','opentravel-alliance'] },
    { cat:'codes',          terms:['airport-code','airline-designator','iata-number','iso-4217-currency-code','ticket-number'] },
