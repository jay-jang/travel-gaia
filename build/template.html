            ko: '부가서비스(Ancillaries) 구매 및 일정 변경 등 주문의 사후 관리(Servicing)가 NDC API를 통해 실시간으로 주문(Order)에 반영됩니다.',
            en: 'Post-booking servicing, such as purchasing ancillaries or changing schedules, is handled in real time via NDC API and directly updated in the Order.'
          },
          activeNodes: ['customer', 'ota', 'ndc', 'crs'],
          activeConnections: [
            { from: 'customer', to: 'ota' },
            { from: 'ota', to: 'ndc' },
            { from: 'ndc', to: 'crs' }
          ]
        },
        {
          narration: {
            ko: '현대적 유통 학습 완료! NDC와 ONE Order는 항공사가 직접 제품 구성 및 고객 관계를 제어하고, 유통 단계를 간소화하며 비용을 대폭 절감합니다.',
            en: 'Modern distribution learning complete! NDC and ONE Order enable airlines to directly control offers and customer relationships, streamlining distribution and cutting costs.'
          },
          activeNodes: ['customer', 'ota', 'ndc', 'settlement', 'bsp', 'crs'],
          activeConnections: []
        }
      ]
    }
  ];

  function renderClassroom(){
    stopClassroom();
    stopGraph();

    main.innerHTML = `<div class="crumbs"><a href="#/">${esc(t('home2'))}</a> › ${esc(t('classroom'))}</div>
      <div class="sec-title" style="margin-top:0">${esc(t('classroom'))}</div>
      <p style="color:var(--muted);margin:-6px 0 14px">${esc(t('classroomPh'))}</p>
      
      <div class="classroom-wrap">
        <div class="classroom-left">
          <div class="classroom-tabs">
            <button class="classroom-tab ${classroomClassId==='class101'?'active':''}" data-class="class101">Class 101</button>
            <button class="classroom-tab ${classroomClassId==='class201'?'active':''}" data-class="class201">Class 201</button>
          </div>
          <div class="classroom-content">
            <h3 class="classroom-title" id="classTitle"></h3>
            <div class="classroom-step-count" id="classStepCount"></div>
            <div class="classroom-narration" id="classNarration"></div>
          </div>
          <div class="classroom-controls">
            <button class="classroom-btn classroom-btn-secondary" id="classBtnBack">${esc(t('btnBack'))}</button>
            <button class="classroom-btn classroom-btn-primary" id="classBtnNext">${esc(t('btnNext'))}</button>
          </div>
        </div>
        <div class="classroom-right">
          <canvas id="classroomCanvas"></canvas>
        </div>
      </div>`;

    renderSidebar(null);

    const canvas = $('#classroomCanvas'), ctx = canvas.getContext('2d');
    const catColor = id => (catById.get(id)||{}).color || '#888';
    let W = 0, H = 0, dpr = Math.min(window.devicePixelRatio||1, 2);
    let particleT = 0;

    function resize(){
      const rightPanel = $('.classroom-right');
      if(!rightPanel) return;
      W = rightPanel.clientWidth;
      H = Math.max(400, Math.min(600, Math.round(window.innerHeight * 0.6)));
      canvas.style.height = H + 'px';
      canvas.style.width = '100%';
      canvas.width = W * dpr;
      canvas.height = H * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    resize();
    classroomResizeFn = resize;
    window.addEventListener('resize', classroomResizeFn);

    function updateClassroomStep(){
      const cls = CLASSES.find(c => c.id === classroomClassId);
      if(!cls) return;

      const titleText = cls.title[LANG] || cls.title.en;
      $('#classTitle').textContent = titleText;

      const stepNum = classroomStep + 1;
      const countText = LANG === 'ko' ? `단계 ${stepNum} / 5` : `Step ${stepNum} / 5`;
      $('#classStepCount').textContent = countText;

      if(classroomFinished){
        $('#classNarration').textContent = LANG === 'ko' 
          ? '축하합니다! 학습을 완료하셨습니다. 다시 학습 버튼을 누르면 처음부터 다시 진행할 수 있습니다.'
          : 'Congratulations! You have completed the learning module. Click Restart to start over.';
      } else {
        const step = cls.steps[classroomStep];
        $('#classNarration').textContent = step.narration[LANG] || step.narration.en;
      }

      // Update buttons
      const btnBack = $('#classBtnBack');
      btnBack.disabled = classroomStep === 0;

      const btnNext = $('#classBtnNext');
      if(classroomStep < 4){
        btnNext.textContent = t('btnNext');
      } else {
        btnNext.textContent = classroomFinished ? t('btnRestart') : t('btnFinish');
      }
    }

    // Attach listeners
    $('.classroom-tabs').addEventListener('click', e => {
      const btn = e.target.closest('.classroom-tab');
      if(!btn) return;
      const cid = btn.dataset.class;
      if(cid && cid !== classroomClassId){
        classroomClassId = cid;
        classroomStep = 0;
        classroomFinished = false;
        document.querySelectorAll('.classroom-tab').forEach(t => t.classList.toggle('active', t.dataset.class === cid));
        updateClassroomStep();
      }
    });

    $('#classBtnBack').addEventListener('click', () => {
      if(classroomFinished){
        classroomFinished = false;
      } else if(classroomStep > 0){
        classroomStep--;
      }
      updateClassroomStep();
    });

    $('#classBtnNext').addEventListener('click', () => {
      if(classroomStep < 4){
        classroomStep++;
      } else {
        if(!classroomFinished){
          classroomFinished = true;
        } else {
          classroomFinished = false;
          classroomStep = 0;
        }
      }
      updateClassroomStep();
    });

    function draw(){
      ctx.clearRect(0, 0, W, H);
      const dark = document.documentElement.dataset.theme === 'dark';
      const cls = CLASSES.find(c => c.id === classroomClassId);
      if(!cls) return;

      const step = cls.steps[classroomStep];
      if(!step) return;

      // Active vs Inactive state
      const activeNodes = classroomFinished ? cls.nodes.map(n => n.id) : step.activeNodes;
      const activeConns = classroomFinished ? [] : (step.activeConnections || []);

      const nodes = cls.nodes.map(n => {
        return {
          ...n,
          px: n.x * W,
          py: n.y * H,
          isActive: activeNodes.includes(n.id)
        };
      });
      const nodeMap = new Map(nodes.map(n => [n.id, n]));

      // 1. Draw connections
      cls.connections.forEach(conn => {
        const n1 = nodeMap.get(conn.from);
        const n2 = nodeMap.get(conn.to);
        if(!n1 || !n2) return;

        const isActiveConn = activeConns.some(ac => 
          (ac.from === conn.from && ac.to === conn.to) || (ac.from === conn.to && ac.to === conn.from)
        );

        ctx.beginPath();
        ctx.moveTo(n1.px, n1.py);
        ctx.lineTo(n2.px, n2.py);

        ctx.save();
        if(isActiveConn){
          ctx.strokeStyle = catColor(n1.cat);
          ctx.lineWidth = 3;
          ctx.globalAlpha = 1.0;
          ctx.shadowBlur = 8;
          ctx.shadowColor = catColor(n1.cat);
        } else {
          ctx.strokeStyle = dark ? '#262d47' : '#e3e6f0';
          ctx.lineWidth = 1.5;
          ctx.globalAlpha = 0.2;
          ctx.shadowBlur = 0;
        }
        ctx.stroke();
        ctx.restore();
      });

      // 2. Draw active connections particles
      if(activeConns.length > 0){
        activeConns.forEach(ac => {
          const n1 = nodeMap.get(ac.from);
          const n2 = nodeMap.get(ac.to);
          if(!n1 || !n2) return;

          const color = catColor(n1.cat);
          const numParticles = 3;
          for(let i=0; i<numParticles; i++){
            const tVal = (particleT + i / numParticles) % 1.0;
            const px = n1.px * (1 - tVal) + n2.px * tVal;
            const py = n1.py * (1 - tVal) + n2.py * tVal;

            ctx.save();
            ctx.beginPath();
            ctx.arc(px, py, 4.5, 0, 2*Math.PI);
            ctx.fillStyle = '#ffffff';
            ctx.shadowBlur = 8;
            ctx.shadowColor = color;
            ctx.fill();
            ctx.restore();
          }
        });
      }

      // 3. Draw nodes
      nodes.forEach(n => {
        const color = catColor(n.cat);
        const radius = n.isActive ? 22 : 16;

        ctx.save();
        if(n.isActive){
          ctx.globalAlpha = 1.0;
          ctx.shadowBlur = 12;
          ctx.shadowColor = color;
        } else {
          ctx.globalAlpha = 0.2;
          ctx.shadowBlur = 0;
        }

        ctx.beginPath();
        ctx.arc(n.px, n.py, radius, 0, 2*Math.PI);
        ctx.fillStyle = color;
        ctx.fill();

        if(n.isActive){
          ctx.strokeStyle = dark ? '#ffffff' : '#0b1020';
          ctx.lineWidth = 2.5;
          ctx.stroke();
        }
        ctx.restore();

        // Label below
        ctx.save();
        if(n.isActive){
          ctx.globalAlpha = 1.0;
          ctx.fillStyle = dark ? '#f3f5ff' : '#0b1020';
          ctx.font = '700 13px ' + getComputedStyle(document.body).fontFamily;
        } else {
          ctx.globalAlpha = 0.3;
          ctx.fillStyle = dark ? '#a3acca' : '#535d77';
          ctx.font = '500 12px ' + getComputedStyle(document.body).fontFamily;
        }
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        const labelText = typeof n.label === 'object' ? (LANG === 'ko' ? n.label.ko : n.label.en) : n.label;
        ctx.fillText(labelText, n.px, n.py + radius + 16);
        ctx.restore();
      });
    }

    function loop(){
      particleT = (particleT + 0.006) % 1.0;
      draw();
      classroomRAF = requestAnimationFrame(loop);
    }

    updateClassroomStep();
    loop();
  }

  /* knowledge graph */
  let simulation;
  let allNodes = [];
  let allLinks = [];
  let activeCategories = new Set(CATS.map(c => c.id));
  let linkSelection, nodeSelection;
  let zoom, svg, zoomContainer;
  let activeTermId = null;
  const nbr = new Map();

  let expandedNodeIds = new Set();
  const parentsOfChild = new Map();
  const hasChildrenSet = new Set();
  const isChildSet = new Set();
  let graphLinks = [];

  function stopGraph(){
    if (simulation) {
      simulation.stop();
    }
  }

  const catColor = id => (catById.get(id) || {}).color || '#888';
  const isNeighbor = (a, b) => nbr.has(a) && nbr.get(a).has(b);

  function findParentNode(d) {
    if (d.id.startsWith('cat-')) return null;
    if (d.isParentTerm) {
      return allNodes.find(n => n.id === 'cat-' + d.category);
    } else {
      const parents = parentsOfChild.get(d.id) || new Set();
      // find a parent that is visible
      const visibleParent = allNodes.find(n => parents.has(n.id) && window.kgVisibleNodeIds && window.kgVisibleNodeIds.has(n.id));
      if (visibleParent) return visibleParent;
      const anyParent = allNodes.find(n => parents.has(n.id));
      if (anyParent) return anyParent;
      return allNodes.find(n => n.id === 'cat-' + d.category);
    }
  }

  function ensureTermVisible(termId) {
    const termNode = allNodes.find(n => n.id === termId);
    if (!termNode || termNode.isCategoryNode) return;
    
    // Expand the Category node
    expandedNodeIds.add('cat-' + termNode.category);
    
    // If it's a Child term, expand all of its parents in the category
    if (termNode.isChildTerm) {
      const parents = parentsOfChild.get(termId) || new Set();
      parents.forEach(pId => {
        expandedNodeIds.add(pId);
      });
    }
  }

  function initGraph() {
    if (window.kgInitialized) return;
    window.kgInitialized = true;

    // Render the legend
    const legendContainer = document.getElementById("kgLegend");
    legendContainer.innerHTML = CATS.map(c => `
      <span class="legend-item" data-cat="${c.id}">
        <span class="ld" style="background:${c.color}"></span>
        ${esc(catName(c))}
      </span>
    `).join('');

    legendContainer.addEventListener('click', e => {
      const el = e.target.closest('.legend-item');
      if (!el) return;
      const catId = el.dataset.cat;
      if (activeCategories.has(catId)) {
        activeCategories.delete(catId);
      } else {
        activeCategories.add(catId);
      }
      updateLegendUI();
      updateGraphDataset();
    });

    // Initialize D3 zoom
    svg = d3.select("#kg-svg");
    zoomContainer = svg.select(".zoom-container");
    zoom = d3.zoom()
      .scaleExtent([0.1, 4.0])
      .on("zoom", (event) => {
        zoomContainer.attr("transform", event.transform);
      });
    svg.call(zoom);

    // Zoom controls
    d3.select("#zoom-in").on("click", () => {
      svg.transition().duration(250).call(zoom.scaleBy, 1.3);
    });
    d3.select("#zoom-out").on("click", () => {
      svg.transition().duration(250).call(zoom.scaleBy, 1 / 1.3);
    });
    d3.select("#zoom-fit").on("click", () => {
      zoomFit();
    });

    // Setup Drawer listeners
    document.getElementById("drawerClose").addEventListener("click", () => {
      location.hash = "#/graph";
    });
    document.getElementById("drawerLangBtn").addEventListener("click", () => {
      LANG = LANG === 'ko' ? 'en' : 'ko';
      try { localStorage.setItem('tg-lang', LANG); } catch(_) {}
      applyStaticI18n();
      if (activeTermId) {
        updateDrawer(activeTermId);
      }
    });

    // Compute degrees
    const nodeDegrees = new Map(ENTRIES.map(e => [e.id, 0]));
    ENTRIES.forEach(e => {
      if (e.relationships) {
        e.relationships.forEach(r => {
          if (r.targetId && byId.has(r.targetId)) {
            nodeDegrees.set(e.id, nodeDegrees.get(e.id) + 1);
            nodeDegrees.set(r.targetId, nodeDegrees.get(r.targetId) + 1);
          }
        });
      }
      if (e.distinctions) {
        e.distinctions.forEach(d => {
          if (d.targetId && byId.has(d.targetId)) {
            nodeDegrees.set(e.id, nodeDegrees.get(e.id) + 1);
            nodeDegrees.set(d.targetId, nodeDegrees.get(d.targetId) + 1);
          }
        });
      }
    });

    // Programmatically classify terms within each category
    parentsOfChild.clear();
    isChildSet.clear();
    hasChildrenSet.clear();

    ENTRIES.forEach(e => {
      if (e.relationships) {
        e.relationships.forEach(r => {
          if (r.targetId && byId.has(r.targetId)) {
            const target = byId.get(r.targetId);
            if (target.category === e.category) {
              if (r.type === 'parent' || r.type === 'broader') {
                isChildSet.add(e.id);
                if (!parentsOfChild.has(e.id)) parentsOfChild.set(e.id, new Set());
                parentsOfChild.get(e.id).add(target.id);
                hasChildrenSet.add(target.id);
              } else if (r.type === 'child' || r.type === 'narrower') {
                isChildSet.add(target.id);
                if (!parentsOfChild.has(target.id)) parentsOfChild.set(target.id, new Set());
                parentsOfChild.get(target.id).add(e.id);
                hasChildrenSet.add(e.id);
              }
            }
          }
        });
      }
    });

    // Initialize nodes (Category Nodes + Term Nodes)
    const categoryNodes = CATS.map((c, i) => {
      const ang = i / CATS.length * 2 * Math.PI;
      return {
        id: 'cat-' + c.id,
        term: c.title.toUpperCase(),
        term_ko: c.short.toUpperCase(),
        category: c.id,
        isCategoryNode: true,
        degree: 1,
        x: Math.cos(ang) * 250 + 400,
        y: Math.sin(ang) * 250 + 300
      };
    });

    const termNodes = ENTRIES.map((e, i) => {
      const isParent = !isChildSet.has(e.id);
      const catIdx = CATS.findIndex(c => c.id === e.category);
      const ang = (catIdx >= 0 ? catIdx : 0) / CATS.length * 2 * Math.PI;
      return {
        id: e.id,
        term: e.term,
        term_ko: e.term_ko,
        category: e.category,
        conceptType: e.conceptType,
        status: e.status,
        degree: nodeDegrees.get(e.id) || 0,
        isParentTerm: isParent,
        isChildTerm: !isParent,
        x: Math.cos(ang) * 250 + 400 + (Math.random() - 0.5) * 20,
        y: Math.sin(ang) * 250 + 300 + (Math.random() - 0.5) * 20
      };
    });

    allNodes = [...categoryNodes, ...termNodes];

    // Initialize links
    const catToParentLinks = [];
    const parentToChildLinks = [];
    const relationalLinks = [];
    const seenLinks = new Set();

    termNodes.forEach(n => {
      if (n.isParentTerm) {
        catToParentLinks.push({
          source: 'cat-' + n.category,
          target: n.id,
          type: 'cat-to-parent',
          category: n.category
        });
      }
    });

    termNodes.forEach(n => {
      if (n.isChildTerm) {
        const parents = parentsOfChild.get(n.id) || new Set();
        parents.forEach(pId => {
          parentToChildLinks.push({
            source: pId,
            target: n.id,
            type: 'parent-to-child',
            category: n.category
          });
        });
      }
    });

    ENTRIES.forEach(e => {
      if (e.relationships) {
        e.relationships.forEach(r => {
          if (r.targetId && byId.has(r.targetId)) {
            const target = byId.get(r.targetId);
            const isParentChildSameCat = (target.category === e.category) && 
              ((r.type === 'parent' || r.type === 'broader' || r.type === 'child' || r.type === 'narrower'));
            if (!isParentChildSameCat) {
              const k = [e.id, r.targetId].sort().join('|');
              if (!seenLinks.has(k)) {
                seenLinks.add(k);
                relationalLinks.push({
                  source: e.id,
                  target: r.targetId,
                  type: 'relational'
                });
              }
            }
          }
        });
      }
      if (e.distinctions) {
        e.distinctions.forEach(d => {
          if (d.targetId && byId.has(d.targetId)) {
            const k = [e.id, d.targetId].sort().join('|');
            if (!seenLinks.has(k)) {
              seenLinks.add(k);
              relationalLinks.push({
                source: e.id,
                target: d.targetId,
                type: 'relational'
              });
            }
          }
        });
      }
    });

    graphLinks = [...catToParentLinks, ...parentToChildLinks, ...relationalLinks];

    // Build nbr map
    nbr.clear();
    graphLinks.forEach(l => {
      const sId = typeof l.source === 'object' ? l.source.id : l.source;
      const tId = typeof l.target === 'object' ? l.target.id : l.target;
      if (!nbr.has(sId)) nbr.set(sId, new Set());
      if (!nbr.has(tId)) nbr.set(tId, new Set());
      nbr.get(sId).add(tId);
      nbr.get(tId).add(sId);
    });

    // Initialize D3 force simulation
    const w = 800;
    const h = 600;
    simulation = d3.forceSimulation()
      .force("link", d3.forceLink().id(d => d.id)
        .distance(d => {
          if (d.type === 'cat-to-parent') return 140;
          if (d.type === 'parent-to-child') return 70;
          return 100;
        })
        .strength(0.8)
      )
      .force("charge", d3.forceManyBody().strength(d => {
        if (d.isCategoryNode) return -450;
        if (d.isParentTerm) return -200;
        return -80;
      }))
      .force("center", d3.forceCenter(w / 2, h / 2))
      .force("collide", d3.forceCollide(d => {
        if (d.isCategoryNode) return 45;
        if (d.isParentTerm) return 30;
        return 20;
      }))
      .force("category-attract", alpha => {
        categoryNodes.forEach((node, i) => {
          const ang = i / CATS.length * 2 * Math.PI;
          const targetX = Math.cos(ang) * 250 + w / 2;
          const targetY = Math.sin(ang) * 250 + h / 2;
          node.vx += (targetX - node.x) * 0.1 * alpha;
          node.vy += (targetY - node.y) * 0.1 * alpha;
        });
      })
      .on("tick", ticked);

    // Click trigger function globally exposed
    window.kgClickNode = function(nodeId) {
      const d = allNodes.find(n => n.id === nodeId);
      if (!d) return;

      if (d.isCategoryNode) {
        // Toggle: collapse if already expanded (including all child terms)
        if (expandedNodeIds.has(d.id)) {
          expandedNodeIds.delete(d.id);
          // Collapse all child term expansions within this category
          allNodes.forEach(n => {
            if (n.category === d.category && n.isParentTerm) {
              expandedNodeIds.delete(n.id);
            }
          });
        } else {
          expandedNodeIds.add(d.id);
        }
        updateGraphDataset();
      } else if (d.isParentTerm) {
        if (hasChildrenSet.has(d.id)) {
          // This parent has child terms: toggle expand/collapse children
          if (expandedNodeIds.has(d.id)) {
            expandedNodeIds.delete(d.id);
          } else {
            expandedNodeIds.add(d.id);
          }
          updateGraphDataset();
          // Also open drawer for this term
          updateDrawer(d.id);
        } else {
          // Leaf parent (no children): just open the drawer
          updateDrawer(d.id);
        }
      } else {
        // Child term: open the drawer
        updateDrawer(d.id);
      }
    };

    // Initial dataset bind
    updateLegendUI();
    updateGraphDataset();
  }

  function recalculateVisibility() {
    const visibleNodes = [];
    const visibleNodeIds = new Set();

    const isNodeVisible = d => {
      if (d.isCategoryNode) {
        return activeCategories.has(d.category);
      }
      if (d.isParentTerm) {
        const catNodeId = 'cat-' + d.category;
        return activeCategories.has(d.category) && expandedNodeIds.has(catNodeId);
      }
      if (d.isChildTerm) {
        const parents = parentsOfChild.get(d.id) || new Set();
        const hasVisibleExpandedParent = Array.from(parents).some(pId => {
          const pNode = byId.get(pId);
          return pNode && activeCategories.has(pNode.category) && expandedNodeIds.has(pNode.id);
        });
        return hasVisibleExpandedParent;
      }
      return false;
    };

    allNodes.forEach(n => {
      if (isNodeVisible(n)) {
        visibleNodes.push(n);
        visibleNodeIds.add(n.id);
      }
    });

    window.kgVisibleNodeIds = visibleNodeIds;
    return { visibleNodes, visibleNodeIds };
  }

  function updateLegendUI() {
    document.querySelectorAll(".legend-item").forEach(el => {
      const catId = el.dataset.cat;
      if (activeCategories.has(catId)) {
        el.classList.remove("off");
      } else {
        el.classList.add("off");
      }
    });
  }

  function updateGraphDataset() {
    const { visibleNodes: filteredNodes, visibleNodeIds: filteredNodeIds } = recalculateVisibility();

    const filteredLinks = graphLinks.map(l => {
      const sId = typeof l.source === 'object' ? l.source.id : l.source;
      const tId = typeof l.target === 'object' ? l.target.id : l.target;
      return { source: sId, target: tId, type: l.type, category: l.category };
    }).filter(l => filteredNodeIds.has(l.source) && filteredNodeIds.has(l.target));

    simulation.nodes(filteredNodes);
    simulation.force("link").links(filteredLinks);
    simulation.alpha(0.3).restart();

    linkSelection = svg.select(".links-group")
      .selectAll("line")
      .data(filteredLinks, d => `${typeof d.source === 'object' ? d.source.id : d.source}-${typeof d.target === 'object' ? d.target.id : d.target}`)
      .join(
        enter => enter.append("line")
          .attr("class", d => {
            if (d.type === 'cat-to-parent') return 'link cat-to-parent';
            if (d.type === 'parent-to-child') return 'link parent-to-child';
            return 'link relational';
          })
          .style("stroke", d => {
            if (d.type === 'cat-to-parent' || d.type === 'parent-to-child') {
              return catColor(d.category);
            }
            return '#888';
          }),
        update => update
          .attr("class", d => {
            if (d.type === 'cat-to-parent') return 'link cat-to-parent';
            if (d.type === 'parent-to-child') return 'link parent-to-child';
            return 'link relational';
          })
          .style("stroke", d => {
            if (d.type === 'cat-to-parent' || d.type === 'parent-to-child') {
              return catColor(d.category);
            }
            return '#888';
          }),
        exit => exit.remove()
      );

    nodeSelection = svg.select(".nodes-group")
      .selectAll(".node-group")
      .data(filteredNodes, d => d.id)
      .join(
        enter => {
          const g = enter.append("g")
            .attr("class", d => {
              let cls = "node-group";
              if (d.isCategoryNode) cls += " category-node";
              if (d.isParentTerm) cls += " parent-term-node";
              if (d.isChildTerm) cls += " child-term-node";
              return cls;
            })
            .attr("tabindex", "0")
            .attr("role", "button")
            .attr("aria-label", d => d.term)
            .each(d => {
              const parent = findParentNode(d);
              if (parent) {
                d.x = parent.x;
                d.y = parent.y;
                d.vx = 0;
                d.vy = 0;
              }
            })
            .attr("transform", d => `translate(${d.x},${d.y})`)
            .style("opacity", 0)
            .call(d3.drag()
              .on("start", dragstarted)
              .on("drag", dragged)
              .on("end", dragended)
            );

          g.append("circle")
            .attr("r", d => d.isCategoryNode ? 20 : (d.isParentTerm ? 14 : 8))
            .attr("fill", d => d.isCategoryNode ? catColor(d.category) : (d.isParentTerm ? "#ffffff" : catColor(d.category)))
            .attr("fill-opacity", d => d.isChildTerm ? 0.6 : 1.0)
            .attr("stroke", d => d.isCategoryNode ? "#800020" : catColor(d.category))
            .attr("stroke-width", d => d.isCategoryNode ? 3 : (d.isParentTerm ? 3 : 1));

          // Draw an outer ring for parent nodes that have children
          g.filter(d => d.isParentTerm && hasChildrenSet.has(d.id))
            .append("circle")
            .attr("class", "outer-ring")
            .attr("r", 18)
            .attr("fill", "none")
            .attr("stroke", d => catColor(d.category))
            .attr("stroke-width", 1.2)
            .attr("stroke-dasharray", "3,3");

          g.append("text")
            .attr("dy", d => -(d.isCategoryNode ? 24 : (d.isParentTerm ? 18 : 12)))
            .style("font-weight", d => d.isCategoryNode ? "700" : (d.isParentTerm ? "600" : "400"))
            .style("text-transform", d => d.isCategoryNode ? "uppercase" : "none")
            .text(d => {
              let txt = LANG === 'ko' && d.term_ko ? d.term_ko : d.term;
              return d.isCategoryNode ? txt.toUpperCase() : txt;
            });

          g.on("click", (event, d) => {
            if (window.kgClickNode) window.kgClickNode(d.id);
          });

          g.on("keydown", (event, d) => {
            if (event.key === 'Enter' || event.key === ' ') {
              event.preventDefault();
              if (window.kgClickNode) window.kgClickNode(d.id);
            }
          });

          g.on("mouseover", (event, d) => {
            const tip = d3.select("#kgTip");
            if (d.isCategoryNode) {
              const c = catById.get(d.category) || {};
              const nameStr = catName(c);
              const descStr = LANG === 'ko' ? (c.desc || c.desc_en) : c.desc_en;
              tip.html(`<b>${esc(nameStr.toUpperCase())}</b> <span style="opacity:.7">— ${esc(descStr)}</span>`);
              tip.style("opacity", 1);
            } else {
              const nm = LANG === 'ko' && d.term_ko && d.term_ko !== d.term ? `${d.term} · ${d.term_ko}` : d.term;
              tip.html(`${esc(nm)} <span style="opacity:.7">— ${esc(catName(catById.get(d.category) || {}))}</span>`);
              tip.style("opacity", 1);
            }
            
            d3.selectAll(".node-group").classed("dimmed", n => n.id !== d.id && !isNeighbor(d.id, n.id));
            d3.selectAll(".link").classed("dimmed", l => {
              const sId = typeof l.source === 'object' ? l.source.id : l.source;
              const tId = typeof l.target === 'object' ? l.target.id : l.target;
              return sId !== d.id && tId !== d.id;
            });
          });

          g.on("mousemove", (event) => {
            const container = document.querySelector(".graph-container");
            if (!container) return;
            const rect = container.getBoundingClientRect();
            const tip = d3.select("#kgTip");
            tip.style("left", (event.clientX - rect.left) + "px")
               .style("top", (event.clientY - rect.top - 28) + "px");
          });

          g.on("mouseout", () => {
            d3.select("#kgTip").style("opacity", 0);
            d3.selectAll(".node-group").classed("dimmed", false);
            d3.selectAll(".link").classed("dimmed", false);
          });

          g.transition().duration(400).style("opacity", 1);
          return g;
        },
        update => {
          update.select("circle")
            .attr("fill", d => d.isCategoryNode ? catColor(d.category) : (d.isParentTerm ? "#ffffff" : catColor(d.category)))
            .attr("fill-opacity", d => d.isChildTerm ? 0.6 : 1.0)
            .attr("stroke", d => d.isCategoryNode ? "#800020" : catColor(d.category))
            .attr("stroke-width", d => d.isCategoryNode ? 3 : (d.isParentTerm ? 3 : 1));
          
          update.select("text")
            .attr("dy", d => -(d.isCategoryNode ? 24 : (d.isParentTerm ? 18 : 12)))
            .style("font-weight", d => d.isCategoryNode ? "700" : (d.isParentTerm ? "600" : "400"))
            .style("text-transform", d => d.isCategoryNode ? "uppercase" : "none")
            .text(d => {
              let txt = LANG === 'ko' && d.term_ko ? d.term_ko : d.term;
              return d.isCategoryNode ? txt.toUpperCase() : txt;
            });
          return update;
        },
        exit => {
          exit.transition().duration(400)
            .style("opacity", 0)
            .attr("transform", d => {
              const parent = findParentNode(d);
              return `translate(${parent ? parent.x : d.x}, ${parent ? parent.y : d.y})`;
            })
            .remove();
        }
      );
  }

  function dragstarted(event, d) {
    if (!event.active) simulation.alphaTarget(0.3).restart();
    d.fx = d.x;
    d.fy = d.y;
  }

  function dragged(event, d) {
    d.fx = event.x;
    d.fy = event.y;
  }

  function dragended(event, d) {
    if (!event.active) simulation.alphaTarget(0);
    d.fx = null;
    d.fy = null;
  }

  function ticked() {
    if (linkSelection) {
      linkSelection
        .attr("x1", d => d.source.x)
        .attr("y1", d => d.source.y)
        .attr("x2", d => d.target.x)
        .attr("y2", d => d.target.y);
    }
    if (nodeSelection) {
      nodeSelection
        .attr("transform", d => `translate(${d.x},${d.y})`);
    }
  }

  function zoomFit() {
    if (!svg) return;
    const parent = svg.node();
    const w = parent.clientWidth || 800;
    const h = parent.clientHeight || 600;

    const activeNodes = allNodes.filter(n => window.kgVisibleNodeIds && window.kgVisibleNodeIds.has(n.id));
    if (activeNodes.length === 0) return;

    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    activeNodes.forEach(n => {
      if (n.x < minX) minX = n.x;
      if (n.x > maxX) maxX = n.x;
      if (n.y < minY) minY = n.y;
      if (n.y > maxY) maxY = n.y;
    });

    const width = maxX - minX + 80;
    const height = maxY - minY + 80;
    const midX = (minX + maxX) / 2;
    const midY = (minY + maxY) / 2;

    const scale = Math.min(4.0, Math.max(0.15, 0.85 / Math.max(width / w, height / h)));
    const tx = w / 2 - scale * midX;
    const ty = h / 2 - scale * midY;

    svg.transition().duration(750).call(
      zoom.transform,
      d3.zoomIdentity.translate(tx, ty).scale(scale)
    );
  }

  function centerOnNode(id) {
    const targetNode = allNodes.find(n => n.id === id);
    if (targetNode) {
      if (!activeCategories.has(targetNode.category)) {
        activeCategories.add(targetNode.category);
        updateLegendUI();
      }
      ensureTermVisible(id);
      updateGraphDataset();

      const parent = svg.node();
      const w = parent.clientWidth || 800;
      const h = parent.clientHeight || 600;
      const scale = 1.6;
      const tx = w / 2 - targetNode.x * scale;
      const ty = h / 2 - targetNode.y * scale;

      svg.transition().duration(750).call(
        zoom.transform,
        d3.zoomIdentity.translate(tx, ty).scale(scale)
      );

      d3.selectAll(".node-group").classed("focused", d => d.id === id);
    }
  }

  function closeDrawer() {
    const drawer = document.getElementById("drawer");
    if (drawer) {
      drawer.classList.remove("open");
    }
    activeTermId = null;
    d3.selectAll(".node-group").classed("focused", false);
  }

  function updateDrawer(id) {
    const e = byId.get(id);
    if (!e) {
      closeDrawer();
      return;
    }

    activeTermId = id;
    const drawer = document.getElementById("drawer");
    drawer.classList.add("open");

    const c = catById.get(e.category) || { title: e.category };

    document.getElementById("drawerTitle").textContent = e.term;
    const subEl = document.getElementById("drawerSub");
    if (LANG === 'ko' && e.term_ko && e.term_ko !== e.term) {
      subEl.style.display = "block";
      subEl.textContent = e.term_ko;
    } else {
      subEl.style.display = "none";
    }

    document.getElementById("drawerLangBtn").textContent = LANG === 'ko' ? 'EN' : 'KO';

    const badgesEl = document.getElementById("drawerBadges");
    let badgeHtml = `<span class="badge cat" style="color:${c.color}; border-color:${c.color};" onclick="location.hash='#/category/${e.category}'">${esc(catName(c))}</span>`;
    if (e.conceptType) {
      badgeHtml += ` <span class="badge">${esc((t('CT')[e.conceptType]) || e.conceptType)}</span>`;
    }
    badgeHtml += ` ${statusBadge(e.status)}`;
    if (e.standardBody) {
      badgeHtml += ` <span class="badge">${esc(e.standardBody)}</span>`;
    }
    badgesEl.innerHTML = badgeHtml;

    const bodyEl = document.getElementById("drawerBody");
    let bodyHtml = `
      <div class="drawer-section">
        <p class="lead" style="font-size:1.1rem; line-height:1.5; color:var(--text);">${esc(Lf(e, 'definition'))}</p>
        ${Lf(e, 'longDef') ? `<p style="font-size:0.95rem; line-height:1.5; color:var(--text); margin-top:12px;">${esc(Lf(e, 'longDef'))}</p>` : ''}
      </div>
    `;

    if (e.aliases && e.aliases.length) {
      bodyHtml += `
        <div class="drawer-section">
          <h3>${esc(t('fAlias'))}</h3>
          <div class="chips">${e.aliases.map(a => `<span class="chip">${esc(a)}</span>`).join('')}</div>
        </div>
      `;
    }

    if (e.providerTerms && e.providerTerms.length) {
      bodyHtml += `
        <div class="drawer-section">
          <h3>${esc(t('fProv'))}</h3>
          <table class="pt">
            <thead>
              <tr>
                <th>${esc(t('thProv'))}</th>
                <th>${esc(t('thTerm'))}</th>
                <th>${esc(t('thRel'))}</th>
                <th>${esc(t('thCtx'))}</th>
              </tr>
            </thead>
            <tbody>
      `;
      e.providerTerms.forEach(p => {
        const ctx = (LANG === 'ko' && p.context_ko) || p.context || '';
        bodyHtml += `
          <tr>
            <td class="prov">${esc(p.provider)}</td>
            <td><code>${esc(p.term)}</code></td>
            <td>${esc((t('PR')[p.relationship]) || p.relationship || '')}</td>
            <td>${esc(ctx)}</td>
          </tr>
        `;
      });
      bodyHtml += `
            </tbody>
          </table>
        </div>
      `;
    }

    if (e.relationships && e.relationships.length) {
      const RLAB = t('RLAB');
      const groups = {};
      e.relationships.forEach(r => {
        (groups[r.type] = groups[r.type] || []).push(r);
      });

      bodyHtml += `
        <div class="drawer-section">
          <h3>${esc(t('fRel'))}</h3>
      `;
      Object.keys(groups).forEach(ty => {
        bodyHtml += `
          <div class="rel-group">
            <span class="rl" style="font-size:0.65rem; color:var(--faint); font-weight:700; text-transform:uppercase; display:block; margin-bottom:2px;">${esc(RLAB[ty] || ty)}</span>
            ${groups[ty].map(r => linkTerm(r.targetId, r.targetTerm)).join(' ')}
          </div>
        `;
      });
      bodyHtml += `</div>`;
    }

    if (e.distinctions && e.distinctions.length) {
      bodyHtml += `
        <div class="drawer-section">
          <h3>${esc(t('fDist'))}</h3>
      `;
      e.distinctions.forEach(d => {
        const ex = (LANG === 'ko' && d.explanation_ko) || d.explanation;
        bodyHtml += `
          <div class="dist" style="padding:8px 0; border-top:1px solid var(--rule);">
            <b>${linkTerm(d.targetId, d.targetTerm)}</b>
            <div style="margin-top:4px; font-size:0.85rem; color:var(--muted);">${esc(ex)}</div>
          </div>
        `;
      });
      bodyHtml += `</div>`;
    }

    if (Lf(e, 'notes')) {
      bodyHtml += `
        <div class="drawer-section">
          <h3>${esc(t('fNotes'))}</h3>
          <div class="notes" style="background:var(--surface-2); border-left:3px solid var(--accent); padding:10px 12px; font-size:0.92rem; color:var(--muted);">${esc(Lf(e, 'notes'))}</div>
        </div>
      `;
    }

    if (e.sources && e.sources.length) {
      bodyHtml += `
        <div class="drawer-section">
          <h3>${esc(t('fSrc'))}</h3>
          <ul class="src" style="margin:0; padding-left:16px; font-size:0.85rem; color:var(--muted);">
      `;
      e.sources.forEach(s => {
        const bits = [s.org, s.name, s.version, s.section].filter(Boolean).map(esc).join(' · ');
        bodyHtml += `<li>${s.url ? `<a href="${esc(s.url)}" target="_blank" rel="noopener">${bits}</a>` : bits}</li>`;
      });
      bodyHtml += `
          </ul>
        </div>
      `;
    }

    bodyEl.innerHTML = bodyHtml;

    const footerEl = document.getElementById("drawerFooter");
    footerEl.innerHTML = `
      ${esc(t('mId'))} <code>${esc(e.id)}</code> · ${esc(t('mCat'))} ${esc(catName(c))}${e.lastReviewed ? ` · ${esc(t('mRev'))} ${esc(e.lastReviewed)}` : ''}
    `;
  }

  function showGraphDashboard(show) {
    const gd = document.getElementById("graph-dashboard");
    const mainEl = document.getElementById("main");
    if (show) {
      gd.style.display = "flex";
      mainEl.style.display = "none";
    } else {
      gd.style.display = "none";
      mainEl.style.display = "block";
      closeDrawer();
    }
  }

  function handleSearchHighlight(query) {
    const q = query.trim().toLowerCase();
    if (!q) {
      d3.selectAll(".node-group").classed("dimmed", false).classed("highlighted", false);
      d3.selectAll(".link").classed("dimmed", false);
      return;
    }

    const results = search(q);
    const matchedIds = new Set(results.map(r => r.e.id));

    d3.selectAll(".node-group")
      .classed("dimmed", d => matchedIds.size > 0 && !matchedIds.has(d.id))
      .classed("highlighted", d => matchedIds.has(d.id));

    d3.selectAll(".link")
      .classed("dimmed", d => {
        const sId = typeof d.source === 'object' ? d.source.id : d.source;
        const tId = typeof d.target === 'object' ? d.target.id : d.target;
        return matchedIds.size > 0 && (!matchedIds.has(sId) || !matchedIds.has(tId));
      });
  }

  function renderGraphDashboard(focusTermId, filterCatId) {
    renderSidebar(filterCatId || null);
    initGraph();

    if (filterCatId) {
      activeCategories.clear();
      activeCategories.add(filterCatId);
      updateLegendUI();
      updateGraphDataset();
      closeDrawer();
      setTimeout(zoomFit, 50);
    } else if (focusTermId) {
      activeTermId = focusTermId;
      updateDrawer(focusTermId);
      setTimeout(() => centerOnNode(focusTermId), 50);
    } else {
      activeTermId = null;
      closeDrawer();
      handleSearchHighlight('');
      if (activeCategories.size < CATS.length) {
        CATS.forEach(c => activeCategories.add(c.id));
        updateLegendUI();
        updateGraphDataset();
      }
      setTimeout(zoomFit, 50);
    }
  }

  /* router */
  function dispatch(){ const hash=location.hash||'#/';
    if(hash==='#/index'||hash.startsWith('#/index')){ showGraphDashboard(false); document.title='Index — Travel Gaia'; if($('#q'))$('#q').value=''; return renderIndex(); }
    if(hash==='#/classroom'||hash.startsWith('#/classroom')){ showGraphDashboard(false); document.title='Classroom — Travel Gaia'; if($('#q'))$('#q').value=''; return renderClassroom(); }
    if(hash==='#/graph'||hash.startsWith('#/graph?')){ showGraphDashboard(true); document.title='Knowledge Graph — Travel Gaia'; if($('#q'))$('#q').value=''; return renderGraphDashboard(); }
    const m=hash.match(/^#\/(term|category|q)\/(.+)$/);
    if(!m||hash==='#/'){ showGraphDashboard(true); document.title='Travel Gaia — 여행 산업 용어 백과사전'; if($('#q'))$('#q').value=''; return renderGraphDashboard(); }
    const kind=m[1], dec=decodeURIComponent(m[2]);
    if(kind==='term') { showGraphDashboard(true); return renderGraphDashboard(dec); }
    if(kind==='category') { showGraphDashboard(true); return renderGraphDashboard(null, dec); }
    if(kind==='q'){
      if($('#q'))$('#q').value=dec;
      showGraphDashboard(true);
      renderGraphDashboard();
      handleSearchHighlight(dec);
      return;
    }
    showGraphDashboard(true);
    renderGraphDashboard();
  }
  let _routed=false;
  function route(){ stopGraph(); stopClassroom(); closeNav(); const go=()=>dispatch();
    if(_routed && document.startViewTransition && !location.hash.startsWith('#/graph') && !location.hash.startsWith('#/classroom')){ document.startViewTransition(go); } else go(); _routed=true; }
  window.addEventListener('hashchange',route);

  /* search box */
  let tmr=null;
  $('#q').addEventListener('input',e=>{ clearTimeout(tmr); const v=e.target.value;
    tmr=setTimeout(()=>{ if(v.trim()) location.hash='#/q/'+encodeURIComponent(v.trim()); else if(location.hash.startsWith('#/q/')) location.hash='#/'; },180); });
  document.addEventListener('keydown',e=>{ if(e.key==='/'&&document.activeElement!==$('#q')){ e.preventDefault(); $('#q').focus(); } if(e.key==='Escape'&&document.activeElement===$('#q')){ $('#q').blur(); } });

  /* language */
  function updateGraphLanguage() {
    if (!window.kgInitialized) return;
    const legendContainer = document.getElementById("kgLegend");
    if (legendContainer) {
      legendContainer.innerHTML = CATS.map(c => `
        <span class="legend-item" data-cat="${c.id}">
          <span class="ld" style="background:${c.color}"></span>
          ${esc(catName(c))}
        </span>
      `).join('');
      updateLegendUI();
    }
    if (nodeSelection) {
      nodeSelection.select("text").text(d => {
        let txt = LANG === 'ko' && d.term_ko ? d.term_ko : d.term;
        return d.isCategoryNode ? txt.toUpperCase() : txt;
      });
    }
  }

  function applyStaticI18n(){ document.documentElement.lang=LANG; $('#brandSub').textContent=t('sub'); $('#q').placeholder=t('searchPh'); $('#langBtn').textContent=LANG==='ko'?'EN':'KO'; updateGraphLanguage(); }
  $('#langBtn').addEventListener('click',()=>{ LANG=LANG==='ko'?'en':'ko'; try{localStorage.setItem('tg-lang',LANG);}catch(_){} applyStaticI18n(); route(); });

  /* theme & nav */
  function applyTheme(th){ document.documentElement.dataset.theme=th; try{localStorage.setItem('tg-theme',th);}catch(_){} }
  $('#themeBtn').addEventListener('click',()=>applyTheme(document.documentElement.dataset.theme==='dark'?'light':'dark'));
  try{ const saved=localStorage.getItem('tg-theme'); applyTheme(saved||(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light')); }catch(_){ applyTheme('light'); }
  function openNav(){ document.body.classList.add('nav-open'); } function closeNav(){ document.body.classList.remove('nav-open'); }
  $('#menuBtn').addEventListener('click',openNav); $('#scrim').addEventListener('click',closeNav);

  applyStaticI18n(); route();
})();
</script>
</body>
