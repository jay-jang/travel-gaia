  function showGraphDashboard(show) {
    const gd = document.getElementById("graph-dashboard");
    const mainEl = document.getElementById("main");
    if (show) {
      gd.style.display = "flex";
      mainEl.style.display = "none";
    } else {
      gd.style.display = "none";
      mainEl.style.display = "block";
      closeDrawer();
    }
  }

  function handleSearchHighlight(query) {
    const q = query.trim().toLowerCase();
    if (!q) {
      d3.selectAll("#kg-svg .node-group").classed("dimmed", false).classed("highlighted", false);
      d3.selectAll("#kg-svg .link").classed("dimmed", false);
      return;
    }

    const results = search(q);
    const matchedIds = new Set(results.map(r => r.e.id));

    d3.selectAll("#kg-svg .node-group")
      .classed("dimmed", d => matchedIds.size > 0 && !matchedIds.has(d.id))
      .classed("highlighted", d => matchedIds.has(d.id));

    d3.selectAll("#kg-svg .link")
      .classed("dimmed", d => {
        const sId = typeof d.source === 'object' ? d.source.id : d.source;
        const tId = typeof d.target === 'object' ? d.target.id : d.target;
        return matchedIds.size > 0 && (!matchedIds.has(sId) || !matchedIds.has(tId));
      });
  }

  function renderGraphDashboard(focusTermId, filterCatId) {
    renderSidebar(filterCatId || null);
    initGraph();

    if (filterCatId) {
      activeCategories.clear();
      activeCategories.add(filterCatId);
      updateLegendUI();
      updateGraphDataset();
      closeDrawer();
      setTimeout(zoomFit, 50);
    } else if (focusTermId) {
      activeTermId = focusTermId;
      updateDrawer(focusTermId);
      setTimeout(() => centerOnNode(focusTermId), 50);
    } else {
      activeTermId = null;
      closeDrawer();
      handleSearchHighlight('');
      if (activeCategories.size < CATS.length) {
        CATS.forEach(c => activeCategories.add(c.id));
        updateLegendUI();
        updateGraphDataset();
      }
      setTimeout(zoomFit, 50);
    }
  }

  /* router */
  /* ---- #2 confusables / provider matrix / side-by-side compare ---- */
  function pageHead(title, sub){ return `<div class="crumbs"><a href="#/">${esc(t('home2'))}</a> › ${esc(title)}</div><div class="sec-title" style="margin-top:0">${esc(title)}${sub?` <span style="color:var(--faint);font-weight:400;font-size:.85rem">· ${esc(sub)}</span>`:''}</div>`; }
  function renderConfusables(){ showGraphDashboard(false);
    const seen=new Set(); const pairs=[];
    ENTRIES.forEach(e=>(e.distinctions||[]).forEach(d=>{ const key=[e.id,(d.targetId||d.targetTerm)].sort().join('|'); if(seen.has(key))return; seen.add(key);
      pairs.push({a:e,b:d.targetId?byId.get(d.targetId):null,bTerm:d.targetTerm,ex:(LANG==='ko'&&d.explanation_ko)||d.explanation||''}); }));
    pairs.sort((x,y)=>x.a.term.localeCompare(y.a.term));
    let h=pageHead(LANG==='ko'?'헷갈리기 쉬운 용어 쌍':'Confusable pairs', LANG==='ko'?`${pairs.length}쌍`:`${pairs.length} pairs`);
    h+=`<div class="termlist">`;
    pairs.forEach(p=>{ h+=`<div class="tl-item" style="cursor:default;display:block"><div class="h">${linkTerm(p.a.id,p.a.term)} <span style="color:var(--accent);font-family:var(--mono);font-size:.8rem">vs</span> ${p.b?linkTerm(p.b.id,p.b.term):esc(p.bTerm)}</div><div class="d" style="-webkit-line-clamp:unset">${esc(p.ex)}</div>${p.b?`<div style="margin-top:6px"><a class="rel-link" href="#/compare/${p.a.id},${p.b.id}">${LANG==='ko'?'나란히 비교 →':'compare →'}</a></div>`:''}</div>`; });
    h+=`</div>`; main.innerHTML=h; renderSidebar(null); main.focus(); document.title='Confusables — Travel Gaia'; }
  function renderMatrix(){ showGraphDashboard(false);
    const freq={}; ENTRIES.forEach(e=>(e.providerTerms||[]).forEach(p=>{ if(p.provider) freq[p.provider]=(freq[p.provider]||0)+1; }));
    const provs=Object.keys(freq).sort((a,b)=>freq[b]-freq[a]).slice(0,12);
    const rows=ENTRIES.filter(e=>(e.providerTerms||[]).some(p=>provs.includes(p.provider))).sort((a,b)=>a.term.localeCompare(b.term));
    let h=pageHead(LANG==='ko'?'공급자·표준 대응 매트릭스':'Provider / standard matrix', LANG==='ko'?`${rows.length}개 표제어 × ${provs.length}개`:`${rows.length} terms × ${provs.length}`);
    h+=`<p style="color:var(--muted);font-size:.85rem;margin:-4px 0 10px">${LANG==='ko'?'같은 개념을 공급자/표준이 부르는 이름. 빈 칸은 미수록.':'How providers/standards name the same concept. Blank = not yet recorded.'}</p>`;
    h+=`<div style="display:flex;gap:8px;flex-wrap:wrap;margin:0 0 16px"><span style="font-size:.74rem;color:var(--faint);align-self:center;font-family:var(--mono)">${LANG==='ko'?'내보내기:':'export:'}</span><button class="tbtn" onclick="tgExport('json')">JSON</button><button class="tbtn" onclick="tgExport('csv')">CSV</button><button class="tbtn" onclick="tgExport('jsonld')">JSON-LD</button></div>`;
    h+=`<div style="overflow-x:auto"><table class="pt" style="min-width:720px"><thead><tr><th>${esc(t('thTerm'))}</th>${provs.map(p=>`<th>${esc(p)}</th>`).join('')}</tr></thead><tbody>`;
    rows.forEach(e=>{ h+=`<tr><td class="prov">${linkTerm(e.id,e.term)}</td>`+provs.map(pv=>{ const pt=(e.providerTerms||[]).find(p=>p.provider===pv); return `<td>${pt?`<code>${esc(pt.term)}</code>`:'<span style="color:var(--faint)">·</span>'}</td>`; }).join('')+`</tr>`; });
    h+=`</tbody></table></div>`; main.innerHTML=h; renderSidebar(null); main.focus(); document.title='Matrix — Travel Gaia'; }
  function compareCard(e){ const c=catById.get(e.category)||{};
    let h=`<div style="border:1px solid var(--rule);border-radius:var(--r);padding:16px;background:var(--surface);min-width:0">`;
    h+=`<div class="term-head" style="--cc:${c.color||'var(--accent)'};margin-bottom:10px"><h1 style="font-size:1.3rem">${esc(e.term)}</h1><div class="term-sub">${esc(catName(c))}</div></div>`;
    h+=`<div class="field"><h3>${LANG==='ko'?'정의':'Definition'}</h3><div style="font-family:var(--serif);font-size:.98rem">${esc(Lf(e,'definition'))}</div></div>`;
    h+=`<div class="field"><h3>${esc(t('fAlias'))}</h3>${(e.aliases||[]).length?`<div class="chips">${e.aliases.map(a=>`<span class="chip">${esc(a)}</span>`).join('')}</div>`:'<span style="color:var(--faint)">—</span>'}</div>`;
    h+=`<div class="field"><h3>${esc(t('fProv'))}</h3>${(e.providerTerms||[]).length?e.providerTerms.map(p=>`<div style="font-size:.86rem;margin:2px 0"><b>${esc(p.provider)}</b>: <code>${esc(p.term)}</code></div>`).join(''):'<span style="color:var(--faint)">—</span>'}</div>`;
    h+=`<div class="field"><h3>${esc(t('fDist'))}</h3>${(e.distinctions||[]).length?e.distinctions.map(d=>`<div class="dist"><b>${linkTerm(d.targetId,d.targetTerm)}</b><br>${esc((LANG==='ko'&&d.explanation_ko)||d.explanation||'')}</div>`).join(''):'<span style="color:var(--faint)">—</span>'}</div>`;
    return h+`</div>`; }
  function renderCompare(spec){ showGraphDashboard(false);
    const ids=(spec||'').split(',').map(s=>s.trim()).filter(Boolean).slice(0,3); const es=ids.map(id=>byId.get(id)).filter(Boolean);
    let h=pageHead(LANG==='ko'?'나란히 비교':'Compare', es.map(e=>e.term).join(' · '));
    if(es.length<2){ h+=`<div class="empty">${LANG==='ko'?'비교할 용어를 2~3개 선택하세요 (예: #/compare/pnr,segment). “헷갈리기 쉬운 용어” 페이지의 “나란히 비교”로도 진입할 수 있습니다.':'Pick 2–3 terms, e.g. #/compare/pnr,segment — or use “compare” on the Confusables page.'}</div>`; }
    else { h+=`<div style="display:grid;grid-template-columns:repeat(${es.length},minmax(0,1fr));gap:16px;align-items:start">${es.map(compareCard).join('')}</div>`; }
    main.innerHTML=h; renderSidebar(null); main.focus(); document.title='Compare — Travel Gaia'; }

  /* ---- mindmap: collapsible radial tree of the taxonomy (vertical -> subcategory -> term) ---- */
  function renderMindmap(){ showGraphDashboard(false);
    let h=pageHead(LANG==='ko'?'마인드맵 (분류 구조)':'Mindmap (taxonomy)', LANG==='ko'?`${VERTICALS.length} 버티컬 · ${CATS.length} 세분류 · ${ENTRIES.length} 표제어`:`${VERTICALS.length} verticals · ${CATS.length} subcategories · ${ENTRIES.length} terms`);
    h+=`<div style="display:flex;gap:8px;flex-wrap:wrap;margin:0 0 10px"><button class="tbtn" id="mmCollapse">${LANG==='ko'?'모두 접기':'Collapse all'}</button><button class="tbtn" id="mmReset">${LANG==='ko'?'화면 리셋':'Reset view'}</button><span style="font-size:.74rem;color:var(--faint);align-self:center">${LANG==='ko'?'세분류 클릭=펼치기 · 표제어 클릭=상세 · 드래그/휠=이동·확대':'click subcategory=expand · click term=detail · drag/wheel=pan·zoom'}</span></div>`;
    h+=`<div id="mmwrap" style="position:relative;height:calc(100vh - 210px);min-height:480px;border:1px solid var(--rule);background:var(--surface);overflow:hidden"><svg id="mmsvg" style="width:100%;height:100%;cursor:grab;display:block"></svg><div id="mmtip" class="kg-tip"></div></div>`;
    main.innerHTML=h; renderSidebar(null); document.title='Mindmap — Travel Gaia';
    if(typeof d3==='undefined'){ document.getElementById('mmwrap').innerHTML='<div class="empty">d3 unavailable</div>'; return; }
    const root0={name:META.name||'Travel Gaia',isRoot:true,children:VERTICALS.map(v=>({id:'v:'+v.id,name:vertName(v),color:v.color,isVert:true,
      children:(catsByVert.get(v.id)||[]).map(c=>({id:'c:'+c.id,name:catName(c),color:c.color,isCat:true,
        children:(entriesByCat.get(c.id)||[]).map(e=>({id:'t:'+e.id,tid:e.id,name:(LANG==='ko'&&e.term_ko&&e.term_ko!==e.term?e.term_ko:e.term),term:e,color:c.color,isTerm:true}))}))}))};
    const root=d3.hierarchy(root0);
    root.descendants().forEach(d=>{ if(d.depth>=2 && d.children){ d._children=d.children; d.children=null; } });
    const wrap=document.getElementById('mmwrap'); const W=wrap.clientWidth||900, H=wrap.clientHeight||540; const radius=Math.min(W,H)/2-72;
    const svg=d3.select('#mmsvg').attr('viewBox',[-W/2,-H/2,W,H].join(' '));
    const gZoom=svg.append('g');
    const gLink=gZoom.append('g').attr('fill','none').attr('stroke-opacity',0.55).attr('stroke-width',1.1);
    const gNode=gZoom.append('g');
    const tip=document.getElementById('mmtip');
    const tree=d3.tree().size([2*Math.PI,radius]).separation((a,b)=>(a.parent===b.parent?1:2)/(a.depth||1));
    const zoom=d3.zoom().scaleExtent([0.35,5]).on('zoom',ev=>gZoom.attr('transform',ev.transform));
    svg.call(zoom);
    function update(){ tree(root);
      const nodes=root.descendants(), links=root.links();
      gLink.selectAll('path').data(links,d=>d.target.data.id).join('path')
        .attr('stroke',d=>d.target.data.color||'var(--border)')
        .attr('d',d3.linkRadial().angle(d=>d.x).radius(d=>d.y));
      const node=gNode.selectAll('g.mmn').data(nodes,d=>d.data.id);
      const ne=node.enter().append('g').attr('class','mmn');
      ne.append('circle'); ne.append('text').attr('fill','currentColor').style('paint-order','stroke').attr('stroke','var(--surface)').attr('stroke-width',3).attr('stroke-linejoin','round');
      const nm=ne.merge(node).style('cursor','pointer').attr('transform',d=>`rotate(${d.x*180/Math.PI-90}) translate(${d.y},0)`);
      nm.select('circle').attr('r',d=>d.data.isRoot?6:d.data.isVert?5:d.data.isCat?4:2.6)
        .attr('fill',d=>(d._children?'var(--accent)':(d.data.color||'var(--muted)'))).attr('stroke','var(--surface)').attr('stroke-width',1.4);
      nm.select('text').attr('dy','0.31em').attr('font-size',d=>d.data.isTerm?'9px':d.data.isCat?'11px':'12.5px').attr('font-weight',d=>d.data.isTerm?400:700)
        .attr('x',d=>d.x<Math.PI?7:-7).attr('text-anchor',d=>d.x<Math.PI?'start':'end')
        .attr('transform',d=>d.x>=Math.PI?'rotate(180)':null).text(d=>d.data.name);
      nm.on('click',(ev,d)=>{ ev.stopPropagation(); if(d.data.isTerm){ location.hash='#/term/'+d.data.tid; return; }
        if(d.children){ d._children=d.children; d.children=null; } else if(d._children){ d.children=d._children; d._children=null; } update(); })
        .on('mousemove',(ev,d)=>{ if(!d.data.isTerm){ tip.style.opacity=0; return; } const e=d.data.term; const def=esc(String((LANG==='ko'&&e.definition_ko)||e.definition||'').slice(0,90)); const rc=(e.relationships||[]).length;
          tip.innerHTML=`<b>${esc(e.term)}</b>${rc?` · ${LANG==='ko'?'관계':'links'} ${rc}`:''}<br>${def}`; const r=wrap.getBoundingClientRect(); tip.style.left=(ev.clientX-r.left)+'px'; tip.style.top=(ev.clientY-r.top)+'px'; tip.style.opacity=1; })
        .on('mouseleave',()=>{ tip.style.opacity=0; });
      gNode.attr('color','var(--text)');
    }
    update();
    document.getElementById('mmCollapse').onclick=()=>{ root.descendants().forEach(d=>{ if(d.depth>=2&&d.children){ d._children=d.children; d.children=null; } }); update(); };
    document.getElementById('mmReset').onclick=()=>{ svg.transition().duration(300).call(zoom.transform,d3.zoomIdentity); };
  }

  /* ---- vertical landing (big grouping -> its subcategories) ---- */
  function renderVertical(id){ showGraphDashboard(false); const v=vertById.get(id);

    let h=pageHead(vertName(v), LANG==='ko'?`${vcats.length}개 세분류 · ${total}개 표제어`:`${vcats.length} subcategories · ${total} terms`);

    vcats.forEach(c=>{ const list=(entriesByCat.get(c.id)||[]); const n=list.length;
      const samples=list.slice(0,6).map(e=>`<a href="#/term/${e.id}">${esc(e.term)}</a>`).join('<span class="sep">·</span>');
      h+=`<div class="card" style="--cc:${c.color}"><a class="ct" href="#/category/${c.id}"><span class="dot" style="background:${c.color}"></span> ${esc(catName(c))}<span class="cn">${n}</span></a><div class="cd">${esc(catDesc(c))}</div><div class="dir-terms">${samples}${n>6?`<span class="sep">·</span><a class="more" href="#/category/${c.id}">+${n-6}</a>`:''}</div></div>`; });
    h+=`</div>`; main.innerHTML=h; renderSidebar(null); main.focus(); document.title=vertName(v)+' — Travel Gaia'; }

  /* ---- #5 machine-readable export (from inlined data; offline) ---- */
  window.tgExport=function(kind){ const d=window.GLOSSARY_DATA||{entries:[]}; let blob,name;
    if(kind==='csv'){ const cols=['id','term','term_ko','vertical','category','conceptType','status','definition']; const q=v=>`"${String(v==null?'':v).replace(/"/g,'""')}"`;
      const lines=[cols.join(',')].concat((d.entries||[]).map(e=>cols.map(c=>q(e[c])).join(','))); blob=new Blob([lines.join('\n')],{type:'text/csv'}); name='travel-gaia.csv'; }
    else if(kind==='jsonld'){ const s=document.querySelector('script[type="application/ld+json"]'); blob=new Blob([s?s.textContent:'{}'],{type:'application/ld+json'}); name='travel-gaia.jsonld'; }
    else { blob=new Blob([JSON.stringify(d,null,2)],{type:'application/json'}); name='travel-gaia.json'; }
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; document.body.appendChild(a); a.click(); setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},100); };

  function dispatch(){ const hash=location.hash||'#/';
    if(hash.startsWith('#/confusables')){ if($('#q'))$('#q').value=''; return renderConfusables(); }
    if(hash.startsWith('#/matrix')){ if($('#q'))$('#q').value=''; return renderMatrix(); }
    if(hash.startsWith('#/compare/')){ if($('#q'))$('#q').value=''; return renderCompare(decodeURIComponent(hash.slice(10))); }
    if(hash.startsWith('#/vertical/')){ if($('#q'))$('#q').value=''; return renderVertical(decodeURIComponent(hash.slice(11))); }
    if(hash.startsWith('#/mindmap')){ if($('#q'))$('#q').value=''; return renderMindmap(); }
    if(hash==='#/index'||hash.startsWith('#/index')){ showGraphDashboard(false); document.title='Index — Travel Gaia'; if($('#q'))$('#q').value=''; return renderIndex(); }
    if(hash==='#/classroom'||hash.startsWith('#/classroom')){ showGraphDashboard(false); document.title='Classroom — Travel Gaia'; if($('#q'))$('#q').value=''; return renderClassroom(); }
    if(hash==='#/graph'||hash.startsWith('#/graph?')){ showGraphDashboard(true); document.title='Knowledge Graph — Travel Gaia'; if($('#q'))$('#q').value=''; return renderGraphDashboard(); }
    const m=hash.match(/^#\/(term|category|q)\/(.+)$/);
    if(!m||hash==='#/'){ showGraphDashboard(true); document.title='Travel Gaia — 여행 산업 용어 백과사전'; if($('#q'))$('#q').value=''; return renderGraphDashboard(); }
    const kind=m[1], dec=decodeURIComponent(m[2]);
    if(kind==='term') { showGraphDashboard(true); return renderGraphDashboard(dec); }
    if(kind==='category') { showGraphDashboard(true); return renderGraphDashboard(null, dec); }
    if(kind==='q'){
      if($('#q'))$('#q').value=dec;
      showGraphDashboard(true);
      renderGraphDashboard();
      handleSearchHighlight(dec);
      return;
    }
    showGraphDashboard(true);
    renderGraphDashboard();
  }
  let _routed=false;
  function route(){ stopGraph(); stopClassroom(); closeNav(); const go=()=>dispatch();
    if(_routed && document.startViewTransition && !location.hash.startsWith('#/graph') && !location.hash.startsWith('#/classroom')){ document.startViewTransition(go); } else go(); _routed=true; }
  window.addEventListener('hashchange',route);

  /* search box */
  let tmr=null;
  $('#q').addEventListener('input',e=>{ clearTimeout(tmr); const v=e.target.value;
    tmr=setTimeout(()=>{ if(v.trim()) location.hash='#/q/'+encodeURIComponent(v.trim()); else if(location.hash.startsWith('#/q/')) location.hash='#/'; },180); });
  document.addEventListener('keydown',e=>{ if(e.key==='/'&&document.activeElement!==$('#q')){ e.preventDefault(); $('#q').focus(); } if(e.key==='Escape'&&document.activeElement===$('#q')){ $('#q').blur(); } });

  /* language */
  function updateGraphLanguage() {
    if (!window.kgInitialized) return;
    const legendContainer = document.getElementById("kgLegend");
    if (legendContainer) {
      legendContainer.innerHTML = CATS.map(c => `
        <span class="legend-item" data-cat="${c.id}">
          <span class="ld" style="background:${c.color}"></span>
          ${esc(catName(c))}
        </span>
      `).join('');
      updateLegendUI();
    }
    if (nodeSelection) {
      nodeSelection.select("text").text(d => {
        let txt = LANG === 'ko' && d.term_ko ? d.term_ko : d.term;
        return d.isCategoryNode ? txt.toUpperCase() : txt;
      });
    }
  }

  function applyStaticI18n(){ document.documentElement.lang=LANG; $('#brandSub').textContent=t('sub'); $('#q').placeholder=t('searchPh'); $('#langBtn').textContent=LANG==='ko'?'EN':'KO'; updateGraphLanguage(); }
  $('#langBtn').addEventListener('click',()=>{ LANG=LANG==='ko'?'en':'ko'; try{localStorage.setItem('tg-lang',LANG);}catch(_){} applyStaticI18n(); route(); });

  /* theme & nav */
  function applyTheme(th){ document.documentElement.dataset.theme=th; try{localStorage.setItem('tg-theme',th);}catch(_){} }
  $('#themeBtn').addEventListener('click',()=>applyTheme(document.documentElement.dataset.theme==='dark'?'light':'dark'));
  try{ const saved=localStorage.getItem('tg-theme'); applyTheme(saved||(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light')); }catch(_){ applyTheme('light'); }
  function openNav(){ document.body.classList.add('nav-open'); } function closeNav(){ document.body.classList.remove('nav-open'); }
  $('#menuBtn').addEventListener('click',openNav); $('#scrim').addEventListener('click',closeNav);

  applyStaticI18n(); route();
})();
</script>
</body>
</html>
