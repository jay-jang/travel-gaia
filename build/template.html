      { name:'Google Hotels', blurb:{ko:'호텔 요금 피드·예약 연동(Hotel Center / Hotel prices API).',en:'Hotel price feeds and booking integration (Hotel Center / Hotel prices API).'},
        links:[['Google Hotels','https://developers.google.com/hotels']] }
    ]},
    { color:'#e8590c', group:{ko:'투어·액티비티 표준·API',en:'Tours & activities standards & APIs'}, items:[
      { name:'OCTO', termId:'octo-spec', blurb:{ko:'투어·액티비티·어트랙션 연결을 위한 개방형 JSON API 표준.',en:'Open JSON API standard for tours, activities and attractions connectivity.'},
        links:[['OCTO','https://octo.travel/'],['Specification','https://octo.travel/specification']] },
      { name:'Reseller / Booking APIs', termId:'reseller-api', blurb:{ko:'운영사 재고를 노출하는 마켓플레이스의 독자 공급자 API.',en:'Marketplaces’ proprietary supplier APIs exposing operator inventory.'},
        links:[['Viator Partner','https://www.viator.com/partner/home'],['GetYourGuide Partner','https://partner.getyourguide.com/']] },
      { name:'Google Things to Do', blurb:{ko:'어트랙션·투어 상품을 구글에 노출하는 피드 프로그램.',en:'Feed program that surfaces attraction and tour products on Google.'},
        links:[['Google Things to Do','https://developers.google.com/travel/things-to-do']] }
    ]},
    { color:'#5f3dc4', group:{ko:'지상교통·철도 표준·API',en:'Ground & rail standards & APIs'}, items:[
      { name:'OSDM', termId:'osdm', blurb:{ko:'철도 개방형 판매·유통 모델(REST API, 소매/유통 모드).',en:'Rail Open Sales and Distribution Model (REST API, retailer/distributor modes).'},
        links:[['OSDM','https://osdm.io/']] },
      { name:'GBFS', termId:'general-bikeshare-feed-specification', blurb:{ko:'공유 모빌리티 실시간 가용성 피드 명세(MobilityData).',en:'Real-time shared-mobility availability feed spec (MobilityData).'},
        links:[['GBFS','https://gbfs.org/'],['GitHub','https://github.com/MobilityData/gbfs']] },
      { name:'GTFS', blurb:{ko:'대중교통 시각표·실시간 표준(정적/실시간).',en:'Public-transit schedule and real-time standard (static / realtime).'},
        links:[['GTFS','https://gtfs.org/']] },
      { name:'NeTEx / Transmodel', blurb:{ko:'유럽 대중교통 데이터 교환 모델(CEN).',en:'European public-transport data exchange model (CEN).'},
        links:[['NeTEx','https://netex-cen.eu/']] }
    ]},
    { color:'#b5560f', group:{ko:'결제·보안 표준',en:'Payments & security standards'}, items:[
      { name:'PCI DSS', termId:'pci-dss', blurb:{ko:'카드 데이터 보안 표준(PCI SSC).',en:'Payment Card Industry Data Security Standard (PCI SSC).'},
        links:[['PCI SSC','https://www.pcisecuritystandards.org/']] },
      { name:'EMV 3-D Secure', termId:'3-d-secure', blurb:{ko:'비대면(CNP) 결제 인증 프로토콜(EMVCo).',en:'Card-not-present authentication protocol (EMVCo).'},
        links:[['EMVCo 3DS','https://www.emvco.com/emv-technologies/3-d-secure/']] },
      { name:'ISO 20022', blurb:{ko:'금융·결제 메시징 표준(정산·송금).',en:'Financial / payment messaging standard (settlement, remittance).'},
        links:[['ISO 20022','https://www.iso20022.org/']] },
      { name:'Tokenization', termId:'tokenization', blurb:{ko:'카드번호(PAN)를 토큰으로 대체하는 결제 보안(EMVCo).',en:'Replacing the card PAN with a token for payment security (EMVCo).'},
        links:[['EMVCo Tokenisation','https://www.emvco.com/emv-technologies/payment-tokenisation/']] }
    ]},
    { color:'#5b6678', group:{ko:'식별자·데이터 표준',en:'Identifiers & data standards'}, items:[
      { name:'ISO 3166 / 4217', termId:'iso-3166-country-code', blurb:{ko:'국가 코드·통화 코드 표준(ISO).',en:'Country-code and currency-code standards (ISO).'},
        links:[['ISO 3166','https://www.iso.org/iso-3166-country-codes.html'],['ISO 4217','https://www.iso.org/iso-4217-currency-codes.html']] },
      { name:'IATA / ICAO codes', termId:'iata-code', blurb:{ko:'공항·항공사·도시 코드 체계(IATA·ICAO).',en:'Airport, airline and city code systems (IATA / ICAO).'},
        links:[['IATA','https://www.iata.org/'],['ICAO','https://www.icao.int/']] },
      { name:'UN/LOCODE', termId:'un-locode', blurb:{ko:'유엔 무역·운송 위치 코드.',en:'UN code for trade and transport locations.'},
        links:[['UNECE UN/LOCODE','https://unece.org/trade/cefact/unlocode-code-list-country-and-territory']] },
      { name:'schema.org', blurb:{ko:'여행 구조화 데이터 어휘(Trip·Reservation·TouristAttraction).',en:'Structured-data vocabulary for travel (Trip, Reservation, TouristAttraction).'},
        links:[['schema.org','https://schema.org/docs/full.html']] }
    ]}
  ];

  function renderTech(){
    showGraphDashboard(false);
    const L = s => LANG==='ko' ? s.ko : s.en;
    const extLink = ([label,url]) => `<a class="tech-link" href="${esc(url)}" target="_blank" rel="noopener noreferrer">${esc(label)}<span class="tl-ext">↗</span></a>`;
    const pipeHTML = pipe => pipe.map(([lab,id],i)=>`${i?'<span class="tp-arr">→</span>':''}<a href="#/term/${encodeURIComponent(id)}">${esc(lab)}</a>`).join('');

    let h = pageHead(LANG==='ko'?'기술 레퍼런스 · API & 아키텍처':'Tech Reference · APIs & Architecture',
                     LANG==='ko'?'여행 산업 기술 표준·API와 외부 개발 문서':'Travel-industry tech standards, APIs & external developer references');
    h += `<p class="tech-intro">${LANG==='ko'
      ? '여행 상품의 검색·예약·정산·이행을 떠받치는 핵심 기술 표준과 API를 한자리에 모았습니다. 각 항목은 사전 표제어(있는 경우)와 공식 사양·개발자 문서로 연결됩니다. 먼저 버티컬별 아키텍처 개요를 보고, 이어서 표준·API 레퍼런스를 살펴보세요.'
      : 'The core technical standards and APIs that power travel shopping, booking, settlement and fulfillment — each linked to its glossary entry (where one exists) and to the official spec or developer docs. Start with the per-vertical architecture overviews, then browse the standards & API references.'}</p>`;

    // architecture overviews
    h += `<div class="tech-sec"><div class="tech-sec-h"><span class="ts-dot" style="background:var(--accent)"></span>${LANG==='ko'?'아키텍처 개요':'Architecture overviews'}</div>`;
    h += `<div class="tech-arch">` + TECH_ARCH.map(a=>`
      <div class="tech-arch-card" style="--cc:${a.color}">
        <h4>${esc(L(a.title))}</h4>
        <p>${esc(L(a.blurb))}</p>
        <div class="tech-pipe">${pipeHTML(a.pipe)}</div>
      </div>`).join('') + `</div></div>`;

    // standards & API reference groups
    TECH_REFS.forEach(g=>{
      h += `<div class="tech-sec"><div class="tech-sec-h"><span class="ts-dot" style="background:${g.color}"></span>${esc(L(g.group))}</div>`;
      h += `<div class="tech-grid">` + g.items.map(it=>{
        const term = it.termId && byId.get(it.termId)
          ? `<a class="tech-card-term" href="#/term/${encodeURIComponent(it.termId)}" title="${LANG==='ko'?'사전 보기':'View glossary'}">${LANG==='ko'?'사전':'glossary'}</a>` : '';
        return `<div class="tech-card" style="--cc:${g.color}">
            <div class="tech-card-h"><span class="tech-card-name">${esc(it.name)}</span>${term}</div>
            <div class="tech-card-blurb">${esc(L(it.blurb))}</div>
            <div class="tech-links">${(it.links||[]).map(extLink).join('')}</div>
          </div>`;
      }).join('') + `</div></div>`;
    });

    main.innerHTML = `<div class="tech-page">${h}</div>`; renderSidebar(null); main.focus();
    document.title = (LANG==='ko'?'기술 레퍼런스':'Tech Reference') + ' — Travel Wiki';

    // clicking a glossary term opens the inline drawer overlay (like the flow & mindmap pages)
    const techPage = main.querySelector('.tech-page');
    if (techPage) {
      techPage.addEventListener('click', ev => {
        const link = ev.target.closest('a[href^="#/term/"]');
        if (link) {
          ev.preventDefault();
          const termId = decodeURIComponent(link.getAttribute('href').substring('#/term/'.length));
          initDrawerListeners();
          updateDrawer(termId);
        }
      });
    }
  }

  /* ---- #5 machine-readable export (from inlined data; offline) ---- */
  window.tgExport=function(kind){ const d=window.GLOSSARY_DATA||{entries:[]}; let blob,name;
    if(kind==='csv'){ const cols=['id','term','term_ko','vertical','category','conceptType','status','definition']; const q=v=>`"${String(v==null?'':v).replace(/"/g,'""')}"`;
      const lines=[cols.join(',')].concat((d.entries||[]).map(e=>cols.map(c=>q(e[c])).join(','))); blob=new Blob([lines.join('\n')],{type:'text/csv'}); name='travel-wiki.csv'; }
    else if(kind==='jsonld'){ const s=document.querySelector('script[type="application/ld+json"]'); blob=new Blob([s?s.textContent:'{}'],{type:'application/ld+json'}); name='travel-wiki.jsonld'; }
    else { blob=new Blob([JSON.stringify(d,null,2)],{type:'application/json'}); name='travel-wiki.json'; }
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; document.body.appendChild(a); a.click(); setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},100); };

  function dispatch(){ const hash=location.hash||'#/';
    if(hash.startsWith('#/confusables')){ if($('#q'))$('#q').value=''; return renderConfusables(); }
    if(hash.startsWith('#/matrix')){ if($('#q'))$('#q').value=''; return renderMatrix(); }
    if(hash.startsWith('#/compare/')){ if($('#q'))$('#q').value=''; return renderCompare(decodeURIComponent(hash.slice(10))); }
    if(hash.startsWith('#/vertical/')){ if($('#q'))$('#q').value=''; return renderVertical(decodeURIComponent(hash.slice(11))); }
    if(hash.startsWith('#/mindmap')){ if($('#q'))$('#q').value=''; return renderMindmap(); }
    if(hash==='#/map'){ document.title='Concept Map — Travel Wiki'; if($('#q'))$('#q').value=''; return renderMap(); }
    if(hash==='#/flows'||hash.startsWith('#/flows')){ document.title='Journey Flows — Travel Wiki'; if($('#q'))$('#q').value=''; return renderFlows(); }
    if(hash==='#/index'||hash.startsWith('#/index')){ document.title='Index — Travel Wiki'; if($('#q'))$('#q').value=''; return renderIndex(); }
    if(hash==='#/classroom'||hash.startsWith('#/classroom')){ document.title='Distribution — Travel Wiki'; if($('#q'))$('#q').value=''; return renderClassroom(); }
    if(hash==='#/tech'||hash.startsWith('#/tech')){ if($('#q'))$('#q').value=''; return renderTech(); }
    // #/graph redirects to mindmap now that the Knowledge Graph has been removed
    if(hash==='#/graph'||hash.startsWith('#/graph?')){ location.replace('#/mindmap'); return; }
    const m=hash.match(/^#\/(term|category|q)\/(.+)$/);
    if(!m||hash==='#/'){ document.title='Travel Wiki — 여행 산업 용어 백과사전'; if($('#q'))$('#q').value=''; return renderHome(); }
    const kind=m[1], dec=decodeURIComponent(m[2]);
    if(kind==='term') { return renderTerm(dec); }
    if(kind==='category') { return renderCategory(dec); }
    if(kind==='q'){
      if($('#q'))$('#q').value=dec;
      return renderSearch(dec);
    }
    renderHome();
  }
  let _routed=false;
  function route(){ closeDrawer(); stopGraph(); stopClassroom(); closeNav(); document.body.classList.remove('mm-full'); document.body.classList.remove('flow-full'); const go=()=>dispatch();
    if(_routed && document.startViewTransition && !location.hash.startsWith('#/classroom')){ document.startViewTransition(go); } else go(); _routed=true; }
  window.addEventListener('hashchange',route);

  /* search box */
  let tmr=null;
  $('#q').addEventListener('input',e=>{ clearTimeout(tmr); const v=e.target.value;
    tmr=setTimeout(()=>{ if(v.trim()) location.hash='#/q/'+encodeURIComponent(v.trim()); else if(location.hash.startsWith('#/q/')) location.hash='#/'; },180); });
  document.addEventListener('keydown',e=>{ if(e.key==='/'&&document.activeElement!==$('#q')){ e.preventDefault(); $('#q').focus(); } if(e.key==='Escape'&&document.activeElement===$('#q')){ $('#q').blur(); } });

  /* language */
  function updateGraphLanguage() {
    if (!window.kgInitialized) return;
    const legendContainer = document.getElementById("kgLegend");
    if (legendContainer) {
      legendContainer.innerHTML = CATS.map(c => `
        <span class="legend-item" data-cat="${c.id}">
          <span class="ld" style="background:${c.color}"></span>
          ${esc(catName(c))}
        </span>
      `).join('');
      updateLegendUI();
    }
    if (nodeSelection) {
      nodeSelection.select("text").text(d => {
        let txt = LANG === 'ko' && d.term_ko ? d.term_ko : d.term;
        return d.isCategoryNode ? txt.toUpperCase() : txt;
      });
    }
  }

  function applyStaticI18n(){ document.documentElement.lang=LANG; $('#brandSub').textContent=t('sub'); $('#q').placeholder=t('searchPh'); $('#langBtn').textContent=LANG==='ko'?'EN':'KO'; updateGraphLanguage(); }
  $('#langBtn').addEventListener('click',()=>{ LANG=LANG==='ko'?'en':'ko'; try{localStorage.setItem('tg-lang',LANG);}catch(_){} applyStaticI18n(); route(); });

  /* theme & nav */
  function applyTheme(th){ document.documentElement.dataset.theme=th; try{localStorage.setItem('tg-theme',th);}catch(_){} }
  $('#themeBtn').addEventListener('click',()=>applyTheme(document.documentElement.dataset.theme==='dark'?'light':'dark'));
  try{ const saved=localStorage.getItem('tg-theme'); applyTheme(saved||(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light')); }catch(_){ applyTheme('light'); }
  function openNav(){ document.body.classList.add('nav-open'); } function closeNav(){ document.body.classList.remove('nav-open'); }
  $('#menuBtn').addEventListener('click',openNav); $('#scrim').addEventListener('click',closeNav);

  initDrawerListeners();
  applyStaticI18n(); route();
})();
</script>
</body>
