<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Travel Gaia — 여행 산업 용어 백과사전</title>
<meta name="description" content="여행 산업(항공·호텔·유통·정산·표준)의 용어를 공급자/표준 간 통일한 standalone 백과사전. 한/영, 용어별 일러스트, 관계 그래프, 전체 색인.">
<style>
/*__FONTS__*/
:root{
  --bg:#f4f5f9; --surface:#ffffff; --surface-2:#eef0f7; --border:#e3e6f0;
  --text:#0b1020; --muted:#535d77; --faint:#9aa3bd;
  --accent:#4f2bff; --accent-2:#ff2d8e; --accent-3:#00c2a8; --accent-weak:#ece7ff;
  --grad:linear-gradient(115deg,#4f2bff 0%,#a01cff 45%,#ff2d8e 100%);
  --grad-soft:linear-gradient(115deg,#6d4bff22,#ff2d8e18);
  --warn:#d9730d; --warn-weak:#fff3e2; --danger:#e0245e;
  --shadow:0 2px 6px rgba(20,16,60,.06),0 12px 36px rgba(20,16,60,.10);
  --shadow-lg:0 8px 28px rgba(40,20,90,.14),0 30px 70px rgba(40,20,90,.18);
  --ring:0 0 0 4px var(--accent-weak);
  --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  --sans:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR","Apple SD Gothic Neo",sans-serif;
  --display:'Archivo','Space Grotesk',var(--sans);
  --grotesk:'Space Grotesk',var(--sans);
  --side:300px; --maxw:920px; --hh:64px;
}
[data-theme="dark"]{
  --bg:#070912; --surface:#0f1322; --surface-2:#171c30; --border:#262d47;
  --text:#f3f5ff; --muted:#a3acca; --faint:#5f6a8c;
  --accent:#8b6bff; --accent-2:#ff5fa6; --accent-3:#2fe0c4; --accent-weak:#1d1a3e;
  --grad:linear-gradient(115deg,#7b5bff 0%,#c44bff 45%,#ff5fa6 100%);
  --grad-soft:linear-gradient(115deg,#7b5bff2a,#ff5fa61f);
  --warn:#f0a85a; --warn-weak:#2a1e0c; --danger:#ff5b86;
  --shadow:0 2px 6px rgba(0,0,0,.4),0 14px 40px rgba(0,0,0,.5);
  --shadow-lg:0 10px 34px rgba(0,0,0,.55),0 36px 80px rgba(0,0,0,.6);
  --ring:0 0 0 4px #6d4bff44;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:16px;line-height:1.62;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
code,kbd{font-family:var(--mono);font-size:.86em;background:var(--surface-2);padding:.14em .45em;border-radius:6px;border:1px solid var(--border)}
::selection{background:var(--accent);color:#fff}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes pop{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:none}}
@keyframes drift{0%{transform:translate(0,0) rotate(0)}50%{transform:translate(-3%,4%) rotate(8deg)}100%{transform:translate(0,0) rotate(0)}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* header */
header.top{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:14px;height:var(--hh);padding:0 22px;
  background:color-mix(in srgb,var(--surface) 80%,transparent);backdrop-filter:blur(18px) saturate(1.4);-webkit-backdrop-filter:blur(18px) saturate(1.4);
  border-bottom:1px solid var(--border)}
.brand{display:flex;align-items:center;gap:11px;font-family:var(--grotesk);font-weight:700;font-size:1.2rem;letter-spacing:-.03em;white-space:nowrap;color:var(--text);cursor:pointer}
.brand .globe{width:36px;height:36px;border-radius:12px;display:grid;place-items:center;color:#fff;background:var(--grad);box-shadow:0 6px 18px rgba(120,40,255,.4);font-size:18px;transition:transform .4s cubic-bezier(.34,1.56,.64,1)}
.brand:hover .globe{transform:rotate(-12deg) scale(1.08)}
.brand small{display:block;font-family:var(--sans);font-weight:600;color:var(--faint);font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;margin-top:1px}
.searchwrap{flex:1;max-width:520px;position:relative;margin-left:8px}
#q{width:100%;padding:11px 40px;border:1.5px solid var(--border);border-radius:14px;background:var(--surface-2);color:var(--text);font-size:.95rem;font-weight:500;outline:none;transition:.2s}
#q:focus{border-color:var(--accent);background:var(--surface);box-shadow:var(--ring)}
.searchwrap .mag{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--faint);pointer-events:none}
.searchwrap .hint{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--faint);font-size:.72rem;font-weight:700;border:1px solid var(--border);border-radius:6px;padding:1px 7px;pointer-events:none}
.tbtn{border:1.5px solid var(--border);background:var(--surface);color:var(--text);height:42px;min-width:42px;padding:0 12px;border-radius:13px;cursor:pointer;font-family:var(--grotesk);font-size:14px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;gap:6px;transition:.18s}
.tbtn:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-1px)}
.actions{margin-left:auto;display:flex;gap:9px;align-items:center}
.menu-toggle{display:none;border:1.5px solid var(--border);background:var(--surface);color:var(--text);width:42px;height:42px;border-radius:13px;cursor:pointer;font-size:18px}

/* layout */
.shell{display:grid;grid-template-columns:var(--side) 1fr;align-items:start}
aside.nav{position:sticky;top:var(--hh);height:calc(100vh - var(--hh));overflow-y:auto;border-right:1px solid var(--border);background:var(--surface);padding:20px 14px}
aside .nav-title{font-family:var(--grotesk);font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--faint);margin:20px 10px 7px}
aside .nav-title:first-of-type{margin-top:2px}
.cat-link{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:9px 12px;border-radius:11px;color:var(--text);cursor:pointer;font-size:.9rem;font-weight:500;transition:.16s}
.cat-link:hover{background:var(--surface-2);color:var(--accent);text-decoration:none;transform:translateX(2px)}
.cat-link.active{background:var(--grad);color:#fff;font-weight:700;box-shadow:0 6px 16px rgba(120,40,255,.32)}
.cat-link .cnt{font-size:.72rem;font-weight:700;color:var(--muted);background:var(--surface-2);border-radius:20px;padding:1px 9px;min-width:28px;text-align:center}
.cat-link.active .cnt{background:rgba(255,255,255,.25);color:#fff}
.cat-link .dot{width:9px;height:9px;border-radius:3px;flex:none}
main{min-width:0;padding:38px clamp(18px,4.5vw,60px) 120px;max-width:calc(var(--maxw) + 120px);margin:0 auto;width:100%}
.scrim{display:none}

/* icons */
.icon{display:inline-grid;place-items:center;flex:none}
.icon svg{width:100%;height:100%;display:block}
.term-icon{width:60px;height:60px;border-radius:16px;background:var(--grad-soft);border:1px solid var(--border);padding:11px}
.tl-icon{width:40px;height:40px;border-radius:11px;background:var(--surface-2);padding:8px}
.idx-icon{width:30px;height:30px;border-radius:9px;background:var(--surface-2);padding:6px}

/* hero */
.hero{position:relative;overflow:hidden;background:var(--surface);border:1px solid var(--border);border-radius:28px;padding:46px 42px;box-shadow:var(--shadow);margin-bottom:30px;animation:fadeUp .5s both}
.hero::before{content:"";position:absolute;inset:-40% -10% auto auto;width:60%;height:160%;background:var(--grad);filter:blur(70px);opacity:.18;animation:drift 14s ease-in-out infinite}
.hero h1{position:relative;font-family:var(--display);font-weight:800;margin:.05em 0 .3em;font-size:clamp(2rem,4.6vw,3.4rem);line-height:1.04;letter-spacing:-.035em}
.hero p{position:relative;margin:.2em 0;color:var(--muted);max-width:64ch;font-size:1.02rem}
.stats{position:relative;display:flex;flex-wrap:wrap;gap:14px;margin-top:26px}
.stat{background:var(--surface-2);border:1px solid var(--border);border-radius:16px;padding:14px 22px;min-width:128px}
.stat b{display:block;font-family:var(--display);font-weight:800;font-size:2rem;letter-spacing:-.03em;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.stat span{color:var(--muted);font-size:.8rem;font-weight:600}
.sec-title{font-family:var(--grotesk);font-weight:700;font-size:1.3rem;margin:32px 0 14px;letter-spacing:-.02em;animation:fadeUp .45s both}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(244px,1fr));gap:14px}
.card{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:18px;cursor:pointer;box-shadow:var(--shadow);transition:transform .14s,box-shadow .14s,border-color .14s;animation:fadeUp .5s both;overflow:hidden}
.card::after{content:"";position:absolute;left:0;top:0;height:100%;width:4px;background:var(--cc,var(--accent));opacity:.85}
.card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:transparent;text-decoration:none}
.card .ct{display:flex;align-items:center;gap:9px;font-family:var(--grotesk);font-weight:700;font-size:1rem}
.card .cd{color:var(--muted);font-size:.85rem;margin-top:7px;line-height:1.5}
.card .cn{color:var(--faint);font-size:.74rem;font-weight:600;margin-top:11px;text-transform:uppercase;letter-spacing:.05em}
.cards .card:nth-child(1){animation-delay:.03s}.cards .card:nth-child(2){animation-delay:.06s}.cards .card:nth-child(3){animation-delay:.09s}.cards .card:nth-child(4){animation-delay:.12s}.cards .card:nth-child(5){animation-delay:.15s}.cards .card:nth-child(6){animation-delay:.18s}.cards .card:nth-child(7){animation-delay:.21s}.cards .card:nth-child(8){animation-delay:.24s}
.cta-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:22px;position:relative}
.cta-graph,.cta-2{display:inline-flex;align-items:center;gap:9px;border-radius:14px;padding:13px 22px;font-family:var(--grotesk);font-weight:700;font-size:.95rem}
.cta-graph{background:var(--grad);color:#fff;box-shadow:0 8px 24px rgba(120,40,255,.34)}
.cta-graph:hover{text-decoration:none;transform:translateY(-2px)}
.cta-2{background:var(--surface-2);color:var(--text);border:1px solid var(--border)}
.cta-2:hover{text-decoration:none;border-color:var(--accent);color:var(--accent)}
.conflict{display:block;background:var(--warn-weak);border:1px solid var(--border);border-left:4px solid var(--warn);border-radius:14px;padding:14px 16px;margin-bottom:11px;animation:fadeUp .5s both}
.conflict b{color:var(--warn)}
.disclaimer{max-width:var(--maxw);margin:24px auto 0;color:var(--faint);font-size:.78rem;line-height:1.55;text-align:center}

/* lists */
.crumbs{font-size:.82rem;color:var(--muted);margin-bottom:14px;font-weight:500}
.crumbs a{color:var(--muted)}
.termlist{display:grid;gap:9px}
.tl-item{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:13px 16px;cursor:pointer;transition:transform .13s,border-color .13s,box-shadow .13s}
.tl-item:hover{border-color:var(--accent);transform:translateX(4px);box-shadow:var(--shadow);text-decoration:none}
.tl-item .tl-body{min-width:0;flex:1}
.tl-item .h{font-family:var(--grotesk);font-weight:700;color:var(--text)}
.tl-item .d{color:var(--muted);font-size:.85rem;margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tl-item .abbr{color:var(--faint);font-weight:500;font-size:.85em}
.termlist{animation:fadeUp .45s both}

/* article */
article{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:clamp(22px,3.4vw,40px);box-shadow:var(--shadow);animation:fadeUp .5s both}
.term-hero{display:flex;align-items:center;gap:18px;margin-bottom:6px}
article h1{font-family:var(--display);font-weight:800;margin:0;font-size:clamp(1.7rem,3.6vw,2.4rem);letter-spacing:-.035em;line-height:1.1}
.term-sub{color:var(--muted);font-size:1.05rem;font-weight:600;margin:3px 0 0}
.badges{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0 4px}
.badge{font-size:.74rem;font-weight:600;padding:4px 11px;border-radius:20px;border:1px solid var(--border);background:var(--surface-2);color:var(--muted)}
.badge.cat{background:var(--grad);color:#fff;border-color:transparent;cursor:pointer}
.badge.st-active{color:var(--accent-3)}.badge.st-deprecated{color:var(--danger)}.badge.st-ambiguous{color:var(--warn)}
.lead{font-size:1.12rem;margin:18px 0;color:var(--text);line-height:1.6}
.field{margin-top:26px}
.field h3{font-family:var(--grotesk);font-size:.76rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);margin:0 0 11px;padding-bottom:7px;border-bottom:2px solid var(--border)}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{font-size:.82rem;background:var(--surface-2);border:1px solid var(--border);border-radius:9px;padding:4px 10px;color:var(--muted)}
table.pt{width:100%;border-collapse:collapse;font-size:.88rem}
table.pt th,table.pt td{text-align:left;padding:9px 11px;border-bottom:1px solid var(--border);vertical-align:top}
table.pt th{font-family:var(--grotesk);color:var(--faint);font-size:.72rem;text-transform:uppercase;letter-spacing:.06em}
table.pt td.prov{font-weight:700;white-space:nowrap}
table.pt code{white-space:nowrap}
.rel-group{margin-bottom:9px}
.rel-group .rl{font-family:var(--grotesk);font-size:.72rem;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:.06em;margin-right:7px}
.rel-link{display:inline-block;background:var(--accent-weak);color:var(--accent);border-radius:9px;padding:3px 11px;margin:3px 5px 3px 0;font-size:.85rem;font-weight:600}
.rel-link:hover{text-decoration:none;background:var(--accent);color:#fff}
.rel-dead{display:inline-block;background:var(--surface-2);color:var(--muted);border-radius:9px;padding:3px 11px;margin:3px 5px 3px 0;font-size:.85rem}
.dist{background:var(--surface-2);border:1px solid var(--border);border-left:3px solid var(--accent-2);border-radius:11px;padding:11px 13px;margin-bottom:8px;font-size:.9rem}
.dist b a{color:var(--text)}
ul.src{margin:0;padding-left:18px;font-size:.86rem;color:var(--muted)}
ul.src li{margin:4px 0}
.notes{background:var(--surface-2);border-left:3px solid var(--accent);border-radius:0 10px 10px 0;padding:11px 15px;font-size:.9rem;color:var(--muted)}
.rel-meta{margin-top:28px;color:var(--faint);font-size:.78rem;border-top:1px solid var(--border);padding-top:14px}

/* search / empty */
.searchmeta{color:var(--muted);font-size:.9rem;margin-bottom:14px}
mark{background:var(--accent-weak);color:var(--accent);padding:0 2px;border-radius:4px}
.empty{color:var(--muted);text-align:center;padding:70px 10px}

/* index page */
.idx-head{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:12px;margin-bottom:6px}
.idx-toggle{display:inline-flex;background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:3px;gap:2px}
.idx-toggle button{border:0;background:none;color:var(--muted);font-family:var(--grotesk);font-weight:700;font-size:.82rem;padding:6px 14px;border-radius:9px;cursor:pointer}
.idx-toggle button.on{background:var(--grad);color:#fff}
.idx-bar{position:sticky;top:var(--hh);z-index:5;display:flex;flex-wrap:wrap;gap:4px;padding:12px 0;margin-bottom:8px;background:linear-gradient(var(--bg),var(--bg) 70%,transparent)}
.idx-bar button{width:30px;height:30px;border:1px solid var(--border);background:var(--surface);color:var(--muted);border-radius:9px;font-family:var(--grotesk);font-weight:700;font-size:.8rem;cursor:pointer}
.idx-bar button:hover{background:var(--grad);color:#fff;border-color:transparent}
.idx-group{margin-bottom:18px;animation:fadeUp .4s both}
.idx-gh{font-family:var(--display);font-weight:800;font-size:1.3rem;color:var(--accent);padding:6px 0;border-bottom:2px solid var(--border);margin-bottom:8px;display:flex;align-items:center;gap:10px}
.idx-gh .gc{width:12px;height:12px;border-radius:4px}
.idx-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px}
.idx-row{display:flex;align-items:center;gap:12px;padding:9px 12px;border:1px solid transparent;border-radius:12px;cursor:pointer}
.idx-row:hover{background:var(--surface);border-color:var(--border);box-shadow:var(--shadow);text-decoration:none}
.idx-row .ir-body{min-width:0}
.idx-row .ir-term{font-family:var(--grotesk);font-weight:700;color:var(--text);font-size:.92rem}
.idx-row .ir-ko{color:var(--faint);font-weight:500;font-size:.84em}
.idx-row .ir-cat{color:var(--faint);font-size:.74rem;margin-top:1px}

/* graph */
.graph-head{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:8px}
.kg-legend{display:flex;flex-wrap:wrap;gap:7px;margin:10px 0 14px}
.legend-item{display:inline-flex;align-items:center;gap:7px;font-size:.78rem;font-weight:600;border:1px solid var(--border);background:var(--surface);border-radius:20px;padding:4px 12px;cursor:pointer;user-select:none}
.legend-item .ld{width:11px;height:11px;border-radius:4px}
.legend-item.off{opacity:.35}
.graph-wrap{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:20px;box-shadow:var(--shadow);overflow:hidden;animation:fadeUp .5s both}
#kg{display:block;width:100%;touch-action:none;cursor:grab}
#kg:active{cursor:grabbing}
.kg-tip{position:absolute;pointer-events:none;background:var(--text);color:var(--surface);font-size:.78rem;font-weight:600;padding:6px 10px;border-radius:9px;opacity:0;transform:translate(-50%,-130%);transition:opacity .1s;white-space:nowrap;z-index:5;max-width:260px}

footer{color:var(--faint);font-size:.78rem;text-align:center;padding:26px;border-top:1px solid var(--border);margin-top:30px}

@media (max-width:880px){
  :root{--side:0px}
  .menu-toggle{display:inline-flex;align-items:center;justify-content:center;order:-1}
  aside.nav{position:fixed;left:0;top:var(--hh);width:282px;z-index:35;transform:translateX(-100%);transition:transform .22s;box-shadow:var(--shadow-lg)}
  body.nav-open aside.nav{transform:translateX(0)}
  .shell{grid-template-columns:1fr}
  .searchwrap .hint{display:none}.brand small{display:none}
  .idx-bar{top:var(--hh)}
  .scrim{display:none;position:fixed;inset:var(--hh) 0 0 0;background:rgba(0,0,0,.4);z-index:34}
  body.nav-open .scrim{display:block}
}
</style>
</head>
<body>
<header class="top">
  <button class="menu-toggle" id="menuBtn" aria-label="menu">☰</button>
  <a class="brand" href="#/" aria-label="Travel Gaia"><span class="globe">🌐</span><span>Travel Gaia<small id="brandSub">여행 산업 용어 백과사전</small></span></a>
  <div class="searchwrap" role="search">
    <span class="mag" aria-hidden="true">🔎</span>
    <input id="q" type="search" placeholder="용어 검색…" aria-label="search" autocomplete="off">
    <span class="hint">/</span>
  </div>
  <div class="actions">
    <button class="tbtn" id="langBtn" title="한국어 / English">KO</button>
    <button class="tbtn" id="themeBtn" aria-label="theme" title="light/dark">◐</button>
  </div>
</header>

<div class="shell">
  <aside class="nav" id="sidebar" aria-label="nav"></aside>
  <div class="scrim" id="scrim"></div>
  <main id="main" tabindex="-1"></main>
</div>

<script id="glossary-data" type="application/json">__GLOSSARY_DATA__</script>
<script>
"use strict";
(function(){
  const RAW = JSON.parse(document.getElementById('glossary-data').textContent);
  const META = RAW.meta||{}, CATS = RAW.categories||[], ENTRIES = RAW.entries||[];
  const byId = new Map(ENTRIES.map(e=>[e.id,e]));
  const catById = new Map(CATS.map(c=>[c.id,c]));
  const entriesByCat = new Map(CATS.map(c=>[c.id,[]]));
  ENTRIES.forEach(e=>{ (entriesByCat.get(e.category)||entriesByCat.set(e.category,[]).get(e.category)).push(e); });
  entriesByCat.forEach(arr=>arr.sort((a,b)=>a.term.localeCompare(b.term)));

  const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const $ = sel => document.querySelector(sel);
  const main = $('#main');

  /* i18n */
  let LANG='ko'; try{ const s=localStorage.getItem('tg-lang'); if(s==='ko'||s==='en') LANG=s; }catch(_){}
  const T = {
    ko:{ sub:'여행 산업 용어 백과사전', searchPh:'용어 검색 (예: PNR, RBD, codeshare, 운임)…',
      enc:'백과사전', home:'🏠 홈', cats:'카테고리', graph:'🕸 관계 그래프', index:'📇 전체 색인',
      heroT:'여행 산업 용어, 하나의 사전으로', heroB:'항공·호텔·유통·정산·표준에 흩어진 용어를 <b>공급자/표준 간 통일</b>해 정리한 백과사전. 같은 개념의 서로 다른 이름을 한자리에서 비교하고, 용어별 일러스트·관계 그래프·전체 색인으로 탐색하세요.',
      sTerms:'표제어', sCats:'카테고리', sProv:'공급자/표준', sSrc:'출처 인용',
      confT:'⚠️ 헷갈리기 쉬운 용어', secCats:'카테고리', openGraph:'관계 그래프', openIndex:'전체 색인',
      terms:n=>`${n}개 표제어`, home2:'홈', search:'검색',
      fAlias:'다른 표기 · 동의어', fProv:'공급자/표준별 대응어', fRel:'관련 용어', fDist:'혼동 주의 (구분)', fNotes:'편집 노트', fSrc:'출처',
      thProv:'공급자·표준', thTerm:'용어', thRel:'관계', thCtx:'설명',
      mId:'ID', mCat:'카테고리', mRev:'검토일',
      results:(q,n)=>`"<b>${esc(q)}</b>" 검색 결과 <b>${n}</b>건`, noRes:'결과가 없습니다. 다른 키워드(약어/영문/한글)를 시도해 보세요.',
      notFound:'표제어를 찾을 수 없습니다', toHome:'홈으로',
      disc:`정의는 공개 산업 표준(IATA·ATPCO·OpenTravel·HTNG·ISO 등) 및 공급자 문서를 근거로 한 편집 요약이며, 중요한 의사결정 전 1차 출처로 검증하시기 바랍니다. 마지막 갱신: ${esc(META.generatedAt||'')}.`,
      gTitle:'용어 관계 그래프', gNodes:'노드', gEdges:'관계',
      gHint:'노드를 드래그해 정리하고, 클릭하면 해당 용어로 이동합니다. 카테고리 범례로 필터. <b>실선</b>=관련, <span style="color:var(--warn)">점선</span>=혼동 주의.',
      idxTitle:'전체 색인', idxAZ:'가나다·ABC', idxByCat:'카테고리별', idxAll:n=>`전체 ${n}개 표제어`,
      RLAB:{sameAs:'같음',broader:'상위 개념',narrower:'하위 개념',parent:'부모',child:'자식',related:'관련',conflicts:'충돌',replaces:'대체',contrasts:'대비'},
      ST:{active:'활성',deprecated:'폐지/레거시',ambiguous:'중의적'},
      CT:{acronym:'약어',"standard-term":'표준 용어',standard:'표준',"business-term":'업무 용어',"provider-term":'공급자 용어',code:'코드',metric:'지표',process:'프로세스',role:'역할',document:'문서'},
      PR:{same:'같음',narrower:'하위',broader:'상위',related:'관련',conflicting:'충돌'} },
    en:{ sub:'Travel-Industry Terminology', searchPh:'Search terms (e.g., PNR, RBD, codeshare, fare)…',
      enc:'Encyclopedia', home:'🏠 Home', cats:'Categories', graph:'🕸 Knowledge Graph', index:'📇 Full Index',
      heroT:'Travel-industry terms, unified in one reference', heroB:'An encyclopedia that <b>unifies terminology across providers and standards</b> spread over air, hotel, distribution, settlement and specs. Compare names for one concept, and explore with per-term illustrations, a knowledge graph, and a full index.',
      sTerms:'Terms', sCats:'Categories', sProv:'Providers/Standards', sSrc:'Source citations',
      confT:'⚠️ Easily-confused terms', secCats:'Categories', openGraph:'Knowledge Graph', openIndex:'Full Index',
      terms:n=>`${n} terms`, home2:'Home', search:'Search',
      fAlias:'Aliases & variants', fProv:'Provider / standard equivalents', fRel:'Related terms', fDist:'Distinctions (do not confuse)', fNotes:"Editor's note", fSrc:'Sources',
      thProv:'Provider · Standard', thTerm:'Term', thRel:'Relation', thCtx:'Note',
      mId:'ID', mCat:'Category', mRev:'Reviewed',
      results:(q,n)=>`<b>${n}</b> result(s) for "<b>${esc(q)}</b>"`, noRes:'No results. Try another keyword.',
      notFound:'Term not found', toHome:'Back to home',
      disc:`Definitions are editorial summaries grounded in public industry standards (IATA, ATPCO, OpenTravel, HTNG, ISO, etc.) and provider docs; verify against primary sources before critical decisions. Last updated: ${esc(META.generatedAt||'')}.`,
      gTitle:'Term Knowledge Graph', gNodes:'nodes', gEdges:'links',
      gHint:'Drag nodes to arrange; click to open a term. Filter via the legend. <b>Solid</b> = related, <span style="color:var(--warn)">dashed</span> = distinction.',
      idxTitle:'Full Index', idxAZ:'A–Z', idxByCat:'By category', idxAll:n=>`${n} terms total`,
      RLAB:{sameAs:'Same as',broader:'Broader',narrower:'Narrower',parent:'Parent',child:'Child',related:'Related',conflicts:'Conflicts',replaces:'Replaces',contrasts:'Contrasts'},
      ST:{active:'Active',deprecated:'Deprecated',ambiguous:'Ambiguous'},
      CT:{acronym:'Acronym',"standard-term":'Standard term',standard:'Standard',"business-term":'Business term',"provider-term":'Provider term',code:'Code',metric:'Metric',process:'Process',role:'Role',document:'Document'},
      PR:{same:'Same',narrower:'Narrower',broader:'Broader',related:'Related',conflicting:'Conflicting'} },
  };
  const t = k => (T[LANG] && T[LANG][k]!==undefined) ? T[LANG][k] : T.en[k];
  const Lf = (e,f) => { if(LANG==='ko'){ const v=e[f+'_ko']; if(v&&String(v).trim()) return v; } return e[f]||''; };
  const catName = c => LANG==='ko' ? (c.short||c.title) : c.title;
  const catDesc = c => LANG==='ko' ? (c.desc||'') : (c.desc_en||c.desc||'');

  /* icons */
  const safeSvg = s => (s && /<svg/i.test(s) && !/<script|javascript:|on\w+\s*=/i.test(s)) ? s : '';
  function iconHTML(e, cls){ const c=catById.get(e.category)||{}; const s=safeSvg(e.icon);
    const inner = s || `<svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2"><circle cx="24" cy="24" r="15"/><path d="M9 24h30M24 9v30"/></svg>`;
    return `<span class="icon ${cls||''}" style="color:${c.color||'var(--accent)'}">${inner}</span>`; }

  /* search index */
  const FIELDW={term:10,abbr:9,alias:6,prov:5,cat:2,def:1};
  const idx = ENTRIES.map(e=>{ const fields=[]; const push=(t,w)=>{ if(t) fields.push({t:String(t).toLowerCase(),w}); };
    push(e.term,FIELDW.term); push(e.term_ko,FIELDW.term); push(e.abbreviation,FIELDW.abbr);
    (e.aliases||[]).forEach(a=>push(a,FIELDW.alias)); (e.providerTerms||[]).forEach(p=>push(p.term,FIELDW.prov));
    const c=catById.get(e.category)||{}; push(c.title,FIELDW.cat); push(c.short,FIELDW.cat);
    push(e.definition,FIELDW.def); push(e.definition_ko,FIELDW.def);
    return {e,fields,term:e.term.toLowerCase(),abbr:(e.abbreviation||'').toLowerCase()}; });
  function search(qraw){ const q=qraw.trim().toLowerCase(); if(!q) return [];
    const toks=q.split(/[^a-z0-9가-힣]+/i).filter(Boolean); const out=[];
    for(const row of idx){ let score=0;
      if(row.term===q) score+=100; if(row.abbr&&row.abbr===q) score+=90; if(row.term.startsWith(q)) score+=40;
      for(const tok of toks){ let best=0; for(const f of row.fields){ if(f.t===tok) best=Math.max(best,f.w*3);
        else if(f.t.startsWith(tok)) best=Math.max(best,f.w*2); else if(f.t.includes(tok)) best=Math.max(best,f.w); }
        if(best===0){ score=-1; break; } score+=best; }
      if(score>0) out.push({e:row.e,score}); }
    out.sort((a,b)=> b.score-a.score || a.e.term.localeCompare(b.e.term)); return out.slice(0,60); }
  const hl=(text,q)=>{ if(!q) return esc(text); const toks=q.trim().toLowerCase().split(/[^a-z0-9가-힣]+/i).filter(Boolean); let s=esc(text);
    toks.forEach(tk=>{ if(tk.length<2) return; s=s.replace(new RegExp('('+tk.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig'),'<mark>$1</mark>'); }); return s; };

  /* sidebar */
  function renderSidebar(activeCat){ const dot=c=>`<span class="dot" style="background:${c.color||'var(--accent)'}"></span>`; const h2=location.hash;
    let h=`<div class="nav-title">${esc(t('enc'))}</div>
      <a class="cat-link${(h2==='#/'||!h2)?' active':''}" href="#/">${t('home')}</a>
      <a class="cat-link${h2.startsWith('#/index')?' active':''}" href="#/index">${t('index')}</a>
      <a class="cat-link${h2.startsWith('#/graph')?' active':''}" href="#/graph">${t('graph')}</a>
      <div class="nav-title">${esc(t('cats'))} (${CATS.length})</div>`;
    CATS.forEach(c=>{ const n=(entriesByCat.get(c.id)||[]).length;
      h+=`<a class="cat-link${c.id===activeCat?' active':''}" href="#/category/${c.id}"><span>${dot(c)} ${esc(catName(c))}</span><span class="cnt">${n}</span></a>`; });
    $('#sidebar').innerHTML=h; }

  function statusBadge(s){ if(!s) return ''; return `<span class="badge st-${s}">● ${esc((t('ST')[s])||s)}</span>`; }
  const animateCounts=()=>{ document.querySelectorAll('.stat b[data-count]').forEach(el=>{ const tg=+el.dataset.count||0,d=720,t0=performance.now();
    (function tick(t){ const p=Math.min(1,(t-t0)/d); el.textContent=Math.round(tg*(1-Math.pow(1-p,3))); if(p<1)requestAnimationFrame(tick); })(performance.now()); }); };

  function renderHome(){
    const provSet=new Set(); ENTRIES.forEach(e=>(e.providerTerms||[]).forEach(p=>p.provider&&provSet.add(p.provider)));
    const srcCount=ENTRIES.reduce((a,e)=>a+((e.sources||[]).length),0);
    const conflicts=ENTRIES.filter(e=> e.status==='ambiguous' || (e.distinctions&&e.distinctions.length))
      .sort((a,b)=>(b.distinctions?b.distinctions.length:0)-(a.distinctions?a.distinctions.length:0)).slice(0,4);
    const st=(n,l)=>`<div class="stat"><b data-count="${n}">0</b><span>${esc(l)}</span></div>`;
    let h=`<section class="hero"><h1>${esc(t('heroT'))}</h1><p>${t('heroB')}</p>
      <div class="stats">${st(ENTRIES.length,t('sTerms'))}${st(CATS.length,t('sCats'))}${st(provSet.size,t('sProv'))}${st(srcCount,t('sSrc'))}</div>
      <div class="cta-row"><a class="cta-graph" href="#/graph">🕸 ${esc(t('openGraph'))}</a><a class="cta-2" href="#/index">📇 ${esc(t('openIndex'))}</a></div></section>`;
    if(conflicts.length){ h+=`<div class="sec-title">${esc(t('confT'))}</div>`;
      conflicts.forEach(e=>{ const d=(e.distinctions&&e.distinctions[0]);
        h+=`<a class="conflict" href="#/term/${e.id}"><b>${esc(e.term)}</b> — ${esc(Lf(e,'definition')).slice(0,120)}…
          ${d?`<div style="margin-top:5px;color:var(--muted)">vs <b>${esc(d.targetTerm)}</b>: ${esc((LANG==='ko'&&d.explanation_ko)||d.explanation)}</div>`:''}</a>`; }); }
    h+=`<div class="sec-title">${esc(t('secCats'))}</div><div class="cards">`;
    CATS.forEach(c=>{ const n=(entriesByCat.get(c.id)||[]).length;
      h+=`<a class="card" href="#/category/${c.id}" style="--cc:${c.color}">
        <div class="ct"><span class="dot" style="background:${c.color};width:11px;height:11px;border-radius:4px;display:inline-block"></span> ${esc(catName(c))}</div>
        <div class="cd">${esc(catDesc(c))}</div><div class="cn">${esc(t('terms')(n))}</div></a>`; });
    h+=`</div><p class="disclaimer">${t('disc')}</p>`;
    main.innerHTML=h; renderSidebar(null); animateCounts();
  }

  function renderCategory(id){ const c=catById.get(id); if(!c) return renderHome(); const list=entriesByCat.get(id)||[];
    let h=`<div class="crumbs"><a href="#/">${esc(t('home2'))}</a> › ${esc(catName(c))}</div>
      <div class="sec-title" style="margin-top:0">${esc(catName(c))} <span style="color:var(--faint);font-weight:400">(${list.length})</span></div>
      <p style="color:var(--muted);margin:-6px 0 14px">${esc(catDesc(c))}</p><div class="termlist">`;
    list.forEach(e=>{ const sub=LANG==='ko'&&e.term_ko&&e.term_ko!==e.term?` <span class="abbr">· ${esc(e.term_ko)}</span>`:'';
      h+=`<a class="tl-item" href="#/term/${e.id}">${iconHTML(e,'tl-icon')}<div class="tl-body"><div class="h">${esc(e.term)}${sub}</div><div class="d">${esc(Lf(e,'definition'))}</div></div></a>`; });
    h+=`</div>`; main.innerHTML=h; renderSidebar(id); main.focus(); }

  function linkTerm(targetId,label){ if(targetId&&byId.has(targetId)) return `<a class="rel-link" href="#/term/${targetId}">${esc(label||byId.get(targetId).term)}</a>`;
    return `<span class="rel-dead">${esc(label)}</span>`; }

  function renderTerm(id){ const e=byId.get(id); if(!e) return renderNotFound(id);
    const c=catById.get(e.category)||{title:e.category};
    const sub=LANG==='ko'&&e.term_ko&&e.term_ko!==e.term?`<div class="term-sub">${esc(e.term_ko)}</div>`:'';
    let h=`<div class="crumbs"><a href="#/">${esc(t('home2'))}</a> › <a href="#/category/${e.category}">${esc(catName(c))}</a></div>`;
    h+=`<article><div class="term-hero">${iconHTML(e,'term-icon')}<div><h1>${esc(e.term)}</h1>${sub}</div></div>
      <div class="badges"><span class="badge cat" onclick="location.hash='#/category/${e.category}'">${esc(catName(c))}</span>
        ${e.conceptType?`<span class="badge">${esc((t('CT')[e.conceptType])||e.conceptType)}</span>`:''}${statusBadge(e.status)}
        ${e.standardBody?`<span class="badge">📐 ${esc(e.standardBody)}</span>`:''}</div>
      <p class="lead">${esc(Lf(e,'definition'))}</p>`;
    if(Lf(e,'longDef')) h+=`<p>${esc(Lf(e,'longDef'))}</p>`;
    if(e.aliases&&e.aliases.length) h+=`<div class="field"><h3>${esc(t('fAlias'))}</h3><div class="chips">${e.aliases.map(a=>`<span class="chip">${esc(a)}</span>`).join('')}</div></div>`;
    if(e.providerTerms&&e.providerTerms.length){ h+=`<div class="field"><h3>${esc(t('fProv'))}</h3><table class="pt"><thead><tr><th>${esc(t('thProv'))}</th><th>${esc(t('thTerm'))}</th><th>${esc(t('thRel'))}</th><th>${esc(t('thCtx'))}</th></tr></thead><tbody>`;
      e.providerTerms.forEach(p=>{ const ctx=(LANG==='ko'&&p.context_ko)||p.context||'';
        h+=`<tr><td class="prov">${esc(p.provider)}</td><td><code>${esc(p.term)}</code></td><td>${esc((t('PR')[p.relationship])||p.relationship||'')}</td><td>${esc(ctx)}</td></tr>`; }); h+=`</tbody></table></div>`; }
    if(e.relationships&&e.relationships.length){ const RLAB=t('RLAB'); const groups={}; e.relationships.forEach(r=>{ (groups[r.type]=groups[r.type]||[]).push(r); });
      h+=`<div class="field"><h3>${esc(t('fRel'))}</h3>`; Object.keys(groups).forEach(ty=>{ h+=`<div class="rel-group"><span class="rl">${esc(RLAB[ty]||ty)}</span>`; groups[ty].forEach(r=> h+=linkTerm(r.targetId,r.targetTerm)); h+=`</div>`; }); h+=`</div>`; }
    if(e.distinctions&&e.distinctions.length){ h+=`<div class="field"><h3>${esc(t('fDist'))}</h3>`;
      e.distinctions.forEach(d=>{ const ex=(LANG==='ko'&&d.explanation_ko)||d.explanation; h+=`<div class="dist"><b>${esc(e.term)}</b> vs <b>${linkTerm(d.targetId,d.targetTerm)}</b> — ${esc(ex)}</div>`; }); h+=`</div>`; }
    if(Lf(e,'notes')) h+=`<div class="field"><h3>${esc(t('fNotes'))}</h3><div class="notes">${esc(Lf(e,'notes'))}</div></div>`;
    if(e.sources&&e.sources.length){ h+=`<div class="field"><h3>${esc(t('fSrc'))}</h3><ul class="src">`;
      e.sources.forEach(s=>{ const bits=[s.org,s.name,s.version,s.section].filter(Boolean).map(esc).join(' · '); h+=`<li>${s.url?`<a href="${esc(s.url)}" target="_blank" rel="noopener">${bits}</a>`:bits}</li>`; }); h+=`</ul></div>`; }
    h+=`<div class="rel-meta">${esc(t('mId'))} <code>${esc(e.id)}</code> · ${esc(t('mCat'))} ${esc(catName(c))}${e.lastReviewed?` · ${esc(t('mRev'))} ${esc(e.lastReviewed)}`:''}</div></article>`;
    main.innerHTML=h; renderSidebar(e.category); main.focus(); document.title=`${e.term} — Travel Gaia`; }

  function renderNotFound(id){ main.innerHTML=`<div class="empty"><h2>${esc(t('notFound'))}</h2><p><code>${esc(id)}</code></p><p><a href="#/">${esc(t('toHome'))}</a></p></div>`; renderSidebar(null); }

  function renderSearch(q){ const res=search(q);
    let h=`<div class="crumbs"><a href="#/">${esc(t('home2'))}</a> › ${esc(t('search'))}</div><div class="searchmeta">${t('results')(q,res.length)}</div>`;
    if(!res.length){ h+=`<div class="empty">${esc(t('noRes'))}</div>`; } else { h+=`<div class="termlist">`;
      res.forEach(({e})=>{ const c=catById.get(e.category)||{}; const sub=LANG==='ko'&&e.term_ko&&e.term_ko!==e.term?` <span class="abbr">· ${hl(e.term_ko,q)}</span>`:'';
        h+=`<a class="tl-item" href="#/term/${e.id}">${iconHTML(e,'tl-icon')}<div class="tl-body"><div class="h">${hl(e.term,q)}${sub}</div><div class="d">${hl(Lf(e,'definition'),q)}</div>
          <div class="ir-cat" style="color:var(--faint);font-size:.74rem;margin-top:4px">${esc(catName(c))}</div></div></a>`; }); h+=`</div>`; }
    main.innerHTML=h; renderSidebar(null); }

  /* full index */
  let IDXMODE='az';
  function idxRow(e){ const c=catById.get(e.category)||{}; const ko=LANG==='ko'&&e.term_ko&&e.term_ko!==e.term?` <span class="ir-ko">· ${esc(e.term_ko)}</span>`:'';
    return `<a class="idx-row" href="#/term/${e.id}">${iconHTML(e,'idx-icon')}<div class="ir-body"><div class="ir-term">${esc(e.term)}${ko}</div><div class="ir-cat">${esc(catName(c))}</div></div></a>`; }
  function renderIndex(){
    const sorted=[...ENTRIES].sort((a,b)=>a.term.localeCompare(b.term,'en',{sensitivity:'base'}));
    let body='';
    if(IDXMODE==='az'){
      const groups={}; sorted.forEach(e=>{ const L=(e.term[0]||'#').toUpperCase(); const k=/[A-Z]/.test(L)?L:'#'; (groups[k]=groups[k]||[]).push(e); });
      const letters=Object.keys(groups).sort();
      body=`<div class="idx-bar">`+letters.map(l=>`<button onclick="document.getElementById('L-${l}').scrollIntoView({behavior:'smooth',block:'start'})">${l}</button>`).join('')+`</div>`;
      letters.forEach(l=>{ body+=`<div class="idx-group" id="L-${l}"><div class="idx-gh">${l}</div><div class="idx-grid">${groups[l].map(idxRow).join('')}</div></div>`; });
    } else {
      CATS.forEach(c=>{ const list=(entriesByCat.get(c.id)||[]); if(!list.length) return;
        body+=`<div class="idx-group" id="C-${c.id}"><div class="idx-gh"><span class="gc" style="background:${c.color}"></span>${esc(catName(c))} <span style="color:var(--faint);font-weight:400;font-size:.8rem">(${list.length})</span></div><div class="idx-grid">${list.map(idxRow).join('')}</div></div>`; });
    }
    const tg=(m,lab)=>`<button class="${IDXMODE===m?'on':''}" data-mode="${m}">${esc(lab)}</button>`;
    main.innerHTML=`<div class="crumbs"><a href="#/">${esc(t('home2'))}</a> › ${esc(t('idxTitle'))}</div>
      <div class="idx-head"><div class="sec-title" style="margin:0">📇 ${esc(t('idxTitle'))} <span style="color:var(--faint);font-weight:400;font-size:.9rem">· ${esc(t('idxAll')(ENTRIES.length))}</span></div>
        <div class="idx-toggle">${tg('az',t('idxAZ'))}${tg('cat',t('idxByCat'))}</div></div>${body}`;
    renderSidebar(null);
    main.querySelector('.idx-toggle').addEventListener('click',ev=>{ const b=ev.target.closest('button[data-mode]'); if(!b)return; IDXMODE=b.dataset.mode; renderIndex(); });
  }

  /* knowledge graph */
  let kgRAF=null; function stopGraph(){ if(kgRAF){ cancelAnimationFrame(kgRAF); kgRAF=null; } }
  function renderGraph(){
    const catColor=id=>(catById.get(id)||{}).color||'#888';
    const nodes=ENTRIES.map(e=>({id:e.id,e,cat:e.category,x:0,y:0,vx:0,vy:0,deg:0}));
    const nById=new Map(nodes.map(n=>[n.id,n])); const seen=new Set(), edges=[];
    const addE=(a,b,kind)=>{ if(!a||!b||a===b) return; const k=[a,b].sort().join('|'); if(seen.has(k)) return; seen.add(k); edges.push({a,b,kind}); };
    ENTRIES.forEach(e=>{ (e.relationships||[]).forEach(r=>{ if(r.targetId&&nById.has(r.targetId)) addE(e.id,r.targetId,'rel'); });
      (e.distinctions||[]).forEach(d=>{ if(d.targetId&&nById.has(d.targetId)) addE(e.id,d.targetId,'dist'); }); });
    edges.forEach(ed=>{ nById.get(ed.a).deg++; nById.get(ed.b).deg++; });
    const ci=new Map(CATS.map((c,i)=>[c.id,i]));
    nodes.forEach((n,i)=>{ const ang=(ci.get(n.cat)||0)/CATS.length*2*Math.PI; n.x=Math.cos(ang)*220+((i*53)%90-45); n.y=Math.sin(ang)*220+((i*31)%90-45); });
    const legend=CATS.map(c=>`<span class="legend-item" data-cat="${c.id}"><span class="ld" style="background:${c.color}"></span>${esc(catName(c))}</span>`).join('');
    main.innerHTML=`<div class="crumbs"><a href="#/">${esc(t('home2'))}</a> › ${esc(t('gTitle'))}</div>
      <div class="graph-head"><div class="sec-title" style="margin:0">🕸 ${esc(t('gTitle'))}</div><div style="color:var(--faint);font-size:.82rem">${nodes.length} ${esc(t('gNodes'))} · ${edges.length} ${esc(t('gEdges'))}</div></div>
      <p style="color:var(--muted);font-size:.86rem;margin:0 0 6px">${t('gHint')}</p><div class="kg-legend" id="kgLegend">${legend}</div>
      <div class="graph-wrap"><canvas id="kg"></canvas><div class="kg-tip" id="kgTip"></div></div>`;
    renderSidebar(null);
    const wrap=$('.graph-wrap'), canvas=$('#kg'), ctx=canvas.getContext('2d'), tip=$('#kgTip');
    const active=new Set(CATS.map(c=>c.id)); let W=0,H=0,dpr=Math.min(window.devicePixelRatio||1,2);
    function resize(){ W=wrap.clientWidth; H=Math.max(440,Math.min(720,Math.round(window.innerHeight*0.7))); canvas.style.height=H+'px'; canvas.width=W*dpr; canvas.height=H*dpr; ctx.setTransform(dpr,0,0,dpr,0,0); }
    resize(); const cx=()=>W/2, cy=()=>H/2; let hover=null, drag=null, dragMoved=false;
    const isActive=n=>active.has(n.cat); const nodeR=n=>4+Math.sqrt(n.deg)*1.7;
    function step(){ const A=nodes.filter(isActive);
      for(let i=0;i<A.length;i++){ const a=A[i]; for(let j=i+1;j<A.length;j++){ const b=A[j];
        let dx=a.x-b.x,dy=a.y-b.y,d2=dx*dx+dy*dy+0.01; const f=1500/d2; const d=Math.sqrt(d2); dx/=d; dy/=d; a.vx+=dx*f; a.vy+=dy*f; b.vx-=dx*f; b.vy-=dy*f; } }
      edges.forEach(ed=>{ const a=nById.get(ed.a),b=nById.get(ed.b); if(!isActive(a)||!isActive(b)) return;
        let dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy)+0.01; const f=(d-82)*0.012; dx/=d; dy/=d; a.vx+=dx*f; a.vy+=dy*f; b.vx-=dx*f; b.vy-=dy*f; });
      A.forEach(n=>{ n.vx+=-n.x*0.0026; n.vy+=-n.y*0.0026; if(n===drag) return; n.vx*=0.86; n.vy*=0.86; n.x+=n.vx; n.y+=n.vy;
        const m=24,rx=W/2-m,ry=H/2-m; if(n.x<-rx){n.x=-rx;n.vx*=-.4} if(n.x>rx){n.x=rx;n.vx*=-.4} if(n.y<-ry){n.y=-ry;n.vy*=-.4} if(n.y>ry){n.y=ry;n.vy*=-.4} }); }
    const nbr=new Map(); edges.forEach(ed=>{ (nbr.get(ed.a)||nbr.set(ed.a,new Set()).get(ed.a)).add(ed.b); (nbr.get(ed.b)||nbr.set(ed.b,new Set()).get(ed.b)).add(ed.a); });
    function draw(){ ctx.clearRect(0,0,W,H); const ox=cx(),oy=cy(); const dark=document.documentElement.dataset.theme==='dark';
      edges.forEach(ed=>{ const a=nById.get(ed.a),b=nById.get(ed.b); if(!isActive(a)||!isActive(b)) return; const hot=hover&&(ed.a===hover.id||ed.b===hover.id);
        ctx.beginPath(); ctx.moveTo(a.x+ox,a.y+oy); ctx.lineTo(b.x+ox,b.y+oy);
        if(ed.kind==='dist'){ ctx.setLineDash([4,4]); ctx.strokeStyle=hot?'#ff2d8e':(dark?'rgba(255,95,166,.5)':'rgba(217,115,13,.4)'); } else { ctx.setLineDash([]); ctx.strokeStyle=hot?(dark?'rgba(139,107,255,.9)':'rgba(79,43,255,.7)'):(dark?'rgba(120,140,180,.16)':'rgba(80,60,140,.14)'); }
        ctx.lineWidth=hot?1.8:1; ctx.stroke(); }); ctx.setLineDash([]);
      nodes.forEach(n=>{ if(!isActive(n)) return; const dim=hover&&n!==hover&&!(nbr.get(hover.id)&&nbr.get(hover.id).has(n.id));
        ctx.globalAlpha=dim?0.2:1; ctx.beginPath(); ctx.arc(n.x+ox,n.y+oy,nodeR(n),0,7); ctx.fillStyle=catColor(n.cat); ctx.fill();
        if(n===hover){ ctx.lineWidth=2.5; ctx.strokeStyle=dark?'#fff':'#0b1020'; ctx.stroke(); } ctx.globalAlpha=1; });
      ctx.font='600 11px '+getComputedStyle(document.body).fontFamily; ctx.textAlign='center';
      const showLabel=n=> (hover&&(n===hover||(nbr.get(hover.id)&&nbr.get(hover.id).has(n.id)))) || (!hover&&n.deg>=5);
      nodes.forEach(n=>{ if(!isActive(n)||!showLabel(n)) return; const x=n.x+ox,y=n.y+oy-nodeR(n)-5; const lab=n.e.term;
        ctx.fillStyle=dark?'rgba(15,19,34,.9)':'rgba(255,255,255,.9)'; const w=ctx.measureText(lab).width+8; ctx.fillRect(x-w/2,y-12,w,15);
        ctx.fillStyle=dark?'#f3f5ff':'#0b1020'; ctx.fillText(lab,x,y); }); }
    function loop(){ step(); draw(); kgRAF=requestAnimationFrame(loop); } loop();
    function pick(mx,my){ const ox=cx(),oy=cy(); let best=null,bd=1e9; nodes.forEach(n=>{ if(!isActive(n)) return; const dx=mx-(n.x+ox),dy=my-(n.y+oy),d=dx*dx+dy*dy; const r=nodeR(n)+6; if(d<r*r&&d<bd){bd=d;best=n;} }); return best; }
    function rel(ev){ const r=canvas.getBoundingClientRect(); const cl=ev.touches?ev.touches[0]:ev; return {x:cl.clientX-r.left,y:cl.clientY-r.top}; }
    function onMove(ev){ const p=rel(ev); if(drag){ drag.x=p.x-cx(); drag.y=p.y-cy(); drag.vx=drag.vy=0; dragMoved=true; ev.preventDefault&&ev.preventDefault(); return; }
      const n=pick(p.x,p.y); hover=n; if(n){ const nm=LANG==='ko'&&n.e.term_ko&&n.e.term_ko!==n.e.term?`${n.e.term} · ${n.e.term_ko}`:n.e.term;
        tip.innerHTML=`${esc(nm)} <span style="opacity:.7">— ${esc(catName(catById.get(n.cat)||{}))}</span>`; tip.style.left=(n.x+cx())+'px'; tip.style.top=(n.y+cy())+'px'; tip.style.opacity=1; canvas.style.cursor='pointer'; }
      else { tip.style.opacity=0; canvas.style.cursor='grab'; } }
    function onDown(ev){ const p=rel(ev); drag=pick(p.x,p.y); dragMoved=false; }
    function onUp(){ if(drag&&!dragMoved){ location.hash='#/term/'+drag.id; } drag=null; }
    canvas.addEventListener('mousemove',onMove); canvas.addEventListener('mousedown',onDown); window.addEventListener('mouseup',onUp);
    canvas.addEventListener('touchstart',onDown,{passive:true}); canvas.addEventListener('touchmove',onMove,{passive:false}); canvas.addEventListener('touchend',onUp);
    $('#kgLegend').addEventListener('click',e=>{ const el=e.target.closest('.legend-item'); if(!el) return; const id=el.dataset.cat; if(active.has(id)){active.delete(id);el.classList.add('off');} else {active.add(id);el.classList.remove('off');} });
    window.addEventListener('resize',resize);
  }

  /* router */
  function dispatch(){ const hash=location.hash||'#/';
    if(hash==='#/index'||hash.startsWith('#/index')){ document.title='Index — Travel Gaia'; if($('#q'))$('#q').value=''; return renderIndex(); }
    if(hash==='#/graph'){ document.title='Knowledge Graph — Travel Gaia'; if($('#q'))$('#q').value=''; return renderGraph(); }
    const m=hash.match(/^#\/(term|category|q)\/(.+)$/);
    if(!m||hash==='#/'){ document.title='Travel Gaia — 여행 산업 용어 백과사전'; if($('#q'))$('#q').value=''; return renderHome(); }
    const kind=m[1], dec=decodeURIComponent(m[2]);
    if(kind==='term') return renderTerm(dec); if(kind==='category') return renderCategory(dec);
    if(kind==='q'){ if($('#q'))$('#q').value=dec; return renderSearch(dec); } renderHome(); }
  function route(){ stopGraph(); closeNav(); const go=()=>dispatch();
    if(document.startViewTransition && !location.hash.startsWith('#/graph')){ document.startViewTransition(go); } else go(); }
  window.addEventListener('hashchange',route);

  /* search box */
  let tmr=null;
  $('#q').addEventListener('input',e=>{ clearTimeout(tmr); const v=e.target.value;
    tmr=setTimeout(()=>{ if(v.trim()) location.hash='#/q/'+encodeURIComponent(v.trim()); else if(location.hash.startsWith('#/q/')) location.hash='#/'; },180); });
  document.addEventListener('keydown',e=>{ if(e.key==='/'&&document.activeElement!==$('#q')){ e.preventDefault(); $('#q').focus(); } if(e.key==='Escape'&&document.activeElement===$('#q')){ $('#q').blur(); } });

  /* language */
  function applyStaticI18n(){ document.documentElement.lang=LANG; $('#brandSub').textContent=t('sub'); $('#q').placeholder=t('searchPh'); $('#langBtn').textContent=LANG==='ko'?'EN':'KO'; }
  $('#langBtn').addEventListener('click',()=>{ LANG=LANG==='ko'?'en':'ko'; try{localStorage.setItem('tg-lang',LANG);}catch(_){} applyStaticI18n(); route(); });

  /* theme & nav */
  function applyTheme(th){ document.documentElement.dataset.theme=th; try{localStorage.setItem('tg-theme',th);}catch(_){} }
  $('#themeBtn').addEventListener('click',()=>applyTheme(document.documentElement.dataset.theme==='dark'?'light':'dark'));
  try{ const saved=localStorage.getItem('tg-theme'); applyTheme(saved||(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light')); }catch(_){ applyTheme('light'); }
  function openNav(){ document.body.classList.add('nav-open'); } function closeNav(){ document.body.classList.remove('nav-open'); }
  $('#menuBtn').addEventListener('click',openNav); $('#scrim').addEventListener('click',closeNav);

  applyStaticI18n(); route();
})();
</script>
</body>
