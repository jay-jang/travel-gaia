<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Travel Gaia — 여행 산업 용어 백과사전</title>
<meta name="description" content="여행 산업(항공·호텔·유통·정산·표준)의 용어를 공급자/표준 간 통일한 standalone 백과사전. 한/영, 용어별 일러스트, 관계 그래프, 전체 색인.">
<script type="application/ld+json">__JSONLD__</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
/*__FONTS__*/
:root{
  --paper:#f7f4ee; --surface:#fffdf8; --surface-2:#f0ebe0; --border:#dcd5c5; --rule:#dcd5c5;
  --text:#1e1d1a; --muted:#6f6a5f; --faint:#938c7c;
  --accent:#7a2520; --accent-weak:#efe5df;
  --warn:#8a5414; --warn-weak:#f2ead9; --danger:#9c2b2b;
  --mono:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  --sans:'Inter',system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
  --serif:'Source Serif 4',Georgia,"Apple SD Gothic Neo","Nanum Myeongjo",serif;
  --display:var(--serif); --grotesk:var(--sans);
  --side:264px; --maxw:760px; --hh:60px; --r:2px;
}
[data-theme="dark"]{
  --paper:#141310; --surface:#1c1b15; --surface-2:#252318; --border:#36322a; --rule:#36322a;
  --text:#ece7d8; --muted:#a8a08f; --faint:#746e60;
  --accent:#d98b6a; --accent-weak:#2c231d;
  --warn:#d6a05a; --warn-weak:#241d12; --danger:#e0807a;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--paper);color:var(--text);font-family:var(--sans);font-size:16px;line-height:1.62;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
a{color:var(--accent);text-decoration:none;text-underline-offset:2px}
a:hover{text-decoration:underline}
code,kbd{font-family:var(--mono);font-size:.84em;background:var(--surface-2);padding:.1em .4em;border-radius:var(--r);border:1px solid var(--border)}
::selection{background:var(--accent);color:var(--paper)}
@keyframes fade{to{opacity:1}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;scroll-behavior:auto!important}}

/* header / masthead bar */
header.top{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:14px;height:var(--hh);padding:0 22px;background:var(--surface);border-bottom:2px solid var(--text)}
.brand{display:flex;align-items:center;gap:10px;font-family:var(--serif);font-weight:600;font-size:1.24rem;letter-spacing:-.01em;white-space:nowrap;color:var(--text);cursor:pointer}
.brand:hover{text-decoration:none}
.brand .globe{width:30px;height:30px;border-radius:var(--r);display:grid;place-items:center;color:var(--paper);background:var(--accent);box-shadow:none;font-family:var(--serif);font-weight:600;font-size:16px;filter:grayscale(1) contrast(0)}
.brand .globe::before{content:"G";font-style:normal}
.brand .globe>*{display:none}
.brand small{display:block;font-family:var(--sans);font-weight:600;color:var(--faint);font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;margin-top:2px}
.searchwrap{flex:1;max-width:460px;position:relative;margin-left:10px}
#q{width:100%;padding:8px 36px;border:1px solid var(--border);border-radius:var(--r);background:var(--paper);color:var(--text);font-family:var(--sans);font-size:.92rem;font-weight:500;outline:none;transition:border-color .15s}
#q:focus{border-color:var(--accent)}
.searchwrap .mag{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--faint);pointer-events:none;font-size:.86rem}
.searchwrap .hint{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--faint);font-family:var(--mono);font-size:.7rem;border:1px solid var(--border);border-radius:var(--r);padding:0 6px;pointer-events:none}
.tbtn{border:1px solid var(--border);background:var(--surface);color:var(--muted);height:36px;min-width:36px;padding:0 11px;border-radius:var(--r);cursor:pointer;font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:.03em;display:inline-flex;align-items:center;justify-content:center;gap:6px;transition:.15s}
.tbtn:hover{border-color:var(--accent);color:var(--accent)}
.actions{margin-left:auto;display:flex;gap:8px;align-items:center}
.menu-toggle{display:none;border:1px solid var(--border);background:var(--surface);color:var(--text);width:36px;height:36px;border-radius:var(--r);cursor:pointer;font-size:17px}

/* layout */
.shell{display:grid;grid-template-columns:var(--side) 1fr;align-items:start}
aside.nav{position:sticky;top:var(--hh);height:calc(100vh - var(--hh));overflow-y:auto;border-right:1px solid var(--rule);background:var(--surface);padding:18px 12px}
aside .nav-title{font-family:var(--sans);font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--faint);margin:18px 8px 6px;padding-bottom:5px;border-bottom:1px solid var(--rule)}
aside .nav-title:first-of-type{margin-top:0}
.cat-link{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:6px 8px;border-radius:var(--r);color:var(--text);cursor:pointer;font-size:.86rem;font-weight:500;transition:background .12s}
.cat-link:hover{background:var(--surface-2);color:var(--accent);text-decoration:none}
.cat-link.active{background:none;color:var(--accent);font-weight:700;box-shadow:inset 3px 0 0 var(--accent);border-radius:0}
.cat-link .cnt{font-family:var(--mono);font-size:.7rem;font-weight:500;color:var(--faint);background:none;border-radius:0;padding:0;min-width:0;text-align:right}
.cat-link.active .cnt{color:var(--accent)}
.cat-link .dot{width:8px;height:8px;border-radius:0;flex:none}
main{min-width:0;padding:34px clamp(18px,4vw,56px) 110px;max-width:calc(var(--maxw) + 320px);margin:0 auto;width:100%}
.scrim{display:none}

/* icons (quiet, monochrome wayfinding) */
.icon{display:inline-grid;place-items:center;flex:none;color:var(--muted)}
.icon svg{width:100%;height:100%;display:block}
.term-icon{width:46px;height:46px;border-radius:0;background:none;border:1px solid var(--border);padding:8px;color:var(--text)}
.tl-icon{width:34px;height:34px;border-radius:0;background:none;border:1px solid var(--rule);padding:7px}
.idx-icon{width:26px;height:26px;border-radius:0;background:none;border:1px solid var(--rule);padding:5px}

/* home: masthead + directory */
.hero{position:relative;overflow:visible;background:none;border:0;border-bottom:2px solid var(--text);border-radius:0;padding:0 0 16px;box-shadow:none;margin-bottom:22px}
.hero::before{display:none}
.hero h1{position:relative;font-family:var(--serif);font-weight:600;margin:0 0 .22em;font-size:clamp(1.9rem,4vw,2.7rem);line-height:1.08;letter-spacing:-.012em}
.hero p{position:relative;margin:.18em 0;color:var(--muted);max-width:62ch;font-family:var(--serif);font-size:1.04rem;line-height:1.56}
.stats{position:relative;display:flex;flex-wrap:wrap;gap:0;margin-top:18px;border-top:1px solid var(--rule);padding-top:12px}
.stat{background:none;border:0;border-right:1px solid var(--rule);border-radius:0;padding:2px 22px 2px 0;margin-right:22px;min-width:0}
.stat:last-child{border-right:0}
.stat b{display:block;font-family:var(--mono);font-weight:600;font-size:1.5rem;letter-spacing:0;background:none;-webkit-text-fill-color:currentColor;color:var(--text)}
.stat span{color:var(--muted);font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em}
.sec-title{font-family:var(--sans);font-weight:700;font-size:.7rem;text-transform:uppercase;letter-spacing:.15em;color:var(--muted);margin:34px 0 14px;letter-spacing:.15em;border-bottom:2px solid var(--text);padding-bottom:6px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(252px,1fr));gap:0;border-top:1px solid var(--rule)}
.card{position:relative;background:none;border:0;border-bottom:1px solid var(--rule);border-radius:0;padding:14px 18px 14px 16px;cursor:pointer;box-shadow:none;transition:background .12s;overflow:visible}
.card::after{content:"";position:absolute;left:0;top:13px;bottom:13px;width:3px;background:var(--cc,var(--accent));opacity:1}
.card:hover{transform:none;box-shadow:none;border-color:var(--rule);background:var(--surface-2);text-decoration:none}
.card .ct{display:flex;align-items:center;gap:9px;font-family:var(--serif);font-weight:600;font-size:1.04rem;color:var(--text)}
.card .cd{color:var(--muted);font-size:.84rem;margin-top:5px;line-height:1.48}
.card .cn{color:var(--faint);font-family:var(--mono);font-size:.7rem;font-weight:500;margin-top:9px;text-transform:none;letter-spacing:0}
.cta-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px;position:relative}
.cta-graph,.cta-2{display:inline-flex;align-items:center;gap:8px;border-radius:var(--r);padding:9px 16px;font-family:var(--sans);font-weight:600;font-size:.86rem;border:1px solid var(--border)}
.cta-graph{background:var(--accent);color:var(--paper);border-color:var(--accent)}
.cta-graph:hover{text-decoration:none;background:var(--text);border-color:var(--text)}
.cta-2{background:var(--surface);color:var(--text)}
.cta-2:hover{text-decoration:none;border-color:var(--accent);color:var(--accent)}
.conflict{display:block;background:none;border:0;border-bottom:1px solid var(--rule);border-left:0;border-radius:0;padding:11px 0 11px 16px;margin-bottom:0;position:relative}
.conflict::before{content:"";position:absolute;left:0;top:13px;bottom:13px;width:3px;background:var(--warn)}
.conflict b{color:var(--text);font-family:var(--serif)}
.conflict:hover{text-decoration:none;background:var(--surface-2)}
.disclaimer{max-width:var(--maxw);margin:30px auto 0;color:var(--faint);font-size:.76rem;line-height:1.55}

/* lists */
.crumbs{font-family:var(--sans);font-size:.78rem;color:var(--muted);margin-bottom:16px;font-weight:500}
.crumbs a{color:var(--muted)}
.termlist{display:grid;gap:0;border-top:1px solid var(--rule)}
.tl-item{display:flex;align-items:flex-start;gap:14px;background:none;border:0;border-bottom:1px solid var(--rule);border-radius:0;padding:13px 8px;cursor:pointer;transition:background .12s}
.tl-item:hover{border-color:var(--rule);transform:none;box-shadow:none;background:var(--surface-2);text-decoration:none}
.tl-item .tl-body{min-width:0;flex:1}
.tl-item .h{font-family:var(--serif);font-weight:600;font-size:1.02rem;color:var(--text)}
.tl-item .d{color:var(--muted);font-size:.86rem;margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tl-item .abbr{color:var(--faint);font-weight:500;font-size:.85em;font-family:var(--sans)}

/* article: term page with Tufte sidenotes */
article{background:none;border:0;border-radius:0;padding:0;box-shadow:none}
.term-grid{display:grid;grid-template-columns:minmax(0,var(--maxw)) 244px;gap:36px;align-items:start}
.term-main{min-width:0}
.term-head{border-left:5px solid var(--cc,var(--accent));padding-left:16px;margin-bottom:14px}
.term-hero{display:flex;align-items:center;gap:16px;margin-bottom:0}
article h1{font-family:var(--serif);font-weight:600;margin:0;font-size:clamp(1.7rem,3.4vw,2.3rem);letter-spacing:-.01em;line-height:1.12}
.term-sub{color:var(--muted);font-family:var(--serif);font-size:1.04rem;font-weight:500;margin:2px 0 0}
.badges{display:flex;flex-wrap:wrap;gap:7px;margin:14px 0 4px}
.badge{font-family:var(--mono);font-size:.7rem;font-weight:500;padding:2px 8px;border-radius:var(--r);border:1px solid var(--border);background:none;color:var(--muted)}
.badge.cat{background:none;color:var(--accent);border-color:var(--accent);cursor:pointer;font-family:var(--sans);font-weight:600}
.badge.st-active{color:var(--muted)}.badge.st-deprecated{color:var(--danger);border-color:var(--danger)}.badge.st-ambiguous{color:var(--warn);border-color:var(--warn)}
.lead{font-family:var(--serif);font-size:1.18rem;line-height:1.55;margin:20px 0;color:var(--text)}
.term-main>p{font-family:var(--serif);font-size:1.02rem;line-height:1.62;color:var(--text)}
.field{margin-top:26px}
.field h3{font-family:var(--sans);font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.13em;color:var(--muted);margin:0 0 10px;padding-bottom:6px;border-bottom:1px solid var(--text)}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{font-family:var(--mono);font-size:.78rem;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r);padding:2px 8px;color:var(--muted)}
table.pt{width:100%;border-collapse:collapse;font-size:.88rem}
table.pt th,table.pt td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--rule);vertical-align:top}
table.pt th{font-family:var(--sans);color:var(--muted);font-size:.64rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;border-bottom:2px solid var(--text)}
table.pt td{font-family:var(--serif)}
table.pt td.prov{font-family:var(--sans);font-weight:600;white-space:nowrap}
table.pt code{white-space:nowrap}
/* sidenotes column (Tufte) */
.sidenotes{font-family:var(--sans)}
.note{font-size:.8rem;line-height:1.46;color:var(--muted);border-left:1px solid var(--rule);padding-left:13px;margin-bottom:20px}
.note h4{font-family:var(--sans);font-size:.62rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text);margin:0 0 7px}
.note .relrow{margin:3px 0}
.rel-group{margin-bottom:7px}
.rel-group .rl{font-family:var(--sans);font-size:.6rem;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:2px}
.rel-link{display:inline-block;background:none;color:var(--accent);border-radius:0;padding:1px 0;margin:1px 10px 1px 0;font-family:var(--serif);font-size:.92rem;font-weight:500;border-bottom:1px solid var(--accent-weak)}
.rel-link:hover{text-decoration:none;color:var(--text);border-bottom-color:var(--text)}
.rel-dead{display:inline-block;color:var(--faint);padding:1px 0;margin:1px 10px 1px 0;font-family:var(--serif);font-size:.92rem}
.dist{background:none;border:0;border-top:1px solid var(--rule);border-left:0;border-radius:0;padding:9px 0;margin-bottom:0;font-size:.82rem;color:var(--muted)}
.dist:first-of-type{border-top:0}
.dist b{font-family:var(--serif);color:var(--text)} .dist b a{color:var(--text);border:0}
ul.src{margin:0;padding-left:16px;font-size:.8rem;color:var(--muted);font-family:var(--sans)}
ul.src li{margin:4px 0}
.notes{background:var(--surface-2);border-left:3px solid var(--accent);border-radius:0;padding:11px 14px;font-family:var(--serif);font-size:.96rem;color:var(--muted)}
.rel-meta{margin-top:30px;color:var(--faint);font-family:var(--mono);font-size:.72rem;border-top:1px solid var(--rule);padding-top:13px}
/* local mini-map (inline SVG ego graph) */
.minimap{border:1px solid var(--rule);border-radius:0;background:var(--surface);margin-bottom:22px}
.minimap .cap{font-family:var(--sans);font-size:.6rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);padding:6px 10px;border-bottom:1px solid var(--rule)}
.minimap svg{display:block;width:100%;height:auto}
.minimap text{font-family:var(--sans);font-size:8.5px;fill:var(--text)}
.minimap line{stroke:var(--border)}
.minimap line.distln{stroke:var(--accent);stroke-dasharray:3 3}
.minimap .nd{fill:var(--surface);stroke:var(--muted);cursor:pointer}
.minimap .nd:hover{fill:var(--accent-weak)}
.minimap .center{fill:var(--accent);stroke:var(--accent)}
.minimap a{cursor:pointer}

/* search / empty */
.searchmeta{color:var(--muted);font-size:.88rem;margin-bottom:14px;font-family:var(--sans)}
mark{background:var(--accent-weak);color:var(--accent);padding:0 1px;border-radius:0;font-weight:600}
.empty{color:var(--muted);text-align:center;padding:70px 10px;font-family:var(--serif)}

/* index */
.idx-head{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:12px;margin-bottom:6px}
.idx-toggle{display:inline-flex;background:none;border:1px solid var(--border);border-radius:var(--r);padding:0;gap:0;overflow:hidden}
.idx-toggle button{border:0;background:none;color:var(--muted);font-family:var(--sans);font-weight:600;font-size:.78rem;padding:6px 13px;cursor:pointer}
.idx-toggle button.on{background:var(--text);color:var(--paper)}
.idx-bar{position:sticky;top:var(--hh);z-index:5;display:flex;flex-wrap:wrap;gap:3px;padding:11px 0;margin-bottom:8px;background:linear-gradient(var(--paper),var(--paper) 72%,transparent)}
.idx-bar button{width:28px;height:28px;border:1px solid var(--border);background:var(--surface);color:var(--muted);border-radius:var(--r);font-family:var(--mono);font-weight:500;font-size:.78rem;cursor:pointer}
.idx-bar button:hover{background:var(--text);color:var(--paper);border-color:var(--text)}
.idx-group{margin-bottom:20px}
.idx-gh{font-family:var(--serif);font-weight:600;font-size:1.3rem;color:var(--text);padding:5px 0;border-bottom:2px solid var(--text);margin-bottom:6px;display:flex;align-items:center;gap:10px}
.idx-gh .gc{width:10px;height:10px;border-radius:0}
.idx-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:0}
.idx-row{display:flex;align-items:center;gap:11px;padding:7px 8px;border:0;border-bottom:1px solid var(--rule);border-radius:0;cursor:pointer}
.idx-row:hover{background:var(--surface-2);border-color:var(--rule);box-shadow:none;text-decoration:none}
.idx-row .ir-body{min-width:0}
.idx-row .ir-term{font-family:var(--serif);font-weight:600;color:var(--text);font-size:.94rem}
.idx-row .ir-ko{color:var(--faint);font-weight:500;font-size:.84em;font-family:var(--sans)}
.idx-row .ir-cat{color:var(--faint);font-size:.72rem;margin-top:1px;font-family:var(--sans)}

/* graph: quiet monochrome atlas */
.graph-head{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:8px}
.kg-legend{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0 14px}
.legend-item{display:inline-flex;align-items:center;gap:7px;font-family:var(--sans);font-size:.74rem;font-weight:500;border:1px solid var(--border);background:var(--surface);border-radius:var(--r);padding:3px 10px;cursor:pointer;user-select:none}
.legend-item .ld{width:9px;height:9px;border-radius:0}
.legend-item.off{opacity:.35}
.graph-wrap{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:0;box-shadow:none;overflow:hidden}
#kg{display:block;width:100%;touch-action:none;cursor:grab}
#kg:active{cursor:grabbing}
.kg-tip{position:absolute;pointer-events:none;background:var(--text);color:var(--paper);font-family:var(--sans);font-size:.76rem;font-weight:500;padding:5px 9px;border-radius:var(--r);opacity:0;transform:translate(-50%,-130%);transition:opacity .1s;white-space:nowrap;z-index:5;max-width:260px}

/* classroom */
.classroom-wrap{display:grid;grid-template-columns:340px 1fr;gap:0;background:var(--surface);border:1px solid var(--border);border-radius:0;box-shadow:none;overflow:hidden;min-height:480px;margin-bottom:28px}
@media (max-width:900px){.classroom-wrap{grid-template-columns:1fr}}
.classroom-left{padding:22px;display:flex;flex-direction:column;gap:18px;border-right:1px solid var(--rule);background:var(--surface-2)}
@media (max-width:900px){.classroom-left{border-right:none;border-bottom:1px solid var(--rule)}}
.classroom-tabs{display:flex;gap:0;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;padding:0}
.classroom-tab{flex:1;padding:9px;border:0;border-right:1px solid var(--border);background:var(--surface);color:var(--muted);border-radius:0;cursor:pointer;font-family:var(--sans);font-weight:600;font-size:0.82rem;text-align:center;transition:.15s}
.classroom-tab:last-child{border-right:0}
.classroom-tab.active{background:var(--text);color:var(--paper);border-color:transparent;box-shadow:none}
.classroom-tab:hover:not(.active){color:var(--accent)}
.classroom-content{flex:1;display:flex;flex-direction:column;gap:12px}
.classroom-title{font-family:var(--serif);font-size:1.22rem;font-weight:600;margin:0;color:var(--text)}
.classroom-step-count{font-family:var(--mono);font-size:0.74rem;font-weight:500;color:var(--accent);text-transform:uppercase;letter-spacing:0.06em}
.classroom-narration{font-family:var(--serif);font-size:0.98rem;line-height:1.6;color:var(--muted);min-height:120px}
.classroom-controls{display:flex;gap:10px;margin-top:auto}
.classroom-btn{flex:1;padding:10px 14px;border:1px solid var(--border);background:var(--surface);color:var(--text);border-radius:var(--r);cursor:pointer;font-family:var(--sans);font-weight:600;font-size:0.86rem;text-align:center;transition:.15s;display:inline-flex;align-items:center;justify-content:center}
.classroom-btn:disabled{opacity:0.4;cursor:not-allowed}
.classroom-btn-primary{background:var(--accent);color:var(--paper);border-color:var(--accent)}
.classroom-btn-primary:hover:not(:disabled){background:var(--text);border-color:var(--text)}
.classroom-right{position:relative;flex:1;background:var(--paper);display:flex;align-items:center;justify-content:center}
svg#classroomSvg {
  width: 100%;
  height: 100%;
  background: var(--paper);
}
svg#classroomSvg .node-group {
  cursor: pointer;
}
svg#classroomSvg .node-group text {
  font-family: var(--sans);
  pointer-events: none;
  user-select: none;
}
.classroom-verticals {
  display: flex;
  gap: 4px;
  border-bottom: 2px solid var(--border);
  padding-bottom: 8px;
}
.classroom-verticals .classroom-tab {
  flex: 1;
  padding: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
}
.classroom-verticals .classroom-tab.active {
  background: var(--accent);
  color: var(--paper);
  border-color: var(--accent);
}
.quiz-box {
  transition: opacity 0.3s ease;
}
.quiz-box button.classroom-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  cursor: pointer;
  width: 100%;
  border-radius: 4px;
  transition: all 0.15s ease;
}
.quiz-box button.classroom-btn:hover {
  background: var(--surface-2);
  border-color: var(--accent);
}

footer{color:var(--faint);font-family:var(--sans);font-size:.76rem;text-align:center;padding:24px;border-top:1px solid var(--rule);margin-top:30px}

@media (max-width:980px){
  .term-grid{grid-template-columns:1fr;gap:0}
  .sidenotes{margin-top:24px;border-top:2px solid var(--text);padding-top:18px}
}
@media (max-width:880px){
  :root{--side:0px}
  .menu-toggle{display:inline-flex;align-items:center;justify-content:center;order:-1}
  aside.nav{position:fixed;left:0;top:var(--hh);width:272px;z-index:35;transform:translateX(-100%);transition:transform .2s;border-right:1px solid var(--border)}
  body.nav-open aside.nav{transform:translateX(0)}
  .shell{grid-template-columns:1fr}
  .searchwrap .hint{display:none}.brand small{display:none}
  .idx-bar{top:var(--hh)}
  .scrim{display:none;position:fixed;inset:var(--hh) 0 0 0;background:rgba(0,0,0,.35);z-index:34}
  body.nav-open .scrim{display:block}
}
/* home directory v2 (sample terms) */
.card{cursor:default;padding-bottom:16px}
.card:hover{background:none}
.card .ct{display:flex;align-items:center;gap:9px;text-decoration:none;font-family:var(--serif);font-weight:600;font-size:1.05rem;color:var(--text)}
.card .ct:hover{color:var(--accent);text-decoration:none}
.card .ct .dot{width:9px;height:9px;border-radius:0;flex:none}
.card .ct .cn{margin-left:auto;margin-top:0;font-family:var(--mono);font-size:.74rem;font-weight:500;color:var(--faint)}
.card .cd{margin-top:6px;font-size:.83rem}
.dir-terms{font-size:.86rem;margin-top:9px;line-height:1.7}
.dir-terms a{color:var(--text)}
.dir-terms a:hover{color:var(--accent)}
.dir-terms .sep{color:var(--faint);margin:0 6px}
.dir-terms .more{color:var(--accent);font-family:var(--mono);font-size:.74rem}

/* Dashboard layout styles */
.graph-dashboard {
  position: relative;
  width: 100%;
  height: calc(100vh - var(--hh));
  overflow: hidden;
  display: flex;
}
.graph-container {
  flex: 1;
  position: relative;
  background: var(--surface);
  height: 100%;
}
#kg-svg {
  width: 100%;
  height: 100%;
  display: block;
}
/* Floating graph control buttons */
.graph-controls {
  position: absolute;
  bottom: 24px;
  left: 24px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 10;
}
.ctrl-btn {
  width: 40px;
  height: 40px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 18px;
  font-weight: 600;
  border-radius: var(--r);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s ease;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}
.ctrl-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

/* Sliding Side Drawer Styles */
.drawer {
  position: fixed;
  top: var(--hh);
  right: 0;
  width: 480px;
  max-width: calc(100vw - var(--side));
  height: calc(100vh - var(--hh));
  background: var(--surface);
  border-left: 1px solid var(--border);
  box-shadow: -4px 0 24px rgba(0, 0, 0, 0.08);
  transform: translateX(100%);
  transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
  z-index: 50;
  display: flex;
  flex-direction: column;
}
.drawer.open {
  transform: translateX(0);
}
.drawer-header {
  padding: 24px;
  border-bottom: 1px solid var(--rule);
  position: relative;
}
.drawer-close {
  position: absolute;
  top: 20px;
  right: 20px;
  background: none;
  border: 0;
  font-size: 28px;
  color: var(--muted);
  cursor: pointer;
  line-height: 1;
}
.drawer-close:hover {
  color: var(--accent);
}
.drawer-title-area h2 {
  font-family: var(--serif);
  font-size: 1.6rem;
  margin: 0 0 4px;
  color: var(--text);
}
.drawer-body {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
}
.drawer-section {
  margin-bottom: 28px;
}
.drawer-section h3 {
  font-family: var(--sans);
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--muted);
  margin: 0 0 10px;
  border-bottom: 1px solid var(--rule);
  padding-bottom: 4px;
}
.def-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 8px;
}
.def-header h3 {
  border-bottom: none;
  padding-bottom: 0;
  margin: 0;
}
.drawer-footer {
  padding: 14px 24px;
  background: var(--surface-2);
  border-top: 1px solid var(--rule);
  font-family: var(--mono);
  font-size: 0.72rem;
  color: var(--faint);
}

/* SVG D3 Graph Visuals */
.link {
  transition: stroke 0.15s, stroke-opacity 0.15s;
}
.link.cat-to-parent {
  stroke-opacity: 0.6;
  stroke-width: 1.5px;
}
.link.parent-to-child {
  stroke-opacity: 0.4;
  stroke-width: 1.2px;
  stroke-dasharray: 3,3;
}
.link.relational {
  stroke: #888;
  stroke-opacity: 0.15;
  stroke-width: 1px;
}
.link.dimmed {
  stroke-opacity: 0.03 !important;
}
.node-group {
  cursor: grab;
  transition: opacity 0.15s;
}
.node-group:active {
  cursor: grabbing;
}
.node-group circle {
  stroke: var(--surface);
  stroke-width: 1.5px;
  transition: r 0.2s, stroke-width 0.2s, stroke 0.2s;
}
.node-group:hover circle,
.node-group.focused circle {
  stroke: var(--text);
  stroke-width: 2.5px;
}
.node-group:focus {
  outline: none;
}
.node-group:focus circle {
  stroke: var(--accent);
  stroke-width: 3.5px;
}
.node-group text {
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 600;
  paint-order: stroke;
  stroke: var(--surface);
  stroke-width: 3px;
  stroke-linecap: round;
  stroke-linejoin: round;
  fill: var(--text);
  pointer-events: none;
  text-anchor: middle;
}
.node-group.dimmed {
  opacity: 0.15;
}
.node-group.highlighted circle {
  stroke: var(--text);
  stroke-width: 3px;
}

/* Custom styles for progressive hybrid graph */
.node-group.category-node text {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
}
.node-group.parent-term-node text {
  font-size: 11px;
  font-weight: 600;
}
.node-group.child-term-node text {
  font-size: 10px;
  font-weight: 400;
}
.node-group.category-node:hover circle,
.node-group.category-node.focused circle {
  stroke: #800020;
  stroke-width: 4px;
}
</style>
</head>

  const FIELDW={term:10,abbr:9,alias:6,prov:5,cat:2,def:1};
  // Korean phonetic / common-query -> canonical token (no deps). e.g. "피엔알" -> PNR
  const ROMA={'피엔알':'pnr','지디에스':'gds','엔디씨':'ndc','오타':'ota','이엠디':'emd','코드셰어':'codeshare','코드쉐어':'codeshare','인터라인':'interline','오버부킹':'overbooking','초과예약':'overbooking','중복예약':'overbooking','운임':'fare','좌석':'seat','환불':'refund','발권':'ticket','예약':'booking','수하물':'baggage','마일리지':'mileage','제휴':'alliance','크루즈':'cruise','렌터카':'car','철도':'rail','베드뱅크':'bedbank','채널매니저':'channel'};
  // bounded Levenshtein: true iff edit distance <= 1
  const lev1=(a,b)=>{ const la=a.length,lb=b.length; if(Math.abs(la-lb)>1) return false; if(a===b) return true;
    let i=0,j=0,diff=0; while(i<la&&j<lb){ if(a[i]===b[j]){i++;j++;} else { if(++diff>1) return false; if(la>lb)i++; else if(lb>la)j++; else {i++;j++;} } }
    if(i<la||j<lb) diff++; return diff<=1; };
  const idx = ENTRIES.map(e=>{ const fields=[]; const words=new Set(); const push=(t,w)=>{ if(t){ const s=String(t).toLowerCase(); fields.push({t:s,w}); if(w>=FIELDW.alias) s.split(/[^a-z0-9가-힣]+/).forEach(x=>{ if(x.length>=3) words.add(x); }); } };
    push(e.term,FIELDW.term); push(e.term_ko,FIELDW.term); push(e.abbreviation,FIELDW.abbr);
    (e.aliases||[]).forEach(a=>push(a,FIELDW.alias)); (e.providerTerms||[]).forEach(p=>push(p.term,FIELDW.prov));
    const c=catById.get(e.category)||{}; push(c.title,FIELDW.cat); push(c.short,FIELDW.cat);
    push(e.definition,FIELDW.def); push(e.definition_ko,FIELDW.def);
    return {e,fields,words:[...words],term:e.term.toLowerCase(),abbr:(e.abbreviation||'').toLowerCase()}; });
  function search(qraw){ const q=qraw.trim().toLowerCase(); if(!q) return [];
    const toks=q.split(/[^a-z0-9가-힣]+/i).filter(Boolean); if(!toks.length) return []; const out=[];
    for(const row of idx){ let score=0;
      if(row.term===q) score+=100; if(row.abbr&&row.abbr===q) score+=90; if(row.term.startsWith(q)) score+=40;
      let ok=true;
      for(const tok of toks){ const cands=ROMA[tok]?[tok,ROMA[tok]]:[tok]; let best=0;
        for(const ct of cands){ for(const f of row.fields){ if(f.t===ct) best=Math.max(best,f.w*3);
          else if(f.t.startsWith(ct)) best=Math.max(best,f.w*2); else if(f.t.includes(ct)) best=Math.max(best,f.w); } }
        if(best===0 && tok.length>=4){ for(const w of row.words){ if(lev1(tok,w)){ best=FIELDW.alias; break; } } }  // typo-tolerant fallback
        if(best===0){ ok=false; break; } score+=best; }
      if(ok && score>0) out.push({e:row.e,score}); }
    out.sort((a,b)=> b.score-a.score || a.e.term.localeCompare(b.e.term)); return out.slice(0,60); }
  const hl=(text,q)=>{ if(!q) return esc(text); const toks=q.trim().toLowerCase().split(/[^a-z0-9가-힣]+/i).filter(Boolean); let s=esc(text);
    toks.forEach(tk=>{ if(tk.length<2) return; s=s.replace(new RegExp('('+tk.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig'),'<mark>$1</mark>'); }); return s; };

  function miniMap(e){
    const seen=new Set(); const nb=[];
    (e.relationships||[]).forEach(r=>{ if(r.targetId&&byId.has(r.targetId)&&!seen.has(r.targetId)){ seen.add(r.targetId); nb.push({id:r.targetId,term:byId.get(r.targetId).term,dist:false}); } });
    (e.distinctions||[]).forEach(d=>{ if(d.targetId&&byId.has(d.targetId)&&!seen.has(d.targetId)){ seen.add(d.targetId); nb.push({id:d.targetId,term:byId.get(d.targetId).term,dist:true}); } });
    if(!nb.length) return '';
    const N=Math.min(nb.length,7), use=nb.slice(0,N);
    const W=240,H=Math.max(150,96+N*7),cx=W/2,cy=H/2,R=Math.min(cx,cy)-30;
    const short=s=>{ s=String(s||''); return s.length>14?s.slice(0,13)+'…':s; };
    let lines='',nodes='';
    use.forEach((n,i)=>{ const a=(-Math.PI/2)+(i*2*Math.PI/N), x=cx+R*Math.cos(a), y=cy+R*Math.sin(a), ty=y<cy-2?y-9:y+15;
      lines+=`<line class="${n.dist?'distln':''}" x1="${cx}" y1="${cy}" x2="${x.toFixed(1)}" y2="${y.toFixed(1)}"></line>`;
      nodes+=`<a href="#/term/${n.id}"><circle class="nd" cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="5"><title>${esc(n.term)}</title></circle><text x="${x.toFixed(1)}" y="${ty.toFixed(1)}" text-anchor="middle">${esc(short(n.term))}</text></a>`; });
    const ctr=short(e.abbreviation||e.term), cap=LANG==='ko'?'인접 관계 지도':'Local map · 1-hop';
    return `<div class="minimap"><div class="cap">${cap}</div><svg viewBox="0 0 ${W} ${H}" role="img" aria-label="local relationship map">${lines}<circle class="center" cx="${cx}" cy="${cy}" r="7"></circle><text x="${cx}" y="${(cy-11)}" text-anchor="middle" style="font-weight:700">${esc(ctr)}</text>${nodes}</svg></div>`;
  }

  window.CLASSES = CLASSES;

  function renderClassroom() {
    stopClassroom();
    stopGraph();

    // Draw wrapper layout with vertical tabs, level selectors, narration & quiz box
    main.innerHTML = `
      <div class="crumbs"><a href="#/">${esc(t('home2'))}</a> › ${esc(t('classroom'))}</div>

            <div class="classroom-step-count" id="classStepCount"></div>
            <div class="classroom-narration" id="classNarration"></div>
            
            <!-- Interactive Quiz Component -->
            <div id="classroomQuiz" class="quiz-box" style="display:none; border:1px solid var(--border); padding:12px; margin-top:12px; background:var(--surface-2); border-radius:4px;">
              <div class="quiz-question" id="quizQuestion" style="font-weight:600; margin-bottom:8px;"></div>
              <div class="quiz-options" id="quizOptions" style="display:flex; flex-direction:column; gap:6px;"></div>
              <div class="quiz-feedback" id="quizFeedback" style="margin-top:10px; font-weight:600; font-size:0.9rem; display:none;"></div>
            </div>
          </div>
          
          <div class="classroom-controls" style="margin-top:auto;">
            <button class="classroom-btn classroom-btn-secondary" id="classBtnBack">${esc(t('btnBack'))}</button>
            <button class="classroom-btn classroom-btn-primary" id="classBtnNext">${esc(t('btnNext'))}</button>
          </div>
        </div>
        
        <div class="classroom-right" style="position:relative; flex:1; background:var(--paper); min-height:400px; display:flex; align-items:center; justify-content:center;">
          <!-- Standard Responsive SVG Container -->
          <svg id="classroomSvg" viewBox="0 0 800 500" width="100%" height="100%" style="display:block; overflow:visible;">
            <defs>
              <!-- High quality CSS drop shadow glow for active nodes -->
              <filter id="svgGlow" x="-30%" y="-30%" width="160%" height="160%">
                <feGaussianBlur stdDeviation="8" result="blur" />
                <feComposite in="SourceGraphic" in2="blur" operator="over" />
              </filter>
            </defs>
            <g id="svgConnections"></g>
            <g id="svgFlowParticles"></g>
            <g id="svgNodes"></g>
          </svg>
        </div>
      </div>
    `;

    renderSidebar(null);

    // Application logic state
    let currentVertical = 'air';
    let currentLevel = 'basic';
    let currentStep = 0;
    let quizAnsweredCorrectly = false;

    const catColor = id => (catById.get(id)||{}).color || '#888';

    // Render nodes and connections to SVG
    function updateSVG() {
      const cls = CLASSES.find(c => c.vertical === currentVertical && c.level === currentLevel);
      if (!cls) return;

      const step = cls.steps[currentStep];
      const activeNodes = step.activeNodes || [];
      const activeConns = step.activeConnections || [];

      const nodeG = document.getElementById('svgNodes');
      const connG = document.getElementById('svgConnections');
      const particleG = document.getElementById('svgFlowParticles');

      if (!nodeG || !connG || !particleG) return;

      nodeG.innerHTML = '';
      connG.innerHTML = '';
      particleG.innerHTML = '';

      const width = 800;
      const height = 500;

      // Helper mapping coordinate ratio to container pixels
      const getCoords = (nodeId) => {
        const node = cls.nodes.find(n => n.id === nodeId);
        return node ? { x: node.x * width, y: node.y * height, cat: node.cat } : { x: 0, y: 0, cat: '' };
      };

      // 1. Draw connection lines
      cls.connections.forEach((conn) => {
        const p1 = getCoords(conn.from);
        const p2 = getCoords(conn.to);
        const isActive = activeConns.some(ac => 
          (ac.from === conn.from && ac.to === conn.to) || (ac.from === conn.to && ac.to === conn.from)
        );

        const color = isActive ? catColor(p1.cat) : (document.documentElement.dataset.theme === 'dark' ? '#262d47' : '#e3e6f0');
        const opacity = isActive ? '1.0' : '0.15';
        const strokeWidth = isActive ? '3' : '1.5';

        // Base path
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        line.setAttribute('id', `p_${conn.from}_${conn.to}`);
        line.setAttribute('d', `M ${p1.x} ${p1.y} L ${p2.x} ${p2.y}`);
        line.setAttribute('stroke', color);
        line.setAttribute('stroke-width', strokeWidth);
        line.setAttribute('opacity', opacity);
        line.setAttribute('fill', 'none');
        connG.appendChild(line);

        // 2. Draw animated flow particles using SMIL <animateMotion>
        if (isActive) {
          const flowId = `path_${conn.from}_${conn.to}`;
          const directionPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          directionPath.setAttribute('id', flowId);
          // Ensure path follows the correct direction from activeConnections definition
          const flowDir = activeConns.find(ac => ac.from === conn.from && ac.to === conn.to);
          const start = flowDir ? p1 : p2;
          const end = flowDir ? p2 : p1;
          directionPath.setAttribute('d', `M ${start.x} ${start.y} L ${end.x} ${end.y}`);
          directionPath.setAttribute('fill', 'none');
          directionPath.setAttribute('stroke', 'none');
          particleG.appendChild(directionPath);

          // Particle circle animating along the path
          const particle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          particle.setAttribute('r', '5');
          particle.setAttribute('fill', '#ffffff');
          particle.setAttribute('filter', 'url(#svgGlow)');

          const animate = document.createElementNS('http://www.w3.org/2000/svg', 'animateMotion');
          animate.setAttribute('dur', '1.8s');
          animate.setAttribute('repeatCount', 'indefinite');
          
          const mpath = document.createElementNS('http://www.w3.org/2000/svg', 'mpath');
          mpath.setAttributeNS('http://www.w3.org/1999/xlink', 'xlink:href', `#${flowId}`);
          
          animate.appendChild(mpath);
          particle.appendChild(animate);
          particleG.appendChild(particle);
        }
      });

      // 3. Draw Nodes
      cls.nodes.forEach(node => {
        const cx = node.x * width;
        const cy = node.y * height;
        const color = catColor(node.cat);
        const isActive = activeNodes.includes(node.id);

        const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        g.setAttribute('class', `node-group ${isActive ? 'active' : 'inactive'}`);
        g.setAttribute('transform', `translate(${cx}, ${cy})`);
        g.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
        if (!isActive) g.style.opacity = '0.2';

        // Base circle
        const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        circle.setAttribute('r', isActive ? '24' : '18');
        circle.setAttribute('fill', color);
        if (isActive) {
          circle.setAttribute('stroke', '#ffffff');
          circle.setAttribute('stroke-width', '2.5');
          circle.setAttribute('filter', 'url(#svgGlow)');
        }
        g.appendChild(circle);

        // Label text inside circle (Abbr or first char)
        const textAbbr = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        const labelStr = typeof node.label === 'object' ? (node.label[LANG] || node.label.en) : node.label;
        textAbbr.textContent = labelStr.substring(0, 4);
        textAbbr.setAttribute('text-anchor', 'middle');
        textAbbr.setAttribute('y', '5');
        textAbbr.setAttribute('fill', '#ffffff');
        textAbbr.setAttribute('font-size', '10');
        textAbbr.setAttribute('font-weight', '700');
        g.appendChild(textAbbr);

        // Description text below circle
        const textLabel = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        textLabel.textContent = labelStr;
        textLabel.setAttribute('text-anchor', 'middle');
        textLabel.setAttribute('y', isActive ? '42' : '34');
        textLabel.setAttribute('fill', document.documentElement.dataset.theme === 'dark' ? '#f3f5ff' : '#0b1020');
        textLabel.setAttribute('font-size', '12');
        textLabel.setAttribute('font-weight', isActive ? '700' : '500');
        g.appendChild(textLabel);

        nodeG.appendChild(g);
      });
    }

    // Define step and interactive quiz update logic
    function updateClassroomStep() {
      const cls = CLASSES.find(c => c.vertical === currentVertical && c.level === currentLevel);
      if (!cls) return;

      const step = cls.steps[currentStep];
      const totalSteps = cls.steps.length;

      // Title and Narration text updates
      document.getElementById('classTitle').textContent = cls.title[LANG] || cls.title.en;
      document.getElementById('classStepCount').textContent = LANG === 'ko' 
        ? `단계 ${currentStep + 1} / ${totalSteps}` 
        : `Step ${currentStep + 1} / ${totalSteps}`;
      document.getElementById('classNarration').textContent = step.narration[LANG] || step.narration.en;

      // Quiz Box rendering logic
      const quizBox = document.getElementById('classroomQuiz');
      const btnNext = document.getElementById('classBtnNext');

      if (step.quiz) {
        quizBox.style.display = 'block';
        document.getElementById('quizQuestion').textContent = step.quiz.question[LANG] || step.quiz.question.en;
        
        const optionsContainer = document.getElementById('quizOptions');
        optionsContainer.innerHTML = '';
        
        const feedback = document.getElementById('quizFeedback');
        feedback.style.display = 'none';

        step.quiz.options.forEach((opt, index) => {
          const optionLabel = opt[LANG] || opt.en;
          const optBtn = document.createElement('button');
          optBtn.className = 'classroom-btn';
          optBtn.style.textAlign = 'left';
          optBtn.style.padding = '8px';
          optBtn.style.width = '100%';
          optBtn.textContent = optionLabel;

          optBtn.addEventListener('click', () => {
            // Verify correctness
            if (index === step.quiz.correctIndex) {
              optBtn.style.borderColor = 'green';
              optBtn.style.color = 'green';
              feedback.style.display = 'block';
              feedback.style.color = 'green';
              feedback.innerHTML = `${t('quizCorrect')} <br><span style="font-weight:400;color:var(--text);">${step.quiz.explanation[LANG] || step.quiz.explanation.en}</span>`;
              quizAnsweredCorrectly = true;
              btnNext.disabled = false;
            } else {
              optBtn.style.borderColor = 'red';
              optBtn.style.color = 'red';
              feedback.style.display = 'block';
              feedback.style.color = 'red';
              feedback.textContent = t('quizIncorrect');
              quizAnsweredCorrectly = false;
              btnNext.disabled = true;
            }
          });
          optionsContainer.appendChild(optBtn);
        });

        // Gated navigation constraint: user must answer correct to click next
        btnNext.disabled = !quizAnsweredCorrectly;
      } else {
        quizBox.style.display = 'none';
        btnNext.disabled = false;
      }

      // Controls update
      document.getElementById('classBtnBack').disabled = currentStep === 0;
      if (currentStep === totalSteps - 1) {
        btnNext.textContent = t('btnFinish');
      } else {
        btnNext.textContent = t('btnNext');
      }

      updateSVG();
    }

    // Attach Event Handlers
    document.getElementById('classVerticalTabs').addEventListener('click', ev => {
      const tab = ev.target.closest('button[data-vertical]');
      if (!tab) return;
      document.querySelectorAll('#classVerticalTabs button').forEach(b => b.classList.remove('active'));
      tab.classList.add('active');
      currentVertical = tab.dataset.vertical;
      currentStep = 0;
      quizAnsweredCorrectly = false;
      updateClassroomStep();
    });

    document.getElementById('classLevelToggles').addEventListener('click', ev => {
      const toggle = ev.target.closest('button[data-level]');
      if (!toggle) return;
      document.querySelectorAll('#classLevelToggles button').forEach(b => b.classList.remove('active'));
      toggle.classList.add('active');
      currentLevel = toggle.dataset.level;
      currentStep = 0;
      quizAnsweredCorrectly = false;
      updateClassroomStep();
    });

    document.getElementById('classBtnBack').addEventListener('click', () => {
      if (currentStep > 0) {
        currentStep--;
        quizAnsweredCorrectly = true; // allow returning back without re-evaluating
        updateClassroomStep();
      }
    });

    document.getElementById('classBtnNext').addEventListener('click', () => {
      const cls = CLASSES.find(c => c.vertical === currentVertical && c.level === currentLevel);
      if (!cls) return;

      if (currentStep < cls.steps.length - 1) {
        currentStep++;
        quizAnsweredCorrectly = false;
        updateClassroomStep();
      } else {
        // Completed last step: prompt restart or route redirection
        if (typeof alert !== 'undefined') {
          alert(LANG === 'ko' ? '학습을 모두 완료했습니다!' : 'Course finished successfully!');
        }
        currentStep = 0;
        quizAnsweredCorrectly = false;
        updateClassroomStep();
      }
    });

    // Run initialization
    updateClassroomStep();
  }

  /* knowledge graph */
  let simulation;
  let allNodes = [];
  let allLinks = [];
  let activeCategories = new Set(CATS.map(c => c.id));
  let linkSelection, nodeSelection;
  let zoom, svg, zoomContainer;
  let activeTermId = null;
  const nbr = new Map();

  let expandedNodeIds = new Set();
  const parentsOfChild = new Map();
  const hasChildrenSet = new Set();
  const isChildSet = new Set();
  let graphLinks = [];

  function stopGraph(){
    if (simulation) {
      simulation.stop();
    }
  }

  const catColor = id => (catById.get(id) || {}).color || '#888';
  const isNeighbor = (a, b) => nbr.has(a) && nbr.get(a).has(b);

  function findParentNode(d) {
    if (d.id.startsWith('cat-')) return null;
    if (d.isParentTerm) {
      return allNodes.find(n => n.id === 'cat-' + d.category);
    } else {
      const parents = parentsOfChild.get(d.id) || new Set();
      // find a parent that is visible
      const visibleParent = allNodes.find(n => parents.has(n.id) && window.kgVisibleNodeIds && window.kgVisibleNodeIds.has(n.id));
      if (visibleParent) return visibleParent;
      const anyParent = allNodes.find(n => parents.has(n.id));
      if (anyParent) return anyParent;
      return allNodes.find(n => n.id === 'cat-' + d.category);
    }
  }

  function ensureTermVisible(termId) {
    const termNode = allNodes.find(n => n.id === termId);
    if (!termNode || termNode.isCategoryNode) return;
    
    // Expand the Category node
    expandedNodeIds.add('cat-' + termNode.category);
    
    // If it's a Child term, expand all of its parents in the category
    if (termNode.isChildTerm) {
      const parents = parentsOfChild.get(termId) || new Set();
      parents.forEach(pId => {
        expandedNodeIds.add(pId);
      });
    }
  }

  function initGraph() {
    if (window.kgInitialized) return;
    window.kgInitialized = true;

    // Render the legend
    const legendContainer = document.getElementById("kgLegend");
    legendContainer.innerHTML = CATS.map(c => `
      <span class="legend-item" data-cat="${c.id}">
        <span class="ld" style="background:${c.color}"></span>
        ${esc(catName(c))}
      </span>
    `).join('');

    legendContainer.addEventListener('click', e => {
      const el = e.target.closest('.legend-item');
      if (!el) return;
      const catId = el.dataset.cat;
      if (activeCategories.has(catId)) {
        activeCategories.delete(catId);
      } else {
        activeCategories.add(catId);
      }
      updateLegendUI();
      updateGraphDataset();
    });

    // Initialize D3 zoom
    svg = d3.select("#kg-svg");
    zoomContainer = svg.select(".zoom-container");
    zoom = d3.zoom()
      .scaleExtent([0.1, 4.0])
      .on("zoom", (event) => {
        zoomContainer.attr("transform", event.transform);
      });
    svg.call(zoom);

    // Zoom controls
    d3.select("#zoom-in").on("click", () => {
      svg.transition().duration(250).call(zoom.scaleBy, 1.3);
    });
    d3.select("#zoom-out").on("click", () => {
      svg.transition().duration(250).call(zoom.scaleBy, 1 / 1.3);
    });
    d3.select("#zoom-fit").on("click", () => {
      zoomFit();
    });

    // Setup Drawer listeners
    document.getElementById("drawerClose").addEventListener("click", () => {
      location.hash = "#/graph";
    });
    document.getElementById("drawerLangBtn").addEventListener("click", () => {
      LANG = LANG === 'ko' ? 'en' : 'ko';
      try { localStorage.setItem('tg-lang', LANG); } catch(_) {}
      applyStaticI18n();
      if (activeTermId) {
        updateDrawer(activeTermId);
      }
    });

    // Compute degrees
    const nodeDegrees = new Map(ENTRIES.map(e => [e.id, 0]));
    ENTRIES.forEach(e => {
      if (e.relationships) {
        e.relationships.forEach(r => {
          if (r.targetId && byId.has(r.targetId)) {
            nodeDegrees.set(e.id, nodeDegrees.get(e.id) + 1);
            nodeDegrees.set(r.targetId, nodeDegrees.get(r.targetId) + 1);
          }
        });
      }
      if (e.distinctions) {
        e.distinctions.forEach(d => {
          if (d.targetId && byId.has(d.targetId)) {
            nodeDegrees.set(e.id, nodeDegrees.get(e.id) + 1);
            nodeDegrees.set(d.targetId, nodeDegrees.get(d.targetId) + 1);
          }
        });
      }
    });

    // Programmatically classify terms within each category
    parentsOfChild.clear();
    isChildSet.clear();
    hasChildrenSet.clear();

    ENTRIES.forEach(e => {
      if (e.relationships) {
        e.relationships.forEach(r => {
          if (r.targetId && byId.has(r.targetId)) {
            const target = byId.get(r.targetId);
            if (target.category === e.category) {
              if (r.type === 'parent' || r.type === 'broader') {
                isChildSet.add(e.id);
                if (!parentsOfChild.has(e.id)) parentsOfChild.set(e.id, new Set());
                parentsOfChild.get(e.id).add(target.id);
                hasChildrenSet.add(target.id);
              } else if (r.type === 'child' || r.type === 'narrower') {
                isChildSet.add(target.id);
                if (!parentsOfChild.has(target.id)) parentsOfChild.set(target.id, new Set());
                parentsOfChild.get(target.id).add(e.id);
                hasChildrenSet.add(e.id);
              }
            }
          }
        });
      }
    });

    // Initialize nodes (Category Nodes + Term Nodes)
    const categoryNodes = CATS.map((c, i) => {
      const ang = i / CATS.length * 2 * Math.PI;
      return {
        id: 'cat-' + c.id,
        term: c.title.toUpperCase(),
        term_ko: c.short.toUpperCase(),
        category: c.id,
        isCategoryNode: true,
        degree: 1,
        x: Math.cos(ang) * 250 + 400,
        y: Math.sin(ang) * 250 + 300
      };
    });

    const termNodes = ENTRIES.map((e, i) => {
      const isParent = !isChildSet.has(e.id);
      const catIdx = CATS.findIndex(c => c.id === e.category);
      const ang = (catIdx >= 0 ? catIdx : 0) / CATS.length * 2 * Math.PI;
      return {
        id: e.id,
        term: e.term,
        term_ko: e.term_ko,
        category: e.category,
        conceptType: e.conceptType,
        status: e.status,
        degree: nodeDegrees.get(e.id) || 0,
        isParentTerm: isParent,
        isChildTerm: !isParent,
        x: Math.cos(ang) * 250 + 400 + (Math.random() - 0.5) * 20,
        y: Math.sin(ang) * 250 + 300 + (Math.random() - 0.5) * 20
      };
    });

    allNodes = [...categoryNodes, ...termNodes];

    // Initialize links
    const catToParentLinks = [];
    const parentToChildLinks = [];
    const relationalLinks = [];
    const seenLinks = new Set();

    termNodes.forEach(n => {
      if (n.isParentTerm) {
        catToParentLinks.push({
          source: 'cat-' + n.category,
          target: n.id,
          type: 'cat-to-parent',
          category: n.category
        });
      }
    });

    termNodes.forEach(n => {
      if (n.isChildTerm) {
        const parents = parentsOfChild.get(n.id) || new Set();
        parents.forEach(pId => {
          parentToChildLinks.push({
            source: pId,
            target: n.id,
            type: 'parent-to-child',
            category: n.category
          });
        });
      }
    });

    ENTRIES.forEach(e => {
      if (e.relationships) {
        e.relationships.forEach(r => {
          if (r.targetId && byId.has(r.targetId)) {
            const target = byId.get(r.targetId);
            const isParentChildSameCat = (target.category === e.category) && 
              ((r.type === 'parent' || r.type === 'broader' || r.type === 'child' || r.type === 'narrower'));
            if (!isParentChildSameCat) {
              const k = [e.id, r.targetId].sort().join('|');
              if (!seenLinks.has(k)) {
                seenLinks.add(k);
                relationalLinks.push({
                  source: e.id,
                  target: r.targetId,
                  type: 'relational'
                });
              }
            }
          }
        });
      }
      if (e.distinctions) {
        e.distinctions.forEach(d => {
          if (d.targetId && byId.has(d.targetId)) {
            const k = [e.id, d.targetId].sort().join('|');
            if (!seenLinks.has(k)) {
              seenLinks.add(k);
              relationalLinks.push({
                source: e.id,
                target: d.targetId,
                type: 'relational'
              });
            }
          }
        });
      }
    });

    graphLinks = [...catToParentLinks, ...parentToChildLinks, ...relationalLinks];

    // Build nbr map
    nbr.clear();
    graphLinks.forEach(l => {
      const sId = typeof l.source === 'object' ? l.source.id : l.source;
      const tId = typeof l.target === 'object' ? l.target.id : l.target;
      if (!nbr.has(sId)) nbr.set(sId, new Set());
      if (!nbr.has(tId)) nbr.set(tId, new Set());
      nbr.get(sId).add(tId);
      nbr.get(tId).add(sId);
    });

    // Initialize D3 force simulation
    const w = 800;
    const h = 600;
    simulation = d3.forceSimulation()
      .force("link", d3.forceLink().id(d => d.id)
        .distance(d => {
          if (d.type === 'cat-to-parent') return 140;
          if (d.type === 'parent-to-child') return 70;
          return 100;
        })
        .strength(0.8)
      )
      .force("charge", d3.forceManyBody().strength(d => {
        if (d.isCategoryNode) return -450;
        if (d.isParentTerm) return -200;
        return -80;
      }))
      .force("center", d3.forceCenter(w / 2, h / 2))
      .force("collide", d3.forceCollide(d => {
        if (d.isCategoryNode) return 45;
        if (d.isParentTerm) return 30;
        return 20;
      }))
      .force("category-attract", alpha => {
        categoryNodes.forEach((node, i) => {
          const ang = i / CATS.length * 2 * Math.PI;
          const targetX = Math.cos(ang) * 250 + w / 2;
          const targetY = Math.sin(ang) * 250 + h / 2;
          node.vx += (targetX - node.x) * 0.1 * alpha;
          node.vy += (targetY - node.y) * 0.1 * alpha;
        });
      })
      .on("tick", ticked);

    // Click trigger function globally exposed
    window.kgClickNode = function(nodeId) {
      const d = allNodes.find(n => n.id === nodeId);
      if (!d) return;

      if (d.isCategoryNode) {
        // Toggle: collapse if already expanded (including all child terms)
        if (expandedNodeIds.has(d.id)) {
          expandedNodeIds.delete(d.id);
          // Collapse all child term expansions within this category
          allNodes.forEach(n => {
            if (n.category === d.category && n.isParentTerm) {
              expandedNodeIds.delete(n.id);
            }
          });
        } else {
          expandedNodeIds.add(d.id);
        }
        updateGraphDataset();
      } else if (d.isParentTerm) {
        if (hasChildrenSet.has(d.id)) {
          // This parent has child terms: toggle expand/collapse children
          if (expandedNodeIds.has(d.id)) {
            expandedNodeIds.delete(d.id);
          } else {
            expandedNodeIds.add(d.id);
          }
          updateGraphDataset();
          // Also open drawer for this term
          updateDrawer(d.id);
        } else {
          // Leaf parent (no children): just open the drawer
          updateDrawer(d.id);
        }
      } else {
        // Child term: open the drawer
        updateDrawer(d.id);
      }
    };

    // Initial dataset bind
    updateLegendUI();
    updateGraphDataset();
  }

  function recalculateVisibility() {
    const visibleNodes = [];
    const visibleNodeIds = new Set();

    const isNodeVisible = d => {
      if (d.isCategoryNode) {
        return activeCategories.has(d.category);
      }
      if (d.isParentTerm) {
        const catNodeId = 'cat-' + d.category;
        return activeCategories.has(d.category) && expandedNodeIds.has(catNodeId);
      }
      if (d.isChildTerm) {
        const parents = parentsOfChild.get(d.id) || new Set();
        const hasVisibleExpandedParent = Array.from(parents).some(pId => {
          const pNode = byId.get(pId);
          return pNode && activeCategories.has(pNode.category) && expandedNodeIds.has(pNode.id);
        });
        return hasVisibleExpandedParent;
      }
      return false;
    };

    allNodes.forEach(n => {
      if (isNodeVisible(n)) {
        visibleNodes.push(n);
        visibleNodeIds.add(n.id);
      }
    });

    window.kgVisibleNodeIds = visibleNodeIds;
    return { visibleNodes, visibleNodeIds };
  }

  function updateLegendUI() {
    document.querySelectorAll(".legend-item").forEach(el => {
      const catId = el.dataset.cat;
      if (activeCategories.has(catId)) {
        el.classList.remove("off");
      } else {
        el.classList.add("off");
      }
    });
  }

  function updateGraphDataset() {
    const { visibleNodes: filteredNodes, visibleNodeIds: filteredNodeIds } = recalculateVisibility();

    const filteredLinks = graphLinks.map(l => {
      const sId = typeof l.source === 'object' ? l.source.id : l.source;
      const tId = typeof l.target === 'object' ? l.target.id : l.target;
      return { source: sId, target: tId, type: l.type, category: l.category };
    }).filter(l => filteredNodeIds.has(l.source) && filteredNodeIds.has(l.target));

    simulation.nodes(filteredNodes);
    simulation.force("link").links(filteredLinks);
    simulation.alpha(0.3).restart();

    linkSelection = svg.select(".links-group")
      .selectAll("line")
      .data(filteredLinks, d => `${typeof d.source === 'object' ? d.source.id : d.source}-${typeof d.target === 'object' ? d.target.id : d.target}`)
      .join(
        enter => enter.append("line")
          .attr("class", d => {
            if (d.type === 'cat-to-parent') return 'link cat-to-parent';
            if (d.type === 'parent-to-child') return 'link parent-to-child';
            return 'link relational';
          })
          .style("stroke", d => {
            if (d.type === 'cat-to-parent' || d.type === 'parent-to-child') {
              return catColor(d.category);
            }
            return '#888';
          }),
        update => update
          .attr("class", d => {
            if (d.type === 'cat-to-parent') return 'link cat-to-parent';
            if (d.type === 'parent-to-child') return 'link parent-to-child';
            return 'link relational';
          })
          .style("stroke", d => {
            if (d.type === 'cat-to-parent' || d.type === 'parent-to-child') {
              return catColor(d.category);
            }
            return '#888';
          }),
        exit => exit.remove()
      );

    nodeSelection = svg.select(".nodes-group")
      .selectAll(".node-group")
      .data(filteredNodes, d => d.id)
      .join(
        enter => {
          const g = enter.append("g")
            .attr("class", d => {
              let cls = "node-group";
              if (d.isCategoryNode) cls += " category-node";
              if (d.isParentTerm) cls += " parent-term-node";
              if (d.isChildTerm) cls += " child-term-node";
              return cls;
            })
            .attr("tabindex", "0")
            .attr("role", "button")
            .attr("aria-label", d => d.term)
            .each(d => {
              const parent = findParentNode(d);
              if (parent) {
                d.x = parent.x;
                d.y = parent.y;
                d.vx = 0;
                d.vy = 0;
              }
            })
            .attr("transform", d => `translate(${d.x},${d.y})`)
            .style("opacity", 0)
            .call(d3.drag()
              .on("start", dragstarted)
              .on("drag", dragged)
              .on("end", dragended)
            );

          g.append("circle")
            .attr("r", d => d.isCategoryNode ? 20 : (d.isParentTerm ? 14 : 8))
            .attr("fill", d => d.isCategoryNode ? catColor(d.category) : (d.isParentTerm ? "#ffffff" : catColor(d.category)))
            .attr("fill-opacity", d => d.isChildTerm ? 0.6 : 1.0)
            .attr("stroke", d => d.isCategoryNode ? "#800020" : catColor(d.category))
            .attr("stroke-width", d => d.isCategoryNode ? 3 : (d.isParentTerm ? 3 : 1));

          // Draw an outer ring for parent nodes that have children
          g.filter(d => d.isParentTerm && hasChildrenSet.has(d.id))
            .append("circle")
            .attr("class", "outer-ring")
            .attr("r", 18)
            .attr("fill", "none")
            .attr("stroke", d => catColor(d.category))
            .attr("stroke-width", 1.2)
            .attr("stroke-dasharray", "3,3");

          g.append("text")
            .attr("dy", d => -(d.isCategoryNode ? 24 : (d.isParentTerm ? 18 : 12)))
            .style("font-weight", d => d.isCategoryNode ? "700" : (d.isParentTerm ? "600" : "400"))
            .style("text-transform", d => d.isCategoryNode ? "uppercase" : "none")
            .text(d => {
              let txt = LANG === 'ko' && d.term_ko ? d.term_ko : d.term;
              return d.isCategoryNode ? txt.toUpperCase() : txt;
            });

          g.on("click", (event, d) => {
            if (window.kgClickNode) window.kgClickNode(d.id);
          });

          g.on("keydown", (event, d) => {
            if (event.key === 'Enter' || event.key === ' ') {
              event.preventDefault();
              if (window.kgClickNode) window.kgClickNode(d.id);
            }
          });

          g.on("mouseover", (event, d) => {
            const tip = d3.select("#kgTip");
            if (d.isCategoryNode) {
              const c = catById.get(d.category) || {};
              const nameStr = catName(c);
              const descStr = LANG === 'ko' ? (c.desc || c.desc_en) : c.desc_en;
              tip.html(`<b>${esc(nameStr.toUpperCase())}</b> <span style="opacity:.7">— ${esc(descStr)}</span>`);
              tip.style("opacity", 1);
            } else {
              const nm = LANG === 'ko' && d.term_ko && d.term_ko !== d.term ? `${d.term} · ${d.term_ko}` : d.term;
              tip.html(`${esc(nm)} <span style="opacity:.7">— ${esc(catName(catById.get(d.category) || {}))}</span>`);
              tip.style("opacity", 1);
            }
            
            d3.selectAll("#kg-svg .node-group").classed("dimmed", n => n.id !== d.id && !isNeighbor(d.id, n.id));
            d3.selectAll("#kg-svg .link").classed("dimmed", l => {
              const sId = typeof l.source === 'object' ? l.source.id : l.source;
              const tId = typeof l.target === 'object' ? l.target.id : l.target;
              return sId !== d.id && tId !== d.id;
            });
          });

          g.on("mousemove", (event) => {
            const container = document.querySelector(".graph-container");
            if (!container) return;
            const rect = container.getBoundingClientRect();
            const tip = d3.select("#kgTip");
            tip.style("left", (event.clientX - rect.left) + "px")
               .style("top", (event.clientY - rect.top - 28) + "px");
          });

          g.on("mouseout", () => {
            d3.select("#kgTip").style("opacity", 0);
            d3.selectAll("#kg-svg .node-group").classed("dimmed", false);
            d3.selectAll("#kg-svg .link").classed("dimmed", false);
          });

          g.transition().duration(400).style("opacity", 1);
          return g;
        },
        update => {
          update.select("circle")
            .attr("fill", d => d.isCategoryNode ? catColor(d.category) : (d.isParentTerm ? "#ffffff" : catColor(d.category)))
            .attr("fill-opacity", d => d.isChildTerm ? 0.6 : 1.0)
            .attr("stroke", d => d.isCategoryNode ? "#800020" : catColor(d.category))
            .attr("stroke-width", d => d.isCategoryNode ? 3 : (d.isParentTerm ? 3 : 1));
          
          update.select("text")
            .attr("dy", d => -(d.isCategoryNode ? 24 : (d.isParentTerm ? 18 : 12)))
            .style("font-weight", d => d.isCategoryNode ? "700" : (d.isParentTerm ? "600" : "400"))
            .style("text-transform", d => d.isCategoryNode ? "uppercase" : "none")
            .text(d => {
              let txt = LANG === 'ko' && d.term_ko ? d.term_ko : d.term;
              return d.isCategoryNode ? txt.toUpperCase() : txt;
            });
          return update;
        },
        exit => {
          exit.transition().duration(400)
            .style("opacity", 0)
            .attr("transform", d => {
              const parent = findParentNode(d);
              return `translate(${parent ? parent.x : d.x}, ${parent ? parent.y : d.y})`;
            })
            .remove();
        }
      );
  }

  function dragstarted(event, d) {
    if (!event.active) simulation.alphaTarget(0.3).restart();
    d.fx = d.x;
    d.fy = d.y;
  }

  function dragged(event, d) {
    d.fx = event.x;
    d.fy = event.y;
  }

  function dragended(event, d) {
    if (!event.active) simulation.alphaTarget(0);
    d.fx = null;
    d.fy = null;
  }

  function ticked() {
    if (linkSelection) {
      linkSelection
        .attr("x1", d => d.source.x)
        .attr("y1", d => d.source.y)
        .attr("x2", d => d.target.x)
        .attr("y2", d => d.target.y);
    }
    if (nodeSelection) {
      nodeSelection
        .attr("transform", d => `translate(${d.x},${d.y})`);
    }
  }

  function zoomFit() {
    if (!svg) return;
    const parent = svg.node();
    const w = parent.clientWidth || 800;
    const h = parent.clientHeight || 600;

    const activeNodes = allNodes.filter(n => window.kgVisibleNodeIds && window.kgVisibleNodeIds.has(n.id));
    if (activeNodes.length === 0) return;

    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    activeNodes.forEach(n => {
      if (n.x < minX) minX = n.x;
      if (n.x > maxX) maxX = n.x;
      if (n.y < minY) minY = n.y;
      if (n.y > maxY) maxY = n.y;
    });

    const width = maxX - minX + 80;
    const height = maxY - minY + 80;
    const midX = (minX + maxX) / 2;
    const midY = (minY + maxY) / 2;

    const scale = Math.min(4.0, Math.max(0.15, 0.85 / Math.max(width / w, height / h)));
    const tx = w / 2 - scale * midX;
    const ty = h / 2 - scale * midY;

    svg.transition().duration(750).call(
      zoom.transform,
      d3.zoomIdentity.translate(tx, ty).scale(scale)
    );
  }

  function centerOnNode(id) {
    const targetNode = allNodes.find(n => n.id === id);
    if (targetNode) {
      if (!activeCategories.has(targetNode.category)) {
        activeCategories.add(targetNode.category);
        updateLegendUI();
      }
      ensureTermVisible(id);
      updateGraphDataset();

      const parent = svg.node();
      const w = parent.clientWidth || 800;
      const h = parent.clientHeight || 600;
      const scale = 1.6;
      const tx = w / 2 - targetNode.x * scale;
      const ty = h / 2 - targetNode.y * scale;

      svg.transition().duration(750).call(
        zoom.transform,
        d3.zoomIdentity.translate(tx, ty).scale(scale)
      );

      d3.selectAll("#kg-svg .node-group").classed("focused", d => d.id === id);
    }
  }

  function closeDrawer() {
    const drawer = document.getElementById("drawer");
    if (drawer) {
      drawer.classList.remove("open");
    }
    activeTermId = null;
    d3.selectAll("#kg-svg .node-group").classed("focused", false);
  }

  function updateDrawer(id) {
    const e = byId.get(id);
    if (!e) {
      closeDrawer();
      return;
    }

    activeTermId = id;
    const drawer = document.getElementById("drawer");
    drawer.classList.add("open");

    const c = catById.get(e.category) || { title: e.category };

    document.getElementById("drawerTitle").textContent = e.term;
    const subEl = document.getElementById("drawerSub");
    if (LANG === 'ko' && e.term_ko && e.term_ko !== e.term) {
      subEl.style.display = "block";
      subEl.textContent = e.term_ko;
    } else {
      subEl.style.display = "none";
    }

    document.getElementById("drawerLangBtn").textContent = LANG === 'ko' ? 'EN' : 'KO';

    const badgesEl = document.getElementById("drawerBadges");
    let badgeHtml = `<span class="badge cat" style="color:${c.color}; border-color:${c.color};" onclick="location.hash='#/category/${e.category}'">${esc(catName(c))}</span>`;
    if (e.conceptType) {
      badgeHtml += ` <span class="badge">${esc((t('CT')[e.conceptType]) || e.conceptType)}</span>`;
    }
    badgeHtml += ` ${statusBadge(e.status)}`;
    if (e.standardBody) {
      badgeHtml += ` <span class="badge">${esc(e.standardBody)}</span>`;
    }
    badgesEl.innerHTML = badgeHtml;

    const bodyEl = document.getElementById("drawerBody");
    let bodyHtml = `
      <div class="drawer-section">
        <p class="lead" style="font-size:1.1rem; line-height:1.5; color:var(--text);">${esc(Lf(e, 'definition'))}</p>
        ${Lf(e, 'longDef') ? `<p style="font-size:0.95rem; line-height:1.5; color:var(--text); margin-top:12px;">${esc(Lf(e, 'longDef'))}</p>` : ''}
      </div>
    `;

    if (e.aliases && e.aliases.length) {
      bodyHtml += `
        <div class="drawer-section">

    if (e.providerTerms && e.providerTerms.length) {
      bodyHtml += `
        <div class="drawer-section">
          <h3>${esc(t('fProv'))}</h3>
          <table class="pt">
            <thead>
              <tr>
                <th>${esc(t('thProv'))}</th>
                <th>${esc(t('thTerm'))}</th>
                <th>${esc(t('thRel'))}</th>
                <th>${esc(t('thCtx'))}</th>
              </tr>
            </thead>
            <tbody>
      `;
      e.providerTerms.forEach(p => {
        const ctx = (LANG === 'ko' && p.context_ko) || p.context || '';
        bodyHtml += `
          <tr>
            <td class="prov">${esc(p.provider)}</td>
            <td><code>${esc(p.term)}</code></td>
            <td>${esc((t('PR')[p.relationship]) || p.relationship || '')}</td>
            <td>${esc(ctx)}</td>
          </tr>
        `;
      });
      bodyHtml += `
            </tbody>
          </table>
        </div>
      `;
    }

    if (e.relationships && e.relationships.length) {
      const RLAB = t('RLAB');
      const groups = {};
      e.relationships.forEach(r => {
        (groups[r.type] = groups[r.type] || []).push(r);
      });

      bodyHtml += `
        <div class="drawer-section">

        bodyHtml += `
          <div class="dist" style="padding:8px 0; border-top:1px solid var(--rule);">

          </div>
